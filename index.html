<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام توزيع الأوردرات - Drmedia Pro</title>
    
    <!-- الأنماط والمكتبات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- FullCalendar للتقويم -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <!-- QR Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <!-- Excel parser -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- PDF generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #ff00ff;
            --primary-dark: #cc00cc;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .dark-theme {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            direction: rtl;
            transition: background 0.3s, color 0.3s;
            line-height: 1.6;
        }
        
        /* الشاشات الرئيسية */
        .screen {
            display: none;
            min-height: 100vh;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }
        
        .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .dashboard-screen.active {
            display: block;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* البطاقات */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            transition: var(--transition);
            border: 1px solid rgba(128, 128, 128, 0.1);
        }
        
        .card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        
        /* الأزرار */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            margin: 5px;
            box-shadow: 0 4px 6px rgba(255,0,255,0.2);
        }
        
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 12px rgba(255,0,255,0.3);
        }
        
        .btn:active { transform: translateY(0); }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            box-shadow: none;
        }
        
        .btn-outline:hover { background: var(--primary); color: white; }
        
        .btn-sm { padding: 8px 16px; font-size: 13px; }
        
        .btn-danger { background: var(--danger); box-shadow: 0 4px 6px rgba(239,68,68,0.2); }
        
        .btn-success { background: var(--secondary); box-shadow: 0 4px 6px rgba(16,185,129,0.2); }
        
        .btn-warning { background: var(--warning); color: white; }
        
        /* حقول الإدخال */
        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            background: var(--card);
            color: var(--text);
            transition: var(--transition);
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,0,255,0.1);
        }
        
        label { font-weight: 600; display: block; margin-top: 12px; font-size: 14px; }
        
        /* شريط التنقل */
        .nav {
            display: flex;
            gap: 8px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
            padding: 15px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        
        .nav button {
            background: transparent;
            border: 2px solid transparent;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            transition: var(--transition);
        }
        
        .nav button:hover, .nav button.active-tab {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* الجداول */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            min-width: 800px;
        }
        
        th, td {
            padding: 14px 16px;
            text-align: right;
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        }
        
        th {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-weight: 700;
            font-size: 14px;
            white-space: nowrap;
        }
        
        tr:hover { background: rgba(255,0,255,0.02); }
        
        tr:last-child td { border-bottom: none; }
        
        /* الشارات */
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }
        
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-primary { background: #ede9fe; color: #5b21b6; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        
        /* الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        
        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: var(--transition);
            border: 1px solid rgba(128, 128, 128, 0.1);
        }
        
        .stat-card:hover { transform: translateY(-3px); }
        
        .stat-card i { 
            font-size: 40px; 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px; 
        }
        
        .stat-card h3 { font-size: 32px; margin: 8px 0; font-weight: 700; }
        .stat-card p { color: var(--text-light); font-size: 14px; font-weight: 500; }
        
        /* التنبيهات */
        .alert {
            padding: 14px 20px;
            border-radius: 12px;
            margin: 12px 0;
            font-weight: 600;
            border-right: 4px solid;
        }
        
        .alert-success { background: #f0fdf4; color: #065f46; border-color: #10b981; }
        .alert-danger { background: #fef2f2; color: #991b1b; border-color: #ef4444; }
        .alert-warning { background: #fffbeb; color: #92400e; border-color: #f59e0b; }
        .alert-info { background: #eff6ff; color: #1e40af; border-color: #3b82f6; }
        
        /* المحتوى المخفي */
        .hidden { display: none !important; }
        
        /* النماذج */
        .form-group { margin-bottom: 20px; }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        /* رأس الصفحة */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding: 20px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        
        .header h2 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h2 i { color: var(--primary); }
        
        /* QR Scanner */
        #qr-reader { 
            width: 100%; 
            max-width: 400px; 
            margin: 20px auto; 
            border-radius: var(--radius);
            overflow: hidden;
        }
        
        /* التقويم */
        #calendar {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--card);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        
        /* أزرار التصدير */
        .export-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        /* تجاوب الهاتف */
        @media (max-width: 768px) {
            .card { padding: 20px; }
            .nav { gap: 5px; padding: 10px; }
            .nav button { padding: 8px 12px; font-size: 12px; }
            .stats-grid { grid-template-columns: 1fr; gap: 10px; }
            .header { flex-direction: column; text-align: center; }
            th, td { padding: 10px; font-size: 13px; }
        }
        
        /* أنماط الطباعة */
        @media print {
            .nav, .btn, .header button { display: none; }
            body { background: white; }
            .card { box-shadow: none; border: 1px solid #ddd; }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- شاشة تسجيل الدخول -->
    <div id="login-screen" class="screen active">
        <div class="card">
            <div style="text-align:center; margin-bottom:25px;">
                <i class="fas fa-camera-retro" style="font-size:50px; color:var(--primary);"></i>
                <h2>نظام توزيع الأوردرات</h2>
                <p style="color:var(--text-light);">Drmedia Pro - VPMS</p>
            </div>
            <form id="login-form">
                <label>اسم المستخدم</label>
                <input type="text" id="login-username" placeholder="أدخل اسم المستخدم" required autocomplete="username">
                <label>كلمة المرور</label>
                <input type="password" id="login-password" placeholder="••••••" required autocomplete="current-password">
                <button type="submit" class="btn" style="width:100%; justify-content:center;">
                    <i class="fas fa-sign-in-alt"></i> دخول
                </button>
            </form>
            <div id="login-error" class="hidden alert alert-danger"></div>
        </div>
    </div>

    <!-- لوحة الأدمن -->
    <div id="admin-screen" class="screen dashboard-screen">
        <div class="header">
            <h2><i class="fas fa-user-shield"></i> لوحة التحكم</h2>
            <div>
                <button class="btn btn-sm btn-outline" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i> الوضع الليلي
                </button>
                <button class="btn btn-sm btn-outline" onclick="exportToExcel()">
                    <i class="fas fa-file-excel"></i> تصدير Excel
                </button>
                <button id="logout-btn" class="btn btn-sm btn-danger">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </div>
        
        <div id="admin-stats" class="stats-grid"></div>
        
        <div class="nav" id="admin-nav">
            <button onclick="showAdminSection('users')" class="active-tab">
                <i class="fas fa-users"></i> الموظفين
            </button>
            <button onclick="showAdminSection('halls')">
                <i class="fas fa-building"></i> القاعات
            </button>
            <button onclick="showAdminSection('orders')">
                <i class="fas fa-calendar-alt"></i> الأوردرات
            </button>
            <button onclick="showAdminSection('distribution')">
                <i class="fas fa-tasks"></i> توزيع
            </button>
            <button onclick="showAdminSection('rotation')">
                <i class="fas fa-sync"></i> تدوير
            </button>
            <button onclick="showAdminSection('finances')">
                <i class="fas fa-money-bill-wave"></i> مالية
            </button>
            <button onclick="showAdminSection('import')">
                <i class="fas fa-file-import"></i> استيراد Excel
            </button>
            <button onclick="showAdminSection('reports')">
                <i class="fas fa-chart-bar"></i> تقارير
            </button>
            <button onclick="showAdminSection('calendar')">
                <i class="fas fa-calendar-week"></i> تقويم
            </button>
            <button onclick="showAdminSection('attendance')">
                <i class="fas fa-clock"></i> الحضور
            </button>
            <button onclick="showAdminSection('notifications')">
                <i class="fas fa-bell"></i> إشعارات
            </button>
            <button onclick="showAdminSection('settings')">
                <i class="fas fa-cog"></i> إعدادات
            </button>
        </div>
        
        <div id="admin-content" class="card" style="max-width:100%;"></div>
    </div>

    <!-- لوحة الموظف -->
    <div id="employee-screen" class="screen dashboard-screen">
        <div class="header">
            <h2><i class="fas fa-id-card"></i> لوحة الموظف</h2>
            <div>
                <button class="btn btn-sm btn-outline" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i> الوضع الليلي
                </button>
                <button id="emp-logout-btn" class="btn btn-sm btn-danger">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </div>
        
        <div class="nav" id="emp-nav">
            <button onclick="showEmployeeSection('myattendance')" class="active-tab">
                <i class="fas fa-qrcode"></i> تسجيل حضور
            </button>
            <button onclick="showEmployeeSection('myorders')">
                <i class="fas fa-list"></i> أوردراتي
            </button>
            <button onclick="showEmployeeSection('mysalary')">
                <i class="fas fa-money-bill"></i> مرتبي
            </button>
            <button onclick="showEmployeeSection('mynotifications')">
                <i class="fas fa-bell"></i> إشعاراتي
            </button>
        </div>
        
        <div id="employee-content" class="card" style="max-width:100%;"></div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, get, set, update, push, remove, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
        authDomain: "drmedia-vpms.firebaseapp.com",
        databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
        projectId: "drmedia-vpms",
        storageBucket: "drmedia-vpms.firebasestorage.app",
        messagingSenderId: "681162512380",
        appId: "1:681162512380:web:ab2482f3234d8b59fc4479"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // متغيرات الجلسة
    let currentUser = null;
    let allEmployees = {};
    let allBookings = {};
    let allHalls = {};
    const sessionKey = 'drmedia_current_user';

    // استعادة الجلسة
    const savedUser = localStorage.getItem(sessionKey);
    if (savedUser) {
        try {
            currentUser = JSON.parse(savedUser);
            initializeAppData().then(() => navigateToDashboard(currentUser));
        } catch (e) {
            localStorage.removeItem(sessionKey);
        }
    }

    // دوال الشاشات
    const screens = document.querySelectorAll('.screen');
    window.showScreen = (screenId) => {
        screens.forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    };

    function navigateToDashboard(user) {
        if (user.role === 'admin') {
            showScreen('admin-screen');
            loadAdminDashboard();
        } else {
            showScreen('employee-screen');
            loadEmployeeDashboard();
        }
    }

    // تحميل البيانات الأساسية
    async function initializeAppData() {
        const [empSnap, bookSnap, hallSnap] = await Promise.all([
            get(ref(db, 'employees')),
            get(ref(db, 'bookings')),
            get(ref(db, 'halls'))
        ]);
        allEmployees = empSnap.val() || {};
        allBookings = bookSnap.val() || {};
        allHalls = hallSnap.val() || {};
    }

    // تسجيل الدخول
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;

        try {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);

            let foundUser = null;
            if (snapshot.exists()) {
                const users = snapshot.val();
                const userKey = Object.keys(users).find(key => {
                    const u = users[key];
                    return u.username === username && u.password == password;
                });
                if (userKey) {
                    foundUser = { userId: userKey, ...users[userKey] };
                }
            }

            if (!foundUser) {
                const errorDiv = document.getElementById('login-error');
                errorDiv.classList.remove('hidden');
                errorDiv.textContent = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
                return;
            }

            document.getElementById('login-error').classList.add('hidden');
            currentUser = foundUser;

            // تحميل بيانات الموظف إذا كان موظفاً
            if (currentUser.employeeId) {
                const empSnap = await get(ref(db, `employees/${currentUser.employeeId}`));
                if (empSnap.exists()) {
                    currentUser = { ...currentUser, ...empSnap.val(), id: currentUser.employeeId };
                }
            }

            await initializeAppData();
            localStorage.setItem(sessionKey, JSON.stringify(currentUser));
            navigateToDashboard(currentUser);
        } catch (error) {
            console.error('Login error:', error);
            alert('حدث خطأ أثناء تسجيل الدخول');
        }
    });

    // تسجيل الخروج
    function logout() {
        localStorage.removeItem(sessionKey);
        currentUser = null;
        allEmployees = {};
        allBookings = {};
        allHalls = {};
        showScreen('login-screen');
    }
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('emp-logout-btn').addEventListener('click', logout);

    // ============ لوحة الأدمن ============
    async function loadAdminDashboard() {
        await loadAdminStats();
        showAdminSection('users');
    }

    async function loadAdminStats() {
        const empCount = Object.keys(allEmployees).length;
        const hallCount = Object.keys(allHalls).filter(k => allHalls[k].active).length;
        const today = new Date().toISOString().split('T')[0];
        const todayBookings = Object.values(allBookings).filter(b => b.date === today).length;
        
        document.getElementById('admin-stats').innerHTML = `
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <h3>${empCount}</h3>
                <p>موظف</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-building"></i>
                <h3>${hallCount}</h3>
                <p>قاعة نشطة</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-calendar-check"></i>
                <h3>${todayBookings}</h3>
                <p>أوردر اليوم</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <h3>${Object.values(allEmployees).filter(e => e.active).length}</h3>
                <p>موظف نشط</p>
            </div>
        `;
    }

    window.showAdminSection = async (section) => {
        const content = document.getElementById('admin-content');
        document.querySelectorAll('#admin-nav button').forEach(b => b.classList.remove('active-tab'));
        
        const buttons = document.querySelectorAll('#admin-nav button');
        buttons.forEach(b => {
            if (b.textContent.includes(getSectionTitle(section))) {
                b.classList.add('active-tab');
            }
        });

        switch(section) {
            case 'users': await renderAdminUsers(content); break;
            case 'halls': await renderAdminHalls(content); break;
            case 'orders': await renderAdminOrders(content); break;
            case 'distribution': await renderDistribution(content); break;
            case 'rotation': await renderRotation(content); break;
            case 'finances': await renderFinances(content); break;
            case 'import': renderImport(content); break;
            case 'reports': renderReports(content); break;
            case 'calendar': renderCalendar(content); break;
            case 'attendance': await renderAdminAttendance(content); break;
            case 'notifications': renderNotifications(content); break;
            case 'settings': await renderSettings(content); break;
        }
    };

    function getSectionTitle(section) {
        const titles = {
            users: 'الموظفين', halls: 'القاعات', orders: 'الأوردرات',
            distribution: 'توزيع', rotation: 'تدوير', finances: 'مالية',
            import: 'استيراد', reports: 'تقارير', calendar: 'تقويم',
            attendance: 'الحضور', notifications: 'إشعارات', settings: 'إعدادات'
        };
        return titles[section] || '';
    }

    // ============ إدارة الموظفين ============
    async function renderAdminUsers(container) {
        let html = `
            <div class="header" style="margin-bottom:20px;">
                <h3><i class="fas fa-users"></i> إدارة الموظفين</h3>
                <button class="btn btn-sm btn-success" onclick="toggleAddEmployeeForm()">
                    <i class="fas fa-plus"></i> إضافة موظف
                </button>
            </div>
            
            <div id="addEmployeeForm" class="hidden card">
                <h4>إضافة موظف جديد</h4>
                <div class="form-row">
                    <div>
                        <label>اسم الموظف</label>
                        <input type="text" id="newEmpName" placeholder="الاسم الكامل">
                    </div>
                    <div>
                        <label>رقم الهاتف</label>

    async function refreshDistPreview() {
        const hallFilter = document.getElementById('distHallFilter')?.value || 'all';
        const dateFilter = document.getElementById('distDateFilter')?.value;

        let filteredBookings = Object.entries(allBookings)
            .filter(([k, b]) => {
                let match = true;
                if (hallFilter !== 'all') match = match && b.hallName === hallFilter;
                if (dateFilter) match = match && b.date === dateFilter;
                return match;
            })
            .map(([k, v]) => ({...v, dbKey: k}));

        const hallReqs = {
            'المغلقة': ['مخرج', 'مصور', 'مصور', 'كرين'],
            'الأوبن': ['مخرج', 'مصور', 'مصور', 'كرين'],
            'الكافيه': ['مصور']
        };

        const assignments = {};
        
        filteredBookings.forEach(booking => {
            const required = hallReqs[booking.hallName] || ['مصور'];
            const assigned = [];
            
            required.forEach(role => {
                const available = Object.entries(allEmployees)
                    .filter(([k, e]) => 
                        e.role === role && 
                        e.active && 
                        !assigned.includes(k)
                    )
                    .map(([k, v]) => ({...v, dbKey: k}));
                
                if (available.length > 0) {
                    const leastLoaded = available.sort((a, b) => 
                        (assignments[a.dbKey] || 0) - (assignments[b.dbKey] || 0)
                    )[0];
                    assigned.push(leastLoaded.dbKey);
                    assignments[leastLoaded.dbKey] = (assignments[leastLoaded.dbKey] || 0) + 1;
                }
            });
            
            booking._assigned = assigned;
        });

        let html = '<div class="table-container"><table>';
        html += '<thead><tr><th>العميل</th><th>القاعة</th><th>التاريخ</th><th>الموظفين المعينين</th></tr></thead><tbody>';
        
        filteredBookings.forEach(booking => {
            const assignedNames = (booking._assigned || []).map(id => {
                const emp = allEmployees[id];
                return emp ? `<span class="badge badge-info" style="margin:2px;">${emp.name} (${emp.role})</span>` : '';
            }).join(' ');
            
            html += `
                <tr>
                    <td><strong>${booking.clientName}</strong></td>
                    <td>${booking.hallName}</td>
                    <td>${booking.date}</td>
                    <td>${assignedNames || '<span class="badge badge-warning">لم يتم التعيين</span>'}</td>
                </tr>`;
        });
        
        html += '</tbody></table></div>';
        document.getElementById('distPreview').innerHTML = html || '<p class="alert alert-info">لا توجد نتائج</p>';
    }

            const assignedText = row.querySelector('td:last-child')?.textContent || '';
            // استخراج أسماء الموظفين من النص
            const empIds = [];
            for (let [id, emp] of Object.entries(allEmployees)) {
                if (assignedText.includes(emp.name)) {
                    empIds.push(id);

            if (empIds.length > 0) {
                await update(ref(db, `bookings/${bookingKey}`), {

    window.applyRotation = async () => {
        const roles = ['مخرج', 'مصور', 'كرين'];
        
        for (let role of roles) {
            const roleEmployees = Object.entries(allEmployees)
                .filter(([k, v]) => v.role === role && v.active)
                .map(([k, v]) => ({key: k, ...v}));
            
            if (roleEmployees.length > 1) {
                // تدوير الترتيب
                const first = roleEmployees[0];
                for (let i = 0; i < roleEmployees.length - 1; i++) {
                    roleEmployees[i] = roleEmployees[i + 1];
                }
                roleEmployees[roleEmployees.length - 1] = first;
            }
        }
        
        await set(ref(db, 'rotationSchedule'), {
            lastUpdate: new Date().toISOString(),
            rotationCount: ((await get(ref(db, 'rotationSchedule'))).val()?.rotationCount || 0) + 1
        });
        
        await renderRotation(document.getElementById('admin-content'));
        alert('✅ تم تطبيق التدوير بنجاح');
    };

    window.importExcel = async () => {
        const file = document.getElementById('fileInput').files[0];
        if (!file) {
            alert('❌ الرجاء اختيار ملف');
            return;
        }

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                
                let successCount = 0;
                let errorCount = 0;

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length < 3) continue;

                    const [serial, dateRaw, day, clientName = 'عميل', packageType = '', guests = 0] = row;
                    let dateStr = '';

                    if (dateRaw) {
                        if (typeof dateRaw === 'number') {
                            const d = XLSX.SSF.parse_date_code(dateRaw);
                            dateStr = `${d.y}-${String(d.m).padStart(2, '0')}-${String(d.d).padStart(2, '0')}`;
                        } else {
                            const parsed = new Date(dateRaw);
                            if (!isNaN(parsed.getTime())) {
                                dateStr = parsed.toISOString().split('T')[0];
                            }
                        }
                    }

                    if (!dateStr) {
                        errorCount++;
                        continue;
                    }

                    await push(ref(db, 'bookings'), {
                        serial: String(serial || ''),
                        clientName: String(clientName),
                        date: dateStr,
                        phone: '',
                        hallName: '',
                        price: 0,
                        deposit: 0,
                        status: 'pending',
                        assignedEmployees: [],
                        notes: `باكدج: ${packageType} | عدد الأفراد: ${guests}`
                    });
                    successCount++;
                }

                document.getElementById('importResult').innerHTML = `
                    <div class="alert alert-success">
                        ✅ تم استيراد ${successCount} حجز بنجاح
                        ${errorCount > 0 ? `<br>❌ فشل استيراد ${errorCount} صف` : ''}
                    </div>`;
                
                await initializeAppData();
                await loadAdminStats();
            } catch (error) {
                document.getElementById('importResult').innerHTML = `
                    <div class="alert alert-danger">❌ خطأ في قراءة الملف: ${error.message}</div>`;
            }
        };
        reader.readAsArrayBuffer(file);
    };

        const today = new Date().toISOString().split('T')[0];
        let sentCount = 0;

            if (booking.date === today && booking.assignedEmployees) {

            version: '2.0'
        };

        const a = document.createElement('a');

                    <p>سعر الأوردر</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-calculator"></i>
                    <h3>${grossSalary} ج.م</h3>
                    <p>الإجمالي</p>
                </div>
            </div>
            
            <div class="card">
                <table>
                    <tr><td>إجمالي الأوردرات</td><td><strong>${grossSalary} ج.م</strong></td></tr>
                    <tr><td>إجمالي السلف</td><td style="color:var(--secondary);"><strong>${totalAdvance} ج.م</strong></td></tr>
                    <tr><td>إجمالي الخصومات</td><td style="color:var(--danger);"><strong>${totalDeductions} ج.م</strong></td></tr>
                    <tr style="background:rgba(255,0,255,0.05);">
                        <td><strong>صافي المستحق</strong></td>
                        <td><strong style="font-size:20px;">${netSalary} ج.م</strong></td>
                    </tr>
                </table>
            </div>`;
    }

    async function renderMyNotifications(container) {
        const notifSnap = await get(ref(db, 'notifications'));
        const notifications = notifSnap.val() || {};
        
        const myNotifs = Object.entries(notifications)
            .filter(([k, n]) => 
                n.target === 'all' || 
                n.employeeId === (currentUser?.employeeId || currentUser?.userId)
            )
            .sort(([, a], [, b]) => (b.sentAt || '').localeCompare(a.sentAt || ''))
            .slice(0, 20);
        
        let html = `<h3>الإشعارات (${myNotifs.length})</h3>`;
        
        if (myNotifs.length === 0) {
            html += '<p class="alert alert-info">لا توجد إشعارات</p>';
        } else {
            myNotifs.forEach(([key, notif]) => {
                html += `
                    <div class="card" style="margin:10px 0; padding:15px; ${notif.read ? 'opacity:0.7;' : ''}">
                        <p><strong>${notif.message}</strong></p>
                        <p style="font-size:12px; color:var(--text-light);">
                            ${new Date(notif.sentAt).toLocaleString('ar-EG')} - ${notif.sender}
                            ${!notif.read ? '<span class="badge badge-warning">جديد</span>' : ''}
                        </p>
                    </div>`;
            });
        }
        
        container.innerHTML = html;
    }

    // ============ بدء التشغيل ============
    if (!currentUser) {
        showScreen('login-screen');
    }
</script>
</body>
</html>
