<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Drmedia Pro Plus | النظام المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background 0.3s; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 40px; z-index: 10000; display: none; white-space: nowrap; }
        .toast.show { display: block; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1100; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content { background: white; border-radius: 24px; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 24px; }
        .dark .modal-content { background: #1e293b; color: #f1f5f9; }
        input, select, textarea { border: 1px solid #cbd5e1; border-radius: 12px; padding: 8px 12px; width: 100%; margin-bottom: 12px; background: white; }
        button { cursor: pointer; transition: 0.2s; }
        .tab-btn { padding: 8px 16px; border-radius: 12px 12px 0 0; font-weight: 600; }
        .tab-btn.active { background-color: #16a34a; color: white; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .btn-primary { background-color: #16a34a; color: white; padding: 8px 16px; border-radius: 12px; border: none; }
        .btn-primary:hover { background-color: #15803d; }
        .btn-secondary { background-color: #6b7280; color: white; padding: 8px 16px; border-radius: 12px; }
        .online-status { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-left: 8px; }
        .online { background-color: #22c55e; box-shadow: 0 0 4px #22c55e; }
        .offline { background-color: #ef4444; box-shadow: 0 0 4px #ef4444; }
    </style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>
<div id="app"></div>

<script>
// ======================== البيانات الأساسية ========================
let users = [
    { username: 'ahmed', password: '1994', role: 'admin', name: 'مدير النظام', employeeId: null },
    { username: 'ahmed_emp', password: 'emp123', role: 'employee', employeeId: 'emp1', name: 'أحمد علي' }
];
let bookings = [], employees = [], halls = [], clients = [], equipmentInventory = {}, attendanceRecords = [];
let currentUser = null, currentTab = 'dashboard';
let companyName = 'Drmedia Pro Plus', companyLogo = '📷';
let selectedBookings = new Set(), selectedEmployees = new Set(), selectedClients = new Set(), selectedEquipment = new Set();
let isOnline = navigator.onLine;

// تحديث حالة الاتصال
window.addEventListener('online', () => { isOnline = true; showMsg('✅ عاد الاتصال بالإنترنت', 'success'); if (currentUser?.role === 'admin') renderSystemUpdate(); });
window.addEventListener('offline', () => { isOnline = false; showMsg('⚠️ تم قطع الاتصال بالإنترنت - الوضع غير متصل', 'warning'); if (currentUser?.role === 'admin') renderSystemUpdate(); });

// دوال مساعدة
function showMsg(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}
function closeModal() { document.getElementById('modal').classList.remove('show'); document.body.style.overflow = ''; }
function openModal(content) { document.getElementById('modalContent').innerHTML = content; document.getElementById('modal').classList.add('show'); document.body.style.overflow = 'hidden'; }

function saveAllData() {
    const data = { bookings, employees, halls, clients, equipmentInventory, attendanceRecords, users, companyName, companyLogo };
    localStorage.setItem('drmedia_data', JSON.stringify(data));
}
function loadAllData() {
    const raw = localStorage.getItem('drmedia_data');
    if (raw) {
        const data = JSON.parse(raw);
        bookings = data.bookings || []; employees = data.employees || []; halls = data.halls || []; clients = data.clients || [];
        equipmentInventory = data.equipmentInventory || {}; attendanceRecords = data.attendanceRecords || [];
        users = data.users || users;
        companyName = data.companyName || companyName;
        companyLogo = data.companyLogo || companyLogo;
    } else {
        // بيانات أولية
        halls = [
            { id: 'h1', name: 'القاعة المغلقة', type: 'closed', active: true },
            { id: 'h2', name: 'القاعة المفتوحة', type: 'open', active: true },
            { id: 'h3', name: 'الكافيه', type: 'cafe', active: true }
        ];
        employees = [
            { id: 'emp1', name: 'أحمد علي', role: 'مخرج', phone: '01001234567', salaryPerOrder: 300, active: true, totalOrders: 0 },
            { id: 'emp2', name: 'محمود حسن', role: 'مصور', phone: '01002345678', salaryPerOrder: 200, active: true, totalOrders: 0 }
        ];
        bookings = [
            { id: 'b1', clientName: 'محمد عبدالله', phone: '01012345678', hallId: 'h1', hallName: 'القاعة المغلقة', date: new Date().toISOString().slice(0,10), price: 5000, status: 'pending', paymentStatus: 'pending', assignedEmployees: [] }
        ];
        clients = [{ id: 'c1', name: 'محمد عبدالله', phone: '01012345678', email: '' }];
        equipmentInventory = { eq1: { name: 'كاميرا Sony A7', quantity: 3, minStock: 1, category: 'تصوير' } };
        saveAllData();
    }
    updateEmployeeOrders();
}
function updateEmployeeOrders() {
    const active = bookings.filter(b => b.status !== 'cancelled');
    employees.forEach(e => e.totalOrders = active.filter(b => (b.assignedEmployees || []).includes(e.id)).length);
}

// ======================== دوال الحجوزات ========================
function toggleSelectBooking(id, checked) { checked ? selectedBookings.add(id) : selectedBookings.delete(id); renderBookings(); }
function selectAllBookings() {
    const ids = bookings.filter(b => b.status !== 'cancelled').map(b => b.id);
    selectedBookings.size === ids.length ? selectedBookings.clear() : ids.forEach(id => selectedBookings.add(id));
    renderBookings();
}
function bulkDeleteBookings() {
    if (!selectedBookings.size) return showMsg('⚠️ اختر حجوزات أولاً', 'warning');
    if (confirm(`حذف ${selectedBookings.size} حجز؟`)) {
        bookings = bookings.filter(b => !selectedBookings.has(b.id));
        selectedBookings.clear();
        saveAllData();
        renderBookings();
        showMsg('🗑️ تم الحذف الجماعي');
    }
}
function bulkCompleteBookings() {
    if (!selectedBookings.size) return showMsg('⚠️ اختر حجوزات أولاً', 'warning');
    if (confirm(`إكمال ${selectedBookings.size} حجز؟`)) {
        selectedBookings.forEach(id => { const b = bookings.find(x => x.id === id); if (b) { b.status = 'completed'; b.paymentStatus = 'paid'; } });
        selectedBookings.clear();
        saveAllData();
        renderBookings();
        showMsg('✅ تم إكمال المحدد');
    }
}
function showEditBookingModal(id) {
    const b = bookings.find(x => x.id === id);
    if (!b) return;
    openModal(`
        <h3 class="text-xl font-bold mb-4">✏️ تعديل الحجز</h3>
        <input id="editClientName" value="${b.clientName}" placeholder="اسم العميل">
        <input id="editPhone" value="${b.phone || ''}" placeholder="رقم الهاتف">
        <select id="editHallId">${halls.map(h => `<option value="${h.id}" ${b.hallId === h.id ? 'selected' : ''}>${h.name}</option>`).join('')}</select>
        <input type="date" id="editDate" value="${b.date}">
        <input type="number" id="editPrice" value="${b.price}" placeholder="السعر">
        <select id="editStatus"><option value="pending" ${b.status === 'pending' ? 'selected' : ''}>معلق</option><option value="completed" ${b.status === 'completed' ? 'selected' : ''}>مكتمل</option></select>
        <select id="editPayment"><option value="pending" ${b.paymentStatus === 'pending' ? 'selected' : ''}>معلق</option><option value="paid" ${b.paymentStatus === 'paid' ? 'selected' : ''}>مدفوع</option></select>
        <button onclick="saveEditBooking('${b.id}')" class="btn-primary w-full py-2 rounded-xl">حفظ</button>
    `);
}
function saveEditBooking(id) {
    const b = bookings.find(x => x.id === id);
    if (b) {
        b.clientName = document.getElementById('editClientName').value;
        b.phone = document.getElementById('editPhone').value;
        b.hallId = document.getElementById('editHallId').value;
        b.hallName = halls.find(h => h.id === b.hallId)?.name || b.hallName;
        b.date = document.getElementById('editDate').value;
        b.price = parseInt(document.getElementById('editPrice').value);
        b.status = document.getElementById('editStatus').value;
        b.paymentStatus = document.getElementById('editPayment').value;
        saveAllData();
        closeModal();
        renderBookings();
        showMsg('✅ تم التعديل');
    }
}
function addBooking() {
    const name = prompt('اسم العميل'), hallId = prompt('معرف القاعة (h1/h2/h3)'), price = parseInt(prompt('السعر'));
    if (name && hallId && price) {
        const hall = halls.find(h => h.id === hallId);
        if (hall) {
            bookings.push({ id: 'b' + Date.now(), clientName: name, phone: '', hallId, hallName: hall.name, date: new Date().toISOString().slice(0,10), price, status: 'pending', paymentStatus: 'pending', assignedEmployees: [] });
            saveAllData();
            renderBookings();
            showMsg('✅ تمت الإضافة');
        } else alert('قاعة غير موجودة');
    }
}
function markComplete(id) { const b = bookings.find(x => x.id === id); if (b) { b.status = 'completed'; b.paymentStatus = 'paid'; saveAllData(); renderBookings(); showMsg('✅ تم الإكمال'); } }
function deleteBooking(id) { if (confirm('حذف الحجز؟')) { bookings = bookings.filter(b => b.id !== id); saveAllData(); renderBookings(); showMsg('🗑️ تم الحذف'); } }
function renderBookings() {
    const filtered = bookings.filter(b => b.status !== 'cancelled');
    document.getElementById('bookings').innerHTML = `
        <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2"><h2 class="text-xl font-bold">📅 الحجوزات (${filtered.length})</h2><div class="flex gap-2"><button onclick="selectAllBookings()" class="bg-gray-500 text-white px-3 py-1 rounded text-sm">تحديد الكل</button><button onclick="bulkDeleteBookings()" class="bg-red-600 text-white px-3 py-1 rounded text-sm">حذف المحدد</button><button onclick="bulkCompleteBookings()" class="bg-green-600 text-white px-3 py-1 rounded text-sm">إكمال المحدد</button><button onclick="addBooking()" class="btn-primary px-3 py-1 rounded text-sm">+ حجز</button></div></div>
            <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr><th><input type="checkbox" id="selectAllBookingsCheck" onchange="selectAllBookings()"></th><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th><th>الحالة</th><th>الدفع</th><th></th></tr></thead><tbody>${filtered.map(b => `<tr><td class="p-2"><input type="checkbox" class="booking-check" value="${b.id}" ${selectedBookings.has(b.id) ? 'checked' : ''} onchange="toggleSelectBooking('${b.id}',this.checked)"></td><td class="p-2">${b.clientName}${b.phone ? `<br><span class="text-xs">${b.phone}</span>` : ''}</td><td class="p-2">${b.date}</td><td class="p-2">${b.hallName}</td><td class="p-2">${b.price.toLocaleString()} ج.م</td><td class="p-2"><span class="status-badge ${b.status === 'pending' ? 'status-pending' : 'status-completed'}">${b.status}</span></td><td class="p-2">${b.paymentStatus === 'paid' ? 'مدفوع' : 'معلق'}</td><td class="p-2"><button onclick="showEditBookingModal('${b.id}')" class="text-amber-600"><i class="fas fa-edit"></i></button> <button onclick="markComplete('${b.id}')" class="text-green-600"><i class="fas fa-check-circle"></i></button> <button onclick="deleteBooking('${b.id}')" class="text-red-600"><i class="fas fa-trash"></i></button></td>`).join('')}</tbody></table></div>
        </div>`;
}

// ======================== الموظفين ========================
function renderEmployees() {
    updateEmployeeOrders();
    document.getElementById('employees').innerHTML = `
        <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow">
            <h2 class="text-xl font-bold mb-4">👥 الموظفين</h2>
            <div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الاسم</th><th>الدور</th><th>الهاتف</th><th>الأوردرات</th><th>المستحق</th></tr></thead><tbody>${employees.map(e => `<td><td class="p-2">${e.name}</td><td class="p-2">${e.role}</td><td class="p-2">${e.phone}</td><td class="p-2">${e.totalOrders || 0}</td><td class="p-2 text-primary font-bold">${((e.totalOrders || 0) * e.salaryPerOrder).toLocaleString()} ج.م</td>`).join('')}</tbody></table></div>
        </div>`;
}

// ======================== العملاء ========================
function renderClients() {
    document.getElementById('clients').innerHTML = `
        <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow">
            <div class="flex justify-between mb-4"><h2 class="text-xl font-bold">👥 العملاء</h2><button onclick="addClient()" class="btn-primary px-3 py-1 rounded text-sm">+ عميل جديد</button></div>
            <div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الاسم</th><th>الهاتف</th><th>البريد</th><th>الحجوزات</th><th></th></tr></thead><tbody>${clients.map(c => `<tr><td class="p-2">${c.name}</td><td class="p-2">${c.phone}</td><td class="p-2">${c.email || '-'}</td><td class="p-2">${bookings.filter(b => b.phone === c.phone).length}</td><td class="p-2"><button onclick="deleteClient('${c.id}')" class="text-red-600"><i class="fas fa-trash"></i></button></td>`).join('')}</tbody></table></div>
        </div>`;
}
function addClient() { const name = prompt('الاسم'), phone = prompt('الهاتف'); if (name && phone) { clients.push({ id: 'c' + Date.now(), name, phone, email: '' }); saveAllData(); renderClients(); showMsg('✅ تمت الإضافة'); } }
function deleteClient(id) { if (confirm('حذف العميل؟')) { clients = clients.filter(c => c.id !== id); saveAllData(); renderClients(); showMsg('🗑️ تم الحذف'); } }

// ======================== المعدات ========================
function renderEquipment() {
    let items = '';
    for (let id in equipmentInventory) {
        const item = equipmentInventory[id];
        items += `<div class="border p-3 rounded-xl"><div><strong>${item.name}</strong> (${item.category})</div><div>الكمية: ${item.quantity} <span class="${item.quantity <= item.minStock ? 'text-red-500' : 'text-green-500'}">${item.quantity <= item.minStock ? '⚠️ منخفض' : 'متوفر'}</span></div><div><button onclick="adjustInventory('${id}',-1)" class="bg-gray-300 px-2 py-1 rounded">-</button> <button onclick="adjustInventory('${id}',1)" class="bg-gray-300 px-2 py-1 rounded">+</button></div></div>`;
    }
    document.getElementById('equipment').innerHTML = `
        <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow">
            <div class="flex justify-between mb-4"><h2 class="text-xl font-bold">📦 المعدات</h2><button onclick="addEquipment()" class="btn-primary px-3 py-1 rounded text-sm">+ معدة</button></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">${items}</div>
        </div>`;
}
function addEquipment() { const name = prompt('الاسم'), category = prompt('الفئة'), qty = parseInt(prompt('الكمية', '1')); if (name && qty) { const id = 'eq' + Date.now(); equipmentInventory[id] = { name, category, quantity: qty, minStock: 1 }; saveAllData(); renderEquipment(); showMsg('✅ تمت الإضافة'); } }
function adjustInventory(id, delta) { if (equipmentInventory[id]) { equipmentInventory[id].quantity = Math.max(0, equipmentInventory[id].quantity + delta); saveAllData(); renderEquipment(); showMsg('✅ تم التحديث'); } }

// ======================== الحضور والانصراف ========================
function getTodayDateStr() { return new Date().toISOString().slice(0, 10); }
function getTodayAttendance(empId) { return attendanceRecords.find(a => a.empId === empId && a.date === getTodayDateStr()); }
function checkIn(empId) {
    const today = getTodayDateStr();
    const existing = getTodayAttendance(empId);
    if (existing && existing.checkIn) return showMsg('⚠️ تم تسجيل الحضور مسبقاً', 'warning');
    const time = new Date().toLocaleTimeString('ar-EG');
    if (existing) { existing.checkIn = time; existing.status = 'present'; }
    else { attendanceRecords.push({ id: Date.now(), empId, date: today, checkIn: time, checkOut: null, status: 'present' }); }
    saveAllData(); renderAttendance(); showMsg(`✅ تم تسجيل حضور الساعة ${time}`);
}
function checkOut(empId) {
    const rec = getTodayAttendance(empId);
    if (!rec || !rec.checkIn) return showMsg('⚠️ لم يتم تسجيل الحضور بعد', 'warning');
    if (rec.checkOut) return showMsg('⚠️ تم تسجيل الانصراف مسبقاً', 'warning');
    rec.checkOut = new Date().toLocaleTimeString('ar-EG');
    saveAllData(); renderAttendance(); showMsg(`✅ تم تسجيل الانصراف الساعة ${rec.checkOut}`);
}
function showQrModal(empId, empName) {
    const qrData = `emp_attendance_${empId}`;
    openModal(`
        <h3 class="text-xl font-bold mb-4">📱 مسح QR للحضور/الانصراف</h3>
        <p>الموظف: <strong>${empName}</strong></p>
        <div id="qrCode" class="flex justify-center my-4"></div>
        <div class="flex gap-2 mt-4"><button onclick="checkIn('${empId}');closeModal();" class="btn-primary px-4 py-2 rounded">تسجيل حضور</button><button onclick="checkOut('${empId}');closeModal();" class="bg-amber-600 text-white px-4 py-2 rounded">تسجيل انصراف</button></div>
    `);
    setTimeout(() => { new QRCode(document.getElementById("qrCode"), { text: qrData, width: 200, height: 200 }); }, 100);
}
function renderAttendance() {
    const emp = employees.find(e => e.id === currentUser?.employeeId);
    const todayRec = emp ? getTodayAttendance(emp.id) : null;
    const myAttendance = attendanceRecords.filter(a => a.empId === emp?.id).sort((a, b) => b.date.localeCompare(a.date));
    document.getElementById('attendance').innerHTML = `
        <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow">
            <h2 class="text-xl font-bold mb-4">📋 الحضور والانصراف</h2>
            ${currentUser?.role === 'employee' ? `
                <div class="mb-6 p-4 border rounded-xl bg-green-50">
                    <div class="flex gap-3 items-center"><button onclick="showQrModal('${emp.id}','${emp.name}')" class="btn-primary px-3 py-1 rounded text-sm">📱 عرض QR</button><div class="flex gap-2"><button onclick="checkIn('${emp.id}')" class="btn-primary px-4 py-2 rounded">حضور</button><button onclick="checkOut('${emp.id}')" class="bg-amber-600 text-white px-4 py-2 rounded">انصراف</button></div></div>
                    <div class="mt-2">حالة اليوم: ${todayRec ? (todayRec.checkOut ? '✅ تم الحضور والانصراف' : '🟢 تم الحضور فقط') : '❌ لم يتم التسجيل'}</div>
                </div>
            ` : ''}
            <h3 class="font-bold mt-4">سجل الحضور السابق</h3>
            <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr><th>التاريخ</th><th>الحضور</th><th>الانصراف</th></tr></thead><tbody>${myAttendance.map(a => `<tr><td class="p-2">${a.date}</td><td class="p-2">${a.checkIn || '-'}</td><td class="p-2">${a.checkOut || '-'}</td></tr>`).join('') || '<tr><td colspan="3" class="text-center">لا توجد سجلات</td>`}</tbody></table></div>
        </div>`;
}

// ======================== تحديث النظام (Online/Offline) ========================
let lastUpdateCheck = null;
function checkForUpdates() {
    if (!isOnline) {
        showMsg('⚠️ لا يوجد اتصال بالإنترنت - لا يمكن التحقق من التحديثات', 'error');
        return;
    }
    showMsg('🔍 جاري التحقق من وجود تحديثات...', 'warning');
    setTimeout(() => {
        lastUpdateCheck = new Date().toLocaleString('ar-EG');
        const hasUpdate = Math.random() > 0.5; // محاكاة وجود تحديث
        if (hasUpdate) {
            showMsg('✨ يتوفر تحديث جديد للإصدار 2.0.0', 'success');
            document.getElementById('updateStatus').innerHTML = '<div class="text-green-600">✅ يتوفر تحديث جديد (الإصدار 2.0.0)</div>';
            document.getElementById('downloadUpdateBtn').classList.remove('hidden');
        } else {
            showMsg('✅ نظامك محدث بأحدث إصدار', 'success');
            document.getElementById('updateStatus').innerHTML = '<div class="text-green-600">✅ نظامك محدث بأحدث إصدار</div>';
            document.getElementById('downloadUpdateBtn').classList.add('hidden');
        }
        document.getElementById('lastUpdateTime').innerHTML = `آخر تحقق: ${lastUpdateCheck}`;
        renderSystemUpdate();
    }, 1500);
}
function downloadUpdate() {
    showMsg('📥 جاري تنزيل التحديث... (محاكاة)', 'warning');
    setTimeout(() => {
        showMsg('✅ تم تنزيل التحديث بنجاح. سيتم إعادة تشغيل النظام.', 'success');
        setTimeout(() => location.reload(), 2000);
    }, 2000);
}
function renderSystemUpdate() {
    document.getElementById('systemUpdate').innerHTML = `
        <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow">
            <h2 class="text-xl font-bold mb-4">🔄 تحديث النظام</h2>
            <div class="mb-4 flex items-center"><span class="online-status ${isOnline ? 'online' : 'offline'}"></span><span>${isOnline ? 'متصل بالإنترنت' : 'غير متصل (وضع غير متصل)'}</span></div>
            <div class="mb-4">الإصدار الحالي: <strong>v1.5.0</strong></div>
            <div id="updateStatus" class="mb-3"></div>
            <div id="lastUpdateTime" class="text-sm text-gray-500 mb-3">${lastUpdateCheck ? `آخر تحقق: ${lastUpdateCheck}` : 'لم يتم التحقق بعد'}</div>
            <button onclick="checkForUpdates()" class="btn-primary w-full mb-2" ${!isOnline ? 'disabled style="opacity:0.5;"' : ''}>🔍 التحقق من التحديثات</button>
            <button id="downloadUpdateBtn" onclick="downloadUpdate()" class="btn-primary w-full hidden">📥 تنزيل التحديث وتطبيقه</button>
            <div class="text-xs text-gray-400 mt-4">ملاحظة: هذا النظام يعمل في وضع عدم الاتصال (offline-first). يتم حفظ البيانات محلياً. عند وجود تحديث، سيتم تنزيله وتثبيته تلقائياً.</div>
        </div>`;
}

// ======================== الإعدادات ========================
function renderSettings() {
    document.getElementById('settings').innerHTML = `
        <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow">
            <h2 class="text-xl font-bold mb-4">⚙️ الإعدادات</h2>
            <div class="mb-4"><label>🏢 اسم الشركة</label><input type="text" id="companyNameInput" value="${companyName}" class="w-full"></div>
            <div class="mb-4"><label>🖼️ شعار (نص)</label><input type="text" id="companyLogoInput" value="${companyLogo}" class="w-full"></div>
            <button onclick="updateCompanySettings()" class="btn-primary w-full py-2 rounded">💾 حفظ الإعدادات</button>
            <hr class="my-4">
            <button onclick="resetData()" class="bg-red-700 text-white w-full py-2 rounded-xl">⚠️ إعادة ضبط كل البيانات (مسح كامل)</button>
        </div>`;
}
function updateCompanySettings() {
    companyName = document.getElementById('companyNameInput').value;
    companyLogo = document.getElementById('companyLogoInput').value;
    saveAllData();
    showMsg('✅ تم حفظ الإعدادات');
    if (currentUser?.role === 'admin') renderAdminDashboard();
}
function resetData() {
    if (confirm('⚠️ سيتم مسح كل البيانات! هل أنت متأكد؟')) {
        localStorage.clear();
        location.reload();
    }
}

// ======================== واجهة المدير ========================
function renderAdminDashboard() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-gray-100 dark:bg-gray-900">
            <header class="bg-white dark:bg-gray-800 shadow p-3 flex justify-between items-center sticky top-0 z-50"><h1 class="text-xl font-bold text-primary">${companyLogo} ${companyName}</h1><div><span class="text-sm">👤 ${currentUser.name}</span><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded-lg text-sm ml-2">خروج</button></div></header>
            <div class="flex overflow-x-auto border-b bg-white dark:bg-gray-800 px-2 sticky top-12 z-40">
                ${['dashboard', 'bookings', 'employees', 'halls', 'clients', 'equipment', 'attendance', 'systemUpdate', 'settings'].map(tab => `<button data-tab="${tab}" class="tab-btn px-4 py-2 rounded-t-lg">${tab === 'dashboard' ? '📊 الرئيسية' : tab === 'bookings' ? '📅 الحجوزات' : tab === 'employees' ? '👥 الموظفين' : tab === 'halls' ? '🏛️ القاعات' : tab === 'clients' ? '👥 العملاء' : tab === 'equipment' ? '📦 المعدات' : tab === 'attendance' ? '📋 الحضور' : tab === 'systemUpdate' ? '🔄 تحديث النظام' : '⚙️ الإعدادات'}</button>`).join('')}
            </div>
            <main class="p-4 max-w-7xl mx-auto">
                <div id="dashboard" class="tab-pane"><div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">📊 لوحة التحكم</h2><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="bg-green-50 p-4 rounded-xl">إجمالي الحجوزات: ${bookings.filter(b => b.status !== 'cancelled').length}</div><div class="bg-blue-50 p-4 rounded-xl">الموظفين: ${employees.length}</div><div class="bg-purple-50 p-4 rounded-xl">العملاء: ${clients.length}</div></div><button onclick="addBooking()" class="btn-primary mt-4">+ حجز جديد</button></div></div>
                <div id="bookings" class="tab-pane hidden"></div>
                <div id="employees" class="tab-pane hidden"></div>
                <div id="halls" class="tab-pane hidden"><div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">🏛️ القاعات</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الاسم</th><th>النوع</th><th>الحالة</th><th>الحجوزات</th></tr></thead><tbody>${halls.map(h => `<tr><td class="p-2">${h.name}</td><td class="p-2">${h.type}</td><td class="p-2">${h.active ? '✅ نشطة' : '❌ غير نشطة'}</td><td class="p-2">${bookings.filter(b => b.hallId === h.id && b.status !== 'cancelled').length}</td></table>`).join('')}</tbody></table></div></div></div>
                <div id="clients" class="tab-pane hidden"></div>
                <div id="equipment" class="tab-pane hidden"></div>
                <div id="attendance" class="tab-pane hidden"></div>
                <div id="systemUpdate" class="tab-pane hidden"></div>
                <div id="settings" class="tab-pane hidden"></div>
            </main>
        </div>`;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
        document.getElementById(currentTab).classList.remove('hidden');
        if (currentTab === 'bookings') renderBookings();
        if (currentTab === 'employees') renderEmployees();
        if (currentTab === 'clients') renderClients();
        if (currentTab === 'equipment') renderEquipment();
        if (currentTab === 'attendance') renderAttendance();
        if (currentTab === 'systemUpdate') renderSystemUpdate();
        if (currentTab === 'settings') renderSettings();
    }));
    renderBookings(); renderEmployees(); renderClients(); renderEquipment(); renderAttendance(); renderSystemUpdate(); renderSettings();
}

function renderEmployeeDashboard() {
    const emp = employees.find(e => e.id === currentUser.employeeId);
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-gray-100"><header class="bg-white p-3 flex justify-between"><h1 class="text-xl font-bold">${companyLogo} ${companyName}</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header>
        <main class="p-4 max-w-md mx-auto"><div class="bg-white p-5 rounded-xl shadow"><h2 class="text-2xl font-bold">مرحباً ${emp?.name}</h2><div class="grid grid-cols-2 gap-3 mt-4"><div><div class="text-3xl font-bold text-emerald-600">${emp?.totalOrders || 0}</div><div>أوردرات</div></div><div><div class="text-3xl font-bold text-blue-600">${((emp?.totalOrders || 0) * (emp?.salaryPerOrder || 0)).toLocaleString()} ج.م</div><div>المستحق</div></div></div><button onclick="showQrModal('${emp?.id}','${emp?.name}')" class="btn-primary w-full mt-4">📋 تسجيل الحضور QR</button><button onclick="currentTab='attendance';renderAdminDashboard();renderAttendance();" class="btn-primary w-full mt-2">📋 عرض الحضور</button></div></main></div>`;
}

function showLogin() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700 p-4">
            <div class="bg-white p-6 rounded-2xl w-full max-w-md text-center shadow-2xl">
                <h1 class="text-3xl font-bold text-emerald-700 mb-2">${companyLogo} ${companyName}</h1>
                <p class="text-gray-500 mb-6">نظام إدارة القاعات الذكي</p>
                <input type="text" id="loginUser" placeholder="اسم المستخدم" class="w-full border p-3 rounded-xl mb-3">
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full border p-3 rounded-xl mb-2">
                <button onclick="doLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">دخول</button>
                <div class="mt-4 text-sm text-gray-400"><p>المدير: <strong>ahmed</strong> / <strong>1994</strong></p><p>الموظف: <strong>ahmed_emp</strong> / <strong>emp123</strong></p></div>
            </div>
        </div>`;
}
function doLogin() {
    const un = document.getElementById('loginUser').value.trim();
    const pw = document.getElementById('loginPass').value;
    const user = users.find(u => u.username === un && u.password === pw);
    if (user) {
        currentUser = user;
        sessionStorage.setItem('drmedia_user', JSON.stringify(user));
        if (user.role === 'admin') renderAdminDashboard();
        else renderEmployeeDashboard();
        showMsg(`مرحباً ${user.name}`);
    } else {
        showMsg('❌ اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
    }
}
function logout() {
    sessionStorage.removeItem('drmedia_user');
    currentUser = null;
    showLogin();
    showMsg('👋 تم تسجيل الخروج');
}
loadAllData();
const saved = sessionStorage.getItem('drmedia_user');
if (saved) {
    currentUser = JSON.parse(saved);
    if (currentUser.role === 'admin') renderAdminDashboard();
    else renderEmployeeDashboard();
} else {
    showLogin();
}
</script>
</body>
</html>
