<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Media ERP SaaS v9 AI Enterprise | Ahmed Shreif</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>
body{font-family:Tahoma;background:#0b1220;color:#e5e7eb}
header{background:#0f172a;padding:12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0}
.container{max-width:1200px;margin:auto;padding:15px}
.card{background:#111827;border:1px solid #1f2937;padding:12px;border-radius:12px;margin-bottom:10px}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:10px;background:#0b1220;color:#fff;border:1px solid #374151}
button{padding:10px;border-radius:10px;cursor:pointer}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.hidden{display:none}
.badge{padding:3px 8px;border-radius:999px;background:#1f2937;font-size:12px}
</style>
</head>
<body>

<header>
<h3>Dr Media ERP v9 Enterprise AI</h3>
<div class="badge">Built by Ahmed Shreif</div>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login</h3>
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<button onclick="login()" style="background:#16a34a;color:#fff;width:100%">Login</button>
<button onclick="register()" style="background:#2563eb;color:#fff;width:100%;margin-top:5px">Register</button>
</div>

<!-- APP -->
<div id="admin" class="hidden">

<div class="card">
<h3>Company</h3>
<select id="companySelect" onchange="switchCompany()"></select>
</div>

<div class="row">
<div class="card">Companies <h2 id="companyCount">0</h2></div>
<div class="card">Orders <h2 id="orderCount">0</h2></div>
<div class="card">Revenue <h2 id="income">0</h2></div>
<div class="card">AI Load <h2 id="aiScore">0%</h2></div>
</div>

<div class="card">
<h3>Add Order</h3>
<input id="client" placeholder="Client">
<input id="date" type="date">
<input id="price" placeholder="Price">
<select id="hall">
<option value="closed">Closed</option>
<option value="open">Open</option>
<option value="cafe">Cafe</option>
</select>
<button onclick="addOrder()" style="background:#2563eb;color:#fff;width:100%">Add</button>
</div>

<div class="card">
<h3>Notifications</h3>
<div id="notifBox"></div>
</div>

<div class="card">
<h3>Swap Requests</h3>
<div id="swapBox"></div>
</div>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyApb4Nl_ktkVCkuz7DsT9uhmQ",
authDomain:"drmedia-vpms.firebaseapp.com",
databaseURL:"https://drmedia-vpms-default-rtdb.firebaseio.com",
projectId:"drmedia-vpms"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const auth=firebase.auth();

let orders=[];
let companies=[];
let notifications=[];
let swaps=[];
let currentUser=null;
let currentCompany=null;

function el(id){return document.getElementById(id);}

// LOGIN SAFE FIX
function login(){
const email=el("email").value;
const pass=el("pass").value;
auth.signInWithEmailAndPassword(email,pass)
.catch(e=>alert(e.message));
}

function register(){
const email=el("email").value;
const pass=el("pass").value;
auth.createUserWithEmailAndPassword(email,pass);
}

function switchCompany(){
currentCompany=el("companySelect").value;
render();
}

function addOrder(){
orders.push({
id:Date.now(),
client:el("client").value,
date:el("date").value,
price:+el("price").value||0,
hall:el("hall").value,
companyId:currentCompany
});
db.ref("orders").set(orders);
render();
}

// SWAP SYSTEM
function requestSwap(orderId){
swaps.push({id:Date.now(),orderId,user:currentUser.email,status:"pending"});
db.ref("swaps").set(swaps);
render();
}

function approveSwap(id){
let s=swaps.find(x=>x.id==id);
if(s) s.status="approved";
db.ref("swaps").set(swaps);
render();
}

function load(){

let uid=currentUser.uid;

db.ref("companies").on("value",s=>{
companies=[];
s.forEach(x=>companies.push(x.val()));
if(companies.length===0){
companies=[{id:"c1",name:"Dr Media Production"}];
db.ref("companies").set(companies);
}
render();
});

db.ref("orders").on("value",s=>{
orders=[];
s.forEach(x=>orders.push(x.val()));
render();
});

db.ref("notifications").on("value",s=>{
notifications=[];
s.forEach(x=>notifications.push(x.val()));
render();
});

db.ref("swaps").on("value",s=>{
swaps=[];
s.forEach(x=>swaps.push(x.val()));
render();
});
}

function render(){
if(!currentUser)return;

el("loginBox").classList.add("hidden");
el("admin").classList.remove("hidden");

const filtered=orders.filter(o=>o.companyId===currentCompany);

el("companyCount").innerText=companies.length;
el("orderCount").innerText=filtered.length;
el("income").innerText=filtered.reduce((s,o)=>s+(o.price||0),0);
el("aiScore").innerText=Math.min(100,filtered.length*12)+"%";

el("notifBox").innerHTML=notifications.map(n=>`<div class='card'>${n.msg}</div>`).join("");

el("swapBox").innerHTML=swaps.map(s=>`
<div class='card'>
Swap Request - ${s.status}
<button onclick="approveSwap(${s.id})">Approve</button>
</div>
`).join("");
}

auth.onAuthStateChanged(u=>{
if(u){currentUser=u;load();}
});

</script>

</body>
</html>
