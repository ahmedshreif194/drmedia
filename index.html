<script>
// ========== IndexedDB ==========
const DB_NAME = 'drmedia-db', STORE_NAME = 'appData';
function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}
async function saveToIDB(data) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put({ id: 'global', ...data });
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}
async function loadFromIDB() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.get('global');
        request.onsuccess = () => {
            const result = request.result;
            if (result) {
                const { id, ...data } = result;
                resolve(data);
            } else resolve(null);
        };
        request.onerror = () => reject(request.error);
    });
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
function showMsg(msg) {
    const t = document.createElement('div');
    t.className = 'toast show'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
function openModal(content) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal">${content}</div>`;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
}
function closeModal() {
    const overlay = document.querySelector('.modal-overlay');
    if (overlay) overlay.remove();
}
function filterData(list, fields, term) {
    if (!term) return list;
    const low = term.toLowerCase();
    return list.filter(item => fields.some(f => String(item[f] || '').toLowerCase().includes(low)));
}

async function saveAllData() {
    const data = { bookings, employees, halls, clients, attendanceRecords, payrollArchive, employeeLoans, notifications, trashBin, companyName, companyLogo, USERS, rotationCounters, whatsappEnabled, whatsappBusinessNumber, whatsappMessageTemplate, appTheme, appLanguage };
    localStorage.setItem('drmedia_data', JSON.stringify(data));
    await saveToIDB(data);
    if (fbDb) fbDb.ref('/').set(data).catch(()=>{});
}
async function loadAllData() {
    let data = null;
    try { data = await loadFromIDB(); } catch(e) {}
    if (!data) {
        const local = localStorage.getItem('drmedia_data');
        if (local) data = JSON.parse(local);
    }
    if (fbDb) {
        try {
            const snap = await fbDb.ref('/').get();
            if (snap.exists()) data = snap.val();
        } catch(e) {}
    }
    if (data) {
        bookings = data.bookings || []; employees = data.employees || []; halls = data.halls || []; clients = data.clients || [];

        trashBin = data.trashBin || []; companyName = data.companyName || 'Drmedia Pro'; companyLogo = data.companyLogo || '📸';
        USERS = data.USERS || USERS; rotationCounters = data.rotationCounters || { dir:0, ph:0, cr:0 };
        whatsappEnabled = data.whatsappEnabled !== undefined ? data.whatsappEnabled : true;

    ];
    if (!clients.length) clients = [{ id:'c1', name:'عميل تجريبي', phone:'01012345678' }];
    updateEmployeeOrders();
}
function updateEmployeeOrders() {
    employees.forEach(emp => {
        let count = 0;
        bookings.forEach(b => {
            if (!b.deleted && b.status !== 'cancelled' && (b.assignedEmployees || []).includes(emp.id)) {
                const attended = attendanceRecords.some(a => a.empId === emp.id && a.date === b.date && a.checkIn);
                if (attended) count++;
            }
        });
        emp.totalOrders = count;
    });
}

// ========== Keyboard Shortcuts ==========
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    if (e.ctrlKey && e.shiftKey) {
        e.preventDefault();
        if (e.key === 'D') navigate('dashboard');
        else if (e.key === 'B') navigate('bookings');
        else if (e.key === 'E') navigate('employees');
        else if (e.key === 'N') { navigate('bookings'); setTimeout(() => showAddBookingModal(), 100); }
        else if (e.key === 'F') document.getElementById('globalSearch')?.focus();
    }
});

// ========== Theme ==========
function applyTheme(theme) {
    appTheme = theme;
    document.body.className = '';
    if (theme === 'dark') document.body.classList.add('theme-dark');
    else if (theme === 'blue') document.body.classList.add('theme-blue');
    else if (theme === 'green') document.body.classList.add('theme-green');
    localStorage.setItem('appTheme', theme);
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const u = document.getElementById('loginUsername').value.trim();
    const p = document.getElementById('loginPassword').value;
    const user = USERS.find(x => x.username === u && x.password == p);
    if (!user) {
        document.getElementById('loginError').classList.remove('hidden');
        document.getElementById('loginError').textContent = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
        return;
    }
    document.getElementById('loginError').classList.add('hidden');
    currentUser = { ...user };
    if (user.employeeId) {
        const emp = employees.find(e => e.id === user.employeeId);
        if (emp) currentUser = { ...currentUser, ...emp, id: emp.id };
    }
    localStorage.setItem('drmedia_session', JSON.stringify(currentUser));
    await loadAllData();
    document.getElementById('loginScreen').classList.remove('active');
    if (currentUser.role === 'admin') {
        document.getElementById('adminNav').style.display = '';
        document.getElementById('empNav').style.display = 'none';
        document.getElementById('adminScreen').classList.add('active');
        document.getElementById('sidebarName').textContent = currentUser.name || 'مدير';
        document.getElementById('sidebarRole').textContent = 'ADMIN';
        navigate('dashboard');
    } else {
        document.getElementById('adminNav').style.display = 'none';
        document.getElementById('empNav').style.display = '';
        document.getElementById('empScreen').classList.add('active');
        document.getElementById('sidebarName').textContent = currentUser.name || 'موظف';
        document.getElementById('sidebarRole').textContent = 'EMPLOYEE';
        navigateEmp('attendance');
    }
});

// ========== WhatsApp ==========
function sendWhatsApp(phone, message) {
    if (!whatsappEnabled) return;
    let clean = phone.replace(/[^0-9+]/g, '');
    if (clean.startsWith('0')) clean = '2' + clean;
    if (!clean.startsWith('+')) clean = '+' + clean;
    window.open(`https://wa.me/${clean}?text=${encodeURIComponent(message)}`, '_blank');
}
function notifyEmployee(emp, title, body, sendWA = true) {
    notifications.unshift({ id: Date.now(), title, body, date: new Date().toLocaleString(), recipient: emp.id, read: false });
    if (sendWA && emp.phone) sendWhatsApp(emp.phone, `${title}\n${body}`);
    saveAllData();
}

    const pending = bookings.filter(b=>b.status==='pending' && !b.deleted);
    if(!pending.length) return showMsg('لا توجد حجوزات معلقة');
    autoDistributeBookings(pending);
    navigate('bookings'); showMsg('✅ تم التوزيع الذكي');
}
function autoDistributeBookings(bookingList) {
    const dirs = employees.filter(e=>e.role==='مخرج'&&e.active);
    const phs = employees.filter(e=>e.role==='مصور'&&e.active);
    const crs = employees.filter(e=>e.role==='كرين'&&e.active);
    let di=rotationCounters.dir, pi=rotationCounters.ph, ci=rotationCounters.cr;
    const daily = {};
    bookingList.forEach(b => {
        const date = b.date;
        if(!daily[date]) daily[date] = {dir:new Set(), ph:new Set(), cr:new Set()};
        const type = halls.find(h=>h.id===b.hallId)?.type || (b.hallName==='الكافيه'?'cafe':'closed');
        let assigned = [];
        if(type==='cafe') {
            if(phs.length) {
                while(daily[date].ph.has(phs[pi%phs.length].id)) pi++;
                assigned.push(phs[pi%phs.length].id);
                daily[date].ph.add(phs[pi%phs.length].id); pi++;
            }
        } else {
            if(dirs.length) {
                while(daily[date].dir.has(dirs[di%dirs.length].id)) di++;
                assigned.push(dirs[di%dirs.length].id);
                daily[date].dir.add(dirs[di%dirs.length].id); di++;
            }
            if(phs.length) {
                let added=0;
                for(let i=0; i<phs.length*2 && added<2; i++) {
                    while(daily[date].ph.has(phs[pi%phs.length].id)) pi++;
                    const p = phs[pi%phs.length];
                    if(!daily[date].ph.has(p.id)) { assigned.push(p.id); daily[date].ph.add(p.id); added++; } pi++;
                }
            }
            if(crs.length) {
                while(daily[date].cr.has(crs[ci%crs.length].id)) ci++;
                assigned.push(crs[ci%crs.length].id);
                daily[date].cr.add(crs[ci%crs.length].id); ci++;
            }
        }
        b.assignedEmployees = assigned; b.status = 'confirmed';
        assigned.forEach(empId => {
            const emp = employees.find(e=>e.id===empId);
            if(emp) notifyEmployee(emp, '📋 أوردر جديد', `تم تعيينك لـ ${b.clientName} في ${b.date} ${b.hallName}`, true);
        });
    });
    rotationCounters = {dir:di, ph:pi, cr:ci};
    updateEmployeeOrders(); saveAllData();
}

function renderPayroll(c) {
    let rows = '';
    employees.forEach(e => {
        const gross = (e.totalOrders||0)*(e.salaryPerOrder||0);
        const net = gross - (e.totalDeductions||0);
        rows += `<tr><td><strong>${e.name}</strong></td><td>${e.role}</td><td>${e.totalOrders||0}</td><td>${e.salaryPerOrder||0} ج.م</td><td>${gross} ج.م</td><td style="color:var(--success)">${e.totalAdvance||0} ج.م</td><td style="color:var(--danger)">${e.totalDeductions||0} ج.م</td><td><strong>${net} ج.م</strong></td><td><button class="btn btn-sm btn-success" onclick="paySalary('${e.id}')"><i class="fas fa-check"></i> صرف</button></td></tr>`;
    });
    c.innerHTML = `<div class="card"><div class="card-header"><h4><i class="fas fa-money-bill-wave"></i> المالية والمرتبات</h4></div>
    <div class="form-row"><div class="card"><h5>➕ سلفة</h5><select class="form-control" id="advEmp">${employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select><input class="form-control" type="number" id="advAmt" placeholder="المبلغ"><input class="form-control" id="advRsn" placeholder="السبب"><button class="btn btn-success btn-sm" onclick="addAdvance()">إضافة سلفة</button></div>
    <div class="card"><h5>➖ خصم</h5><select class="form-control" id="dedEmp">${employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select><input class="form-control" type="number" id="dedAmt" placeholder="المبلغ"><input class="form-control" id="dedRsn" placeholder="السبب"><button class="btn btn-danger btn-sm" onclick="addDeduction()">إضافة خصم</button></div></div>
    <div class="table-wrapper"><table><thead><tr><th>الموظف</th><th>الدور</th><th>أوردرات</th><th>سعر الأوردر</th><th>إجمالي</th><th>سلف</th><th>خصم</th><th>الصافي</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function addAdvance() {
    const id = document.getElementById('advEmp').value;
    const amt = +document.getElementById('advAmt').value||0;
    const rsn = document.getElementById('advRsn').value;
    if(amt<=0) return showMsg('أدخل مبلغاً صحيحاً');
    const emp = employees.find(e=>e.id===id);
    if(emp) emp.totalAdvance = (emp.totalAdvance||0) + amt;
    if(!employeeLoans[id]) employeeLoans[id] = [];
    employeeLoans[id].push({type:'advance', amount:amt, reason:rsn, date:new Date().toISOString().slice(0,10)});
    saveAllData(); navigate('payroll'); showMsg('تمت إضافة السلفة');
}
function addDeduction() {
    const id = document.getElementById('dedEmp').value;
    const amt = +document.getElementById('dedAmt').value||0;
    const rsn = document.getElementById('dedRsn').value;
    if(amt<=0) return showMsg('أدخل مبلغاً صحيحاً');
    const emp = employees.find(e=>e.id===id);
    if(emp) emp.totalDeductions = (emp.totalDeductions||0) + amt;
    if(!employeeLoans[id]) employeeLoans[id] = [];
    employeeLoans[id].push({type:'deduction', amount:amt, reason:rsn, date:new Date().toISOString().slice(0,10)});
    saveAllData(); navigate('payroll'); showMsg('تمت إضافة الخصم');
}
function paySalary(id) {
    const emp = employees.find(e=>e.id===id);
    if(!emp) return;
    const gross = (emp.totalOrders||0)*(emp.salaryPerOrder||0);
    const net = gross - (emp.totalDeductions||0);
    if(!confirm(`💵 صرف ${net} ج.م لـ ${emp.name}؟\n(سيتم تصفير الأوردرات والسلف/الخصم)`)) return;
    payrollArchive.push({id:generateId(), empId:emp.id, empName:emp.name, gross, deductions:emp.totalDeductions||0, net, date:new Date().toISOString().slice(0,10), paidAt:new Date().toISOString()});
    emp.totalOrders = 0; emp.totalAdvance = 0; emp.totalDeductions = 0;
    if(employeeLoans[id]) employeeLoans[id] = [];
    bookings.forEach(b => { if(b.assignedEmployees) b.assignedEmployees = b.assignedEmployees.filter(eid=>eid!==id); });
    saveAllData(); navigate('payroll'); showMsg(`تم صرف ${net} ج.م`);
    if(emp.phone) sendWhatsApp(emp.phone, `تم صرف راتبك ${net} ج.م`);
}

// ========== Import ==========
function renderImport(c) {
    c.innerHTML = `<div class="card"><div class="card-header"><h4><i class="fas fa-file-import"></i> استيراد Excel</h4></div><div class="alert alert-info">📋 ترتيب الأعمدة: A=مسلسل | B=اليوم | <strong>C=التاريخ</strong> | D=اسم العريس | E=الباكدج | F=الأفراد<br>⚠️ الصفوف "-" يتم تخطيها (أجازة)</div><input type="file" id="fileInput" accept=".xlsx,.xls" class="form-control" style="margin-bottom:10px;"><button class="btn btn-primary" onclick="importExcel()"><i class="fas fa-upload"></i> استيراد</button><div id="importResult"></div></div>`;
}
function importExcel() {
    const file = document.getElementById('fileInput').files[0];
    if(!file) return showMsg('اختر ملفاً');
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const wb = XLSX.read(e.target.result, {type:'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
            let success=0, skipped=0;
            for(let i=1; i<data.length; i++) {
                const r = data[i];
                if(!r||r.length<3||String(r[0]).includes('اجمال')) continue;
                const client = String(r[3]||'').trim();
                if(client==='-'||client==='') { skipped++; continue; }
                let dateStr = '';
                const rawDate = r[2];
                if(typeof rawDate==='number') { try { const d = XLSX.SSF.parse_date_code(rawDate); dateStr = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`; } catch(ex) {} }
                else if(typeof rawDate==='string') { const m = rawDate.match(/(\d{4}-\d{2}-\d{2})/); if(m) dateStr = m[1]; }
                if(!dateStr) continue;
                bookings.push({id:generateId(), clientName:client, phone:'', date:dateStr, hallName:'الأوبن', hallId:halls.find(h=>h.name==='الأوبن')?.id||'h2', price:0, deposit:0, status:'pending', assignedEmployees:[], notes:'', deleted:false});
                success++;
            }
            document.getElementById('importResult').innerHTML = `<div class="alert alert-success">✅ تم استيراد ${success} حجز</div>${skipped?`<div class="alert alert-warning">⏭️ تخطي ${skipped} يوم أجازة</div>`:''}`;
            saveAllData();
        } catch(ex) { document.getElementById('importResult').innerHTML = `<div class="alert alert-danger">❌ خطأ: ${ex.message}</div>`; }
    };
    reader.readAsArrayBuffer(file);
}

function renderEmpAttendance(c) {

let qrScanner;
function startEmpQR() {
    if (qrScanner) qrScanner.stop();
    qrScanner = new Html5Qrcode("qr-reader");
    qrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => { recordEmpAttendance(text); qrScanner.stop(); }, () => {}).catch(() => showMsg('الكاميرا غير متاحة'));
}
function manualEmpAtt() { recordEmpAttendance('manual'); }
function recordEmpAttendance(qrData) {
    const now = new Date();
    attendanceRecords.push({ id: generateId(), empId: currentUser.id || currentUser.employeeId, date: now.toISOString().slice(0,10), checkIn: now.toLocaleTimeString('ar-EG'), isLate: now.getHours() >= 9, qrData });
    saveAllData();
    document.getElementById('attEmpStatus').innerHTML = '<div class="alert alert-success">✅ تم تسجيل الحضور</div>';
}
function renderEmpOrders(c) {
    const myBookings = bookings.filter(b => !b.deleted && (b.assignedEmployees||[]).includes(currentUser.id || currentUser.employeeId));
    let rows = '';
    myBookings.forEach(b => rows += `<tr><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price||0}</td></tr>`);
    c.innerHTML = `<div class="card"><div class="card-header"><h4><i class="fas fa-list"></i> أوردراتي</h4></div><div class="table-wrapper"><table><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th></tr></thead><tbody>${rows||'<tr><td colspan="4">لا توجد أوردرات</td></tr>'}</tbody></table></div></div>`;
}
function renderEmpSalary(c) {
    const emp = employees.find(e => e.id === (currentUser.id || currentUser.employeeId)) || currentUser;
    const gross = (emp.totalOrders||0)*(emp.salaryPerOrder||0);
    const net = gross - (emp.totalDeductions||0);
    c.innerHTML = `<div class="card"><div class="card-header"><h4><i class="fas fa-money-bill"></i> مرتبي</h4></div><p>الأوردرات: ${emp.totalOrders||0}</p><p>سعر الأوردر: ${emp.salaryPerOrder||0} ج.م</p><p>الإجمالي: ${gross} ج.م</p><p>الصافي: ${net} ج.م</p></div>`;
}
function renderEmpNotifications(c) {
    const myNotifs = notifications.filter(n => n.recipient === (currentUser.id || currentUser.employeeId) || !n.recipient);
    let list = '';
    myNotifs.forEach(n => list += `<div class="card" style="padding:12px; margin:8px 0;"><strong>${n.title}</strong><br>${n.body}<br><small>${n.date}</small></div>`);
    c.innerHTML = `<div class="card"><div class="card-header"><h4><i class="fas fa-bell"></i> إشعاراتي</h4></div>${list||'<div class="alert alert-info">لا توجد إشعارات</div>'}</div>`;
}

// ========== PWA ==========
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => console.log('SW registered')).catch(() => {});
    });
}

// ========== Init ==========
(async function init() {
    const session = localStorage.getItem('drmedia_session');
    if (session) {
        currentUser = JSON.parse(session);
        await loadAllData();
        document.getElementById('loginScreen').classList.remove('active');
        if (currentUser.role === 'admin') {
            document.getElementById('adminNav').style.display = '';
            document.getElementById('adminScreen').classList.add('active');
            document.getElementById('sidebarName').textContent = currentUser.name || 'مدير';
            document.getElementById('sidebarRole').textContent = 'ADMIN';
            navigate('dashboard');
        } else {
            document.getElementById('empNav').style.display = '';
            document.getElementById('empScreen').classList.add('active');
            document.getElementById('sidebarName').textContent = currentUser.name || 'موظف';
            document.getElementById('sidebarRole').textContent = 'EMPLOYEE';
            navigateEmp('attendance');
        }
    }
    if (window.location.search.includes('att=1') && currentUser) {
        document.getElementById('adminScreen').classList.remove('active');
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('empScreen').classList.add('active');
        document.getElementById('adminNav').style.display = 'none';
        document.getElementById('empNav').style.display = '';
        renderEmpAttendance(document.getElementById('empContent'));
    }
})();
</script>
