<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drmedia Pro Plus</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
.btn-primary { background:#16a34a;color:#fff;padding:8px;border-radius:10px }
</style>
</head>

<body>

<div id="app"></div>

<script>

// ====== USERS ======
let users = [
 { username:'ahmed', password:'1994', role:'admin' }
];

let currentUser = null;


// ================= LOGIN =================
function renderLogin(){
 document.getElementById('app').innerHTML = `
 <div class="flex justify-center items-center h-screen bg-gray-100">
   <div class="bg-white p-6 rounded-xl shadow w-80">
     <h2 class="text-xl mb-4 text-center">🔐 تسجيل الدخول</h2>
     <input id="username" class="border p-2 w-full mb-2" placeholder="Username">
     <input id="password" type="password" class="border p-2 w-full mb-2" placeholder="Password">
     <button onclick="login()" class="btn-primary w-full">دخول</button>
   </div>
 </div>`;
}

function login(){
 const u = document.getElementById('username').value;
 const p = document.getElementById('password').value;

 const user = users.find(x=>x.username===u && x.password===p);

 if(!user){
   alert("بيانات غلط");
   return;
 }

 currentUser = user;
 renderApp();
}


// ================= APP =================
function renderApp(){
 document.getElementById('app').innerHTML = `
 <div class="p-5">
   <h1 class="text-2xl mb-4">🔥 Drmedia Pro Plus</h1>

   <button onclick="renderBookings()" class="btn-primary mb-2">الحجوزات</button>
   <button onclick="renderEmployees()" class="btn-primary mb-2">الموظفين</button>

   <div id="content"></div>
 </div>`;
}



// ================= BOOKINGS =================
let bookings = [
 { id:1, name:"عميل 1", date:"2026-04-29", price:5000 }
];

function renderBookings(){
 document.getElementById('content').innerHTML = `
 <table class="w-full border">
   <thead>
     <tr>
       <th>الاسم</th>
       <th>التاريخ</th>
       <th>السعر</th>
     </tr>
   </thead>
   <tbody>
   ${bookings.map(b=>`
     <tr>
       <td>${b.name}</td>
       <td>${b.date}</td>
       <td>${b.price}</td>
     </tr>
   `).join('')}
   </tbody>
 </table>
 `;
}



// ================= EMPLOYEES =================
let employees = [
 { id:1, name:"أحمد", role:"مصور" }
];

function renderEmployees(){
 document.getElementById('content').innerHTML = `
 <table class="w-full border">
   <thead>
     <tr>
       <th>الاسم</th>
       <th>الدور</th>
     </tr>
   </thead>
   <tbody>
   ${employees.map(e=>`
     <tr>
       <td>${e.name}</td>
       <td>${e.role}</td>
     </tr>
   `).join('')}
   </tbody>
 </table>
 `;
}



// ================= START =================
window.onload = function(){
 renderLogin();
};

</script>

</body>
</html>
