<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Drmedia Pro Plus | النظام المتكامل</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- SheetJS (Excel) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        /* تخصيصات بسيطة */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 12px 24px; border-radius: 40px; z-index: 9999; display: none; white-space: nowrap; }
        .toast.show { display: block; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .tab-btn.active { background-color: #16a34a; color: white; }
        .tab-btn { transition: all 0.2s; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content { background: white; border-radius: 24px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 20px; }
        .dark .modal-content { background: #1e293b; color: #f1f5f9; }
        input, select, textarea { border: 1px solid #cbd5e1; border-radius: 12px; padding: 8px 12px; width: 100%; margin-bottom: 12px; }
        .dark input, .dark select, .dark textarea { background: #334155; border-color: #475569; color: white; }
        button { cursor: pointer; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>
<div id="modal" class="modal">
    <div class="modal-content" id="modalContent"></div>
</div>
<div id="app"></div>

<script>
    // ----------------------------- data / state -----------------------------
    let users = [
        { username: 'ahmed', password: '1994', role: 'admin', name: 'مدير النظام' },
        { username: 'ahmed_emp', password: 'emp123', role: 'employee', employeeId: 'emp1', name: 'أحمد علي' }
    ];
    let bookings = [];
    let employees = [];
    let halls = [];
    let clients = [];
    let equipmentInventory = {};
    let swapRequests = [];
    let payrollArchive = [];
    let employeeLoans = {};
    let whatsappLogs = [];
    let currentUser = null;
    let currentTab = 'dashboard';

    // Helper functions
    function showMsg(msg, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('show');
        document.body.style.overflow = '';
    }

    function openModal(content) {
        document.getElementById('modalContent').innerHTML = content;
        document.getElementById('modal').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    // Save / Load from localStorage
    function saveAllData() {
        const data = { bookings, employees, halls, clients, equipmentInventory, swapRequests, payrollArchive, employeeLoans, whatsappLogs, users };
        localStorage.setItem('drmedia_data', JSON.stringify(data));
    }

    function loadAllData() {
        const raw = localStorage.getItem('drmedia_data');
        if (raw) {
            const data = JSON.parse(raw);
            bookings = data.bookings || [];
            employees = data.employees || [];
            halls = data.halls || [];
            clients = data.clients || [];
            equipmentInventory = data.equipmentInventory || {};
            swapRequests = data.swapRequests || [];
            payrollArchive = data.payrollArchive || [];
            employeeLoans = data.employeeLoans || {};
            whatsappLogs = data.whatsappLogs || [];
            users = data.users || users;
        } else {
            // بيانات افتراضية للبدء
            halls = [
                { id: 'h1', name: 'القاعة المغلقة', type: 'closed', active: true },
                { id: 'h2', name: 'القاعة المفتوحة', type: 'open', active: true },
                { id: 'h3', name: 'الكافيه', type: 'cafe', active: true }
            ];
            employees = [
                { id: 'emp1', name: 'أحمد علي', role: 'مخرج', phone: '01001234567', salaryPerOrder: 300, active: true, totalOrders: 0 },
                { id: 'emp2', name: 'محمود حسن', role: 'مصور', phone: '01002345678', salaryPerOrder: 200, active: true, totalOrders: 0 },
                { id: 'emp3', name: 'سامر خالد', role: 'كرين', phone: '01003456789', salaryPerOrder: 250, active: true, totalOrders: 0 }
            ];
            bookings = [
                { id: 'b1', clientName: 'محمد عبدالله', phone: '01012345678', hallId: 'h1', hallName: 'القاعة المغلقة', date: new Date().toISOString().slice(0,10), price: 5000, status: 'pending', paymentStatus: 'pending', assignedEmployees: [] }
            ];
            clients = [
                { id: 'c1', name: 'محمد عبدالله', phone: '01012345678', email: 'm@x.com' }
            ];
            equipmentInventory = {
                cam1: { name: 'كاميرا Sony', quantity: 3, minStock: 1, category: 'تصوير' }
            };
            saveAllData();
        }
    }

    // Function to update employee orders count
    function updateEmployeeOrders() {
        const activeBookings = bookings.filter(b => b.status !== 'cancelled');
        employees.forEach(e => {
            e.totalOrders = activeBookings.filter(b => (b.assignedEmployees || []).includes(e.id)).length;
        });
    }

    // Auto distribute simple
    function autoDistribute() {
        const pending = bookings.filter(b => b.status === 'pending');
        const dirs = employees.filter(e => e.role === 'مخرج' && e.active);
        const phs = employees.filter(e => e.role === 'مصور' && e.active);
        const crs = employees.filter(e => e.role === 'كرين' && e.active);
        pending.forEach(b => {
            let assigned = [];
            const hall = halls.find(h => h.id === b.hallId);
            const type = hall ? hall.type : 'closed';
            if (type === 'cafe') {
                if (phs.length) assigned.push(phs[0].id);
            } else {
                if (dirs.length) assigned.push(dirs[0].id);
                if (phs.length) assigned.push(phs[0].id);
                if (phs.length > 1) assigned.push(phs[1].id);
                if (crs.length) assigned.push(crs[0].id);
            }
            b.assignedEmployees = assigned;
        });
        updateEmployeeOrders();
        saveAllData();
        showMsg('✅ تم التوزيع الذكي');
    }

    // Render functions for each tab
    function renderDashboard() {
        updateEmployeeOrders();
        const totalBookings = bookings.filter(b => b.status !== 'cancelled').length;
        const totalRevenue = bookings.filter(b => b.status !== 'cancelled').reduce((s,b)=>s+b.price,0);
        const activeEmployees = employees.filter(e=>e.active).length;
        const completed = bookings.filter(b=>b.status==='completed').length;
        document.getElementById('dashboard').innerHTML = `
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><i class="fas fa-calendar text-emerald-600 text-2xl"></i><div class="text-2xl font-bold">${totalBookings}</div><div class="text-gray-500">حجوزات نشطة</div></div>
                <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><i class="fas fa-chart-line text-emerald-600 text-2xl"></i><div class="text-2xl font-bold">${totalRevenue.toLocaleString()} ج.م</div><div class="text-gray-500">الإيرادات</div></div>
                <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><i class="fas fa-users text-emerald-600 text-2xl"></i><div class="text-2xl font-bold">${activeEmployees}</div><div class="text-gray-500">موظفين نشطين</div></div>
                <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><i class="fas fa-check-circle text-emerald-600 text-2xl"></i><div class="text-2xl font-bold">${completed}</div><div class="text-gray-500">مكتملة</div></div>
            </div>
            <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow"><h3 class="font-bold mb-3">⚡ إجراءات سريعة</h3><div class="flex flex-wrap gap-2"><button onclick="showAddBookingModal()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl">+ حجز جديد</button><button onclick="autoDistribute();renderCurrentTab()" class="bg-purple-600 text-white px-4 py-2 rounded-xl">🔄 توزيع ذكي</button><button onclick="exportToExcel()" class="bg-blue-600 text-white px-4 py-2 rounded-xl">📊 تصدير Excel</button></div></div>
        `;
    }

    function renderBookings() {
        const filtered = bookings.filter(b => b.status !== 'cancelled');
        document.getElementById('bookings').innerHTML = `
            <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">📅 الحجوزات (${filtered.length})</h2><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b"><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>${filtered.map(b => `<tr><td class="p-2">${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price.toLocaleString()}</td><td><span class="px-2 py-1 rounded-full ${b.status==='pending'?'bg-yellow-100 text-yellow-800':'bg-green-100 text-green-800'}">${b.status}</span></td><td><button onclick="markComplete('${b.id}')" class="text-green-600"><i class="fas fa-check-circle"></i></button> <button onclick="deleteBooking('${b.id}')" class="text-red-600"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table></div></div>`;
    }

    function renderEmployees() {
        updateEmployeeOrders();
        document.getElementById('employees').innerHTML = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">👥 الموظفين</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الاسم</th><th>الدور</th><th>الهاتف</th><th>أوردرات</th><th>المستحق</th></tr></thead><tbody>${employees.map(e => `<tr><td>${e.name}</td><td>${e.role}</td><td>${e.phone}</td><td>${e.totalOrders||0}</td><td>${((e.totalOrders||0)*e.salaryPerOrder).toLocaleString()} ج.م</td></tr>`).join('')}</tbody></table></div></div>`;
    }

    function renderHalls() {
        document.getElementById('halls').innerHTML = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">🏛️ القاعات</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الاسم</th><th>النوع</th><th>الحالة</th><th>حجوزات</th></tr></thead><tbody>${halls.map(h => `<tr><td>${h.name}</td><td>${h.type}</td><td>${h.active?'نشطة':'غير نشطة'}</td><td>${bookings.filter(b=>b.hallId===h.id && b.status!=='cancelled').length}</td></tr>`).join('')}</tbody></table></div></div>`;
    }

    // باقي التبويبات (توزيع، مرتيات، الخ) سأضيفها باختصار ولكن كاملة
    function renderDistribution() {
        const pending = bookings.filter(b => b.status === 'pending');
        let html = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">⚙️ توزيع المهام</h2>`;
        pending.forEach(b => {
            html += `<div class="border p-3 rounded-xl mb-3"><div><strong>${b.clientName}</strong> - ${b.hallName} (${b.date})</div><div>الموظفون: ${(b.assignedEmployees||[]).map(id=>employees.find(e=>e.id===id)?.name).join(', ') || 'غير معين'}</div><button onclick="autoDistribute();renderCurrentTab()" class="bg-purple-600 text-white px-3 py-1 rounded text-sm mt-2">توزيع تلقائي</button></div>`;
        });
        html += `</div>`;
        document.getElementById('distribution').innerHTML = html;
    }

    function renderPayroll() {
        let html = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">💰 المرتبات</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الموظف</th><th>عدد الأوردرات</th><th>قيمة الأوردر</th><th>الإجمالي</th></tr></thead><tbody>`;
        employees.forEach(e => {
            const orders = e.totalOrders || 0;
            const total = orders * e.salaryPerOrder;
            html += `<tr><td>${e.name}</td><td>${orders}</td><td>${e.salaryPerOrder}</td><td>${total.toLocaleString()} ج.م</td></tr>`;
        });
        html += `</tbody></table></div></div>`;
        document.getElementById('payroll').innerHTML = html;
    }

    function renderCalendar() {
        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        let html = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">📆 تقويم ${today.toLocaleDateString('ar-EG', { month:'long', year:'numeric' })}</h2><div class="grid grid-cols-7 gap-1 text-center">`;
        ['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'].forEach(d => html += `<div class="font-bold">${d}</div>`);
        for(let i=0; i<firstDay; i++) html += `<div></div>`;
        for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const hasBooking = bookings.some(b => b.date === dateStr);
            html += `<div class="p-2 border rounded ${hasBooking ? 'bg-emerald-100 dark:bg-emerald-900' : ''}">${d}</div>`;
        }
        html += `</div></div>`;
        document.getElementById('calendar').innerHTML = html;
    }

    function renderArchive() {
        const completed = bookings.filter(b => b.status === 'completed');
        document.getElementById('archive').innerHTML = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">📁 أرشيف المكتمل (${completed.length})</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th></tr></thead><tbody>${completed.map(b=>`<tr><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price.toLocaleString()}</td></tr>`).join('')}</tbody></table></div></div>`;
    }

    function renderReports() {
        const total = bookings.filter(b=>b.status!=='cancelled').reduce((s,b)=>s+b.price,0);
        document.getElementById('reports').innerHTML = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">📊 التقارير</h2><canvas id="revenueChart" height="200"></canvas></div>`;
        setTimeout(() => {
            const ctx = document.getElementById('revenueChart')?.getContext('2d');
            if(ctx) new Chart(ctx, { type: 'bar', data: { labels: halls.map(h=>h.name), datasets: [{ label: 'الإيرادات', data: halls.map(h=>bookings.filter(b=>b.hallId===h.id && b.status!=='cancelled').reduce((s,b)=>s+b.price,0)), backgroundColor: '#16a34a' }] } });
        }, 100);
    }

    function renderClients() {
        document.getElementById('clients').innerHTML = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">👥 العملاء</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الاسم</th><th>الهاتف</th><th>البريد</th><th>حجوزات</th></tr></thead><tbody>${clients.map(c=>`<tr><td>${c.name}</td><td>${c.phone}</td><td>${c.email||'-'}</td><td>${bookings.filter(b=>b.phone===c.phone).length}</td></tr>`).join('')}</tbody></table></div></div>`;
    }

    function renderEquipment() {
        let html = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">📦 المعدات</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
        for(let id in equipmentInventory) {
            const item = equipmentInventory[id];
            html += `<div class="border p-3 rounded-xl"><div><strong>${item.name}</strong> (${item.category})</div><div>الكمية: ${item.quantity} <span class="${item.quantity <= item.minStock ? 'text-red-500' : 'text-green-500'}">${item.quantity <= item.minStock ? '⚠️ منخفض' : 'متوفر'}</span></div><button onclick="adjustInventory('${id}',-1)" class="bg-gray-300 px-3 py-1 rounded">-</button> <button onclick="adjustInventory('${id}',1)" class="bg-gray-300 px-3 py-1 rounded">+</button></div>`;
        }
        html += `</div></div>`;
        document.getElementById('equipment').innerHTML = html;
    }

    function renderSwap() {
        document.getElementById('swap').innerHTML = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">🔄 طلبات التبديل</h2><p>لا توجد طلبات حالياً</p></div>`;
    }

    function renderSettings() {
        document.getElementById('settings').innerHTML = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">⚙️ الإعدادات</h2><button onclick="localStorage.clear(); location.reload();" class="bg-red-600 text-white px-4 py-2 rounded-xl">إعادة ضبط البيانات</button></div>`;
    }

    // Helpers for actions
    window.markComplete = function(id) {
        const b = bookings.find(x=>x.id===id);
        if(b) { b.status = 'completed'; b.paymentStatus='paid'; saveAllData(); renderCurrentTab(); showMsg('✅ تم إكمال الحجز'); }
    };
    window.deleteBooking = function(id) {
        if(confirm('حذف الحجز؟')) { bookings = bookings.filter(b=>b.id!==id); saveAllData(); renderCurrentTab(); showMsg('🗑️ تم الحذف'); }
    };
    window.adjustInventory = function(id, delta) {
        if(equipmentInventory[id]) {
            equipmentInventory[id].quantity = Math.max(0, equipmentInventory[id].quantity + delta);
            saveAllData(); renderEquipment(); showMsg('✅ تم تحديث المخزون');
        }
    };
    window.exportToExcel = function() {
        const ws = XLSX.utils.json_to_sheet(bookings.map(b=>({العميل:b.clientName,التاريخ:b.date,القاعة:b.hallName,السعر:b.price,الحالة:b.status})));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'الحجوزات');
        XLSX.writeFile(wb, `bookings_${new Date().toISOString().slice(0,10)}.xlsx`);
        showMsg('✅ تم التصدير');
    };
    window.showAddBookingModal = function() {
        openModal(`<h3 class="text-xl font-bold mb-4">➕ حجز جديد</h3><input id="clientName" placeholder="اسم العميل"><input id="clientPhone" placeholder="رقم الهاتف"><select id="hallId">${halls.map(h=>`<option value="${h.id}">${h.name}</option>`).join('')}</select><input id="date" type="date" value="${new Date().toISOString().slice(0,10)}"><input id="price" placeholder="السعر" value="2500"><button onclick="saveNewBooking()" class="bg-emerald-600 text-white w-full py-2 rounded-xl mt-2">حفظ</button>`);
    };
    window.saveNewBooking = function() {
        const hall = halls.find(h=>h.id===document.getElementById('hallId').value);
        const newBooking = {
            id: 'b'+Date.now(), clientName: document.getElementById('clientName').value, phone: document.getElementById('clientPhone').value,
            hallId: hall.id, hallName: hall.name, date: document.getElementById('date').value, price: parseInt(document.getElementById('price').value),
            status: 'pending', paymentStatus: 'pending', assignedEmployees: []
        };
        bookings.push(newBooking);
        saveAllData();
        closeModal();
        renderCurrentTab();
        showMsg('✅ تمت الإضافة');
    };

    // Render current tab based on currentTab variable
    function renderCurrentTab() {
        if(currentTab === 'dashboard') renderDashboard();
        else if(currentTab === 'bookings') renderBookings();
        else if(currentTab === 'employees') renderEmployees();
        else if(currentTab === 'halls') renderHalls();
        else if(currentTab === 'distribution') renderDistribution();
        else if(currentTab === 'payroll') renderPayroll();
        else if(currentTab === 'calendar') renderCalendar();
        else if(currentTab === 'archive') renderArchive();
        else if(currentTab === 'reports') renderReports();
        else if(currentTab === 'clients') renderClients();
        else if(currentTab === 'equipment') renderEquipment();
        else if(currentTab === 'swap') renderSwap();
        else if(currentTab === 'settings') renderSettings();
    }

    // Admin Dashboard UI
    function renderAdminDashboard() {
        document.getElementById('app').innerHTML = `
            <div class="min-h-screen bg-gray-100 dark:bg-gray-900">
                <header class="bg-white dark:bg-gray-800 shadow p-3 flex flex-wrap justify-between items-center sticky top-0 z-50">
                    <h1 class="text-xl font-bold text-emerald-700">📷 Drmedia Pro Plus</h1>
                    <div class="flex gap-3 items-center">
                        <span class="text-sm">👤 ${currentUser.name}</span>
                        <button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded-lg">خروج</button>
                    </div>
                </header>
                <div class="flex overflow-x-auto border-b bg-white dark:bg-gray-800 px-2 sticky top-12 z-40">
                    <button data-tab="dashboard" class="tab-btn px-4 py-2 rounded-t-lg">📊 الرئيسية</button>
                    <button data-tab="bookings" class="tab-btn px-4 py-2 rounded-t-lg">📅 الحجوزات</button>
                    <button data-tab="employees" class="tab-btn px-4 py-2 rounded-t-lg">👥 الموظفين</button>
                    <button data-tab="halls" class="tab-btn px-4 py-2 rounded-t-lg">🏛️ القاعات</button>
                    <button data-tab="distribution" class="tab-btn px-4 py-2 rounded-t-lg">⚙️ التوزيع</button>
                    <button data-tab="payroll" class="tab-btn px-4 py-2 rounded-t-lg">💰 المرتبات</button>
                    <button data-tab="calendar" class="tab-btn px-4 py-2 rounded-t-lg">📆 التقويم</button>
                    <button data-tab="archive" class="tab-btn px-4 py-2 rounded-t-lg">📁 الأرشيف</button>
                    <button data-tab="reports" class="tab-btn px-4 py-2 rounded-t-lg">📊 التقارير</button>
                    <button data-tab="clients" class="tab-btn px-4 py-2 rounded-t-lg">👥 العملاء</button>
                    <button data-tab="equipment" class="tab-btn px-4 py-2 rounded-t-lg">📦 المعدات</button>
                    <button data-tab="swap" class="tab-btn px-4 py-2 rounded-t-lg">🔄 التبديل</button>
                    <button data-tab="settings" class="tab-btn px-4 py-2 rounded-t-lg">⚙️ الإعدادات</button>
                </div>
                <main class="p-4 max-w-7xl mx-auto">
                    <div id="dashboard" class="tab-pane"></div>
                    <div id="bookings" class="tab-pane hidden"></div>
                    <div id="employees" class="tab-pane hidden"></div>
                    <div id="halls" class="tab-pane hidden"></div>
                    <div id="distribution" class="tab-pane hidden"></div>
                    <div id="payroll" class="tab-pane hidden"></div>
                    <div id="calendar" class="tab-pane hidden"></div>
                    <div id="archive" class="tab-pane hidden"></div>
                    <div id="reports" class="tab-pane hidden"></div>
                    <div id="clients" class="tab-pane hidden"></div>
                    <div id="equipment" class="tab-pane hidden"></div>
                    <div id="swap" class="tab-pane hidden"></div>
                    <div id="settings" class="tab-pane hidden"></div>
                </main>
            </div>
        `;
        // Add event listeners for tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.add('hidden'));
                document.getElementById(currentTab).classList.remove('hidden');
                renderCurrentTab();
            });
        });
        // Activate first tab
        document.querySelector('.tab-btn').classList.add('active');
        document.getElementById('dashboard').classList.remove('hidden');
        renderCurrentTab();
    }

    // Employee dashboard (بسيط)
    function renderEmployeeDashboard() {
        const emp = employees.find(e=>e.id === currentUser.employeeId);
        document.getElementById('app').innerHTML = `
            <div class="min-h-screen bg-gray-100"><header class="bg-white p-3 flex justify-between"><h1 class="text-xl font-bold">📷 Drmedia Pro Plus</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header><main class="p-4"><div class="bg-white p-4 rounded-xl shadow"><h2>مرحباً ${emp.name}</h2><p>عدد أوردراتك: ${emp.totalOrders || 0}</p><p>المستحق: ${((emp.totalOrders||0)*emp.salaryPerOrder).toLocaleString()} ج.م</p></div></main></div>
        `;
    }

    // Login screen
    function showLogin() {
        document.getElementById('app').innerHTML = `
            <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700 p-4">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl w-full max-w-md text-center shadow-2xl">
                    <h1 class="text-3xl font-bold text-emerald-700 mb-2">📷 Drmedia Pro Plus</h1>
                    <p class="text-gray-500 mb-6">نظام إدارة القاعات الذكي</p>
                    <input type="text" id="loginUser" placeholder="اسم المستخدم" class="w-full border p-3 rounded-xl mb-3">
                    <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full border p-3 rounded-xl mb-2">
                    <button onclick="doLogin()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold">دخول</button>
                    <div class="mt-4 text-sm text-gray-400"><p>المدير: <strong>ahmed</strong> / <strong>1994</strong></p><p>الموظف: <strong>ahmed_emp</strong> / <strong>emp123</strong></p></div>
                </div>
            </div>
        `;
    }

    window.doLogin = function() {
        const un = document.getElementById('loginUser').value.trim();
        const pw = document.getElementById('loginPass').value;
        const user = users.find(u => u.username === un && u.password === pw);
        if (user) {
            currentUser = user;
            sessionStorage.setItem('drmedia_user', JSON.stringify(user));
            if (user.role === 'admin') renderAdminDashboard();
            else renderEmployeeDashboard();
            showMsg(`مرحباً ${user.name}`);
        } else {
            showMsg('❌ اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
        }
    };

    window.logout = function() {
        sessionStorage.removeItem('drmedia_user');
        currentUser = null;
        showLogin();
        showMsg('👋 تم تسجيل الخروج');
    };

    // Initialization
    loadAllData();
    const saved = sessionStorage.getItem('drmedia_user');
    if (saved) {
        currentUser = JSON.parse(saved);
        if (currentUser.role === 'admin') renderAdminDashboard();
        else renderEmployeeDashboard();
    } else {
        showLogin();
    }
</script>
</body>
</html>
