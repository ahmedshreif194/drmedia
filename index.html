<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drmedia Pro V3 PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
body{font-family:tahoma;background:#f3f4f6}
.tab{display:none}
.tab.active{display:block}
.btn{padding:8px 14px;border-radius:10px}
.card{background:#fff;padding:15px;border-radius:15px;margin-bottom:10px}
input,select{padding:8px;border:1px solid #ddd;border-radius:10px;width:100%;margin-bottom:8px}
</style>
</head>

<body>

<div id="app"></div>

<script>
// ================= DATA =================
let users = [
  {username:"ahmed",password:"1994",role:"admin",name:"مدير النظام"},
  {username:"ahmed_emp",password:"emp123",role:"employee",name:"موظف",employeeId:"e1"}
];

let currentUser=null;
let bookings=[];
let employees=[
  {id:"e1",name:"أحمد",role:"مصور",salary:200,orders:0}
];

let halls=[
  {id:"h1",name:"المغلقة"},
  {id:"h2",name:"الأوبن"},
  {id:"h3",name:"الكافيه"}
];

// ================= STORAGE =================
function save(){
  localStorage.setItem("dr_v3",JSON.stringify({bookings,employees}));
}
function load(){
  let d=JSON.parse(localStorage.getItem("dr_v3")||"{}");
  bookings=d.bookings||[];
  employees=d.employees||employees;
}

// ================= LOGIN =================
function login(){
  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;

  let user=users.find(x=>x.username===u&&x.password===p);

  if(!user){
    alert("خطأ في البيانات");
    return;
  }

  currentUser=user;
  sessionStorage.setItem("user",JSON.stringify(user));
  render();
}

// ================= LOGOUT =================
function logout(){
  sessionStorage.clear();
  currentUser=null;
  render();
}

// ================= BOOKING =================
function addBooking(){
  let name=prompt("اسم العميل");
  let hall=prompt("h1 h2 h3");
  if(!name||!hall)return;

  bookings.push({
    id:Date.now(),
    name,
    hall,
    date:new Date().toISOString().slice(0,10)
  });

  save();
  render();
}

// ================= EMPLOYEE CALC =================
function calc(emp){
  let count=bookings.length;
  return count * emp.salary;
}

// ================= UI =================
function render(){

if(!currentUser){
document.getElementById("app").innerHTML=`
<div style="max-width:400px;margin:100px auto;text-align:center">
<h2>Drmedia Pro V3</h2>

<input id="u" placeholder="username">
<input id="p" type="password" placeholder="password">

<button onclick="login()" class="btn bg-green-500 text-white">دخول</button>
</div>`;
return;
}

if(currentUser.role==="admin"){

document.getElementById("app").innerHTML=`
<div class="p-4">

<div class="card">
<h2>Dashboard</h2>
<button onclick="logout()" class="btn bg-red-500 text-white">خروج</button>
<button onclick="addBooking()" class="btn bg-green-500 text-white">+ حجز</button>
</div>

<div class="card">
<h3>الحجوزات</h3>
${bookings.map(b=>`
<div>
${b.name} - ${b.hall} - ${b.date}
</div>
`).join("")}
</div>

<div class="card">
<h3>الموظفين</h3>
${employees.map(e=>`
<div>
${e.name} | ${calc(e)} ج
</div>
`).join("")}
</div>

</div>
`;

}else{

let emp=employees.find(e=>e.id===currentUser.employeeId);

document.getElementById("app").innerHTML=`
<div class="p-4">

<div class="card">
<h2>مرحبا ${emp.name}</h2>
<p>الأوردرات: ${bookings.length}</p>
<p>المستحق: ${calc(emp)} ج</p>

<button onclick="logout()" class="btn bg-red-500 text-white">خروج</button>
</div>

</div>
`;
}

}

// ================= INIT =================
load();

let saved=sessionStorage.getItem("user");
if(saved){
currentUser=JSON.parse(saved);
}

render();

</script>

</body>
</html>
