<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drmedia Pro V3</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif }
.btn { background:#16a34a;color:#fff;padding:10px;border-radius:10px;width:100% }
.card { background:#fff;padding:20px;border-radius:15px }
</style>
</head>

<body class="bg-gray-100">

<div id="app"></div>

<script>

// ================= USERS =================
let users = [
 {username:"admin",password:"1234",role:"admin"},
 {username:"emp",password:"1234",role:"employee"}
];

let currentUser = null;

// ================= DATA =================
let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
let employees = JSON.parse(localStorage.getItem('employees')) || [
 {id:'e1',name:'زكاوة',role:'مخرج',salary:250,total:0},
 {id:'e2',name:'الصاوي',role:'مخرج',salary:250,total:0},
 {id:'e3',name:'محمد',role:'مصور',salary:200,total:0},
 {id:'e4',name:'اسلام',role:'مصور',salary:200,total:0},
 {id:'e5',name:'خالد',role:'مصور',salary:200,total:0},
 {id:'e6',name:'ياسر',role:'كرين',salary:200,total:0}
];

let halls = [
 {id:'h1',name:'المغلقة'},
 {id:'h2',name:'الأوبن'},
 {id:'h3',name:'الكافيه'}
];

// ================= SAVE =================
function save(){
 localStorage.setItem('bookings',JSON.stringify(bookings));
 localStorage.setItem('employees',JSON.stringify(employees));
}

// ================= LOGIN =================
function showLogin(){
 document.getElementById("app").innerHTML = `
 <div class="min-h-screen flex items-center justify-center">
   <div class="card w-full max-w-sm text-center">
     <h2 class="text-xl mb-4">🔐 تسجيل الدخول</h2>
     <input id="user" placeholder="Username" class="border p-2 w-full mb-2">
     <input id="pass" type="password" placeholder="Password" class="border p-2 w-full mb-3">
     <button onclick="login()" class="btn">دخول</button>
     <p class="text-sm mt-3 text-gray-400">admin / 1234</p>
   </div>
 </div>
 `;
}

function login(){
 let u = document.getElementById("user").value.trim();
 let p = document.getElementById("pass").value;

 let user = users.find(x=>x.username===u && x.password===p);

 if(user){
   currentUser = user;
   sessionStorage.setItem("user", JSON.stringify(user));
   renderApp();
 }else{
   alert("❌ بيانات غلط");
 }
}

function logout(){
 sessionStorage.removeItem("user");
 currentUser = null;
 showLogin();
}

// ================= MAIN APP =================
function renderApp(){
 document.getElementById("app").innerHTML = `
 <div class="p-4">

   <div class="flex justify-between mb-4">
     <h2 class="text-xl">👋 ${currentUser.username}</h2>
     <button onclick="logout()" class="bg-red-500 text-white px-3 py-1 rounded">خروج</button>
   </div>

   <div class="card mb-4">
     <button onclick="showAdd()" class="btn mb-2">+ حجز</button>
     <button onclick="smartDistribute()" class="btn bg-blue-600">⚡ توزيع</button>

     <table class="w-full mt-3">
       <tr><th>عميل</th><th>قاعة</th><th>موظفين</th></tr>
       ${bookings.map(b=>`
       <tr>
         <td>${b.client}</td>
         <td>${b.hall}</td>
         <td>${b.assigned.map(id=>employees.find(e=>e.id==id)?.name).join(', ')}</td>
       </tr>
       `).join('')}
     </table>
   </div>

   <div class="card">
     ${employees.map(e=>`
       <div>${e.name} | ${e.total} | ${e.total*e.salary} ج</div>
     `).join('')}
   </div>

 </div>
 `;
}

// ================= ADD =================
function showAdd(){
 let name = prompt("اسم العميل");
 let hall = prompt("h1/h2/h3");

 let hallName = halls.find(h=>h.id==hall)?.name;

 if(!name || !hallName) return;

 bookings.push({
   id:Date.now(),
   client:name,
   hall:hallName,
   hallId:hall,
   assigned:[]
 });

 save();
 renderApp();
}

// ================= DISTRIBUTION =================
function smartDistribute(){

 let directors = employees.filter(e=>e.role=='مخرج').sort((a,b)=>a.total-b.total);
 let photographers = employees.filter(e=>e.role=='مصور').sort((a,b)=>a.total-b.total);
 let cranes = employees.filter(e=>e.role=='كرين').sort((a,b)=>a.total-b.total);

 bookings.forEach(b=>{
   let assigned=[];

   if(b.hallId=='h1'||b.hallId=='h2'){
     if(directors.length) assigned.push(directors.shift().id);
     assigned.push(...photographers.splice(0,2).map(e=>e.id));
     if(cranes.length) assigned.push(cranes.shift().id);
   }

   if(b.hallId=='h3'){
     if(photographers.length) assigned.push(photographers.shift().id);
   }

   b.assigned = assigned;
 });

 updateTotals();
 save();
 renderApp();
}

// ================= TOTAL =================
function updateTotals(){
 employees.forEach(e=>e.total=0);
 bookings.forEach(b=>{
   b.assigned.forEach(id=>{
     let emp = employees.find(e=>e.id==id);
     if(emp) emp.total++;
   });
 });
}

// ================= INIT =================
function init(){
 let savedUser = sessionStorage.getItem("user");

 if(savedUser){
   currentUser = JSON.parse(savedUser);
   renderApp();
 }else{
   showLogin();
 }
}

init();

</script>
</body>
</html>
