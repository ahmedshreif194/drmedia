<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

        .btn-primary:hover { background-color: #15803d; }
        .btn-secondary { background-color: #2563eb; color: white; padding: 6px 12px; border-radius: 10px; border: none; cursor: pointer; }
        .btn-danger { background-color: #dc2626; color: white; padding: 6px 12px; border-radius: 10px; border: none; cursor: pointer; }
        footer { background: #1f2937; color: #9ca3af; text-align: center; padding: 12px; font-size: 0.8rem; margin-top: 20px; }

<script>
// ======================== Firebase Config ========================
const firebaseConfig = {

let useFirebase = false, db = null, online = true;
try {

// ======================== البيانات الأساسية ========================
let USERS = [
    { id: 'admin1', username: 'ahmed', password: '1994', role: 'admin', name: 'مدير النظام' },
    { id: 'emp1', username: 'ahmed_emp', password: 'emp123', role: 'employee', employeeId: 'emp1', name: 'أحمد الموظف' },
    { id: 'agent1', username: 'agent', password: 'agent123', role: 'agent', name: 'وكيل المبيعات' }
];
let currentUser = null;
let companyName = 'درميديا برو بلس';
let companyLogo = '📷';
let companyLogoBase64 = null;

let bookings = [];
let employees = [];
let halls = [];
let clients = [];
let equipmentInventory = {};
let attendanceRecords = [];
let payrollArchive = [];
let employeeLoans = {}; // { empId: [{amount, date, reason, settled}] }
let notifications = [];
let trashBin = [];

let browserNotifications = false;
let backupIntervalId = null;
let selectedBackupPeriod = 'day'; // '12h', 'day', 'week', 'month'

// توزيع المهام
let distributionMode = 'smart'; // smart, manual, rotation
let rotationCounters = { dir: 0, ph: 0, cr: 0 };

// ======================== دوال التخزين (Firebase + LocalStorage) ========================
async function saveAllData() {
    const fullData = { bookings, employees, halls, clients, equipmentInventory, attendanceRecords, payrollArchive, employeeLoans, notifications, trashBin, companyName, companyLogo: companyLogoBase64 || companyLogo, USERS, rotationCounters };
    if (useFirebase && db && online) {
        try {
            await db.ref('/').set(fullData);
        } catch(e) { online = false; document.getElementById('onlineStatus').innerHTML = '🔴 غير متصل (محلي)'; }
    }
    localStorage.setItem('drmedia_data', JSON.stringify(fullData));
}

async function loadAllData() {
    if (useFirebase && db) {
        try {
            const snap = await db.ref('/').get();
            if (snap.exists()) {
                const d = snap.val();
                bookings = d.bookings || []; employees = d.employees || []; halls = d.halls || [];
                clients = d.clients || []; equipmentInventory = d.equipmentInventory || {};
                attendanceRecords = d.attendanceRecords || []; payrollArchive = d.payrollArchive || [];
                employeeLoans = d.employeeLoans || {}; notifications = d.notifications || [];
                trashBin = d.trashBin || []; companyName = d.companyName || companyName;
                if (d.companyLogo && d.companyLogo.startsWith('data:image')) companyLogoBase64 = d.companyLogo;
                else companyLogo = d.companyLogo || companyLogo;
                USERS = d.USERS || USERS;
                rotationCounters = d.rotationCounters || { dir:0, ph:0, cr:0 };
                online = true; document.getElementById('onlineStatus').innerHTML = '🟢 متصل بالسحاب';
            } else fallbackLocalLoad();
        } catch(e) { fallbackLocalLoad(); online=false; document.getElementById('onlineStatus').innerHTML = '🔴 غير متصل (محلي)'; }
    } else fallbackLocalLoad();
    
    if (!halls.length) halls = [
        { id: 'h1', name: 'القاعة المغلقة', type: 'closed', basePrice: 5000, active: true },
        { id: 'h2', name: 'القاعة المفتوحة', type: 'open', basePrice: 4000, active: true },
        { id: 'h3', name: 'الكافيه', type: 'cafe', basePrice: 2000, active: true }
    ];
    if (!employees.length) employees = [
        { id: 'emp1', name: 'أحمد علي', role: 'مخرج', phone: '01001234567', salaryPerOrder: 300, active: true, totalOrders: 0 },
        { id: 'emp2', name: 'محمود حسن', role: 'مصور', phone: '01002345678', salaryPerOrder: 200, active: true, totalOrders: 0 },
        { id: 'emp3', name: 'سامر خالد', role: 'كرين', phone: '01003456789', salaryPerOrder: 250, active: true, totalOrders: 0 }
    ];
    if (!bookings.length) bookings = [{ id: 'b1', clientName: 'محمد عبدالله', clientId: 'c1', phone: '01012345678', hallId: 'h1', hallName: 'القاعة المغلقة', date: new Date().toISOString().slice(0,10), price: 5000, status: 'pending', paymentStatus: 'pending', assignedEmployees: [], notes: '' }];
    if (!clients.length) clients = [{ id: 'c1', name: 'محمد عبدالله', phone: '01012345678', email: '', address: '' }];
    if (Object.keys(equipmentInventory).length === 0) equipmentInventory = { eq1: { name: 'كاميرا Sony A7', quantity: 3, minStock: 1, category: 'تصوير' } };
    updateEmployeeOrders(); // بناءً على الحضور
    await saveAllData();
}
function fallbackLocalLoad() {
    const raw = localStorage.getItem('drmedia_data');
    if (raw) {
        const d = JSON.parse(raw);
        bookings = d.bookings || []; employees = d.employees || []; halls = d.halls || [];
        clients = d.clients || []; equipmentInventory = d.equipmentInventory || {};
        attendanceRecords = d.attendanceRecords || []; payrollArchive = d.payrollArchive || [];
        employeeLoans = d.employeeLoans || {}; notifications = d.notifications || [];
        trashBin = d.trashBin || []; companyName = d.companyName || companyName;
        companyLogoBase64 = d.companyLogo?.startsWith('data:image') ? d.companyLogo : null;
        if (!companyLogoBase64) companyLogo = d.companyLogo || companyLogo;
        USERS = d.USERS || USERS;
        rotationCounters = d.rotationCounters || { dir:0, ph:0, cr:0 };
    }
}
function updateEmployeeOrders() {
    // فقط الأوردرات التي حضر فيها الموظف في نفس اليوم تحسب
    employees.forEach(emp => {
        let count = 0;
        bookings.forEach(b => {
            if (b.status === 'cancelled' || b.deleted) return;
            if ((b.assignedEmployees || []).includes(emp.id)) {
                const attended = attendanceRecords.some(a => a.empId === emp.id && a.date === b.date && a.checkIn);
                if (attended) count++;
            }
        });
        emp.totalOrders = count;
    });
}
function showMsg(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
function closeModal() { document.getElementById('modal').classList.remove('show'); document.body.style.overflow = ''; }
function openModal(content) { document.getElementById('modalContent').innerHTML = content; document.getElementById('modal').classList.add('show'); document.body.style.overflow = 'auto'; }

// ======================== الحضور والانصراف و QR ========================
function getTodayDateStr() { return new Date().toISOString().slice(0,10); }
async function checkIn(empId) {
    const today = getTodayDateStr();
    const existing = attendanceRecords.find(a => a.empId === empId && a.date === today);
    if (existing && existing.checkIn) return showMsg('⚠️ تم تسجيل الحضور مسبقاً');
    const time = new Date().toLocaleTimeString('ar-EG');
    if (existing) { existing.checkIn = time; existing.status = 'present'; }
    else attendanceRecords.push({ id: Date.now().toString(), empId, date: today, checkIn: time, checkOut: null, status: 'present' });
    await saveAllData();
    updateEmployeeOrders();
    renderAttendance(); renderPayroll();
    showMsg(`✅ تم تسجيل حضور الساعة ${time}`);
}
async function checkOut(empId) {
    const today = getTodayDateStr();
    const rec = attendanceRecords.find(a => a.empId === empId && a.date === today);
    if (!rec || !rec.checkIn) return showMsg('⚠️ لم يتم تسجيل الحضور بعد');
    if (rec.checkOut) return showMsg('⚠️ تم تسجيل الانصراف مسبقاً');
    rec.checkOut = new Date().toLocaleTimeString('ar-EG');
    await saveAllData();
    renderAttendance();
    showMsg(`✅ تم تسجيل انصراف الساعة ${rec.checkOut}`);
}
let html5QrCode = null;
function renderManagerQR() { const qc = document.getElementById('attendanceQrContainer'); if (!qc) return; qc.innerHTML = ''; new QRCode(qc, { text: `DRMEDIA_ATT_${getTodayDateStr()}`, width: 200, height: 200 }); }
async function startEmployeeScan() {
    if (!currentUser || currentUser.role !== 'employee') { showMsg("خاصية الموظفين فقط"); return; }
    openModal(`<h3 class="text-xl font-bold mb-4">📷 مسح QR</h3><div id="qr-reader"></div><div class="flex gap-2 mt-4"><button onclick="stopScannerAndClose()" class="btn-danger w-full">إلغاء</button></div>`);
    const scanner = new Html5Qrcode("qr-reader");
    html5QrCode = scanner;
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        if (text && text.includes("DRMEDIA_ATT_")) {
            if (text === `DRMEDIA_ATT_${getTodayDateStr()}`) {
                stopScannerAndClose();
                const emp = employees.find(e => e.id === currentUser.employeeId);
                openModal(`<h3 class="text-xl font-bold mb-4">تسجيل الحضور</h3><p>الموظف: ${emp.name}</p><div class="flex gap-4"><button onclick="performCheckInFromQR('${emp.id}')" class="btn-primary">✅ حضور</button><button onclick="performCheckOutFromQR('${emp.id}')" class="btn-secondary">🚪 انصراف</button><button onclick="closeModal()" class="btn-danger">إلغاء</button></div>`);
            } else showMsg("رمز QR منتهي الصلاحية");
        } else showMsg("رمز غير صالح");
    }, (err) => console.warn(err));
}
function stopScannerAndClose() { if (html5QrCode) html5QrCode.stop().then(() => closeModal()); else closeModal(); }
async function performCheckInFromQR(empId) { await checkIn(empId); closeModal(); renderAttendance(); if (currentUser.role === 'employee') renderEmployeeDashboard(); }
async function performCheckOutFromQR(empId) { await checkOut(empId); closeModal(); renderAttendance(); if (currentUser.role === 'employee') renderEmployeeDashboard(); }

// ======================== التوزيع الذكي واليدوي والتدوير ========================
async function applyDistribution() {
    const pending = bookings.filter(b => b.status === 'pending').sort((a,b)=>new Date(a.date)-new Date(b.date));
    const dirs = employees.filter(e => e.role === 'مخرج' && e.active);
    const phs = employees.filter(e => e.role === 'مصور' && e.active);
    const crs = employees.filter(e => e.role === 'كرين' && e.active);
    if (distributionMode === 'manual') { showMsg("الوضع يدوي، لن يتم التوزيع تلقائياً"); return; }
    let dirIdx = rotationCounters.dir, phIdx = rotationCounters.ph, crIdx = rotationCounters.cr;
    const daily = {};
    for (let b of pending) {
        const date = b.date;
        if (!daily[date]) daily[date] = { dirs: new Set(), phs: new Set(), crs: new Set() };
        const type = halls.find(h => h.id === b.hallId)?.type || 'closed';
        let assigned = [];
        if (type === 'cafe') {
            if (phs.length) {
                while (daily[date].phs.has(phs[phIdx % phs.length].id)) phIdx++;
                assigned.push(phs[phIdx % phs.length].id);
                daily[date].phs.add(phs[phIdx % phs.length].id);
                phIdx++;
            }
        } else {
            if (dirs.length) {
                while (daily[date].dirs.has(dirs[dirIdx % dirs.length].id)) dirIdx++;
                assigned.push(dirs[dirIdx % dirs.length].id);
                daily[date].dirs.add(dirs[dirIdx % dirs.length].id);
                dirIdx++;
            }
            if (phs.length) {
                let added = 0;
                for (let i=0; i<phs.length*2 && added<2; i++) {
                    while (daily[date].phs.has(phs[phIdx % phs.length].id)) phIdx++;
                    const ph = phs[phIdx % phs.length];
                    if (!daily[date].phs.has(ph.id)) {
                        assigned.push(ph.id);
                        daily[date].phs.add(ph.id);
                        added++;
                    }
                    phIdx++;
                }
            }
            if (crs.length) {
                while (daily[date].crs.has(crs[crIdx % crs.length].id)) crIdx++;
                assigned.push(crs[crIdx % crs.length].id);
                daily[date].crs.add(crs[crIdx % crs.length].id);
                crIdx++;
            }
        }
        b.assignedEmployees = assigned;
    }
    if (distributionMode === 'rotation') {
        rotationCounters = { dir: dirIdx, ph: phIdx, cr: crIdx };
    }
    updateEmployeeOrders();
    await saveAllData();
    renderBookings(); renderDistribution();
    showMsg("تم توزيع المهام بنجاح");
}
function manualAssign(bookingId) {
    const booking = bookings.find(b => b.id === bookingId);
    if (!booking) return;
    const opts = employees.map(e => `<option value="${e.id}">${e.name} (${e.role})</option>`).join('');
    openModal(`<h3 class="text-xl font-bold mb-4">تعيين يدوي - ${booking.clientName}</h3><select id="manualSelect" multiple class="w-full border p-2 h-40">${opts}</select><div class="flex gap-2 mt-3"><button onclick="saveManualAssign('${bookingId}')" class="btn-primary">حفظ</button><button onclick="closeModal()" class="btn-danger">إلغاء</button></div>`);
}
async function saveManualAssign(bookingId) {
    const selected = Array.from(document.getElementById('manualSelect').selectedOptions).map(opt => opt.value);
    const booking = bookings.find(b => b.id === bookingId);
    if (booking) { booking.assignedEmployees = selected; await saveAllData(); updateEmployeeOrders(); renderBookings(); renderDistribution(); closeModal(); showMsg("تم التعيين اليدوي"); }
}
function setDistributionMode(mode) { distributionMode = mode; showMsg(`وضع التوزيع: ${mode === 'smart' ? 'ذكي' : mode === 'rotation' ? 'تدويري' : 'يدوي'}`); renderDistribution(); }

// ======================== الحجوزات (مع أزرار حفظ/إلغاء) ========================
async function addBooking() {
    let form = `<h3 class="text-xl font-bold mb-4">➕ حجز جديد</h3><div><select id="clientSelect" class="w-full border p-2"><option value="new">+ عميل جديد</option>${clients.map(c=>`<option value="${c.id}">${c.name} (${c.phone})</option>`).join('')}</select><div id="newClientDiv" class="hidden"><input id="newName" placeholder="الاسم" class="w-full border p-2 my-1"><input id="newPhone" placeholder="الهاتف" class="w-full border p-2 my-1"></div><select id="hallSelect" class="w-full border p-2 my-1">${halls.filter(h=>h.active).map(h=>`<option value="${h.id}" data-price="${h.basePrice}">${h.name} - ${h.basePrice}</option>`).join('')}</select><input type="date" id="bookingDate" class="w-full border p-2 my-1" value="${getTodayDateStr()}"><input type="number" id="bookingPrice" placeholder="السعر" class="w-full border p-2 my-1"><textarea id="bookingNotes" placeholder="ملاحظات" class="w-full border p-2 my-1"></textarea><div class="flex gap-2 mt-3"><button onclick="saveNewBooking()" class="btn-primary">حفظ</button><button onclick="closeModal()" class="btn-danger">إلغاء</button></div></div>`;
    openModal(form);
    document.getElementById('clientSelect').addEventListener('change', e => document.getElementById('newClientDiv').classList.toggle('hidden', e.target.value !== 'new'));
    document.getElementById('hallSelect').addEventListener('change', function() { let p = this.options[this.selectedIndex].getAttribute('data-price'); if(p) document.getElementById('bookingPrice').value = p; });
    document.getElementById('hallSelect').dispatchEvent(new Event('change'));
}
async function saveNewBooking() {
    let clientId = document.getElementById('clientSelect').value;
    let clientName, clientPhone;
    if (clientId === 'new') {
        clientName = document.getElementById('newName').value.trim();
        clientPhone = document.getElementById('newPhone').value.trim();
        if (!clientName || !clientPhone) { showMsg("بيانات العميل ناقصة"); return; }
        clientId = 'c'+Date.now();
        clients.push({ id: clientId, name: clientName, phone: clientPhone, email: '', address: '' });
        await saveAllData();
    } else {
        const c = clients.find(c => c.id === clientId);
        clientName = c.name; clientPhone = c.phone;
    }
    const hallId = document.getElementById('hallSelect').value;
    const hall = halls.find(h => h.id === hallId);
    const date = document.getElementById('bookingDate').value;
    const price = parseInt(document.getElementById('bookingPrice').value);
    const notes = document.getElementById('bookingNotes').value;
    if (!hall) return;
    bookings.push({ id: 'b'+Date.now(), clientName, clientId, phone: clientPhone, hallId, hallName: hall.name, date, price, status: 'pending', paymentStatus: 'pending', assignedEmployees: [], notes });
    await saveAllData();
    await applyDistribution();
    renderBookings();
    closeModal();
    showMsg("تمت الإضافة");
}
async function editBooking(id) {
    const b = bookings.find(b => b.id === id);
    if (!b) return;
    openModal(`<h3 class="text-xl font-bold mb-4">✏️ تعديل حجز</h3><div><input id="editName" value="${b.clientName}" class="w-full border p-2"><input id="editPhone" value="${b.phone}" class="w-full border p-2 my-1"><select id="editHall" class="w-full border p-2 my-1">${halls.map(h=>`<option value="${h.id}" ${b.hallId===h.id?'selected':''}>${h.name}</option>`).join('')}</select><input type="date" id="editDate" value="${b.date}" class="w-full border p-2 my-1"><input type="number" id="editPrice" value="${b.price}" class="w-full border p-2 my-1"><select id="editStatus" class="w-full border p-2 my-1"><option ${b.status==='pending'?'selected':''}>pending</option><option ${b.status==='completed'?'selected':''}>completed</option></select><textarea id="editNotes" class="w-full border p-2 my-1">${b.notes||''}</textarea><div class="flex gap-2 mt-3"><button onclick="saveEditBooking('${id}')" class="btn-primary">حفظ</button><button onclick="closeModal()" class="btn-danger">إلغاء</button></div></div>`);
}
async function saveEditBooking(id) {
    const b = bookings.find(b => b.id === id);
    if (b) {
        b.clientName = document.getElementById('editName').value;
        b.phone = document.getElementById('editPhone').value;
        b.hallId = document.getElementById('editHall').value;
        b.hallName = halls.find(h=>h.id===b.hallId).name;
        b.date = document.getElementById('editDate').value;
        b.price = parseInt(document.getElementById('editPrice').value);
        b.status = document.getElementById('editStatus').value;
        b.notes = document.getElementById('editNotes').value;
        await saveAllData();
        renderBookings();
        closeModal();
        showMsg("تم التعديل");
    }
}
async function deleteBookingSoft(id) {
    if (confirm("نقل إلى سلة المحذوفات؟")) {
        const b = bookings.find(b => b.id === id);
        if (b) { trashBin.push({ id: Date.now(), type: 'booking', data: b, deletedAt: new Date().toISOString() }); bookings = bookings.filter(b => b.id !== id); await saveAllData(); renderBookings(); showMsg("تم النقل"); }
    }
}
async function markComplete(id) { const b = bookings.find(b => b.id === id); if (b) { b.status = 'completed'; b.paymentStatus = 'paid'; await saveAllData(); renderBookings(); showMsg("تم إكمال الحجز"); } }
function renderBookings() {
    const c = document.getElementById('bookings');

async function addEmployee() {
    const name = prompt('الاسم'), role = prompt('الدور (مخرج/مصور/كرين)'), phone = prompt('الهاتف'), salary = parseInt(prompt('راتب الأوردر'));
    if (name && role) {
        employees.push({ id: 'emp'+Date.now(), name, role, phone, salaryPerOrder: salary || (role==='مخرج'?300:role==='مصور'?200:250), active: true, totalOrders: 0 });
        await saveAllData();
        renderEmployees();
    }
}
async function editEmployee(id) {
    const e = employees.find(e => e.id === id);
    if (!e) return;
    openModal(`<div><input id="empName" value="${e.name}" class="w-full border p-2"><input id="empRole" value="${e.role}" class="w-full border p-2 my-1"><input id="empPhone" value="${e.phone}" class="w-full border p-2 my-1"><input id="empSalary" type="number" value="${e.salaryPerOrder}" class="w-full border p-2 my-1"><div class="flex gap-2 mt-3"><button onclick="saveEditEmployee('${id}')" class="btn-primary">حفظ</button><button onclick="closeModal()" class="btn-danger">إلغاء</button></div></div>`);
}
async function saveEditEmployee(id) {
    const e = employees.find(e => e.id === id);
    e.name = document.getElementById('empName').value;
    e.role = document.getElementById('empRole').value;
    e.phone = document.getElementById('empPhone').value;
    e.salaryPerOrder = parseInt(document.getElementById('empSalary').value);
    await saveAllData();
    renderEmployees();
    closeModal();
}
async function addLoan(empId) {
    const amount = parseInt(prompt('قيمة السلفة')), reason = prompt('السبب');
    if (amount) {
        if (!employeeLoans[empId]) employeeLoans[empId] = [];
        employeeLoans[empId].push({ amount, date: new Date().toISOString(), reason, settled: false });
        await saveAllData();
        renderEmployees(); renderPayroll();
        showMsg("تم إضافة السلفة");
    }
}
function renderEmployees() {
    const c = document.getElementById('employees');
    if (!c) return;
    updateEmployeeOrders();
    c.innerHTML = `<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">👥 الموظفين</h2><button onclick="addEmployee()" class="btn-primary my-2">+ موظف</button><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الاسم</th><th>الدور</th><th>الهاتف</th><th>الأوردرات</th><th>المستحق</th><th>السلف</th><th></th></tr></thead><tbody>${employees.map(e => { const loans = (employeeLoans[e.id] || []).filter(l=>!l.settled).reduce((s,l)=>s+l.amount,0); return `<tr><td>${e.name}</td><td>${e.role}</td><td>${e.phone}</td><td>${e.totalOrders}</td><td>${(e.totalOrders*e.salaryPerOrder).toLocaleString()}</td><td class="text-red-600">${loans.toLocaleString()}</td><td><button onclick="editEmployee('${e.id}')" class="text-amber-600"><i class="fas fa-edit"></i></button> <button onclick="addLoan('${e.id}')" class="text-blue-600"><i class="fas fa-hand-holding-usd"></i></button></td></tr>`}).join('')}</tbody></table></div></div>`;
}

// ======================== المرتبات وربط الحضور ========================
function renderPayroll() {
    updateEmployeeOrders();
    const c = document.getElementById('payroll');
    if (!c) return;
    c.innerHTML = `<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">💰 المرتبات</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الموظف</th><th>الأوردرات</th><th>المستحق</th><th>السلف غير المسددة</th><th>الصافي</th><th>صرف</th></tr></thead><tbody>${employees.map(e => { const salary = e.totalOrders * e.salaryPerOrder; const loans = (employeeLoans[e.id] || []).filter(l=>!l.settled).reduce((s,l)=>s+l.amount,0); const net = salary - loans; return `<tr><td>${e.name}</td><td>${e.totalOrders}</td><td>${salary.toLocaleString()}</td><td>${loans.toLocaleString()}</td><td class="font-bold">${net.toLocaleString()}</td><td><button onclick="processPayrollForEmp('${e.id}', ${net})" class="btn-secondary text-sm">صرف</button></td></tr>` }).join('')}</tbody></table></div><h3 class="mt-4 font-bold">أرشيف الصرف</h3><div>${payrollArchive.map(p=>`<div class="border-b p-1">${p.empName} - ${p.amount} ج.م - ${p.date}</div>`).join('')}</div></div>`;
}
async function processPayrollForEmp(empId, net) {
    if (net <= 0) { showMsg("لا يوجد صافي مستحق"); return; }
    const emp = employees.find(e => e.id === empId);
    if (confirm(`صرف مبلغ ${net.toLocaleString()} ج.م للموظف ${emp.name}؟`)) {
        payrollArchive.push({ id: Date.now(), empId, empName: emp.name, amount: net, date: new Date().toISOString().slice(0,10), orders: emp.totalOrders });
        if (employeeLoans[empId]) employeeLoans[empId].forEach(l => { if (!l.settled) l.settled = true; });
        await saveAllData();
        renderPayroll();
        showMsg("تم صرف المرتب");
    }
}

// ======================== تبويب الإشعارات المتقدمة ========================
function renderNotificationsTab() {
    const c = document.getElementById('notifications');
    if (!c) return;
    c.innerHTML = `<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">🔔 الإشعارات</h2><div class="mb-4 border p-3 rounded"><textarea id="notifyMsg" placeholder="اكتب نص الإشعار..." class="w-full border p-2 rounded" rows="2"></textarea><div class="flex gap-2 mt-2"><select id="notifyEmployeeSelect" class="border p-2 rounded"><option value="all">👥 جميع الموظفين</option>${employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select><button onclick="sendCustomNotification()" class="btn-primary">إرسال</button></div></div><h3 class="font-bold">سجل الإشعارات السابقة</h3><div>${notifications.slice(0,20).map(n=>`<div class="border-b p-2"><strong>${n.title}</strong><br>${n.body}<br><span class="text-xs text-gray-500">${n.date}</span></div>`).join('')||'لا توجد إشعارات'}</div></div>`;
}
async function sendCustomNotification() {
    const msg = document.getElementById('notifyMsg').value.trim();
    if (!msg) { showMsg("اكتب نص الإشعار"); return; }
    const target = document.getElementById('notifyEmployeeSelect').value;
    const title = "إشعار جديد";
    if (target === 'all') {
        for (let emp of employees) {
            notifications.unshift({ id: Date.now(), title, body: msg, date: new Date().toLocaleString(), recipient: emp.id, read: false });
            if (browserNotifications && Notification.permission === 'granted') new Notification(title, { body: msg });
        }
        showMsg("تم إرسال الإشعار للجميع");
    } else {
        const emp = employees.find(e => e.id === target);
        if (emp) {
            notifications.unshift({ id: Date.now(), title, body: msg, date: new Date().toLocaleString(), recipient: emp.id, read: false });
            showMsg(`تم إرسال الإشعار إلى ${emp.name}`);
        }
    }
    await saveAllData();
    renderNotificationsTab();
}

function renderCalendar() { const year = new Date().getFullYear(), month = new Date().getMonth(); const firstDay = new Date(year, month, 1).getDay(); const days = new Date(year, month+1, 0).getDate(); const monthNames = ['يناير','فبراير','مارس','إبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر']; let html = `<div class="bg-white p-4 rounded-2xl shadow"><div class="flex justify-between"><h2 class="text-xl font-bold">📆 التقويم - ${monthNames[month]} ${year}</h2><select id="monthSelect" class="border p-1 rounded"><option value="0">يناير</option><option value="1">فبراير</option>...</select><select id="yearSelect"><option>2025</option><option selected>2026</option></select></div><div class="calendar-grid">${['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'].map(d=>`<div class="font-bold text-center">${d}</div>`).join('')}`; for(let i=0;i<firstDay;i++) html+=`<div></div>`; for(let d=1;d<=days;d++){ const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const has = bookings.some(b=>b.date===dateStr); html+=`<div class="calendar-day ${has?'booked':''}">${d}</div>`; } html+=`</div></div>`; document.getElementById('calendar').innerHTML = html; }

function renderAdminDashboard() {
    document.getElementById('app').innerHTML = `<div class="min-h-screen bg-gray-100"><header class="bg-white p-3 flex justify-between items-center"><h1 class="text-xl font-bold">${companyLogoBase64 ? `<img src="${companyLogoBase64}" class="h-8 inline">` : companyLogo} ${companyName}</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header><div class="flex overflow-x-auto border-b bg-white px-2">${['dashboard','bookings','employees','halls','clients','equipment','attendance','payroll','calendar','distribution','reports','advancedReports','notifications','users','trash','settings'].map(t=>`<button data-tab="${t}" class="tab-btn px-4 py-2 rounded-t-lg">${t==='dashboard'?'📊 الرئيسية':t==='bookings'?'📅 الحجوزات':t==='employees'?'👥 الموظفين':t==='halls'?'🏛️ القاعات':t==='clients'?'👥 العملاء':t==='equipment'?'📦 المعدات':t==='attendance'?'📋 الحضور':t==='payroll'?'💰 المرتبات':t==='calendar'?'📆 التقويم':t==='distribution'?'⚙️ التوزيع':t==='reports'?'📊 التقارير':t==='advancedReports'?'📈 تقارير متقدمة':t==='notifications'?'🔔 الإشعارات':t==='users'?'👥 المستخدمين':t==='trash'?'🗑️ سلة المحذوفات':'⚙️ الإعدادات'}</button>`).join('')}</div><main class="p-4"><div id="dashboard" class="tab-pane"><div class="grid grid-cols-4 gap-4"><div class="stat-card">الحجوزات: ${bookings.length}</div><div class="stat-card">الموظفين: ${employees.length}</div><div class="stat-card">العملاء: ${clients.length}</div><div class="stat-card">الإيرادات: ${bookings.reduce((s,b)=>s+b.price,0)}</div></div><canvas id="mainChart" height="100"></canvas></div>${['bookings','employees','halls','clients','equipment','attendance','payroll','calendar','distribution','reports','advancedReports','notifications','users','trash','settings'].map(t=>`<div id="${t}" class="tab-pane hidden"></div>`).join('')}</main><footer>درميديا برو بلس 2026</footer></div>`;
    document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.tab-pane').forEach(p=>p.classList.add('hidden')); const tab=btn.dataset.tab; document.getElementById(tab).classList.remove('hidden'); if(tab==='bookings') renderBookings(); else if(tab==='employees') renderEmployees(); else if(tab==='halls') renderHalls(); else if(tab==='clients') renderClients(); else if(tab==='equipment') renderEquipment(); else if(tab==='attendance') renderAttendance(); else if(tab==='payroll') renderPayroll(); else if(tab==='calendar') renderCalendar(); else if(tab==='distribution') renderDistribution(); else if(tab==='reports') { document.getElementById('reports').innerHTML = `<div class="bg-white p-4 rounded-2xl shadow"><button onclick="exportBackup()" class="btn-primary">تصدير نسخة احتياطية</button><button onclick="exportToExcel()" class="btn-secondary">تقرير الحجوزات Excel</button></div>`; } else if(tab==='advancedReports') { document.getElementById('advancedReports').innerHTML = `<div class="bg-white p-4 rounded-2xl shadow"><canvas id="advChart"></canvas></div><script>new Chart(document.getElementById('advChart'),{type:'line',data:{labels:['يناير','فبراير','مارس'],datasets:[{label:'الإيرادات',data:[10000,15000,20000]}]}});<\/script>`; } else if(tab==='notifications') renderNotificationsTab(); else if(tab==='users') renderUsers(); else if(tab==='trash') { document.getElementById('trash').innerHTML = `<div class="bg-white p-4 rounded-2xl shadow"><h2>سلة المحذوفات (${trashBin.length})</h2><div>${trashBin.map(t=>`<div>${t.type} - ${JSON.stringify(t.data).substring(0,50)} <button onclick="restoreItem(${t.id})" class="text-green-600">استعادة</button></div>`).join('')}</div></div>`; } else if(tab==='settings') renderSettings(); }));
    renderBookings(); renderEmployees(); renderHalls(); renderClients(); renderEquipment(); renderAttendance(); renderPayroll(); renderCalendar(); renderDistribution(); renderNotificationsTab(); renderUsers(); renderSettings();
    setTimeout(()=>{ try{ new Chart(document.getElementById('mainChart'), { type: 'bar', data: { labels: ['يناير','فبراير','مارس'], datasets: [{ label: 'الحجوزات', data: [5,8,12] }] } }); }catch(e){} },200);
}
function renderEmployeeDashboard() { const emp = employees.find(e=>e.id===currentUser.employeeId); document.getElementById('app').innerHTML = `<div class="min-h-screen bg-gray-100"><header class="bg-white p-3 flex justify-between"><h1>${companyLogoBase64 ? `<img src="${companyLogoBase64}" class="h-8">` : companyLogo} ${companyName}</h1><button onclick="logout()" class="btn-danger">خروج</button></header><main class="p-4"><div class="bg-white p-5 rounded-xl"><h2>مرحباً ${emp?.name}</h2><div class="grid grid-cols-2 gap-3"><div>الأوردرات: ${emp?.totalOrders}</div><div>المستحق: ${(emp?.totalOrders*emp?.salaryPerOrder).toLocaleString()}</div></div><button onclick="startEmployeeScan()" class="btn-primary w-full mt-4 py-3">مسح QR للحضور</button><div id="empAttendance"></div></div></main></div>`; renderAttendance(); }
function renderAgentDashboard() { document.getElementById('app').innerHTML = `<div class="min-h-screen bg-gray-100"><header class="bg-white p-3 flex justify-between"><h1>${companyLogoBase64 ? `<img src="${companyLogoBase64}" class="h-8">` : companyLogo} ${companyName} (وكيل)</h1><button onclick="logout()" class="btn-danger">خروج</button></header><main class="p-4"><div class="bg-white p-4 rounded"><h2>لوحة الوكيل</h2><button onclick="addBooking()" class="btn-primary">إضافة حجز</button><div id="agentBookings"></div></div></main></div>`; renderBookings(); }
function exportToExcel() { const ws = XLSX.utils.json_to_sheet(bookings.map(b=>({العميل:b.clientName,التاريخ:b.date,السعر:b.price,الحالة:b.status}))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'الحجوزات'); XLSX.writeFile(wb,`bookings_${new Date().toISOString().slice(0,10)}.xlsx`); showMsg("تم التصدير"); }
async function restoreItem(id) { const idx = trashBin.findIndex(t=>t.id===id); if(idx!==-1){ const item = trashBin[idx].data; const type = trashBin[idx].type; if(type==='booking') bookings.push(item); else if(type==='employee') employees.push(item); else if(type==='client') clients.push(item); trashBin.splice(idx,1); await saveAllData(); renderAdminDashboard(); showMsg("تمت الاستعادة"); } }
function renderLogin() { document.getElementById('app').innerHTML = `<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700"><div class="bg-white p-6 rounded-2xl w-96 text-center"><h1 class="text-3xl font-bold text-emerald-700">${companyLogoBase64 ? `<img src="${companyLogoBase64}" class="h-12 mx-auto">` : companyLogo} ${companyName}</h1><input id="loginUser" placeholder="اسم المستخدم" class="w-full border p-2 my-2 rounded"><input id="loginPass" type="password" placeholder="كلمة المرور" class="w-full border p-2 my-2 rounded"><button onclick="doLogin()" class="w-full bg-emerald-600 text-white py-2 rounded">دخول</button><div class="text-sm mt-4">admin: ahmed/1994 | employee: ahmed_emp/emp123 | agent: agent/agent123</div></div></div>`; }
function doLogin() { const u = document.getElementById('loginUser').value, p = document.getElementById('loginPass').value; const user = USERS.find(uu=>uu.username===u && uu.password===p); if(user) { currentUser = user; sessionStorage.setItem('drmedia_user', JSON.stringify(user)); if(user.role === 'admin') renderAdminDashboard(); else if(user.role === 'employee') renderEmployeeDashboard(); else if(user.role === 'agent') renderAgentDashboard(); showMsg(`مرحباً ${user.name}`); requestNotificationPermission(); } else showMsg("بيانات خاطئة"); }
function logout() { sessionStorage.removeItem('drmedia_user'); currentUser = null; renderLogin(); }
function requestNotificationPermission() { if('Notification' in window && Notification.permission === 'default') Notification.requestPermission(); }
window.onload = async () => { await loadAllData(); const saved = sessionStorage.getItem('drmedia_user'); if(saved) { currentUser = JSON.parse(saved); if(currentUser.role === 'admin') renderAdminDashboard(); else if(currentUser.role === 'employee') renderEmployeeDashboard(); else renderAgentDashboard(); } else renderLogin(); requestNotificationPermission(); scheduleBackup(); };
</script>
</body>
</html>
