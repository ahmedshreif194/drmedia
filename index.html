<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Media ERP CORE v1 | By Ahmed Shreif</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
body{font-family:Tahoma;background:#0b1220;color:#e5e7eb}
header{background:#0f172a;padding:12px;display:flex;justify-content:space-between;align-items:center}
.container{max-width:1100px;margin:auto;padding:15px}
.card{background:#111827;border:1px solid #1f2937;padding:12px;border-radius:12px;margin-bottom:10px}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:10px;background:#0b1220;color:#fff;border:1px solid #374151}
button{padding:10px;border-radius:10px;cursor:pointer}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
</style>
</head>
<body>

<header>
<h3>Dr Media ERP CORE v1</h3>
<div>Ahmed Shreif</div>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>تسجيل الدخول</h3>
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()" style="background:#16a34a;color:#fff;width:100%">دخول</button>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none">

<div class="row">
<div class="card">👥 موظفين <h2 id="empCount"></h2></div>
<div class="card">📦 أوردرات <h2 id="orderCount"></h2></div>
<div class="card">💰 إجمالي <h2 id="income"></h2></div>
<div class="card">⚙️ النظام <h2>CORE ACTIVE</h2></div>
</div>

<div class="card">
<h3>➕ إضافة أوردر</h3>
<input id="client" placeholder="العميل">
<input id="date" type="date">
<input id="price" placeholder="السعر">
<select id="hall">
<option value="closed">مغلقة</option>
<option value="open">أوبن</option>
<option value="cafe">كافيه</option>
</select>
<button onclick="addOrder()" style="background:#2563eb;color:#fff;width:100%">إضافة</button>
</div>

<div class="card">
<h3>📦 الأوردرات</h3>
<div id="orders"></div>
</div>

</div>

<!-- EMPLOYEE -->
<div id="employee" style="display:none">
<div class="card">
<h3>📋 أوردراتي</h3>
<div id="myOrders"></div>
</div>
</div>

</div>

<script>
// ================= FIREBASE =================
const db=firebase.initializeApp({
apiKey:"AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
authDomain:"drmedia-vpms.firebaseapp.com",
databaseURL:"https://drmedia-vpms-default-rtdb.firebaseio.com",
projectId:"drmedia-vpms"
}).database();

// ================= CORE DATA =================
let users=[
{u:"admin",p:"123",role:"admin"},
{u:"emp1",p:"123",role:"emp"},
{u:"emp2",p:"123",role:"emp"}
];

let employees=[
{name:"emp1",role:"مخرج",load:0},
{name:"emp2",role:"مصور",load:0}
];

let orders=[];
let currentUser=null;

// ================= RULE ENGINE (FIXED) =================
function getRequiredStaff(hall){
if(hall=="closed") return ["مخرج","مصور","مصور","كرين"];
if(hall=="open") return ["مخرج","مصور","مصور","كرين"];
if(hall=="cafe") return ["مصور"];
return [];
}

// ================= ASSIGN ENGINE =================
function assignEmployee(role){
let pool=employees.filter(e=>e.role==role);
pool.sort((a,b)=>a.load-b.load);
if(pool.length==0) return null;
pool[0].load++;
return pool[0].name;
}

function autoAssign(order){
let roles=getRequiredStaff(order.hall);
let assigned=[];
roles.forEach(r=>{
let emp=assignEmployee(r);
if(emp) assigned.push(emp);
});
return assigned;
}

// ================= CORE FUNCTIONS =================
function addOrder(){
let o={
id:Date.now(),
client:client.value,
date:date.value,
price:+price.value,
hall:hall.value
};

o.emp=autoAssign(o);
orders.push(o);

db.ref("orders").set(orders);
render();
}

function login(){
let f=users.find(x=>x.u==user.value&&x.p==pass.value);
if(!f)return alert("error");
currentUser=f;
loginBox.style.display="none";
admin.style.display=f.role=="admin"?"block":"none";
employee.style.display=f.role=="emp"?"block":"none";
listen();
}

// ================= REALTIME =================
function listen(){
db.ref("orders").on("value",s=>{
orders=[];
s.forEach(c=>orders.push(c.val()));
render();
});
}

// ================= RENDER =================
function render(){

if(currentUser.role=="admin"){
empCount.innerText=employees.length;
orderCount.innerText=orders.length;
income.innerText=orders.reduce((s,o)=>s+o.price,0);

ordersHTML=orders.map(o=>`
<div class='card'>
<b>${o.client}</b><br>
${o.hall}<br>
💰 ${o.price}<br>
👷 ${o.emp.join?o.emp.join(", "):o.emp}
</div>
`).join("");

document.getElementById("orders").innerHTML=ordersHTML;
}

else{
let my=orders.filter(o=>o.emp.includes?o.emp.includes(currentUser.u):o.emp==currentUser.u);
document.getElementById("myOrders").innerHTML=my.map(o=>`
<div class='card'>
${o.client} | ${o.date} | ${o.price}
</div>
`).join("");
}
}
</script>

</body>
</html>
