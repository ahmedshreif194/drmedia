<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drmedia Pro Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 40px; z-index: 10000; display: none; white-space: nowrap; }
        .toast.show { display: block; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1100; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content { background: white; border-radius: 24px; max-width: 550px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 24px; }
        .tab-btn { padding: 8px 16px; border-radius: 12px 12px 0 0; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background-color: #16a34a; color: white; }
        .btn-primary { background-color: #16a34a; color: white; padding: 6px 12px; border-radius: 12px; border: none; cursor: pointer; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-completed { background: #d1fae5; color: #065f46; }
    </style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>
<div id="app"></div>

<script>
// ======================== البيانات الأساسية ========================
let users = [
    { username: 'ahmed', password: '1994', role: 'admin', name: 'مدير النظام' },
    { username: 'ahmed_emp', password: 'emp123', role: 'employee', employeeId: 'emp1', name: 'أحمد علي' }
];
let bookings = [];
let employees = [
    { id: 'emp1', name: 'أحمد علي', role: 'مخرج', phone: '01001234567', salaryPerOrder: 300, active: true, totalOrders: 0 },
    { id: 'emp2', name: 'محمود حسن', role: 'مصور', phone: '01002345678', salaryPerOrder: 200, active: true, totalOrders: 0 },
    { id: 'emp3', name: 'سامر خالد', role: 'كرين', phone: '01003456789', salaryPerOrder: 250, active: true, totalOrders: 0 }
];
let halls = [
    { id: 'h1', name: 'القاعة المغلقة', type: 'closed', active: true },
    { id: 'h2', name: 'القاعة المفتوحة', type: 'open', active: true },
    { id: 'h3', name: 'الكافيه', type: 'cafe', active: true }
];
let clients = [];
let equipmentInventory = {};
let attendanceRecords = [];
let swapRequests = [];
let payrollArchive = [];
let employeeLoans = {};
let notifications = [];
let currentUser = null;
let companyName = 'Drmedia Pro Plus';
let companyLogo = '📷';

// ======================== دوال مساعدة ========================
function showMsg(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function openModal(content) { document.getElementById('modalContent').innerHTML = content; document.getElementById('modal').classList.add('show'); }
function saveAllData() {
    const data = { bookings, employees, halls, clients, equipmentInventory, attendanceRecords, swapRequests, payrollArchive, employeeLoans, notifications, users, companyName, companyLogo };
    localStorage.setItem('drmedia_data', JSON.stringify(data));
}
function loadAllData() {
    const raw = localStorage.getItem('drmedia_data');
    if (raw) {
        try {
            const data = JSON.parse(raw);
            bookings = data.bookings || [];
            employees = data.employees || [];
            halls = data.halls || [];
            clients = data.clients || [];
            equipmentInventory = data.equipmentInventory || {};
            attendanceRecords = data.attendanceRecords || [];
            swapRequests = data.swapRequests || [];
            payrollArchive = data.payrollArchive || [];
            employeeLoans = data.employeeLoans || {};
            notifications = data.notifications || [];
            users = data.users || users;
            companyName = data.companyName || companyName;
            companyLogo = data.companyLogo || companyLogo;
        } catch(e) {}
    }
    updateEmployeeOrders();
}
function updateEmployeeOrders() {
    const active = bookings.filter(b => b.status !== 'cancelled');
    employees.forEach(e => e.totalOrders = active.filter(b => (b.assignedEmployees || []).includes(e.id)).length);
}
function getEmployeeOrdersInPeriod(empId, start, end) {
    return bookings.filter(b => b.status !== 'cancelled' && (b.assignedEmployees || []).includes(empId) && new Date(b.date) >= start && new Date(b.date) <= end).length;
}

// ======================== الحجوزات ========================
function addBooking() {
    const name = prompt('اسم العميل');
    const hallId = prompt('معرف القاعة (h1/h2/h3)');
    const price = parseInt(prompt('السعر'));
    if (name && hallId && price) {
        const hall = halls.find(h => h.id === hallId);
        if (hall) {
            bookings.push({
                id: 'b' + Date.now(),
                clientName: name,
                phone: '',
                hallId: hall.id,
                hallName: hall.name,
                date: new Date().toISOString().slice(0,10),
                price: price,
                status: 'pending',
                paymentStatus: 'pending',
                assignedEmployees: []
            });
            saveAllData();
            renderBookings();
            showMsg('✅ تمت الإضافة');
        } else alert('قاعة غير موجودة');
    }
}
function markComplete(id) {
    const b = bookings.find(x => x.id === id);
    if (b) { b.status = 'completed'; b.paymentStatus = 'paid'; saveAllData(); renderBookings(); showMsg('✅ تم الإكمال'); }
}
function deleteBooking(id) {
    if (confirm('حذف الحجز؟')) { bookings = bookings.filter(b => b.id !== id); saveAllData(); renderBookings(); showMsg('🗑️ تم الحذف'); }
}
function renderBookings() {
    const container = document.getElementById('bookings');
    if (!container) return;
    const filtered = bookings.filter(b => b.status !== 'cancelled');
    container.innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">📅 الحجوزات (${filtered.length})</h2><button onclick="addBooking()" class="btn-primary mb-3">+ حجز جديد</button>
        <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th><th>الحالة</th><th></th></tr></thead><tbody>${filtered.map(b => `<tr><td class="p-2">${b.clientName}</td><td class="p-2">${b.date}</td><td class="p-2">${b.hallName}</td><td class="p-2">${b.price} ج.م</td><td class="p-2"><span class="status-badge ${b.status==='pending'?'status-pending':'status-completed'}">${b.status}</span></td><td class="p-2"><button onclick="markComplete('${b.id}')" class="text-green-600">إكمال</button> <button onclick="deleteBooking('${b.id}')" class="text-red-600">حذف</button></td></tr>`).join('')}</tbody></table></div></div>`;
}

// ======================== الموظفين ========================
function renderEmployees() {
    const container = document.getElementById('employees');
    if (!container) return;
    updateEmployeeOrders();
    container.innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">👥 الموظفين</h2>
        <div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الاسم</th><th>الدور</th><th>الهاتف</th><th>الأوردرات</th><th>المستحق</th></tr></thead><tbody>${employees.map(e => `<tr><td class="p-2">${e.name}</td><td class="p-2">${e.role}</td><td class="p-2">${e.phone}</td><td class="p-2">${e.totalOrders || 0}</td><td class="p-2 text-emerald-600">${((e.totalOrders||0)*e.salaryPerOrder).toLocaleString()} ج.م</td></tr>`).join('')}</tbody></table></div></div>`;
}

// ======================== القاعات ========================
function renderHalls() {
    const container = document.getElementById('halls');
    if (!container) return;
    container.innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">🏛️ القاعات</h2>
        <div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الاسم</th><th>النوع</th><th>الحالة</th><th>الحجوزات</th></tr></thead><tbody>${halls.map(h => `<tr><td class="p-2">${h.name}</td><td class="p-2">${h.type}</td><td class="p-2">${h.active?'نشطة':'غير نشطة'}</td><td class="p-2">${bookings.filter(b => b.hallId === h.id && b.status !== 'cancelled').length}</td></tr>`).join('')}</tbody></table></div></div>`;
}

// ======================== الحضور والانصراف ========================
function getTodayDateStr() { return new Date().toISOString().slice(0,10); }
function getTodayAttendance(empId) { return attendanceRecords.find(a => a.empId === empId && a.date === getTodayDateStr()); }
function checkIn(empId) {
    const today = getTodayDateStr();
    const existing = getTodayAttendance(empId);
    if (existing && existing.checkIn) return showMsg('⚠️ تم تسجيل الحضور مسبقاً');
    const time = new Date().toLocaleTimeString('ar-EG');
    if (existing) { existing.checkIn = time; existing.status = 'present'; }
    else { attendanceRecords.push({ id: Date.now(), empId, date: today, checkIn: time, checkOut: null, status: 'present' }); }
    saveAllData();
    renderAttendance();
    showMsg(`✅ تم تسجيل حضور الساعة ${time}`);
}
function checkOut(empId) {
    const rec = getTodayAttendance(empId);
    if (!rec || !rec.checkIn) return showMsg('⚠️ لم يتم تسجيل الحضور بعد');
    if (rec.checkOut) return showMsg('⚠️ تم تسجيل الانصراف مسبقاً');
    rec.checkOut = new Date().toLocaleTimeString('ar-EG');
    saveAllData();
    renderAttendance();
    showMsg(`✅ تم تسجيل الانصراف الساعة ${rec.checkOut}`);
}
function showQrModal(empId, empName) {
    const qrData = `emp_attendance_${empId}`;
    openModal(`
        <h3 class="text-xl font-bold mb-4">📱 مسح QR للحضور/الانصراف</h3>
        <p>الموظف: <strong>${empName}</strong></p>
        <div id="qrCode" class="flex justify-center my-4"></div>
        <div class="flex gap-2 mt-4"><button onclick="checkIn('${empId}');closeModal();" class="btn-primary px-4 py-2 rounded">تسجيل حضور</button><button onclick="checkOut('${empId}');closeModal();" class="bg-amber-600 text-white px-4 py-2 rounded">تسجيل انصراف</button></div>
    `);
    setTimeout(() => { new QRCode(document.getElementById("qrCode"), { text: qrData, width: 200, height: 200 }); }, 100);
}
function renderAttendance() {
    const container = document.getElementById('attendance');
    if (!container) return;
    const emp = employees.find(e => e.id === currentUser?.employeeId);
    const todayRec = emp ? getTodayAttendance(emp.id) : null;
    const myAttendance = attendanceRecords.filter(a => a.empId === emp?.id).sort((a,b)=>b.date.localeCompare(a.date));
    container.innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow"><h2 class="text-xl font-bold mb-4">📋 الحضور والانصراف</h2>
        ${currentUser?.role === 'employee' ? `
            <div class="mb-4 p-3 border rounded-xl bg-green-50">
                <div class="flex gap-2"><button onclick="showQrModal('${emp.id}','${emp.name}')" class="btn-primary text-sm">📱 عرض QR</button><button onclick="checkIn('${emp.id}')" class="btn-primary">حضور</button><button onclick="checkOut('${emp.id}')" class="bg-amber-600 text-white px-4 py-2 rounded">انصراف</button></div>
                <div class="mt-2">حالة اليوم: ${todayRec ? (todayRec.checkOut ? '✅ تم الحضور والانصراف' : '🟢 تم الحضور فقط') : '❌ لم يتم التسجيل'}</div>
            </div>
        ` : ''}
        <h3 class="font-bold">سجل الحضور السابق</h3><table class="w-full text-sm"><thead><tr><th>التاريخ</th><th>الحضور</th><th>الانصراف</th></tr></thead><tbody>${myAttendance.map(a => `<td><td class="p-2">${a.date}</td><td class="p-2">${a.checkIn || '-'}</td><td class="p-2">${a.checkOut || '-'}</td></tr>`).join('') || '}<tr><td colspan="3" class="text-center">لا توجد سجلات</td></tr>'}</tbody></table></div>`;
}

// ======================== المرتبات ========================
function renderPayroll() {
    const container = document.getElementById('payroll');
    if (!container) return;
    let loansHtml = '';
    for (let empId in employeeLoans) {
        const emp = employees.find(e=>e.id===empId);
        const total = employeeLoans[empId].reduce((s,l)=>s+l.amount,0);
        loansHtml += `<div><strong>${emp?.name||empId}</strong>: ${total.toLocaleString()} ج.م</div>`;
    }
    container.innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow"><h2 class="text-xl font-bold mb-4">💰 المرتبات</h2>
        <div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الموظف</th><th>الأوردرات</th><th>سعر الأوردر</th><th>الإجمالي</th></tr></thead><tbody>${employees.map(e => `<tr><td class="p-2">${e.name}</td><td class="p-2">${e.totalOrders||0}</td><td class="p-2">${e.salaryPerOrder}</td><td class="p-2 font-bold">${((e.totalOrders||0)*e.salaryPerOrder).toLocaleString()} ج.م</td></tr>`).join('')}</tbody></table></div>
        <div class="mt-4"><button onclick="showAddLoanModal()" class="btn-primary">+ تسجيل سلفة</button><div id="loansSection">${loansHtml || 'لا توجد سلف'}</div></div>
        <div class="mt-4"><div class="flex gap-2"><button onclick="renderPayrollPeriod(0)" class="btn-primary text-sm">1-10</button><button onclick="renderPayrollPeriod(1)" class="btn-primary text-sm">11-20</button><button onclick="renderPayrollPeriod(2)" class="btn-primary text-sm">21-نهاية</button></div><div id="payrollPeriodDetail"></div></div>
        <div class="mt-4"><h3 class="font-bold">سجل الصرفيات</h3><div id="payrollArchiveList" class="max-h-40 overflow-y-auto border rounded p-1">${payrollArchive.slice().reverse().map(p=>`<div>${p.date} - ${employees.find(e=>e.id===p.empId)?.name} : ${p.amount.toLocaleString()} ج.م</div>`).join('')||'لا توجد صرفيات'}</div></div>
        </div>`;
}
function renderPayrollPeriod(pi) {
    const now = new Date();
    let start, end;
    if(pi===0){ start=new Date(now.getFullYear(), now.getMonth(), 1); end=new Date(now.getFullYear(), now.getMonth(), 10); }
    else if(pi===1){ start=new Date(now.getFullYear(), now.getMonth(), 11); end=new Date(now.getFullYear(), now.getMonth(), 20); }
    else{ start=new Date(now.getFullYear(), now.getMonth(), 21); end=new Date(now.getFullYear(), now.getMonth()+1, 0); }
    let html = `<div class="mt-2"><table class="w-full text-sm"><thead><tr><th>الموظف</th><th>أوردرات الفترة</th><th>المستحق</th><th>السلف</th><th>الصافي</th><th></th></tr></thead><tbody>`;
    employees.forEach(e => {
        const orders = getEmployeeOrdersInPeriod(e.id, start, end);
        const salary = orders * e.salaryPerOrder;
        const loans = (employeeLoans[e.id] || []).reduce((s,l)=>s+l.amount,0);
        const net = salary - loans;
        html += `<tr><td>${e.name}</td><td>${orders}</td><td>${salary.toLocaleString()}</td><td class="text-red-500">${loans.toLocaleString()}</td><td class="font-bold">${net.toLocaleString()} ج.م</td><td><button onclick="payEmployee('${e.id}',${pi})" class="btn-primary text-white px-2 py-1 rounded text-xs">صرف</button></td></tr>`;
    });
    html += `</tbody></table></div>`;
    document.getElementById('payrollPeriodDetail').innerHTML = html;
}
function showAddLoanModal() {
    openModal(`<h3 class="text-xl font-bold mb-4">سلفة جديدة</h3><select id="loanEmpId">${employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select><input type="number" id="loanAmount" placeholder="المبلغ"><input type="date" id="loanDate"><input id="loanReason" placeholder="السبب"><button onclick="saveLoan()" class="btn-primary w-full mt-2">تسجيل</button>`);
}
function saveLoan() {
    const empId = document.getElementById('loanEmpId').value;
    const amount = parseInt(document.getElementById('loanAmount').value);
    const date = document.getElementById('loanDate').value || new Date().toISOString().slice(0,10);
    if (!empId || !amount) return showMsg('⚠️ أكمل البيانات');
    if (!employeeLoans[empId]) employeeLoans[empId] = [];
    employeeLoans[empId].push({ id: Date.now(), amount, date, reason: document.getElementById('loanReason').value });
    saveAllData();
    closeModal();
    renderPayroll();
    showMsg('✅ تمت السلفة');
}
function payEmployee(empId, pi) {
    const now = new Date();
    let start, end;
    if(pi===0){ start=new Date(now.getFullYear(), now.getMonth(), 1); end=new Date(now.getFullYear(), now.getMonth(), 10); }
    else if(pi===1){ start=new Date(now.getFullYear(), now.getMonth(), 11); end=new Date(now.getFullYear(), now.getMonth(), 20); }
    else{ start=new Date(now.getFullYear(), now.getMonth(), 21); end=new Date(now.getFullYear(), now.getMonth()+1, 0); }
    const emp = employees.find(e=>e.id===empId);
    const orders = getEmployeeOrdersInPeriod(empId, start, end);
    const salary = orders * emp.salaryPerOrder;
    const loans = (employeeLoans[empId] || []).reduce((s,l)=>s+l.amount,0);
    const net = salary - loans;
    if(confirm(`صرف ${net.toLocaleString()} ج.م لـ ${emp.name}؟`)){
        payrollArchive.push({ id: Date.now(), empId, amount: net, orders, date: now.toISOString().slice(0,10) });
        if(employeeLoans[empId]) delete employeeLoans[empId];
        saveAllData();
        renderPayroll();
        showMsg(`✅ تم صرف ${net.toLocaleString()} ج.م للموظف ${emp.name}`);
    }
}

// ======================== واجهة المدير ========================
function renderAdminDashboard() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-gray-100">
            <header class="bg-white shadow p-3 flex justify-between"><h1 class="text-xl font-bold">${companyLogo} ${companyName}</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header>
            <div class="flex overflow-x-auto border-b bg-white px-2">
                <button data-tab="dashboard" class="tab-btn active">📊 الرئيسية</button>
                <button data-tab="bookings" class="tab-btn">📅 الحجوزات</button>
                <button data-tab="employees" class="tab-btn">👥 الموظفين</button>
                <button data-tab="halls" class="tab-btn">🏛️ القاعات</button>
                <button data-tab="attendance" class="tab-btn">📋 الحضور</button>
                <button data-tab="payroll" class="tab-btn">💰 المرتبات</button>
                <button data-tab="settings" class="tab-btn">⚙️ الإعدادات</button>
            </div>
            <main class="p-4 max-w-7xl mx-auto">
                <div id="dashboard" class="tab-pane"><div class="bg-white p-4 rounded shadow"><h2 class="text-xl font-bold">مرحباً أيها المدير</h2><p>هذه لوحة التحكم الرئيسية</p><button onclick="addBooking()" class="btn-primary mt-2">+ حجز جديد</button></div></div>
                <div id="bookings" class="tab-pane hidden"></div>
                <div id="employees" class="tab-pane hidden"></div>
                <div id="halls" class="tab-pane hidden"></div>
                <div id="attendance" class="tab-pane hidden"></div>
                <div id="payroll" class="tab-pane hidden"></div>
                <div id="settings" class="tab-pane hidden"></div>
            </main>
        </div>`;
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
            if (tab === 'bookings') renderBookings();
            if (tab === 'employees') renderEmployees();
            if (tab === 'halls') renderHalls();
            if (tab === 'attendance') renderAttendance();
            if (tab === 'payroll') renderPayroll();
            if (tab === 'settings') renderSettings();
        });
    });
    renderBookings(); renderEmployees(); renderHalls(); renderAttendance(); renderPayroll(); renderSettings();
}

function renderEmployeeDashboard() {
    const emp = employees.find(e => e.id === currentUser.employeeId);
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-gray-100"><header class="bg-white p-3 flex justify-between"><h1 class="text-xl font-bold">${companyLogo} ${companyName}</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header>
        <main class="p-4 max-w-md mx-auto"><div class="bg-white p-5 rounded-xl shadow"><h2 class="text-2xl font-bold">مرحباً ${emp?.name}</h2><div class="grid grid-cols-2 gap-3 mt-4"><div><div class="text-3xl font-bold text-emerald-600">${emp?.totalOrders || 0}</div><div>أوردرات</div></div><div><div class="text-3xl font-bold text-blue-600">${((emp?.totalOrders || 0) * (emp?.salaryPerOrder || 0)).toLocaleString()} ج.م</div><div>المستحق</div></div></div><button onclick="showQrModal('${emp?.id}','${emp?.name}')" class="btn-primary w-full mt-4">📋 تسجيل الحضور QR</button><button onclick="location.reload()" class="btn-primary w-full mt-2">تحديث</button></div></main></div>`;
}

function renderSettings() {
    document.getElementById('settings').innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow"><h2 class="text-xl font-bold mb-4">⚙️ الإعدادات</h2>
        <div><label>اسم الشركة</label><input type="text" id="companyNameInput" value="${companyName}" class="w-full border rounded p-2 mb-2"></div>
        <div><label>شعار (نص)</label><input type="text" id="companyLogoInput" value="${companyLogo}" class="w-full border rounded p-2 mb-2"></div>
        <button onclick="updateSettings()" class="btn-primary w-full">💾 حفظ</button>
        <hr class="my-4"><button onclick="resetAllData()" class="bg-red-700 text-white w-full py-2 rounded">⚠️ إعادة ضبط البيانات</button>
        </div>`;
}
function updateSettings() {
    companyName = document.getElementById('companyNameInput').value;
    companyLogo = document.getElementById('companyLogoInput').value;
    saveAllData();
    showMsg('✅ تم حفظ الإعدادات');
    if (currentUser?.role === 'admin') renderAdminDashboard();
    else renderEmployeeDashboard();
}
function resetAllData() { if (confirm('مسح كل البيانات؟')) { localStorage.clear(); location.reload(); } }

// ======================== تسجيل الدخول ========================
function showLogin() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700 p-4">
            <div class="bg-white p-6 rounded-2xl w-full max-w-md text-center shadow-2xl">
                <h1 class="text-3xl font-bold text-emerald-700 mb-2">${companyLogo} ${companyName}</h1>
                <p class="text-gray-500 mb-6">نظام إدارة القاعات الذكي</p>
                <input type="text" id="loginUser" placeholder="اسم المستخدم" class="w-full border p-3 rounded-xl mb-3">
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full border p-3 rounded-xl mb-2">
                <button onclick="doLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">دخول</button>
                <div class="mt-4 text-sm text-gray-400"><p>المدير: <strong>ahmed</strong> / <strong>1994</strong></p><p>الموظف: <strong>ahmed_emp</strong> / <strong>emp123</strong></p></div>
            </div>
        </div>`;
}
function doLogin() {
    const un = document.getElementById('loginUser').value.trim();
    const pw = document.getElementById('loginPass').value;
    const user = users.find(u => u.username === un && u.password == pw);
    if (user) {
        currentUser = user;
        sessionStorage.setItem('drmedia_user', JSON.stringify(user));
        if (user.role === 'admin') renderAdminDashboard();
        else renderEmployeeDashboard();
        showMsg(`مرحباً ${user.name}`);
    } else {
        showMsg('❌ بيانات غير صحيحة');
    }
}
function logout() {
    sessionStorage.removeItem('drmedia_user');
    currentUser = null;
    showLogin();
    showMsg('تم تسجيل الخروج');
}

// ======================== بدء التشغيل ========================
loadAllData();
const saved = sessionStorage.getItem('drmedia_user');
if (saved) {
    try {
        currentUser = JSON.parse(saved);
        if (currentUser.role === 'admin') renderAdminDashboard();
        else renderEmployeeDashboard();
    } catch(e) { showLogin(); }
} else {
    showLogin();
}
</script>
