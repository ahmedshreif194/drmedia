<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drmedia Pro | تسجيل الدخول</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* أنماط بسيطة لتسجيل الدخول */
    .login-container {
      min-height: 100vh;
      background: linear-gradient(135deg, #065f46, #047857);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: white;
      border-radius: 1.5rem;
      padding: 2rem;
      width: 100%;
      max-width: 28rem;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
      text-align: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, #065f46, #047857);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-weight: 600;
      width: 100%;
      transition: 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); }
    input { border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0.75rem; width: 100%; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <!-- تم إزالة preloader تمامًا، وسيظهر نموذج الدخول مباشرة -->
  <div id="app"></div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
      authDomain: "drmedia-vpms.firebaseapp.com",
      databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
      projectId: "drmedia-vpms",
      storageBucket: "drmedia-vpms.firebasestorage.app",
      messagingSenderId: "681162512380",
      appId: "1:681162512380:web:ab2482f3234d8b59fc4479"
    };
    // Initialize Firebase early
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Data stores
    let bookings = [], employees = [], users = [], halls = [], notifications = [], swapRequests = [], payrollArchive = [], employeeLoans = {}, equipmentInventory = {};
    let currentUser = null;
    let companyName = 'Drmedia Pro', companyLogo = '📷', whatsappNumber = '';
    let themeSettings = { primaryColor: '#065f46', darkMode: false };
    let emergencyMode = false;
    let rotationPointers = { dPtr:0, pPtr:0, cPtr:0 };
    let autoBackupInterval = null;
    const BACKUP_INTERVAL_MS = 2 * 60 * 60 * 1000;
    let dataReady = false;
    
    // Helper functions (minimal for login)
    function showMsg(msg, type='success') { alert(msg); } // فقط للتجربة
    function saveAllData() { /* سيتم تنفيذها لاحقًا */ }
    
    // ======================== عرض نموذج الدخول فورًا ========================
    function showLogin() {
      document.getElementById('app').innerHTML = `
        <div class="login-container">
          <div class="login-card">
            <h1 class="text-2xl font-bold text-emerald-800 mb-2">${companyLogo} ${companyName}</h1>
            <p class="text-gray-500 mb-6">نظام إدارة القاعات</p>
            <input type="text" id="loginUser" placeholder="اسم المستخدم" autocomplete="username">
            <input type="password" id="loginPass" placeholder="كلمة المرور" autocomplete="current-password">
            <button onclick="doLogin()" class="btn-primary mb-3">دخول</button>
            <button onclick="loginWithBiometric()" class="w-full border-2 border-emerald-600 text-emerald-700 py-3 rounded-xl flex items-center justify-center gap-2">
              <i class="fas fa-fingerprint"></i> دخول بالبصمة
            </button>
            <div class="text-center text-xs text-gray-400 mt-6">© ${companyName}</div>
          </div>
        </div>
      `;
    }
    
    // دالة الدخول
    function doLogin() {
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;
      const user = users.find(u => u.username === username && u.password === password);
      if (user) {
        currentUser = user;
        sessionStorage.setItem('vpms_user', JSON.stringify(user));
        loadMainApp();  // تحميل لوحة التحكم
      } else {
        alert('اسم المستخدم أو كلمة المرور غير صحيحة');
      }
    }
    
    // الدخول بالبصمة (محاكاة مبسطة)
    async function loginWithBiometric() {
      if (!window.PublicKeyCredential) {
        alert("جهازك لا يدعم البصمة");
        return;
      }
      try {
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);
        const credential = await navigator.credentials.get({
          publicKey: { challenge, allowCredentials: [], timeout: 60000, userVerification: 'required' }
        });
        if (credential) {
          const firstEmp = users.find(u => u.role === 'employee');
          if (firstEmp) {
            currentUser = firstEmp;
            sessionStorage.setItem('vpms_user', JSON.stringify(firstEmp));
            loadMainApp();
          } else alert("لا يوجد حساب موظف");
        }
      } catch(e) { alert("فشل التعرف على البصمة"); }
    }
    
    // ======================== تحميل البيانات من Firebase ========================
    function loadFirebaseData(callback) {
      let loaded = 0;
      const total = 11;
      function checkDone() {
        loaded++;
        if (loaded === total) {
          dataReady = true;
          if (callback) callback();
        }
      }
      db.ref('bookings').on('value', snap => { bookings = snap.val() || []; checkDone(); });
      db.ref('employees').on('value', snap => { employees = snap.val() || []; checkDone(); });
      db.ref('users').on('value', snap => { users = snap.val() || []; checkDone(); });
      db.ref('halls').on('value', snap => { halls = snap.val() || []; checkDone(); });
      db.ref('notifications').on('value', snap => { notifications = snap.val() || []; checkDone(); });
      db.ref('swapRequests').on('value', snap => { swapRequests = snap.val() || []; checkDone(); });
      db.ref('payrollArchive').on('value', snap => { payrollArchive = snap.val() || []; checkDone(); });
      db.ref('employeeLoans').on('value', snap => { employeeLoans = snap.val() || {}; checkDone(); });
      db.ref('equipmentInventory').on('value', snap => { equipmentInventory = snap.val() || {}; checkDone(); });
      db.ref('companySettings').on('value', snap => {
        let v = snap.val();
        if (v) {
          companyName = v.companyName || 'Drmedia Pro';
          companyLogo = v.companyLogo || '📷';
          whatsappNumber = v.whatsappNumber || '';
          if (v.themeSettings) themeSettings = v.themeSettings;
        }
        checkDone();
      });
      db.ref('emergencyMode').on('value', snap => { emergencyMode = snap.val() === true; checkDone(); });
    }
    
    // تهيئة بيانات افتراضية إذا كانت فارغة
    function initDefaultData() {
      if (!halls.length) halls = [
        {id:'hall1',name:'المغلقة',type:'closed',active:true},
        {id:'hall2',name:'الأوبن',type:'open',active:true},
        {id:'hall3',name:'الكافيه',type:'cafe',active:true}
      ];
      if (!employees.length) employees = [
        {id:'emp1',name:'أحمد علي',role:'مخرج',phone:'01001234567',salaryPerOrder:300,active:true,totalOrders:0},
        {id:'emp2',name:'محمود حسن',role:'مخرج',phone:'01002345678',salaryPerOrder:300,active:true,totalOrders:0}
      ];
      if (!users.length) users = [
        {username:'admin',password:'admin123',role:'admin',name:'مدير النظام'},
        {username:'ahmed',password:'emp123',role:'employee',employeeId:'emp1',name:'أحمد علي'}
      ];
      if (!bookings.length) bookings = [{
        id:'b1', clientName:'محمد عبدالله', phone:'01012345678', hallId:'hall1', hallName:'المغلقة',
        date: new Date(new Date().getTime()+86400000).toISOString().slice(0,10),
        price:5000, deposit:2000, assignedEmployees:[], status:'pending', paymentStatus:'pending'
      }];
      if (!Object.keys(equipmentInventory).length) equipmentInventory = { cam1:{name:'كاميرا Sony', quantity:3, minStock:1, category:'تصوير'} };
      saveAllData();
    }
    
    // ======================== التطبيق الرئيسي بعد الدخول ========================
    function loadMainApp() {
      if (!dataReady) {
        // إذا لم تكن البيانات جاهزة بعد، ننتظر لحظة ثم نعيد المحاولة
        setTimeout(() => loadMainApp(), 500);
        return;
      }
      if (!bookings.length && !employees.length && !halls.length) initDefaultData();
      // تجهيز الحجوزات
      bookings.forEach(b => { if (!b.status) b.status='pending'; if (!b.assignedEmployees) b.assignedEmployees=[]; });
      // الآن يتم عرض لوحة التحكم حسب الدور
      if (currentUser.role === 'admin') renderAdminDashboard();
      else renderEmployeeDashboard();
    }
    
    function renderAdminDashboard() {
      document.getElementById('app').innerHTML = `<div class="p-4"><h1 class="text-2xl font-bold">مرحبًا ${currentUser.name}</h1><p>لوحة المدير (سيتم تفعيل جميع الميزات قريبًا)</p><button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-xl mt-4">تسجيل الخروج</button></div>`;
    }
    function renderEmployeeDashboard() {
      document.getElementById('app').innerHTML = `<div class="p-4"><h1 class="text-2xl font-bold">مرحبًا موظف</h1><button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-xl">تسجيل الخروج</button></div>`;
    }
    function logout() {
      sessionStorage.removeItem('vpms_user');
      currentUser = null;
      showLogin();
    }
    
    // بدء التطبيق: عرض نموذج الدخول فوراً، ثم تحميل البيانات في الخلفية
    showLogin();
    loadFirebaseData(() => {
      // عند اكتمال البيانات، إذا كان هناك مستخدم مسجل مسبقًا في sessionStorage، قم بتحميل التطبيق
      const saved = sessionStorage.getItem('vpms_user');
      if (saved) {
        currentUser = JSON.parse(saved);
        loadMainApp();
      }
    });
    
    // تعريف الدوال المطلوبة عالميًا للنقرات
    window.doLogin = doLogin;
    window.loginWithBiometric = loginWithBiometric;
    window.logout = logout;
  </script>
</body>
</html>
