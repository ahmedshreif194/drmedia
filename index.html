<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drmedia Pro Plus V3 FIXED</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { font-family: Arial; }
.toast{
position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:#111;color:#fff;padding:10px 20px;border-radius:20px;display:none;
}
.toast.show{display:block;}
.hidden{display:none;}
.tab-btn{padding:8px 12px;cursor:pointer}
.tab-btn.active{background:#16a34a;color:#fff;border-radius:10px}
</style>
</head>

<body>

<div id="toast" class="toast"></div>
<div id="app"></div>

<script>
// ================= DATA =================
let users = [
{ username:"ahmed", password:"1994", role:"admin", name:"مدير النظام", employeeId:null },
{ username:"ahmed_emp", password:"emp123", role:"employee", name:"أحمد علي", employeeId:"emp1" }
];

let employees = [];
let bookings = [];
let halls = [];
let clients = [];

let currentUser = null;
let currentTab = "dashboard";

// ================= INIT =================
function showMsg(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),3000);
}

function save(){
localStorage.setItem("drmedia",JSON.stringify({employees,bookings,halls,clients}));
}

function load(){
let d=JSON.parse(localStorage.getItem("drmedia")||"{}");
employees=d.employees||[
{id:"emp1",name:"أحمد علي",role:"مخرج",salary:300,orders:0},
{id:"emp2",name:"محمد",role:"مصور",salary:200,orders:0}
];
bookings=d.bookings||[];
halls=d.halls||[
{id:"h1",name:"المغلقة"},
{id:"h2",name:"الأوبن"},
{id:"h3",name:"الكافيه"}
];
clients=d.clients||[];
}

load();

// ================= LOGIN FIX =================
function showLogin(){
document.getElementById("app").innerHTML=`
<div style="text-align:center;margin-top:100px">
<h2>Drmedia Login</h2>
<input id="u" placeholder="username"><br><br>
<input id="p" type="password" placeholder="password"><br><br>
<button onclick="login()">Login</button>
</div>`;
}

function login(){
let u=document.getElementById("u").value.trim();
let p=document.getElementById("p").value;

let user=users.find(x=>x.username===u && x.password===p);

if(!user){
showMsg("خطأ في البيانات");
return;
}

currentUser=user;
sessionStorage.setItem("u",JSON.stringify(user));

if(user.role==="admin") renderAdmin();
else renderEmployee();

showMsg("تم الدخول");
}

function logout(){
sessionStorage.removeItem("u");
location.reload();
}

// ================= ADMIN =================
function renderAdmin(){
document.getElementById("app").innerHTML=`
<div>
<header style="display:flex;justify-content:space-between;padding:10px;background:#eee">
<div>Drmedia V3 FIX</div>
<button onclick="logout()">خروج</button>
</header>

<div style="display:flex;gap:10px;padding:10px">
<button class="tab-btn active" onclick="tab('dashboard')">الرئيسية</button>
<button class="tab-btn" onclick="tab('bookings')">الحجوزات</button>
<button class="tab-btn" onclick="tab('employees')">الموظفين</button>
</div>

<div id="content" style="padding:10px"></div>
</div>`;

tab("dashboard");
}

function tab(t){
currentTab=t;

document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

if(t==="dashboard") dashboard();
if(t==="bookings") renderBookings();
if(t==="employees") renderEmployees();
}

function dashboard(){
document.getElementById("content").innerHTML=`
<h3>Dashboard</h3>
<p>Bookings: ${bookings.length}</p>
<p>Employees: ${employees.length}</p>
`;
}

// ================= BOOKINGS FIX =================
function renderBookings(){
document.getElementById("content").innerHTML=`
<h3>الحجوزات</h3>
<button onclick="addBooking()">+ إضافة</button>

<table border="1" width="100%">
<tr><th>العميل</th><th>القاعة</th><th>السعر</th></tr>

${bookings.map(b=>`
<tr>
<td>${b.client}</td>
<td>${b.hall}</td>
<td>${b.price}</td>
</tr>
`).join("")}

</table>
`;
}

function addBooking(){
let c=prompt("اسم العميل");
let h=prompt("القاعه");
let p=prompt("السعر");

if(!c||!h||!p)return;

bookings.push({
id:Date.now(),
client:c,
hall:h,
price:p
});

save();
renderBookings();
showMsg("تمت الإضافة");
}

// ================= EMPLOYEES FIX =================
function renderEmployees(){
document.getElementById("content").innerHTML=`
<h3>الموظفين</h3>

<table border="1" width="100%">
<tr><th>الاسم</th><th>الدور</th><th>الأوردرات</th></tr>

${employees.map(e=>`
<tr>
<td>${e.name}</td>
<td>${e.role}</td>
<td>${e.orders}</td>
</tr>
`).join("")}

</table>
`;
}

// ================= BOOT =================
let saved=sessionStorage.getItem("u");
if(saved){
currentUser=JSON.parse(saved);
renderAdmin();
}else{
showLogin();
}

</script>
</body>
</html>
