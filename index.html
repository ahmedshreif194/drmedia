<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام توزيع الأوردرات - Drmedia Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #ff00ff;
      --primary-dark: #cc00cc;
      --secondary: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      --radius: 16px;
      --transition: all 0.3s ease;
    }
    .dark-theme {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --text-light: #94a3b8;
      --shadow: 0 4px 6px -1px rgba(255,255,255,0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      direction: rtl;
      transition: background 0.3s, color 0.3s;
    }
    .screen {
      display: none;
      min-height: 100vh;
      padding: 20px;
      animation: fadeIn 0.4s ease;
    }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .dashboard-screen.active {
      display: block;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 25px;
      width: 100%;
      max-width: 500px;
      margin: 15px auto;
      transition: var(--transition);
    }
    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      margin: 4px;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }
    .btn-outline:hover { background: var(--primary); color: white; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .btn-danger { background: var(--danger); color: white; border: none; }
    .btn-success { background: var(--secondary); color: white; border: none; }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 6px 0 12px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      background: var(--card);
      color: var(--text);
    }
    label { font-weight: 500; display: block; margin-top: 8px; }
    .nav {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nav button {
      background: var(--card);
      border: 2px solid #e2e8f0;
      padding: 8px 16px;
      border-radius: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
    }
    .nav button:hover, .nav button.active-tab {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-top: 15px;
    }
    th, td {
      padding: 12px;
      text-align: right;
      border-bottom: 1px solid #e2e8f0;
    }
    th { background: var(--primary); color: white; font-weight: 600; }
    tr:hover { background: rgba(255,0,255,0.03); }
    .hidden { display: none !important; }
    .alert {
      padding: 12px 18px;
      border-radius: 12px;
      margin: 10px 0;
      font-weight: 500;
    }
    .alert-success { background: #d1fae5; color: #065f46; }
    .alert-danger { background: #fee2e2; color: #991b1b; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-warning { background: #fef3c7; color: #92400e; }
    .badge-primary { background: #ede9fe; color: #5b21b6; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .stat-card i { font-size: 32px; color: var(--primary); margin-bottom: 8px; }
    .stat-card h3 { font-size: 28px; margin: 5px 0; }
    .stat-card p { color: var(--text-light); font-size: 14px; }
    @media (max-width: 768px) {
      .card { padding: 15px; }
      .nav { gap: 4px; }
      .nav button { padding: 6px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- شاشة تسجيل الدخول -->
  <div id="login-screen" class="screen active">
    <div class="card">
      <h2 style="text-align:center;"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h2>
      <form id="login-form">
        <label>اسم المستخدم</label>
        <input type="text" id="login-username" placeholder="أدخل اسم المستخدم" required>
        <label>كلمة المرور</label>
        <input type="password" id="login-password" placeholder="••••••" required>
        <button type="submit" class="btn" style="width:100%"><i class="fas fa-arrow-left"></i> دخول</button>
      </form>
      <div id="login-error" class="hidden alert alert-danger"></div>
    </div>
  </div>

  <!-- لوحة الأدمن -->
  <div id="admin-screen" class="screen dashboard-screen">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
      <h2><i class="fas fa-user-shield"></i> لوحة التحكم</h2>
      <button id="logout-btn" class="btn btn-danger btn-sm"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
    <div id="admin-stats" class="stats-grid"></div>
    <div class="nav" id="admin-nav">
      <button onclick="showAdminSection('users')" class="active-tab"><i class="fas fa-users"></i> الموظفين</button>
      <button onclick="showAdminSection('halls')"><i class="fas fa-building"></i> القاعات</button>
      <button onclick="showAdminSection('orders')"><i class="fas fa-calendar-alt"></i> الأوردرات</button>
      <button onclick="showAdminSection('distribution')"><i class="fas fa-tasks"></i> توزيع</button>
      <button onclick="showAdminSection('import')"><i class="fas fa-file-import"></i> استيراد</button>
      <button onclick="showAdminSection('attendance')"><i class="fas fa-clock"></i> الحضور</button>
      <button onclick="showAdminSection('settings')"><i class="fas fa-cog"></i> إعدادات</button>
    </div>
    <div id="admin-content" class="card" style="max-width:100%;"></div>
  </div>

  <!-- لوحة الموظف -->
  <div id="employee-screen" class="screen dashboard-screen">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
      <h2><i class="fas fa-id-card"></i> لوحة الموظف</h2>
      <button id="emp-logout-btn" class="btn btn-danger btn-sm"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
    <div class="nav" id="emp-nav">
      <button onclick="showEmployeeSection('myattendance')" class="active-tab"><i class="fas fa-qrcode"></i> تسجيل حضور</button>
      <button onclick="showEmployeeSection('myorders')"><i class="fas fa-list"></i> أوردراتي</button>
      <button onclick="showEmployeeSection('mysalary')"><i class="fas fa-money-bill"></i> مرتبي</button>
    </div>
    <div id="employee-content" class="card" style="max-width:100%;"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set, update, push, remove, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // إعدادات Firebase الخاصة بك
  const firebaseConfig = {
    apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
    authDomain: "drmedia-vpms.firebaseapp.com",
    databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
    projectId: "drmedia-vpms",
    storageBucket: "drmedia-vpms.firebasestorage.app",
    messagingSenderId: "681162512380",
    appId: "1:681162512380:web:ab2482f3234d8b59fc4479"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // متغيرات الجلسة
  let currentUser = null;
  const sessionKey = 'drmedia_current_user';

  // استعادة الجلسة
  const savedUser = localStorage.getItem(sessionKey);
  if (savedUser) {
    try {
      currentUser = JSON.parse(savedUser);
      navigateToDashboard(currentUser);
    } catch (e) {
      localStorage.removeItem(sessionKey);
    }
  }

  // دوال الشاشات
  const screens = document.querySelectorAll('.screen');
  window.showScreen = (screenId) => {
    screens.forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  };

  function navigateToDashboard(user) {
    if (user.role === 'admin') {
      showScreen('admin-screen');
      loadAdminDashboard();
    } else {
      showScreen('employee-screen');
      loadEmployeeDashboard();
    }
  }

  // تسجيل الدخول
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    
    try {
      const usersRef = ref(db, 'users');
      const snapshot = await get(usersRef);
      
      let foundUser = null;
      if (snapshot.exists()) {
        const users = snapshot.val();
        const userKey = Object.keys(users).find(key => {
          const u = users[key];
          return u.username === username && u.password == password;
        });
        if (userKey) {
          foundUser = { userId: userKey, ...users[userKey] };
        }
      }

      if (!foundUser) {
        document.getElementById('login-error').classList.remove('hidden');
        document.getElementById('login-error').textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة';
        return;
      }

      document.getElementById('login-error').classList.add('hidden');
      currentUser = foundUser;
      localStorage.setItem(sessionKey, JSON.stringify(currentUser));
      
      if (currentUser.employeeId) {
        const empRef = ref(db, `employees/${currentUser.employeeId}`);
        const empSnap = await get(empRef);
        if (empSnap.exists()) {
          currentUser = { ...currentUser, ...empSnap.val(), id: currentUser.employeeId };
        }
      }
      
      navigateToDashboard(currentUser);
    } catch (error) {
      console.error('Login error:', error);
      alert('حدث خطأ أثناء تسجيل الدخول');
    }
  });

  // تسجيل الخروج
  function logout() {
    localStorage.removeItem(sessionKey);
    currentUser = null;
    showScreen('login-screen');
  }
  document.getElementById('logout-btn').addEventListener('click', logout);
  document.getElementById('emp-logout-btn').addEventListener('click', logout);

  // ============ لوحة الأدمن ============
  async function loadAdminDashboard() {
    await loadAdminStats();
    showAdminSection('users');
  }

  async function loadAdminStats() {
    const dbRef = ref(db);
    const snapshot = await get(dbRef);
    const data = snapshot.val() || {};
    
    const employeesCount = (data.employees && Object.keys(data.employees).length) || 0;
    const hallsCount = (data.halls && Object.keys(data.halls).length) || 0;
    
    document.getElementById('admin-stats').innerHTML = `
      <div class="stat-card"><i class="fas fa-users"></i><h3>${employeesCount}</h3><p>موظف</p></div>
      <div class="stat-card"><i class="fas fa-building"></i><h3>${hallsCount}</h3><p>قاعة</p></div>
      <div class="stat-card"><i class="fas fa-calendar-check"></i><h3>0</h3><p>أوردر اليوم</p></div>
      <div class="stat-card"><i class="fas fa-check-circle"></i><h3>0</h3><p>حضور اليوم</p></div>
    `;
  }

  window.showAdminSection = async (section) => {
    const content = document.getElementById('admin-content');
    document.querySelectorAll('#admin-nav button').forEach(b => b.classList.remove('active-tab'));
    event?.target?.classList.add('active-tab');
    
    switch(section) {
      case 'users': await renderAdminUsers(content); break;
      case 'halls': await renderAdminHalls(content); break;
      case 'orders': await renderAdminOrders(content); break;
      case 'distribution': await renderDistribution(content); break;
      case 'import': renderImport(content); break;
      case 'attendance': await renderAdminAttendance(content); break;
      case 'settings': await renderSettings(content); break;
    }
  };

  async function renderAdminUsers(container) {
    const employeesRef = ref(db, 'employees');
    const snapshot = await get(employeesRef);
    const employees = snapshot.val() || {};
    
    let html = `<h3>إدارة الموظفين</h3>
      <button class="btn btn-sm btn-success" onclick="toggleAddEmployeeForm()"><i class="fas fa-plus"></i> إضافة موظف</button>
      <div id="addEmployeeForm" class="hidden card" style="max-width:500px;">
        <h4>إضافة موظف جديد</h4>
        <input type="text" id="newEmpName" placeholder="اسم الموظف">
        <input type="text" id="newEmpPhone" placeholder="رقم الهاتف">
        <select id="newEmpRole"><option value="مخرج">مخرج</option><option value="مصور">مصور</option><option value="كرين">كرين</option></select>
        <input type="number" id="newEmpSalary" placeholder="سعر الأوردر" value="200">
        <input type="text" id="newEmpUsername" placeholder="اسم المستخدم">
        <input type="password" id="newEmpPassword" placeholder="كلمة المرور" value="emp123">
        <button class="btn btn-success" onclick="addEmployee()">حفظ</button>
      </div>
      <table>
        <tr><th>الاسم</th><th>الدور</th><th>الهاتف</th><th>سعر الأوردر</th><th>الحالة</th></tr>`;
    
    for (let key in employees) {
      const emp = employees[key];
      html += `<tr>
        <td>${emp.name}</td>
        <td><span class="badge badge-primary">${emp.role}</span></td>
        <td>${emp.phone || '-'}</td>
        <td>${emp.salaryPerOrder || 0} ج.م</td>
        <td><span class="badge ${emp.active ? 'badge-success' : 'badge-warning'}">${emp.active ? 'نشط' : 'غير نشط'}</span></td>
      </tr>`;
    }
    html += '</table>';
    container.innerHTML = html;
  }

  window.toggleAddEmployeeForm = () => {
    document.getElementById('addEmployeeForm')?.classList.toggle('hidden');
  };

  window.addEmployee = async () => {
    const name = document.getElementById('newEmpName').value.trim();
    const phone = document.getElementById('newEmpPhone').value.trim();
    const role = document.getElementById('newEmpRole').value;
    const salary = Number(document.getElementById('newEmpSalary').value);
    const username = document.getElementById('newEmpUsername').value.trim();
    const password = document.getElementById('newEmpPassword').value;

    if (!name || !username || !password) {
      alert('الرجاء ملء جميع الحقول المطلوبة');
      return;
    }

    const empRef = push(ref(db, 'employees'));
    const empId = empRef.key;
    
    await set(empRef, {
      id: empId,
      name,
      phone,
      role,
      salaryPerOrder: salary,
      totalOrders: 0,
      active: true
    });

    const userRef = ref(db, 'users');
    const usersSnap = await get(userRef);
    const users = usersSnap.val() || [];
    users.push({
      employeeId: empId,
      name,
      username,
      password: password,
      role: 'employee'
    });
    await set(userRef, users);

    alert('تم إضافة الموظف بنجاح');
    document.getElementById('addEmployeeForm').classList.add('hidden');
    await renderAdminUsers(document.getElementById('admin-content'));
  };

  async function renderAdminHalls(container) {
    const hallsRef = ref(db, 'halls');
    const snapshot = await get(hallsRef);
    const halls = snapshot.val() || {};
    
    let html = `<h3>القاعات</h3><table><tr><th>الاسم</th><th>النوع</th><th>الحالة</th></tr>`;
    for (let key in halls) {
      const hall = halls[key];
      html += `<tr>
        <td>${hall.name}</td>
        <td>${hall.type === 'closed' ? 'مغلقة' : hall.type === 'open' ? 'أوبن' : 'كافيه'}</td>
        <td><span class="badge ${hall.active ? 'badge-success' : 'badge-warning'}">${hall.active ? 'نشطة' : 'غير نشطة'}</span></td>
      </tr>`;
    }
    html += '</table>';
    container.innerHTML = html;
  }

  async function renderAdminOrders(container) {
    const bookingsRef = ref(db, 'bookings');
    const snapshot = await get(bookingsRef);
    const bookings = snapshot.val() || {};
    
    let html = `<h3>الحجوزات</h3><button class="btn btn-sm btn-success" onclick="showAddBookingForm()"><i class="fas fa-plus"></i> إضافة حجز</button>
      <div id="addBookingForm" class="hidden card" style="max-width:500px;">
        <h4>إضافة حجز جديد</h4>
        <input type="text" id="newBookingClient" placeholder="اسم العميل">
        <input type="text" id="newBookingPhone" placeholder="رقم الهاتف">
        <input type="date" id="newBookingDate">
        <select id="newBookingHall">
          <option value="hall1">المغلقة</option>
          <option value="hall2">الأوبن</option>
          <option value="hall3">الكافيه</option>
        </select>
        <input type="number" id="newBookingPrice" placeholder="السعر" value="5000">
        <input type="number" id="newBookingDeposit" placeholder="العربون" value="2000">
        <button class="btn btn-success" onclick="addBooking()">حفظ</button>
      </div>
      <table><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th><th>الحالة</th></tr>`;
    
    for (let key in bookings) {
      const b = bookings[key];
      const hallNames = { hall1: 'المغلقة', hall2: 'الأوبن', hall3: 'الكافيه' };
      html += `<tr>
        <td>${b.clientName}</td>
        <td>${b.date || '-'}</td>
        <td>${hallNames[b.hallId] || b.hallName || '-'}</td>
        <td>${b.price || 0} ج.م</td>
        <td><span class="badge ${b.status === 'confirmed' ? 'badge-success' : 'badge-warning'}">${b.status || 'معلق'}</span></td>
      </tr>`;
    }
    html += '</table>';
    container.innerHTML = html;
  }

  window.showAddBookingForm = () => {
    document.getElementById('addBookingForm')?.classList.toggle('hidden');
  };

  window.addBooking = async () => {
    const clientName = document.getElementById('newBookingClient').value.trim();
    const phone = document.getElementById('newBookingPhone').value.trim();
    const date = document.getElementById('newBookingDate').value;
    const hallId = document.getElementById('newBookingHall').value;
    const price = Number(document.getElementById('newBookingPrice').value);
    const deposit = Number(document.getElementById('newBookingDeposit').value);

    if (!clientName || !date) {
      alert('الرجاء إدخال اسم العميل والتاريخ');
      return;
    }

    const hallNames = { hall1: 'المغلقة', hall2: 'الأوبن', hall3: 'الكافيه' };
    const bookingRef = push(ref(db, 'bookings'));
    await set(bookingRef, {
      id: bookingRef.key,
      clientName,
      phone,
      date,
      hallId,
      hallName: hallNames[hallId] || '',
      price,
      deposit,
      status: 'pending',
      assignedEmployees: [],
      notes: ''
    });

    alert('تم إضافة الحجز بنجاح');
    document.getElementById('addBookingForm').classList.add('hidden');
    document.getElementById('newBookingClient').value = '';
    document.getElementById('newBookingPhone').value = '';
    await renderAdminOrders(document.getElementById('admin-content'));
  };

  let distOrdersData = [];
  let distEmployeesData = [];

  async function renderDistribution(container) {
    const hallsRef = ref(db, 'halls');
    const employeesRef = ref(db, 'employees');
    const bookingsRef = ref(db, 'bookings');
    
    const [hallsSnap, empSnap, bookSnap] = await Promise.all([
      get(hallsRef), get(employeesRef), get(bookingsRef)
    ]);
    
    const halls = hallsSnap.val() || {};
    distEmployeesData = Object.entries(empSnap.val() || {}).map(([k, v]) => ({...v, dbKey: k}));
    distOrdersData = Object.entries(bookSnap.val() || {}).map(([k, v]) => ({...v, dbKey: k}));

    let html = `<h3>توزيع الأوردرات على الموظفين</h3>
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">
        <select id="distHallFilter" style="flex:1; min-width:150px;">
          <option value="all">كل القاعات</option>
          ${Object.entries(halls).map(([k, h]) => `<option value="${h.name}">${h.name}</option>`).join('')}
        </select>
        <input type="date" id="distDateFilter" style="flex:1; min-width:150px;">
        <button class="btn btn-sm" onclick="applySmartDistribution()"><i class="fas fa-magic"></i> توزيع ذكي</button>
        <button class="btn btn-sm btn-outline" onclick="saveDistribution()"><i class="fas fa-save"></i> حفظ التوزيع</button>
      </div>
      <div id="distPreview" style="overflow-x:auto;"></div>`;
    container.innerHTML = html;
    await refreshDistPreview();
  }

  async function refreshDistPreview() {
    const hallFilter = document.getElementById('distHallFilter')?.value || 'all';
    const dateFilter = document.getElementById('distDateFilter')?.value;
    
    let filteredOrders = distOrdersData.filter(o => {
      let match = true;
      if (hallFilter !== 'all') match = match && o.hallName === hallFilter;
      if (dateFilter) match = match && o.date === dateFilter;
      return match;
    });

    const assignments = {};
    filteredOrders.forEach(o => {
      const { required } = getHallRequirements(o.hallName);
      const assigned = [];
      required.forEach(role => {
        const available = distEmployeesData.filter(e => 
          e.role === role && !assigned.includes(e.dbKey)
        );
        if (available.length > 0) {
          const leastLoaded = available.sort((a, b) => 
            (assignments[a.dbKey] || 0) - (assignments[b.dbKey] || 0)
          )[0];
          assigned.push(leastLoaded.dbKey);
          assignments[leastLoaded.dbKey] = (assignments[leastLoaded.dbKey] || 0) + 1;
        }
      });
      o._assigned = assigned;
    });

    let html = '<table><tr><th>الأوردر</th><th>القاعة</th><th>التاريخ</th><th>الموظفين المعينين</th></tr>';
    filteredOrders.forEach(o => {
      html += `<tr>
        <td>${o.clientName}</td>
        <td>${o.hallName}</td>
        <td>${o.date}</td>
        <td>${(o._assigned || []).map(id => {
          const emp = distEmployeesData.find(e => e.dbKey === id);
          return emp ? `<span class="badge badge-primary">${emp.name} (${emp.role})</span>` : '';
        }).join(' ')}</td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('distPreview').innerHTML = html || '<p>لا توجد نتائج</p>';
  }

  function getHallRequirements(hallName) {
    const reqMap = {
      'المغلقة': ['مخرج', 'مصور', 'مصور', 'كرين'],
      'الأوبن': ['مخرج', 'مصور', 'مصور', 'كرين'],
      'الكافيه': ['مصور']
    };
    const required = reqMap[hallName] || ['مصور'];
    return { required, isCafe: hallName === 'الكافيه' };
  }

  window.applySmartDistribution = async () => {
    await refreshDistPreview();
    alert('تم تطبيق التوزيع الذكي - اضغط حفظ التوزيع للتأكيد');
  };

  window.saveDistribution = async () => {
    for (let order of distOrdersData) {
      if (order._assigned && order._assigned.length > 0) {
        await update(ref(db, `bookings/${order.dbKey}`), {
          assignedEmployees: order._assigned
        });
      }
    }
    alert('تم حفظ التوزيع بنجاح');
    await loadAdminStats();
  };

  document.addEventListener('change', async (e) => {
    if (e.target.id === 'distHallFilter' || e.target.id === 'distDateFilter') {
      await refreshDistPreview();
    }
  });

  function renderImport(container) {
    container.innerHTML = `
      <h3>استيراد الحجوزات من Excel</h3>
      <p style="color:var(--text-light);">تنسيق الملف: الرقم المسلسل | التاريخ | اليوم | اسم العريس | نوع الباكدج | عدد الأفراد</p>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
      <button class="btn btn-sm" onclick="importExcel()">استيراد</button>
      <div id="importResult"></div>`;
  }

  window.importExcel = async () => {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = async (e) => {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type: 'array'});
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(firstSheet, {header:1});
      let count = 0;
      
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row || row.length < 3) continue;
        
        const [serial, dateRaw, day, clientName = 'عميل', packageType = '', guests = 0] = row;
        let dateStr = '';
        
        if (dateRaw) {
          if (typeof dateRaw === 'number') {
            const d = XLSX.SSF.parse_date_code(dateRaw);
            dateStr = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
          } else {
            const parsed = new Date(dateRaw);
            if (!isNaN(parsed)) {
              dateStr = parsed.toISOString().split('T')[0];
            }
          }
        }
        
        if (!dateStr) continue;

        await push(ref(db, 'bookings'), {
          clientName: String(clientName),
          date: dateStr,
          serial: String(serial || ''),
          hallId: '',
          hallName: '',
          price: 0,
          deposit: 0,
          status: 'pending',
          assignedEmployees: [],
          notes: ''
        });
        count++;
      }
      document.getElementById('importResult').innerHTML = `<div class="alert alert-success">تم استيراد ${count} حجز بنجاح</div>`;
    };
    reader.readAsArrayBuffer(file);
  };

  async function renderAdminAttendance(container) {
    const attRef = ref(db, 'attendance');
    const snapshot = await get(attRef);
    const records = snapshot.val() || [];
    
    let html = `<h3>سجل الحضور</h3><table><tr><th>الموظف</th><th>التاريخ</th><th>الوقت</th><th>متأخر</th></tr>`;
    for (let key in records) {
      const r = records[key];
      html += `<tr>
        <td>${r.employeeId || '-'}</td>
        <td>${r.date || '-'}</td>
        <td>${r.checkIn || '-'}</td>
        <td><span class="badge ${r.isLate ? 'badge-warning' : 'badge-success'}">${r.isLate ? 'متأخر' : 'في الوقت'}</span></td>
      </tr>`;
    }
    html += '</table>';
    container.innerHTML = html;
  }

  async function renderSettings(container) {
    const settingsRef = ref(db, 'companySettings');
    const snapshot = await get(settingsRef);
    const settings = snapshot.val() || {};
    
    container.innerHTML = `
      <h3>إعدادات الشركة</h3>
      <label>اسم الشركة</label>
      <input type="text" id="setCompanyName" value="${settings.companyName || ''}">
      <label>رقم الواتساب</label>
      <input type="text" id="setWhatsapp" value="${settings.whatsappNumber || ''}">
      <label>اللون الأساسي</label>
      <input type="color" id="setPrimaryColor" value="${settings.themeSettings?.primaryColor || '#ff00ff'}">
      <button class="btn btn-sm" onclick="saveCompanySettings()"><i class="fas fa-save"></i> حفظ</button>
      <button class="btn btn-sm btn-outline" onclick="toggleTheme()"><i class="fas fa-moon"></i> تبديل الوضع الليلي</button>
    `;
  }

  window.saveCompanySettings = async () => {
    const companyName = document.getElementById('setCompanyName').value;
    const whatsappNumber = document.getElementById('setWhatsapp').value;
    const primaryColor = document.getElementById('setPrimaryColor').value;
    
    await update(ref(db, 'companySettings'), {
      companyName,
      whatsappNumber,
      'themeSettings/primaryColor': primaryColor
    });
    
    document.documentElement.style.setProperty('--primary', primaryColor);
    alert('تم حفظ الإعدادات');
  };

  window.toggleTheme = () => {
    document.body.classList.toggle('dark-theme');
  };

  // ============ لوحة الموظف ============
  function loadEmployeeDashboard() {
    showEmployeeSection('myattendance');
  }

  window.showEmployeeSection = (section) => {
    const content = document.getElementById('employee-content');
    document.querySelectorAll('#emp-nav button').forEach(b => b.classList.remove('active-tab'));
    event?.target?.classList.add('active-tab');
    
    switch(section) {
      case 'myattendance': renderMyAttendance(content); break;
      case 'myorders': renderMyOrders(content); break;
      case 'mysalary': renderMySalary(content); break;
    }
  };

  function renderMyAttendance(container) {
    container.innerHTML = `
      <h3>تسجيل الحضور</h3>
      <div id="qr-reader" style="width:100%; max-width:400px; margin:0 auto 15px;"></div>
      <button class="btn btn-sm" onclick="startQRScanner()"><i class="fas fa-qrcode"></i> مسح QR</button>
      <button class="btn btn-sm btn-outline" onclick="manualCheckIn()"><i class="fas fa-clock"></i> تسجيل حضور يدوي</button>
      <div id="attendance-status" style="margin-top:15px;"></div>`;
  }

  let qrScanner = null;
  window.startQRScanner = () => {
    if (qrScanner) qrScanner.stop();
    qrScanner = new Html5Qrcode("qr-reader");
    qrScanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      async (decodedText) => {
        await recordAttendance(decodedText);
        qrScanner.stop();
        document.getElementById('attendance-status').innerHTML = 
          '<div class="alert alert-success">✅ تم تسجيل الحضور بنجاح</div>';
      },
      () => {}
    ).catch(err => alert('خطأ في الكاميرا: ' + err));
  };

  window.manualCheckIn = async () => {
    await recordAttendance('manual');
    document.getElementById('attendance-status').innerHTML = 
      '<div class="alert alert-success">✅ تم تسجيل الحضور بنجاح</div>';
  };

  async function recordAttendance(qrData = '') {
    if (!currentUser) return;
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ar-EG');
    const dateStr = now.toISOString().split('T')[0];
    
    await push(ref(db, 'attendance'), {
      employeeId: currentUser.employeeId || currentUser.userId,
      date: dateStr,
      checkIn: timeStr,
      isLate: now.getHours() >= 9,
      qrData
    });
  }

  async function renderMyOrders(container) {
    if (!currentUser) return;
    
    const bookingsRef = ref(db, 'bookings');
    const snapshot = await get(bookingsRef);
    const bookings = snapshot.val() || {};
    
    const empId = currentUser.employeeId || currentUser.userId;
    let myOrders = [];
    
    for (let key in bookings) {
      const b = bookings[key];
      if (b.assignedEmployees && b.assignedEmployees.includes(empId)) {
        myOrders.push({...b, dbKey: key});
      }
    }
    
    myOrders.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    
    let html = `<h3>أوردراتي (${myOrders.length})</h3><table><tr><th>التاريخ</th><th>العميل</th><th>القاعة</th><th>الحالة</th></tr>`;
    myOrders.forEach(o => {
      html += `<tr>
        <td>${o.date}</td>
        <td>${o.clientName}</td>
        <td>${o.hallName || '-'}</td>
        <td><span class="badge ${o.status === 'confirmed' ? 'badge-success' : 'badge-warning'}">${o.status || 'معلق'}</span></td>
      </tr>`;
    });
    html += '</table>';
    container.innerHTML = html;
  }

  async function renderMySalary(container) {
    if (!currentUser) return;
    
    const bookingsRef = ref(db, 'bookings');
    const snapshot = await get(bookingsRef);
    const bookings = snapshot.val() || {};
    
    const empId = currentUser.employeeId || currentUser.userId;
    let orderCount = 0;
    
    for (let key in bookings) {
      if (bookings[key].assignedEmployees?.includes(empId)) orderCount++;
    }
    
    const salaryPerOrder = currentUser.salaryPerOrder || 0;
    const total = orderCount * salaryPerOrder;
    
    container.innerHTML = `
      <h3>المرتب</h3>
      <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-shopping-cart"></i><h3>${orderCount}</h3><p>عدد الأوردرات</p></div>
        <div class="stat-card"><i class="fas fa-coins"></i><h3>${salaryPerOrder}</h3><p>سعر الأوردر (ج.م)</p></div>
        <div class="stat-card"><i class="fas fa-calculator"></i><h3>${total}</h3><p>الإجمالي (ج.م)</p></div>
      </div>
    `;
  }
</script>
</body>
