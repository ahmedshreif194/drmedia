<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Drmedia Pro FIXED</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

</head>

<body class="bg-gray-100">

<div id="app"></div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
    apiKey: "PUT-YOUR-REAL-KEY",
    authDomain: "drmedia-vpms.firebaseapp.com",
    databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
    projectId: "drmedia-vpms"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= DATA =================
let bookings = [];
let employees = [];
let users = [];
let currentUser = null;

// ================= SAFE INIT =================
function initDefaultData() {

    if(users.length === 0){
        users = [
            {username:"admin", password:"admin123", role:"admin", name:"Admin"}
        ];
    }

    if(employees.length === 0){
        employees = [
            {id:"e1", name:"أحمد", role:"مخرج", salaryPerOrder:300, active:true, totalOrders:0},
            {id:"e2", name:"محمد", role:"مصور", salaryPerOrder:200, active:true, totalOrders:0},
            {id:"e3", name:"ياسر", role:"كرين", salaryPerOrder:250, active:true, totalOrders:0}
        ];
    }

    if(bookings.length === 0){
        bookings = [
            {id:"b1", clientName:"عميل تجريبي", date:"2026-04-25", hallName:"قاعة", price:3000, assignedEmployees:[]}
        ];
    }
}

// ================= LOAD =================
function loadData(){
    db.ref('users').on('value',s=>{ users = s.val() || []; render(); });
    db.ref('employees').on('value',s=>{ employees = s.val() || []; render(); });
    db.ref('bookings').on('value',s=>{ bookings = s.val() || []; render(); });
}

// ================= SAVE =================
function save(){
    db.ref('users').set(users);
    db.ref('employees').set(employees);
    db.ref('bookings').set(bookings);
}

// ================= LOGIN =================
function login(){
    const u = document.getElementById("u").value;
    const p = document.getElementById("p").value;

    const user = users.find(x=>x.username===u && x.password===p);

    if(user){
        currentUser = user;
        render();
    } else {
        alert("خطأ في البيانات");
    }
}

// ================= UI =================
function render(){

    if(!currentUser){
        document.getElementById("app").innerHTML = `
        <div class="h-screen flex items-center justify-center">
            <div class="bg-white p-6 rounded-xl w-80">
                <h2 class="text-xl mb-3">DrMedia Login</h2>
                <input id="u" class="border p-2 w-full mb-2" placeholder="username">
                <input id="p" type="password" class="border p-2 w-full mb-2" placeholder="password">
                <button onclick="login()" class="bg-green-600 text-white w-full p-2">Login</button>
            </div>
        </div>`;
        return;
    }

    document.getElementById("app").innerHTML = `
    <div class="p-4">
        <h1 class="text-2xl mb-3">DrMedia Dashboard</h1>

        <button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">Logout</button>

        <div class="grid grid-cols-3 gap-3 mt-4">

            <div class="bg-white p-3 rounded">
                <h3>Bookings</h3>
                <p>${bookings.length}</p>
            </div>

            <div class="bg-white p-3 rounded">
                <h3>Employees</h3>
                <p>${employees.length}</p>
            </div>

            <div class="bg-white p-3 rounded">
                <h3>Users</h3>
                <p>${users.length}</p>
            </div>

        </div>

        <div class="mt-4 bg-white p-3 rounded">
            <h2>Bookings</h2>

            <table class="w-full mt-2 border">
                <tr>
                    <th>Client</th>
                    <th>Date</th>
                    <th>Price</th>
                </tr>

                ${bookings.map(b=>`
                    <tr>
                        <td>${b.clientName}</td>
                        <td>${b.date}</td>
                        <td>${b.price}</td>
                    </tr>
                `).join("")}
            </table>

        </div>
    </div>`;
}

// ================= LOGOUT =================
function logout(){
    currentUser = null;
    render();
}

// ================= START =================
initDefaultData();
loadData();
setTimeout(render,500);

</script>

</body>
</html>
