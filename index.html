<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drmedia Pro V3+</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
<div id="app"></div>

<script>

// ================= USERS =================
let users = [
 {username:"admin",password:"1234",role:"admin"},
 {username:"emp",password:"1234",role:"employee"}
];

let currentUser = null;

// ================= DATA =================
let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
let employees = JSON.parse(localStorage.getItem('employees')) || [
 {id:'e1',name:'زكاوة',role:'مخرج',salary:250,total:0},
 {id:'e2',name:'الصاوي',role:'مخرج',salary:250,total:0},
 {id:'e3',name:'محمد',role:'مصور',salary:200,total:0},
 {id:'e4',name:'اسلام',role:'مصور',salary:200,total:0},
 {id:'e5',name:'خالد',role:'مصور',salary:200,total:0},
 {id:'e6',name:'ياسر',role:'كرين',salary:200,total:0}
];

let halls = [
 {id:'h1',name:'المغلقة'},
 {id:'h2',name:'الأوبن'},
 {id:'h3',name:'الكافيه'}
];

// ================= SAVE =================
function save(){
 localStorage.setItem('bookings',JSON.stringify(bookings));
 localStorage.setItem('employees',JSON.stringify(employees));
}

// ================= LOGIN =================
function showLogin(){
 document.getElementById("app").innerHTML = `
 <div class="min-h-screen flex items-center justify-center">
   <div class="bg-white p-6 rounded-xl w-full max-w-sm text-center">
     <h2 class="text-xl mb-4">🔐 تسجيل الدخول</h2>
     <input id="user" placeholder="Username" class="border p-2 w-full mb-2">
     <input id="pass" type="password" placeholder="Password" class="border p-2 w-full mb-3">
     <button onclick="login()" class="bg-green-600 text-white w-full p-2 rounded">دخول</button>
   </div>
 </div>
 `;
}

function login(){
 let u = document.getElementById("user").value.trim();
 let p = document.getElementById("pass").value;

 let user = users.find(x=>x.username===u && x.password===p);

 if(user){
   currentUser = user;
   sessionStorage.setItem("user", JSON.stringify(user));
   renderApp();
 }else{
   alert("❌ بيانات غلط");
 }
}

function logout(){
 sessionStorage.removeItem("user");
 currentUser = null;
 showLogin();
}

// ================= UI =================
function renderApp(){
 document.getElementById("app").innerHTML = `
 <div class="p-4">

   <div class="flex justify-between mb-4">
     <h2 class="text-xl">👋 ${currentUser.username}</h2>
     <button onclick="logout()" class="bg-red-500 text-white px-3 py-1 rounded">خروج</button>
   </div>

   <div class="bg-white p-4 rounded-xl mb-4">
     <button onclick="showAdd()" class="bg-green-600 text-white px-3 py-1 rounded">+ حجز</button>
     <button onclick="distributeMonth()" class="bg-blue-600 text-white px-3 py-1 rounded">🔥 توزيع شهر</button>

     <table class="w-full mt-3 text-sm">
       <tr><th>عميل</th><th>تاريخ</th><th>قاعة</th><th>توزيع</th></tr>
       ${bookings.map(b=>`
       <tr>
         <td>${b.client}</td>
         <td>${b.date}</td>
         <td>${b.hall}</td>
         <td>${b.assigned.map(id=>employees.find(e=>e.id==id)?.name).join(', ')}</td>
       </tr>
       `).join('')}
     </table>
   </div>

 </div>
 `;
}

// ================= ADD =================
function showAdd(){
 let name = prompt("اسم العميل");
 let hall = prompt("h1/h2/h3");
 let date = prompt("التاريخ YYYY-MM-DD");

 let hallName = halls.find(h=>h.id==hall)?.name;

 if(!name || !hallName || !date) return;

 bookings.push({
   id:Date.now(),
   client:name,
   hall:hallName,
   hallId:hall,
   date:date,
   assigned:[]
 });

 save();
 renderApp();
}

// ================= SMART MONTH DISTRIBUTION =================
function distributeMonth(){

 // reset totals
 employees.forEach(e=>e.total=0);

 // group by day
 let days = {};
 bookings.forEach(b=>{
   if(!days[b.date]) days[b.date]=[];
   days[b.date].push(b);
 });

 Object.keys(days).forEach(day=>{

   let usedToday = new Set();

   let directors = employees.filter(e=>e.role=='مخرج').sort((a,b)=>a.total-b.total);
   let photographers = employees.filter(e=>e.role=='مصور').sort((a,b)=>a.total-b.total);
   let cranes = employees.filter(e=>e.role=='كرين').sort((a,b)=>a.total-b.total);

   days[day].forEach(b=>{

     let assigned=[];

     function pick(arr,count){
       let picked=[];
       for(let i=0;i<arr.length;i++){
         if(!usedToday.has(arr[i].id)){
           picked.push(arr[i]);
           usedToday.add(arr[i].id);
         }
         if(picked.length===count) break;
       }
       return picked;
     }

     if(b.hallId=='h1'||b.hallId=='h2'){
       assigned.push(...pick(directors,1).map(e=>e.id));
       assigned.push(...pick(photographers,2).map(e=>e.id));
       assigned.push(...pick(cranes,1).map(e=>e.id));
     }

     if(b.hallId=='h3'){
       assigned.push(...pick(photographers,1).map(e=>e.id));
     }

     b.assigned = assigned;

     assigned.forEach(id=>{
       let emp = employees.find(e=>e.id==id);
       if(emp) emp.total++;
     });

   });

 });

 save();
 renderApp();
 alert("🔥 تم توزيع الشهر بالكامل بنجاح");
}

// ================= INIT =================
function init(){
 let savedUser = sessionStorage.getItem("user");

 if(savedUser){
   currentUser = JSON.parse(savedUser);
   renderApp();
 }else{
   showLogin();
 }
}

init();

</script>
</body>
</html>
