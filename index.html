    <style>
        :root {
            --primary: #16a34a;
            --primary-dark: #15803d;
            --danger: #dc2626;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            white-space: nowrap;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            font-weight: 500;
        }
        .toast.show {
            opacity: 1;
            pointer-events: auto;
        }
        .toast.success {
            background: #059669;
        }
        .toast.error {
            background: #dc2626;
        }
        .toast.warning {
            background: #d97706;
        }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1100;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            backdrop-filter: blur(4px);
            padding: 16px;
        }
        .modal.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: var(--card);
            border-radius: 24px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.95);
            transition: 0.2s;
        }
        .modal.show .modal-content {
            transform: scale(1);
        }
        .tab-btn {
            padding: 10px 20px;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            background: #e5e7eb;
            margin-left: 4px;
            border: none;
            font-size: 0.9rem;
            white-space: nowrap;
            font-weight: 500;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #2563eb;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-secondary:hover {
            background: #1d4ed8;
        }
        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .btn-outline {
            background: transparent;
            color: var(--text);
            padding: 8px 16px;
            border-radius: 30px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline:hover {
            background: #f3f4f6;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }
        .status-completed {
            background: #d1fae5;
            color: #065f46;
        }
        .status-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }
        .badge-active {
            background: #d1fae5;
            color: #065f46;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .badge-inactive {
            background: #fee2e2;
            color: #991b1b;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-day {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .calendar-day:hover {
            background: #f0fdf4;
            border-color: #86efac;
        }
        .calendar-day.booked {
            background: #d1fae5;
            border-color: #86efac;
            font-weight: 700;
        }
        .calendar-day.today {
            background: #dbeafe;
            border-color: #93c5fd;
            font-weight: 700;
        }
        .stat-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .bg-card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 20px;
        }
        .hidden {
            display: none !important;
        }
        body.dark {
            --bg: #1e1e2f;
            --card: #2d2d3a;
            --text: #e5e7eb;
            --text-secondary: #9ca3af;
            --border: #404050;
        }
        body.dark input,
        body.dark select,
        body.dark textarea {
            background: #3a3a4a;
            color: #e5e7eb;
            border-color: #555;
        }
        body.dark .tab-btn {
            background: #3a3a4a;
            color: #e5e7eb;
        }
        body.dark .tab-btn.active {
            background: var(--primary);
        }
        body.dark .calendar-day {
            background: #2d2d3a;
            border-color: #404050;
        }
        body.dark .calendar-day.booked {
            background: #065f46;
            border-color: #059669;
        }
        body.dark .calendar-day.today {
            background: #1e3a5f;
            border-color: #3b82f6;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th,
        td {
            padding: 10px 8px;
            text-align: right;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: #f9fafb;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        body.dark th {
            background: #3a3a4a;
        }
        .search-input {
            width: 100%;
            padding: 10px 16px;
            border: 2px solid var(--border);
            border-radius: 30px;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
        }
        .table-container {
            overflow-x: auto;
            max-height: 60vh;
            overflow-y: auto;
        }
        @media (max-width: 640px) {
            .tab-btn {
                padding: 8px 12px;
                font-size: 0.7rem;
            }
            .stat-value {
                font-size: 1.4rem;
            }
            .modal-content {
                padding: 16px;
                margin: 8px;
                border-radius: 16px;
            }
        }
        .animate-pulse-slow {
            animation: pulse 3s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
        input[type="file"] {
            padding: 8px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            cursor: pointer;
        }
        input[type="file"]:hover {
            border-color: var(--primary);
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // ==================== تهيئة PDF.js ====================
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        }

        // ==================== Firebase Config ====================
        const firebaseConfig = {
            apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
            authDomain: "drmedia-vpms.firebaseapp.com",
            databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
            projectId: "drmedia-vpms",
            storageBucket: "drmedia-vpms.firebasestorage.app",
            messagingSenderId: "681162512380",
            appId: "1:681162512380:web:ab2482f3234d8b59fc4479"
        };
        let useFirebase = false,
            db = null,
            online = true,
            lastSync = null;
        let currentUser = null;
        let companyName = 'Dr Media Pro',
            companyLogo = '📷',
            companyLogoBase64 = null;
        let bookings = [],
            employees = [],
            halls = [],
            clients = [],
            equipmentInventory = {};
        let attendanceRecords = [],
            payrollArchive = [],
            employeeLoans = {},
            notifications = [],
            trashBin = [],
            activityLog = [],
            messages = [];
        let USERS = [
            { id: 'admin1', username: 'ahmed', password: '1994', role: 'admin', name: 'مدير النظام' },
            { id: 'emp1', username: 'ahmed_emp', password: 'emp123', role: 'employee', employeeId: 'emp1',
                name: 'أحمد الموظف' },
            { id: 'agent1', username: 'agent', password: 'agent123', role: 'agent', name: 'وكيل المبيعات' },
            { id: 'man1', username: 'manager', password: 'manager123', role: 'manager', name: 'مدير تنفيذي' }
        ];
        let appTheme = "light",
            appLanguage = "ar",
            distributionMode = 'smart';
        let rotationCounters = { dir: 0, ph: 0, cr: 0 };
        let whatsappEnabled = true,
            whatsappBusinessNumber = "201001234567";
        let whatsappMessageTemplate =
            "مرحباً {name}، تم توزيع أوردر {client} في {date} بقاعة {hall}";
        let browserNotifications = false,
            html5QrCode = null,
            importedDataRows = [],
            backupIntervalIdGlobal = null;
        let calendarYear = new Date().getFullYear(),
            calendarMonth = new Date().getMonth();
        let payrollFilterMonth = new Date().getMonth(),
            payrollFilterYear = new Date().getFullYear();
        let bookingFilterStatus = 'all',
            bookingFilterHall = 'all',
            bookingFilterDateFrom = '',
            bookingFilterDateTo = '';

        const translations = {
            ar: {
                dashboard: "📊 الرئيسية",
                bookings: "📅 الحجوزات",
                employees: "👥 الموظفين",
                halls: "🏛️ القاعات",
                clients: "👥 العملاء",
                equipment: "📦 المعدات",
                attendance: "📋 الحضور",
                payroll: "💰 المرتبات",
                calendar: "📆 التقويم",
                distribution: "⚙️ التوزيع",
                reports: "📊 التقارير",
                advancedReports: "📈 تقارير متقدمة",
                notifications: "🔔 الإشعارات",
                users: "👥 المستخدمين",
                trash: "🗑️ سلة المحذوفات",
                activityLog: "📜 سجل النشاطات",
                internet: "🌐 الإنترنت",
                settings: "⚙️ الإعدادات",
                reminder: "تذكير أوردر",
                orderDistributed: "تم توزيع أوردر"
            },
            en: {
                dashboard: "📊 Dashboard",
                bookings: "📅 Bookings",
                employees: "👥 Employees",
                halls: "🏛️ Halls",
                clients: "👥 Clients",
                equipment: "📦 Equipment",
                attendance: "📋 Attendance",
                payroll: "💰 Payroll",
                calendar: "📆 Calendar",
                distribution: "⚙️ Distribution",
                reports: "📊 Reports",
                advancedReports: "📈 Advanced Reports",
                notifications: "🔔 Notifications",
                users: "👥 Users",
                trash: "🗑️ Trash",
                activityLog: "📜 Activity Log",
                internet: "🌐 Internet",
                settings: "⚙️ Settings",
                reminder: "Order Reminder",
                orderDistributed: "Order Distributed"
            }
        };

        function t(key) {
            return (translations[appLanguage] && translations[appLanguage][key]) || translations.ar[key] || key;
        }

        // ==================== Utility Functions ====================
        function showMsg(msg, type = 'success') {
            const tEl = document.getElementById('toast');
            if (!tEl) return;
            tEl.textContent = msg;
            tEl.className = 'toast ' + type + ' show';
            clearTimeout(tEl._t);
            tEl._t = setTimeout(() => { tEl.classList.remove('show');
                tEl.className = 'toast'; }, 3500);
        }

        function showError(msg) { showMsg(msg, 'error'); }

        function showWarning(msg) { showMsg(msg, 'warning'); }

        function closeModal() {
            const m = document.getElementById('modal');
            if (m) { m.classList.remove('show');
                document.body.style.overflow = ''; }
        }

        function openModal(content) {
            const modal = document.getElementById('modal'),
                mc = document.getElementById('modalContent');
            if (!modal || !mc) return;
            mc.innerHTML = content;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
            modal.onclick = function(e) { if (e.target === modal) closeModal(); };
            // إضافة مستمع Escape
            const escHandler = function(e) { if (e.key === 'Escape') { closeModal();
                    document.removeEventListener('keydown', escHandler); } };
            document.addEventListener('keydown', escHandler);
        }

        function applyTheme(theme) { appTheme = theme;
            document.body.className = ''; if (theme === 'dark') document.body.classList.add('dark'); }

        function safeGetLocal(key, fallback) { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) :
                fallback; } catch (e) { return fallback; } }

        function safeSetLocal(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch (
            e) { showWarning('مساحة التخزين ممتلئة'); return false; } }

        function getTodayDateStr() { return new Date().toISOString().slice(0, 10); }

        function generateId(prefix = '') { return prefix + Date.now().toString(36) + Math.random().toString(36).substr(2,
            6); }

        function updateEmployeeOrders() {
            employees.forEach(e => {
                let c = 0;
                bookings.forEach(b => {
                    if (b.status !== 'cancelled' && !b.deleted && (b.assignedEmployees || []).includes(e.id) &&
                        attendanceRecords.some(a => a.empId === e.id && a.date === b.date && a.checkIn))
                        c++;
                });
                e.totalOrders = c;
            });
        }

        function addActivity(action, details) {
            activityLog.unshift({ id: generateId('act_'), timestamp: new Date().toISOString(), user: currentUser ?
                    currentUser.name : 'النظام', action, details });
            if (activityLog.length > 500) activityLog.length = 500;
            saveAllData();
        }

        function isAdmin() { return currentUser && currentUser.role === 'admin'; }

        function isManager() { return currentUser && currentUser.role === 'manager'; }

        function isEmployee() { return currentUser && currentUser.role === 'employee'; }

        function isAgent() { return currentUser && currentUser.role === 'agent'; }

        function toggleAllCheckboxes(className, checked) { document.querySelectorAll('.' + className).forEach(cb => cb
                .checked = checked); }

        function getSelectedIds(className) { return Array.from(document.querySelectorAll('.' + className + ':checked')).map(
                cb => cb.dataset.id); }

        function formatCurrency(amount) { return (amount || 0).toLocaleString('ar-EG') + ' ج.م'; }

        function getWeekDayArabic(dateStr) {
            const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const d = new Date(dateStr);
            return days[d.getDay()];
        }

        // ==================== Storage ====================
        async function saveAllData() {
            const fd = { bookings, employees, halls, clients, equipmentInventory, attendanceRecords, payrollArchive,
                employeeLoans, notifications, trashBin, activityLog, messages, companyName, companyLogo: companyLogoBase64 ||
                    companyLogo, USERS, rotationCounters, whatsappEnabled, whatsappBusinessNumber,
                whatsappMessageTemplate, appTheme, appLanguage };
            safeSetLocal('drmedia_data', fd);
            if (useFirebase && db && online) try { await db.ref('/').set(fd);
                lastSync = new Date(); } catch (e) { online = false; }
            applyTheme(appTheme);
        }
        async function loadAllData() {
            let loaded = false;
            if (useFirebase && db) try { const s = await db.ref('/').get(); if (s.exists()) { loadDataObject(s.val());
                    online = true;
                    lastSync = new Date();
                    loaded = true; } } catch (e) { online = false; }
            if (!loaded) { const raw = safeGetLocal('drmedia_data', null); if (raw) loadDataObject(raw); else
                    initializeDefaultData(); }
            ensureMinimumData();
            updateEmployeeOrders();
            await saveAllData();
            applyTheme(appTheme);
        }

        function loadDataObject(d) {
            bookings = d.bookings || [];
            employees = d.employees || [];
            halls = d.halls || [];
            clients = d.clients || [];
            equipmentInventory = d.equipmentInventory || {};
            attendanceRecords = d.attendanceRecords || [];
            payrollArchive = d.payrollArchive || [];
            employeeLoans = d.employeeLoans || {};
            notifications = d.notifications || [];
            trashBin = d.trashBin || [];
            activityLog = d.activityLog || [];
            messages = d.messages || [];
            companyName = d.companyName || companyName;
            if (d.companyLogo && d.companyLogo.startsWith('data:image')) companyLogoBase64 = d.companyLogo;
            else companyLogo = d.companyLogo || companyLogo;
            USERS = d.USERS || USERS;
            rotationCounters = d.rotationCounters || { dir: 0, ph: 0, cr: 0 };
            whatsappEnabled = d.whatsappEnabled !== undefined ? d.whatsappEnabled : true;
            whatsappBusinessNumber = d.whatsappBusinessNumber || "201001234567";
            whatsappMessageTemplate = d.whatsappMessageTemplate ||
                "مرحباً {name}، تم توزيع أوردر {client} في {date} بقاعة {hall}";
            appTheme = d.appTheme || "light";
            appLanguage = d.appLanguage || "ar";
        }

        function initializeDefaultData() { bookings = [];
            employees = [];
            halls = [];
            clients = [];
            equipmentInventory = {};
            attendanceRecords = [];
            payrollArchive = [];
            employeeLoans = {};
            notifications = [];
            trashBin = [];
            activityLog = [];
            messages = []; }

        function ensureMinimumData() {
            if (!halls.length) halls = [{ id: 'h1', name: 'القاعة المغلقة', type: 'closed', basePrice: 5000,
                active: true }, { id: 'h2', name: 'القاعة المفتوحة', type: 'open', basePrice: 4000,
                active: true }, { id: 'h3', name: 'الكافيه', type: 'cafe', basePrice: 2000, active: true }];
            if (!employees.length) employees = [{ id: 'emp1', name: 'أحمد علي', role: 'مخرج', phone: '01001234567',
                salaryPerOrder: 300, active: true, totalOrders: 0, userId: 'emp1' }, { id: 'emp2',
                name: 'محمود حسن', role: 'مصور', phone: '01002345678', salaryPerOrder: 200, active: true,
                totalOrders: 0, userId: null }, { id: 'emp3', name: 'سامر خالد', role: 'كرين',
                phone: '01003456789', salaryPerOrder: 250, active: true, totalOrders: 0, userId: null }];
            if (!clients.length) clients = [{ id: 'c1', name: 'محمد عبدالله', phone: '01012345678', email: '',
            address: '' }];
            if (Object.keys(equipmentInventory).length === 0) equipmentInventory = { eq1: { name: 'كاميرا Sony A7',
                    quantity: 3, minStock: 1, category: 'تصوير' } };
            if (!bookings.length) bookings = [{ id: 'b1', clientName: 'محمد عبدالله', clientId: 'c1',
                phone: '01012345678', hallId: 'h1', hallName: 'القاعة المغلقة', date: getTodayDateStr(),
                price: 5000, status: 'pending', paymentStatus: 'pending', assignedEmployees: [], notes: '',
                packageType: '', totalPersons: 0, attachments: [] }];
            if (!attendanceRecords.length) { const today = new Date(); for (let i = 0; i < 5; i++) { const d = new Date(
                    today);
                d.setDate(d.getDate() - i); const ds = d.toISOString().slice(0, 10);
                attendanceRecords.push({ id: generateId('att_'), empId: 'emp1', date: ds, checkIn: '09:00 ص',
                    checkOut: '05:00 م', status: 'present' }); } }
            employees.forEach(emp => { if (emp.userId) { const u = USERS.find(u => u.id === emp.userId); if (u) u
                        .employeeId = emp.id; } });
        }

        // ==================== Notifications & WhatsApp ====================
        function sendWhatsApp(phone, msg) { if (!whatsappEnabled || !phone) return; let c = phone.replace(/[^0-9+]/g,
            ''); if (c.startsWith('0')) c = '2' + c; if (!c.startsWith('+')) c = '+' + c;
        window.open(`https://wa.me/${c}?text=${encodeURIComponent(msg)}`, '_blank'); }

        function notifyEmployee(emp, title, body, sendWA = true) { if (!emp || !emp.id) return;

        // ==================== Distribution ====================
        async function autoDistributeWithNotify() {
            const pending = bookings.filter(b => b.status === 'pending' && !b.deleted);
            if (!pending.length) { showWarning('لا توجد حجوزات معلقة'); return; }
            const dirs = employees.filter(e => e.role === 'مخرج' && e.active),
                phs = employees.filter(e => e.role === 'مصور' && e.active),
                crs = employees.filter(e => e.role === 'كرين' && e.active);
            let di = rotationCounters.dir || 0,
                pi = rotationCounters.ph || 0,
                ci = rotationCounters.cr || 0;
            const daily = {};
            for (let b of pending) {
                const date = b.date; if (!daily[date]) daily[date] = { dirs: new Set(), phs: new Set(), crs: new Set() };
                const type = (halls.find(h => h.id === b.hallId) || {}).type || 'closed';
                let assigned = [];
                if (type === 'cafe') { if (phs.length) { while (daily[date].phs.has(phs[pi % phs.length].id))
                    pi++;
                    assigned.push(phs[pi % phs.length].id);
                    daily[date].phs.add(phs[pi % phs.length].id);
                    pi++; } } else { if (dirs.length) { while (daily[date].dirs.has(dirs[di % dirs.length]
                            .id)) di++;
                        assigned.push(dirs[di % dirs.length].id);
                        daily[date].dirs.add(dirs[di % dirs.length].id);
                        di++; } if (phs.length) { let added = 0; for (let i = 0; i < phs.length * 2 && added <
                            2; i++) { while (daily[date].phs.has(phs[pi % phs.length].id)) pi++; if (!daily[
                                date].phs.has(phs[pi % phs.length].id)) { assigned.push(phs[pi % phs.length]
                                .id);
                                daily[date].phs.add(phs[pi % phs.length].id);
                                added++; }
                            pi++; } } if (crs.length) { while (daily[date].crs.has(crs[ci % crs.length].id))
                    ci++;
                    assigned.push(crs[ci % crs.length].id);
                    daily[date].crs.add(crs[ci % crs.length].id);
                    ci++; } }
                b.assignedEmployees = assigned;
            }
            rotationCounters = { dir: di, ph: pi, cr: ci };
            updateEmployeeOrders();
            await saveAllData();
            for (let b of pending) { b.assignedEmployees.forEach(eid => { const emp = employees.find(e => e.id ===
                    eid); if (emp) notifyEmployee(emp, t('orderDistributed'), whatsappMessageTemplate.replace(
                        '{name}', emp.name).replace('{client}', b.clientName).replace('{date}', b.date)
                    .replace('{hall}', b.hallName), true); }); }
            addActivity('توزيع تلقائي', `تم توزيع ${pending.length} حجز`);
            renderBookings();
            renderDistribution();
            showMsg(`✅ تم توزيع ${pending.length} حجز`); }

        async function rotateDistribution() {
            const pending = bookings.filter(b => b.status === 'pending' && !b.deleted);
            if (!pending.length) { showWarning('لا توجد حجوزات معلقة'); return; }
            const dirs = employees.filter(e => e.role === 'مخرج' && e.active),
                phs = employees.filter(e => e.role === 'مصور' && e.active),
                crs = employees.filter(e => e.role === 'كرين' && e.active);
            let di = rotationCounters.dir || 0,
                pi = rotationCounters.ph || 0,
                ci = rotationCounters.cr || 0;
            for (let b of pending) {
                const type = (halls.find(h => h.id === b.hallId) || {}).type || 'closed';
                let assigned = [];
                if (type === 'cafe') { if (phs.length) { assigned.push(phs[pi % phs.length].id);
                    pi++; } } else { if (dirs.length) { assigned.push(dirs[di % dirs.length].id);
                    di++; } if (phs.length) { assigned.push(phs[pi % phs.length].id);
                    pi++; if (phs.length > 1) { assigned.push(phs[pi % phs.length].id);
                        pi++; } } if (crs.length) { assigned.push(crs[ci % crs.length].id);
                    ci++; } }
                b.assignedEmployees = assigned;
            }
            rotationCounters = { dir: di, ph: pi, cr: ci };
            updateEmployeeOrders();
            await saveAllData();
            addActivity('توزيع بالتدوير', `تم توزيع ${pending.length} حجز`);
            renderBookings();
            renderDistribution();
            showMsg(`✅ تم توزيع ${pending.length} حجز بالتدوير`); }

        async function restoreItem(trashId) {

                const item = trashBin[idx];
                if (item.type === 'booking') bookings.push(item.data);
                else if (item.type === 'employee') employees.push(item.data);
                else if (item.type === 'client') clients.push(item.data);
                else if (item.type === 'hall') halls.push(item.data);
                trashBin.splice(idx, 1);
                addActivity('استعادة', `تم استعادة ${item.type}`);
                await saveAllData();
                renderTrash();
                showMsg('🔄 تمت الاستعادة');
            }

        // ==================== Import (Excel/PDF) ====================
        async function importBookingsFromFile() {
            openModal(
                `<h3 class="text-xl font-bold mb-3">📂 استيراد</h3><input type="file" id="importFileInput" accept=".xlsx,.xls,.pdf,.csv" class="w-full border p-2 my-2"><div id="importPreview" class="my-2"></div><div class="flex gap-2"><button onclick="processImportFile()" class="btn-primary flex-1">📥 استيراد</button><button onclick="closeModal()" class="btn-outline flex-1">إلغاء</button></div>`
                );
            document.getElementById('importFileInput').addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const ext = file.name.split('.').pop().toLowerCase();
                let rows = [];
                try {
                    if (ext === 'xlsx' || ext === 'xls') { const data = await file.arrayBuffer(); const wb = XLSX
                            .read(data); const sheet = wb.Sheets[wb.SheetNames[0]];
                        rows = XLSX.utils.sheet_to_json(sheet); } else if (ext === 'csv') { const text = await file
                            .text(); const lines = text.split('\n'); const headers = lines[0].split(',').map(h => h
                                .trim().replace(/["']/g, ''));
                        rows = lines.slice(1).filter(l => l.trim()).map(line => { const vals = line.split(',').map(
                                v => v.trim().replace(/["']/g, '')); let obj = {};
                            headers.forEach((h, i) => obj[h] = vals[i] || ''); return obj; }); } else if (ext ===
                        'pdf') { const arrayBuffer = await file.arrayBuffer(); const pdf = await pdfjsLib
                            .getDocument({ data: arrayBuffer }).promise; let fullText = ''; for (let i = 1; i <= pdf
                                .numPages; i++) { const page = await pdf.getPage(i); const textContent = await page
                                .getTextContent(); const strings = textContent.items.map(item => item.str);
                            fullText += strings.join(' ') + '\n'; }
                        rows = parsePDFText(fullText); }
                    rows = rows.filter(row => Object.values(row).some(v => v && String(v).trim()));
                    importedDataRows = rows;
                    document.getElementById('importPreview').innerHTML = rows.length ?
                        `<p class="text-green-600">✅ ${rows.length} صف صالح</p><div class="max-h-40 overflow-y-auto text-xs">${rows.slice(0,10).map(r=>`<div class="border-b py-1">${r['اسم العميل']||r['client name']||'—'} | ${r['التاريخ']||r['date']||'—'}</div>`).join('')}${rows.length>10?`<p>... و ${rows.length-10} صف آخر</p>`:''}</div>` :
                        `<p class="text-red-500">لا توجد بيانات صالحة</p>`;
                } catch (e) { showError('خطأ في قراءة الملف'); }
            });
        }

        function parsePDFText(text) { const rows = []; const lines = text.split(/\r?\n/);
            lines.forEach(line => { if (/\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(line)) { const parts = line.split(/\s{2,}|\t/);
                    if (parts.length >= 4) rows.push({ 'م': parts[0], 'اليوم': parts[1], 'التاريخ': parts[2],
                        'اسم العميل': parts[3], 'نوع الباكدج': parts[4] || '',
                        'اجمالي عدد الافراد': parts[5] || '0' }); } }); return rows; }

        async function processImportFile() { if (!importedDataRows.length) { showError('لا بيانات'); return; } let added =
                0; for (let row of importedDataRows) { let name = row['اسم العميل'] || row['client name'] || row[
                    'العميل'
                    ] || ''; if (!name) continue; let date = row['التاريخ'] || row['date'] || getTodayDateStr(); let
                match = String(date).match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/); if (match) date =
                `${match[1]}-${match[2].padStart(2,'0')}-${match[3].padStart(2,'0')}`; else date = getTodayDateStr(); const
                hallName = row['القاعة'] || row['hall'] || 'القاعة المفتوحة'; let hall = halls.find(h => h.name ===
                    hallName); if (!hall) { hall = { id: generateId('h_'), name: hallName, type: 'open', basePrice: 0,
                    active: true };
                halls.push(hall); }
            bookings.push({ id: generateId('b_'), clientName: name, clientId: null, phone: row['الهاتف'] || '',
                hallId: hall.id, hallName: hall.name, date, price: parseInt(row['السعر'] || 0), status: 'pending',
                paymentStatus: 'pending', assignedEmployees: [], notes: '', packageType: '', totalPersons: 0,
                attachments: [] });
            added++; }
            await saveAllData();
            renderBookings();
            closeModal();
            showMsg(`✅ تم استيراد ${added} حجز`);
            importedDataRows = []; }

              <main class="p-4 max-w-lg mx-auto">
                <div class="bg-card text-center mb-4"><h2 class="text-xl font-bold">👋 مرحباً ${emp?.name||currentUser?.name}</h2><p class="text-gray-500">${emp?.role||''}</p></div>
                <button onclick="startScan()" class="btn-primary w-full py-4 text-lg mb-4">📷 مسح QR لتسجيل الحضور</button>
                ${myBookings.length?`<div class="bg-card"><h3 class="font-bold mb-2">📅 أوردراتي اليوم</h3>${myBookings.map(b=>`<div class="border-b py-2"><strong>${b.clientName}</strong> - ${b.hallName}<br><small>${b.date}</small></div>`).join('')}</div>`:'<p class="text-center text-gray-400">لا توجد أوردرات معلقة</p>'}
              </main></div>`;
        }

        function renderAgentDash() {
            document.getElementById('app').innerHTML = `
            <div class="min-h-screen bg-gray-100 dark:bg-gray-900">
              <header class="bg-white dark:bg-gray-800 p-4 flex justify-between shadow"><h1 class="font-bold">${companyName} (وكيل)</h1><button onclick="logout()" class="btn-danger text-sm">خروج</button></header>
              <main class="p-4 max-w-lg mx-auto">
                <div class="bg-card text-center mb-4"><h2 class="text-xl font-bold">👋 مرحباً ${currentUser?.name}</h2></div>
                <button onclick="addBooking()" class="btn-primary w-full py-4 text-lg mb-3">+ حجز جديد</button>
                <div class="bg-card"><h3 class="font-bold mb-2">📋 آخر الحجوزات</h3>${bookings.filter(b=>!b.deleted).slice(0,10).map(b=>`<div class="border-b py-2 flex justify-between text-sm"><span>${b.clientName}</span><span>${b.date}</span></div>`).join('')}</div>
              </main></div>`;
        }

        // ==================== LOGIN ====================
        function renderLogin() {
            document.getElementById('app').innerHTML = `
            <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-700 to-teal-600 p-4">
              <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center">
                <div class="text-5xl mb-3">${companyLogoBase64?`<img src="${companyLogoBase64}" class="h-16 mx-auto rounded-full">`:companyLogo}</div>
                <h1 class="text-2xl font-bold mb-1 dark:text-white">${companyName}</h1>
                <p class="text-gray-500 mb-6 text-sm">نظام إدارة القاعات</p>
                <input type="text" id="loginUser" placeholder="👤 اسم المستخدم" class="w-full border-2 p-3 rounded-xl text-center mb-2" autocomplete="username">
                <input type="password" id="loginPass" placeholder="🔒 كلمة المرور" class="w-full border-2 p-3 rounded-xl text-center mb-4" autocomplete="current-password">
                <button id="loginBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold transition">🚪 دخول</button>
                <div class="text-xs text-gray-400 mt-6"><p>مدير: ahmed / 1994 | مدير تنفيذي: manager / manager123</p><p>موظف: ahmed_emp / emp123 | وكيل: agent / agent123</p></div>
              </div></div>`;
            document.getElementById('loginBtn').onclick = doLogin;
            document.getElementById('loginPass')?.addEventListener('keydown', function(e) { if (e.key === 'Enter')
            doLogin(); });
        }

        function doLogin() {
            const u = document.getElementById('loginUser')?.value.trim(),
                p = document.getElementById('loginPass')?.value;
            if (!u || !p) { showError('أدخل بيانات الدخول'); return; }
            const user = USERS.find(x => x.username === u && x.password === p);
            if (user) {
                currentUser = user;
                sessionStorage.setItem('drmedia_user', JSON.stringify(user));
                showMsg(`👋 مرحباً ${user.name}`);
                if (user.role === 'admin' || user.role === 'manager') renderAdminDashboard();
                else if (user.role === 'employee') { if (!user.employeeId) { showError(
                        'غير مرتبط بموظف');
                        renderLogin(); return; }
                    renderEmpDash(); } else renderAgentDash();
                requestNotificationPermission();
                checkReminders();
            } else showError('بيانات خاطئة');
        }

        function logout() { sessionStorage.removeItem('drmedia_user');
            currentUser = null;
            renderLogin(); }

        // ==================== INIT ====================
        function requestNotificationPermission() { if ('Notification' in window && Notification.permission ===
                'default') Notification.requestPermission().then(p => { browserNotifications = p === 'granted'; }); else if (
                'Notification' in window && Notification.permission === 'granted') browserNotifications = true; }
        async function initApp() {
            try { firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                useFirebase = true;
                online = true; } catch (e) { useFirebase = false;
                online = false; }
            await loadAllData();
            applyTheme(appTheme);
            const saved = sessionStorage.getItem('drmedia_user');
            if (saved && saved !== 'undefined') {
                try {
                    currentUser = JSON.parse(saved);
                    const valid = USERS.find(u => u.id === currentUser.id);
                    if (!valid) { sessionStorage.removeItem('drmedia_user');
                        currentUser = null;
                        renderLogin(); return; }
                    currentUser = valid;
                    if (isAdmin() || isManager()) renderAdminDashboard();
                    else if (isEmployee()) { if (!currentUser.employeeId) { showError(
                            'غير مرتبط بموظف');
                            renderLogin(); return; }
                        renderEmpDash(); } else renderAgentDash();
                    requestNotificationPermission();
                    checkReminders();
                } catch (e) { sessionStorage.removeItem('drmedia_user');
                    renderLogin(); }
            } else renderLogin();
            requestNotificationPermission();
            setInterval(checkReminders, 6 * 3600000);
        }
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
