<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #16a34a;
            --primary-light: #22c55e;
            --primary-dark: #15803d;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --radius: 16px;
            --transition: all 0.2s ease;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card-bg: #1e293b;
                --text: #f1f5f9;
                --text-light: #94a3b8;
                --border: #334155;
                --shadow: 0 4px 6px -1px rgba(0,0,0,0.4);
            }
        }
        .theme-dark { --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --text-light: #94a3b8; --border: #334155; }
        .theme-blue { --primary: #2563eb; --primary-light: #3b82f6; --primary-dark: #1d4ed8; --bg: #eff6ff; }
        .theme-green { --primary: #059669; --primary-light: #10b981; --primary-dark: #047857; --bg: #ecfdf5; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            direction: rtl;
            transition: background 0.3s, color 0.3s;
            line-height: 1.7;
            min-height: 100vh;
        }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px; min-width: 280px;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            position: fixed; right: 0; top: 0; bottom: 0; z-index: 1000;
            display: flex; flex-direction: column;
            box-shadow: -5px 0 25px rgba(0,0,0,0.3);
            transition: right 0.4s ease;
        }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-logo {
            width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 18px; display: inline-flex; align-items: center; justify-content: center;
            font-size: 28px; margin-bottom: 12px; box-shadow: 0 8px 25px rgba(22,163,74,0.3);
        }
        .sidebar-nav { flex: 1; padding: 15px 12px; overflow-y: auto; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 15px; margin: 3px 0; border-radius: 14px;
            cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500;
            color: rgba(255,255,255,0.7);
        }
        .nav-item:hover { background: rgba(255,255,255,0.08); color: white; transform: translateX(-5px); }
        .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; font-weight: 700; }
        .main-content { flex: 1; margin-right: 280px; padding: 30px; min-height: 100vh; transition: margin 0.4s ease; }
        .screen { display: none; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card {
            background: var(--card-bg); border-radius: var(--radius); padding: 25px;
            box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border);
        }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 20px; border: none; border-radius: 12px;
            font-family: inherit; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; margin: 2px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .table-wrapper { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); min-width: 800px; }
        th { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; padding: 14px 12px; font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-warning { background: #fef9c3; color: #854d0e; }
        .alert { padding: 14px 20px; border-radius: 12px; margin: 12px 0; font-weight: 500; }
        .alert-info { background: #eff6ff; color: #1e40af; }
        .hidden { display: none !important; }
        .form-control {
            width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 12px;
            font-family: inherit; font-size: 14px; background: var(--card-bg); color: var(--text);
        }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal {
            background: var(--card-bg); border-radius: var(--radius); padding: 30px;
            width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto;
        }
        @media (max-width: 968px) {
            .sidebar { right: -100%; width: 100%; max-width: 300px; }
            .sidebar.show { right: 0; }
            .main-content { margin-right: 0; padding: 15px; }
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
// ========== IndexedDB Database ==========
const DB_NAME = 'drmedia-db', STORE_NAME = 'appData';
function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}
async function saveToIDB(data) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put({ id: 'global', ...data });
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}
async function loadFromIDB() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.get('global');
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => reject(request.error);
    });
}

// ========== Firebase ==========
const firebaseConfig = {
    apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
    authDomain: "drmedia-vpms.firebaseapp.com",
    databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
    projectId: "drmedia-vpms",
    storageBucket: "drmedia-vpms.firebasestorage.app",
    messagingSenderId: "681162512380",
    appId: "1:681162512380:web:ab2482f3234d8b59fc4479"
};
let db = null;
try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
} catch(e) { console.warn('Firebase offline'); }

// ========== Global State ==========
let currentUser = null;
let USERS = [ { id: 'admin1', username: 'ahmed', password: '1994', role: 'admin', name: 'مدير النظام' }, { id: 'emp1', username: 'emp1', password: 'emp123', role: 'employee', employeeId: 'emp1', name: 'موظف' } ];
let bookings = [], employees = [], halls = [], clients = [], attendanceRecords = [], payrollArchive = [], notifications = [], trashBin = [];
let appTheme = 'light', whatsappEnabled = true;
let searchTerm = '';

function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }

async function saveAllData() {
    const data = { bookings, employees, halls, clients, attendanceRecords, payrollArchive, notifications, trashBin, USERS, appTheme, whatsappEnabled };
    localStorage.setItem('drmedia_data', JSON.stringify(data));
    await saveToIDB(data);
    if (db) db.ref('/').set(data).catch(()=>{});
}
async function loadAllData() {
    let data = null;
    const idbData = await loadFromIDB();
    if (idbData) {
        data = idbData;
    } else {
        const local = localStorage.getItem('drmedia_data');
        if (local) data = JSON.parse(local);
    }
    if (db) {
        try {
            const snap = await db.ref('/').get();
            if (snap.exists()) data = snap.val();
        } catch(e) {}
    }
    if (data) {
        bookings = data.bookings || []; employees = data.employees || []; halls = data.halls || []; clients = data.clients || [];
        attendanceRecords = data.attendanceRecords || []; payrollArchive = data.payrollArchive || []; notifications = data.notifications || [];
        trashBin = data.trashBin || []; USERS = data.USERS || USERS; appTheme = data.appTheme || 'light'; whatsappEnabled = data.whatsappEnabled !== false;
    }
    if (!halls.length) halls = [ { id:'h1', name:'المغلقة', type:'closed', basePrice:5000, active:true }, { id:'h2', name:'الأوبن', type:'open', basePrice:4000, active:true }, { id:'h3', name:'الكافيه', type:'cafe', basePrice:2000, active:true } ];
    if (!employees.length) employees = [ { id:'emp1', name:'مخرج 1', role:'مخرج', phone:'01001234567', salaryPerOrder:300, active:true, totalOrders:0, totalAdvance:0, totalDeductions:0 } ];
    if (!bookings.length) bookings = [ { id:'b1', clientName:'عميل تجريبي', phone:'01012345678', hallId:'h1', hallName:'المغلقة', date:new Date().toISOString().slice(0,10), price:5000, deposit:2000, status:'pending', assignedEmployees:[], notes:'', deleted:false } ];
    if (!clients.length) clients = [ { id:'c1', name:'عميل تجريبي', phone:'01012345678' } ];
    updateEmployeeOrders();
}

function updateEmployeeOrders() {
    employees.forEach(emp => {
        let count = 0;
        bookings.forEach(b => {
            if (!b.deleted && b.status !== 'cancelled' && (b.assignedEmployees || []).includes(emp.id)) {
                const attended = attendanceRecords.some(a => a.empId === emp.id && a.date === b.date && a.checkIn);
                if (attended) count++;
            }
        });
        emp.totalOrders = count;
    });
}
function filterData(list, fields, term) {
    if (!term) return list;
    const low = term.toLowerCase();
    return list.filter(item => fields.some(f => String(item[f] || '').toLowerCase().includes(low)));
}

// ========== Keyboard Shortcuts ==========
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    if (e.ctrlKey || e.metaKey) {
        if (e.shiftKey) {
            e.preventDefault();
            if (e.key === 'D' || e.key === 'د') navigate('dashboard');
            else if (e.key === 'B' || e.key === 'ب') navigate('bookings');
            else if (e.key === 'E' || e.key === 'ث') navigate('employees');
            else if (e.key === 'N' || e.key === 'ن') { navigate('bookings'); setTimeout(() => showAddBookingModal(), 100); }
            else if (e.key === 'F' || e.key === 'ف') document.getElementById('globalSearch')?.focus();
        }
    }
});

// ========== UI helpers ==========
function showMsg(msg) {
    const t = document.createElement('div');
    t.className = 'toast show'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
function openModal(content) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal">${content}</div>`;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
}
function closeModal() {
    const overlay = document.querySelector('.modal-overlay');
    if (overlay) overlay.remove();
}
function navigate(section) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const items = document.querySelectorAll('.nav-item');
    items.forEach(el => { if (el.getAttribute('onclick')?.includes(`'${section}'`)) el.classList.add('active'); });
    const c = document.getElementById('adminContent');
    switch(section) {
        case 'dashboard': renderDashboard(c); break;
        case 'bookings': renderBookings(c); break;
        case 'employees': renderEmployees(c); break;
        case 'halls': renderHalls(c); break;
        case 'clients': renderClients(c); break;
        case 'distribution': renderDistribution(c); break;
        case 'attendance': renderAttendance(c); break;
        case 'payroll': renderPayroll(c); break;
        case 'import': renderImport(c); break;
        case 'calendar': renderCalendar(c); break;
        case 'notifications': renderNotifications(c); break;
        case 'reports': renderReports(c); break;
        case 'trash': renderTrash(c); break;
        case 'users': renderUsers(c); break;
        case 'settings': renderSettings(c); break;
    }
}
function renderDashboard(c) {
    const total = bookings.filter(b=>!b.deleted&&b.status!=='cancelled').length;
    const confirmed = bookings.filter(b=>b.status==='confirmed'&&!b.deleted).length;
    const pending = bookings.filter(b=>b.status==='pending'&&!b.deleted).length;
    const revenue = bookings.reduce((s,b)=>!b.deleted&&b.status!=='cancelled'?s+(b.price||0):s,0);
    c.innerHTML = `
        <div class="stats-grid" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px;">
            <div class="stat-card"><h3>${total}</h3><p>إجمالي الحجوزات</p></div>
            <div class="stat-card"><h3>${confirmed}</h3><p>مؤكدة</p></div>
            <div class="stat-card"><h3>${pending}</h3><p>معلقة</p></div>
            <div class="stat-card"><h3>${revenue.toLocaleString()} ج.م</h3><p>الإيرادات</p></div>
        </div>
        <div class="card"><canvas id="dashboardChart" height="100"></canvas></div>`;
    setTimeout(() => {
        const ctx = document.getElementById('dashboardChart');
        if (ctx) new Chart(ctx, { type: 'bar', data: { labels: ['مؤكد','معلق'], datasets: [{ data: [confirmed, pending], backgroundColor: ['#10b981','#f59e0b'] }] }, options: { responsive: true, plugins: { legend: { display: false } } } });
    }, 200);
}
function renderBookings(c) {
    let rows = '';
    const filtered = filterData(bookings.filter(b=>!b.deleted), ['clientName','phone','hallName','date'], searchTerm);
    filtered.forEach(b => {
        const assigned = (b.assignedEmployees||[]).map(id=>employees.find(e=>e.id===id)?.name||id).join(', ');
        rows += `<tr><td>${b.clientName}</td><td>${b.phone||''}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price||0}</td><td><span class="badge ${b.status==='confirmed'?'badge-success':'badge-warning'}">${b.status==='confirmed'?'مؤكد':'معلق'}</span></td><td>${assigned||'-'}</td><td><button class="btn btn-sm" onclick="editBooking('${b.id}')"><i class="fas fa-edit"></i></button></td></tr>`;
    });
    c.innerHTML = `
        <div class="card">
            <div class="card-header"><h4>الحجوزات</h4>
                <input class="form-control" id="globalSearch" placeholder="بحث سريع (Ctrl+Shift+F)" style="max-width:250px;" oninput="searchTerm = this.value; renderBookings(document.getElementById('adminContent'))">
            </div>
            <div class="table-wrapper"><table><thead><tr><th>العميل</th><th>الهاتف</th><th>التاريخ</th><th>القاعة</th><th>السعر</th><th>الحالة</th><th>الموظفين</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
        </div>`;
}
function renderEmployees(c) { /* ... مختصر للتركيز على الميزات الجديدة */ }
function renderHalls(c) { /* ... */ }
function renderClients(c) { /* ... */ }
function renderDistribution(c) { /* ... */ }
function renderAttendance(c) { /* ... */ }
function renderPayroll(c) { /* ... */ }
function renderImport(c) { /* ... */ }
function renderCalendar(c) { /* ... */ }
function renderNotifications(c) { /* ... */ }
function renderReports(c) { /* ... */ }
function renderTrash(c) { /* ... */ }
function renderUsers(c) { /* ... */ }
function renderSettings(c) { /* ... */ }

// ========== Quick Add Booking Modal ==========
window.showAddBookingModal = () => {
    openModal(`
        <h4>إضافة حجز سريع</h4>
        <div class="form-row"><div><label>العميل</label><input class="form-control" id="qcName"></div><div><label>الهاتف</label><input class="form-control" id="qcPhone"></div></div>
        <div class="form-row"><div><label>التاريخ</label><input class="form-control" type="date" id="qcDate"></div><div><label>القاعة</label><select class="form-control" id="qcHall">${halls.filter(h=>h.active).map(h=>`<option value="${h.id}">${h.name}</option>`).join('')}</select></div></div>
        <button class="btn btn-primary" onclick="quickAddBooking()">حفظ</button>
    `);
};
window.quickAddBooking = () => {
    const client = document.getElementById('qcName').value.trim();
    const date = document.getElementById('qcDate').value;
    const hallId = document.getElementById('qcHall').value;
    const hall = halls.find(h=>h.id===hallId);
    if(!client||!date||!hall) return showMsg('املأ الحقول');
    bookings.push({ id: generateId(), clientName: client, phone: document.getElementById('qcPhone').value, date, hallId, hallName: hall.name, price: hall.basePrice, deposit:0, status:'pending', assignedEmployees:[], notes:'', deleted:false });
    saveAllData(); closeModal(); navigate('bookings'); showMsg('تمت الإضافة');
};

// ========== PWA Service Worker ==========
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered');
        }).catch(err => console.log('SW failed', err));
    });
}

// ========== Init App ==========
(async function init() {
    await loadAllData();
    // login screen (simplified)
    document.getElementById('app').innerHTML = `
        <div id="loginScreen" class="screen active" style="display:flex; justify-content:center; align-items:center; min-height:100vh; background:linear-gradient(135deg,#16a34a,#047857);">
            <div class="card" style="max-width:400px; width:100%;">
                <h2 style="text-align:center;">تسجيل الدخول</h2>
                <input class="form-control" id="loginUser" placeholder="اسم المستخدم">
                <input class="form-control" type="password" id="loginPass" placeholder="كلمة المرور" style="margin:10px 0;">
                <button class="btn btn-primary" style="width:100%;" onclick="doLogin()">دخول</button>
            </div>
        </div>
        <div id="adminScreen" class="screen" style="display:none;">
            <div class="sidebar"><!-- sidebar nav as before --></div>
            <div class="main-content" id="adminContent"></div>
        </div>`;
    window.doLogin = () => {
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value.trim();
        const user = USERS.find(x => x.username === u && x.password == p);
        if (!user) return alert('بيانات خاطئة');
        currentUser = user;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'block';
        navigate('dashboard');
    };
})();
</script>
