<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام توزيع الأوردرات</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Google Fonts (Tajawal) -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- html5-qrcode -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <!-- SheetJS -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --secondary: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      --radius: 16px;
      --transition: all 0.3s ease;
    }

    .dark-theme {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --text-light: #94a3b8;
      --shadow: 0 4px 6px -1px rgba(255,255,255,0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      direction: rtl;
      transition: background 0.3s, color 0.3s;
    }

    .screen {
      display: none;
      min-height: 100vh;
      padding: 20px;
      animation: fadeIn 0.4s ease;
    }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* بطاقات */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 30px;
      width: 100%;
      max-width: 500px;
      margin: 20px auto;
      transition: var(--transition);
    }

    /* أزرار */
    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
    }
    .btn:hover { background: var(--primary-dark); }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }
    .btn-outline:hover { background: var(--primary); color: white; }
    .btn-sm { padding: 8px 16px; font-size: 14px; }
    .btn-danger { background: var(--danger); color: white; border: none; }
    .btn-success { background: var(--secondary); color: white; border: none; }

    /* حقول */
    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0 16px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-family: inherit;
      font-size: 16px;
      background: var(--card);
      color: var(--text);
    }
    label { font-weight: 500; display: block; margin-top: 8px; }

    /* قائمة التنقل */
    .nav {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nav button {
      background: var(--card);
      border: 1px solid #cbd5e1;
      padding: 8px 16px;
      border-radius: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
    }
    .nav button:hover { background: var(--primary); color: white; }

    /* جداول */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    th, td {
      padding: 12px;
      text-align: right;
      border-bottom: 1px solid #e2e8f0;
    }
    th { background: var(--primary); color: white; }

    .hidden { display: none !important; }

    /* QR reader */
    #qr-reader { width: 100%; max-width: 400px; margin: auto; }

    /* للشاشات الصغيرة */
    @media (max-width: 768px) {
      .card { padding: 20px; }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- شاشة تسجيل الدخول -->
  <div id="login-screen" class="screen active">
    <div class="card">
      <h2><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h2>
      <form id="login-form">
        <label>البريد الإلكتروني</label>
        <input type="email" id="login-email" placeholder="user@example.com" required>
        <label>كلمة المرور</label>
        <input type="password" id="login-password" placeholder="••••••" required>
        <button type="submit" class="btn" style="width:100%"><i class="fas fa-arrow-left"></i> دخول</button>
      </form>
      <div style="margin-top: 16px; text-align: center;">
        <button id="biometric-login-btn" class="btn btn-outline btn-sm"><i class="fas fa-fingerprint"></i> دخول بالبصمة</button>
      </div>
      <p style="margin-top:12px; text-align:center; color:var(--text-light);">لإنشاء حساب جديد، استخدم لوحة الأدمن</p>
    </div>
  </div>

  <!-- لوحة الأدمن -->
  <div id="admin-screen" class="screen">
    <h2 style="text-align:center;"><i class="fas fa-user-shield"></i> لوحة التحكم</h2>
    <div class="nav">
      <button onclick="showAdminSection('users')"><i class="fas fa-users"></i> الموظفين</button>
      <button onclick="showAdminSection('orders')"><i class="fas fa-calendar-alt"></i> الأوردرات</button>
      <button onclick="showAdminSection('distribution')"><i class="fas fa-tasks"></i> توزيع</button>
      <button onclick="showAdminSection('import')"><i class="fas fa-file-import"></i> استيراد</button>
      <button onclick="showAdminSection('notifications')"><i class="fas fa-bell"></i> إشعارات</button>
      <button onclick="showAdminSection('settings')"><i class="fas fa-cog"></i> إعدادات</button>
      <button id="logout-btn" class="btn btn-danger btn-sm"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>

    <div id="admin-content" class="card" style="max-width: 900px;"></div>
  </div>

  <!-- لوحة الموظف -->
  <div id="employee-screen" class="screen">
    <h2 style="text-align:center;"><i class="fas fa-id-card"></i> لوحة الموظف</h2>
    <div class="nav">
      <button onclick="showEmployeeSection('attendance')"><i class="fas fa-qrcode"></i> حضور</button>
      <button onclick="showEmployeeSection('myorders')"><i class="fas fa-list"></i> أوردراتي</button>
      <button onclick="showEmployeeSection('salary')"><i class="fas fa-money-bill"></i> مرتبي</button>
      <button id="emp-logout-btn" class="btn btn-danger btn-sm"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
    <div id="employee-content" class="card" style="max-width: 800px;"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
    getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, 
    createUserWithEmailAndPassword, browserLocalPersistence, setPersistence
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { 
    getFirestore, collection, doc, setDoc, getDoc, getDocs, 
    query, where, orderBy, onSnapshot, addDoc, updateDoc, deleteDoc,
    Timestamp, writeBatch, serverTimestamp 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ======== إعدادات Firebase (غيّرها بمشروعك) ========
  const firebaseConfig = {
  apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
  authDomain: "drmedia-vpms.firebaseapp.com",
  databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
  projectId: "drmedia-vpms",
  storageBucket: "drmedia-vpms.firebasestorage.app",
  messagingSenderId: "681162512380",
  appId: "1:681162512380:web:ab2482f3234d8b59fc4479",
  measurementId: "G-9KHN6N33FX"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // تفعيل استمرار الجلسة محليًا
  setPersistence(auth, browserLocalPersistence);

  // ======== نظام الصفحات ========
  const screens = document.querySelectorAll('.screen');
  window.showScreen = (screenId) => {
    screens.forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  };

  // ======== مراقبة حالة المستخدم ========
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists()) {
        const userData = userDoc.data();
        if (userData.role === 'admin') {
          showScreen('admin-screen');
          loadAdminDashboard(userData);
        } else {
          showScreen('employee-screen');
          loadEmployeeDashboard(userData);
        }
      } else {
        await auth.signOut();
        showScreen('login-screen');
      }
    } else {
      showScreen('login-screen');
    }
  });

  // ======== تسجيل الدخول ========
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (error) {
      alert('فشل الدخول: ' + error.message);
    }
  });

  // بصمة وهمية
  document.getElementById('biometric-login-btn').addEventListener('click', async () => {
    alert('ميزة البصمة تحتاج HTTPS ومتصفح داعم. استخدم تسجيل الدخول العادي الآن.');
    // هنا يُضاف WebAuthn لاحقًا
  });

  // تسجيل الخروج
  document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());
  document.getElementById('emp-logout-btn').addEventListener('click', () => auth.signOut());

  // ======== الأدمن ========
  window.showAdminSection = (section) => {
    const content = document.getElementById('admin-content');
    switch(section) {
      case 'users': renderAdminUsers(content); break;
      case 'orders': renderAdminOrders(content); break;
      case 'distribution': renderDistribution(content); break;
      case 'import': renderImport(content); break;
      case 'notifications': renderNotifications(content); break;
      case 'settings': renderSettings(content); break;
    }
  };

  function loadAdminDashboard(userData) {
    showAdminSection('users');
  }

  // ----- إدارة الموظفين -----
  async function renderAdminUsers(container) {
    container.innerHTML = `<h3>إدارة الموظفين</h3>
      <button class="btn btn-sm" onclick="document.getElementById('addUserForm').classList.toggle('hidden')"><i class="fas fa-plus"></i> إضافة موظف</button>
      <div id="addUserForm" class="hidden card" style="max-width:400px;">
        <input type="text" id="newUserName" placeholder="الاسم">
        <input type="email" id="newUserEmail" placeholder="بريد إلكتروني">
        <input type="password" id="newUserPassword" placeholder="كلمة مرور">
        <select id="newUserRole">
          <option value="employee">موظف</option>
          <option value="admin">أدمن</option>
        </select>
        <select id="newUserDept">
          <option value="مخرج">مخرج</option>
          <option value="مصور">مصور</option>
          <option value="كرين">كرين</option>
        </select>
        <button class="btn btn-success btn-sm" onclick="addUser()">حفظ</button>
      </div>
      <div id="usersTable"></div>`;

    const q = query(collection(db, "users"));
    const snapshot = await getDocs(q);
    let html = `<table><tr><th>الاسم</th><th>البريد</th><th>الدور</th><th>القسم</th></tr>`;
    snapshot.forEach(doc => {
      const u = doc.data();
      html += `<tr><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td><td>${u.department}</td></tr>`;
    });
    html += `</table>`;
    document.getElementById('usersTable').innerHTML = html;
  }

  window.addUser = async () => {
    const name = document.getElementById('newUserName').value;
    const email = document.getElementById('newUserEmail').value;
    const password = document.getElementById('newUserPassword').value;
    const role = document.getElementById('newUserRole').value;
    const dept = document.getElementById('newUserDept').value;
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, "users", userCredential.user.uid), {
        name, email, role, department: dept, salaryPerOrder: 0, advance: 0, deductions: 0
      });
      alert('تم إضافة الموظف');
      renderAdminUsers(document.getElementById('admin-content'));
    } catch (e) { alert(e.message); }
  };

  // ----- استيراد إكسيل -----
  function renderImport(container) {
    container.innerHTML = `
      <h3>استيراد الحجوزات</h3>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
      <button class="btn btn-sm" onclick="importExcel()">استيراد</button>
      <div id="importResult"></div>`;
  }

  window.importExcel = async () => {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type: 'array'});
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(firstSheet, {header:1});
      let count = 0;
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        if (row.length < 6) continue;
        const [serial, dateStr, day, groom, packageType, guests] = row;
        // محاولة تحويل أي صيغة تاريخ
        const dateObj = new Date(dateStr);
        if (isNaN(dateObj.getTime())) continue; // تجاهل الصفوف بدون تاريخ صحيح
        const orderData = {
          serial: serial.toString(),
          date: Timestamp.fromDate(dateObj),
          day: day || '',
          groomName: groom || '',
          packageType: packageType || '',
          guestsCount: Number(guests) || 0,
          hallType: '', // ستحدد لاحقًا يدويًا أو بقاعدة
          assignedEmployees: [],
          status: 'pending'
        };
        await addDoc(collection(db, "orders"), orderData);
        count++;
      }
      document.getElementById('importResult').innerHTML = `<p class="text-success">تم استيراد ${count} حجز بنجاح</p>`;
      alert('تم استيراد ' + count + ' صف');
    };
    reader.readAsArrayBuffer(file);
  };

  // ----- توزيع الأوردرات -----
  async function renderDistribution(container) {
    container.innerHTML = `<h3>توزيع الأوردرات</h3>
      <label>اختر القاعة:</label>
      <select id="distHall">
        <option value="قاعة_مغلقة">قاعة مغلقة</option>
        <option value="قاعة_مفتوحة">قاعة مفتوحة</option>
        <option value="كافيه">كافيه</option>
      </select>
      <label>اختر التاريخ (أو اتركه للكل)</label>
      <input type="date" id="distDate">
      <button class="btn" onclick="distributeSmart()"><i class="fas fa-magic"></i> توزيع ذكي</button>
      <button class="btn btn-outline" onclick="manualDistribute()"><i class="fas fa-hand-pointer"></i> يدوي</button>
      <div id="distResult"></div>`;
  }

  // توزيع ذكي بالتساوي
  window.distributeSmart = async () => {
    const hall = document.getElementById('distHall').value;
    const dateVal = document.getElementById('distDate').value;
    let constraints = [];
    if (dateVal) {
      const start = new Date(dateVal);
      start.setHours(0,0,0,0);
      const end = new Date(dateVal);
      end.setHours(23,59,59,999);
      constraints.push(where('date', '>=', Timestamp.fromDate(start)));
      constraints.push(where('date', '<=', Timestamp.fromDate(end)));
    }
    const qOrders = query(collection(db, "orders"), ...constraints);
    const ordersSnap = await getDocs(qOrders);
    const orders = [];
    ordersSnap.forEach(d => orders.push({id: d.id, ...d.data()}));

    // تحديد الأدوار المطلوبة حسب القاعة
    const requiredRoles = hall === 'كافيه' ? ['مصور'] : ['مخرج','مصور','مصور','كرين'];
    // جلب الموظفين حسب الأدوار المطلوبة
    const roleSet = [...new Set(requiredRoles)];
    const usersSnap = await getDocs(query(collection(db, "users"), where('role','==','employee')));
    const employees = [];
    usersSnap.forEach(d => {
      const u = d.data();
      if (roleSet.includes(u.department)) employees.push({id: d.id, ...u});
    });

    // حساب عدد الأوردرات الحالية لكل موظف (بسيط)
    const counts = {};
    employees.forEach(e => counts[e.id] = 0);
    // (هنا يمكن تحسينها بقاعدة بيانات حقيقية)

    // توزيع بالتساوي
    let result = '';
    for (let order of orders) {
      // اختر موظفًا من كل دور مطلوب (أقلهم أوردرات)
      const assigned = [];
      for (let role of requiredRoles) {
        const candidates = employees.filter(e => e.department === role && !assigned.includes(e.id));
        if (candidates.length === 0) continue;
        candidates.sort((a,b) => (counts[a.id]||0) - (counts[b.id]||0));
        const chosen = candidates[0];
        assigned.push(chosen.id);
        counts[chosen.id]++;
      }
      await updateDoc(doc(db, "orders", order.id), { assignedEmployees: assigned });
      result += `تم تعيين الأوردر ${order.serial} للموظفين: ${assigned.join(', ')}\n`;
    }
    document.getElementById('distResult').innerText = result || 'لا يوجد أوردرات مطابقة.';
  };

  window.manualDistribute = () => {
    // للتطبيق اليدوي: فتح نافذة اختيار الموظفين لكل أوردر
    alert('سيتم تطوير التوزيع اليدوي في نسخة قادمة');
  };

  // ----- إشعارات -----
  function renderNotifications(container) {
    container.innerHTML = `
      <h3>إرسال إشعار</h3>
      <textarea id="notifMsg" placeholder="اكتب الإشعار هنا..."></textarea>
      <select id="notifTarget">
        <option value="all">كل الموظفين</option>
        <option value="specific">موظف محدد</option>
      </select>
      <div id="specificUserSelect" class="hidden">
        <label>معرف الموظف (UID)</label>
        <input type="text" id="specificUserId" placeholder="أدخل UID">
      </div>
      <button class="btn" onclick="sendNotification()">إرسال</button>
      <div id="notifResult"></div>`;
    document.getElementById('notifTarget').addEventListener('change', function(){
      document.getElementById('specificUserSelect').classList.toggle('hidden', this.value !== 'specific');
    });
  }

  window.sendNotification = async () => {
    const msg = document.getElementById('notifMsg').value;
    const target = document.getElementById('notifTarget').value;
    if (target === 'all') {
      await addDoc(collection(db, "notifications"), {
        message: msg, target: 'all', sentAt: serverTimestamp()
      });
    } else {
      const uid = document.getElementById('specificUserId').value;
      await addDoc(collection(db, "notifications"), {
        message: msg, target: uid, sentAt: serverTimestamp()
      });
    }
    alert('تم إرسال الإشعار');
  };

  // ----- إعدادات -----
  function renderSettings(container) {
    container.innerHTML = `
      <h3>إعدادات التطبيق</h3>
      <label>اسم الشركة</label>
      <input type="text" id="companyName" placeholder="اسم الشركة">
      <label>رابط اللوجو</label>
      <input type="text" id="logoUrl" placeholder="https://...">
      <label>رقم الواتساب للدعم</label>
      <input type="text" id="whatsappNumber" placeholder="+966...">
      <button class="btn" onclick="saveSettings()">حفظ</button>
      <hr>
      <h3>تغيير الثيم</h3>
      <button class="btn btn-sm" onclick="toggleTheme()">تبديل الوضع الليلي</button>
      <h3>نسخ احتياطي</h3>
      <button class="btn btn-sm" onclick="exportBackup()">تصدير</button>
      <input type="file" id="importBackupFile" accept=".json" style="margin-top:8px">
      <button class="btn btn-sm" onclick="importBackup()">استيراد نسخة</button>`;
    // تحميل الإعدادات الحالية
    getDoc(doc(db, "settings", "global")).then(docSnap => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById('companyName').value = data.companyName || '';
        document.getElementById('logoUrl').value = data.logoUrl || '';
        document.getElementById('whatsappNumber').value = data.whatsappNumber || '';
      }
    });
  }

  window.saveSettings = async () => {
    const companyName = document.getElementById('companyName').value;
    const logoUrl = document.getElementById('logoUrl').value;
    const whatsappNumber = document.getElementById('whatsappNumber').value;
    await setDoc(doc(db, "settings", "global"), { companyName, logoUrl, whatsappNumber });
    alert('تم الحفظ');
  };

  window.toggleTheme = () => {
    document.body.classList.toggle('dark-theme');
  };

  window.exportBackup = async () => {
    const data = { users: [], orders: [], attendance: [] };
    const usersSnap = await getDocs(collection(db, "users"));
    usersSnap.forEach(d => data.users.push(d.data()));
    const ordersSnap = await getDocs(collection(db, "orders"));
    ordersSnap.forEach(d => data.orders.push({id: d.id, ...d.data()}));
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'backup.json'; a.click();
  };

  window.importBackup = async () => {
    const file = document.getElementById('importBackupFile').files[0];
    if (!file) return;
    const text = await file.text();
    const data = JSON.parse(text);
    const batch = writeBatch(db);
    data.users.forEach(u => {
      // لا يمكن استيراد كلمة مرور auth مباشرة، هذا مثال فقط
    });
    data.orders.forEach(o => {
      const ref = doc(collection(db, "orders"));
      batch.set(ref, o);
    });
    await batch.commit();
    alert('تم الاستيراد');
  };

  // ======== الموظف ========
  window.showEmployeeSection = (section) => {
    const content = document.getElementById('employee-content');
    switch(section) {
      case 'attendance': renderAttendance(content); break;
      case 'myorders': renderMyOrders(content); break;
      case 'salary': renderSalary(content); break;
    }
  };

  function loadEmployeeDashboard(userData) {
    showEmployeeSection('attendance');
  }

  // حضور بـ QR سكان
  function renderAttendance(container) {
    container.innerHTML = `
      <h3>تسجيل الحضور</h3>
      <p>استخدم QR المخصص للأوردر أو زر الكاميرا</p>
      <div id="qr-reader"></div>
      <div id="attendanceResult" class="text-success"></div>
      <button class="btn btn-sm" onclick="startQR()">تشغيل الكاميرا</button>
      <button class="btn btn-sm btn-outline" onclick="stopQR()">إيقاف</button>
      <hr>
      <h4>محاكاة QR</h4>
      <button class="btn btn-sm" onclick="mockAttendance()">تسجيل حضور يدوي (تجربة)</button>`;
  }

  let html5QrCode;
  window.startQR = () => {
    html5QrCode = new Html5Qrcode("qr-reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      (decodedText) => {
        // يفترض أن النص هو orderId
        registerAttendance(decodedText);
        html5QrCode.stop();
      },
      (errorMessage) => { /* ignore */ }
    ).catch(err => alert("خطأ في الكاميرا: " + err));
  };

  window.stopQR = () => {
    if (html5QrCode) html5QrCode.stop();
  };

  async function registerAttendance(orderId) {
    const user = auth.currentUser;
    if (!user) return;
    // سجل في Firestore
    await addDoc(collection(db, "attendance"), {
      userId: user.uid,
      orderId: orderId,
      timestamp: serverTimestamp()
    });
    document.getElementById('attendanceResult').innerText = 'تم تسجيل حضورك للأوردر: ' + orderId;
  }

  window.mockAttendance = async () => {
    const orderId = prompt("أدخل معرف الأوردر (أو رقم مسلسل):");
    if (orderId) await registerAttendance(orderId);
  };

  // عرض أوردرات الموظف
  async function renderMyOrders(container) {
    const user = auth.currentUser;
    if (!user) return;
    const q = query(collection(db, "orders"), where("assignedEmployees", "array-contains", user.uid));
    const snapshot = await getDocs(q);
    let html = '<table><tr><th>الرقم</th><th>التاريخ</th><th>العريس</th><th>القاعة</th></tr>';
    snapshot.forEach(doc => {
      const o = doc.data();
      html += `<tr><td>${o.serial}</td><td>${o.date?.toDate().toLocaleDateString() || ''}</td><td>${o.groomName}</td><td>${o.hallType}</td></tr>`;
    });
    html += '</table>';
    container.innerHTML = `<h3>أوردراتي</h3> ${html}`;
  }

  // المرتب
  async function renderSalary(container) {
    const user = auth.currentUser;
    if (!user) return;
    const userDoc = await getDoc(doc(db, "users", user.uid));
    const uData = userDoc.data() || {};
    const ordersCount = (await getDocs(query(collection(db, "orders"), where("assignedEmployees", "array-contains", user.uid)))).size;
    const totalSalary = ordersCount * (uData.salaryPerOrder || 0);
    const net = totalSalary + (uData.advance || 0) - (uData.deductions || 0);
    container.innerHTML = `
      <h3>مرتبي</h3>
      <p>عدد الأوردرات: ${ordersCount}</p>
      <p>سعر الأوردر: ${uData.salaryPerOrder || 0} ريال</p>
      <p>الإجمالي: ${totalSalary} ريال</p>
      <p>سلف: ${uData.advance || 0} | خصومات: ${uData.deductions || 0}</p>
      <p><strong>الصافي: ${net} ريال</strong></p>`;
  }

  // ======== PWA ========
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('Service Worker جاهز');
      }).catch(err => console.log('SW فشل', err));
    });
  }
</script>
</body>
</html>
