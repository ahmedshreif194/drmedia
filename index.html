<script>

// ======================== FIX LOGIN INIT ========================
function initApp() {
    try {
        loadAllData();

        const saved = sessionStorage.getItem('drmedia_user');

        if (saved) {
            currentUser = JSON.parse(saved);

            if (currentUser?.role === 'admin') {
                renderAdminDashboard();
            } else if (currentUser?.role === 'employee') {
                renderEmployeeDashboard();
            } else {
                showLogin();
            }
        } else {
            showLogin();
        }

    } catch (e) {
        console.error("INIT ERROR:", e);
        sessionStorage.removeItem('drmedia_user');
        showLogin();
    }
}

// ======================== SMART DISTRIBUTION ========================
function smartDistributeMonthly() {

    let days = {};

    bookings.forEach(b => {
        if (!days[b.date]) days[b.date] = [];
        days[b.date].push(b);
    });

    Object.keys(days).forEach(day => {

        let usedToday = new Set();

        let directors = employees.filter(e => e.role === 'مخرج')
            .sort((a,b)=>a.totalOrders - b.totalOrders);

        let photographers = employees.filter(e => e.role === 'مصور')
            .sort((a,b)=>a.totalOrders - b.totalOrders);

        let cranes = employees.filter(e => e.role === 'كرين')
            .sort((a,b)=>a.totalOrders - b.totalOrders);

        days[day].forEach(b => {

            let assigned = [];

            function pick(list, count) {
                let result = [];
                for (let i = 0; i < list.length; i++) {
                    if (!usedToday.has(list[i].id)) {
                        result.push(list[i]);
                        usedToday.add(list[i].id);
                    }
                    if (result.length === count) break;
                }
                return result;
            }

            if (b.hallId === 'h1' || b.hallId === 'h2') {
                assigned.push(...pick(directors,1).map(e=>e.id));
                assigned.push(...pick(photographers,2).map(e=>e.id));
                assigned.push(...pick(cranes,1).map(e=>e.id));
            }

            if (b.hallId === 'h3') {
                assigned.push(...pick(photographers,1).map(e=>e.id));
            }

            b.assignedEmployees = assigned;
        });
    });

    updateEmployeeOrders();
    saveAllData();
    renderBookings();

    showMsg('🔥 تم التوزيع الشهري بنجاح');
}

// ======================== FIX EMPLOYEES TABLE ========================

            <h2 class="text-xl font-bold mb-4">👥 الموظفين</h2>
            <div class="overflow-x-auto">
            <table class="w-full">
            <thead>
            <tr>
            <th>الاسم</th>
            <th>الدور</th>
            <th>الهاتف</th>
            <th>الأوردرات</th>
            <th>المستحق</th>
            </tr>
            </thead>
            <tbody>
            ${employees.map(e => `
            <tr>
            <td class="p-2">${e.name}</td>
            <td class="p-2">${e.role}</td>
            <td class="p-2">${e.phone}</td>
            <td class="p-2">${e.totalOrders || 0}</td>
            <td class="p-2 font-bold">
            ${((e.totalOrders || 0) * e.salaryPerOrder).toLocaleString()} ج.م
            </td>
            </tr>
            `).join('')}
            </tbody>
            </table>
            </div>
        </div>`;
}
