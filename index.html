<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dr Media Flash Manager | نظام إدارة الفلاشات</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: #f4f7fc; color: #1e2a3e; transition: all 0.3s; }
    html[dir="ltr"] body { direction: ltr; text-align: left; }
    html[dir="rtl"] body { direction: rtl; text-align: right; }
    .app-wrapper { display: flex; min-height: 100vh; }
    /* Sidebar */
    .sidebar {
      width: 270px;
      background: linear-gradient(145deg, #0f2b3d 0%, #0a1e2c 100%);
      color: #eef4ff;
      transition: all 0.3s;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      z-index: 20;
    }
    .sidebar-header { padding: 28px 20px; border-bottom: 1px solid #2c4b6e; }
    .logo { font-size: 1.6rem; font-weight: 800; display: flex; align-items: center; gap: 12px; }
    .logo i { font-size: 2rem; color: #facc15; }
    .logo span { background: linear-gradient(135deg, #ffffff, #b9e2ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .nav-links { list-style: none; padding: 0 16px; }
    .nav-links li { margin: 12px 0; }
    .nav-links a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      border-radius: 16px;
      color: #cfdfed;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }
    .nav-links a i { width: 26px; font-size: 1.25rem; }
    .nav-links a:hover, .nav-links .active a { background: #1e4a76; color: white; }
    .main-content { flex: 1; padding: 24px 28px; overflow-x: auto; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 30px;
      background: white;
      padding: 12px 24px;
      border-radius: 32px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }
    .page-title h2 { font-weight: 700; font-size: 1.6rem; color: #0f2b3d; }
    .lang-user { display: flex; gap: 20px; align-items: center; }
    .lang-toggle { background: #eef2f5; border: none; padding: 8px 16px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .user-badge { display: flex; align-items: center; gap: 12px; background: #eef2f5; padding: 6px 16px; border-radius: 40px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
      margin-bottom: 40px;
    }
    .stat-card { background: white; border-radius: 28px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center; }
    .stat-number { font-size: 2.2rem; font-weight: 800; color: #1e4663; }
    .section-card { background: white; border-radius: 28px; padding: 20px 24px; margin-bottom: 20px; border: 1px solid #eef2f8; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .btn-sm { background: #2c6e9e; border: none; color: white; padding: 8px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #e2e8f0; }
    .badge { background: #facc1530; color: #b45309; padding: 4px 12px; border-radius: 50px; font-weight: 600; font-size: 0.8rem; }
    .badge.ready { background: #d9f99d; color: #3f6212; }
    .badge.delivered { background: #bff0da; color: #0b5e42; }
    .action-icon { color: #2c6e9e; cursor: pointer; margin: 0 6px; font-size: 1.1rem; }
    .form-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .form-modal.active { display: flex; }
    .form-container { background: white; border-radius: 32px; padding: 28px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 16px; border: 1px solid #ccc; font-family: inherit; }
    @media (max-width: 800px) {
      .sidebar { position: fixed; right: -280px; transition: 0.3s; height: 100vh; z-index: 1000; }
      .sidebar.open { right: 0; }
      .main-content { padding: 16px; }
      .mobile-menu-btn { display: block; background: transparent; border: none; font-size: 1.8rem; cursor: pointer; }
    }
    .mobile-menu-btn { display: none; }
    .overlay { display: none; position: fixed; top:0;left:0;width:100%;height:100%;background: rgba(0,0,0,0.4);z-index: 999; }
    .overlay.show { display: block; }
    footer { margin-top: 40px; text-align: center; color: #5f7d9c; font-size: 0.8rem; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><i class="fas fa-bolt"></i><span>Dr Media Flash</span></div>
    </div>
    <ul class="nav-links">
      <li class="active" data-page="dashboard"><a href="#"><i class="fas fa-tachometer-alt"></i> <span>لوحة القيادة</span></a></li>
      <li data-page="events"><a href="#"><i class="fas fa-calendar-alt"></i> <span>الحفلات</span></a></li>
      <li data-page="flash"><a href="#"><i class="fas fa-usb"></i> <span>الفلاشات</span></a></li>
      <li data-page="delivery"><a href="#"><i class="fas fa-truck-fast"></i> <span>التسليم</span></a></li>
      <li data-page="reports"><a href="#"><i class="fas fa-chart-line"></i> <span>التقارير</span></a></li>
      <li data-page="staff"><a href="#"><i class="fas fa-users"></i> <span>الموظفين</span></a></li>
    </ul>
  </aside>
  <div class="overlay" id="overlay"></div>
  <main class="main-content">
    <div class="top-bar">
      <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
      <div class="page-title"><h2 id="pageTitle">لوحة القيادة</h2></div>
      <div class="lang-user"><button class="lang-toggle" id="langToggleBtn">🇬🇧 English</button><div class="user-badge"><i class="fas fa-user-circle"></i><span>Admin</span></div></div>
    </div>
    <div id="pageContent"></div>
    <footer>© 2026 Dr Media Flash - جميع الحقوق محفوظة | نظام إدارة الفلاشات الذكي</footer>
  </main>
</div>

<script>
  // ==================== FIREBASE CONFIG (أدخل بياناتك هنا) ====================
  const firebaseConfig = {
    apiKey: "AIzaSyDummyReplaceWithYourKey",  // ⚠️ استبدل بمفاتيحك الحقيقية
    authDomain: "your-project.firebaseapp.com",
    projectId: "your-project-id",
    storageBucket: "your-project.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef"
  };
  
  // تهيئة Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  
  // ==================== متغيرات عامة ====================
  let currentPage = "dashboard";
  let currentLang = "ar";
  
  // ترجمة
  const translations = {
    ar: { dashboard: "لوحة القيادة", events: "الحفلات", flash: "الفلاشات", delivery: "التسليم", reports: "التقارير", staff: "الموظفين" },
    en: { dashboard: "Dashboard", events: "Events", flash: "Flash Drives", delivery: "Delivery", reports: "Reports", staff: "Staff" }
  };
  
  // مساعدة العرض
  function setPageTitle() { document.getElementById("pageTitle").innerText = translations[currentLang][currentPage] || currentPage; }
  
  // تبديل اللغة
  document.getElementById("langToggleBtn").onclick = () => {
    currentLang = currentLang === "ar" ? "en" : "ar";
    document.documentElement.setAttribute("dir", currentLang === "ar" ? "rtl" : "ltr");
    setPageTitle();
    loadPageContent();
    document.getElementById("langToggleBtn").innerHTML = currentLang === "ar" ? "🇬🇧 English" : "🇸🇦 العربية";
  };
  
  // قائمة جانبية
  document.querySelectorAll(".nav-links li").forEach(li => {
    li.addEventListener("click", (e) => {
      document.querySelectorAll(".nav-links li").forEach(l => l.classList.remove("active"));
      li.classList.add("active");
      currentPage = li.getAttribute("data-page");
      setPageTitle();
      loadPageContent();
      if(window.innerWidth <= 800) document.getElementById("sidebar").classList.remove("open");
    });
  });
  document.getElementById("mobileMenuBtn").onclick = () => document.getElementById("sidebar").classList.toggle("open");
  
  // ==================== دوال مساعدة Firebase ====================
  async function getEvents() { const snap = await db.collection("events").orderBy("eventDate", "desc").get(); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
  async function getFlashes() { const snap = await db.collection("flashDrives").get(); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
  async function getDeliveries() { const snap = await db.collection("deliveries").get(); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
  
  // تحميل المحتوى حسب الصفحة
  async function loadPageContent() {
    const container = document.getElementById("pageContent");
    if(currentPage === "dashboard") await showDashboard(container);
    else if(currentPage === "events") await showEvents(container);
    else if(currentPage === "flash") await showFlashes(container);
    else if(currentPage === "delivery") await showDelivery(container);
    else if(currentPage === "reports") await showReports(container);
    else if(currentPage === "staff") await showStaff(container);
  }
  
  // Dashboard
  async function showDashboard(container) {
    const events = await getEvents();
    const flashes = await getFlashes();
    const deliveries = await getDeliveries();
    const readyCount = flashes.filter(f => f.status === "جاهزة للتسليم").length;
    const deliveredCount = deliveries.length;
    const pendingCount = flashes.filter(f => f.status === "لسه عند المونتير" || f.status === "راجعة صيانة").length;
    const totalEvents = events.length;
    let lateNotif = "";
    const twoDaysAgo = new Date(); twoDaysAgo.setDate(twoDaysAgo.getDate() - 2);
    const oldReady = flashes.filter(f => f.status === "جاهزة للتسليم" && f.readyDate?.toDate && f.readyDate.toDate() < twoDaysAgo);
    if(oldReady.length) lateNotif = `<div class="section-card" style="background:#fff6e5;"><i class="fas fa-bell"></i> ⚠️ ${oldReady.length} فلاشة جاهزة منذ أكثر من يومين</div>`;
    
    container.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div><h3>📅 عدد الحفلات</h3><div class="stat-number">${totalEvents}</div></div><i class="fas fa-church fa-2x"></i></div>
        <div class="stat-card"><div><h3>💾 فلاشات جاهزة</h3><div class="stat-number">${readyCount}</div></div><i class="fas fa-check-circle fa-2x"></i></div>
        <div class="stat-card"><div><h3>🚚 تم التسليم</h3><div class="stat-number">${deliveredCount}</div></div><i class="fas fa-handshake fa-2x"></i></div>
        <div class="stat-card"><div><h3>⏳ قيد التنفيذ</h3><div class="stat-number">${pendingCount}</div></div><i class="fas fa-spinner fa-2x"></i></div>
      </div>
      ${lateNotif}
      <div class="section-card"><h3>📋 آخر الحفلات</h3><table width="100%"><thead><tr><th>التاريخ</th><th>العريس</th><th>القاعة</th></tr></thead><tbody>${events.slice(0,5).map(ev => `<tr><td>${ev.eventDate}</td><td>${ev.groomName}</td><td>${ev.hallType}</td></tr>`).join('')}</tbody></table></div>
    `;
  }
  
  // إدارة الحفلات (إضافة + جدول)
  async function showEvents(container) {
    const events = await getEvents();
    container.innerHTML = `
      <div class="section-card"><div class="section-header"><h3>➕ حفلة جديدة</h3><button class="btn-sm" id="addEventBtn">إضافة</button></div>
      <div id="eventForm" style="display:none; margin-top:16px;" class="form-group"><input id="groomName" placeholder="اسم العريس"><input id="eventDate" type="date"><input id="hallType" placeholder="القاعة"><button class="btn-sm" id="saveEventBtn">حفظ</button></div>
      </div>
      <div class="section-card"><h3>📋 قائمة الحفلات</h3><table><thead><tr><th>التاريخ</th><th>العريس</th><th>القاعة</th><th>حذف</th></tr></thead><tbody id="eventsList"></tbody></table></div>
    `;
    const tbody = document.getElementById("eventsList");
    function renderEvents() { tbody.innerHTML = events.map(ev => `<tr><td>${ev.eventDate}</td><td>${ev.groomName}</td><td>${ev.hallType}</td><td><i class="fas fa-trash action-icon" data-id="${ev.id}"></i></td></tr>`).join(''); }
    renderEvents();
    document.getElementById("addEventBtn").onclick = () => { document.getElementById("eventForm").style.display = "block"; };
    document.getElementById("saveEventBtn").onclick = async () => {
      const groomName = document.getElementById("groomName").value, eventDate = document.getElementById("eventDate").value, hallType = document.getElementById("hallType").value;
      if(groomName && eventDate) {
        await db.collection("events").add({ groomName, eventDate, hallType, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        location.reload();
      }
    };
    document.querySelectorAll("#eventsList .fa-trash").forEach(icon => icon.addEventListener("click", async (e) => { await db.collection("events").doc(icon.dataset.id).delete(); location.reload(); }));
  }
  
  // الفلاشات (ربط بالحفلة)
  async function showFlashes(container) {
    const events = await getEvents();
    const flashes = await getFlashes();
    container.innerHTML = `
      <div class="section-card"><div class="section-header"><h3>➕ إضافة فلاشة</h3><button class="btn-sm" id="addFlashBtn">جديد</button></div>
      <div id="flashForm" style="display:none;"><select id="flashEventId">${events.map(ev => `<option value="${ev.id}">${ev.groomName} - ${ev.eventDate}</option>`).join('')}</select><input id="flashSize" placeholder="الحجم"><select id="flashStatus"><option>لسه عند المونتير</option><option>جاهزة للتسليم</option><option>راجعة صيانة</option></select><button class="btn-sm" id="saveFlashBtn">حفظ</button></div>
      </div>
      <div class="section-card"><h3>📀 قائمة الفلاشات</h3><table><thead><tr><th>رقم الفلاشة</th><th>الحفلة</th><th>الحجم</th><th>الحالة</th><th>حذف</th></tr></thead><tbody id="flashesList"></tbody></table></div>
    `;
    const tbody = document.getElementById("flashesList");
    async function render() {
      const evMap = Object.fromEntries(events.map(e => [e.id, e]));
      tbody.innerHTML = flashes.map(f => `<tr><td>${f.flashNumber || f.id.slice(0,6)}</td><td>${evMap[f.eventId]?.groomName || "?"}</td><td>${f.size}</td><td><span class="badge ${f.status === 'جاهزة للتسليم' ? 'ready' : ''}">${f.status}</span></td><td><i class="fas fa-trash action-icon" data-id="${f.id}"></i></td></tr>`).join('');
    }
    await render();
    document.getElementById("addFlashBtn").onclick = () => { document.getElementById("flashForm").style.display = "block"; };
    document.getElementById("saveFlashBtn").onclick = async () => {
      const eventId = document.getElementById("flashEventId").value, size = document.getElementById("flashSize").value, status = document.getElementById("flashStatus").value;
      await db.collection("flashDrives").add({ eventId, size, status, flashNumber: "F-"+Date.now(), readyDate: status === "جاهزة للتسليم" ? new Date() : null });
      location.reload();
    };
  }
  
  // التسليم (اختيار فلاشة جاهزة)
  async function showDelivery(container) {
    const flashes = (await getFlashes()).filter(f => f.status === "جاهزة للتسليم");
    container.innerHTML = `
      <div class="section-card"><h3>🚚 تسليم فلاشة</h3>
      <select id="deliveryFlashId"><option value="">اختر فلاشة</option>${flashes.map(f => `<option value="${f.id}">${f.flashNumber} - ${f.size}</option>`).join('')}</select>
      <input id="recipientName" placeholder="اسم المستلم"><input id="recipientPhone" placeholder="رقم الهاتف">
      <button class="btn-sm" id="confirmDeliveryBtn">تأكيد التسليم</button>
      </div>
      <div class="section-card"><h3>📜 آخر عمليات التسليم</h3><table><thead><tr><th>الفلاشة</th><th>المستلم</th><th>التاريخ</th></tr></thead><tbody id="deliveriesList"></tbody></table></div>
    `;
    const deliveries = await getDeliveries();
    const flashesAll = await getFlashes();
    const deliveryRows = deliveries.map(d => `<tr><td>${flashesAll.find(f=>f.id===d.flashId)?.flashNumber||''}</td><td>${d.recipientName}</td><td>${new Date(d.deliveryDate?.toDate()).toLocaleDateString()}</td></tr>`).join('');
    document.getElementById("deliveriesList").innerHTML = deliveryRows;
    document.getElementById("confirmDeliveryBtn").onclick = async () => {
      const flashId = document.getElementById("deliveryFlashId").value;
      const recipientName = document.getElementById("recipientName").value;
      const recipientPhone = document.getElementById("recipientPhone").value;
      if(!flashId || !recipientName) return alert("يرجى إكمال البيانات");
      await db.collection("deliveries").add({ flashId, recipientName, recipientPhone, deliveryDate: new Date() });
      await db.collection("flashDrives").doc(flashId).update({ status: "تم التسليم" });
      alert("تم التسجيل");
      location.reload();
    };
  }
  
  // تقارير سريعة
  async function showReports(container) {
    const flashes = await getFlashes();
    const ready = flashes.filter(f=>f.status==="جاهزة للتسليم").length;
    const delivered = (await getDeliveries()).length;
    container.innerHTML = `<div class="section-card"><h3>📊 ملخص سريع</h3><p>✅ فلاشات جاهزة: ${ready}</p><p>✅ تم تسليمها: ${delivered}</p><p>⏳ تحت التنفيذ: ${flashes.length - ready - delivered}</p></div>`;
  }
  
  // الموظفين (بسيط)
  async function showStaff(container) {
    container.innerHTML = `<div class="section-card"><h3>👥 إدارة الموظفين</h3><input id="empName" placeholder="الاسم"><input id="empRole" placeholder="الدور"><button class="btn-sm" id="addEmpBtn">إضافة</button><ul id="empList"></ul></div>`;
    const snap = await db.collection("employees").get();
    const employees = snap.docs.map(d=>d.data());
    document.getElementById("empList").innerHTML = employees.map(e=>`<li>${e.name} - ${e.role}</li>`).join('');
    document.getElementById("addEmpBtn").onclick = async () => {
      const name = document.getElementById("empName").value, role = document.getElementById("empRole").value;
      if(name) await db.collection("employees").add({ name, role });
      location.reload();
    };
  }
  
  loadPageContent();
</script>
</body>
</html>
