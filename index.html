<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Media Pro MAX v2 | By Ahmed Shreif</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:Tahoma;background:#0b1220;color:#e5e7eb}
header{background:#0f172a;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1f2937}
.container{padding:15px;max-width:1100px;margin:auto}
.card{background:#111827;border:1px solid #1f2937;padding:15px;border-radius:14px;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,0.25)}
button{padding:10px;border-radius:10px;border:none;cursor:pointer;transition:.2s}
button:hover{opacity:.9;transform:scale(1.02)}
input,select{padding:10px;width:100%;margin:6px 0;border-radius:10px;border:1px solid #374151;background:#0b1220;color:#fff}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.small{font-size:12px;color:#9ca3af}
.badge{padding:4px 10px;border-radius:999px;font-size:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:10px 18px;border-radius:999px;display:none;z-index:999}
</style>
</head>
<body>

<header>
<h2>Dr Media Pro MAX</h2>
<div class="small">By Ahmed Shreif</div>
</header>

<div class="toast" id="toast"></div>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>🔐 تسجيل الدخول</h3>
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()" style="background:#16a34a;color:#fff;width:100%">دخول</button>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none">

<div class="row">
<div class="card">👥 الموظفين<br><h2 id="empCount"></h2></div>
<div class="card">📦 الأوردرات<br><h2 id="orderCount"></h2></div>
<div class="card">💰 الإيرادات<br><h2 id="income"></h2></div>
</div>

<div class="card">
<h3>➕ إضافة أوردر (Smart Engine)</h3>
<input id="cname" placeholder="اسم العميل">
<input id="date" type="date">
<input id="price" placeholder="السعر">
<select id="hall">
<option>مغلقة</option>
<option>أوبن</option>
<option>كافيه</option>
</select>
<button onclick="addOrder()" style="background:#2563eb;color:#fff;width:100%">إضافة + توزيع تلقائي</button>
</div>

<div class="card">
<h3>📦 الأوردرات</h3>
<div id="orders"></div>
</div>

<div class="card">
<h3>👤 الموظفين</h3>
<div id="emps"></div>
</div>

</div>

<!-- EMPLOYEE -->
<div id="employee" style="display:none">
<div class="card">
<h3>📋 أوردراتي</h3>
<div id="myOrders"></div>
</div>
</div>

</div>

<script>

// USERS
let users=[
{u:"admin",p:"123",role:"admin"},
{u:"zakawa",p:"123",role:"emp"},
{u:"titi",p:"123",role:"emp"},
{u:"khaled",p:"123",role:"emp"},
{u:"abo",p:"123",role:"emp"},
{u:"islam",p:"123",role:"emp"},
{u:"hani",p:"123",role:"emp"},
{u:"yasser",p:"123",role:"emp"},
{u:"mahmoud",p:"123",role:"emp"}
];

let employees=users.filter(u=>u.role=="emp").map(u=>({name:u.u,load:0}));
let orders=[];
let currentUser=null;

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

// SMART ASSIGN
function assignEmployee(){
employees.sort((a,b)=>a.load-b.load);
let emp=employees[0];
emp.load++;
return emp.name;
}

// LOGIN
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;
let f=users.find(x=>x.u==u&&x.p==p);
if(!f)return alert("بيانات خطأ");
currentUser=f;

loginBox.style.display="none";
if(f.role=="admin")admin.style.display="block";
else employee.style.display="block";

render();
toast("مرحباً " + f.u);
}

// ADD ORDER
function addOrder(){
let o={
client:document.getElementById("cname").value,
date:document.getElementById("date").value,
price:Number(document.getElementById("price").value),
hall:document.getElementById("hall").value,
emp:assignEmployee()
};
orders.push(o);
save();render();
toast("تم إضافة الأوردر");
}

// SAVE
function save(){localStorage.setItem("orders",JSON.stringify(orders));}
function load(){orders=JSON.parse(localStorage.getItem("orders")||"[]");}
load();

// RENDER
function render(){
if(currentUser.role=="admin"){
empCount.innerText=employees.length;
orderCount.innerText=orders.length;
income.innerText=orders.reduce((s,o)=>s+o.price,0);

ordersHTML="";
orders.forEach(o=>{
ordersHTML+=`<div class='card'>👤 ${o.client} | 📅 ${o.date} | 💰 ${o.price} | 🎥 ${o.emp}</div>`;
});
document.getElementById("orders").innerHTML=ordersHTML;

empHTML="";
employees.forEach(e=>{
empHTML+=`<div class='card'>${e.name} <span class='badge'>Load ${e.load}</span></div>`;
});
document.getElementById("emps").innerHTML=empHTML;

}else{
let my=orders.filter(o=>o.emp==currentUser.u);
document.getElementById("myOrders").innerHTML=my.map(o=>`<div class='card'>📦 ${o.client} | ${o.date} | ${o.price}</div>`).join("");
}
}

render();

</script>

</body>
</html>
