// ==================== Render Bookings ====================
function getFilteredBookings() {
    let f = [...bookings];
    if (currentHallFilter !== 'all') f = f.filter(b => b.hallId === currentHallFilter);

    else f = f.filter(b => b.status !== 'cancelled');
    return f.sort((a, b) => new Date(a.date) - new Date(b.date));
}

function renderBookingsContent() {

function markCompleted(id) {
    const b = bookings.find(x => x.id === id);
    if (b) { b.status = 'completed'; saveAllData(); renderBookingsContent(); showMsg('✅ تم النقل للأرشيف'); }

function deleteBooking(id) {

        bookings = bookings.filter(b => b.id !== id);
        saveAllData();
        renderBookingsContent();
        showMsg('🗑️ تم الحذف');
    }
}

// ==================== Auto Distribute ====================
function autoDistribute() {
    const active = bookings.filter(b => b.status === 'pending');
    active.forEach(b => b.assignedEmployees = []);
    const sorted = [...active].sort((a, b) => new Date(a.date) - new Date(b.date));
    const dirs = employees.filter(e => e.role === 'مخرج' && e.active).sort((a, b) => (a.totalOrders || 0) - (b.totalOrders || 0));
    const phs = employees.filter(e => e.role === 'مصور' && e.active).sort((a, b) => (a.totalOrders || 0) - (b.totalOrders || 0));
    const crs = employees.filter(e => e.role === 'كرين' && e.active).sort((a, b) => (a.totalOrders || 0) - (b.totalOrders || 0));

    const grouped = {};
    sorted.forEach(b => { if (!grouped[b.date]) grouped[b.date] = []; grouped[b.date].push(b); });

    for (let date in grouped) {
        const dayB = grouped[date];
        let busy = new Set();
        let dI = 0, pI = 0, cI = 0;
        dayB.forEach(b => {
            const h = halls.find(x => x.id === b.hallId);
            const t = h ? h.type : 'closed';
            let assigned = [];
            if (t === 'cafe') {
                for (let i = 0; i < phs.length; i++) {
                    const p = phs[(pI + i) % phs.length];
                    if (!busy.has(p.id)) { assigned.push(p.id); busy.add(p.id); pI = (pI + i + 1) % phs.length; break; }
                }
            } else {
                for (let i = 0; i < dirs.length; i++) {
                    const d = dirs[(dI + i) % dirs.length];
                    if (!busy.has(d.id)) { assigned.push(d.id); busy.add(d.id); dI = (dI + i + 1) % dirs.length; break; }
                }
                let addedPh = 0;
                for (let i = 0; i < phs.length && addedPh < 2; i++) {
                    const p = phs[(pI + i) % phs.length];
                    if (!busy.has(p.id)) { assigned.push(p.id); busy.add(p.id); addedPh++; }
                }
                pI = (pI + addedPh) % phs.length;
                for (let i = 0; i < crs.length; i++) {
                    const c = crs[(cI + i) % crs.length];
                    if (!busy.has(c.id)) { assigned.push(c.id); busy.add(c.id); cI = (cI + i + 1) % crs.length; break; }
                }
            }
            b.assignedEmployees = assigned;
        });
    }
    updateEmployeeOrders();
    saveAllData();
    renderBookingsContent();
    renderDistributionContent();
    showMsg('✅ تم التوزيع الذكي مع التدوير اليومي');
}

// ==================== Render Distribution ====================
function renderDistributionContent() {
    const pending = bookings.filter(b => b.status === 'pending').sort((a, b) => new Date(a.date) - new Date(b.date));
    let html = `<div class="p-4"><h2 class="text-xl font-bold mb-3">⚙️ التوزيع اليدوي</h2><button onclick="autoDistribute()" class="bg-purple-700 text-white px-4 py-2 rounded-xl mb-4">توزيع تلقائي</button><div class="space-y-4">`;
    const grouped = {};
    pending.forEach(b => { if (!grouped[b.date]) grouped[b.date] = []; grouped[b.date].push(b); });
    for (let date in grouped) {
        html += `<div class="border rounded-xl overflow-hidden mb-4"><div class="bg-gray-100 p-2 font-bold">📅 ${date} (${grouped[date].length})</div><div class="p-3 space-y-3">`;
        for (let b of grouped[date]) {
            const h = halls.find(x => x.id === b.hallId);
            const type = h?.type || 'closed';
            const assigned = b.assignedEmployees || [];
            html += `<div class="border p-3 rounded-xl bg-white"><div class="font-bold mb-2">${b.clientName} - ${b.hallName}</div><div class="grid grid-cols-1 md:grid-cols-4 gap-2">`;
            if (type === 'cafe') {
                html += `<div><label class="text-sm">مصور</label><select onchange="updateSlot('${b.id}','0',this.value)" class="border rounded p-1 w-full"><option value="">--</option>${employees.filter(e=>e.role==='مصور'&&e.active).map(e=>`<option value="${e.id}" ${assigned[0]===e.id?'selected':''}>${e.name}</option>`).join('')}</select></div>`;
            } else {
                html += `<div><label class="text-sm">مخرج</label><select onchange="updateSlot('${b.id}','0',this.value)" class="border rounded p-1 w-full"><option value="">--</option>${employees.filter(e=>e.role==='مخرج'&&e.active).map(e=>`<option value="${e.id}" ${assigned[0]===e.id?'selected':''}>${e.name}</option>`).join('')}</select></div>`;
                html += `<div><label class="text-sm">مصور 1</label><select onchange="updateSlot('${b.id}','1',this.value)" class="border rounded p-1 w-full"><option value="">--</option>${employees.filter(e=>e.role==='مصور'&&e.active).map(e=>`<option value="${e.id}" ${assigned[1]===e.id?'selected':''}>${e.name}</option>`).join('')}</select></div>`;
                html += `<div><label class="text-sm">مصور 2</label><select onchange="updateSlot('${b.id}','2',this.value)" class="border rounded p-1 w-full"><option value="">--</option>${employees.filter(e=>e.role==='مصور'&&e.active).map(e=>`<option value="${e.id}" ${assigned[2]===e.id?'selected':''}>${e.name}</option>`).join('')}</select></div>`;
                html += `<div><label class="text-sm">كرين</label><select onchange="updateSlot('${b.id}','3',this.value)" class="border rounded p-1 w-full"><option value="">--</option>${employees.filter(e=>e.role==='كرين'&&e.active).map(e=>`<option value="${e.id}" ${assigned[3]===e.id?'selected':''}>${e.name}</option>`).join('')}</select></div>`;
            }
            html += `</div></div>`;
        }
        html += `</div></div>`;
    }
    html += `</div></div>`;
    document.getElementById('distributionTab').innerHTML = html;
}

window.updateSlot = function(bookingId, slot, empId) {
    const b = bookings.find(x => x.id === bookingId);
    if (!b) return;
    if (!b.assignedEmployees) b.assignedEmployees = [];
    while (b.assignedEmployees.length <= parseInt(slot)) b.assignedEmployees.push('');
    b.assignedEmployees[parseInt(slot)] = empId;
    b.assignedEmployees = b.assignedEmployees.filter(e => e !== '');
    saveAllData();
    updateEmployeeOrders();
    renderDistributionContent();
    renderBookingsContent();
    showMsg('✅ تم تحديث التوزيع');
};

function renderPayrollContent() {
    updateEmployeeOrders();
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const periods = [
        { label: `1 - 10 ${now.toLocaleString('ar', { month: 'long' })}`, start: new Date(year, month, 1), end: new Date(year, month, 10) },
        { label: `11 - 20 ${now.toLocaleString('ar', { month: 'long' })}`, start: new Date(year, month, 11), end: new Date(year, month, 20) },
        { label: `21 - ${new Date(year, month + 1, 0).getDate()} ${now.toLocaleString('ar', { month: 'long' })}`, start: new Date(year, month, 21), end: new Date(year, month + 1, 0) }

    document.getElementById('payrollTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-3">💰 المرتبات</h2><div class="grid grid-cols-3 gap-3 mb-4">${periods.map((p, i) => `<button onclick="renderPayrollPeriod(${i})" class="bg-blue-600 text-white p-2 rounded-xl">${p.label}</button>`).join('')}</div><div id="payrollPeriodDetail"></div></div>`;

}

function getEmployeeOrdersInPeriod(empId, start, end) {
    return bookings.filter(b => b.status !== 'cancelled' && (b.assignedEmployees || []).includes(empId) && new Date(b.date) >= start && new Date(b.date) <= end).length;
}

function renderPayrollPeriod(periodIndex) {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    let start, end;
    if (periodIndex === 0) { start = new Date(year, month, 1); end = new Date(year, month, 10); }
    else if (periodIndex === 1) { start = new Date(year, month, 11); end = new Date(year, month, 20); }
    else { start = new Date(year, month, 21); end = new Date(year, month + 1, 0); }
    const activeEmps = employees.filter(e => e.active);
    let html = `<table class="w-full bg-white rounded-xl"><thead><tr><th>الموظف</th><th>أوردرات</th><th>المرتب/أوردر</th><th>الإجمالي</th><th>صرف</th></tr></thead><tbody>`;
    activeEmps.forEach(e => {
        const orders = getEmployeeOrdersInPeriod(e.id, start, end);
        const salary = orders * e.salaryPerOrder;
        html += `<tr><td>${e.name}</td><td>${orders}</td><td>${e.salaryPerOrder} ج.م</td><td>${salary.toLocaleString()}</td><td><button onclick="payEmployee('${e.id}',${periodIndex})" class="bg-green-600 text-white px-2 py-1 rounded text-sm">صرف</button></td></tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('payrollPeriodDetail').innerHTML = html;
}

function payEmployee(empId, periodIndex) {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    let start, end, label;
    if (periodIndex === 0) { start = new Date(year, month, 1); end = new Date(year, month, 10); label = '1-10'; }
    else if (periodIndex === 1) { start = new Date(year, month, 11); end = new Date(year, month, 20); label = '11-20'; }
    else { start = new Date(year, month, 21); end = new Date(year, month + 1, 0); label = '21-آخر'; }
    const emp = employees.find(e => e.id === empId);
    if (!emp) return;
    const orders = getEmployeeOrdersInPeriod(empId, start, end);
    const salary = orders * emp.salaryPerOrder;
    if (confirm(`صرف ${salary.toLocaleString()} ج.م لـ ${emp.name}؟`)) {
        payrollArchive.push({ id: Date.now(), empId, period: periodIndex, month, year, amount: salary, orders, date: now.toISOString().slice(0, 10) });
        saveAllData();
        renderPayrollPeriod(periodIndex);
        showMsg(`✅ تم صرف ${salary.toLocaleString()} ج.م`);
    }
}

function showAddBookingModal() {

    document.getElementById('modal').classList.remove('hidden');
}

function saveNewBooking() {
    const hall = halls.find(h => h.id === document.getElementById('hallId').value);
    bookings.push({
        id: Date.now().toString(),
        clientName: document.getElementById('clientName').value || 'عميل',
        phone: '',
        hallId: document.getElementById('hallId').value,
        hallName: hall?.name || 'قاعة',
        date: document.getElementById('date').value,
        price: parseInt(document.getElementById('price').value) || 2500,
        deposit: 0,
        notes: '',
        assignedEmployees: [],
        status: 'pending'
    });
    saveAllData();
    closeModal();
    autoDistribute();
    renderBookingsContent();
    showMsg('✅ تمت الإضافة');
}

function showEditBookingModal(id) {
    const b = bookings.find(x => x.id === id);
    if (!b) return;
    const hallOpts = halls.map(h => `<option value="${h.id}" ${b.hallId === h.id ? 'selected' : ''}>${h.name}</option>`).join('');
    document.getElementById('modalContent').innerHTML = `<h3 class="text-xl font-bold mb-3">✏️ تعديل حجز</h3><input id="editClientName" value="${b.clientName}"><select id="editHallId">${hallOpts}</select><input id="editDate" type="date" value="${b.date}"><input id="editPrice" type="number" value="${b.price}"><button onclick="saveEditBooking('${id}')" class="bg-emerald-700 text-white w-full py-2 rounded-xl mt-2">حفظ</button>`;
    document.getElementById('modal').classList.remove('hidden');
}

function saveEditBooking(id) {
    const b = bookings.find(x => x.id === id);
    if (!b) return;
    b.clientName = document.getElementById('editClientName').value;
    b.hallId = document.getElementById('editHallId').value;
    const hall = halls.find(h => h.id === b.hallId);
    b.hallName = hall?.name || b.hallName;
    b.date = document.getElementById('editDate').value;
    b.price = parseInt(document.getElementById('editPrice').value) || b.price;
    saveAllData();
    closeModal();
    renderBookingsContent();
    showMsg('✅ تم التحديث');
}

function showAddEmployeeModal() {
    document.getElementById('modalContent').innerHTML = `<h3>➕ موظف</h3><input id="empName" placeholder="الاسم"><select id="empRole"><option>مخرج</option><option>مصور</option><option>كرين</option></select><input id="empPhone" placeholder="الهاتف"><input id="empSalary" placeholder="المرتب" value="200" type="number"><button onclick="saveNewEmployee()" class="bg-blue-700 text-white w-full py-2 rounded-xl mt-2">حفظ</button>`;
    document.getElementById('modal').classList.remove('hidden');
}

function saveNewEmployee() {
    const name = document.getElementById('empName').value.trim();
    if (!name) return alert('⚠️ أدخل الاسم');
    const newEmp = {
        id: 'emp' + Date.now(),
        name,
        role: document.getElementById('empRole').value,
        phone: document.getElementById('empPhone').value,
        salaryPerOrder: parseInt(document.getElementById('empSalary').value) || 200,
        active: true,
        totalOrders: 0
    };
    employees.push(newEmp);
    let un = name.replace(/\s/g, '').toLowerCase();
    let final = un, c = 1;
    while (users.some(u => u.username === final)) final = un + (c++);
    users.push({ username: final, password: 'emp123', role: 'employee', employeeId: newEmp.id, name });
    saveAllData();
    closeModal();
    renderEmployeesContent();
    showMsg(`✅ تمت الإضافة - ${final} / emp123`);
}

function showAddHallModal() {
    document.getElementById('modalContent').innerHTML = `<h3>➕ قاعة</h3><input id="hallName" placeholder="الاسم"><select id="hallType"><option>closed</option><option>open</option><option>cafe</option></select><button onclick="saveNewHall()" class="bg-blue-700 text-white w-full py-2 rounded-xl mt-2">حفظ</button>`;
    document.getElementById('modal').classList.remove('hidden');
}

function saveNewHall() {
    halls.push({ id: 'hall' + Date.now(), name: document.getElementById('hallName').value || 'قاعة', type: document.getElementById('hallType').value, active: true });
    saveAllData();
    closeModal();
    renderHallsContent();
    showMsg('✅ تمت الإضافة');
}

function addUser() {
    const un = prompt('اسم المستخدم');
    const pw = prompt('كلمة المرور');
    const role = prompt('الدور (admin/employee)', 'employee');
    if (un && pw) {
        if (users.some(u => u.username === un)) return alert('⚠️ موجود');
        users.push({ username: un, password: pw, role: role || 'employee', employeeId: null, name: un });
        saveAllData();
        renderUsersContent();
        showMsg('✅ تمت الإضافة');
    }
}

function renderCurrentTab() {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
    if (currentTab === 'dashboardTab') renderDashboardContent();
    else if (currentTab === 'bookingsTab') renderBookingsContent();
    else if (currentTab === 'hallsTab') renderHallsContent();
    else if (currentTab === 'employeesTab') renderEmployeesContent();
    else if (currentTab === 'distributionTab') renderDistributionContent();
    else if (currentTab === 'payrollTab') renderPayrollContent();
    else if (currentTab === 'calendarTab') renderCalendarContent();
    else if (currentTab === 'archiveTab') renderArchiveContent();
    else if (currentTab === 'reportsTab') renderReportsContent();
    else if (currentTab === 'usersTab') renderUsersContent();
    else if (currentTab === 'settingsTab') renderSettingsContent();
    document.getElementById(currentTab)?.classList.remove('hidden');
}

        return;
    }
    const emp = employees.find(e => e.id === currentUser.employeeId);
    updateEmployeeOrders();
    const my = bookings.filter(b => (b.assignedEmployees || []).includes(emp.id) && b.status !== 'cancelled');
    document.getElementById('app').innerHTML = `
        <div class="p-4 max-w-4xl mx-auto">

function showLogin() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700">
            <div class="bg-white p-8 rounded-2xl w-80 md:w-96 text-center shadow-2xl">

                <p class="text-gray-500 mb-6">نظام إدارة القاعات</p>
                <input type="text" id="loginUser" placeholder="اسم المستخدم" class="w-full border p-3 rounded-xl mb-3">
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full border p-3 rounded-xl mb-4">
                <button onclick="doLogin()" class="w-full bg-emerald-700 text-white py-3 rounded-xl font-bold">دخول</button>
                <div class="footer-copy mt-6">© جميع الحقوق محفوظة Dr Media<br>Ahmed Shreif</div>
            </div>
        </div>`;
}

function doLogin() {
    const un = document.getElementById('loginUser').value.trim();
    const pw = document.getElementById('loginPass').value;
    const user = users.find(u => u.username === un && u.password === pw);
    if (user) {
        currentUser = user;
        sessionStorage.setItem('vpms_user', JSON.stringify(user));
        renderApp();
        showMsg(`مرحباً ${user.name || user.username}`);
    } else {
        alert('بيانات غير صحيحة');
    }
}

function logout() {
    sessionStorage.removeItem('vpms_user');
    currentUser = null;
    showLogin();
}

function renderApp() {
    if (!currentUser) showLogin();
    else if (currentUser.role === 'employee') renderEmployeeDashboard();
    else renderAdminDashboard();
}

// ==================== Initialize ====================
function init() {
    loadAllData(() => {
        if (bookings.length === 0 && employees.length === 0 && halls.length === 0) {
            initDefaultData();
        }
        const saved = sessionStorage.getItem('vpms_user');
        if (saved) {
            try {
                currentUser = JSON.parse(saved);
            } catch (e) {
                currentUser = null;
            }
        }
        renderApp();
    });
}
