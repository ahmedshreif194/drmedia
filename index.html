    // -------------------- التوزيع العادل --------------------
    function autoDistribute() {
        if(!bookings.length) return;
        bookings.forEach(b => b.assignedEmployees = []);
        const sorted = [...bookings].sort((a,b)=>new Date(a.date)-new Date(b.date));
        let dirs = employees.filter(e=>e.role==='مخرج'&&e.active).map(e=>({...e, temp: e.totalOrders||0}));
        let photos = employees.filter(e=>e.role==='مصور'&&e.active).map(e=>({...e, temp: e.totalOrders||0}));
        let cranes = employees.filter(e=>e.role==='كرين'&&e.active).map(e=>({...e, temp: e.totalOrders||0}));
        let assignedToday = new Map();
        for(let b of sorted){
            let busy = assignedToday.get(b.date) || new Set();
            let assigned = [];
            if(b.hallType === 'cafe'){
                let avail = photos.filter(p=>!busy.has(p.id));
                if(avail.length){
                    avail.sort((a,c)=>a.temp-c.temp);
                    assigned.push(avail[0].id);
                    avail[0].temp++;
                    busy.add(avail[0].id);
                }
            } else {
                let availDir = dirs.filter(d=>!busy.has(d.id));
                if(availDir.length){
                    availDir.sort((a,c)=>a.temp-c.temp);
                    assigned.push(availDir[0].id);
                    availDir[0].temp++;
                    busy.add(availDir[0].id);
                }
                let availPhoto = photos.filter(p=>!busy.has(p.id));
                for(let i=0;i<2;i++){
                    if(availPhoto.length){
                        availPhoto.sort((a,c)=>a.temp-c.temp);
                        assigned.push(availPhoto[0].id);
                        availPhoto[0].temp++;
                        busy.add(availPhoto[0].id);
                        availPhoto = availPhoto.filter(p=>p.id!==availPhoto[0].id);
                    }
                }
                let availCrane = cranes.filter(c=>!busy.has(c.id));
                if(availCrane.length){
                    availCrane.sort((a,c)=>a.temp-c.temp);
                    assigned.push(availCrane[0].id);
                    availCrane[0].temp++;
                    busy.add(availCrane[0].id);
                }
            }
            b.assignedEmployees = assigned;
            assignedToday.set(b.date, busy);
        }
        employees.forEach(e=>{
            let d = dirs.find(d=>d.id===e.id); if(d) e.totalOrders = d.temp;
            let p = photos.find(p=>p.id===e.id); if(p) e.totalOrders = p.temp;
            let c = cranes.find(c=>c.id===e.id); if(c) e.totalOrders = c.temp;
        });
        saveAllData();
        showMsg("✅ " + (currentLang === 'ar' ? 'تم التوزيع العادل' : 'Fair distribution done'));
    }

    window.importExcelData = async function() {
        const file = document.getElementById('excelFile').files[0];
        if(!file){ alert(currentLang === 'ar' ? "اختر ملف" : "Select a file"); return; }
        const hallType = document.getElementById('importHallType').value;
        const data = await file.arrayBuffer();
        const wb = XLSX.read(data);
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
        let added=0;
        for(let i=1;i<rows.length;i++){
            let row=rows[i];
            if(!row||row.length<1) continue;
            let rawDate = row[0];
            let formatted = '';
            if(typeof rawDate === 'number') formatted = new Date((rawDate-25569)*86400*1000).toISOString().slice(0,10);
            else if(typeof rawDate === 'string'){
                let m = rawDate.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
                if(m) formatted=m[0];
                else{ let m2=rawDate.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m2) formatted=`${m2[3]}-${m2[2]}-${m2[1]}`; }
            }
            if(!formatted) continue;
            const client = row[1] || (currentLang === 'ar' ? 'عميل جديد' : 'New Client');
            const hallName = row[2] || (currentLang === 'ar' ? 'قاعة' : 'Hall');

            bookings.push({ id: Date.now()+Math.random().toString(36)+added, clientName:client, phone:"", hallName, date:formatted, hallType, price, assignedEmployees:[] });
            added++;
        }
        if(added===0) alert(currentLang === 'ar' ? "لا توجد تواريخ صالحة" : "No valid dates");

    window.importPdfData = async function() {
        const file = document.getElementById('pdfFile').files[0];
        if(!file){ alert(currentLang === 'ar' ? "اختر ملف" : "Select a file"); return; }
        const hallType = document.getElementById('pdfHallType').value;
        const pdfjsLib = window.pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        try{
            const ab = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data:ab}).promise;
            let fullText="";
            for(let i=1;i<=pdf.numPages;i++){ let page=await pdf.getPage(i); let txt=await page.getTextContent(); fullText+=txt.items.map(t=>t.str).join(" ")+"\n"; }
            const dates = [...new Set(fullText.match(/\b(\d{4}-\d{1,2}-\d{1,2}|\d{1,2}\/\d{1,2}\/\d{4})\b/g)||[])];
            let added=0;
            for(let d of dates){
                let clean = d.includes('/')?d.split('/').reverse().join('-'):d;

    function renderCalendarContent() {
        const today = new Date();
        const year = today.getFullYear(), month = today.getMonth();
        const firstDay = new Date(year,month,1).getDay();
        const daysCount = new Date(year,month+1,0).getDate();
        const monthNames = ['يناير','فبراير','مارس','إبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        let html = `<div class="p-4"><h2 class="text-xl font-bold mb-3">📆 ${monthNames[month]} ${year}</h2><div class="calendar-grid">`;
        ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'].forEach(d=>html+=`<div class="text-center font-bold py-2">${d}</div>`);
        for(let i=0;i<firstDay;i++) html+=`<div></div>`;
        for(let d=1;d<=daysCount;d++){
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const has = bookings.some(b=>b.date===dateStr);
            html += `<div class="calendar-day ${has?'booked':''}" onclick="showDayBookings('${dateStr}')">${d}</div>`;
        }
        html += `</div><div id="calendarInfo" class="mt-3 text-sm text-gray-600"></div></div>`;
        document.getElementById('calendarTab').innerHTML = html;
    }

    };
    window.saveManualAssign = function(bookingId) {
        const booking = bookings.find(b=>b.id===bookingId);
        const checkboxes = document.querySelectorAll('#modalContent input[type="checkbox"]');
        const selected = [];
        checkboxes.forEach(cb=>{ if(cb.checked) selected.push(cb.value); });
        booking.assignedEmployees = selected;
        saveAllData(); closeModal(); renderDistributionContent(); renderBookingsContent(); showMsg("✅ " + (currentLang === 'ar' ? 'تم تعديل التوزيع' : 'Distribution updated'));
    };
    window.showEditUserModal = function(username) {
        const user = users.find(u=>u.username===username);
        const html = `<h3 class="text-xl font-bold mb-3">✏️ ${t('edit')} ${t('user')}</h3><input id="editUsername" value="${user.username}" placeholder="${t('username')}"><input id="editPassword" value="${user.password}" placeholder="${t('password')}"><select id="editRole"><option value="admin" ${user.role==='admin'?'selected':''}>admin</option><option value="employee" ${user.role==='employee'?'selected':''}>employee</option></select><button onclick="saveEditUser('${username}')" class="bg-emerald-700 text-white w-full py-2 rounded-xl mt-3">${t('save')}</button>`;
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
    };
    window.saveEditUser = function(oldUsername) {
        const user = users.find(u=>u.username===oldUsername);
        if(!user) return;
        const newUsername = document.getElementById('editUsername').value.trim();
        const newPassword = document.getElementById('editPassword').value;
        const newRole = document.getElementById('editRole').value;
        if(newUsername !== oldUsername && users.some(u=>u.username===newUsername)) { alert(currentLang === 'ar' ? "⚠️ اسم المستخدم موجود" : "Username exists"); return; }
        user.username = newUsername; user.password = newPassword; user.role = newRole;
        saveAllData();
        if(currentUser && currentUser.username === oldUsername) { currentUser.username = newUsername; sessionStorage.setItem('vpms_user', JSON.stringify(currentUser)); }
        closeModal(); renderUsersContent(); showMsg("✅ " + (currentLang === 'ar' ? 'تم تحديث المستخدم' : 'User updated'));
    };
    window.deleteUser = function(username){ if(confirm(currentLang === 'ar' ? `حذف المستخدم "${username}"؟` : `Delete user "${username}"?`)){ users=users.filter(u=>u.username!==username); saveAllData(); renderUsersContent(); showMsg("🗑️ " + (currentLang === 'ar' ? 'تم الحذف' : 'Deleted')); } };
    window.addUser = function(){ let un=prompt(currentLang === 'ar' ? "اسم المستخدم:" : "Username:"); let pw=prompt(currentLang === 'ar' ? "كلمة المرور:" : "Password:"); let role=prompt(currentLang === 'ar' ? "الدور (admin/employee):" : "Role (admin/employee):","employee"); if(un&&pw){ if(users.some(u=>u.username===un)){ alert(currentLang === 'ar' ? "⚠️ اسم المستخدم موجود" : "Username exists"); return; } users.push({username:un,password:pw,role:role||'employee'}); saveAllData(); renderUsersContent(); showMsg("✅ " + (currentLang === 'ar' ? 'تمت الإضافة' : 'Added')); } };
    window.exportToExcel = function(){ const ws = XLSX.utils.json_to_sheet(bookings.map(b=>({ [t('client')]:b.clientName, [t('date')]:b.date, [t('hall')]:b.hallName, [t('price')]:b.price }))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Bookings"); XLSX.writeFile(wb,"Drmedia_Bookings.xlsx"); showMsg("✅ " + (currentLang === 'ar' ? 'تم التصدير' : 'Exported')); };
    window.exportToPDF = function(){ const win = window.open(); win.document.write(`<html><head><title>Drmedia Report</title><style>body{font-family:Arial;padding:20px;}table{border-collapse:collapse;}th,td{border:1px solid #ddd;padding:8px;}</style></head><body><h2>Drmedia ${t('reports')}</h2><p>${t('totalBookings')}: ${bookings.length}</p><table><thead><tr><th>${t('client')}</th><th>${t('date')}</th><th>${t('hall')}</th><th>${t('price')}</th></tr></thead><tbody>${bookings.map(b=>`<tr><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price} ج.م</td></tr>`).join('')}</tbody></table></body></html>`); win.print(); };

    // -------------------- دوال التحديد المتعدد --------------------
    window.toggleBookingSelection = function(id, checked) { if(checked) selectedBookings.add(id); else selectedBookings.delete(id); const allCheckbox = document.getElementById('selectAllBookingsCheckbox'); if(allCheckbox) allCheckbox.checked = selectedBookings.size === bookings.length && bookings.length > 0; };
    window.selectAllBookings = function() { if(selectedBookings.size === bookings.length) selectedBookings.clear(); else bookings.forEach(b => selectedBookings.add(b.id)); renderBookingsContent(); };
    window.toggleSelectAllBookings = function() { const selectAll = document.getElementById('selectAllBookingsCheckbox').checked; if(selectAll) bookings.forEach(b => selectedBookings.add(b.id)); else selectedBookings.clear(); renderBookingsContent(); };
    window.bulkDeleteBookings = function() { if(selectedBookings.size === 0){ alert(currentLang === 'ar' ? "⚠️ لم تختر أي حجز" : "No bookings selected"); return; } if(confirm((currentLang === 'ar' ? `⚠️ حذف ${selectedBookings.size} حجز؟` : `Delete ${selectedBookings.size} bookings?`))){ bookings = bookings.filter(b => !selectedBookings.has(b.id)); selectedBookings.clear(); saveAllData(); autoDistribute(); renderBookingsContent(); renderDistributionContent(); showMsg(`✅ ${currentLang === 'ar' ? 'تم حذف الحجوزات المحددة' : 'Selected bookings deleted'}`); } };
    window.toggleEmployeeSelection = function(id, checked) { if(checked) selectedEmployees.add(id); else selectedEmployees.delete(id); const allCheckbox = document.getElementById('selectAllEmployeesCheckbox'); if(allCheckbox) allCheckbox.checked = selectedEmployees.size === employees.length && employees.length > 0; };
    window.selectAllEmployees = function() { if(selectedEmployees.size === employees.length) selectedEmployees.clear(); else employees.forEach(e => selectedEmployees.add(e.id)); renderEmployeesContent(); };
    window.toggleSelectAllEmployees = function() { const selectAll = document.getElementById('selectAllEmployeesCheckbox').checked; if(selectAll) employees.forEach(e => selectedEmployees.add(e.id)); else selectedEmployees.clear(); renderEmployeesContent(); };
    window.bulkDeleteEmployees = function() { if(selectedEmployees.size === 0){ alert(currentLang === 'ar' ? "⚠️ لم تختر أي موظف" : "No employees selected"); return; } if(confirm((currentLang === 'ar' ? `⚠️ حذف ${selectedEmployees.size} موظف؟` : `Delete ${selectedEmployees.size} employees?`))){ employees = employees.filter(e => !selectedEmployees.has(e.id)); selectedEmployees.clear(); saveAllData(); autoDistribute(); renderEmployeesContent(); renderDistributionContent(); showMsg(`✅ ${currentLang === 'ar' ? 'تم حذف الموظفين المحددين' : 'Selected employees deleted'}`); } };

    // -------------------- واجهة المدير الرئيسية --------------------
    function renderAdminDashboard() {
        const html = `
            <div class="p-4 max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-4"><h1 class="text-2xl font-bold text-emerald-800"><i class="fas fa-chart-line ml-2"></i>Drmedia Pro - ${t('dashboard')}</h1><div><span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full ml-2">${currentUser?.username}</span><button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-xl">${t('logout')}</button></div></div>
                <div class="flex flex-wrap gap-1 border-b" id="tabsContainer">
                    <button data-tab="dashboardTab" class="tab-btn active">${t('dashboard')}</button>
                    <button data-tab="bookingsTab" class="tab-btn">${t('bookings')}</button>
                    <button data-tab="employeesTab" class="tab-btn">${t('employees')}</button>
                    <button data-tab="distributionTab" class="tab-btn">${t('distribution')}</button>
                    <button data-tab="payrollTab" class="tab-btn">${t('payroll')}</button>
                    <button data-tab="calendarTab" class="tab-btn">${t('calendar')}</button>
                    <button data-tab="reportsTab" class="tab-btn">${t('reports')}</button>
                    <button data-tab="usersTab" class="tab-btn">${t('users')}</button>
                    <button data-tab="settingsTab" class="tab-btn">${t('settings')}</button>
                </div>
                <div class="mt-4">
                    <div id="dashboardTab" class="tab-content"></div>
                    <div id="bookingsTab" class="tab-content hidden"></div>
                    <div id="employeesTab" class="tab-content hidden"></div>
                    <div id="distributionTab" class="tab-content hidden"></div>
                    <div id="payrollTab" class="tab-content hidden"></div>
                    <div id="calendarTab" class="tab-content hidden"></div>
                    <div id="reportsTab" class="tab-content hidden"></div>
                    <div id="usersTab" class="tab-content hidden"></div>
                    <div id="settingsTab" class="tab-content hidden"></div>
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
        document.querySelectorAll('#tabsContainer .tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#tabsContainer .tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTab = this.dataset.tab;
                renderCurrentTab();
            });
        });
        renderDashboardContent();
        renderBookingsContent();
        renderEmployeesContent();
        renderDistributionContent();
        renderPayrollContent();
        renderCalendarContent();
        renderReportsContent();
        renderUsersContent();
        renderSettingsContent();
        document.getElementById('dashboardTab').classList.remove('hidden');
    }

    function renderEmployeeDashboard() {
        const emp = employees.find(e=>e.id===currentUser.employeeId);
        if(!emp){ document.getElementById('app').innerHTML='<div class="p-8 text-center text-red-500">⚠️ '+(currentLang === 'ar' ? 'لم يتم ربط حسابك بموظف' : 'Account not linked to employee')+'</div>'; return; }
        const myOrders = bookings.filter(b=>b.assignedEmployees?.includes(emp.id));
        const total = myOrders.length;
        const salary = total * emp.salaryPerOrder;
        const html = `
            <div class="p-4 max-w-4xl mx-auto"><div class="flex justify-between items-center mb-4"><h1 class="text-2xl font-bold text-emerald-800">Drmedia Pro</h1><button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-xl">${t('logout')}</button></div>
            <div class="bg-emerald-700 text-white p-6 rounded-2xl mb-6"><h2 class="text-2xl font-bold">${t('welcome')} ${emp.name}</h2><p class="opacity-90">${emp.role}</p></div>
            <div class="grid grid-cols-2 gap-4 mb-6"><div class="bg-white p-4 rounded-xl shadow text-center"><div class="text-3xl font-bold text-emerald-700">${total}</div><div>${t('ordersCount')}</div></div><div class="bg-white p-4 rounded-xl shadow text-center"><div class="text-3xl font-bold text-emerald-700">${salary.toLocaleString()} ج.م</div><div>${t('totalDue')}</div></div></div>
            <div class="bg-white rounded-xl shadow overflow-hidden"><div class="bg-gray-100 p-3 font-bold">📋 ${t('myOrders')}</div><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>#</th><th>${t('date')}</th><th>${t('client')}</th><th>${t('hall')}</th></tr></thead><tbody>${myOrders.map((o,i)=>`<tr><td class="p-2">${i+1}</td><td class="p-2">${o.date}</td><td class="p-2">${o.clientName}</td><td class="p-2">${o.hallName}</td></tr>`).join('')||'<tr><td colspan="4" class="text-center">'+ (currentLang === 'ar' ? 'لا توجد أوردرات' : 'No orders') +'</td></tr>'}</tbody></table></div></div></div>
        `;
        document.getElementById('app').innerHTML = html;
    }

    // -------------------- تسجيل الدخول --------------------
    function showLogin() {
        const html = `<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700"><div class="bg-white p-8 rounded-2xl w-96 text-center"><i class="fas fa-camera-retro text-5xl text-emerald-600 mb-4"></i><h1 class="text-2xl font-bold">Drmedia Pro</h1><p class="text-gray-500 mb-6">${currentLang === 'ar' ? 'نظام إدارة متقدم' : 'Advanced Management System'}</p><input type="text" id="loginUser" placeholder="${t('username')}" class="w-full border p-3 rounded-xl mb-3"><input type="password" id="loginPass" placeholder="${t('password')}" class="w-full border p-3 rounded-xl mb-4"><div id="loginError" class="text-red-500 text-sm mb-2 hidden"></div><button onclick="doLogin()" class="w-full bg-emerald-700 text-white py-3 rounded-xl">${t('login')}</button></div></div>`;
        document.getElementById('app').innerHTML = html;
    }
    function doLogin() {
        const un = document.getElementById('loginUser').value;
        const pw = document.getElementById('loginPass').value;
        const user = users.find(u=>u.username===un && u.password===pw);
        if(user){ currentUser = user; sessionStorage.setItem('vpms_user', JSON.stringify(user)); renderApp(); showMsg(`✅ ${t('welcome')} ${user.name || user.username}`); }
        else { document.getElementById('loginError').innerText = currentLang === 'ar' ? 'بيانات غير صحيحة' : 'Invalid credentials'; document.getElementById('loginError').classList.remove('hidden'); }
    }
    function logout() { sessionStorage.removeItem('vpms_user'); currentUser = null; showLogin(); }
    function renderApp() { if(!currentUser) showLogin(); else if(currentUser.role === 'employee') renderEmployeeDashboard(); else renderAdminDashboard(); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    // -------------------- بدء التطبيق --------------------
    loadData();
    const saved = sessionStorage.getItem('vpms_user');
    if(saved) currentUser = JSON.parse(saved);
</script>
</body>
</html>
