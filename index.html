<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام توزيع الأوردرات</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --secondary: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      --radius: 16px;
      --transition: all 0.3s ease;
    }
    .dark-theme {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --text-light: #94a3b8;
      --shadow: 0 4px 6px -1px rgba(255,255,255,0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      direction: rtl;
      transition: background 0.3s, color 0.3s;
    }
    .screen {
      display: none;
      min-height: 100vh;
      padding: 20px;
      animation: fadeIn 0.4s ease;
    }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 30px;
      width: 100%;
      max-width: 500px;
      margin: 20px auto;
      transition: var(--transition);
    }
    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
    }
    .btn:hover { background: var(--primary-dark); }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }
    .btn-outline:hover { background: var(--primary); color: white; }
    .btn-sm { padding: 8px 16px; font-size: 14px; }
    .btn-danger { background: var(--danger); color: white; border: none; }
    .btn-success { background: var(--secondary); color: white; border: none; }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0 16px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-family: inherit;
      font-size: 16px;
      background: var(--card);
      color: var(--text);
    }
    label { font-weight: 500; display: block; margin-top: 8px; }
    .nav {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nav button {
      background: var(--card);
      border: 1px solid #cbd5e1;
      padding: 8px 16px;
      border-radius: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
    }
    .nav button:hover { background: var(--primary); color: white; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    th, td {
      padding: 12px;
      text-align: right;
      border-bottom: 1px solid #e2e8f0;
    }
    th { background: var(--primary); color: white; }
    .hidden { display: none !important; }
    #qr-reader { width: 100%; max-width: 400px; margin: auto; }
    @media (max-width: 768px) {
      .card { padding: 20px; }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- شاشة تسجيل الدخول (يوزر وباسورد) -->
  <div id="login-screen" class="screen active">
    <div class="card">
      <h2><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h2>
      <form id="login-form">
        <label>اسم المستخدم</label>
        <input type="text" id="login-username" placeholder="أدخل اسم المستخدم" required>
        <label>كلمة المرور</label>
        <input type="password" id="login-password" placeholder="••••••" required>
        <button type="submit" class="btn" style="width:100%"><i class="fas fa-arrow-left"></i> دخول</button>
      </form>
      <div style="margin-top: 16px; text-align: center;">
        <button id="biometric-login-btn" class="btn btn-outline btn-sm"><i class="fas fa-fingerprint"></i> دخول بالبصمة</button>
      </div>
    </div>
  </div>

  <!-- لوحة الأدمن -->
  <div id="admin-screen" class="screen">
    <h2 style="text-align:center;"><i class="fas fa-user-shield"></i> لوحة التحكم</h2>
    <div class="nav">
      <button onclick="showAdminSection('users')"><i class="fas fa-users"></i> الموظفين</button>
      <button onclick="showAdminSection('orders')"><i class="fas fa-calendar-alt"></i> الأوردرات</button>
      <button onclick="showAdminSection('distribution')"><i class="fas fa-tasks"></i> توزيع</button>
      <button onclick="showAdminSection('import')"><i class="fas fa-file-import"></i> استيراد</button>
      <button onclick="showAdminSection('notifications')"><i class="fas fa-bell"></i> إشعارات</button>
      <button onclick="showAdminSection('settings')"><i class="fas fa-cog"></i> إعدادات</button>
      <button id="logout-btn" class="btn btn-danger btn-sm"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
    <div id="admin-content" class="card" style="max-width: 900px;"></div>
  </div>

  <!-- لوحة الموظف -->
  <div id="employee-screen" class="screen">
    <h2 style="text-align:center;"><i class="fas fa-id-card"></i> لوحة الموظف</h2>
    <div class="nav">
      <button onclick="showEmployeeSection('attendance')"><i class="fas fa-qrcode"></i> حضور</button>
      <button onclick="showEmployeeSection('myorders')"><i class="fas fa-list"></i> أوردراتي</button>
      <button onclick="showEmployeeSection('salary')"><i class="fas fa-money-bill"></i> مرتبي</button>
      <button id="emp-logout-btn" class="btn btn-danger btn-sm"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
    <div id="employee-content" class="card" style="max-width: 800px;"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
    getFirestore, collection, doc, setDoc, getDoc, getDocs, 
    query, where, orderBy, addDoc, updateDoc, deleteDoc,
    Timestamp, writeBatch, serverTimestamp, onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ======== إعدادات Firebase (استبدلها بمشروعك) ========
  const firebaseConfig = {
    apiKey: "AIzaSyDummyKey123456789",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ======== نظام إدارة الجلسة (localStorage) ========
  const sessionKey = 'currentUser';
  let currentUser = null;

  // محاولة استعادة الجلسة عند التحميل
  const savedUser = localStorage.getItem(sessionKey);
  if (savedUser) {
    try {
      currentUser = JSON.parse(savedUser);
      navigateToDashboard(currentUser);
    } catch (e) {
      localStorage.removeItem(sessionKey);
    }
  }

  // ======== دوال الصفحات ========
  const screens = document.querySelectorAll('.screen');
  window.showScreen = (screenId) => {
    screens.forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  };

  function navigateToDashboard(user) {
    if (user.role === 'admin') {
      showScreen('admin-screen');
      loadAdminDashboard(user);
    } else {
      showScreen('employee-screen');
      loadEmployeeDashboard(user);
    }
  }

  // ======== تسجيل الدخول (يوزر وباسورد) ========
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;

    try {
      // البحث عن المستخدم بواسطة اسم المستخدم
      const q = query(collection(db, "users"), where("username", "==", username));
      const snapshot = await getDocs(q);
      
      if (snapshot.empty) {
        throw new Error("اسم المستخدم غير موجود");
      }

      const userDoc = snapshot.docs[0];
      const userData = userDoc.data();
      
      // مقارنة كلمة المرور (مشفرة بـ btoa)
      if (userData.password !== btoa(password)) {
        throw new Error("كلمة المرور غير صحيحة");
      }

      // تسجيل الدخول ناجح
      currentUser = {
        uid: userDoc.id,
        name: userData.name,
        username: userData.username,
        role: userData.role,
        department: userData.department,
        salaryPerOrder: userData.salaryPerOrder,
        advance: userData.advance,
        deductions: userData.deductions
      };
      
      localStorage.setItem(sessionKey, JSON.stringify(currentUser));
      navigateToDashboard(currentUser);
      
    } catch (error) {
      alert('فشل الدخول: ' + error.message);
    }
  });

  // بصمة وهمية
  document.getElementById('biometric-login-btn').addEventListener('click', () => {
    alert('خاصية البصمة قيد التطوير');
  });

  // تسجيل الخروج
  function logout() {
    localStorage.removeItem(sessionKey);
    currentUser = null;
    showScreen('login-screen');
  }
  document.getElementById('logout-btn').addEventListener('click', logout);
  document.getElementById('emp-logout-btn').addEventListener('click', logout);

  // ======== الأدمن: تهيئة المحتوى ========
  window.showAdminSection = (section) => {
    const content = document.getElementById('admin-content');
    if (!currentUser || currentUser.role !== 'admin') return;
    switch(section) {
      case 'users': renderAdminUsers(content); break;
      case 'orders': renderAdminOrders(content); break;
      case 'distribution': renderDistribution(content); break;
      case 'import': renderImport(content); break;
      case 'notifications': renderNotifications(content); break;
      case 'settings': renderSettings(content); break;
    }
  };

  function loadAdminDashboard(userData) {
    showAdminSection('users');
  }

  // ----- إدارة الموظفين -----
  async function renderAdminUsers(container) {
    container.innerHTML = `<h3>إدارة الموظفين</h3>
      <button class="btn btn-sm" onclick="toggleAddUserForm()"><i class="fas fa-plus"></i> إضافة موظف</button>
      <div id="addUserForm" class="hidden card" style="max-width:400px;">
        <input type="text" id="newUserName" placeholder="الاسم الكامل">
        <input type="text" id="newUserUsername" placeholder="اسم المستخدم">
        <input type="password" id="newUserPassword" placeholder="كلمة المرور">
        <select id="newUserRole">
          <option value="employee">موظف</option>
          <option value="admin">أدمن</option>
        </select>
        <select id="newUserDept">
          <option value="مخرج">مخرج</option>
          <option value="مصور">مصور</option>
          <option value="كرين">كرين</option>
        </select>
        <label>سعر الأوردر</label>
        <input type="number" id="newUserSalaryPerOrder" value="0" min="0">
        <label>سلفة</label>
        <input type="number" id="newUserAdvance" value="0" min="0">
        <label>خصومات</label>
        <input type="number" id="newUserDeductions" value="0" min="0">
        <button class="btn btn-success btn-sm" onclick="addUser()">حفظ</button>
      </div>
      <div id="usersTable"></div>`;

    await refreshUsersTable();
  }

  window.toggleAddUserForm = () => {
    document.getElementById('addUserForm').classList.toggle('hidden');
  };

  async function refreshUsersTable() {
    const q = query(collection(db, "users"));
    const snapshot = await getDocs(q);
    let html = `<table><tr><th>الاسم</th><th>اسم المستخدم</th><th>الدور</th><th>القسم</th><th>سعر الأوردر</th></tr>`;
    snapshot.forEach(doc => {
      const u = doc.data();
      html += `<tr>
        <td>${u.name}</td>
        <td>${u.username || '-'}</td>
        <td>${u.role}</td>
        <td>${u.department}</td>
        <td>${u.salaryPerOrder || 0}</td>
      </tr>`;
    });
    html += `</table>`;
    document.getElementById('usersTable').innerHTML = html;
  }

  window.addUser = async () => {
    const name = document.getElementById('newUserName').value.trim();
    const username = document.getElementById('newUserUsername').value.trim();
    const password = document.getElementById('newUserPassword').value;
    const role = document.getElementById('newUserRole').value;
    const department = document.getElementById('newUserDept').value;
    const salaryPerOrder = Number(document.getElementById('newUserSalaryPerOrder').value);
    const advance = Number(document.getElementById('newUserAdvance').value);
    const deductions = Number(document.getElementById('newUserDeductions').value);

    if (!name || !username || !password) {
      alert('الرجاء ملء الحقول المطلوبة');
      return;
    }

    // التأكد من عدم وجود اسم مستخدم مكرر
    const checkQuery = query(collection(db, "users"), where("username", "==", username));
    const checkSnap = await getDocs(checkQuery);
    if (!checkSnap.empty) {
      alert('اسم المستخدم موجود مسبقاً');
      return;
    }

    try {
      const userRef = doc(collection(db, "users"));
      await setDoc(userRef, {
        name,
        username,
        password: btoa(password), // تشفير بسيط
        role,
        department,
        salaryPerOrder,
        advance,
        deductions
      });
      alert('تم إضافة المستخدم بنجاح');
      document.getElementById('newUserName').value = '';
      document.getElementById('newUserUsername').value = '';
      document.getElementById('newUserPassword').value = '';
      document.getElementById('addUserForm').classList.add('hidden');
      await refreshUsersTable();
    } catch (e) {
      alert('خطأ: ' + e.message);
    }
  };

  // ----- عرض الأوردرات (للأدمن) -----
  async function renderAdminOrders(container) {
    container.innerHTML = `<h3>كل الأوردرات</h3><div id="adminOrdersTable"></div>`;
    const q = query(collection(db, "orders"), orderBy("date", "desc"));
    const snapshot = await getDocs(q);
    let html = `<table><tr><th>الرقم</th><th>التاريخ</th><th>العريس</th><th>القاعة</th><th>الموظفين</th></tr>`;
    snapshot.forEach(doc => {
      const o = doc.data();
      const assigned = o.assignedEmployees ? o.assignedEmployees.join(', ') : 'غير محدد';
      html += `<tr>
        <td>${o.serial}</td>
        <td>${o.date?.toDate().toLocaleDateString() || ''}</td>
        <td>${o.groomName}</td>
        <td>${o.hallType || ''}</td>
        <td>${assigned}</td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('adminOrdersTable').innerHTML = html;
  }

  // ----- استيراد إكسيل -----
  function renderImport(container) {
    container.innerHTML = `
      <h3>استيراد الحجوزات</h3>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
      <button class="btn btn-sm" onclick="importExcel()">استيراد</button>
      <div id="importResult"></div>`;
  }

  window.importExcel = async () => {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type: 'array'});
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(firstSheet, {header:1});
      let count = 0;
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        if (row.length < 6) continue;
        const [serial, dateStr, day, groom, packageType, guests] = row;
        const dateObj = new Date(dateStr);
        if (isNaN(dateObj.getTime())) continue;
        const orderData = {
          serial: serial.toString(),
          date: Timestamp.fromDate(dateObj),
          day: day || '',
          groomName: groom || '',
          packageType: packageType || '',
          guestsCount: Number(guests) || 0,
          hallType: '',
          assignedEmployees: [],
          status: 'pending'
        };
        await addDoc(collection(db, "orders"), orderData);
        count++;
      }
      document.getElementById('importResult').innerHTML = `<p class="text-success">تم استيراد ${count} حجز</p>`;
    };
    reader.readAsArrayBuffer(file);
  };

  // ----- توزيع ذكي (نفس السابق) -----
  async function renderDistribution(container) {
    container.innerHTML = `<h3>توزيع الأوردرات</h3>
      <label>اختر القاعة:</label>
      <select id="distHall">
        <option value="قاعة_مغلقة">قاعة مغلقة</option>
        <option value="قاعة_مفتوحة">قاعة مفتوحة</option>
        <option value="كافيه">كافيه</option>
      </select>
      <label>اختر التاريخ (اختياري)</label>
      <input type="date" id="distDate">
      <button class="btn" onclick="distributeSmart()"><i class="fas fa-magic"></i> توزيع ذكي</button>
      <div id="distResult"></div>`;
  }

  window.distributeSmart = async () => {
    const hall = document.getElementById('distHall').value;
    const dateVal = document.getElementById('distDate').value;
    let constraints = [];
    if (dateVal) {
      const start = new Date(dateVal);
      start.setHours(0,0,0,0);
      const end = new Date(dateVal);
      end.setHours(23,59,59,999);
      constraints.push(where('date', '>=', Timestamp.fromDate(start)));
      constraints.push(where('date', '<=', Timestamp.fromDate(end)));
    }
    const qOrders = query(collection(db, "orders"), ...constraints);
    const ordersSnap = await getDocs(qOrders);
    const orders = [];
    ordersSnap.forEach(d => orders.push({id: d.id, ...d.data()}));

    const requiredRoles = hall === 'كافيه' ? ['مصور'] : ['مخرج','مصور','مصور','كرين'];
    const roleSet = [...new Set(requiredRoles)];
    const usersSnap = await getDocs(query(collection(db, "users"), where('role','==','employee')));
    const employees = [];
    usersSnap.forEach(d => {
      const u = d.data();
      if (roleSet.includes(u.department)) employees.push({id: d.id, ...u});
    });

    const counts = {};
    employees.forEach(e => counts[e.id] = 0);

    let result = '';
    for (let order of orders) {
      const assigned = [];
      for (let role of requiredRoles) {
        const candidates = employees.filter(e => e.department === role && !assigned.includes(e.id));
        if (candidates.length === 0) continue;
        candidates.sort((a,b) => (counts[a.id]||0) - (counts[b.id]||0));
        const chosen = candidates[0];
        assigned.push(chosen.id);
        counts[chosen.id]++;
      }
      await updateDoc(doc(db, "orders", order.id), { assignedEmployees: assigned });
      result += `تم تعيين الأوردر ${order.serial} للموظفين: ${assigned.join(', ')}\n`;
    }
    document.getElementById('distResult').innerText = result || 'لا يوجد أوردرات مطابقة.';
  };

  // ----- إشعارات -----
  function renderNotifications(container) {
    container.innerHTML = `
      <h3>إرسال إشعار</h3>
      <textarea id="notifMsg" placeholder="نص الإشعار"></textarea>
      <select id="notifTarget">
        <option value="all">كل الموظفين</option>
        <option value="specific">موظف محدد</option>
      </select>
      <div id="specificUserSelect" class="hidden">
        <label>اسم المستخدم</label>
        <input type="text" id="specificUsername" placeholder="أدخل اسم المستخدم">
      </div>
      <button class="btn" onclick="sendNotification()">إرسال</button>`;
    document.getElementById('notifTarget').addEventListener('change', function(){
      document.getElementById('specificUserSelect').classList.toggle('hidden', this.value !== 'specific');
    });
  }

  window.sendNotification = async () => {
    const msg = document.getElementById('notifMsg').value;
    const target = document.getElementById('notifTarget').value;
    if (target === 'all') {
      await addDoc(collection(db, "notifications"), {
        message: msg, target: 'all', sentAt: serverTimestamp()
      });
    } else {
      const username = document.getElementById('specificUsername').value;
      await addDoc(collection(db, "notifications"), {
        message: msg, target: username, sentAt: serverTimestamp()
      });
    }
    alert('تم الإرسال');
  };

  // ----- إعدادات (مبسطة) -----
  function renderSettings(container) {
    container.innerHTML = `
      <h3>إعدادات</h3>
      <label>اسم الشركة</label>
      <input type="text" id="companyName">
      <label>رابط اللوجو</label>
      <input type="text" id="logoUrl">
      <button class="btn" onclick="saveSettings()">حفظ</button>
      <button class="btn btn-outline btn-sm" onclick="toggleTheme()">تبديل الثيم</button>`;
  }

  window.saveSettings = async () => {
    const companyName = document.getElementById('companyName').value;
    const logoUrl = document.getElementById('logoUrl').value;
    await setDoc(doc(db, "settings", "global"), { companyName, logoUrl });
    alert('تم الحفظ');
  };

  window.toggleTheme = () => {
    document.body.classList.toggle('dark-theme');
  };

  // ======== الموظف ========
  window.showEmployeeSection = (section) => {
    const content = document.getElementById('employee-content');
    if (!currentUser) return;
    switch(section) {
      case 'attendance': renderAttendance(content); break;
      case 'myorders': renderMyOrders(content); break;
      case 'salary': renderSalary(content); break;
    }
  };

  function loadEmployeeDashboard(userData) {
    showEmployeeSection('attendance');
  }

  function renderAttendance(container) {
    container.innerHTML = `
      <h3>تسجيل الحضور</h3>
      <div id="qr-reader"></div>
      <button class="btn btn-sm" onclick="startQR()">تشغيل الكاميرا</button>
      <button class="btn btn-sm btn-outline" onclick="stopQR()">إيقاف</button>
      <div id="attendanceResult"></div>`;
  }

  let html5QrCode;
  window.startQR = () => {
    html5QrCode = new Html5Qrcode("qr-reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      (decodedText) => {
        registerAttendance(decodedText);
        html5QrCode.stop();
      },
      () => {}
    ).catch(err => alert("خطأ: " + err));
  };

  window.stopQR = () => {
    if (html5QrCode) html5QrCode.stop();
  };

  async function registerAttendance(orderId) {
    if (!currentUser) return;
    await addDoc(collection(db, "attendance"), {
      userId: currentUser.uid,
      username: currentUser.username,
      orderId: orderId,
      timestamp: serverTimestamp()
    });
    document.getElementById('attendanceResult').innerText = 'تم تسجيل حضورك للأوردر: ' + orderId;
  }

  async function renderMyOrders(container) {
    if (!currentUser) return;
    const q = query(collection(db, "orders"), where("assignedEmployees", "array-contains", currentUser.uid));
    const snapshot = await getDocs(q);
    let html = '<table><tr><th>الرقم</th><th>التاريخ</th><th>العريس</th><th>القاعة</th></tr>';
    snapshot.forEach(doc => {
      const o = doc.data();
      html += `<tr><td>${o.serial}</td><td>${o.date?.toDate().toLocaleDateString() || ''}</td><td>${o.groomName}</td><td>${o.hallType}</td></tr>`;
    });
    html += '</table>';
    container.innerHTML = `<h3>أوردراتي</h3> ${html}`;
  }

  async function renderSalary(container) {
    if (!currentUser) return;
    const ordersSnap = await getDocs(query(collection(db, "orders"), where("assignedEmployees", "array-contains", currentUser.uid)));
    const ordersCount = ordersSnap.size;
    const total = ordersCount * (currentUser.salaryPerOrder || 0);
    const net = total + (currentUser.advance || 0) - (currentUser.deductions || 0);
    container.innerHTML = `
      <h3>مرتبي</h3>
      <p>عدد الأوردرات: ${ordersCount}</p>
      <p>سعر الأوردر: ${currentUser.salaryPerOrder || 0}</p>
      <p>الإجمالي: ${total}</p>
      <p>الصافي: ${net}</p>`;
  }

  // ======== PWA (اختياري) ========
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then(() => console.log('SW جاهز'));
    });
  }
</script>
</body>
</html>
