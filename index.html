<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Drmedia Pro | نظام إدارة القاعات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0fdf4; direction: rtl; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; z-index: 10000; transition: 0.3s; font-size: 14px; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .btn-primary { background: #065f46; color: white; padding: 8px 16px; border-radius: 12px; }
        .tab-btn { cursor: pointer; padding: 8px 16px; border-radius: 12px 12px 0 0; background: #e5e7eb; margin-left: 4px; display: inline-block; }
        .tab-btn.active { background: #065f46; color: white; }
        .dashboard-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; border: 1px solid #e2e8f0; }
        .stat-number { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #065f46, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: right; }
        th { background: #f1f5f9; }
        input, select { border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 12px; width: 100%; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg"></span></div>
    <div id="app"></div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
            authDomain: "drmedia-vpms.firebaseapp.com",
            databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
            projectId: "drmedia-vpms",
            storageBucket: "drmedia-vpms.firebasestorage.app",
            messagingSenderId: "681162512380",
            appId: "1:681162512380:web:ab2482f3234d8b59fc4479"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let bookings = [], employees = [], users = [], halls = [], currentUser = null;
        let currentTab = 'dashboard';

        // دوال مساعدة
        function showMsg(msg, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // تحميل البيانات من Firebase
        async function loadAllData() {
            try {
                const [bookingsSnap, employeesSnap, usersSnap, hallsSnap] = await Promise.all([
                    db.ref('bookings').once('value'),
                    db.ref('employees').once('value'),
                    db.ref('users').once('value'),
                    db.ref('halls').once('value')
                ]);
                bookings = bookingsSnap.val() || [];
                employees = employeesSnap.val() || [];
                users = usersSnap.val() || [];
                halls = hallsSnap.val() || [];

                // إذا كانت البيانات فارغة، أضف بيانات تجريبية
                if (!bookings.length && !employees.length && !halls.length) {
                    halls = [
                        { id: 'hall1', name: 'المغلقة', type: 'closed', active: true },
                        { id: 'hall2', name: 'الأوبن', type: 'open', active: true },
                        { id: 'hall3', name: 'الكافيه', type: 'cafe', active: true }
                    ];
                    employees = [
                        { id: 'emp1', name: 'أحمد علي', role: 'مخرج', phone: '01001234567', salaryPerOrder: 300, active: true, totalOrders: 0 },
                        { id: 'emp2', name: 'محمود حسن', role: 'مصور', phone: '01002345678', salaryPerOrder: 200, active: true, totalOrders: 0 }
                    ];
                    users = [
                        { username: 'admin', password: 'admin123', role: 'admin', name: 'مدير النظام' }
                    ];
                    bookings = [
                        { id: 'b1', clientName: 'محمد عبدالله', phone: '01012345678', hallId: 'hall1', hallName: 'المغلقة', date: new Date().toISOString().slice(0,10), price: 5000, status: 'pending', paymentStatus: 'pending', assignedEmployees: [] }
                    ];
                    await saveAllData();
                }
                renderApp();
                showMsg("تم تحميل البيانات بنجاح");
            } catch (err) {
                console.error(err);
                showMsg("خطأ في تحميل البيانات: " + err.message, 'error');
            }
        }

        async function saveAllData() {
            await db.ref('bookings').set(bookings);
            await db.ref('employees').set(employees);
            await db.ref('users').set(users);
            await db.ref('halls').set(halls);
        }

        // عرض لوحة التحكم
        function renderAdminDashboard() {
            const activeBookings = bookings.filter(b => b.status !== 'cancelled');
            const totalRevenue = activeBookings.reduce((s, b) => s + b.price, 0);
            const html = `
                <div class="p-4 max-w-7xl mx-auto">
                    <header class="flex justify-between items-center p-3 bg-white shadow rounded-xl mb-4">
                        <h1 class="text-xl font-bold text-emerald-800">📷 Drmedia Pro</h1>
                        <div class="flex gap-3">
                            <span class="bg-emerald-100 px-3 py-1 rounded-full">مدير النظام</span>
                            <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-xl">خروج</button>
                        </div>
                    </header>
                    <div class="flex flex-wrap gap-1 border-b mb-4" id="tabsContainer">
                        <button data-tab="dashboard" class="tab-btn active">📊 الرئيسية</button>
                        <button data-tab="bookings" class="tab-btn">📅 الحجوزات</button>
                        <button data-tab="halls" class="tab-btn">🏛️ القاعات</button>
                        <button data-tab="employees" class="tab-btn">👥 الموظفين</button>
                        <button data-tab="reports" class="tab-btn">📊 التقارير</button>
                    </div>
                    <div id="dashboardTab" class="tab-content">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                            <div class="dashboard-card"><div class="stat-number">${activeBookings.length}</div><div>حجوزات نشطة</div></div>
                            <div class="dashboard-card"><div class="stat-number">${totalRevenue.toLocaleString()} ج.م</div><div>الإيرادات</div></div>
                            <div class="dashboard-card"><div class="stat-number">${employees.filter(e=>e.active).length}</div><div>موظفين نشطين</div></div>
                            <div class="dashboard-card"><div class="stat-number">${bookings.filter(b=>b.status==='completed').length}</div><div>مكتملة</div></div>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow">
                            <h3 class="font-bold mb-3">📋 أقرب الحجوزات</h3>
                            <table class="w-full text-sm">
                                <thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th></tr></thead>
                                <tbody>${activeBookings.slice(0,5).map(b => `<tr><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price.toLocaleString()} ج.م</td></tr>`).join('') || '<tr><td colspan="4" class="text-center">لا توجد حجوزات</td></tr>'}</tbody>
                            </table>
                        </div>
                    </div>
                    <div id="bookingsTab" class="tab-content hidden">
                        <div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-3">📅 الحجوزات (${bookings.length})</h2>
                        <table class="w-full text-sm"><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th><th>حالة</th></tr></thead>
                        <tbody>${bookings.map(b => `<tr><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price.toLocaleString()}</td><td>${b.status === 'completed' ? 'مكتمل' : 'معلق'}</td></tr>`).join('') || '<tr><td colspan="5">لا توجد حجوزات</td></tr>'}</tbody></table>
                        <button onclick="showAddBookingModal()" class="btn-primary mt-4">+ إضافة حجز</button></div>
                    </div>
                    <div id="hallsTab" class="tab-content hidden"><div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">🏛️ القاعات</h2><ul>${halls.map(h => `<li>${h.name} (${h.type})</li>`).join('')}</ul></div></div>
                    <div id="employeesTab" class="tab-content hidden"><div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">👥 الموظفين</h2><ul>${employees.map(e => `<li>${e.name} - ${e.role}</li>`).join('')}</ul></div></div>
                    <div id="reportsTab" class="tab-content hidden"><div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">📊 التقارير</h2><p>إجمالي الإيرادات: ${totalRevenue.toLocaleString()} ج.م</p></div></div>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            attachTabEvents();
        }

        function attachTabEvents() {
            document.querySelectorAll('#tabsContainer .tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
                    document.getElementById(btn.dataset.tab + 'Tab').classList.remove('hidden');
                });
            });
        }

        function renderApp() {
            renderAdminDashboard();
        }

        window.showAddBookingModal = function() {
            const hallOptions = halls.map(h => `<option value="${h.id}">${h.name}</option>`).join('');
            const modalHtml = `<div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4"><div class="bg-white rounded-2xl p-6 w-full max-w-md"><h3 class="text-xl font-bold mb-4">➕ حجز جديد</h3><input id="clientName" placeholder="اسم العميل" class="w-full border p-2 rounded-xl mb-3"><input id="clientPhone" placeholder="رقم الهاتف" class="w-full border p-2 rounded-xl mb-3"><select id="hallId" class="w-full border p-2 rounded-xl mb-3">${hallOptions}</select><input id="date" type="date" class="w-full border p-2 rounded-xl mb-3"><input id="price" type="number" placeholder="السعر" class="w-full border p-2 rounded-xl mb-3"><div class="flex gap-3"><button onclick="saveNewBooking()" class="btn-primary flex-1">حفظ</button><button onclick="closeModal()" class="bg-gray-400 text-white px-4 py-2 rounded-xl">إلغاء</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            window.closeModal = () => document.querySelector('.fixed.bg-black\\/60')?.remove();
        };
        window.saveNewBooking = async function() {
            const hall = halls.find(h => h.id === document.getElementById('hallId').value);
            const newBooking = {
                id: Date.now().toString(),
                clientName: document.getElementById('clientName').value || 'عميل جديد',
                phone: document.getElementById('clientPhone').value || '',
                hallId: hall.id,
                hallName: hall.name,
                date: document.getElementById('date').value,
                price: parseInt(document.getElementById('price').value) || 2000,
                status: 'pending',
                paymentStatus: 'pending',
                assignedEmployees: []
            };
            bookings.push(newBooking);
            await saveAllData();
            closeModal();
            renderApp();
            showMsg("✅ تم إضافة الحجز");
        };
        window.closeModal = () => document.querySelector('.fixed.bg-black\\/60')?.remove();
        window.logout = () => { auth.signOut().then(() => location.reload()); };

        // بدء التشغيل: تسجيل دخول مجهول ثم تحميل البيانات
        auth.signInAnonymously().then(() => {
            loadAllData();
        }).catch(err => {
            console.error(err);
            showMsg("فشل الاتصال بقاعدة البيانات: " + err.message, 'error');
            document.getElementById('app').innerHTML = `<div class="p-8 text-center text-red-600">⚠️ فشل الاتصال بقاعدة البيانات. تأكد من تفعيل "Anonymous Auth" في Firebase Console.</div>`;
        });
    </script>
</body>
</html>
