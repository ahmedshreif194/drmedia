<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drmedia Pro Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div id="app" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700 p-4">
    <div class="bg-white p-6 rounded-2xl w-full max-w-md text-center shadow-2xl">
        <h1 class="text-3xl font-bold text-emerald-700 mb-2">📷 Drmedia Pro Plus</h1>
        <p class="text-gray-500 mb-6">نظام إدارة القاعات الذكي</p>
        <input type="text" id="loginUser" placeholder="اسم المستخدم" class="w-full border p-3 rounded-xl mb-3">
        <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full border p-3 rounded-xl mb-2">
        <button onclick="doLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">دخول</button>
        <div class="mt-4 text-sm text-gray-400"><p>المدير: <strong>ahmed</strong> / <strong>1994</strong></p></div>
    </div>
</div>
<script>
    const users = [{ username: 'ahmed', password: '1994', role: 'admin' }];
    function doLogin() {
        const un = document.getElementById('loginUser').value.trim();
        const pw = document.getElementById('loginPass').value;
        if (un === 'ahmed' && pw === '1994') {
            alert('تم تسجيل الدخول بنجاح');
            document.getElementById('app').innerHTML = '<div class="p-8 text-center"><h1 class="text-2xl font-bold">لوحة التحكم</h1><p>مرحباً أيها المدير</p></div>';
        } else {
            alert('بيانات غير صحيحة');
        }
    }
</script>
</body>
</html>
