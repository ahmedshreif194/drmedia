<script>

// ======================== INIT SAFE ========================
function initApp() {
    try {
        loadAllData();

        const saved = sessionStorage.getItem('drmedia_user');

        if (saved) {
            currentUser = JSON.parse(saved);

            if (currentUser?.role === 'admin') {
                renderAdminDashboard();
            } else if (currentUser?.role === 'employee') {
                renderEmployeeDashboard();
            } else {
                showLogin();
            }
        } else {
            showLogin();
        }

    } catch (e) {
        console.error("INIT ERROR:", e);
        sessionStorage.removeItem('drmedia_user');
        showLogin();
    }
}

// ======================== SMART MONTH DISTRIBUTION ========================
function smartDistributeMonthly() {

    let days = {};

    bookings.forEach(b => {
        if (!days[b.date]) days[b.date] = [];
        days[b.date].push(b);
    });

    Object.keys(days).forEach(day => {

        let usedToday = new Set();

        let directors = employees.filter(e => e.role === 'مخرج')
            .sort((a,b)=>a.totalOrders - b.totalOrders);

        let photographers = employees.filter(e => e.role === 'مصور')
            .sort((a,b)=>a.totalOrders - b.totalOrders);

        let cranes = employees.filter(e => e.role === 'كرين')
            .sort((a,b)=>a.totalOrders - b.totalOrders);

        days[day].forEach(b => {

            let assigned = [];

            function pick(list, count) {
                let result = [];
                for (let i = 0; i < list.length; i++) {
                    if (!usedToday.has(list[i].id)) {
                        result.push(list[i]);
                        usedToday.add(list[i].id);
                    }
                    if (result.length === count) break;
                }
                return result;
            }

            if (b.hallId === 'h1' || b.hallId === 'h2') {
                assigned.push(...pick(directors,1).map(e=>e.id));
                assigned.push(...pick(photographers,2).map(e=>e.id));
                assigned.push(...pick(cranes,1).map(e=>e.id));
            }

            if (b.hallId === 'h3') {
                assigned.push(...pick(photographers,1).map(e=>e.id));
            }

            b.assignedEmployees = assigned;
        });
    });

    updateEmployeeOrders();
    saveAllData();
    renderBookings();

    showMsg('🔥 تم توزيع الشهر بنجاح');
}

// ======================== PAYROLL SYSTEM ========================
function calculatePayroll() {
    let result = [];

    employees.forEach(e => {
        let total = (e.totalOrders || 0) * (e.salaryPerOrder || 200);

        result.push({
            name: e.name,
            orders: e.totalOrders || 0,
            total: total
        });
    });

    return result;
}

function renderPayroll() {
    let data = calculatePayroll();

    document.getElementById('payroll').innerHTML = `
    <div class="bg-white p-5 rounded-2xl shadow">
        <h2 class="text-xl font-bold mb-4">💰 المرتبات</h2>

        <div class="grid grid-cols-3 gap-2 mb-4">
            <button onclick="payDay(10)" class="bg-blue-600 text-white p-2 rounded">دفع يوم 10</button>
            <button onclick="payDay(20)" class="bg-green-600 text-white p-2 rounded">دفع يوم 20</button>
            <button onclick="payDay(30)" class="bg-purple-600 text-white p-2 rounded">دفع يوم 30</button>
        </div>

        <table class="w-full text-sm">
            <tr>
                <th>الاسم</th>
                <th>الأوردرات</th>
                <th>المستحق</th>
            </tr>

            ${data.map(e => `
            <tr>
                <td class="p-2">${e.name}</td>
                <td class="p-2">${e.orders}</td>
                <td class="p-2 font-bold">${e.total} ج</td>
            </tr>
            `).join('')}
        </table>
    </div>`;
}

function payDay(day) {
    showMsg(`💸 تم تسجيل دفعة يوم ${day}`);
}

// ======================== DASHBOARD STATS ========================
function renderDashboardStats() {

    let totalBookings = bookings.length;
    let totalEmployees = employees.length;
    let totalRevenue = bookings.reduce((sum, b) => sum + (b.price || 0), 0);

    document.getElementById('dashboard').innerHTML = `
    <div class="grid grid-cols-3 gap-3">
        <div class="bg-green-100 p-4 rounded">📅 ${totalBookings} حجوزات</div>
        <div class="bg-blue-100 p-4 rounded">👥 ${totalEmployees} موظف</div>
        <div class="bg-purple-100 p-4 rounded">💰 ${totalRevenue} ج</div>
    </div>`;
}

// ======================== FIX EMPLOYEES TABLE ========================
function renderEmployees() {
    updateEmployeeOrders();
    document.getElementById('employees').innerHTML = `
        <div class="bg-white p-5 rounded-2xl shadow">
            <h2 class="text-xl font-bold mb-4">👥 الموظفين</h2>
            <table class="w-full">
            <thead>
            <tr>
            <th>الاسم</th>
            <th>الدور</th>
            <th>الهاتف</th>
            <th>الأوردرات</th>
            <th>المستحق</th>
            </tr>
            </thead>
            <tbody>
            ${employees.map(e => `
            <tr>
            <td class="p-2">${e.name}</td>
            <td class="p-2">${e.role}</td>
            <td class="p-2">${e.phone}</td>
            <td class="p-2">${e.totalOrders || 0}</td>
            <td class="p-2 font-bold">
            ${((e.totalOrders || 0) * e.salaryPerOrder).toLocaleString()} ج
            </td>
            </tr>
            `).join('')}
            </tbody>
            </table>
        </div>`;
}

initApp();

</script>
