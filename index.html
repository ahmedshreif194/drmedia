    <style>

        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 12px 24px; border-radius: 40px; z-index: 10000; opacity: 0; pointer-events: none; transition: 0.3s; white-space: nowrap; box-shadow: 0 10px 25px rgba(0,0,0,0.3); font-weight: 500; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1100; visibility: hidden; opacity: 0; transition: 0.2s; backdrop-filter: blur(4px); padding: 16px; }

        .bg-card { background: var(--card); border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        body.dark { --bg: #1e1e2f; --card: #2d2d3a; --text: #e5e7eb; --text-secondary: #9ca3af; --border: #404050; }

<script>
// ==================== GLOBAL DATA ====================
const firebaseConfig = { apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ", authDomain: "drmedia-vpms.firebaseapp.com", databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com", projectId: "drmedia-vpms", storageBucket: "drmedia-vpms.firebasestorage.app", messagingSenderId: "681162512380", appId: "1:681162512380:web:ab2482f3234d8b59fc4479" };
let useFirebase = false, db = null, online = true, lastSync = null;
let currentUser = null;

let bookings = [], employees = [], halls = [], clients = [], equipmentInventory = {};
let attendanceRecords = [], employeeLoans = {}, notifications = [], trashBin = [], activityLog = [];
let USERS = [
  { id:'admin1', username:'ahmed', password:'1994', role:'admin', name:'مدير النظام' },
  { id:'emp1', username:'ahmed_emp', password:'emp123', role:'employee', employeeId:'emp1', name:'أحمد الموظف' },
  { id:'agent1', username:'agent', password:'agent123', role:'agent', name:'وكيل المبيعات' },
  { id:'man1', username:'manager', password:'manager123', role:'manager', name:'مدير تنفيذي' }
];
let appTheme = "light", appLanguage = "ar", distributionMode = 'smart';

let whatsappMessageTemplate = "مرحباً {name}، تم توزيع أوردر {client} في {date} بقاعة {hall}";
let browserNotifications = false, html5QrCode = null, html5QrScanner = null;
let calendarYear = new Date().getFullYear(), calendarMonth = new Date().getMonth();
let bookingFilterStatus = 'all', bookingFilterHall = 'all', bookingFilterDateFrom = '', bookingFilterDateTo = '';
let flashDrives = [], holidays = [];
let systemOfflineMode = false;
const footerText = "© جميع الحقوق محفوظة Dr Media Pro – تصميم وتطوير Ahmed Shreif";

// ==================== UTILITIES ====================
function showMsg(msg, type='success') { try { const tEl = document.getElementById('toast'); if (!tEl) return; tEl.textContent = msg; tEl.className = 'toast '+type+' show'; clearTimeout(tEl._t); tEl._t = setTimeout(() => { tEl.classList.remove('show'); tEl.className = 'toast'; }, 3500); } catch(e) {} }
function showError(msg) { showMsg(msg, 'error'); }
function showWarning(msg) { showMsg(msg, 'warning'); }
function closeModal() { try { const m = document.getElementById('modal'); if (m) { m.classList.remove('show'); document.body.style.overflow = ''; } } catch(e) {} }
function openModal(content) { try { const modal = document.getElementById('modal'), mc = document.getElementById('modalContent'); if (!modal || !mc) return; mc.innerHTML = content; modal.classList.add('show'); document.body.style.overflow = 'hidden'; } catch(e) {} }
function applyTheme(theme) { appTheme = theme; document.body.className = ''; if (theme === 'dark') document.body.classList.add('dark'); }
function getTodayDateStr() { return new Date().toISOString().slice(0,10); }
function generateId(prefix='') { return prefix + Date.now().toString(36) + Math.random().toString(36).substr(2,6); }
function updateEmployeeOrders() { employees.forEach(e => { let c = 0; bookings.forEach(b => { if (b.status !== 'cancelled' && !b.deleted && (b.assignedEmployees||[]).includes(e.id) && attendanceRecords.some(a => a.empId === e.id && a.date === b.date && a.checkIn)) c++; }); e.totalOrders = c; }); }
function addActivity(action, details) { activityLog.unshift({ id: generateId('act_'), timestamp: new Date().toISOString(), user: currentUser?currentUser.name:'النظام', action, details }); if (activityLog.length > 500) activityLog.length = 500; saveAllData(); }
function isAdmin() { return currentUser && currentUser.role === 'admin'; }
function isManager() { return currentUser && currentUser.role === 'manager'; }
function isEmployee() { return currentUser && currentUser.role === 'employee'; }
function isAgent() { return currentUser && currentUser.role === 'agent'; }
function formatCurrency(amount) { return (amount||0).toLocaleString('ar-EG') + ' ج.م'; }
function getWeekDayArabic(dateStr) { const days = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت']; const d = new Date(dateStr); return days[d.getDay()]; }
function t(key) { const trans = { ar: { dashboard:"الرئيسية", bookings:"الحجوزات", employees:"الموظفين", halls:"القاعات", clients:"العملاء", equipment:"المعدات", attendance:"الحضور", payroll:"المرتبات", calendar:"التقويم", distribution:"التوزيع", reports:"التقارير", advancedReports:"تقارير متقدمة", notifications:"الإشعارات", users:"المستخدمين", trash:"سلة المحذوفات", activityLog:"سجل النشاطات", internet:"الإنترنت", settings:"الإعدادات", flash:"الفلاشات" }, en: { dashboard:"Dashboard", bookings:"Bookings", employees:"Employees", halls:"Halls", clients:"Clients", equipment:"Equipment", attendance:"Attendance", payroll:"Payroll", calendar:"Calendar", distribution:"Distribution", reports:"Reports", advancedReports:"Advanced Reports", notifications:"Notifications", users:"Users", trash:"Trash", activityLog:"Activity Log", internet:"Internet", settings:"Settings", flash:"Flash Drives" } }; return (trans[appLanguage] && trans[appLanguage][key]) || key; }

// ==================== STORAGE ====================
async function saveAllData() { const fd = { bookings, employees, halls, clients, equipmentInventory, attendanceRecords, employeeLoans, notifications, trashBin, activityLog, companyName, companyLogo: companyLogoBase64||companyLogo, USERS, rotationCounters, whatsappEnabled, whatsappBusinessNumber, whatsappMessageTemplate, appTheme, appLanguage, flashDrives, holidays, systemOfflineMode }; try { localStorage.setItem('drmedia_data', JSON.stringify(fd)); } catch(e) {} if (useFirebase && db && online && !systemOfflineMode) try { await db.ref('/').set(fd); lastSync = new Date(); } catch(e) { online = false; } applyTheme(appTheme); }
async function loadAllData() { let loaded = false; if (useFirebase && db && !systemOfflineMode) try { const s = await db.ref('/').get(); if (s.exists()) { loadDataObject(s.val()); online = true; lastSync = new Date(); loaded = true; } } catch(e) { online = false; } if (!loaded) { try { const raw = localStorage.getItem('drmedia_data'); if (raw) loadDataObject(JSON.parse(raw)); else initializeDefaultData(); } catch(e) { initializeDefaultData(); } } ensureMinimumData(); updateEmployeeOrders(); await saveAllData(); applyTheme(appTheme); }
function loadDataObject(d) { bookings = d.bookings || []; employees = d.employees || []; halls = d.halls || []; clients = d.clients || []; equipmentInventory = d.equipmentInventory || {}; attendanceRecords = d.attendanceRecords || []; employeeLoans = d.employeeLoans || {}; notifications = d.notifications || []; trashBin = d.trashBin || []; activityLog = d.activityLog || []; flashDrives = d.flashDrives || []; holidays = d.holidays || []; companyName = d.companyName || companyName; if (d.companyLogo && d.companyLogo.startsWith('data:image')) companyLogoBase64 = d.companyLogo; else companyLogo = d.companyLogo || companyLogo; USERS = d.USERS || USERS; rotationCounters = d.rotationCounters || { dir:0, ph:0, cr:0 }; whatsappEnabled = d.whatsappEnabled !== undefined ? d.whatsappEnabled : true; whatsappBusinessNumber = d.whatsappBusinessNumber || "201001234567"; whatsappMessageTemplate = d.whatsappMessageTemplate || "مرحباً {name}، تم توزيع أوردر {client} في {date} بقاعة {hall}"; appTheme = d.appTheme || "light"; appLanguage = d.appLanguage || "ar"; systemOfflineMode = d.systemOfflineMode || false; }
function initializeDefaultData() { bookings = []; employees = []; halls = []; clients = []; equipmentInventory = {}; attendanceRecords = []; employeeLoans = {}; notifications = []; trashBin = []; activityLog = []; flashDrives = []; holidays = []; }
function ensureMinimumData() { if (!halls.length) halls = [{ id:'h1', name:'القاعة الكبرى', type:'closed', basePrice:5000, active:true }, { id:'h2', name:'القاعة المفتوحة', type:'open', basePrice:4000, active:true }, { id:'h3', name:'الكافيه', type:'cafe', basePrice:2000, active:true }]; if (!employees.length) employees = [{ id:'emp1', name:'أحمد علي', role:'مخرج', phone:'01001234567', salaryPerOrder:300, active:true, totalOrders:0, userId:'emp1' }, { id:'emp2', name:'محمود حسن', role:'مصور', phone:'01002345678', salaryPerOrder:200, active:true, totalOrders:0, userId:null }, { id:'emp3', name:'سامر خالد', role:'كرين', phone:'01003456789', salaryPerOrder:250, active:true, totalOrders:0, userId:null }]; if (!clients.length) clients = [{ id:'c1', name:'محمد عبدالله', phone:'01012345678', email:'', address:'' }]; if (Object.keys(equipmentInventory).length === 0) equipmentInventory = { eq1: { name:'كاميرا Sony A7', quantity:3, minStock:1, category:'تصوير' } }; if (!bookings.length) bookings = [ { id:'b1', clientName:'محمد عبدالله', clientId:'c1', phone:'01012345678', hallId:'h1', hallName:'القاعة الكبرى', date:getTodayDateStr(), price:5000, status:'pending', paymentStatus:'pending', assignedEmployees:[], notes:'', packageType:'', totalPersons:0 }, { id:'b2', clientName:'أحمد محمود', clientId:null, phone:'01098765432', hallId:'h2', hallName:'القاعة المفتوحة', date:getTodayDateStr(), price:4000, status:'completed', paymentStatus:'paid', assignedEmployees:['emp2'], notes:'', packageType:'', totalPersons:0 } ]; if (!activityLog.length) addActivity('بدء التشغيل', 'تم تحميل البيانات الأولية'); }

// ==================== NOTIFICATIONS & WHATSAPP ====================
function sendWhatsApp(phone, msg) { if (!whatsappEnabled || !phone) return; let c = phone.replace(/[^0-9+]/g,''); if (c.startsWith('0')) c = '2' + c; if (!c.startsWith('+')) c = '+' + c; window.open(`https://wa.me/${c}?text=${encodeURIComponent(msg)}`, '_blank'); }
function notifyEmployee(emp, title, body, sendWA=true) { if (!emp || !emp.id) return; notifications.unshift({ id: generateId('notif_'), title, body, date: new Date().toLocaleString('ar-EG'), recipient: emp.id }); if (sendWA && emp.phone) sendWhatsApp(emp.phone, `${title}\n${body}`); saveAllData(); if (browserNotifications && 'Notification' in window && Notification.permission === 'granted') try { new Notification(title, { body }); } catch(e) {} }

// ==================== ATTENDANCE & QR ====================
async function checkIn(empId) { const today = getTodayDateStr(); const exist = attendanceRecords.find(a => a.empId === empId && a.date === today); if (exist && exist.checkIn) { showWarning('⚠️ تم التسجيل مسبقاً'); return; } const time = new Date().toLocaleTimeString('ar-EG'); if (exist) { exist.checkIn = time; exist.status = 'present'; } else attendanceRecords.push({ id: generateId('att_'), empId, date: today, checkIn: time, checkOut: null, status: 'present' }); addActivity('حضور', `الموظف ${empId} سجل حضور`); await saveAllData(); updateEmployeeOrders(); renderAttendance(); showMsg(`✅ حضور ${time}`); }
async function checkOut(empId) { const today = getTodayDateStr(); const rec = attendanceRecords.find(a => a.empId === empId && a.date === today); if (!rec || !rec.checkIn) { showWarning('⚠️ لم يسجل حضور'); return; } if (rec.checkOut) { showWarning('⚠️ تم الانصراف مسبقاً'); return; } rec.checkOut = new Date().toLocaleTimeString('ar-EG'); addActivity('انصراف', `الموظف ${empId} سجل انصراف`); await saveAllData(); renderAttendance(); showMsg(`✅ انصراف ${rec.checkOut}`); }
function generateAttendanceQR() { try { const qc = document.getElementById('attendanceQrContainer'); if (!qc) return; qc.innerHTML = ''; new QRCode(qc, { text: `DRMEDIA_ATT_${getTodayDateStr()}`, width: 200, height: 200 }); } catch(e) { qc.innerHTML = '<p class="text-red-500">تعذر إنشاء QR</p>'; } }
async function startQRScanner() { openModal(`<h3 class="text-xl font-bold mb-4">📷 مسح QR للحضور</h3><div id="qr-reader" style="width:100%;max-width:400px;margin:0 auto;min-height:300px;"></div><div class="flex gap-2 mt-4"><button onclick="stopScannerAndClose()" class="btn-danger w-full">إلغاء</button></div>`); setTimeout(() => { const el = document.getElementById('qr-reader'); if (!el) return; try { const scanner = new Html5Qrcode("qr-reader"); html5QrScanner = scanner; scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => { if (text && text.startsWith("DRMEDIA_ATT_") && text === `DRMEDIA_ATT_${getTodayDateStr()}`) { stopScannerAndClose(); openModal(`<h3 class="text-xl font-bold mb-4">تسجيل الحضور والانصراف</h3><select id="scanEmpSelect" class="w-full border-2 p-3 rounded-xl">${employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select><div class="flex gap-3 mt-3"><button onclick="checkInFromScan()" class="btn-primary flex-1">✅ حضور</button><button onclick="checkOutFromScan()" class="btn-secondary flex-1">🚪 انصراف</button><button onclick="closeModal()" class="btn-outline flex-1">إلغاء</button></div>`); } else showError("رمز QR غير صالح"); }, (err) => {}); } catch(e) { showError("تعذر بدء الكاميرا"); closeModal(); } }, 300); }
function checkInFromScan() { const empId = document.getElementById('scanEmpSelect')?.value; if (empId) checkIn(empId); closeModal(); }
function checkOutFromScan() { const empId = document.getElementById('scanEmpSelect')?.value; if (empId) checkOut(empId); closeModal(); }
function stopScannerAndClose() { if (html5QrScanner) { try { html5QrScanner.stop().then(() => { html5QrScanner = null; closeModal(); }).catch(() => { html5QrScanner = null; closeModal(); }); } catch(e) { html5QrScanner = null; closeModal(); } } else closeModal(); }

// ==================== SMART DISTRIBUTION ====================
async function smartDistribute() { const pending = bookings.filter(b => b.status === 'pending' && !b.deleted); if (!pending.length) { showWarning('لا توجد حجوزات معلقة'); return; } const dirs = employees.filter(e => e.role === 'مخرج' && e.active), phs = employees.filter(e => e.role === 'مصور' && e.active), crs = employees.filter(e => e.role === 'كرين' && e.active); const busy = {}; bookings.forEach(b => { if (!busy[b.date]) busy[b.date] = new Set(); (b.assignedEmployees||[]).forEach(id => busy[b.date].add(id)); }); let di = rotationCounters.dir||0, pi = rotationCounters.ph||0, ci = rotationCounters.cr||0; for (let b of pending) { const type = (halls.find(h=>h.id===b.hallId)||{}).type||'closed'; let assigned=[]; if (!busy[b.date]) busy[b.date]=new Set(); if (type==='cafe') { if (phs.length) { while(busy[b.date].has(phs[pi%phs.length].id)) pi++; assigned.push(phs[pi%phs.length].id); busy[b.date].add(phs[pi%phs.length].id); pi++; } } else { if (dirs.length) { while(busy[b.date].has(dirs[di%dirs.length].id)) di++; assigned.push(dirs[di%dirs.length].id); busy[b.date].add(dirs[di%dirs.length].id); di++; } if (phs.length) { let added=0; for(let i=0;i<phs.length*2&&added<2;i++){ while(busy[b.date].has(phs[pi%phs.length].id)) pi++; if(!busy[b.date].has(phs[pi%phs.length].id)){ assigned.push(phs[pi%phs.length].id); busy[b.date].add(phs[pi%phs.length].id); added++; } pi++; } } if (crs.length) { while(busy[b.date].has(crs[ci%crs.length].id)) ci++; assigned.push(crs[ci%crs.length].id); busy[b.date].add(crs[ci%crs.length].id); ci++; } } b.assignedEmployees = assigned; } rotationCounters={dir:di,ph:pi,cr:ci}; updateEmployeeOrders(); await saveAllData(); for(let b of pending) b.assignedEmployees.forEach(id=>{ const emp=employees.find(e=>e.id===id); if(emp) notifyEmployee(emp,'تم توزيع أوردر',whatsappMessageTemplate.replace('{name}',emp.name).replace('{client}',b.clientName).replace('{date}',b.date).replace('{hall}',b.hallName),true); }); addActivity('توزيع ذكي',`تم توزيع ${pending.length} حجز`); renderBookings(); renderDistribution(); showMsg(`✅ تم توزيع ${pending.length} حجز`); }
async function rotateDistribution() { const pending = bookings.filter(b => b.status === 'pending' && !b.deleted); if (!pending.length) { showWarning('لا حجوزات معلقة'); return; } const dirs = employees.filter(e => e.role === 'مخرج' && e.active), phs = employees.filter(e => e.role === 'مصور' && e.active), crs = employees.filter(e => e.role === 'كرين' && e.active); let di = rotationCounters.dir||0, pi = rotationCounters.ph||0, ci = rotationCounters.cr||0; for (let b of pending) { const type = (halls.find(h=>h.id===b.hallId)||{}).type||'closed'; let assigned=[]; if (type==='cafe') { if(phs.length){ assigned.push(phs[pi%phs.length].id); pi++; } } else { if(dirs.length){ assigned.push(dirs[di%dirs.length].id); di++; } if(phs.length){ assigned.push(phs[pi%phs.length].id); pi++; if(phs.length>1){ assigned.push(phs[pi%phs.length].id); pi++; } } if(crs.length){ assigned.push(crs[ci%crs.length].id); ci++; } } b.assignedEmployees = assigned; } rotationCounters={dir:di,ph:pi,cr:ci}; updateEmployeeOrders(); await saveAllData(); renderBookings(); renderDistribution(); showMsg('✅ تم التوزيع بالتدوير'); }

function renderEquipment() { const c = document.getElementById('content-area'); if (!c) return; document.getElementById('pageTitle').textContent = t('equipment'); let html = `<div class="bg-card"><h2 class="text-xl font-bold mb-3">📦 ${t('equipment')}</h2><div class="flex gap-2 mb-3"><button onclick="addEquipment()" class="btn-primary">+ معدة</button><button onclick="deleteSelectedEquipment()" class="btn-danger">🗑️ حذف المحدد</button></div><div class="overflow-x-auto"><table><thead><tr><th><input type="checkbox" onchange="document.querySelectorAll('.eq-check').forEach(cb=>cb.checked=this.checked)"></th><th>المعدة</th><th>الفئة</th><th>الكمية</th><th>الحد الأدنى</th><th>حالة المخزون</th><th>إجراءات</th></tr></thead><tbody>`; for (let id in equipmentInventory) { const eq = equipmentInventory[id]; html += `<tr><td><input type="checkbox" class="eq-check" value="${id}"></td><td>${eq.name}</td><td>${eq.category||'—'}</td><td>${eq.quantity}</td><td>${eq.minStock}</td><td>${eq.quantity <= eq.minStock ? '<span class="text-red-600 font-bold">⚠️ منخفض</span>' : '<span class="text-green-600">✅ جيد</span>'}</td><td class="flex gap-1"><button onclick="editEquipment('${id}')">✏️</button><button onclick="deleteEquipment('${id}')">🗑️</button></td></tr>`; } html += `</tbody></table></div><div class="footer-bar">${footerText}</div></div>`; c.innerHTML = html; }

async function saveNewEquipment() { const name = document.getElementById('newEqName')?.value.trim(); if (!name) { showError('الاسم مطلوب'); return; } equipmentInventory[generateId('eq_')] = { name, quantity: parseInt(document.getElementById('newEqQty')?.value)||1, minStock: parseInt(document.getElementById('newEqMin')?.value)||1, category: document.getElementById('newEqCat')?.value||'' }; addActivity('معدة جديدة', `تم إضافة ${name}`); await saveAllData(); renderEquipment(); closeModal(); showMsg('✅ تمت الإضافة'); }
function editEquipment(id) { const eq = equipmentInventory[id]; if (!eq) return; openModal(`<h3 class="text-xl font-bold mb-4">✏️ تعديل معدة</h3><input id="editEqName" value="${eq.name}" class="w-full border-2 p-2 my-2 rounded-xl"><input type="number" id="editEqQty" value="${eq.quantity}" class="w-full border-2 p-2 my-2 rounded-xl"><input type="number" id="editEqMin" value="${eq.minStock}" class="w-full border-2 p-2 my-2 rounded-xl"><input id="editEqCat" value="${eq.category||''}" class="w-full border-2 p-2 my-2 rounded-xl"><button onclick="saveEditEquipment('${id}')" class="btn-primary mt-2 w-full">💾 حفظ التعديل</button>`); }
async function saveEditEquipment(id) { const eq = equipmentInventory[id]; if (!eq) return; eq.name = document.getElementById('editEqName')?.value || eq.name; eq.quantity = parseInt(document.getElementById('editEqQty')?.value) || eq.quantity; eq.minStock = parseInt(document.getElementById('editEqMin')?.value) || eq.minStock; eq.category = document.getElementById('editEqCat')?.value || eq.category; addActivity('تعديل معدة', `تم تعديل ${eq.name}`); await saveAllData(); renderEquipment(); closeModal(); showMsg('✅ تم التعديل'); }

function deleteSelectedEquipment() { const ids = Array.from(document.querySelectorAll('.eq-check:checked')).map(cb=>cb.value); if (!ids.length) { showError('لم يتم تحديد معدات'); return; } ids.forEach(id => deleteEquipment(id)); renderEquipment(); showMsg(`🗑️ تم حذف ${ids.length} معدة`); }

function renderAttendance() { const c = document.getElementById('content-area'); if (!c) return; document.getElementById('pageTitle').textContent = t('attendance'); const today = getTodayDateStr(); const todayRecs = attendanceRecords.filter(a => a.date === today); let html = `<div class="bg-card"><h2 class="text-xl font-bold">📋 ${t('attendance')}</h2><div class="mb-4 p-4 border-2 border-emerald-200 rounded-2xl bg-emerald-50 dark:bg-emerald-900/20 text-center"><h3 class="font-semibold mb-2">📷 مسح QR للحضور والانصراف</h3><div id="attendanceQrContainer" class="flex justify-center my-3"></div><div class="flex gap-2 justify-center"><button onclick="generateAttendanceQR()" class="btn-primary text-sm">🔄 تحديث QR</button><button onclick="startQRScanner()" class="btn-secondary text-sm">📷 فتح الماسح</button></div><p class="text-xs text-gray-500 mt-2">امسح الكود أو استخدم الماسح لتسجيل الحضور والانصراف</p></div><h3 class="font-bold mb-2">📌 اليوم (${today})</h3><div class="flex gap-2 mb-2"><button onclick="markAllAttendance()" class="btn-primary text-sm">✅ تسجيل حضور الكل</button><button onclick="deleteSelectedAttendance()" class="btn-danger text-sm">🗑️ حذف المحدد</button></div><table><thead><tr><th><input type="checkbox" onchange="document.querySelectorAll('.att-check').forEach(cb=>cb.checked=this.checked)"></th><th>الموظف</th><th>الحضور</th><th>الانصراف</th><th>إجراءات</th></tr></thead><tbody>${employees.length ? employees.map(e => { const rec = todayRecs.find(r=>r.empId===e.id); return `<tr><td><input type="checkbox" class="att-check" value="${e.id}_${today}"></td><td>${e.name}</td><td>${rec?.checkIn||'—'}</td><td>${rec?.checkOut||'—'}</td><td class="flex gap-1">${!rec?.checkIn?`<button onclick="checkIn('${e.id}')" class="text-green-600">✅ حضور</button>`:''}${rec?.checkIn&&!rec?.checkOut?`<button onclick="checkOut('${e.id}')" class="text-blue-600">🚪 انصراف</button>`:''}</td></tr>`; }).join('') : '<tr><td colspan="5" class="text-center py-4">لا يوجد موظفين</td></tr>'}</tbody></table><h3 class="font-bold mt-4 mb-2">📋 آخر 20 تسجيل</h3><table><thead><tr><th>الموظف</th><th>التاريخ</th><th>الحضور</th><th>الانصراف</th></tr></thead><tbody>${attendanceRecords.slice(0,20).map(a => `<tr><td>${employees.find(e=>e.id===a.empId)?.name||a.empId}</td><td>${a.date}</td><td>${a.checkIn||'—'}</td><td>${a.checkOut||'—'}</td></tr>`).join('')}</tbody></table><div class="footer-bar">${footerText}</div></div>`; c.innerHTML = html; if (isAdmin()||isManager()) setTimeout(generateAttendanceQR, 200); }
function markAllAttendance() { const today = getTodayDateStr(); employees.forEach(e => { const exist = attendanceRecords.find(a => a.empId === e.id && a.date === today); if (!exist || !exist.checkIn) { const time = new Date().toLocaleTimeString('ar-EG'); if (exist) { exist.checkIn = time; exist.status = 'present'; } else attendanceRecords.push({ id: generateId('att_'), empId: e.id, date: today, checkIn: time, checkOut: null, status: 'present' }); } }); saveAllData(); renderAttendance(); showMsg('✅ تم تسجيل حضور الكل'); }
function deleteSelectedAttendance() { const vals = Array.from(document.querySelectorAll('.att-check:checked')).map(cb => cb.value); if (!vals.length) { showError('لم يتم تحديد'); return; } vals.forEach(val => { const [empId, date] = val.split('_'); attendanceRecords = attendanceRecords.filter(a => !(a.empId === empId && a.date === date)); }); saveAllData(); renderAttendance(); showMsg('🗑️ تم الحذف'); }

function renderPayroll() { updateEmployeeOrders(); const c = document.getElementById('content-area'); if (!c) return; document.getElementById('pageTitle').textContent = t('payroll'); let html = `<div class="bg-card"><h2 class="text-xl font-bold">💰 ${t('payroll')}</h2><div class="overflow-x-auto"><table><thead><tr><th>الموظف</th><th>الأوردرات</th><th>المستحق</th><th>السلف</th><th>الصافي</th></tr></thead><tbody>`; employees.forEach(e => { const sal = (e.totalOrders||0)*(e.salaryPerOrder||0); const loans = (employeeLoans[e.id]||[]).filter(l=>!l.settled).reduce((a,l)=>a+l.amount,0); html += `<tr><td>${e.name}</td><td>${e.totalOrders||0}</td><td>${formatCurrency(sal)}</td><td class="text-red-600">${formatCurrency(loans)}</td><td><strong>${formatCurrency(Math.max(0,sal-loans))}</strong></td></tr>`; }); html += `</tbody></table></div><div class="footer-bar">${footerText}</div></div>`; c.innerHTML = html; }

function renderCalendar() { const c = document.getElementById('content-area'); if (!c) return; document.getElementById('pageTitle').textContent = t('calendar'); const monthNames = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر']; const firstDay = new Date(calendarYear, calendarMonth, 1).getDay(), days = new Date(calendarYear, calendarMonth+1, 0).getDate(); let html = `<div class="bg-card"><h2 class="text-xl font-bold">📆 ${t('calendar')} - ${monthNames[calendarMonth]} ${calendarYear}</h2><div class="flex gap-2 mb-3 flex-wrap"><button onclick="changeCalendarMonth(-1)" class="btn-secondary">◀</button><select onchange="changeCalendarYear(this.value)">${Array.from({length:5},(_,i)=>{const y=new Date().getFullYear()-2+i;return`<option value="${y}" ${y===calendarYear?'selected':''}>${y}</option>`}).join('')}</select><button onclick="changeCalendarMonth(1)" class="btn-secondary">▶</button><button onclick="calendarMonth=${new Date().getMonth()};calendarYear=${new Date().getFullYear()};renderCalendar();" class="btn-outline text-sm">📍 اليوم</button></div><div class="calendar-grid">${['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'].map(d=>`<div class="font-bold text-center text-sm py-1">${d}</div>`).join('')}`; for (let i=0;i<firstDay;i++) html += `<div class="calendar-day other-month"></div>`; for (let d=1;d<=days;d++) { const dateStr = `${calendarYear}-${String(calendarMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const dayBookings = bookings.filter(b=>b.date===dateStr&&!b.deleted&&b.status!=='cancelled'); const isToday = dateStr === getTodayDateStr(); html += `<div class="calendar-day ${dayBookings.length?'booked':''} ${isToday?'today':''}" onclick="showDayBookings('${dateStr}')" title="${dayBookings.length} حجوزات">${d}${dayBookings.length?`<br><small class="text-xs">${dayBookings.length} حجز</small>`:''}</div>`; } html += `</div><div class="footer-bar">${footerText}</div></div>`; c.innerHTML = html; }
function changeCalendarMonth(delta) { calendarMonth += delta; if (calendarMonth<0) { calendarMonth=11; calendarYear--; } else if (calendarMonth>11) { calendarMonth=0; calendarYear++; } renderCalendar(); }
function changeCalendarYear(year) { calendarYear = parseInt(year); renderCalendar(); }
function showDayBookings(dateStr) { const dayB = bookings.filter(b=>b.date===dateStr&&!b.deleted&&b.status!=='cancelled'); if (dayB.length) openModal(`<h3 class="text-xl font-bold mb-3">📅 ${dateStr} (${getWeekDayArabic(dateStr)})</h3>${dayB.map(b=>`<div class="border-b py-2 flex justify-between"><span>${b.clientName} - ${b.hallName}</span><span class="${b.status==='pending'?'text-yellow-600':'text-green-600'}">${b.status==='pending'?'معلق':'مكتمل'}</span></div>`).join('')}<button onclick="closeModal()" class="btn-primary mt-3 w-full">إغلاق</button>`); else showWarning('لا توجد حجوزات في هذا اليوم'); }

function renderDistribution() { const c = document.getElementById('content-area'); if (!c) return; document.getElementById('pageTitle').textContent = t('distribution'); const pending = bookings.filter(b=>b.status==='pending'&&!b.deleted); c.innerHTML = `<div class="bg-card"><h2 class="text-xl font-bold">⚙️ ${t('distribution')}</h2><div class="flex gap-2 mb-4 flex-wrap"><button onclick="smartDistribute()" class="btn-primary">🧠 توزيع ذكي</button><button onclick="rotateDistribution()" class="btn-secondary">🔄 تدوير</button></div><div class="overflow-x-auto"><table><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>الموظفون</th><th>تعيين</th></tr></thead><tbody>${pending.map(b=>`<tr><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${(b.assignedEmployees||[]).map(id=>employees.find(e=>e.id===id)?.name).join('، ')||'<span class="text-red-500">غير معين</span>'}</td><td><button onclick="manualAssign('${b.id}')" class="text-blue-600 font-bold">✋ تعيين</button></td></tr>`).join('')}</tbody></table></div><div class="footer-bar">${footerText}</div></div>`; }
function manualAssign(bookingId) { const b = bookings.find(b => b.id === bookingId); if (!b) return; const opts = employees.filter(e => e.active).map(e => `<option value="${e.id}" ${(b.assignedEmployees||[]).includes(e.id)?'selected':''}>${e.name} (${e.role})</option>`).join(''); openModal(`<h3>تعيين يدوي</h3><select id="manualSelect" multiple class="w-full border-2 p-3 rounded-xl h-48">${opts}</select><button onclick="saveManualAssign('${bookingId}')" class="btn-primary mt-2 w-full">حفظ</button>`); }
async function saveManualAssign(bookingId) { const sel = document.getElementById('manualSelect'); if (!sel) return; const selected = Array.from(sel.selectedOptions).map(o => o.value); const b = bookings.find(b => b.id === bookingId); if (!b) return; b.assignedEmployees = selected; updateEmployeeOrders(); await saveAllData(); renderBookings(); renderDistribution(); closeModal(); showMsg('✅ تم التعيين'); }

function exportBackup() { const d = JSON.stringify({bookings,employees,halls,clients,equipmentInventory},null,2); const b = new Blob([d],{type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `backup_${getTodayDateStr()}.json`; a.click(); showMsg('✅ تم التصدير'); }
function exportToExcel() { const ws = XLSX.utils.json_to_sheet(bookings.filter(b=>!b.deleted).map(b=>({العميل:b.clientName,التاريخ:b.date,القاعة:b.hallName,السعر:b.price,الحالة:b.status==='pending'?'معلق':'مكتمل'}))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'حجوزات'); XLSX.writeFile(wb,'bookings.xlsx'); showMsg('✅ تم التصدير'); }

function renderAdvancedReports() { document.getElementById('content-area').innerHTML = `<div class="bg-card"><h2 class="text-xl font-bold">📈 ${t('advancedReports')}</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><h3 class="font-semibold mb-2">الإيرادات الشهرية</h3><canvas id="advChart1"></canvas></div><div><h3 class="font-semibold mb-2">توزيع الحجوزات حسب القاعة</h3><canvas id="advChart2"></canvas></div></div><div class="footer-bar">${footerText}</div></div>`; setTimeout(()=>{ try { const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر']; const cy=new Date().getFullYear(); const mData=months.map((_,i)=>bookings.filter(b=>{const d=new Date(b.date);return d.getMonth()===i&&d.getFullYear()===cy&&!b.deleted;}).reduce((s,b)=>s+(b.price||0),0)); const ctx1=document.getElementById('advChart1'); if(ctx1) new Chart(ctx1,{type:'bar',data:{labels:months,datasets:[{label:'الإيرادات',data:mData,backgroundColor:'#16a34a'}]}}); const hallData={}; halls.forEach(h=>{hallData[h.name]=bookings.filter(b=>b.hallId===h.id&&!b.deleted).length;}); const ctx2=document.getElementById('advChart2'); if(ctx2) new Chart(ctx2,{type:'doughnut',data:{labels:Object.keys(hallData),datasets:[{data:Object.values(hallData),backgroundColor:['#16a34a','#2563eb','#d97706','#dc2626']}]}}); } catch(e){} },400); }

function renderNotificationsTab() { const c = document.getElementById('content-area'); if (!c) return; document.getElementById('pageTitle').textContent = t('notifications'); c.innerHTML = `<div class="bg-card"><h2 class="text-xl font-bold">🔔 ${t('notifications')} (${notifications.length})</h2><div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-xl mb-4"><h3 class="font-semibold mb-2">📤 إرسال إشعار</h3><textarea id="notifyMsg" class="w-full border-2 p-3 rounded-xl mb-2" placeholder="نص الإشعار..." rows="3"></textarea><div class="flex gap-2"><select id="notifyEmpSelect" class="border-2 p-2 rounded-xl flex-1"><option value="all">📢 جميع الموظفين</option>${employees.map(e => `<option value="${e.id}">${e.name} (${e.role})</option>`).join('')}</select><button onclick="sendCustomNotification()" class="btn-primary">📤 إرسال</button></div></div><div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-xl mb-4"><h3 class="font-semibold mb-2">⚙️ إعدادات الإشعارات</h3><div class="flex items-center gap-2 mb-2"><input type="checkbox" id="notifBrowser" ${browserNotifications?'checked':''} onchange="browserNotifications=this.checked;saveAllData()"><label>تفعيل إشعارات المتصفح</label></div><div class="flex items-center gap-2 mb-2"><input type="checkbox" id="notifWhatsApp" ${whatsappEnabled?'checked':''} onchange="whatsappEnabled=this.checked;saveAllData()"><label>تفعيل إشعارات واتساب</label></div><div><label class="text-sm">رقم واتساب</label><input id="waNumberSetting" value="${whatsappBusinessNumber}" class="w-full border-2 p-2 rounded-xl" onchange="whatsappBusinessNumber=this.value;saveAllData()"></div><div class="mt-2"><label class="text-sm">قالب رسالة واتساب</label><input id="waMsgTemplateSetting" value="${whatsappMessageTemplate}" class="w-full border-2 p-2 rounded-xl" onchange="whatsappMessageTemplate=this.value;saveAllData()"></div></div><h3 class="font-semibold mb-2">📋 سجل الإشعارات</h3><div class="max-h-64 overflow-y-auto">${notifications.length ? notifications.map(n => `<div class="border-b p-2"><strong>${n.title}</strong><br>${n.body}<br><small class="text-gray-400">${n.date} | ${employees.find(e=>e.id===n.recipient)?.name||n.recipient}</small></div>`).join('') : '<p class="text-gray-400 text-center py-4">لا توجد إشعارات</p>'}</div><div class="footer-bar">${footerText}</div></div>`; }
function sendCustomNotification() { const msg = document.getElementById('notifyMsg')?.value.trim(); if (!msg) return; const target = document.getElementById('notifyEmpSelect')?.value; if (target === 'all') { employees.filter(e=>e.active).forEach(e=>notifyEmployee(e,'📢 إشعار',msg,true)); showMsg('✅ تم إرسال الإشعار للجميع'); } else { const emp = employees.find(e=>e.id===target); if (emp) { notifyEmployee(emp,'📢 إشعار',msg,true); showMsg(`✅ تم إرسال الإشعار إلى ${emp.name}`); } } saveAllData(); renderNotificationsTab(); }

function renderUsers() { const c = document.getElementById('content-area'); if (!c) return; document.getElementById('pageTitle').textContent = t('users'); c.innerHTML = `<div class="bg-card"><h2 class="text-xl font-bold">👥 ${t('users')} (${USERS.length})</h2><div class="flex gap-2 mb-3"><button onclick="addUser()" class="btn-primary">+ مستخدم</button><button onclick="deleteSelectedUsers()" class="btn-danger">🗑️ حذف المحدد</button></div><div class="overflow-x-auto"><table><thead><tr><th><input type="checkbox" onchange="document.querySelectorAll('.user-check').forEach(cb=>cb.checked=this.checked)"></th><th>المستخدم</th><th>الصلاحية</th><th>الاسم</th><th>إجراءات</th></tr></thead><tbody>${USERS.map(u => `<tr><td><input type="checkbox" class="user-check" value="${u.id}" ${u.id==='admin1'?'disabled':''}></td><td>${u.username}</td><td><span class="badge-active">${u.role}</span></td><td>${u.name}</td><td class="flex gap-1"><button onclick="editUser('${u.id}')">✏️</button>${u.id!=='admin1'?`<button onclick="deleteUser('${u.id}')">🗑️</button>`:''}</td></tr>`).join('')}</tbody></table></div><div class="footer-bar">${footerText}</div></div>`; }
function addUser() {
  openModal(`<h3 class="text-xl font-bold mb-4">👤 إضافة مستخدم</h3>
    <input id="newUserUsername" placeholder="اسم المستخدم" class="w-full border-2 p-2 my-2 rounded-xl">

    <select id="newUserRole" class="w-full border-2 p-2 my-2 rounded-xl"><option value="admin">مدير</option><option value="manager">مدير تنفيذي</option><option value="employee">موظف</option><option value="agent">وكيل</option></select>

}
async function saveNewUser() { const username = document.getElementById('newUserUsername')?.value.trim(); const password = document.getElementById('newUserPass')?.value; if (!username||!password) { showError('جميع الحقول مطلوبة'); return; } if (USERS.find(u=>u.username===username)) { showError('اسم المستخدم موجود'); return; } USERS.push({ id: generateId('user_'), username, password, name: document.getElementById('newUserName')?.value||username, role: document.getElementById('newUserRole')?.value||'employee', employeeId:null }); addActivity('مستخدم جديد', `تم إضافة ${username}`); await saveAllData(); renderUsers(); closeModal(); showMsg('✅ تمت الإضافة'); }
function editUser(id) { const u = USERS.find(u=>u.id===id); if (!u) return; openModal(`<h3 class="text-xl font-bold mb-4">✏️ تعديل مستخدم</h3><input id="editUserUsername" value="${u.username}" readonly class="w-full border-2 p-2 my-2 rounded-xl bg-gray-100"><input type="password" id="editUserPass" placeholder="كلمة مرور جديدة" class="w-full border-2 p-2 my-2 rounded-xl"><input id="editUserName" value="${u.name}" class="w-full border-2 p-2 my-2 rounded-xl"><select id="editUserRole" class="w-full border-2 p-2 my-2 rounded-xl"><option value="admin" ${u.role==='admin'?'selected':''}>مدير</option><option value="manager" ${u.role==='manager'?'selected':''}>مدير تنفيذي</option><option value="employee" ${u.role==='employee'?'selected':''}>موظف</option><option value="agent" ${u.role==='agent'?'selected':''}>وكيل</option></select><button onclick="saveEditUser('${id}')" class="btn-primary mt-2 w-full">💾 حفظ التعديل</button>`); }
async function saveEditUser(id) { const u = USERS.find(u=>u.id===id); if (!u) return; const pass = document.getElementById('editUserPass')?.value; if (pass) u.password = pass; u.name = document.getElementById('editUserName')?.value || u.name; u.role = document.getElementById('editUserRole')?.value || u.role; addActivity('تعديل مستخدم', `تم تعديل ${u.username}`); await saveAllData(); renderUsers(); closeModal(); showMsg('✅ تم التعديل'); }
function deleteUser(id) { if (id === 'admin1') { showError('لا يمكن حذف المدير الأساسي'); return; } const idx = USERS.findIndex(u=>u.id===id); if (idx!==-1) { USERS.splice(idx,1); saveAllData(); renderUsers(); showMsg('🗑️ تم الحذف'); } }
function deleteSelectedUsers() { const ids = Array.from(document.querySelectorAll('.user-check:checked')).map(cb=>cb.value); if (!ids.length) { showError('لم يتم تحديد مستخدمين'); return; } if (ids.includes('admin1')) { showError('لا يمكن حذف المدير الأساسي'); return; } ids.forEach(id => deleteUser(id)); renderUsers(); showMsg(`🗑️ تم حذف ${ids.length} مستخدم`); }

function renderTrash() { 
  const c = document.getElementById('content-area'); 
  if (!c) return; 
  document.getElementById('pageTitle').textContent = t('trash'); 
  let html = `<div class="bg-card"><h2 class="text-xl font-bold">🗑️ ${t('trash')} (${trashBin.length})</h2>`;
  
  if (trashBin.length > 0) {
    html += `
      <div class="flex gap-2 mb-3">
        <button onclick="restoreSelectedTrash()" class="btn-primary text-sm">🔄 استعادة المحدد</button>
        <button onclick="deleteSelectedTrash()" class="btn-danger text-sm">❌ حذف المحدد نهائياً</button>
      </div>
      <div class="overflow-x-auto">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" onchange="document.querySelectorAll('.trash-check').forEach(cb=>cb.checked=this.checked)"></th>
              <th>النوع</th>
              <th>البيانات</th>
              <th>تاريخ الحذف</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody>`;
    
    trashBin.forEach(t => {
      html += `
        <tr>
          <td><input type="checkbox" class="trash-check" value="${t.id}"></td>
          <td><span class="badge-inactive">${t.type}</span></td>
          <td>${t.data?.clientName || t.data?.name || 'عنصر'}</td>
          <td><small class="text-gray-400">${new Date(t.deletedAt).toLocaleString('ar-EG')}</small></td>
          <td class="flex gap-1">
            <button onclick="restoreItem('${t.id}')" class="text-green-600">🔄</button>
            <button onclick="deletePermanently('${t.id}')" class="text-red-600">❌</button>
          </td>
        </tr>`;
    });
    
    html += `</tbody></table></div>`;
  } else {
    html += `<p class="text-gray-400 text-center py-8">السلة فارغة</p>`;
  }
  
  html += `<div class="footer-bar">${footerText}</div></div>`;
  c.innerHTML = html;
}
async function restoreItem(trashId) { const idx = trashBin.findIndex(t => t.id == trashId); if (idx !== -1) { const item = trashBin[idx]; if (item.type === 'booking') bookings.push(item.data); else if (item.type === 'employee') employees.push(item.data); else if (item.type === 'client') clients.push(item.data); else if (item.type === 'hall') halls.push(item.data); trashBin.splice(idx, 1); addActivity('استعادة', `تم استعادة عنصر من سلة المحذوفات`); await saveAllData(); renderTrash(); showMsg('🔄 تمت الاستعادة'); } }
async function deletePermanently(trashId) { const idx = trashBin.findIndex(t => t.id == trashId); if (idx !== -1) { trashBin.splice(idx, 1); await saveAllData(); renderTrash(); showMsg('🗑️ تم الحذف نهائياً'); } }

function renderActivityLogTab() { const c = document.getElementById('content-area'); if (!c) return; document.getElementById('pageTitle').textContent = t('activityLog'); c.innerHTML = `<div class="bg-card"><h2 class="text-xl font-bold">📜 ${t('activityLog')} (${activityLog.length})</h2><div class="flex gap-2 mb-3"><button onclick="clearActivityLog()" class="btn-danger text-sm">🗑️ مسح السجل</button><button onclick="exportActivityLog()" class="btn-secondary text-sm">📥 تصدير</button></div><div class="max-h-80 overflow-y-auto">${activityLog.length ? activityLog.map(a => `<div class="border-b p-2"><strong>${a.user}</strong> - ${a.action}: ${a.details} <small class="text-gray-400">${new Date(a.timestamp).toLocaleString('ar-EG')}</small></div>`).join('') : '<p class="text-gray-400 text-center py-4">لا توجد نشاطات</p>'}</div><div class="footer-bar">${footerText}</div></div>`; }

function exportActivityLog() { const text = activityLog.map(a => `${new Date(a.timestamp).toLocaleString('ar-EG')} - ${a.user}: ${a.action} - ${a.details}`).join('\n'); const blob = new Blob([text], { type: 'text/plain' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'activity_log.txt'; a.click(); }

function renderFlash() { const c = document.getElementById('content-area'); if (!c) return; document.getElementById('pageTitle').textContent = t('flash'); c.innerHTML = `<div class="bg-card"><h2 class="text-xl font-bold">💾 ${t('flash')} (${flashDrives.length})</h2><button onclick="addFlash()" class="btn-primary mb-3">+ فلاشة</button><table><thead><tr><th><input type="checkbox" onchange="document.querySelectorAll('.flash-check').forEach(cb=>cb.checked=this.checked)"></th><th>العميل</th><th>التاريخ</th><th>الحالة</th><th>الموقع الحالي</th><th>إجراءات</th></tr></thead><tbody>${flashDrives.map(f=>{const b=bookings.find(b=>b.id===f.bookingId);return`<tr><td><input type="checkbox" class="flash-check" value="${f.id}"></td><td>${b?b.clientName:f.clientName}</td><td>${f.date}</td><td>${f.status}</td><td>${f.currentHolder}</td><td class="flex gap-1"><button onclick="moveFlash('${f.id}')">➡️</button><button onclick="deleteFlash('${f.id}')">🗑️</button></td></tr>`}).join('')}</tbody></table><div class="footer-bar">${footerText}</div></div>`; }
function addFlash() { const bookingOpts=bookings.filter(b=>!b.deleted).map(b=>`<option value="${b.id}">${b.clientName} - ${b.date}</option>`).join(''); openModal(`<h3 class="text-xl font-bold mb-4">💾 إضافة فلاشة</h3><select id="flashBooking" class="w-full border-2 p-2 my-2 rounded-xl"><option value="">اختر الحجز</option>${bookingOpts}</select><input type="date" id="flashDate" class="w-full border-2 p-2 my-2 rounded-xl" value="${getTodayDateStr()}"><button onclick="saveFlash()" class="btn-primary mt-2 w-full">💾 حفظ</button>`); }
function saveFlash() { const bookingId=document.getElementById('flashBooking')?.value; const b=bookings.find(b=>b.id===bookingId); if(!b){showError('اختر حجزاً');return;} flashDrives.push({id:generateId('fl_'),bookingId:b.id,clientName:b.clientName,date:document.getElementById('flashDate')?.value||getTodayDateStr(),status:'تم الاستلام من الحسابات',currentHolder:'المونتير'}); saveAllData(); renderFlash(); closeModal(); showMsg('✅ تمت الإضافة'); }
function moveFlash(id) { const f=flashDrives.find(f=>f.id===id); if(!f)return; const holders=['المونتير','المصور','المبيعات','العريس']; const idx=holders.indexOf(f.currentHolder); if(idx<holders.length-1){f.currentHolder=holders[idx+1];f.status='تم التسليم لـ '+f.currentHolder;saveAllData();renderFlash();showMsg('✅ تم النقل');}else showWarning('وصل للعريس');}
function deleteFlash(id) { flashDrives=flashDrives.filter(f=>f.id!==id);saveAllData();renderFlash();showMsg('🗑️ تم الحذف');}

function handlePartialFileUpload() {
  const file = document.getElementById('partialFileInput')?.files[0];
  if (!file) return;

  reader.onload = function(e) {
    document.getElementById('partialCodeInput').value = e.target.result;

// تطبيق التحديث الجزئي
function applyPartialUpdate() {
  const code = document.getElementById('partialCodeInput')?.value.trim();
  if (!code) {
    showError('يرجى إدخال كود التحديث');
    return;
  }

  try {
    if (code.startsWith('<script') || code.startsWith('<html') || code.includes('<div')) {
      const div = document.createElement('div');
      div.innerHTML = code;
      document.body.appendChild(div);
      const scripts = div.querySelectorAll('script');
      scripts.forEach(script => {
        const newScript = document.createElement('script');
        newScript.textContent = script.textContent;
        document.body.appendChild(newScript);
      });
      showMsg('✅ تم حقن HTML/Scripts بنجاح');
    } else {
      eval(code);
      showMsg('✅ تم تنفيذ الكود بنجاح');
    }
    
    // ⬇️ أضف هذا السطر هنا
    localStorage.setItem('drmedia_patch', code);
    
  } catch (e) {
    showError('خطأ في الكود: ' + e.message);
  }
}

async function importBookingsFromFile() { openModal(`<h3 class="text-xl font-bold mb-3">📂 استيراد حجوزات (Excel/PDF)</h3><input type="file" id="importFileInput" accept=".xlsx,.xls,.pdf,.csv" class="w-full border-2 border-dashed p-4 rounded-xl mb-3"><div id="importPreview" class="my-2 text-sm"></div><button onclick="processImportFile()" class="btn-primary w-full">📥 استيراد</button>`); document.getElementById('importFileInput').addEventListener('change', async function(e) { const file = e.target.files[0]; if (!file) return; const ext = file.name.split('.').pop().toLowerCase(); let rows = []; try { if (ext==='xlsx'||ext==='xls') { const data = await file.arrayBuffer(); const wb = XLSX.read(data); rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]); } else if (ext==='csv') { const text = await file.text(); const lines = text.split('\n'); const headers = lines[0].split(',').map(h => h.trim().replace(/["']/g,'')); rows = lines.slice(1).filter(l => l.trim()).map(line => { const vals = line.split(',').map(v => v.trim().replace(/["']/g,'')); let obj = {}; headers.forEach((h,i) => obj[h] = vals[i] || ''); return obj; }); } else if (ext==='pdf') { const arrayBuffer = await file.arrayBuffer(); const pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise; let fullText = ''; for (let i=1;i<=pdf.numPages;i++){ const page = await pdf.getPage(i); const textContent = await page.getTextContent(); fullText += textContent.items.map(item => item.str).join(' ')+'\n'; } rows = parsePDFText(fullText); } rows = rows.filter(row => Object.values(row).some(v => v && String(v).trim())); window._importedRows = rows; document.getElementById('importPreview').innerHTML = rows.length ? `<p class="text-green-600">✅ ${rows.length} صف صالح</p>` : `<p class="text-red-500">لا بيانات</p>`; } catch(err) { showError('خطأ في الملف'); } }); }
function parsePDFText(text) { const rows = []; const lines = text.split(/\r?\n/); lines.forEach(line => { if (/\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(line)) { const parts = line.split(/\s{2,}|\t/); if (parts.length>=4) rows.push({'اسم العميل':parts[3],'التاريخ':parts[2],'القاعة':parts[1]}); } }); return rows; }
window.processImportFile = async function() {
  var rows = window._importedRows || [];
  if (!rows.length) { showError('لا بيانات'); return; }
  
  var selectedHallType = document.getElementById('importHallTypeSelect')?.value || '';

window.parseDateString = function(str) {
  if (!str && str !== 0) return getTodayDateStr();
  // إذا كان رقماً (serial number)
  if (typeof str === 'number' || (typeof str === 'string' && /^\d+$/.test(str.trim()))) {
    var num = parseInt(str);
    // إذا كان رقمًا منطقيًا لـ Excel (بين 1000 و 100000 تقريبًا)
    if (num > 1000 && num < 100000) {
      // تحويل serial number إلى تاريخ (Excel: 1900-01-01 = 1)
      var date = new Date((num - 25569) * 86400 * 1000);
      if (!isNaN(date.getTime())) {
        return date.toISOString().slice(0, 10);
      }
    }
  }
  
  str = String(str).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  
  var m = str.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  
  m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  
  m = str.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  
  var d = new Date(str);
  if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
  
  return getTodayDateStr();
};

function requestNotificationPermission() { if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission().then(p => { browserNotifications = p === 'granted'; }); else if ('Notification' in window && Notification.permission === 'granted') browserNotifications = true; }
async function initApp() {
  try { firebase.initializeApp(firebaseConfig); db = firebase.database(); useFirebase = true; online = true; } catch(e) { useFirebase = false; online = false; }
  await loadAllData(); applyTheme(appTheme);
  const saved = sessionStorage.getItem('drmedia_user');
  if (saved && saved !== 'undefined') {
    try {
      currentUser = JSON.parse(saved);
      const valid = USERS.find(u => u.id === currentUser.id);
      if (!valid) { sessionStorage.removeItem('drmedia_user'); currentUser = null; renderLogin(); return; }
      currentUser = valid;
      if (isAdmin()||isManager()) renderAdminDashboard();
      else if (isEmployee()) renderEmpDash();
      else renderAgentDash();
      requestNotificationPermission();
    } catch(e) { sessionStorage.removeItem('drmedia_user'); renderLogin(); }
  } else renderLogin();

  // ✅ الصحيح: وضع التصحيح هنا داخل initApp
  const patch = localStorage.getItem('drmedia_patch');
  if (patch) {
    try { eval(patch); } catch(e) { console.log('خطأ في تنفيذ التصحيح المخزن:', e); }
  }
}
