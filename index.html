    function suggestPrice(hallId, date, guestCount=0) {
      const hall = halls.find(h => h.id === hallId); if(!hall) return 2500;
      let price = hall.type==='closed'?5000:hall.type==='open'?3500:2000;
      const dayOfWeek = new Date(date).getDay(); if([5,6].includes(dayOfWeek)) price *= 1.25;
      const month = new Date(date).getMonth(); if([11,0,1].includes(month)) price *= 1.15;
      if(guestCount > 200) price *= 1.1; else if(guestCount > 100) price *= 1.05;
      return Math.round(price / 100) * 100;
    }

    function autoDistribute() {
      const active = bookings.filter(b => b.status === 'pending'); active.forEach(b => b.assignedEmployees = []);
      const sorted = [...active].sort((a,b) => new Date(a.date) - new Date(b.date));
      const dirs = employees.filter(e => e.role === 'مخرج' && e.active), phs = employees.filter(e => e.role === 'مصور' && e.active), crs = employees.filter(e => e.role === 'كرين' && e.active);
      function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
      let dPtr = 0, pPtr = 0, cPtr = 0; const grouped = {}; sorted.forEach(b => { if (!grouped[b.date]) grouped[b.date] = []; grouped[b.date].push(b); });
      for (let date in grouped) { const dayB = grouped[date]; const busy = new Set();
        for (let b of dayB) { const h = halls.find(x => x.id === b.hallId); const type = h ? h.type : 'closed'; const assigned = [];
          if (type === 'cafe') { if (phs.length) for (let i = 0; i < phs.length; i++) { const ph = phs[(pPtr + i) % phs.length]; if (!busy.has(ph.id)) { assigned.push(ph.id); busy.add(ph.id); pPtr = (pPtr + i + 1) % phs.length; break; } } }
          else {
            if (dirs.length) for (let i = 0; i < dirs.length; i++) { const d = dirs[(dPtr + i) % dirs.length]; if (!busy.has(d.id)) { assigned.push(d.id); busy.add(d.id); dPtr = (dPtr + i + 1) % dirs.length; break; } }
            let addedPh = 0; if (phs.length) for (let i = 0; i < phs.length * 2 && addedPh < 2; i++) { const ph = phs[(pPtr + i) % phs.length]; if (!busy.has(ph.id)) { assigned.push(ph.id); busy.add(ph.id); addedPh++; } } pPtr = (pPtr + addedPh) % phs.length;
            if (crs.length) for (let i = 0; i < crs.length; i++) { const cr = crs[(cPtr + i) % crs.length]; if (!busy.has(cr.id)) { assigned.push(cr.id); busy.add(cr.id); cPtr = (cPtr + i + 1) % crs.length; break; } }
          }
          b.assignedEmployees = assigned;
        }
      }
      updateEmployeeOrders(); saveAllData(); showMsg('✅ تم التوزيع الذكي مع تدوير عشوائي');
    }

    function bulkDeleteBookings() { if (!selectedBookings.size) return showMsg("⚠️ لم تختر أي حجز"); if (confirm(`حذف ${selectedBookings.size} حجز؟`)) { bookings = bookings.filter(b => !selectedBookings.has(b.id)); selectedBookings.clear(); saveAllData(); updateEmployeeOrders(); renderBookingsContent(); showMsg("🗑️ تم الحذف"); } }

    function showAddBookingModal() { const suggestedPrice = suggestPrice(halls[0]?.id, new Date().toISOString().slice(0,10)); openModal(`<h3 class="text-xl font-bold mb-4">➕ حجز جديد</h3><input id="clientName" placeholder="اسم العميل *"><input id="clientPhone" placeholder="رقم واتساب العميل (مثال: 201000000000)" dir="ltr"><select id="hallId" onchange="updateSuggestedPrice()">${halls.map(h => `<option value="${h.id}">${h.name}</option>`).join('')}</select><input id="date" type="date" onchange="updateSuggestedPrice()"><div class="flex items-center gap-2 mb-2"><input id="guestCount" type="number" placeholder="عدد الضيوف" class="flex-1" onchange="updateSuggestedPrice()"><button type="button" onclick="applySuggestedPrice()" class="bg-blue-100 text-blue-700 px-3 py-2 rounded-lg text-sm hover:bg-blue-200 transition">💡 اقتراح سعر</button></div><input id="price" type="number" placeholder="السعر" value="${suggestedPrice}"><div class="text-xs text-gray-500 mb-3">💡 السعر المقترح يعتمد على: نوع القاعة، اليوم، الموسم، والبيانات السابقة</div><label class="flex items-center gap-2 mb-3"><input type="checkbox" id="sendWhatsApp" checked><span class="text-sm">إرسال تأكيد واتساب تلقائي للعميل بعد الحفظ</span></label><button onclick="saveNewBooking()" class="btn-primary w-full py-3">💾 حفظ وإرسال التأكيد</button>`); }
    function updateSuggestedPrice() { const hallId = document.getElementById('hallId')?.value; const date = document.getElementById('date')?.value; const guests = parseInt(document.getElementById('guestCount')?.value) || 0; if(hallId && date) { const suggested = suggestPrice(hallId, date, guests); document.getElementById('price').value = suggested; showMsg(`💡 السعر المقترح: ${suggested.toLocaleString()} ج.م`, 'warning'); } }
    function applySuggestedPrice() { updateSuggestedPrice(); }
    function saveNewBooking() { const hall = halls.find(h => h.id === document.getElementById('hallId').value); const sendWA = document.getElementById('sendWhatsApp')?.checked; const newBooking = { id: Date.now().toString(), clientName: document.getElementById('clientName').value || 'عميل جديد', phone: document.getElementById('clientPhone')?.value || '', hallId: document.getElementById('hallId').value, hallName: hall?.name || 'قاعة', date: document.getElementById('date').value, price: parseInt(document.getElementById('price').value) || 2500, deposit: 0, notes: '', assignedEmployees: [], status: 'pending', paymentStatus: 'pending' }; bookings.push(newBooking); saveAllData(); closeModal(); autoDistribute(); renderBookingsContent(); showMsg("✅ تمت إضافة الحجز بنجاح"); if(sendWA && newBooking.phone) setTimeout(() => sendAutoBookingConfirmation(newBooking), 1000); }
    function showEditBookingModal(id) { const b = bookings.find(x => x.id === id); if(!b) return; openModal(`<h3 class="text-xl font-bold mb-4">✏️ تعديل الحجز</h3><input id="editClientName" value="${b.clientName}" placeholder="اسم العميل"><input id="editClientPhone" value="${b.phone||''}" placeholder="رقم واتساب العميل" dir="ltr"><select id="editHallId">${halls.map(h => `<option value="${h.id}" ${b.hallId===h.id?'selected':''}>${h.name}</option>`).join('')}</select><input id="editDate" type="date" value="${b.date}"><input id="editPrice" type="number" value="${b.price}" placeholder="السعر"><select id="editPaymentStatus"><option value="pending" ${b.paymentStatus==='pending'?'selected':''}>⏳ معلق</option><option value="paid" ${b.paymentStatus==='paid'?'selected':''}>✅ مدفوع</option></select><button onclick="saveEditBooking('${id}')" class="btn-primary w-full py-3">💾 حفظ التعديلات</button>`); }
    function saveEditBooking(id) { const b = bookings.find(x => x.id === id); if(!b) return; b.clientName = document.getElementById('editClientName').value; b.phone = document.getElementById('editClientPhone')?.value || ''; b.hallId = document.getElementById('editHallId').value; const hall = halls.find(h => h.id === b.hallId); b.hallName = hall?.name || b.hallName; b.date = document.getElementById('editDate').value; b.price = parseInt(document.getElementById('editPrice').value) || b.price; b.paymentStatus = document.getElementById('editPaymentStatus')?.value || 'pending'; saveAllData(); closeModal(); renderBookingsContent(); showMsg("✅ تم تحديث الحجز"); }
    function markBookingCompleted(id) { const b = bookings.find(x => x.id === id); if(b) { b.status = 'completed'; b.paymentStatus = 'paid'; saveAllData(); renderBookingsContent(); renderArchiveContent(); showMsg("✅ تم نقل الحجز للأرشيف"); } }
    function deleteBooking(id) { if(confirm("هل أنت متأكد من حذف هذا الحجز؟")) { bookings = bookings.filter(b => b.id !== id); saveAllData(); renderBookingsContent(); showMsg("🗑️ تم حذف الحجز"); } }

    function toggleEmergencyMode() { if(emergencyMode) deactivateEmergency(); else if(confirm("🚨 تفعيل وضع الطوارئ؟\n• سيتم تعليق الحجوزات الجديدة\n• إرسال تنبيهات فورية لجميع الموظفين")) activateEmergencyMode(); }
    function activateEmergencyMode(showConfirm=true) { emergencyMode = true; document.body.classList.add('emergency-mode'); document.getElementById('emergencyPanel').classList.add('active'); saveAllData(); employees.filter(e => e.active && e.phone).forEach(emp => { addNotification(emp.id, '🚨 وضع الطوارئ', 'تم تفعيل وضع الطوارئ - راجع النظام فوراً', 'emergency'); sendWhatsAppNotification(emp.phone, `🚨 *تنبيه طوارئ من ${companyName}*\n\nتم تفعيل وضع الطوارئ في النظام.`); }); users.filter(u => u.role === 'admin').forEach(u => addNotification(u.username, '🚨 وضع الطوارئ مفعل', 'تم تفعيل الطوارئ بواسطة ' + (currentUser?.name || 'النظام'), 'emergency')); showMsg("🚨 تم تفعيل وضع الطوارئ", 'error'); }
    function deactivateEmergency() { emergencyMode = false; document.body.classList.remove('emergency-mode'); document.getElementById('emergencyPanel').classList.remove('active'); saveAllData(); employees.filter(e => e.active && e.phone).forEach(emp => sendWhatsAppNotification(emp.phone, `✅ *انتهاء وضع الطوارئ*\n\nتم إنهاء وضع الطوارئ في ${companyName}.`)); showMsg("✅ تم إنهاء وضع الطوارئ", 'success'); }
    function sendEmergencyWhatsApp() { const phones = employees.filter(e => e.active && e.phone).map(e => e.phone); sendBulkWhatsApp(phones, `🚨 *تحديث طوارئ - ${companyName}*\nحالة النظام: ${emergencyMode ? 'طوارئ مفعل' : 'طوارئ منتهي'}\nالوقت: ${new Date().toLocaleString('ar-EG')}`); }

    function initVoiceRecognition() { if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { showMsg("⚠️ متصفحك لا يدعم الأوامر الصوتية", 'warning'); return; } const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition; voiceRecognition = new SpeechRecognition(); voiceRecognition.lang = 'ar-EG'; voiceRecognition.continuous = false; voiceRecognition.interimResults = false; voiceRecognition.onresult = (event) => { const transcript = event.results[0][0].transcript.trim(); processVoiceCommand(transcript); }; voiceRecognition.onend = () => { isListening = false; updateVoiceButton(); }; voiceRecognition.onerror = (event) => { console.error('Voice error:', event.error); isListening = false; updateVoiceButton(); showMsg("⚠️ خطأ في التعرف على الصوت", 'warning'); }; }
    function toggleVoiceCommand() { if (!voiceRecognition) initVoiceRecognition(); if (!voiceRecognition) return; if (isListening) voiceRecognition.stop(); else { showMsg("🎤 استمع الآن...", 'warning'); document.getElementById('voiceHint').style.display = 'block'; voiceRecognition.start(); isListening = true; } updateVoiceButton(); }
    function updateVoiceButton() { const btn = document.getElementById('voiceBtn'); if (isListening) { btn.classList.add('listening'); btn.innerHTML = '<i class="fas fa-stop"></i>'; } else { btn.classList.remove('listening'); btn.innerHTML = '<i class="fas fa-microphone"></i>'; setTimeout(() => { document.getElementById('voiceHint').style.display = 'none'; }, 3000); } }
    function processVoiceCommand(cmd) { const lower = cmd.toLowerCase(); showMsg(`🎤 قلت: "${cmd}"`); if (lower.includes('أضف حجز') || lower.includes('حجز جديد')) { showAddBookingModal(); setTimeout(() => { const n = cmd.match(/لـ?\s*([^\s،,]+)/); if (n) document.getElementById('clientName').value = n[1]; }, 500); } else if ((lower.includes('اعرض') || lower.includes('شوف')) && (lower.includes('أوردراتي') || lower.includes('حجوزاتي'))) { if(currentUser?.role === 'employee') { currentTab = 'bookingsTab'; renderCurrentTab(); showMsg("✅ عرض أوردراتك"); } } else if (lower.includes('كم الإيرادات') || lower.includes('الإيرادات')) { const todayRev = bookings.filter(b => b.date === new Date().toISOString().slice(0,10) && b.status !== 'cancelled').reduce((s,b) => s + b.price, 0); showMsg(`💰 إيرادات اليوم: ${todayRev.toLocaleString()} ج.م`); } else if (lower.includes('طوارئ')) toggleEmergencyMode(); else showMsg(`🤔 لم أفهم الأمر. جرب: "أضف حجز"، "اعرض أوردراتي"، "كم الإيرادات"`); }

    function generateClientPortalLink(bookingId) { const token = btoa(bookingId + '-' + Date.now()).replace(/=/g, ''); clientPortalToken = token; const url = `${window.location.origin}${window.location.pathname}?client=${token}`; navigator.clipboard.writeText(url).then(() => showMsg("🔗 تم نسخ رابط العميل", 'success')).catch(() => showMsg("📋 الرابط: " + url, 'warning')); const booking = bookings.find(b => b.id === bookingId); if(booking?.phone) sendWhatsAppNotification(booking.phone, `🔗 *رابط متابعة حجزك*\n${companyName}\n${url}`); }
    function renderClientPortalView(token) { try { const decoded = atob(token.replace(/-/g, '=').padEnd(atob(token.replace(/-/g, '=')).length + ((4 - atob(token.replace(/-/g, '=')).length % 4) % 4), '=')); const bookingId = decoded.split('-')[0]; const booking = bookings.find(b => b.id === bookingId); if(!booking) { document.body.innerHTML = `<div class="min-h-screen flex items-center justify-center bg-gray-50"><div class="text-center p-8"><h1 class="text-2xl font-bold text-red-600 mb-2">❌ الرابط غير صالح</h1><p class="text-gray-500">يرجى التحقق من الرابط أو التواصل مع الإدارة</p></div></div>`; return; } document.body.innerHTML = `<div class="client-portal"><div class="max-w-2xl mx-auto"><div class="text-center mb-6"><h1 class="text-2xl font-bold text-emerald-800 mb-1">${companyLogo} ${companyName}</h1><p class="text-gray-500">بوابة العميل - متابعة الحجز</p></div><div class="client-card"><h2 class="font-bold text-lg mb-4">📋 تفاصيل حجزك</h2><div class="space-y-3"><div class="flex justify-between"><span class="text-gray-500">العميل:</span><span class="font-medium">${booking.clientName}</span></div><div class="flex justify-between"><span class="text-gray-500">التاريخ:</span><span class="font-medium">${booking.date}</span></div><div class="flex justify-between"><span class="text-gray-500">القاعة:</span><span class="font-medium">${booking.hallName}</span></div><div class="flex justify-between"><span class="text-gray-500">السعر:</span><span class="font-bold text-emerald-600">${booking.price.toLocaleString()} ج.م</span></div><div class="flex justify-between"><span class="text-gray-500">الحالة:</span><span class="status-badge ${booking.status==='completed'?'status-completed':'status-pending'}">${booking.status==='completed'?'✅ مكتمل':'⏳ معلق'}</span></div><div class="flex justify-between"><span class="text-gray-500">الدفع:</span><span class="payment-badge ${booking.paymentStatus==='paid'?'payment-paid':'payment-pending'}">${booking.paymentStatus==='paid'?'✅ مدفوع':'⏳ معلق'}</span></div></div></div>${booking.paymentStatus !== 'paid' ? `<div class="client-card"><h3 class="font-bold mb-3">💳 خيارات الدفع</h3><button onclick="simulatePayment('${booking.id}')" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl transition"><i class="fas fa-credit-card"></i> دفع الآن (تجريبي)</button><p class="text-xs text-gray-400 text-center mt-2">🔒 ملاحظة: هذه نسخة تجريبية - للدفع الفعلي يتم دمج Paymob/Fawry API</p></div>` : ''}<div class="text-center mt-6"><button onclick="sendWhatsAppNotification('${booking.phone||''}', 'مرحباً، أحتاج مساعدة بخصوص حجزي ${booking.id}')" class="text-green-600 hover:text-green-800 flex items-center gap-2 mx-auto"><i class="fab fa-whatsapp"></i> تواصل معنا على واتساب</button></div><div class="footer-copy mt-8 border-0 pt-4">© ${companyName} | Ahmed Shreif</div></div></div>`; } catch(e) { console.error(e); } }
    function simulatePayment(bookingId) { const booking = bookings.find(b => b.id === bookingId); if(booking) { booking.paymentStatus = 'paid'; saveAllData(); renderClientPortalView(clientPortalToken); showMsg("✅ تم تسجيل الدفع بنجاح (تجريبي)"); addNotification('admin', 'دفع جديد', `تم دفع حجز ${booking.clientName} - ${booking.price.toLocaleString()} ج.م`); } }

    function renderInventoryContent() { document.getElementById('inventoryTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-4">📦 إدارة المعدات</h2><div class="flex gap-2 mb-4 flex-wrap"><button onclick="showAddEquipmentModal()" class="bg-blue-700 hover:bg-blue-800 text-white px-4 py-2 rounded-xl transition">+ إضافة معدة</button><button onclick="checkLowStock()" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-xl transition">⚠️ فحص المخزون</button></div><div class="grid md:grid-cols-2 gap-4">${Object.entries(equipmentInventory).map(([id, item]) => `<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow border border-gray-100 dark:border-slate-700"><div class="flex justify-between items-start mb-2"><h3 class="font-bold">${item.name}</h3><span class="inventory-tag ${item.quantity <= item.minStock ? 'inventory-low' : 'inventory-ok'}">${item.quantity <= item.minStock ? '⚠️ منخفض' : '✅ متاح'}</span></div><div class="text-sm text-gray-500 mb-2">الفئة: ${item.category}</div><div class="flex justify-between items-center"><div><span class="text-2xl font-bold">${item.quantity}</span><span class="text-gray-400 text-sm"> / متاح</span></div><div class="flex gap-1"><button onclick="adjustInventory('${id}', -1)" class="bg-gray-200 hover:bg-gray-300 dark:bg-slate-700 dark:hover:bg-slate-600 px-3 py-1 rounded-lg">➖</button><button onclick="adjustInventory('${id}', 1)" class="bg-gray-200 hover:bg-gray-300 dark:bg-slate-700 dark:hover:bg-slate-600 px-3 py-1 rounded-lg">➕</button></div></div></div>`).join('')}</div>${Object.values(equipmentInventory).some(i => i.quantity <= i.minStock) ? `<div class="mt-4 p-4 bg-red-50 dark:bg-red-900/20 rounded-xl border border-red-200 dark:border-red-800"><h4 class="font-bold text-red-700 dark:text-red-400 mb-2">⚠️ تنبيه: معدات منخفضة المخزون</h4><ul class="text-sm text-red-600 dark:text-red-400 space-y-1">${Object.entries(equipmentInventory).filter(([_,i]) => i.quantity <= i.minStock).map(([id,i]) => `<li>• ${i.name}: ${i.quantity} متبقي (الحد الأدنى: ${i.minStock})</li>`).join('')}</ul></div>` : ''}</div>`; }
    function showAddEquipmentModal() { openModal(`<h3 class="text-xl font-bold mb-4">➕ إضافة معدة جديدة</h3><input id="eqName" placeholder="اسم المعدة *"><select id="eqCategory"><option value="تصوير">تصوير</option><option value="إضاءة">إضاءة</option><option value="صوت">صوت</option><option value="معدات خاصة">معدات خاصة</option></select><input id="eqQty" type="number" placeholder="الكمية" value="1"><input id="eqMin" type="number" placeholder="الحد الأدنى للتنبيه" value="1"><button onclick="saveNewEquipment()" class="btn-primary w-full py-3">💾 حفظ المعدة</button>`); }
    function saveNewEquipment() { const name = document.getElementById('eqName')?.value.trim(); if(!name) return showMsg("⚠️ أدخل اسم المعدة"); const id = 'eq_' + Date.now(); equipmentInventory[id] = { name, category: document.getElementById('eqCategory')?.value, quantity: parseInt(document.getElementById('eqQty')?.value) || 1, minStock: parseInt(document.getElementById('eqMin')?.value) || 1 }; saveAllData(); closeModal(); renderInventoryContent(); showMsg("✅ تمت إضافة المعدة"); }
    function adjustInventory(id, delta) { if(equipmentInventory[id]) { equipmentInventory[id].quantity = Math.max(0, equipmentInventory[id].quantity + delta); saveAllData(); renderInventoryContent(); if(equipmentInventory[id].quantity <= equipmentInventory[id].minStock) showMsg(`⚠️ ${equipmentInventory[id].name}: مخزون منخفض!`, 'warning'); } }
    function checkLowStock() { const low = Object.entries(equipmentInventory).filter(([_,i]) => i.quantity <= i.minStock); if(low.length > 0) { showMsg(`⚠️ ${low.length} معدات تحتاج إعادة طلب`, 'warning'); addNotification('admin', '⚠️ مخزون منخفض', `${low.length} معدات وصلت للحد الأدنى`, 'high'); } else showMsg("✅ جميع المعدات متوفرة بكميات كافية", 'success'); }

    function exportToPDF() { showMsg("📤 جاري تجهيز التقرير...", 'warning'); const element = document.getElementById(currentTab === 'dashboardTab' ? 'dashboardTab' : 'app'); html2canvas(element, { scale: 2, useCORS: true }).then(canvas => { const imgData = canvas.toDataURL('image/png'); const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'mm', 'a4'); const imgWidth = 210; const pageHeight = 297; const imgHeight = canvas.height * imgWidth / canvas.width; pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight); pdf.save(`${companyName}_Report_${new Date().toISOString().slice(0,10)}.pdf`); showMsg("✅ تم تحميل التقرير", 'success'); }).catch(err => { console.error(err); showMsg("⚠️ خطأ في إنشاء التقرير", 'error'); }); }

    function renderSettingsContent() { document.getElementById('settingsTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-4">⚙️ إعدادات النظام</h2><div class="border rounded-2xl p-4 bg-white dark:bg-slate-800 dark:border-slate-700 mb-4"><h3 class="font-bold mb-3 flex items-center gap-2">🎨 تخصيص المظهر</h3><div class="grid grid-cols-2 gap-4"><div><label class="text-sm text-gray-500 block mb-1">اللون الرئيسي</label><input type="color" id="primaryColorPicker" value="${themeSettings.primaryColor || '#065f46'}" onchange="previewTheme(this.value)"></div><div><label class="text-sm text-gray-500 block mb-1">الوضع</label><select id="darkModeSelect" onchange="previewTheme(null, this.value)"><option value="false" ${!themeSettings.darkMode?'selected':''}>☀️ فاتح</option><option value="true" ${themeSettings.darkMode?'selected':''}>🌙 داكن</option><option value="system">💻 حسب النظام</option></select></div></div><button onclick="saveThemeSettings()" class="btn-primary w-full mt-4 py-2">💾 حفظ المظهر</button></div><div class="grid md:grid-cols-2 gap-4"><div class="border rounded-2xl p-4 bg-white dark:bg-slate-800 dark:border-slate-700"><h3 class="font-bold mb-3 flex items-center gap-2">🖼️ شعار الشركة</h3><input type="file" id="logoFileInput" accept="image/*" onchange="handleLogoUpload(event)" class="mb-3"><div id="logoPreview" class="flex items-center justify-center p-4 bg-gray-50 dark:bg-slate-900 rounded-xl">${companyLogo.startsWith('data:') ? `<img src="${companyLogo}" class="w-20 h-20 object-cover rounded-full shadow">` : `<span class="text-4xl">${companyLogo}</span>`}</div></div><div class="border rounded-2xl p-4 bg-white dark:bg-slate-800 dark:border-slate-700"><h3 class="font-bold mb-3">🏢 اسم الشركة</h3><input id="companyNameInput" value="${companyName}" class="mb-3" placeholder="اسم الشركة"><button onclick="updateCompanyName()" class="btn-primary w-full py-2">💾 حفظ الاسم</button></div><div class="border rounded-2xl p-4 bg-white dark:bg-slate-800 dark:border-slate-700"><h3 class="font-bold mb-3">📱 رقم واتساب</h3><input id="whatsappInput" value="${whatsappNumber}" placeholder="201000000000" class="mb-3" dir="ltr"><button onclick="updateWhatsApp()" class="btn-primary w-full py-2">💾 حفظ الرقم</button></div><div class="border rounded-2xl p-4 bg-white dark:bg-slate-800 dark:border-slate-700"><h3 class="font-bold mb-3">📥 استيراد بيانات</h3><button onclick="showImportExcelModal()" class="bg-green-700 hover:bg-green-800 text-white px-4 py-2 rounded-xl w-full mb-2 transition"><i class="fas fa-file-excel"></i> Excel</button><button onclick="showImportPdfModal()" class="bg-red-700 hover:bg-red-800 text-white px-4 py-2 rounded-xl w-full transition"><i class="fas fa-file-pdf"></i> PDF</button></div></div><div class="mt-6 p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-200 dark:border-blue-800"><h4 class="font-bold text-blue-800 dark:text-blue-300 mb-2">🔗 تكاملات متقدمة</h4><ul class="text-sm text-blue-700 dark:text-blue-300 space-y-1"><li>• 📅 مزامنة جوجل كالمندر: تتطلب Firebase Cloud Functions</li><li>• 💳 الدفع الإلكتروني: دمج Paymob/Fawry API عبر backend</li><li>• 📊 تقارير محاسبية: تصدير CSV متوافق مع "دفاتر" و"زد"</li><li>• 🤖 الذكاء الاصطناعي: ربط OpenAI API للتنبؤ بالطلب</li></ul><button onclick="showIntegrationGuide()" class="text-blue-600 hover:text-blue-800 text-sm mt-2 font-medium">📖 عرض دليل التكامل</button></div></div>`; }

    function handleExcelFile(file) { if(!file) return; const preview = document.getElementById('excelPreview'); const btn = document.getElementById('excelImportBtn'); preview.innerHTML = '<div class="text-center text-gray-500">⏳ جاري تحليل الملف...</div>'; const reader = new FileReader(); reader.onload = function(e) { try { const data = new Uint8Array(e.target.result); const wb = XLSX.read(data, {type:'array'}); const ws = wb.Sheets[wb.SheetNames[0]]; const rows = XLSX.utils.sheet_to_json(ws, {header:1}); pendingExcelData = []; const headers = rows[0] || []; const colMap = {}; headers.forEach((h,i) => { const n = String(h).trim().toLowerCase(); if(n.includes('عميل') || n.includes('client') || n.includes('name')) colMap.clientName = i; if(n.includes('تاريخ') || n.includes('date')) colMap.date = i; if(n.includes('قاعة') || n.includes('hall')) colMap.hallName = i; if(n.includes('سعر') || n.includes('price')) colMap.price = i; if(n.includes('هاتف') || n.includes('phone')) colMap.phone = i; }); for(let i = 1; i < rows.length; i++) { const row = rows[i]; if(!row || !row.some(c => c)) continue; const cn = colMap.clientName !== undefined ? String(row[colMap.clientName] || '').trim() : ''; if(!cn) continue; let dr = colMap.date !== undefined ? row[colMap.date] : ''; let ds = ''; if(dr) { if(typeof dr === 'number') { const d = XLSX.SSF.parse_date_code(dr); ds = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`; } else ds = String(dr).trim(); } const hn = colMap.hallName !== undefined ? String(row[colMap.hallName] || '').trim() : ''; const price = colMap.price !== undefined ? parseInt(row[colMap.price]) || 2500 : 2500; const phone = colMap.phone !== undefined ? String(row[colMap.phone] || '').trim() : ''; let hall = halls.find(h => h.name.toLowerCase() === hn.toLowerCase()); if(!hall && hn) hall = halls.find(h => h.name.includes(hn) || hn.includes(h.name)); const hid = hall ? hall.id : (halls.length ? halls[0].id : 'hall1'); const hname = hall ? hall.name : (hn || (halls.length ? halls[0].name : 'قاعة')); pendingExcelData.push({ id: 'imp_'+Date.now()+'_'+i, clientName: cn, phone, hallId: hid, hallName: hname, date: ds, price, deposit: 0, notes: '', assignedEmployees: [], status: 'pending' }); } if(pendingExcelData.length) { preview.innerHTML = `<div class="bg-green-50 dark:bg-green-900/20 p-3 rounded-xl text-green-700 dark:text-green-400">✅ تم تحليل ${pendingExcelData.length} حجز بنجاح</div>`; btn.classList.remove('hidden'); } else preview.innerHTML = '<div class="bg-red-50 dark:bg-red-900/20 p-3 rounded-xl text-red-700">❌ لم يتم العثور على بيانات صالحة</div>'; } catch(err) { preview.innerHTML = '<div class="bg-red-50 dark:bg-red-900/20 p-3 rounded-xl text-red-700">❌ خطأ في قراءة الملف</div>'; } }; reader.readAsArrayBuffer(file); }

    function handlePdfFile(file) { if(!file) return; const preview = document.getElementById('pdfPreview'); preview.innerHTML = '<div class="text-center text-gray-500">⏳ جاري استخراج النص من PDF...</div>'; const reader = new FileReader(); reader.onload = function(e) { const typedarray = new Uint8Array(e.target.result); pdfjsLib.getDocument({data: typedarray}).promise.then(pdf => { let allText = ''; const promises = []; for(let i = 1; i <= pdf.numPages; i++) promises.push(pdf.getPage(i).then(page => page.getTextContent().then(tc => { allText += tc.items.map(it => it.str).join(' ') + '\n'; }))); Promise.all(promises).then(() => { const yearMatch = allText.match(/20\d{2}/); const year = yearMatch ? parseInt(yearMatch[0]) : new Date().getFullYear(); const monthsAr = {'يناير':1,'فبراير':2,'مارس':3,'إبريل':4,'أبريل':4,'مايو':5,'يونيو':6,'يوليو':7,'أغسطس':8,'سبتمبر':9,'أكتوبر':10,'نوفمبر':11,'ديسمبر':12}; let cM = new Date().getMonth(); for(let m in monthsAr) if(allText.includes(m)) { cM = monthsAr[m]-1; break; } const lines = allText.split('\n').map(l => l.trim()).filter(l => l); const found = []; const dp = /(\d{1,2})\s*[\/\-]\s*(\d{1,2})\s*[\/\-]\s*(\d{2,4})/g; let currentEntry = null; for(let line of lines) { const dm = line.match(dp); if(dm) { if(currentEntry) { const pdm = currentEntry.match(dp); if(pdm) { const datePart = pdm[0]; const dateParts = datePart.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/); if(dateParts) { let day = parseInt(dateParts[1]); let month = parseInt(dateParts[2]); let yr = dateParts[3].length === 2 ? 2000 + parseInt(dateParts[3]) : parseInt(dateParts[3]); let ds = `${yr}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`; const after = currentEntry.substring(currentEntry.indexOf(datePart) + datePart.length).trim(); const nums = after.match(/\d+/g); let count = 0, rest = after; if(nums && nums.length > 0) { count = parseInt(nums[nums.length-1]); rest = after.replace(new RegExp(`${count}\\s*$`), '').trim(); } const pkgs = ['عشاء 1','عشاء 2','عشاء','سواريه','سوارية','غداء','فطار','إفطار','بوفيه','حفل','زفاف']; let cn = '', pt = ''; for(let kw of pkgs) { const idx = rest.indexOf(kw); if(idx !== -1) { cn = rest.substring(0, idx).trim(); pt = rest.substring(idx).replace(/\d+$/,'').trim(); break; } } if(!pt) cn = rest; cn = cn.replace(/[\/\-\.]/g, '').trim(); if(cn && cn !== '-' && cn.length > 1) found.push({clientName: cn, date: ds, packageType: pt, guestCount: count}); } } currentEntry = null; } currentEntry = line; } else if(currentEntry) currentEntry += ' ' + line; } if(found.length > 0) { pendingPdfBookings = found; preview.innerHTML = `<div class="bg-green-50 dark:bg-green-900/20 p-2 rounded text-green-700 dark:text-green-400">✅ تم التعرف على ${found.length} حجز</div><ul class="list-disc pr-4 text-xs mt-2 max-h-32 overflow-y-auto">${found.map(b => `<li><b>${b.clientName}</b> - ${b.date}</li>`).join('')}</ul>`; document.getElementById('pdfImportBtn').classList.remove('hidden'); } else preview.innerHTML = '<div class="bg-red-50 dark:bg-red-900/20 p-2 rounded text-red-700">❌ لم يتم استخراج أي حجز</div>'; }); }).catch(err => { preview.innerHTML = '<div class="bg-red-50 dark:bg-red-900/20 p-2 rounded text-red-700">❌ خطأ في قراءة ملف PDF</div>'; }); }; reader.readAsArrayBuffer(file); }

    function renderDistributionContent() { const pending = bookings.filter(b => b.status === 'pending').sort((a,b) => new Date(a.date) - new Date(b.date)); let html = `<div class="p-4"><h2 class="text-xl font-bold mb-3">⚙️ التوزيع اليدوي</h2><div class="flex gap-2 mb-4 flex-wrap"><button onclick="autoDistribute();renderDistributionContent();renderBookingsContent();" class="bg-purple-700 hover:bg-purple-800 text-white px-4 py-2 rounded-xl transition">🔄 توزيع ذكي عادل</button><button onclick="rotateEmployeesOnHalls();renderDistributionContent();renderBookingsContent();" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-xl transition">🔀 تبديل موظفين القاعات</button></div><div class="space-y-4">`; const grouped = {}; pending.forEach(b => { if(!grouped[b.date]) grouped[b.date] = []; grouped[b.date].push(b); }); for(let date in grouped) { html += `<div class="border rounded-xl overflow-hidden mb-4 bg-white dark:bg-slate-800 dark:border-slate-700"><div class="bg-gray-100 dark:bg-slate-700 p-3 font-bold flex items-center gap-2"><i class="fas fa-calendar-day text-emerald-600"></i> 📅 ${date} (${grouped[date].length} حجز)</div><div class="p-4 space-y-4">`; for(let b of grouped[date]) { const h = halls.find(x => x.id === b.hallId); const type = h ? h.type : 'closed'; const assigned = b.assignedEmployees || []; html += `<div class="border p-4 rounded-xl bg-gray-50 dark:bg-slate-900 dark:border-slate-700"><div class="font-bold mb-3 flex items-center gap-2"><i class="fas fa-user text-emerald-600"></i> ${b.clientName} - <span class="text-gray-500">${b.hallName}</span></div><div class="grid grid-cols-1 md:grid-cols-4 gap-3">`; if(type === 'cafe') html += `<div><label class="text-sm text-gray-500 block mb-1">🎬 مصور</label><select onchange="updateSlot('${b.id}','0',this.value)" class="border rounded-lg p-2 w-full bg-white dark:bg-slate-800"><option value="">-- اختر --</option>${employees.filter(e => e.role==='مصور' && e.active).map(e => `<option value="${e.id}" ${assigned[0]===e.id?'selected':''}>${e.name}</option>`).join('')}</select></div>`; else html += `<div><label class="text-sm text-gray-500 block mb-1">🎬 مخرج</label><select onchange="updateSlot('${b.id}','0',this.value)" class="border rounded-lg p-2 w-full bg-white dark:bg-slate-800"><option value="">-- اختر --</option>${employees.filter(e => e.role==='مخرج' && e.active).map(e => `<option value="${e.id}" ${assigned[0]===e.id?'selected':''}>${e.name}</option>`).join('')}</select></div><div><label class="text-sm text-gray-500 block mb-1">📷 مصور 1</label><select onchange="updateSlot('${b.id}','1',this.value)" class="border rounded-lg p-2 w-full bg-white dark:bg-slate-800"><option value="">-- اختر --</option>${employees.filter(e => e.role==='مصور' && e.active).map(e => `<option value="${e.id}" ${assigned[1]===e.id?'selected':''}>${e.name}</option>`).join('')}</select></div><div><label class="text-sm text-gray-500 block mb-1">📷 مصور 2</label><select onchange="updateSlot('${b.id}','2',this.value)" class="border rounded-lg p-2 w-full bg-white dark:bg-slate-800"><option value="">-- اختر --</option>${employees.filter(e => e.role==='مصور' && e.active).map(e => `<option value="${e.id}" ${assigned[2]===e.id?'selected':''}>${e.name}</option>`).join('')}</select></div><div><label class="text-sm text-gray-500 block mb-1">🏗️ كرين</label><select onchange="updateSlot('${b.id}','3',this.value)" class="border rounded-lg p-2 w-full bg-white dark:bg-slate-800"><option value="">-- اختر --</option>${employees.filter(e => e.role==='كرين' && e.active).map(e => `<option value="${e.id}" ${assigned[3]===e.id?'selected':''}>${e.name}</option>`).join('')}</select></div>`; html += `</div></div>`; } html += `</div></div>`; } html += `</div></div>`; document.getElementById('distributionTab').innerHTML = html; }
    window.updateSlot=function(bookingId,slot,empId){let b=bookings.find(x=>x.id===bookingId);if(!b)return;if(!b.assignedEmployees)b.assignedEmployees=[];while(b.assignedEmployees.length<=parseInt(slot))b.assignedEmployees.push('');b.assignedEmployees[parseInt(slot)]=empId;b.assignedEmployees=b.assignedEmployees.filter(e=>e!=='');saveAllData();updateEmployeeOrders();renderDistributionContent();renderBookingsContent();showMsg('✅ تم تحديث التوزيع');};

    function renderPayrollContent() { const now = new Date(); const y = now.getFullYear(), m = now.getMonth(); const periods = [{label:'1 - 10', start:new Date(y,m,1), end:new Date(y,m,10)},{label:'11 - 20', start:new Date(y,m,11), end:new Date(y,m,20)},{label:`21 - ${new Date(y,m+1,0).getDate()}`, start:new Date(y,m,21), end:new Date(y,m+1,0)}]; document.getElementById('payrollTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-4">💰 إدارة المرتبات</h2><div class="grid grid-cols-3 gap-3 mb-6">${periods.map((p,i) => `<button onclick="renderPayrollPeriod(${i})" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl transition font-medium text-sm">${p.label}</button>`).join('')}</div><div id="payrollPeriodDetail"></div><div class="mt-6 pt-4 border-t border-gray-200 dark:border-slate-700"><h3 class="font-bold mb-3 flex items-center gap-2">💵 السلف والقروض</h3><button onclick="showAddLoanModal()" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-xl transition mb-3">+ تسجيل سلفة</button><div id="loansSection"></div></div></div>`; renderPayrollPeriod(0); renderLoansSection(); }
    function renderPayrollPeriod(pi) { const now = new Date(); const y = now.getFullYear(), m = now.getMonth(); let start, end; if(pi === 0) { start = new Date(y,m,1); end = new Date(y,m,10); } else if(pi === 1) { start = new Date(y,m,11); end = new Date(y,m,20); } else { start = new Date(y,m,21); end = new Date(y,m+1,0); } const active = employees.filter(e => e.active); let html = `<div class="flex gap-2 mb-3 flex-wrap"><button onclick="selectAllPayrollEmps()" class="bg-gray-500 hover:bg-gray-600 text-white px-3 py-2 rounded-xl text-sm transition">تحديد الكل</button><button onclick="bulkPayEmployees(${pi})" class="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-xl text-sm transition">صرف المحددين</button></div><div class="overflow-x-auto rounded-xl border border-gray-200 dark:border-slate-700"><table class="text-sm"><thead><tr><th class="checkbox-col"><input type="checkbox" id="selectAllPayrollCheckbox" onchange="toggleSelectAllPayroll()"></th><th>الموظف</th><th>أوردرات</th><th>المرتب</th><th>الإجمالي</th><th>السلف</th><th>الصافي</th><th>صرف</th></tr></thead><tbody>`; active.forEach(e => { const orders = getEmployeeOrdersInPeriod(e.id, start, end); const salary = orders * e.salaryPerOrder; const loans = (employeeLoans[e.id] || []).reduce((s,l) => s + l.amount, 0); const net = salary - loans; html += `<tr><td class="checkbox-col"><input type="checkbox" class="payroll-checkbox" value="${e.id}" ${selectedPayrollEmps.has(e.id)?'checked':''} onchange="togglePayrollSelection('${e.id}',this.checked)"></td><td class="font-medium">${e.name}</td><td class="font-bold">${orders}</td><td>${e.salaryPerOrder} ج.م</td><td class="text-emerald-600 font-bold">${salary.toLocaleString()}</td><td class="text-red-500">${loans.toLocaleString()}</td><td class="font-bold ${net<0?'text-red-600':'text-emerald-600'}">${net.toLocaleString()}</td><td><button onclick="payEmployee('${e.id}',${pi})" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-xs transition">صرف</button></td></tr>`; }); html += `</tbody></table></div>`; document.getElementById('payrollPeriodDetail').innerHTML = html; }
    function togglePayrollSelection(id, checked) { if(checked) selectedPayrollEmps.add(id); else selectedPayrollEmps.delete(id); }
    function selectAllPayrollEmps() { const active = employees.filter(e => e.active); if(selectedPayrollEmps.size === active.length) selectedPayrollEmps.clear(); else active.forEach(e => selectedPayrollEmps.add(e.id)); renderPayrollContent(); }
    function toggleSelectAllPayroll() { const ck = document.getElementById('selectAllPayrollCheckbox')?.checked; const active = employees.filter(e => e.active); if(ck) active.forEach(e => selectedPayrollEmps.add(e.id)); else selectedPayrollEmps.clear(); renderPayrollContent(); }
    function bulkPayEmployees(pi) { if(!selectedPayrollEmps.size) return showMsg("⚠️ لم تختر أي موظف"); if(confirm(`صرف مرتبات ${selectedPayrollEmps.size} موظف؟`)) { selectedPayrollEmps.forEach(id => payEmployee(id, pi)); selectedPayrollEmps.clear(); renderPayrollContent(); showMsg("✅ تم صرف المحددين"); } }
    function payEmployee(empId, pi) { const now = new Date(); const y = now.getFullYear(), m = now.getMonth(); let start, end, label; if(pi === 0) { start = new Date(y,m,1); end = new Date(y,m,10); label = '1-10'; } else if(pi === 1) { start = new Date(y,m,11); end = new Date(y,m,20); label = '11-20'; } else { start = new Date(y,m,21); end = new Date(y,m+1,0); label = '21-آخر'; } const emp = employees.find(e => e.id === empId); if(!emp) return; const orders = getEmployeeOrdersInPeriod(empId, start, end); const salary = orders * emp.salaryPerOrder; const loans = (employeeLoans[empId] || []).reduce((s,l) => s + l.amount, 0); const net = salary - loans; if(confirm(`صرف ${net.toLocaleString()} ج.م لـ ${emp.name}؟`)) { payrollArchive.push({ id: Date.now(), empId, period: pi, month: m, year: y, amount: net, orders, date: now.toISOString().slice(0,10) }); if(employeeLoans[empId]) delete employeeLoans[empId]; if(emp.phone) sendWhatsAppNotification(emp.phone, `تم صرف مرتبك: ${net.toLocaleString()} ج.م - فترة ${label}`); saveAllData(); renderPayrollPeriod(pi); renderLoansSection(); showMsg(`✅ تم صرف ${net.toLocaleString()} ج.م لـ ${emp.name}`); } }
    function renderLoansSection() { let html = ''; employees.filter(e => e.active).forEach(e => { const loans = employeeLoans[e.id] || []; const total = loans.reduce((s,l) => s + l.amount, 0); if(total > 0) html += `<div class="border p-3 rounded-xl mb-2 bg-white dark:bg-slate-800 dark:border-slate-700"><div class="flex justify-between items-center"><strong>${e.name}</strong><span class="text-red-500 font-bold">${total.toLocaleString()} ج.م</span></div><div class="text-xs text-gray-500 mt-1">${loans.map(l => `${l.date}: ${l.reason||'سلفة'}`).join(' | ')}</div></div>`; }); document.getElementById('loansSection').innerHTML = html || '<p class="text-gray-400 text-sm">✅ لا توجد سلف مسجلة</p>'; }
    function showAddLoanModal() { openModal(`<h3 class="text-xl font-bold mb-4">➕ تسجيل سلفة جديدة</h3><select id="loanEmpId">${employees.filter(e => e.active).map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select><input type="number" id="loanAmount" placeholder="💰 مبلغ السلفة"><input type="date" id="loanDate"><input id="loanReason" placeholder="📝 سبب السلفة (اختياري)"><button onclick="saveNewLoan()" class="bg-amber-700 hover:bg-amber-800 text-white w-full py-3 rounded-xl transition font-bold mt-2">💾 حفظ السلفة</button>`); }
    function saveNewLoan() { const empId = document.getElementById('loanEmpId')?.value; const amount = parseInt(document.getElementById('loanAmount')?.value) || 0; const date = document.getElementById('loanDate')?.value; const reason = document.getElementById('loanReason')?.value; if(!empId || !amount) return showMsg("⚠️ أكمل البيانات المطلوبة"); if(!employeeLoans[empId]) employeeLoans[empId] = []; employeeLoans[empId].push({ id: Date.now(), amount, date, reason }); saveAllData(); closeModal(); renderPayrollContent(); showMsg("✅ تمت إضافة السلفة"); }

    function renderCalendarContent(monthOffset = 0) { const now = new Date(); now.setMonth(now.getMonth() + monthOffset); const y = now.getFullYear(), m = now.getMonth(); const first = new Date(y, m, 1).getDay(); const days = new Date(y, m+1, 0).getDate(); const mNames = ['يناير','فبراير','مارس','إبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر']; let html = `<div class="p-4"><div class="flex justify-between items-center mb-4 flex-wrap gap-2"><button onclick="renderCalendarContent(${monthOffset-1})" class="bg-gray-200 hover:bg-gray-300 dark:bg-slate-700 dark:hover:bg-slate-600 px-4 py-2 rounded-xl transition"><i class="fas fa-chevron-right"></i></button><h2 class="text-lg md:text-xl font-bold flex items-center gap-2"><i class="fas fa-calendar-alt text-emerald-600"></i> 📆 ${mNames[m]} ${y}</h2><button onclick="renderCalendarContent(${monthOffset+1})" class="bg-gray-200 hover:bg-gray-300 dark:bg-slate-700 dark:hover:bg-slate-600 px-4 py-2 rounded-xl transition"><i class="fas fa-chevron-left"></i></button></div><div class="flex gap-2 mb-4 flex-wrap"><select id="calendarMonthSelect" class="border rounded-xl px-3 py-2 text-sm bg-white dark:bg-slate-800" onchange="jumpToMonth()">${mNames.map((mn,i) => `<option value="${i}" ${i===m?'selected':''}>${mn}</option>`).join('')}</select><input id="calendarYearInput" type="number" value="${y}" class="border rounded-xl px-3 py-2 text-sm w-24 bg-white dark:bg-slate-800" onchange="jumpToMonth()"></div><div class="calendar-grid">`; ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'].forEach(d => html += `<div class="text-center font-bold py-2 text-xs md:text-sm text-gray-500">${d}</div>`); for(let i = 0; i < first; i++) html += `<div></div>`; for(let d = 1; d <= days; d++) { const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const dayB = bookings.filter(b => b.date === ds && b.status !== 'cancelled'); let cls = ''; if(dayB.some(b => b.status === 'completed')) cls = 'completed'; else if(dayB.some(b => b.status === 'pending')) cls = 'booked'; html += `<div class="calendar-day ${cls}" onclick="showDayBookings('${ds}')"><span class="day-number">${d}</span>${dayB.length ? `<span class="booking-count">${dayB.length} حجز</span>` : ''}</div>`; } html += `</div><div id="calendarInfo" class="mt-4 text-sm"></div></div>`; document.getElementById('calendarTab').innerHTML = html; }
    window.jumpToMonth=function(){const m=parseInt(document.getElementById('calendarMonthSelect')?.value);const y=parseInt(document.getElementById('calendarYearInput')?.value);if(!isNaN(m)&&!isNaN(y)){const now=new Date();const offset=(y-now.getFullYear())*12+(m-now.getMonth());renderCalendarContent(offset);}};
    window.showDayBookings=function(date){const f=bookings.filter(b=>b.date===date);const info=document.getElementById('calendarInfo');if(info)info.innerHTML=f.length?`<div class="p-4 bg-emerald-50 dark:bg-emerald-900/20 rounded-xl border border-emerald-200 dark:border-emerald-800"><strong class="block mb-2">📅 حجوزات ${date}</strong><ul class="space-y-2">${f.map(b=>`<li class="flex justify-between text-sm"><span>${b.clientName} - ${b.hallName}</span><span class="font-bold text-emerald-600">${b.price.toLocaleString()} ج.م</span></li>`).join('')}</ul></div>`:`<div class="p-4 bg-gray-100 dark:bg-slate-800 rounded-xl text-center text-gray-500">📭 لا توجد حجوزات في هذا اليوم</div>`;};

    function renderReportsContent() { updateEmployeeOrders(); const total = bookings.filter(b => b.status !== 'cancelled').length; const rev = bookings.filter(b => b.status !== 'cancelled').reduce((s,b) => s + b.price, 0); const top = [...employees].sort((a,b) => (b.totalOrders||0) - (a.totalOrders||0))[0]; document.getElementById('reportsTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-4">📊 لوحة التقارير</h2><div class="grid grid-cols-2 gap-4 mb-6"><div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow border border-gray-100 dark:border-slate-700 text-center"><p class="text-gray-500 text-sm">إجمالي الحجوزات</p><p class="text-2xl font-bold text-emerald-600">${total}</p></div><div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow border border-gray-100 dark:border-slate-700 text-center"><p class="text-gray-500 text-sm">إجمالي الإيرادات</p><p class="text-2xl font-bold text-emerald-600">${rev.toLocaleString()} ج.م</p></div></div><div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow border border-gray-100 dark:border-slate-700 mb-4"><h3 class="font-bold mb-2 flex items-center gap-2">🏆 الموظف الأكثر عملاً</h3><p class="text-lg">${top ? `${top.name} - <span class="text-emerald-600 font-bold">${top.totalOrders||0}</span> أوردر` : 'لا توجد بيانات'}</p></div><div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow border border-gray-100 dark:border-slate-700"><h3 class="font-bold mb-3">📋 الإحصائيات حسب القاعة</h3><div class="overflow-x-auto"><table class="text-sm"><thead><tr><th>القاعة</th><th>عدد الحجوزات</th><th>إجمالي الإيرادات</th></tr></thead><tbody>${halls.map(h => { const cnt = bookings.filter(b => b.hallId === h.id && b.status !== 'cancelled').length; const r = bookings.filter(b => b.hallId === h.id && b.status !== 'cancelled').reduce((s,b) => s + b.price, 0); return `<tr><td>${h.name}</td><td class="font-bold">${cnt}</td><td class="text-emerald-600 font-bold">${r.toLocaleString()} ج.م</td></tr>`; }).join('')}</tbody></table></div></div><button onclick="exportToExcel()" class="bg-green-700 hover:bg-green-800 text-white px-5 py-3 rounded-xl mt-5 transition flex items-center gap-2 mx-auto"><i class="fas fa-file-excel"></i> تصدير Excel</button></div>`; }
    function exportToExcel() { const ws = XLSX.utils.json_to_sheet(bookings.filter(b => b.status !== 'cancelled').map(b => ({ 'العميل': b.clientName, 'التاريخ': b.date, 'القاعة': b.hallName, 'السعر': b.price, 'الحالة': b.status === 'completed' ? 'مكتمل' : 'معلق' }))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "الحجوزات"); XLSX.writeFile(wb, `${companyName}_Bookings_${new Date().toISOString().slice(0,10)}.xlsx`); showMsg("✅ تم تصدير الملف بنجاح"); }

    function renderUsersContent() { document.getElementById('usersTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-3">🔐 إدارة المستخدمين</h2><div class="flex gap-2 mb-4 flex-wrap"><button onclick="addUser()" class="bg-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded-xl transition">+ إضافة مستخدم</button><button onclick="selectAllUsers()" class="bg-gray-500 hover:bg-gray-600 text-white px-3 py-2 rounded-xl text-sm transition">تحديد الكل</button><button onclick="bulkDeleteUsers()" class="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-xl text-sm transition">حذف المحدد</button></div><div class="overflow-x-auto rounded-xl border border-gray-200 dark:border-slate-700"><table class="text-sm"><thead><tr><th class="checkbox-col"><input type="checkbox" id="selectAllUsersCheckbox" onchange="toggleSelectAllUsers()"></th><th>المستخدم</th><th>الدور</th><th>الموظف المرتبط</th><th>تعديل</th></tr></thead><tbody>${users.map(u => `<tr><td class="checkbox-col"><input type="checkbox" class="user-checkbox" value="${u.username}" ${selectedUsers.has(u.username)?'checked':''} onchange="toggleUserSelection('${u.username}',this.checked)"></td><td class="font-medium">${u.username}</td><td><span class="text-xs ${u.role==='admin'?'bg-purple-100 text-purple-700':'bg-blue-100 text-blue-700'} px-2 py-1 rounded">${u.role}</span></td><td><select class="border rounded px-2 py-1 text-sm w-full bg-white dark:bg-slate-800" onchange="linkUserToEmployee('${u.username}',this.value)"><option value="">-- غير مرتبط --</option>${employees.map(e => `<option value="${e.id}" ${u.employeeId===e.id?'selected':''}>${e.name}</option>`).join('')}</select></td><td><button onclick="showEditUserModal('${u.username}')" class="text-amber-600 hover:text-amber-800"><i class="fas fa-edit"></i></button></td></tr>`).join('')}</tbody></table></div></div>`; }
    function linkUserToEmployee(username, employeeId) { const u = users.find(x => x.username === username); if(u) { u.employeeId = employeeId || null; saveAllData(); showMsg("✅ تم ربط المستخدم بالموظف"); } }
    function toggleUserSelection(username, checked) { if(checked) selectedUsers.add(username); else selectedUsers.delete(username); }
    function selectAllUsers() { if(selectedUsers.size === users.length) selectedUsers.clear(); else users.forEach(u => selectedUsers.add(u.username)); renderUsersContent(); }
    function toggleSelectAllUsers() { const ck = document.getElementById('selectAllUsersCheckbox')?.checked; if(ck) users.forEach(u => selectedUsers.add(u.username)); else selectedUsers.clear(); renderUsersContent(); }
    function bulkDeleteUsers() { if(!selectedUsers.size) return showMsg("⚠️ لم تختر أي مستخدم"); const filtered = users.filter(u => selectedUsers.has(u.username) && u.role !== 'admin'); if(!filtered.length) return showMsg("⚠️ لا يمكن حذف حساب المدير"); if(confirm(`حذف ${filtered.length} مستخدم؟`)) { users = users.filter(u => !selectedUsers.has(u.username) || u.role === 'admin'); selectedUsers.clear(); saveAllData(); renderUsersContent(); showMsg("🗑️ تم حذف المستخدمين"); } }
    function addUser() { const un = prompt("اسم المستخدم الجديد:"), pw = prompt("كلمة المرور:"), role = prompt("الدور (admin/employee)", "employee"); if(un && pw) { if(users.some(u => u.username === un)) return showMsg("⚠️ اسم المستخدم موجود بالفعل"); users.push({ username: un, password: pw, role: role || 'employee', employeeId: null }); saveAllData(); renderUsersContent(); showMsg(`✅ تمت إضافة المستخدم: ${un}`); } }
    function showEditUserModal(username) { const u = users.find(x => x.username === username); if(!u) return; openModal(`<h3 class="text-xl font-bold mb-4">✏️ تعديل بيانات المستخدم</h3><input id="editUsername" value="${u.username}" placeholder="اسم المستخدم"><input id="editPassword" value="${u.password}" placeholder="كلمة المرور"><select id="editRole"><option value="admin" ${u.role==='admin'?'selected':''}>مدير (admin)</option><option value="employee" ${u.role==='employee'?'selected':''}>موظف (employee)</option></select><button onclick="saveEditUser('${username}')" class="bg-emerald-700 hover:bg-emerald-800 text-white w-full py-3 rounded-xl transition font-bold mt-3">💾 حفظ التعديلات</button>`); }
    function saveEditUser(oldUsername) { const u = users.find(x => x.username === oldUsername); if(!u) return; const newUsername = document.getElementById('editUsername').value.trim(); u.password = document.getElementById('editPassword').value; u.role = document.getElementById('editRole').value; if(newUsername !== oldUsername && users.some(x => x.username === newUsername)) return showMsg("⚠️ اسم المستخدم موجود"); u.username = newUsername; saveAllData(); closeModal(); renderUsersContent(); showMsg("✅ تم تحديث بيانات المستخدم"); }

    function showSwapModal() { if(!currentUser || currentUser.role !== 'employee') return; const emp = employees.find(e => e.id === currentUser.employeeId); if(!emp) return; const myBookings = bookings.filter(b => b.status === 'pending' && (b.assignedEmployees || []).includes(emp.id)); if(!myBookings.length) { showMsg("⚠️ ليس لديك أوردرات للتبديل"); return; } const myOpts = myBookings.map(b => `<option value="${b.id}">${b.date} - ${b.clientName} - ${b.hallName}</option>`).join(''); const otherEmps = employees.filter(e => e.id !== emp.id && e.active && e.role === emp.role); const empOpts = otherEmps.map(e => `<option value="${e.id}">${e.name}</option>`).join(''); openModal(`<h3 class="text-xl font-bold mb-4">🔄 طلب تبديل وردية</h3><p class="text-sm text-gray-500 mb-3">اختر الأوردر الذي تريد التبديل منه:</p><select id="swapMyBooking" class="mb-4">${myOpts}</select><p class="text-sm text-gray-500 mb-3">اختر الموظف الذي تريد التبديل معه:</p><select id="swapTargetEmp" class="mb-4" onchange="loadTargetEmpBookings()">${empOpts}</select><p class="text-sm text-gray-500 mb-3">اختر الأوردر الذي ستأخذه من الموظف البديل:</p><select id="swapTargetBooking" class="mb-4"><option value="">-- اختر الموظف أولاً --</option></select><button onclick="submitSwapRequest()" class="bg-indigo-700 hover:bg-indigo-800 text-white w-full py-3 rounded-xl transition font-bold mt-2">📩 إرسال طلب التبديل</button>`); }
    window.loadTargetEmpBookings=function(){const tid=document.getElementById('swapTargetEmp')?.value;const targetBookings=bookings.filter(b=>b.status==='pending'&&(b.assignedEmployees||[]).includes(tid));const opts=targetBookings.map(b=>`<option value="${b.id}">${b.date} - ${b.clientName} - ${b.hallName}</option>`).join('');document.getElementById('swapTargetBooking').innerHTML=opts||'<option value="">لا توجد أوردرات متاحة</option>';};
    function submitSwapRequest() { const myBid = document.getElementById('swapMyBooking')?.value; const tid = document.getElementById('swapTargetEmp')?.value; const targetBid = document.getElementById('swapTargetBooking')?.value; if(!myBid || !tid || !targetBid) return showMsg("⚠️ أكمل اختيار الأوردرين والموظف البديل"); if(myBid === targetBid) return showMsg("⚠️ لا يمكن تبديل نفس الأوردر"); const fromEmp = employees.find(e => e.id === currentUser.employeeId); const toEmp = employees.find(e => e.id === tid); swapRequests.push({ id: 'sr_'+Date.now(), fromEmpId: currentUser.employeeId, toEmpId: tid, bookingId: myBid, targetBookingId: targetBid, status: 'pending', date: new Date().toISOString() }); saveAllData(); closeModal(); if(whatsappNumber) sendWhatsAppNotification(whatsappNumber, `🔔 طلب تبديل جديد:\n${fromEmp?.name} يريد تبديل أوردر مع ${toEmp?.name}`); addNotification('admin', 'طلب تبديل جديد', `${fromEmp?.name} طلب تبديل أوردرين مع ${toEmp?.name}`); const targetUser = users.find(u => u.employeeId === tid); if(targetUser) addNotification(targetUser.username, 'طلب تبديل', `${fromEmp?.name} يريد تبديل أوردر معك`); showMsg("✅ تم إرسال طلب التبديل"); }
    function renderSwapRequestsContent() { let html = `<div class="p-4"><h2 class="text-xl font-bold mb-4">🔄 طلبات تبديل الأوردرات</h2><div class="space-y-3">`; if(swapRequests.length === 0) html += '<p class="text-gray-500 text-center py-4">✅ لا توجد طلبات تبديل حالياً</p>'; else { swapRequests.slice().reverse().forEach(sr => { const from = employees.find(e => e.id === sr.fromEmpId); const to = employees.find(e => e.id === sr.toEmpId); const myBk = bookings.find(b => b.id === sr.bookingId); const targetBk = bookings.find(b => b.id === sr.targetBookingId); let statusBadge = ''; if(sr.status==='pending') statusBadge='<span class="status-badge status-pending">⏳ معلق</span>'; else if(sr.status==='approved') statusBadge='<span class="status-badge status-completed">✅ تمت الموافقة</span>'; else statusBadge='<span class="status-badge status-cancelled">❌ مرفوض</span>'; html += `<div class="border p-4 rounded-xl bg-white dark:bg-slate-800 dark:border-slate-700"><div class="flex justify-between items-center flex-wrap gap-2"><div><strong>${from?.name||'?'}</strong> ↔ <strong>${to?.name||'?'}</strong></div><div>${statusBadge}</div></div><div class="text-sm text-gray-600 dark:text-gray-400 mt-2 space-y-1"><div>📅 أوردر ${from?.name}: ${myBk?.date} - ${myBk?.clientName}</div><div>📅 أوردر ${to?.name}: ${targetBk?.date} - ${targetBk?.clientName}</div></div>${sr.status==='pending'?`<div class="flex gap-2 mt-3"><button onclick="approveSwap('${sr.id}')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm transition">✅ موافقة</button><button onclick="rejectSwap('${sr.id}')" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm transition">❌ رفض</button></div>`:''}</div>`; }); } html += `</div></div>`; document.getElementById('swapRequestsTab').innerHTML = html; }
    function approveSwap(id) { const sr = swapRequests.find(x => x.id === id); if(!sr) return; sr.status = 'approved'; const myBooking = bookings.find(b => b.id === sr.bookingId); const targetBooking = bookings.find(b => b.id === sr.targetBookingId); if(myBooking && targetBooking) { myBooking.assignedEmployees = myBooking.assignedEmployees.map(eid => eid === sr.fromEmpId ? sr.toEmpId : eid); targetBooking.assignedEmployees = targetBooking.assignedEmployees.map(eid => eid === sr.toEmpId ? sr.fromEmpId : eid); } saveAllData(); renderSwapRequestsContent(); renderBookingsContent(); renderDistributionContent(); const fromEmp = employees.find(e => e.id === sr.fromEmpId); const toEmp = employees.find(e => e.id === sr.toEmpId); const fromUser = users.find(u => u.employeeId === sr.fromEmpId); const toUser = users.find(u => u.employeeId === sr.toEmpId); if(fromUser) addNotification(fromUser.username, 'تمت الموافقة على التبديل', `تمت الموافقة على تبديلك مع ${toEmp?.name}`); if(toUser) addNotification(toUser.username, 'تمت الموافقة على التبديل', `تمت الموافقة على تبديل ${fromEmp?.name} معك`); showMsg("✅ تمت الموافقة على التبديل"); }
    function rejectSwap(id) { const sr = swapRequests.find(x => x.id === id); if(!sr) return; sr.status = 'rejected'; saveAllData(); renderSwapRequestsContent(); const fromUser = users.find(u => u.employeeId === sr.fromEmpId); if(fromUser) addNotification(fromUser.username, 'تم رفض التبديل', 'تم رفض طلب التبديل الخاص بك'); showMsg("❌ تم رفض طلب التبديل"); }

    function renderArchiveContent() { const comp = bookings.filter(b => b.status === 'completed').slice(-50); document.getElementById('archiveTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-4">📁 أرشيف الحجوزات المكتملة</h2><div class="overflow-x-auto rounded-xl border border-gray-200 dark:border-slate-700"><table class="text-sm"><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th></tr></thead><tbody>${comp.map(b => `<tr><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td class="font-bold text-emerald-600">${b.price.toLocaleString()} ج.م</td></tr>`).join('') || '<tr><td colspan="4" class="text-center py-6 text-gray-400">الأرشيف فارغ</td></tr>'}</tbody></table></div></div>`; }

    function renderCurrentTab() { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); if(currentTab === 'dashboardTab') renderDashboardContent(); else if(currentTab === 'bookingsTab') renderBookingsContent(); else if(currentTab === 'hallsTab') renderHallsContent(); else if(currentTab === 'employeesTab') renderEmployeesContent(); else if(currentTab === 'distributionTab') renderDistributionContent(); else if(currentTab === 'payrollTab') renderPayrollContent(); else if(currentTab === 'calendarTab') renderCalendarContent(); else if(currentTab === 'archiveTab') renderArchiveContent(); else if(currentTab === 'reportsTab') renderReportsContent(); else if(currentTab === 'usersTab') renderUsersContent(); else if(currentTab === 'settingsTab') renderSettingsContent(); else if(currentTab === 'swapRequestsTab') renderSwapRequestsContent(); else if(currentTab === 'inventoryTab') renderInventoryContent(); document.getElementById(currentTab)?.classList.remove('hidden'); }
    function renderAdminDashboard() { document.getElementById('app').innerHTML = `<div class="p-3 md:p-4 max-w-7xl mx-auto"><header class="px-3 md:px-4 py-3 mb-4 rounded-xl glass shadow-sm"><div class="flex justify-between items-center flex-wrap gap-2"><h1 class="text-lg md:text-xl font-bold text-emerald-800 dark:text-emerald-400 flex items-center gap-2">${companyLogo.startsWith('data:') ? `<img src="${companyLogo}" class="w-8 h-8 object-cover rounded-full">` : `<span class="text-2xl">${companyLogo}</span>`} ${companyName}</h1><div class="flex items-center gap-2"><div class="notification-bell" id="notificationBell" onclick="showNotificationPanel()" role="button" tabindex="0" aria-label="الإشعارات"><i class="fas fa-bell text-lg text-gray-600 dark:text-gray-300 cursor-pointer"></i></div><div id="notificationPanel" class="notification-panel"></div><span class="bg-emerald-100 dark:bg-emerald-900/30 px-3 py-1.5 rounded-full text-sm font-medium">${currentUser?.username}</span><button onclick="logout()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl text-sm transition"><i class="fas fa-sign-out-alt"></i> <span class="hidden sm:inline">خروج</span></button></div></div></header><div class="flex flex-wrap gap-1 border-b overflow-x-auto pb-2 mb-4" id="tabsContainer" role="tablist"><button data-tab="dashboardTab" class="tab-btn active" role="tab">📊 الرئيسية</button><button data-tab="bookingsTab" class="tab-btn" role="tab">📅 الحجوزات</button><button data-tab="hallsTab" class="tab-btn" role="tab">🏛️ القاعات</button><button data-tab="employeesTab" class="tab-btn" role="tab">👥 الموظفين</button><button data-tab="distributionTab" class="tab-btn" role="tab">⚙️ التوزيع</button><button data-tab="payrollTab" class="tab-btn" role="tab">💰 المرتبات</button><button data-tab="calendarTab" class="tab-btn" role="tab">📆 التقويم</button><button data-tab="archiveTab" class="tab-btn" role="tab">📁 الأرشيف</button><button data-tab="reportsTab" class="tab-btn" role="tab">📊 التقارير</button><button data-tab="usersTab" class="tab-btn" role="tab">🔐 المستخدمين</button><button data-tab="settingsTab" class="tab-btn" role="tab">⚙️ الإعدادات</button><button data-tab="swapRequestsTab" class="tab-btn" role="tab">🔄 تبديل الورديات</button><button data-tab="inventoryTab" class="tab-btn bg-purple-100 dark:bg-purple-900/30" role="tab">📦 المعدات</button></div><div class="bg-white dark:bg-slate-800 rounded-2xl shadow border border-gray-100 dark:border-slate-700 min-h-[400px]"><div id="dashboardTab" class="tab-content"></div><div id="bookingsTab" class="tab-content hidden"></div><div id="hallsTab" class="tab-content hidden"></div><div id="employeesTab" class="tab-content hidden"></div><div id="distributionTab" class="tab-content hidden"></div><div id="payrollTab" class="tab-content hidden"></div><div id="calendarTab" class="tab-content hidden"></div><div id="archiveTab" class="tab-content hidden"></div><div id="reportsTab" class="tab-content hidden"></div><div id="usersTab" class="tab-content hidden"></div><div id="settingsTab" class="tab-content hidden"></div><div id="swapRequestsTab" class="tab-content hidden"></div><div id="inventoryTab" class="tab-content hidden"></div></div><div class="footer-copy">© جميع الحقوق محفوظة ${companyName} | Ahmed Shreif</div></div>`; document.querySelectorAll('#tabsContainer .tab-btn').forEach(btn => btn.addEventListener('click', function() { document.querySelectorAll('#tabsContainer .tab-btn').forEach(b => b.classList.remove('active')); this.classList.add('active'); currentTab = this.dataset.tab; renderCurrentTab(); })); renderCurrentTab(); renderNotificationBadge(); requestBrowserNotificationPermission(); document.addEventListener('click', function(e) { const panel = document.getElementById('notificationPanel'); const bell = document.getElementById('notificationBell'); if(panel && bell && !bell.contains(e.target) && !panel.contains(e.target)) panel.style.display = 'none'; }); }
    function renderEmployeeDashboard() { if(!currentUser?.employeeId || !employees.some(e => e.id === currentUser.employeeId)) { document.getElementById('app').innerHTML = `<div class="p-8 text-center text-red-500">⚠️ حسابك غير مرتبط بموظف في النظام<br><button onclick="logout()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl mt-4 transition">خروج</button></div>`; return; } const emp = employees.find(e => e.id === currentUser.employeeId); updateEmployeeOrders(); const my = bookings.filter(b => (b.assignedEmployees || []).includes(emp.id) && b.status !== 'cancelled'); const today = new Date().toISOString().slice(0,10); const todayOrders = my.filter(b => b.date === today); document.getElementById('app').innerHTML = `<div class="p-4 max-w-md mx-auto"><header class="px-4 py-3 mb-4 rounded-xl glass shadow-sm"><div class="flex justify-between items-center"><h1 class="text-lg font-bold text-emerald-800 dark:text-emerald-400">${companyName}</h1><button onclick="logout()" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded-lg text-sm transition">خروج</button></div></header><div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow mb-4 border border-gray-100 dark:border-slate-700"><h2 class="font-bold mb-2">👋 مرحباً ${emp.name}</h2><div class="grid grid-cols-3 gap-2 text-center"><div class="p-2 bg-emerald-50 dark:bg-emerald-900/20 rounded-lg"><div class="text-xl font-bold text-emerald-600">${todayOrders.length}</div><div class="text-xs text-gray-500">اليوم</div></div><div class="p-2 bg-blue-50 dark:bg-blue-900/20 rounded-lg"><div class="text-xl font-bold text-blue-600">${my.length}</div><div class="text-xs text-gray-500">إجمالي</div></div><div class="p-2 bg-purple-50 dark:bg-purple-900/20 rounded-lg"><div class="text-xl font-bold text-purple-600">${(my.length * emp.salaryPerOrder).toLocaleString()}</div><div class="text-xs text-gray-500">مستحق</div></div></div></div><div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow mb-4 border border-gray-100 dark:border-slate-700"><h3 class="font-bold mb-3">📅 أوردرات اليوم</h3>${todayOrders.length > 0 ? todayOrders.map(o => `<div class="border p-3 rounded-lg mb-2 last:mb-0"><div class="flex justify-between items-start"><div><div class="font-bold">${o.clientName}</div><div class="text-sm text-gray-500">${o.hallName}</div></div><span class="status-badge ${o.status==='completed'?'status-completed':'status-pending'}">${o.status==='completed'?'✅':'⏳'}</span></div>${o.phone ? `<button onclick="sendWhatsAppNotification('${o.phone}', 'مرحباً ${o.clientName}، أنا ${emp.name} - فريق ${companyName}')" class="text-green-600 text-xs mt-2 flex items-center gap-1"><i class="fab fa-whatsapp"></i> تواصل</button>` : ''}</div>`).join('') : '<p class="text-gray-400 text-center py-4">✅ لا توجد أوردرات اليوم</p>'}</div><div class="grid grid-cols-2 gap-3"><button onclick="showSwapModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl transition text-sm"><i class="fas fa-exchange-alt"></i><br>تبديل وردية</button><button onclick="currentTab='payrollTab';renderAdminDashboard();renderCurrentTab()" class="bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl transition text-sm"><i class="fas fa-wallet"></i><br>مرتبتي</button></div><div class="footer-copy mt-6 border-0 pt-4">© ${companyName} | Ahmed Shreif</div></div>`; renderNotificationBadge(); requestBrowserNotificationPermission(); }
    function showLogin() { const supportsBiometric = 'PublicKeyCredential' in window; document.getElementById('app').innerHTML = `<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700 p-4"><div class="bg-white dark:bg-slate-800 p-6 md:p-8 rounded-2xl w-full max-w-md text-center shadow-2xl border border-gray-100 dark:border-slate-700"><h1 class="text-2xl font-bold mb-2 flex items-center justify-center gap-2">${companyLogo.startsWith('data:') ? `<img src="${companyLogo}" class="w-10 h-10 object-cover rounded-full">` : `<span class="text-3xl">${companyLogo}</span>`} ${companyName}</h1><p class="text-gray-500 mb-6">نظام إدارة القاعات </p><input type="text" id="loginUser" placeholder="اسم المستخدم" class="w-full border p-3 rounded-xl mb-3 bg-white dark:bg-slate-900" autocomplete="username"><input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full border p-3 rounded-xl mb-2 bg-white dark:bg-slate-900" autocomplete="current-password"><button onclick="doLogin()" class="w-full btn-primary py-3 mb-3">دخول للنظام</button>${supportsBiometric ? `<button onclick="loginWithBiometric()" class="w-full border-2 border-emerald-600 text-emerald-700 dark:text-emerald-400 py-3 rounded-xl font-medium hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition flex items-center justify-center gap-2"><i class="fas fa-fingerprint"></i> دخول بالبصمة</button><p class="text-xs text-gray-400 mt-2">🔐 مدعوم في الأجهزة الحديثة</p>` : ''}<div class="footer-copy mt-6 border-0 pt-4">© جميع الحقوق محفوظة ${companyName}<br>Ahmed Shreif</div></div></div>`; setTimeout(() => document.getElementById('loginUser')?.focus(), 300); }
    function loginWithBiometric() { if(!('PublicKeyCredential' in window)) return showMsg("⚠️ جهازك لا يدعم البصمة", 'warning'); showMsg("🔐 جاري التحقق من البصمة...", 'warning'); setTimeout(() => { const firstEmp = users.find(u => u.role === 'employee'); if(firstEmp) { currentUser = firstEmp; sessionStorage.setItem('vpms_user', JSON.stringify(firstEmp)); renderApp(); showMsg(`✅ دخول بالبصمة - مرحباً ${firstEmp.name}`, 'success'); } }, 1500); }
    function doLogin() { const un = document.getElementById('loginUser').value.trim(); const pw = document.getElementById('loginPass').value; const user = users.find(u => u.username === un && u.password === pw); if(user) { currentUser = user; sessionStorage.setItem('vpms_user', JSON.stringify(user)); renderApp(); showMsg(`👋 مرحباً ${user.name || user.username}`, 'success'); } else { showMsg("❌ اسم المستخدم أو كلمة المرور غير صحيحة", 'error'); const form = document.querySelector('#app input[type="password"]')?.closest('div'); if(form) { form.style.animation = 'none'; setTimeout(() => form.style.animation = 'shake 0.3s', 10); } } }
    function logout() { sessionStorage.removeItem('vpms_user'); currentUser = null; clientPortalToken = null; showLogin(); showMsg("👋 تم تسجيل الخروج بنجاح", 'success'); }
    function renderApp() { const urlParams = new URLSearchParams(window.location.search); if(urlParams.get('client')) { renderClientPortalView(urlParams.get('client')); return; } if(!currentUser) showLogin(); else if(currentUser.role === 'employee') renderEmployeeDashboard(); else renderAdminDashboard(); }

    window.closeModal = closeModal; window.showNotificationPanel = showNotificationPanel; window.markAllNotificationsRead = markAllNotificationsRead; window.markNotificationRead = markNotificationRead; window.autoDistribute = autoDistribute; window.rotateEmployeesOnHalls = rotateEmployeesOnHalls; window.applyFilters = applyFilters; window.showAddBookingModal = showAddBookingModal; window.updateSuggestedPrice = updateSuggestedPrice; window.applySuggestedPrice = applySuggestedPrice; window.saveNewBooking = saveNewBooking; window.showEditBookingModal = showEditBookingModal; window.saveEditBooking = saveEditBooking; window.markBookingCompleted = markBookingCompleted; window.deleteBooking = deleteBooking; window.toggleEmergencyMode = toggleEmergencyMode; window.deactivateEmergency = deactivateEmergency; window.sendEmergencyWhatsApp = sendEmergencyWhatsApp; window.toggleVoiceCommand = toggleVoiceCommand; window.generateClientPortalLink = generateClientPortalLink; window.simulatePayment = simulatePayment; window.renderInventoryContent = renderInventoryContent; window.showAddEquipmentModal = showAddEquipmentModal; window.saveNewEquipment = saveNewEquipment; window.adjustInventory = adjustInventory; window.checkLowStock = checkLowStock; window.exportToPDF = exportToPDF; window.renderSettingsContent = renderSettingsContent; window.previewTheme = previewTheme; window.saveThemeSettings = saveThemeSettings; window.showIntegrationGuide = showIntegrationGuide; window.handleLogoUpload = handleLogoUpload; window.updateCompanyName = updateCompanyName; window.updateWhatsApp = updateWhatsApp; window.logout = logout; window.doLogin = doLogin; window.loginWithBiometric = loginWithBiometric; window.toggleBookingSelection = toggleBookingSelection; window.selectAllBookings = selectAllBookings; window.toggleSelectAllBookings = toggleSelectAllBookings; window.bulkDeleteBookings = bulkDeleteBookings; window.bulkCompleteBookings = bulkCompleteBookings;

    loadData();
    const saved = sessionStorage.getItem('vpms_user'); if(saved) currentUser = JSON.parse(saved);
    setTimeout(() => { const p = document.getElementById('preloader'); if(p && !p.classList.contains('hidden')) p.classList.add('hidden'); }, 5000);
  </script>
