<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drmedia Pro V3</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
body {font-family: Arial;}
.tab{display:none;}
.tab.active{display:block;}
</style>
</head>

<body class="bg-gray-100">

<div id="app"></div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
    apiKey: "ضع_المفتاح_الصحيح",
    authDomain: "drmedia-vpms.firebaseapp.com",
    databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
    projectId: "drmedia-vpms"
};

let fbReady = true;
try {
    firebase.initializeApp(firebaseConfig);
} catch(e){
    fbReady = false;
    console.log("Firebase Error:", e.message);
}

const db = fbReady ? firebase.database() : null;

// ================= DATA =================
let users = [];
let employees = [];
let bookings = [];
let currentUser = null;

// ================= DEFAULT =================
function initData(){
    users = [
        {username:"admin", password:"admin123", role:"admin", name:"Admin"},
        {username:"emp", password:"123", role:"employee", employeeId:"e1", name:"Employee"}
    ];

    employees = [
        {id:"e1", name:"Ahmed", role:"مصور", salary:200, active:true}
    ];

    bookings = [
        {id:"b1", client:"Ali", date:"2026-04-22", hall:"Hall A", assigned:["e1"], price:2000}
    ];
}

// ================= LOGIN =================
function loginPage(){
document.getElementById("app").innerHTML = `
<div class="flex items-center justify-center h-screen">
<div class="bg-white p-6 rounded-xl w-80">
<h2 class="text-xl mb-3">Login</h2>

<input id="u" class="border p-2 w-full mb-2" placeholder="User">
<input id="p" class="border p-2 w-full mb-2" placeholder="Pass" type="password">

<button onclick="login()" class="bg-green-600 text-white w-full p-2 rounded">
Login
</button>
</div>
</div>`;
}

function login(){
const u = document.getElementById("u").value;
const p = document.getElementById("p").value;

const user = users.find(x=>x.username===u && x.password===p);

if(!user){
alert("Wrong login");
return;
}

currentUser = user;
renderApp();
}

// ================= APP =================
function renderApp(){

if(!currentUser){
loginPage();
return;
}

if(currentUser.role==="admin") adminPanel();
else employeePanel();

}

// ================= ADMIN =================
function adminPanel(){

document.getElementById("app").innerHTML = `
<div class="p-4">

<h1 class="text-xl font-bold mb-4">Drmedia V3 Admin</h1>

<button onclick="logout()" class="bg-red-500 text-white px-3 py-1 rounded">Logout</button>

<div class="mt-4 bg-white p-4 rounded">
<h2 class="font-bold">Employees</h2>

${employees.map(e=>`
<div class="border p-2 mt-2 rounded">
${e.name} - ${e.role}
</div>
`).join("")}

</div>

<div class="mt-4 bg-white p-4 rounded">
<h2 class="font-bold">Bookings</h2>

${bookings.map(b=>`
<div class="border p-2 mt-2 rounded">
${b.client} - ${b.date}
</div>
`).join("")}

</div>

</div>
`;
}

// ================= EMPLOYEE =================
function employeePanel(){

const emp = employees.find(e=>e.id===currentUser.employeeId);

const my = bookings.filter(b=>b.assigned.includes(emp.id));

document.getElementById("app").innerHTML = `
<div class="p-4">

<h1>Welcome ${emp.name}</h1>

<button onclick="logout()" class="bg-red-500 text-white px-3 py-1 rounded">Logout</button>

<div class="bg-white p-4 mt-4 rounded">
<h2 class="font-bold">My Orders</h2>

${my.map(m=>`
<div class="border p-2 mt-2">
${m.client} - ${m.date}
</div>
`).join("")}

</div>

</div>
`;
}

// ================= LOGOUT =================
function logout(){
currentUser = null;
loginPage();
}

// ================= START =================
initData();
loginPage();

</script>

</body>
</html>
