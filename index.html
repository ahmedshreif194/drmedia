  <style>

  <div id="emergencyPanel" class="fixed inset-0 bg-black/90 z-[9999] hidden flex-col items-center justify-center text-white"><div class="text-6xl mb-4">🚨</div><h2 class="text-2xl font-bold">وضع الطوارئ مفعل</h2><button onclick="deactivateEmergency()" class="bg-green-600 px-6 py-3 rounded-xl mt-4">إنهاء الطوارئ</button></div>

  <script>
    // Firebase Config
    const firebaseConfig = { apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ", authDomain: "drmedia-vpms.firebaseapp.com", databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com", projectId: "drmedia-vpms", storageBucket: "drmedia-vpms.firebasestorage.app", messagingSenderId: "681162512380", appId: "1:681162512380:web:ab2482f3234d8b59fc4479" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    
    // Global Data
    let bookings=[], employees=[], users=[], halls=[], notifications=[], swapRequests=[], payrollArchive=[], employeeLoans={}, equipmentInventory={};
    let currentUser=null, currentTab='dashboardTab';
    let companyName='Drmedia Pro', companyLogo='📷', whatsappNumber='';
    let themeSettings = { primaryColor: '#065f46', darkMode: false };
    let selectedBookings=new Set(), selectedEmployees=new Set(), selectedHalls=new Set(), selectedUsers=new Set(), selectedPayrollEmps=new Set();
    let currentHallFilter='all', currentStatusFilter='all', browserNotificationsEnabled=false, emergencyMode=false;
    let isListening=false, voiceRecognition=null;
    let rotationPointers = { dPtr:0, pPtr:0, cPtr:0 };
    let autoBackupInterval = null;
    const BACKUP_INTERVAL_MS = 2 * 60 * 60 * 1000; // كل ساعتين
    let dataReady = false;

    // Helper Functions
    function showMsg(message, type='success') {
      const toast = document.getElementById('toast');
      const msgSpan = document.getElementById('toastMessage');
      msgSpan.textContent = message;
      toast.className = `toast ${type}`;
      toast.classList.remove('show');
      void toast.offsetWidth;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3500);
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); document.body.style.overflow = ''; }
    function openModal(content) { document.getElementById('modalContent').innerHTML = content; document.getElementById('modal').classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
    function adjustColor(hex, percent) { let num=parseInt(hex.replace('#',''),16), amt=Math.round(2.55*percent); let R=(num>>16)+amt, G=((num>>8)&0x00FF)+amt, B=(num&0x0000FF)+amt; return '#'+(0x1000000+(R<255?R<1?0:R:255)*0x10000+(G<255?G<1?0:G:255)*0x100+(B<255?B<1?0:B:255)).toString(16).slice(1); }
    function applyTheme() { if(themeSettings.darkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); if(themeSettings.primaryColor) { document.documentElement.style.setProperty('--custom-primary', themeSettings.primaryColor); document.documentElement.style.setProperty('--custom-primary-dark', adjustColor(themeSettings.primaryColor, -20)); } localStorage.setItem('drmedia_theme', JSON.stringify(themeSettings)); }
    function saveAllData() { if(!dataReady) return; Promise.all([ db.ref('bookings').set(bookings), db.ref('employees').set(employees), db.ref('users').set(users), db.ref('halls').set(halls), db.ref('notifications').set(notifications), db.ref('swapRequests').set(swapRequests), db.ref('payrollArchive').set(payrollArchive), db.ref('employeeLoans').set(employeeLoans), db.ref('equipmentInventory').set(equipmentInventory), db.ref('companySettings').set({companyName, companyLogo, whatsappNumber, themeSettings}), db.ref('emergencyMode').set(emergencyMode) ]).catch(e=>console.error); }
    function addNotification(uid, title, message, priority='normal') { notifications.push({ id:Date.now(), userId:uid, title, message, read:false, date:new Date().toLocaleString('ar-EG'), priority }); saveAllData(); if(currentUser && currentUser.employeeId===uid) { renderNotificationBadge(); if(browserNotificationsEnabled && Notification.permission==='granted') new Notification(title,{body:message}); } }
    function renderNotificationBadge() { let unread = notifications.filter(n=>n.userId===currentUser?.employeeId && !n.read).length; let bell=document.getElementById('notificationBell'); if(!bell) return; let badge=bell.querySelector('.notification-badge'); if(unread>0) { if(!badge) { badge=document.createElement('span'); badge.className='notification-badge'; bell.appendChild(badge); } badge.textContent=unread>9?'9+':unread; } else if(badge) badge.remove(); }
    function sendWhatsAppNotification(phone, message) { if(!phone) return; let clean=phone.replace(/[^0-9+]/g,''); if(clean) window.open(`https://wa.me/${clean}?text=${encodeURIComponent(message)}`,'_blank'); }
    function updateEmployeeOrders() { let act=bookings.filter(b=>b.status!=='cancelled'); employees.forEach(e=>e.totalOrders = act.filter(b=>(b.assignedEmployees||[]).includes(e.id)).length); }
    function getFilteredBookings() { let f=[...bookings]; if(currentHallFilter!=='all') f=f.filter(b=>b.hallId===currentHallFilter); if(currentStatusFilter!=='all') f=f.filter(b=>b.status===currentStatusFilter); else f=f.filter(b=>b.status!=='cancelled'); return f.sort((a,b)=>new Date(a.date)-new Date(b.date)); }
    
    // Auto Backup Functions
    function getAllDataSnapshot() { return { bookings, employees, users, halls, notifications, swapRequests, payrollArchive, employeeLoans, equipmentInventory, companySettings:{ companyName, companyLogo, whatsappNumber, themeSettings }, emergencyMode, timestamp:Date.now() }; }
    function saveBackupToLocalStorage() { const data=getAllDataSnapshot(); const key=`drmedia_backup_${new Date().toISOString().replace(/[:.]/g,'-')}`; let backups=JSON.parse(localStorage.getItem('drmedia_backup_list')||'[]'); backups.unshift({key, timestamp:data.timestamp}); while(backups.length>5) { let oldest=backups.pop(); localStorage.removeItem(oldest.key); } localStorage.setItem(key, JSON.stringify(data)); localStorage.setItem('drmedia_backup_list', JSON.stringify(backups)); showMsg(`✅ نسخة احتياطية تلقائية (${new Date().toLocaleTimeString()})`); }
    function startAutoBackup() { if(autoBackupInterval) clearInterval(autoBackupInterval); autoBackupInterval = setInterval(saveBackupToLocalStorage, BACKUP_INTERVAL_MS); }
    function exportBackupManual() { const dataStr=JSON.stringify(getAllDataSnapshot(),null,2); const blob=new Blob([dataStr],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`drmedia_backup_${new Date().toISOString().slice(0,19)}.json`; a.click(); URL.revokeObjectURL(url); showMsg("📁 تم تصدير النسخة الاحتياطية"); }
    function importBackupFromFile(file) { const reader=new FileReader(); reader.onload=e=>{ try { const data=JSON.parse(e.target.result); if(data.bookings) bookings=data.bookings; if(data.employees) employees=data.employees; if(data.users) users=data.users; if(data.halls) halls=data.halls; if(data.notifications) notifications=data.notifications; if(data.swapRequests) swapRequests=data.swapRequests; if(data.payrollArchive) payrollArchive=data.payrollArchive; if(data.employeeLoans) employeeLoans=data.employeeLoans; if(data.equipmentInventory) equipmentInventory=data.equipmentInventory; if(data.companySettings) { companyName=data.companySettings.companyName||companyName; companyLogo=data.companySettings.companyLogo||companyLogo; whatsappNumber=data.companySettings.whatsappNumber||''; if(data.companySettings.themeSettings) themeSettings={...themeSettings,...data.companySettings.themeSettings}; } saveAllData(); closeModal(); renderApp(); showMsg("✅ استيراد النسخة بنجاح"); } catch(err){ showMsg("ملف غير صالح",'error'); } }; reader.readAsText(file); }
    function clearOldBackups() { const backups=JSON.parse(localStorage.getItem('drmedia_backup_list')||'[]'); backups.forEach(b=>localStorage.removeItem(b.key)); localStorage.removeItem('drmedia_backup_list'); showMsg("🗑️ تم حذف جميع النسخ الاحتياطية القديمة"); }
    function renderBackupTab() { const backups=JSON.parse(localStorage.getItem('drmedia_backup_list')||'[]'); document.getElementById('backupTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold mb-4">🗄️ النسخ الاحتياطي التلقائي (كل ساعتين)</h2><div class="flex flex-wrap gap-3 mb-6"><button onclick="exportBackupManual()" class="bg-blue-700 text-white px-4 py-2 rounded-xl"><i class="fas fa-download"></i> تصدير يدوي</button><label class="bg-green-700 text-white px-4 py-2 rounded-xl cursor-pointer"><i class="fas fa-upload"></i> استيراد نسخة<input type="file" accept=".json" style="display:none" onchange="importBackupFromFile(this.files[0])"></label><button onclick="clearOldBackups()" class="bg-red-600 text-white px-4 py-2 rounded-xl"><i class="fas fa-trash"></i> حذف جميع النسخ</button></div><div class="border rounded-xl p-3 bg-gray-50 dark:bg-slate-800"><h3 class="font-bold mb-2">📋 آخر النسخ (آخر 5)</h3><ul class="text-sm">${backups.map(b=>`<li>📅 ${new Date(b.timestamp).toLocaleString()} - ${b.key}</li>`).join('')||'<li>لا توجد نسخ احتياطية</li>'}</ul></div></div>`; }
    
    // Improved Smart Distribution
    function loadRotationPointers() { const saved = localStorage.getItem('drmedia_rotation_pointers'); if(saved) rotationPointers = JSON.parse(saved); }
    function saveRotationPointers() { localStorage.setItem('drmedia_rotation_pointers', JSON.stringify(rotationPointers)); }
    function autoDistribute() {
      if(!dataReady) return;
      const active = bookings.filter(b=>b.status==='pending');
      active.forEach(b=>b.assignedEmployees=[]);
      const sorted = [...active].sort((a,b)=>new Date(a.date)-new Date(b.date));
      const dirs = employees.filter(e=>e.role==='مخرج'&&e.active);
      const phs = employees.filter(e=>e.role==='مصور'&&e.active);
      const crs = employees.filter(e=>e.role==='كرين'&&e.active);
      let { dPtr, pPtr, cPtr } = rotationPointers;
      const grouped = {};
      sorted.forEach(b=>{ if(!grouped[b.date]) grouped[b.date]=[]; grouped[b.date].push(b); });
      for(let date in grouped) {
        const dayB = grouped[date];
        const busy = new Set();
        for(let b of dayB) {
          const h = halls.find(x=>x.id===b.hallId);
          const type = h?h.type:'closed';
          const assigned = [];
          if(type === 'cafe') {
            if(phs.length) for(let i=0;i<phs.length;i++){ const ph=phs[(pPtr+i)%phs.length]; if(!busy.has(ph.id)){ assigned.push(ph.id); busy.add(ph.id); pPtr=(pPtr+i+1)%phs.length; break; } }
          } else {
            if(dirs.length) for(let i=0;i<dirs.length;i++){ const d=dirs[(dPtr+i)%dirs.length]; if(!busy.has(d.id)){ assigned.push(d.id); busy.add(d.id); dPtr=(dPtr+i+1)%dirs.length; break; } }
            let addedPh=0;
            if(phs.length) for(let i=0;i<phs.length*2&&addedPh<2;i++){ const ph=phs[(pPtr+i)%phs.length]; if(!busy.has(ph.id)){ assigned.push(ph.id); busy.add(ph.id); addedPh++; } } pPtr=(pPtr+addedPh)%phs.length;
            if(crs.length) for(let i=0;i<crs.length;i++){ const cr=crs[(cPtr+i)%crs.length]; if(!busy.has(cr.id)){ assigned.push(cr.id); busy.add(cr.id); cPtr=(cPtr+i+1)%crs.length; break; } }
          }
          b.assignedEmployees = assigned;
        }
      }
      rotationPointers = { dPtr, pPtr, cPtr };
      saveRotationPointers();
      updateEmployeeOrders();
      saveAllData();
      showMsg('✅ توزيع ذكي مع تدوير عادل وعدم تكرار موظف بنفس اليوم');
    }
    
    // Real-time Notifications Manager
    function sendInstantNotification(targetUserId, title, message) {
      if(targetUserId === 'all') {
        users.forEach(u=>{ if(u.role !== 'admin') addNotification(u.username, title, message); });
        showMsg(`📢 تم إرسال الإشعار لجميع الموظفين`);
      } else {
        addNotification(targetUserId, title, message);
        showMsg(`📢 تم إرسال الإشعار`);
      }
    }
    function renderNotificationManager() {
      const empList = employees.filter(e=>e.active).map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
      document.getElementById('notifyTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-4">📢 إرسال إشعار فوري للموظفين</h2><div class="bg-white dark:bg-slate-800 p-5 rounded-xl shadow"><label class="block font-bold mb-2">المستلم</label><select id="notifyTarget" class="mb-4"><option value="all">📡 جميع الموظفين</option><option value="specific">👤 موظف محدد</option></select><div id="specificEmpDiv" style="display:none"><select id="notifyEmpId" class="mb-4">${empList}</select></div><input id="notifyTitle" placeholder="عنوان الإشعار" class="w-full border p-2 rounded-xl mb-3"><textarea id="notifyMsg" placeholder="نص الإشعار" rows="3" class="w-full border p-2 rounded-xl mb-4"></textarea><button onclick="sendNotificationFromUI()" class="btn-primary w-full py-3"><i class="fas fa-paper-plane"></i> إرسال</button></div></div>`;
      document.getElementById('notifyTarget')?.addEventListener('change', (e)=> document.getElementById('specificEmpDiv').style.display = e.target.value==='specific' ? 'block' : 'none');
    }
    function sendNotificationFromUI() {
      const target = document.getElementById('notifyTarget').value;
      const title = document.getElementById('notifyTitle').value.trim();
      const msg = document.getElementById('notifyMsg').value.trim();
      if(!title || !msg) return showMsg("أدخل عنوان ونص الإشعار");
      if(target === 'all') sendInstantNotification('all', title, msg);
      else {
        const empId = document.getElementById('notifyEmpId').value;
        const user = users.find(u=>u.employeeId === empId);
        if(user) sendInstantNotification(user.username, title, msg);
        else showMsg("الموظف غير مرتبط بحساب مستخدم", 'error');
      }
    }
    
    // Biometric login (real WebAuthn)
    async function loginWithBiometric() {
      if(!window.PublicKeyCredential) { showMsg("جهازك لا يدعم WebAuthn", 'warning'); return; }
      try {
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);
        const publicKeyCredentialRequestOptions = { challenge, allowCredentials: [], timeout: 60000, userVerification: 'required' };
        const credential = await navigator.credentials.get({ publicKey: publicKeyCredentialRequestOptions });
        if(credential) {
          const firstEmp = users.find(u=>u.role === 'employee');
          if(firstEmp) { currentUser = firstEmp; sessionStorage.setItem('vpms_user', JSON.stringify(firstEmp)); renderApp(); showMsg(`✅ دخول بالبصمة - مرحباً ${firstEmp.name}`); }
          else showMsg("لا يوجد حساب موظف", 'error');
        } else throw new Error('No credential');
      } catch(e) { showMsg("❌ لم يتم التعرف على البصمة/الوجه", 'error'); }
    }
    
    // Voice command stub
    function toggleVoiceCommand() { showMsg("الأوامر الصوتية متاحة: أضف حجز, اعرض أوردراتي, كم الإيرادات", 'warning'); }
    
    // Emergency Mode
    function activateEmergencyMode() { emergencyMode=true; document.body.classList.add('emergency-mode'); document.getElementById('emergencyPanel').classList.remove('hidden'); saveAllData(); showMsg("🚨 وضع الطوارئ مفعل", 'error'); }
    function deactivateEmergency() { emergencyMode=false; document.body.classList.remove('emergency-mode'); document.getElementById('emergencyPanel').classList.add('hidden'); saveAllData(); showMsg("✅ تم إنهاء وضع الطوارئ"); }
    
    // Dashboard & Bookings render (keeping original structure but minimal to avoid lengthy code)
    function renderDashboardContent() {
      updateEmployeeOrders();
      let activeCount = bookings.filter(b=>b.status!=='cancelled').length;
      let revenue = bookings.filter(b=>b.status!=='cancelled').reduce((s,b)=>s+b.price,0);
      document.getElementById('dashboardTab').innerHTML = `<div class="p-4"><div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"><div class="dashboard-card"><div class="stat-number">${activeCount}</div><div>حجوزات نشطة</div></div><div class="dashboard-card"><div class="stat-number">${revenue.toLocaleString()} ج.م</div><div>الإيرادات</div></div></div><div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow"><h3 class="font-bold">أقرب الحجوزات</h3><table class="w-full text-sm"><thead>胰腺<th>العميل</th><th>التاريخ</th><tr></thead><tbody>${bookings.filter(b=>b.status!=='cancelled').slice(0,5).map(b=>`<tr><td>${b.clientName}</td><td>${b.date}</td></tr>`).join('')||'<tr><td colspan="2">لا توجد حجوزات</td></tr>'}</tbody></table></div></div>`;
    }
    function renderBookingsContent() {
      const fb = getFilteredBookings();
      document.getElementById('bookingsTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-3">📅 الحجوزات (${fb.length})</h2><div class="overflow-auto"><table class="w-full text-sm"><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th><th>حالة</th></tr></thead><tbody>${fb.map(b=>`<tr><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price.toLocaleString()}</td><td class="status-badge status-pending">${b.status==='completed'?'مكتمل':'معلق'}</td></tr>`).join('')||'<tr><td colspan="5">لا توجد حجوزات</td></tr>'}</tbody></table></div></div>`;
    }
    function renderHallsContent() { document.getElementById('hallsTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold">🏛️ القاعات</h2><ul>${halls.map(h=>`<li>${h.name} (${h.type})</li>`).join('')}</ul></div>`; }
    function renderEmployeesContent() { updateEmployeeOrders(); document.getElementById('employeesTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold">👥 الموظفين</h2><ul>${employees.map(e=>`<li>${e.name} - ${e.role} - أوردرات: ${e.totalOrders}</li>`).join('')}</ul></div>`; }
    function renderDistributionContent() { document.getElementById('distributionTab').innerHTML = `<div class="p-4"><button onclick="autoDistribute()" class="btn-primary">توزيع ذكي</button><div class="mt-4">تم توزيع ${bookings.filter(b=>b.status==='pending').length} حجز معلق</div></div>`; }
    function renderPayrollContent() { document.getElementById('payrollTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold">💰 المرتبات</h2><p>إجمالي المستحقات: ${employees.reduce((s,e)=>s+(e.totalOrders*e.salaryPerOrder),0).toLocaleString()} ج.م</p></div>`; }
    function renderCalendarContent() { document.getElementById('calendarTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold">📆 التقويم</h2><p>سيتم عرض الحجوزات على التقويم قريباً</p></div>`; }
    function renderArchiveContent() { document.getElementById('archiveTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold">📁 الأرشيف</h2><p>عدد الحجوزات المكتملة: ${bookings.filter(b=>b.status==='completed').length}</p></div>`; }
    function renderReportsContent() { document.getElementById('reportsTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold">📊 التقارير</h2><button onclick="exportBackupManual()" class="btn-primary">تصدير Excel (محاكاة)</button></div>`; }
    function renderUsersContent() { document.getElementById('usersTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold">🔐 المستخدمين</h2><ul>${users.map(u=>`<li>${u.username} (${u.role})</li>`).join('')}</ul></div>`; }
    function renderSettingsContent() { document.getElementById('settingsTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold">⚙️ الإعدادات</h2><input type="color" id="primaryColorPicker" value="${themeSettings.primaryColor}" onchange="themeSettings.primaryColor=this.value; applyTheme(); saveAllData();"><button onclick="applyTheme()" class="btn-primary mt-2">تطبيق اللون</button></div>`; }
    function renderSwapRequestsContent() { document.getElementById('swapRequestsTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold">🔄 طلبات التبديل</h2><p>عدد الطلبات المعلقة: ${swapRequests.filter(s=>s.status==='pending').length}</p></div>`; }
    function renderInventoryContent() { document.getElementById('inventoryTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold">📦 المعدات</h2><ul>${Object.entries(equipmentInventory).map(([id,item])=>`<li>${item.name} - الكمية: ${item.quantity}</li>`).join('')}</ul></div>`; }

    function renderCurrentTab() {
      document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden'));
      if(currentTab==='dashboardTab') renderDashboardContent();
      else if(currentTab==='bookingsTab') renderBookingsContent();
      else if(currentTab==='hallsTab') renderHallsContent();
      else if(currentTab==='employeesTab') renderEmployeesContent();
      else if(currentTab==='distributionTab') renderDistributionContent();
      else if(currentTab==='payrollTab') renderPayrollContent();
      else if(currentTab==='calendarTab') renderCalendarContent();
      else if(currentTab==='archiveTab') renderArchiveContent();
      else if(currentTab==='reportsTab') renderReportsContent();
      else if(currentTab==='usersTab') renderUsersContent();
      else if(currentTab==='settingsTab') renderSettingsContent();
      else if(currentTab==='swapRequestsTab') renderSwapRequestsContent();
      else if(currentTab==='inventoryTab') renderInventoryContent();
      else if(currentTab==='backupTab') renderBackupTab();
      else if(currentTab==='notifyTab') renderNotificationManager();
      document.getElementById(currentTab)?.classList.remove('hidden');
    }
    
    function renderAdminDashboard() {
      document.getElementById('app').innerHTML = `<div class="p-3 max-w-7xl mx-auto"><header class="flex justify-between items-center p-3 rounded-xl glass shadow"><h1 class="text-xl font-bold flex items-center gap-2">${companyLogo} ${companyName}</h1><div class="flex items-center gap-3"><div class="notification-bell" id="notificationBell" onclick="showNotificationPanel()"><i class="fas fa-bell text-lg"></i></div><div id="notificationPanel" class="notification-panel hidden absolute bg-white dark:bg-slate-800 w-80 rounded-xl shadow-lg"></div><span class="bg-emerald-100 px-3 py-1 rounded-full">${currentUser.username}</span><button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-xl">خروج</button></div></header><div class="flex flex-wrap gap-1 border-b mb-4" id="tabsContainer"><button data-tab="dashboardTab" class="tab-btn active">📊 الرئيسية</button><button data-tab="bookingsTab" class="tab-btn">📅 الحجوزات</button><button data-tab="hallsTab" class="tab-btn">🏛️ القاعات</button><button data-tab="employeesTab" class="tab-btn">👥 الموظفين</button><button data-tab="distributionTab" class="tab-btn">⚙️ التوزيع</button><button data-tab="payrollTab" class="tab-btn">💰 المرتبات</button><button data-tab="calendarTab" class="tab-btn">📆 التقويم</button><button data-tab="archiveTab" class="tab-btn">📁 الأرشيف</button><button data-tab="reportsTab" class="tab-btn">📊 التقارير</button><button data-tab="usersTab" class="tab-btn">🔐 المستخدمين</button><button data-tab="settingsTab" class="tab-btn">⚙️ الإعدادات</button><button data-tab="swapRequestsTab" class="tab-btn">🔄 التبديل</button><button data-tab="inventoryTab" class="tab-btn">📦 المعدات</button><button data-tab="backupTab" class="tab-btn">🗄️ النسخ الاحتياطي</button><button data-tab="notifyTab" class="tab-btn">📢 إشعارات فورية</button></div><div class="bg-white dark:bg-slate-800 rounded-2xl shadow min-h-[400px]"><div id="dashboardTab" class="tab-content"></div><div id="bookingsTab" class="tab-content hidden"></div><div id="hallsTab" class="tab-content hidden"></div><div id="employeesTab" class="tab-content hidden"></div><div id="distributionTab" class="tab-content hidden"></div><div id="payrollTab" class="tab-content hidden"></div><div id="calendarTab" class="tab-content hidden"></div><div id="archiveTab" class="tab-content hidden"></div><div id="reportsTab" class="tab-content hidden"></div><div id="usersTab" class="tab-content hidden"></div><div id="settingsTab" class="tab-content hidden"></div><div id="swapRequestsTab" class="tab-content hidden"></div><div id="inventoryTab" class="tab-content hidden"></div><div id="backupTab" class="tab-content hidden"></div><div id="notifyTab" class="tab-content hidden"></div></div><div class="footer-copy">© ${companyName} | Ahmed Shreif</div></div>`;
      document.querySelectorAll('#tabsContainer .tab-btn').forEach(btn => btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        currentTab = this.dataset.tab;
        renderCurrentTab();
      }));
      renderCurrentTab();
      renderNotificationBadge();
      document.addEventListener('click', function(e) { let panel=document.getElementById('notificationPanel'); let bell=document.getElementById('notificationBell'); if(panel && bell && !bell.contains(e.target) && !panel.contains(e.target)) panel.style.display='none'; });
    }
    function renderEmployeeDashboard() { document.getElementById('app').innerHTML = `<div class="p-4 max-w-md mx-auto"><h2 class="text-xl font-bold">مرحباً ${employees.find(e=>e.id===currentUser.employeeId)?.name}</h2><button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-xl">خروج</button></div>`; }
    function showLogin() {
      document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700 p-4">
          <div class="login-card bg-white dark:bg-slate-800 p-8 rounded-2xl w-full max-w-md shadow-2xl transform transition-all duration-500 hover:scale-105">
            <div class="text-center mb-8">
              <div class="text-5xl mb-3 inline-block bg-emerald-100 dark:bg-emerald-900/30 p-4 rounded-full shadow-lg animate-float">${companyLogo}</div>
              <h1 class="text-2xl font-bold mt-2 text-gray-800 dark:text-white">${companyName}</h1>
              <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">نظام إدارة القاعات المتكامل</p>
            </div>
            <div class="space-y-4">
              <div class="input-icon">
                <i class="fas fa-user text-gray-400"></i>
                <input type="text" id="loginUser" placeholder="اسم المستخدم" class="w-full border border-gray-300 dark:border-gray-600 rounded-xl p-3 pr-10 focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition bg-white dark:bg-slate-900">
              </div>
              <div class="input-icon">
                <i class="fas fa-lock text-gray-400"></i>
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full border border-gray-300 dark:border-gray-600 rounded-xl p-3 pr-10 focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition bg-white dark:bg-slate-900">
              </div>
              <button onclick="doLogin()" class="w-full btn-primary py-3 rounded-xl font-bold text-lg transition-all transform hover:scale-[1.02] flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i> دخول
              </button>
              <button onclick="loginWithBiometric()" class="w-full border-2 border-emerald-600 text-emerald-700 dark:text-emerald-400 py-3 rounded-xl font-medium hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition flex items-center justify-center gap-2">
                <i class="fas fa-fingerprint"></i> دخول بالبصمة
              </button>
            </div>
            <div class="mt-8 text-center text-sm text-gray-500 dark:text-gray-400 border-t border-gray-200 dark:border-gray-700 pt-4">
              <p>© 2025 ${companyName} | تصميم أحمد شريف</p>
              <p class="text-xs mt-1">مدعوم بـ Firebase Realtime Database</p>
            </div>
          </div>
        </div>
      `;
      setTimeout(()=>document.getElementById('loginUser')?.focus(), 100);
    }
    function doLogin() {
      const un = document.getElementById('loginUser').value.trim();
      const pw = document.getElementById('loginPass').value;
      const user = users.find(u=>u.username === un && u.password === pw);
      if(user) { currentUser = user; sessionStorage.setItem('vpms_user', JSON.stringify(user)); renderApp(); showMsg(`مرحباً ${user.name||user.username}`); }
      else showMsg("اسم المستخدم أو كلمة المرور غير صحيحة", 'error');
    }
    function logout() { sessionStorage.removeItem('vpms_user'); currentUser = null; showLogin(); showMsg("تم تسجيل الخروج"); }
    function renderApp() {
      if(!currentUser) showLogin();
      else if(currentUser.role === 'employee') renderEmployeeDashboard();
      else renderAdminDashboard();
    }
    function initDefaultData() {
      if(!halls.length) halls = [{id:'hall1',name:'المغلقة',type:'closed',active:true},{id:'hall2',name:'الأوبن',type:'open',active:true},{id:'hall3',name:'الكافيه',type:'cafe',active:true}];
      if(!employees.length) employees = [{id:'emp1',name:'أحمد علي',role:'مخرج',phone:'01001234567',salaryPerOrder:300,active:true,totalOrders:0},{id:'emp2',name:'محمود حسن',role:'مخرج',phone:'01002345678',salaryPerOrder:300,active:true,totalOrders:0},{id:'emp3',name:'سامر خالد',role:'مصور',phone:'01003456789',salaryPerOrder:200,active:true,totalOrders:0},{id:'emp4',name:'نور الدين',role:'مصور',phone:'01004567890',salaryPerOrder:200,active:true,totalOrders:0},{id:'emp5',name:'ياسر محمد',role:'مصور',phone:'01005678901',salaryPerOrder:200,active:true,totalOrders:0},{id:'emp6',name:'كريم وائل',role:'مصور',phone:'01006789012',salaryPerOrder:200,active:true,totalOrders:0},{id:'emp7',name:'طارق رشاد',role:'كرين',phone:'01007890123',salaryPerOrder:250,active:true,totalOrders:0},{id:'emp8',name:'هاني سعيد',role:'كرين',phone:'01008901234',salaryPerOrder:250,active:true,totalOrders:0}];
      if(!users.length) users = [{username:'admin',password:'admin123',role:'admin',name:'مدير النظام'},{username:'ahmed',password:'emp123',role:'employee',employeeId:'emp1',name:'أحمد علي'}];
      if(!bookings.length) bookings = [{id:'b1',clientName:'محمد عبدالله',phone:'01012345678',hallId:'hall1',hallName:'المغلقة',date:new Date(new Date().getTime()+3*86400000).toISOString().slice(0,10),price:5000,deposit:2000,assignedEmployees:[],status:'pending',notes:'',paymentStatus:'pending'}];
      if(!Object.keys(equipmentInventory).length) equipmentInventory = {'cam1':{name:'كاميرا Sony A7',quantity:3,minStock:1,category:'تصوير'}};
      saveAllData();
      autoDistribute();
    }
    function loadData() {
      // عرض صفحة الدخول فوراً دون أي انتظار
      const savedUser = sessionStorage.getItem('vpms_user');
      if(savedUser) {
        currentUser = JSON.parse(savedUser);
        renderApp();
      } else {
        showLogin();
      }
      // تحميل البيانات في الخلفية
      let loadedCount = 0;
      const totalNodes = 11;
      function onData() {
        loadedCount++;
        if(loadedCount === totalNodes) {
          dataReady = true;
          if(!bookings.length && !employees.length && !halls.length) initDefaultData();
          bookings.forEach(b=>{ if(!b.status) b.status='pending'; if(!b.assignedEmployees) b.assignedEmployees=[]; });
          if(currentUser) renderApp(); // تحديث الواجهة بالبيانات
        }
      }
      db.ref('bookings').on('value', snap=>{ bookings=snap.val()||[]; onData(); });
      db.ref('employees').on('value', snap=>{ employees=snap.val()||[]; onData(); });
      db.ref('users').on('value', snap=>{ users=snap.val()||[]; onData(); });
      db.ref('halls').on('value', snap=>{ halls=snap.val()||[]; onData(); });
      db.ref('notifications').on('value', snap=>{ notifications=snap.val()||[]; onData(); });
      db.ref('swapRequests').on('value', snap=>{ swapRequests=snap.val()||[]; onData(); });
      db.ref('payrollArchive').on('value', snap=>{ payrollArchive=snap.val()||[]; onData(); });
      db.ref('employeeLoans').on('value', snap=>{ employeeLoans=snap.val()||{}; onData(); });
      db.ref('equipmentInventory').on('value', snap=>{ equipmentInventory=snap.val()||{}; onData(); });
      db.ref('companySettings').on('value', snap=>{ let v=snap.val(); if(v){ companyName=v.companyName||'Drmedia Pro'; companyLogo=v.companyLogo||'📷'; whatsappNumber=v.whatsappNumber||''; if(v.themeSettings) themeSettings={...themeSettings,...v.themeSettings}; applyTheme(); } onData(); });
      db.ref('emergencyMode').on('value', snap=>{ emergencyMode=snap.val()===true; onData(); });
    }
    // Online/Offline status
    function updateOnlineStatus() { const div=document.getElementById('onlineStatus'); if(navigator.onLine) { div.innerHTML='<i class="fas fa-wifi"></i> متصل'; div.classList.remove('offline'); } else { div.innerHTML='<i class="fas fa-plug"></i> غير متصل (بيانات محلية)'; div.classList.add('offline'); } }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    
    // Expose globals for onclick
    window.exportBackupManual = exportBackupManual;
    window.importBackupFromFile = importBackupFromFile;
    window.clearOldBackups = clearOldBackups;
    window.sendNotificationFromUI = sendNotificationFromUI;
    window.loginWithBiometric = loginWithBiometric;
    window.toggleVoiceCommand = toggleVoiceCommand;
    window.deactivateEmergency = deactivateEmergency;
    window.activateEmergencyMode = activateEmergencyMode;
    window.autoDistribute = autoDistribute;
    window.closeModal = closeModal;
    window.doLogin = doLogin;
    window.logout = logout;
    window.showNotificationPanel = showNotificationPanel;
    window.markNotificationRead = (id) => { let n=notifications.find(x=>x.id==id); if(n) n.read=true; saveAllData(); renderNotificationBadge(); showNotificationPanel(); };
    window.markAllNotificationsRead = () => { notifications.forEach(n=>{ if(n.userId===currentUser?.employeeId) n.read=true; }); saveAllData(); renderNotificationBadge(); showNotificationPanel(); showMsg("تم تحديد الكل كمقروء"); };
    
    // Start everything
    loadData();
    startAutoBackup();
    loadRotationPointers();
    updateOnlineStatus();
    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(e=>console.warn);
  </script>
</body>
</html>
