    <style>
        :root {
            --primary: #16a34a;
            --primary-dark: #15803d;
            --danger: #dc2626;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --radius: 16px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* منع الشاشة البيضاء أثناء التحميل */
        #app:empty::before {
            content: 'جاري التحميل...';
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 1.5rem;
            color: var(--text-secondary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            white-space: nowrap;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            font-weight: 500;
            max-width: 90vw;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toast.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(-5px);
        }
        .toast.success {
            background: #059669;
        }
        .toast.error {
            background: #dc2626;
        }
        .toast.warning {
            background: #d97706;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1100;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 16px;
        }
        .modal.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: var(--card);
            border-radius: 24px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .modal.show .modal-content {
            transform: scale(1);
        }

        .tab-btn {
            padding: 10px 20px;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            background: #e5e7eb;
            margin-left: 4px;
            transition: all var(--transition);
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .tab-btn:hover {
            background: #d1d5db;
        }
        .tab-btn.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 -2px 8px rgba(22, 163, 74, 0.2);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-secondary {
            background-color: #2563eb;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition);
            font-size: 0.85rem;
        }
        .btn-secondary:hover {
            background-color: #1d4ed8;
        }
        .btn-danger {
            background-color: var(--danger);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition);
            font-size: 0.85rem;
        }
        .btn-danger:hover {
            background-color: #b91c1c;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }
        .status-completed {
            background: #d1fae5;
            color: #065f46;
        }
        .status-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .calendar-day {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
            min-width: 36px;
        }
        .calendar-day:hover {
            background: #f0fdf4;
            border-color: var(--primary);
        }
        .calendar-day.booked {
            background: #d1fae5;
            border-color: #86efac;
            font-weight: 700;
        }
        .calendar-day.today {
            background: #dbeafe;
            border-color: #93c5fd;
            font-weight: 700;
        }

        .stat-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            cursor: default;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }
        .stat-card .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .online-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: 6px;
            animation: pulse 2s infinite;
        }
        .online {
            background-color: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }
        .offline {
            background-color: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 15px 0;
            align-items: center;
        }
        .search-input {
            border: 2px solid #e5e7eb;
            border-radius: 40px;
            padding: 8px 18px;
            width: 240px;
            transition: border-color 0.2s;
            font-size: 0.9rem;
            outline: none;
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
        }

        .preview-table {
            max-height: 400px;
            overflow: auto;
            font-size: 13px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }
        .preview-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .preview-table th {
            background: #f9fafb;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .preview-table th,
        .preview-table td {
            border: 1px solid #e5e7eb;
            padding: 8px 10px;
            text-align: right;
        }
        .preview-table tr:hover {
            background: #f9fafb;
        }

        .tab-pane {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bg-card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: var(--shadow);
            transition: background var(--transition), color var(--transition);
        }

        footer {
            background: #1f2937;
            color: #9ca3af;
            text-align: center;
            padding: 16px;
            font-size: 0.8rem;
            margin-top: 40px;
            border-radius: 16px 16px 0 0;
        }

        .hidden {
            display: none !important;
        }

        /* تحسينات الموبايل */
        @media (max-width: 640px) {
            .stat-card {
                padding: 14px;
            }
            .stat-card .stat-value {
                font-size: 1.5rem;
            }
            .tab-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .btn-primary,
            .btn-secondary,
            .btn-danger {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .modal-content {
                padding: 16px;
                border-radius: 20px;
            }
            .search-input {
                width: 100%;
            }
        }

        /* شريط التمرير مخصص */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        /* تحسينات الوضع الداكن */
        body.dark {
            --bg: #1e1e2f;
            --card: #2d2d3a;
            --text: #e5e7eb;
            --text-secondary: #9ca3af;
            --border: #404050;
        }
        body.dark input,
        body.dark select,
        body.dark textarea {
            background: #3a3a4a;
            color: #e5e7eb;
            border-color: #555;
        }
        body.dark .tab-btn {
            background: #3a3a4a;
            color: #e5e7eb;
        }
        body.dark .tab-btn.active {
            background: var(--primary);
        }
        body.dark .calendar-day {
            background: #2d2d3a;
            border-color: #444;
        }
        body.dark .calendar-day.booked {
            background: #065f46;
        }
    </style>
</head>
<body>

        <div class="modal-content" id="modalContent"></div>
    </div>
    <div id="app"></div>

    <script>
        // ==================== إعدادات Firebase ====================
        const firebaseConfig = {
            apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
            authDomain: "drmedia-vpms.firebaseapp.com",

            appId: "1:681162512380:web:ab2482f3234d8b59fc4479"
        };

        // ==================== المتغيرات العامة ====================
        let useFirebase = false,
            db = null,
            online = true,
            lastSync = null;
        let currentUser = null;
        let companyName = 'درميديا برو بلس';
        let companyLogo = '📷';
        let companyLogoBase64 = null;

        let bookings = [],
            employees = [],
            halls = [],
            clients = [],
            equipmentInventory = {},
            attendanceRecords = [],
            payrollArchive = [],
            employeeLoans = {},
            notifications = [],
            trashBin = [];
        let USERS = [
            { id: 'admin1', username: 'ahmed', password: '1994', role: 'admin', name: 'مدير النظام' },
            { id: 'emp1', username: 'ahmed_emp', password: 'emp123', role: 'employee', employeeId: 'emp1',
                name: 'أحمد الموظف' },
            { id: 'agent1', username: 'agent', password: 'agent123', role: 'agent', name: 'وكيل المبيعات' }
        ];
        let appTheme = "light";
        let appLanguage = "ar";
        let distributionMode = 'smart';
        let rotationCounters = { dir: 0, ph: 0, cr: 0 };
        let whatsappEnabled = true;
        let whatsappBusinessNumber = "201001234567";
        let whatsappMessageTemplate =
        "مرحباً {name}، تم توزيع أوردر {client} في {date} بقاعة {hall}";
        let browserNotifications = false;
        let html5QrCode = null;
        let importedDataRows = [];
        let backupIntervalIdGlobal = null;

        // ==================== الترجمة ====================
        const translations = {
            ar: { dashboard: "📊 الرئيسية", bookings: "📅 الحجوزات", employees: "👥 الموظفين", halls: "🏛️ القاعات",
                clients: "👥 العملاء", equipment: "📦 المعدات", attendance: "📋 الحضور", payroll: "💰 المرتبات",
                calendar: "📆 التقويم", distribution: "⚙️ التوزيع", reports: "📊 التقارير",
                advancedReports: "📈 تقارير متقدمة", notifications: "🔔 الإشعارات", users: "👥 المستخدمين",
                trash: "🗑️ سلة المحذوفات", internet: "🌐 الإنترنت", settings: "⚙️ الإعدادات", myOrders: "أوردراتي",
                hallType: "نوع القاعة", date: "التاريخ", salaryPaid: "تم صرف المرتب", reminder: "تذكير بأوردر اليوم",
                orderDistributed: "تم توزيع أوردر عليك", loading: "جاري التحميل...", noData: "لا توجد بيانات",
                confirm: "تأكيد", cancel: "إلغاء", save: "حفظ", delete: "حذف", edit: "تعديل", add: "إضافة" },
            en: { dashboard: "📊 Dashboard", bookings: "📅 Bookings", employees: "👥 Employees", halls: "🏛️ Halls",
                clients: "👥 Clients", equipment: "📦 Equipment", attendance: "📋 Attendance", payroll: "💰 Payroll",
                calendar: "📆 Calendar", distribution: "⚙️ Distribution", reports: "📊 Reports",
                advancedReports: "📈 Advanced Reports", notifications: "🔔 Notifications", users: "👥 Users",
                trash: "🗑️ Trash", internet: "🌐 Internet", settings: "⚙️ Settings", myOrders: "My Orders",
                hallType: "Hall Type", date: "Date", salaryPaid: "Salary paid", reminder: "Order reminder today",
                orderDistributed: "New order assigned", loading: "Loading...", noData: "No data",
                confirm: "Confirm", cancel: "Cancel", save: "Save", delete: "Delete", edit: "Edit", add: "Add" }
        };

        function t(key) { return (translations[appLanguage] && translations[appLanguage][key]) || translations.ar[
                key] || key; }

        // ==================== دوال العرض والإشعارات ====================
        function showMsg(msg, type = 'success') {
            const tEl = document.getElementById('toast');
            if (!tEl) return;
            tEl.textContent = msg;
            tEl.className = 'toast ' + type + ' show';
            clearTimeout(tEl._timeout);
            tEl._timeout = setTimeout(() => {
                tEl.classList.remove('show');
                tEl.className = 'toast';
            }, 3500);
        }

        function showError(msg) { showMsg(msg, 'error'); }

        function showWarning(msg) { showMsg(msg, 'warning'); }

        function closeModal() {
            const modal = document.getElementById('modal');
            if (modal) {
                modal.classList.remove('show');
                document.body.style.overflow = '';
            }
        }

        function openModal(content) {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            if (!modal || !modalContent) return;
            modalContent.innerHTML = content;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
            // إغلاق المودال بالنقر على الخلفية
            modal.onclick = function(e) {
                if (e.target === modal) closeModal();
            };
        }

        // ==================== تطبيق الثيم ====================
        function applyTheme(theme) {
            appTheme = theme;
            document.body.className = '';
            if (theme === 'dark') {
                document.body.classList.add('dark');
            }
            // تحديث متغيرات CSS حسب الثيم
            const root = document.documentElement;
            if (theme === 'dark') {
                root.style.setProperty('--bg', '#1e1e2f');
                root.style.setProperty('--card', '#2d2d3a');
                root.style.setProperty('--text', '#e5e7eb');
                root.style.setProperty('--text-secondary', '#9ca3af');
                root.style.setProperty('--border', '#404050');
            } else if (theme === 'blue') {
                root.style.setProperty('--primary', '#2563eb');
                root.style.setProperty('--primary-dark', '#1d4ed8');
                root.style.setProperty('--bg', '#eff6ff');
                root.style.setProperty('--card', '#ffffff');
            } else if (theme === 'green') {
                root.style.setProperty('--primary', '#059669');
                root.style.setProperty('--primary-dark', '#047857');
                root.style.setProperty('--bg', '#ecfdf5');
                root.style.setProperty('--card', '#ffffff');
            } else {
                root.style.setProperty('--primary', '#16a34a');
                root.style.setProperty('--primary-dark', '#15803d');
                root.style.setProperty('--bg', '#f3f4f6');
                root.style.setProperty('--card', '#ffffff');
                root.style.setProperty('--text', '#1f2937');
                root.style.setProperty('--text-secondary', '#6b7280');
                root.style.setProperty('--border', '#e5e7eb');
            }
        }

        // ==================== التعامل مع البيانات والتخزين ====================
        function safeGetLocal(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch (e) {
                return fallback;
            }
        }

        function safeSetLocal(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
                return true;
            } catch (e) {
                showWarning('مساحة التخزين المحلية ممتلئة، قد لا يتم حفظ بعض البيانات.');
                return false;
            }
        }

        async function saveAllData() {
            const fullData = {
                bookings,
                employees,
                halls,
                clients,
                equipmentInventory,
                attendanceRecords,
                payrollArchive,
                employeeLoans,
                notifications,
                trashBin,
                companyName,
                companyLogo: companyLogoBase64 || companyLogo,
                USERS,
                rotationCounters,
                whatsappEnabled,
                whatsappBusinessNumber,
                whatsappMessageTemplate,
                appTheme,
                appLanguage
            };
            safeSetLocal('drmedia_data', fullData);

            if (useFirebase && db && online) {
                try {
                    await db.ref('/').set(fullData);
                    lastSync = new Date();
                    online = true;
                } catch (e) {
                    online = false;
                    console.warn('تعذر الاتصال بـ Firebase، تم الحفظ محلياً فقط');
                }
            }
            applyTheme(appTheme);
        }

        async function loadAllData() {
            let loaded = false;
            if (useFirebase && db) {
                try {
                    const snap = await db.ref('/').get();
                    if (snap.exists()) {
                        const d = snap.val();
                        loadDataObject(d);
                        online = true;
                        lastSync = new Date();
                        loaded = true;
                        console.log('✅ تم تحميل البيانات من Firebase');
                    }
                } catch (e) {
                    console.warn('تعذر الاتصال بـ Firebase، جاري التحميل من التخزين المحلي');
                    online = false;
                }
            }

            if (!loaded) {
                const raw = safeGetLocal('drmedia_data', null);
                if (raw) {
                    loadDataObject(raw);
                    console.log('✅ تم تحميل البيانات من التخزين المحلي');
                } else {
                    initializeDefaultData();
                    console.log('ℹ️ تم تهيئة البيانات الافتراضية');
                }
            }

            // ضمان وجود بيانات أساسية
            ensureMinimumData();
            updateEmployeeOrders();
            await saveAllData();
            applyTheme(appTheme);
        }

        function loadDataObject(d) {
            bookings = d.bookings || [];
            employees = d.employees || [];
            halls = d.halls || [];
            clients = d.clients || [];
            equipmentInventory = d.equipmentInventory || {};
            attendanceRecords = d.attendanceRecords || [];
            payrollArchive = d.payrollArchive || [];
            employeeLoans = d.employeeLoans || {};
            notifications = d.notifications || [];
            trashBin = d.trashBin || [];
            companyName = d.companyName || companyName;
            if (d.companyLogo && d.companyLogo.startsWith('data:image')) companyLogoBase64 = d.companyLogo;
            else companyLogo = d.companyLogo || companyLogo;
            USERS = d.USERS || USERS;
            rotationCounters = d.rotationCounters || { dir: 0, ph: 0, cr: 0 };
            whatsappEnabled = d.whatsappEnabled !== undefined ? d.whatsappEnabled : true;

        function updateEmployeeOrders() {
            if (!employees || !bookings || !attendanceRecords) return;
            employees.forEach(emp => {
                let count = 0;
                bookings.forEach(b => {
                    if (b.status !== 'cancelled' && !b.deleted &&
                        (b.assignedEmployees || []).includes(emp.id)) {
                        const attended = attendanceRecords.some(a => a.empId === emp.id && a.date ===
                            b.date && a.checkIn);
                        if (attended) count++;
                    }
                });
                emp.totalOrders = count;
            });
        }

        function sendWhatsApp(phone, message) {
            if (!whatsappEnabled || !phone) return;
            let clean = phone.replace(/[^0-9+]/g, '');
            if (clean.startsWith('0')) clean = '2' + clean;
            if (!clean.startsWith('+')) clean = '+' + clean;
            window.open(`https://wa.me/${clean}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function notifyEmployee(emp, title, body, sendWhatsAppMsg = true) {
            if (!emp || !emp.id) return;
            notifications.unshift({
                id: generateId('notif_'),
                title,
                body,
                date: new Date().toLocaleString('ar-EG'),
                recipient: emp.id
            });
            if (sendWhatsAppMsg && emp.phone) {
                sendWhatsApp(emp.phone, `${title}\n${body}`);
            }
            saveAllData();
            if (browserNotifications && 'Notification' in window && Notification.permission === 'granted') {
                try { new Notification(title, { body, icon: companyLogoBase64 || null }); } catch (e) {}
            }
        }

                    (b.assignedEmployees || []).forEach(empId => {

        // ==================== الحضور و QR ====================
        async function checkIn(empId) {
            const today = getTodayDateStr();
            const existing = attendanceRecords.find(a => a.empId === empId && a.date === today);
            if (existing && existing.checkIn) {
                showWarning('⚠️ تم تسجيل الحضور مسبقاً');
                return;
            }
            const time = new Date().toLocaleTimeString('ar-EG');
            if (existing) {
                existing.checkIn = time;
                existing.status = 'present';
            } else {
                attendanceRecords.push({
                    id: generateId('att_'),
                    empId,
                    date: today,
                    checkIn: time,
                    checkOut: null,
                    status: 'present'
                });
            }
            await saveAllData();
            updateEmployeeOrders();
            showMsg(`✅ تم تسجيل الحضور - ${time}`);
            refreshCurrentView();
        }

        async function checkOut(empId) {
            const today = getTodayDateStr();
            const rec = attendanceRecords.find(a => a.empId === empId && a.date === today);
            if (!rec || !rec.checkIn) {
                showWarning('⚠️ لم يتم تسجيل الحضور بعد');
                return;
            }
            if (rec.checkOut) {
                showWarning('⚠️ تم تسجيل الانصراف مسبقاً');
                return;
            }
            rec.checkOut = new Date().toLocaleTimeString('ar-EG');
            await saveAllData();
            showMsg(`✅ تم تسجيل الانصراف - ${rec.checkOut}`);
            refreshCurrentView();
        }

        // ==================== نظام التوزيع الذكي ====================
        async function autoDistributeWithNotify() {
            const pending = bookings.filter(b => b.status === 'pending' && !b.deleted);
            if (!pending.length) {
                showWarning('لا توجد حجوزات معلقة للتوزيع');
                return;
            }
            const oldAssignments = pending.map(b => ({ id: b.id, assigned: [...(b.assignedEmployees || [])] }));
            const dirs = employees.filter(e => e.role === 'مخرج' && e.active);
            const phs = employees.filter(e => e.role === 'مصور' && e.active);
            const crs = employees.filter(e => e.role === 'كرين' && e.active);

            if (!dirs.length && !phs.length && !crs.length) {
                showWarning('لا يوجد موظفين نشطين للتوزيع');
                return;
            }

            let dirIdx = rotationCounters.dir || 0;
            let phIdx = rotationCounters.ph || 0;
            let crIdx = rotationCounters.cr || 0;
            const daily = {};

            for (let b of pending) {
                const date = b.date;
                if (!daily[date]) daily[date] = { dirs: new Set(), phs: new Set(), crs: new Set() };
                const hall = halls.find(h => h.id === b.hallId);
                const type = hall ? hall.type : 'closed';
                let assigned = [];

                if (type === 'cafe') {
                    if (phs.length) {
                        let found = false;
                        for (let i = 0; i < phs.length; i++) {
                            const idx = (phIdx + i) % phs.length;
                            if (!daily[date].phs.has(phs[idx].id)) {
                                assigned.push(phs[idx].id);
                                daily[date].phs.add(phs[idx].id);
                                phIdx = idx + 1;
                                found = true;
                                break;
                            }
                        }
                        if (!found && phs.length) {
                            assigned.push(phs[phIdx % phs.length].id);
                            daily[date].phs.add(phs[phIdx % phs.length].id);
                            phIdx++;
                        }
                    }
                } else {
                    if (dirs.length) {
                        let found = false;
                        for (let i = 0; i < dirs.length; i++) {
                            const idx = (dirIdx + i) % dirs.length;
                            if (!daily[date].dirs.has(dirs[idx].id)) {
                                assigned.push(dirs[idx].id);
                                daily[date].dirs.add(dirs[idx].id);
                                dirIdx = idx + 1;
                                found = true;
                                break;
                            }
                        }
                        if (!found && dirs.length) {
                            assigned.push(dirs[dirIdx % dirs.length].id);
                            daily[date].dirs.add(dirs[dirIdx % dirs.length].id);
                            dirIdx++;
                        }
                    }
                    if (phs.length) {
                        let added = 0;
                        for (let i = 0; i < phs.length * 2 && added < 2; i++) {
                            const idx = (phIdx + i) % phs.length;
                            if (!daily[date].phs.has(phs[idx].id)) {
                                assigned.push(phs[idx].id);
                                daily[date].phs.add(phs[idx].id);
                                added++;
                                if (added === 1) phIdx = idx + 1;
                            }
                        }
                    }
                    if (crs.length) {
                        let found = false;
                        for (let i = 0; i < crs.length; i++) {
                            const idx = (crIdx + i) % crs.length;
                            if (!daily[date].crs.has(crs[idx].id)) {
                                assigned.push(crs[idx].id);
                                daily[date].crs.add(crs[idx].id);
                                crIdx = idx + 1;
                                found = true;
                                break;
                            }
                        }
                        if (!found && crs.length) {
                            assigned.push(crs[crIdx % crs.length].id);
                            daily[date].crs.add(crs[crIdx % crs.length].id);
                            crIdx++;
                        }
                    }
                }
                b.assignedEmployees = assigned;
            }

            if (distributionMode === 'rotation') {
                rotationCounters = { dir: dirIdx, ph: phIdx, cr: crIdx };
            }

            updateEmployeeOrders();
            await saveAllData();

            // إرسال الإشعارات
            for (let i = 0; i < pending.length; i++) {
                const b = pending[i];
                const old = oldAssignments.find(o => o.id === b.id);
                const oldAssigned = old ? old.assigned : [];
                const newAssigned = b.assignedEmployees || [];
                const newEmps = newAssigned.filter(id => !oldAssigned.includes(id));
                for (let empId of newEmps) {
                    const emp = employees.find(e => e.id === empId);
                    if (emp) {
                        const msg = whatsappMessageTemplate
                            .replace('{name}', emp.name)
                            .replace('{client}', b.clientName)
                            .replace('{date}', b.date)
                            .replace('{hall}', b.hallName);
                        notifyEmployee(emp, t('orderDistributed'), msg, true);
                    }
                }
            }

            renderBookings();
            renderDistribution();
            showMsg(`✅ تم توزيع ${pending.length} حجز بنجاح`);
        }

        async function saveManualAssign(bookingId) {

            const selected = Array.from(selectEl.selectedOptions).map(opt => opt.value);
            const booking = bookings.find(b => b.id === bookingId);

                const old = [...(booking.assignedEmployees || [])];

                updateEmployeeOrders();
                await saveAllData();
                const newEmps = selected.filter(id => !old.includes(id));

                    const emp = employees.find(e => e.id === empId);

                showMsg('✅ تم التعيين اليدوي');

        async function previewImportFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            let rows = [];

            try {
                if (ext === 'xlsx' || ext === 'xls') {
                    const data = await file.arrayBuffer();
                    const workbook = XLSX.read(data);
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    rows = XLSX.utils.sheet_to_json(sheet);
                } else if (ext === 'csv') {
                    const text = await file.text();
                    const lines = text.split('\n');
                    if (lines.length < 2) throw new Error('ملف CSV فارغ');
                    const headers = lines[0].split(',').map(h => h.trim().replace(/["']/g, ''));
                    rows = lines.slice(1).filter(l => l.trim()).map(line => {
                        const vals = line.split(',').map(v => v.trim().replace(/["']/g, ''));
                        let obj = {};
                        headers.forEach((h, idx) => obj[h] = vals[idx] || '');
                        return obj;
                    });
                } else if (ext === 'pdf') {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let fullText = '';
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const strings = textContent.items.map(item => item.str);
                        fullText += strings.join(' ') + '\n';
                    }
                    rows = parsePDFText(fullText);
                } else {
                    showError('نوع الملف غير مدعوم. الملفات المدعومة: Excel, CSV, PDF');
                    return;
                }

                importedDataRows = rows;
                if (!rows.length) {
                    document.getElementById('importPreview').innerHTML =
                        '<p class="text-red-500">لم يتم العثور على بيانات صالحة في الملف</p>';
                    return;
                }
                const keys = Object.keys(rows[0] || {});
                document.getElementById('importPreview').innerHTML = `
                    <h4 class="font-bold mb-2 text-green-600">✅ تم العثور على ${rows.length} صف</h4>
                    <div class="overflow-auto max-h-60">
                        <table><thead><tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr></thead>
                        <tbody>${rows.slice(0, 15).map(r => `<tr>${keys.map(k => `<td>${r[k] || ''}</td>`).join('')}</tr>`).join('')}</tbody></table>
                    </div>
                    ${rows.length > 15 ? '<p class="text-xs text-gray-500 mt-1">... معاينة أول 15 صفاً فقط</p>' : ''}
                `;
            } catch (e) {

        function parsePDFText(fullText) {
            const rows = [];
            const lines = fullText.split(/\r?\n/);
            const dateRegex = /\d{4}[-\/]\d{1,2}[-\/]\d{1,2}|\d{1,2}[-\/]\d{1,2}[-\/]\d{4}/;
            for (let line of lines) {
                if (dateRegex.test(line)) {
                    const parts = line.split(/\s{2,}|\t/);
                    if (parts.length >= 4) {
                        rows.push({
                            'م': parts[0] || '',
                            'اليوم': parts[1] || '',
                            'التاريخ': parts[2] || '',
                            'اسم العميل': parts[3] || '',
                            'نوع الباكدج': parts[4] || '',
                            'اجمالي عدد الافراد': parts[5] || '0'
                        });
                    }
                }
            }
            return rows;
        }

        async function processImportFile() {
            if (!importedDataRows.length) {
                showError('لا توجد بيانات للاستيراد');
                return;
            }
            let added = 0;
            for (let row of importedDataRows) {
                let clientName = row['اسم العميل'] || row['client name'] || row['العميل'] || '';
                let dateRaw = row['التاريخ'] || row['date'] || '';
                let packageType = row['نوع الباكدج'] || row['package'] || '';
                let totalPersonsRaw = row['اجمالي عدد الافراد'] || row['total persons'] || row['عدد الافراد'] || '0';
                if (!clientName || !dateRaw) continue;

                let date = normalizeDate(dateRaw);
                let totalPersons = parseInt(totalPersonsRaw) || 0;
                let hall = halls.find(h => h.name.toLowerCase() === packageType.toLowerCase());
                if (!hall && packageType) {
                    hall = { id: generateId('h_'), name: packageType, type: 'open', basePrice: 0, active: true };
                    halls.push(hall);
                } else if (!hall) hall = halls[0];

                bookings.push({
                    id: generateId('b_'),
                    clientName,
                    clientId: null,
                    phone: '',
                    hallId: hall.id,
                    hallName: hall.name,
                    date,
                    price: hall.basePrice || 0,
                    status: 'pending',
                    paymentStatus: 'pending',
                    assignedEmployees: [],
                    notes: `نوع الباكدج: ${packageType}`,
                    packageType,
                    totalPersons
                });
                added++;
            }
            await saveAllData();
            renderBookings();
            closeModal();
            showMsg(`✅ تم استيراد ${added} حجز بنجاح`);
            importedDataRows = [];
        }

        function normalizeDate(dateRaw) {
            if (!dateRaw) return getTodayDateStr();
            if (dateRaw.match(/^\d{4}-\d{2}-\d{2}$/)) return dateRaw;
            let parts = dateRaw.split(/[-/]/);
            if (parts.length === 3) {
                if (parts[0].length === 4) return `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
                else return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
            }
            return getTodayDateStr();
        }

        async function processPayrollForEmp(empId, net) {
            if (net <= 0) { showWarning('لا يوجد صافي مستحق للصرف'); return; }
            const emp = employees.find(e => e.id === empId);
            if (!emp) return;
            if (confirm(`تأكيد صرف مبلغ ${net.toLocaleString()} ج.م للموظف ${emp.name}؟`)) {
                payrollArchive.push({
                    id: generateId('pay_'),
                    empId,
                    empName: emp.name,
                    amount: net,
                    date: getTodayDateStr(),
                    orders: emp.totalOrders
                });
                if (employeeLoans[empId]) {
                    employeeLoans[empId].forEach(l => { if (!l.settled) l.settled = true; });
                }
                emp.totalOrders = 0;
                await saveAllData();
                renderPayroll();
                notifyEmployee(emp, t('salaryPaid'), `تم صرف مرتبك بمبلغ ${net.toLocaleString()} ج.م`, true);
                showMsg(`✅ تم صرف ${net.toLocaleString()} ج.م`);
            }
        }

        function renderCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = getTodayDateStr();
            const monthNames = ['يناير', 'فبراير', 'مارس', 'إبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر',
                'نوفمبر', 'ديسمبر'
            ];
            const dayNames = ['أحد', 'إثنين', 'ثلاثاء', 'أربعاء', 'خميس', 'جمعة', 'سبت'];
            let html =
                `<div class="bg-card p-4 rounded-2xl shadow"><h2 class="text-xl font-bold mb-3">📆 ${t('calendar')} - ${monthNames[month]} ${year}</h2><div class="calendar-grid">`;
            html += dayNames.map(d => `<div class="font-bold text-center text-sm py-2">${d}</div>`).join('');
            for (let i = 0; i < firstDay; i++) html += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr =
                    `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasBooking = bookings.some(b => b.date === dateStr && b.status !== 'cancelled');
                const isToday = dateStr === today;
                html +=
                    `<div class="calendar-day ${hasBooking ? 'booked' : ''} ${isToday ? 'today' : ''}" onclick="showDayBookings('${dateStr}')" title="${hasBooking ? 'يوجد حجوزات' : 'لا يوجد'}">${d}</div>`;
            }
            html += '</div></div>';
            const calendarEl = document.getElementById('calendar');
            if (calendarEl) calendarEl.innerHTML = html;
        }

            const dayBookings = bookings.filter(b => b.date === dateStr && b.status !== 'cancelled');

            openModal(`

            const target = document.getElementById('notifyEmployeeSelect')?.value;
            const title = '📢 إشعار من الإدارة';
            if (target === 'all') {
                for (let emp of employees) notifyEmployee(emp, title, msg, true);
                showMsg('✅ تم إرسال الإشعار لجميع الموظفين');
            } else {

        async function addUser() {
            const username = document.getElementById('newUsername')?.value.trim();
            const password = document.getElementById('newPassword')?.value;
            const role = document.getElementById('newRole')?.value;
            const name = document.getElementById('newName')?.value.trim();
            if (!username || !password || !name) { showError('جميع الحقول مطلوبة'); return; }
            if (USERS.find(u => u.username === username)) { showError('اسم المستخدم موجود مسبقاً'); return; }
            USERS.push({ id: generateId('user_'), username, password, role, name, employeeId: null });
            await saveAllData();
            renderUsers();
            closeModal();
            showMsg('✅ تمت إضافة المستخدم');
        }

        async function editUser(id) {
            const user = USERS.find(u => u.id === id);
            if (!user) return;
            openModal(`
                <h3 class="text-xl font-bold mb-4">✏️ تعديل مستخدم</h3>
                <div class="space-y-3">
                    <input id="editUsername" value="${user.username}" class="w-full border-2 p-3 rounded-xl">

                        <option value="employee" ${user.role === 'employee' ? 'selected' : ''}>👤 موظف</option>
                        <option value="agent" ${user.role === 'agent' ? 'selected' : ''}>🤝 وكيل</option>
                    </select>
                    <input id="editName" value="${user.name}" class="w-full border-2 p-3 rounded-xl">
                    <div class="flex gap-2">

                </div>
            `);
        }

        async function saveEditUser(id) {
            const user = USERS.find(u => u.id === id);
            if (!user) return;
            user.username = document.getElementById('editUsername')?.value || user.username;
            const newPass = document.getElementById('editPassword')?.value;
            if (newPass) user.password = newPass;
            user.role = document.getElementById('editRole')?.value || user.role;
            user.name = document.getElementById('editName')?.value || user.name;
            if (user.role !== 'employee' && user.employeeId) {
                const emp = employees.find(e => e.id === user.employeeId);
                if (emp) emp.userId = null;
                user.employeeId = null;
            }
            await saveAllData();
            renderUsers();
            closeModal();
            showMsg('✅ تم تعديل المستخدم');
        }

        function deleteSelectedUsers() {
            const selected = Array.from(document.querySelectorAll('.userCheckbox:checked')).map(cb => cb.dataset.id);
            if (!selected.length) { showWarning('اختر مستخدمين للحذف'); return; }
            if (confirm(`تأكيد حذف ${selected.length} مستخدم؟`)) {
                USERS = USERS.filter(u => !selected.includes(u.id));
                saveAllData();
                renderUsers();
                showMsg(`✅ تم حذف ${selected.length} مستخدم`);
            }
        }

        async function restoreItem(id) {
            const idx = trashBin.findIndex(t => t.id === id);
            if (idx !== -1) {
                const item = trashBin[idx];
                if (item.type === 'booking') bookings.push(item.data);
                else if (item.type === 'employee') employees.push(item.data);
                else if (item.type === 'client') clients.push(item.data);
                trashBin.splice(idx, 1);
                await saveAllData();
                renderTrash();
                showMsg('✅ تمت استعادة العنصر');
            }
        }

        async function manualSync() {
            showMsg('جاري المزامنة...');
            if (useFirebase && db) {
                try {
                    const fullData = { bookings, employees, halls, clients, equipmentInventory, attendanceRecords,
                        payrollArchive, employeeLoans, notifications, trashBin, companyName, companyLogo: companyLogoBase64 ||
                            companyLogo, USERS, rotationCounters, whatsappEnabled, whatsappBusinessNumber,
                        whatsappMessageTemplate, appTheme, appLanguage };
                    await db.ref('/').set(fullData);
                    online = true;
                    lastSync = new Date();
                    showMsg('✅ تمت المزامنة بنجاح');

                if (!file) return;
                const reader = new FileReader();

                    companyLogoBase64 = ev.target.result;
                    saveAllData();

                reader.readAsDataURL(file);
            };
            input.click();

                            data: {
                                labels: ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو'],
                                datasets: [{
                                    label: 'عدد الحجوزات',
                                    data: [5, 8, 12, 15, 20, 25],
                                    backgroundColor: '#16a34a'
                                }]
                            },
                            options: { responsive: true }
                        });
                    }
                } catch (e) { /* تجاهل */ }
            }, 300);
        }

        function switchTab(tabId) {
            const renderFunctions = {
                bookings: renderBookings,
                employees: renderEmployees,
                halls: renderHalls,
                clients: renderClients,
                equipment: renderEquipment,
                attendance: renderAttendance,
                payroll: renderPayroll,
                calendar: renderCalendar,
                distribution: renderDistribution,
                reports: renderReports,
                advancedReports: renderAdvancedReports,
                notifications: renderNotificationsTab,
                users: renderUsers,
                trash: renderTrash,
                internet: renderInternet,
                settings: renderSettings
            };
            if (renderFunctions[tabId]) renderFunctions[tabId]();
        }

        // ==================== تسجيل الدخول والخروج ====================
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-700 to-teal-600 p-4">
                    <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
                        <div class="text-5xl mb-3">${companyLogoBase64 ? `<img src="${companyLogoBase64}" class="h-16 mx-auto rounded-full">` : companyLogo}</div>
                        <h1 class="text-2xl font-bold text-gray-800 mb-1">${companyName}</h1>
                        <p class="text-gray-500 mb-6 text-sm">نظام إدارة القاعات المتكامل</p>
                        <div class="space-y-3">
                            <input type="text" id="loginUser" placeholder="👤 اسم المستخدم" class="w-full border-2 p-3 rounded-xl text-center" autocomplete="username">
                            <input type="password" id="loginPass" placeholder="🔒 كلمة المرور" class="w-full border-2 p-3 rounded-xl text-center" autocomplete="current-password">
                            <button id="loginBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold transition">دخول</button>
                        </div>
                        <div class="text-xs text-gray-400 mt-6">
                            <p>مدير: ahmed / 1994</p>
                            <p>موظف: ahmed_emp / emp123</p>
                            <p>وكيل: agent / agent123</p>
                        </div>
                    </div>
                </div>`;
            document.getElementById('loginBtn').addEventListener('click', doLogin);
            document.getElementById('loginPass').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') doLogin();
            });
        }

        function doLogin() {
            const username = document.getElementById('loginUser')?.value.trim();
            const password = document.getElementById('loginPass')?.value;
            if (!username || !password) {
                showError('يرجى إدخال اسم المستخدم وكلمة المرور');
                return;
            }
            const user = USERS.find(u => u.username === username && u.password === password);
            if (user) {
                currentUser = user;
                sessionStorage.setItem('drmedia_user', JSON.stringify(user));
                showMsg(`👋 مرحباً ${user.name}`);
                if (user.role === 'admin') renderAdminDashboard();
                else if (user.role === 'employee') {
                    if (!user.employeeId) {
                        showError('هذا المستخدم غير مرتبط بموظف. راجع المدير.');
                        renderLogin();
                        return;
                    }
                    renderEmployeeDashboard();
                } else if (user.role === 'agent') renderAgentDashboard();
                requestNotificationPermission();
                checkReminders();
            } else {
                showError('❌ اسم المستخدم أو كلمة المرور غير صحيحة');
            }
        }

        function logout() {
            sessionStorage.removeItem('drmedia_user');
            currentUser = null;
            if (backupIntervalIdGlobal) clearInterval(backupIntervalIdGlobal);
            renderLogin();
            showMsg('👋 تم تسجيل الخروج');
        }

        // ==================== بدء التشغيل ====================
        async function initApp() {
            // تهيئة Firebase
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                useFirebase = true;
                online = true;
                console.log('✅ Firebase مهيأ');
            } catch (e) {
                console.warn('⚠️ تعذر تهيئة Firebase، سيتم العمل محلياً:', e.message);
                useFirebase = false;
                online = false;
            }

            // تحميل البيانات
            await loadAllData();
            applyTheme(appTheme);

            // التحقق من جلسة المستخدم
            const savedUser = sessionStorage.getItem('drmedia_user');
            if (savedUser && savedUser !== 'undefined') {
                try {
                    currentUser = JSON.parse(savedUser);
                    // التحقق من صحة المستخدم
                    const validUser = USERS.find(u => u.id === currentUser.id);
                    if (!validUser) {
                        sessionStorage.removeItem('drmedia_user');
                        currentUser = null;
                        renderLogin();
                        return;
                    }
                    currentUser = validUser;
                    if (isAdmin()) renderAdminDashboard();
                    else if (isEmployee()) {
                        if (!currentUser.employeeId) {
                            showError('حساب المستخدم غير مرتبط بموظف');
                            renderLogin();
                            return;
                        }
                        renderEmployeeDashboard();
                    } else renderAgentDashboard();
                    requestNotificationPermission();
                    checkReminders();
                } catch (e) {
                    sessionStorage.removeItem('drmedia_user');
                    currentUser = null;
                    renderLogin();
                }
            } else {
                renderLogin();
            }

            // طلب إذن الإشعارات
            requestNotificationPermission();

            // التذكيرات الدورية
            setInterval(checkReminders, 6 * 3600000);

            // النسخ الاحتياطي التلقائي
            setBackupPeriod('day');
        }

        // عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', initApp);

        // معالجة الأخطاء العامة
        window.addEventListener('error', function(e) {
            console.error('خطأ:', e.message);
            const app = document.getElementById('app');
            if (app && !app.innerHTML.trim()) {
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-4">
                        <div class="text-center">
                            <h2 class="text-2xl font-bold text-red-600 mb-2">⚠️ حدث خطأ</h2>
                            <p class="text-gray-600 mb-4">حدث خطأ أثناء تحميل التطبيق. يرجى تحديث الصفحة.</p>
                            <button onclick="location.reload()" class="btn-primary">🔄 تحديث الصفحة</button>
                        </div>
                    </div>`;
            }
        });

        console.log('🚀 درميديا برو بلس - جاهز للتشغيل');
    </script>
</body>
</html>
