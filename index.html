<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drmedia Pro | Stable V1</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background:#f3f4f6; }
.tab-content { display:none; }
.tab-content.active { display:block; }
</style>
</head>

<body>

<div id="app"></div>

<script>
// ================= FIREBASE SAFE INIT =================
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "drmedia-vpms.firebaseapp.com",
    databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
    projectId: "drmedia-vpms"
};

let db = null;
try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
} catch(e){
    console.log("Firebase init error:", e.message);
}

// ================= DATA SAFETY =================
let users = [];
let employees = [];
let bookings = [];
let currentUser = null;
let currentTab = "dashboard";

// ================= DEFAULT DATA =================
function initData(){
users = [
{username:"admin",password:"admin123",role:"admin",name:"Admin"},
{username:"emp",password:"123",role:"employee",employeeId:"e1",name:"Employee"}
];

employees = [
{id:"e1",name:"Ahmed",role:"Photographer",salary:200,active:true}
];

bookings = [
{id:"b1",clientName:"Mohamed",date:"2026-04-22",hallName:"Hall A",price:2000,assignedEmployees:["e1"]}
];
}

// ================= LOGIN =================
function loginPage(){
document.getElementById("app").innerHTML=`
<div class="h-screen flex items-center justify-center">
<div class="bg-white p-6 rounded-xl shadow w-80">
<h2 class="text-xl font-bold mb-3">Login</h2>

<input id="u" class="border p-2 w-full mb-2" placeholder="User">
<input id="p" type="password" class="border p-2 w-full mb-3" placeholder="Pass">

<button onclick="login()" class="bg-green-600 text-white w-full p-2 rounded">
Login
</button>
</div>
</div>`;
}

function login(){
const u=document.getElementById("u").value;
const p=document.getElementById("p").value;

const user=users.find(x=>x.username===u && x.password===p);

if(!user){
alert("Invalid login");
return;
}

currentUser=user;
renderApp();
}

// ================= APP =================
function renderApp(){
if(!currentUser){
loginPage();
return;
}

if(currentUser.role==="admin") adminDashboard();
else employeeDashboard();
}

// ================= LAYOUT =================
function layout(content){

document.getElementById("app").innerHTML=`
<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 bg-gray-900 text-white p-4">

<h2 class="text-lg font-bold mb-4">Drmedia Pro</h2>

<button onclick="switchTab('dashboard')" class="block w-full text-right p-2 hover:bg-gray-700">📊 Dashboard</button>
<button onclick="switchTab('employees')" class="block w-full text-right p-2 hover:bg-gray-700">👥 Employees</button>
<button onclick="switchTab('bookings')" class="block w-full text-right p-2 hover:bg-gray-700">📅 Bookings</button>
<button onclick="switchTab('reports')" class="block w-full text-right p-2 hover:bg-gray-700">📊 Reports</button>

<hr class="my-3">

<button onclick="logout()" class="bg-red-600 w-full p-2 rounded">
Logout
</button>

</div>

<!-- CONTENT -->
<div class="flex-1 p-4 overflow-auto">
${content}
</div>

</div>`;
}

// ================= SWITCH TAB =================
function switchTab(tab){
currentTab=tab;
renderTabs();
}

// ================= ADMIN =================
function adminDashboard(){

layout(`

<div id="dashboard" class="tab-content active">
<h1 class="text-2xl font-bold mb-4">Dashboard</h1>

<div class="grid grid-cols-3 gap-4">

<div class="bg-white p-4 rounded shadow">
Employees: ${employees.length}
</div>

<div class="bg-white p-4 rounded shadow">
Bookings: ${bookings.length}
</div>

<div class="bg-white p-4 rounded shadow">
Revenue: ${bookings.reduce((a,b)=>a+b.price,0)}
</div>

</div>
</div>

<div id="employees" class="tab-content">
<h2 class="text-xl font-bold">Employees</h2>

<div class="bg-white p-3 mt-3 rounded">
${employees.map(e=>`
<div class="border p-2 mb-2 rounded">
${e.name} - ${e.role}
</div>
`).join("")}
</div>
</div>

<div id="bookings" class="tab-content">
<h2 class="text-xl font-bold">Bookings</h2>

<div class="bg-white p-3 mt-3 rounded">
${bookings.map(b=>`
<div class="border p-2 mb-2 rounded">
${b.clientName} - ${b.date} - ${b.price}
</div>
`).join("")}
</div>
</div>

<div id="reports" class="tab-content">
<h2 class="text-xl font-bold">Reports</h2>

<div class="bg-white p-3 mt-3 rounded">
Total Revenue: ${bookings.reduce((a,b)=>a+b.price,0)}
</div>
</div>

`);

renderTabs();
}

// ================= TAB CONTROL FIX =================
function renderTabs(){
document.querySelectorAll(".tab-content").forEach(t=>{
t.classList.remove("active");
});

let el=document.getElementById(currentTab);
if(el) el.classList.add("active");
}

// ================= EMPLOYEE =================
function employeeDashboard(){

const emp=employees.find(e=>e.id===currentUser.employeeId);
const my=bookings.filter(b=>b.assignedEmployees.includes(emp.id));

document.getElementById("app").innerHTML=`
<div class="p-4">

<h1 class="text-xl font-bold">Welcome ${emp.name}</h1>

<button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">Logout</button>

<div class="bg-white p-4 mt-4 rounded">
<h2>My Orders</h2>

${my.map(m=>`
<div class="border p-2 mt-2">
${m.clientName} - ${m.date}
</div>
`).join("")}

</div>

</div>`;
}

// ================= LOGOUT =================
function logout(){
currentUser=null;
loginPage();
}

// ================= START =================
initData();
loginPage();

</script>

</body>
</html>
