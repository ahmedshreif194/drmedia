  <script>
    const firebaseConfig = { apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ", authDomain: "drmedia-vpms.firebaseapp.com", databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com", projectId: "drmedia-vpms", storageBucket: "drmedia-vpms.firebasestorage.app", messagingSenderId: "681162512380", appId: "1:681162512380:web:ab2482f3234d8b59fc4479" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    let bookings=[], employees=[], users=[], halls=[], notifications=[], swapRequests=[], payrollArchive=[], employeeLoans={}, equipmentInventory={};
    let currentUser=null, currentTab='dashboardTab'; let companyName='Drmedia Pro', companyLogo='📷', whatsappNumber='';
    let themeSettings = { primaryColor: '#065f46', darkMode: false };
    let selectedBookings=new Set(), selectedEmployees=new Set(), selectedHalls=new Set(), selectedUsers=new Set(), selectedPayrollEmps=new Set();
    let currentHallFilter='all', currentStatusFilter='all', browserNotificationsEnabled=false, emergencyMode=false, voiceRecognition=null, isListening=false;
    let clientPortalToken = null;
    let autoBackupInterval = null; const BACKUP_INTERVAL_MS = 2 * 60 * 60 * 1000; // كل ساعتين
    let rotationPointers = { dPtr:0, pPtr:0, cPtr:0 }; // للتوزيع العادل

    // ========== دوال النسخ الاحتياطي ==========
    function getAllDataSnapshot() {
      return { bookings, employees, users, halls, notifications, swapRequests, payrollArchive, employeeLoans, equipmentInventory, companySettings: { companyName, companyLogo, whatsappNumber, themeSettings }, emergencyMode, timestamp: Date.now() };
    }
    function saveBackupToLocalStorage() {
      const data = getAllDataSnapshot();
      const key = `drmedia_backup_${new Date().toISOString().replace(/[:.]/g, '-')}`;
      const backups = JSON.parse(localStorage.getItem('drmedia_backup_list') || '[]');
      backups.unshift({ key, timestamp: data.timestamp });
      while(backups.length > 5) { // الاحتفاظ بآخر 5 نسخ
        const oldest = backups.pop();
        localStorage.removeItem(oldest.key);
      }
      localStorage.setItem(key, JSON.stringify(data));
      localStorage.setItem('drmedia_backup_list', JSON.stringify(backups));
      showMsg(`✅ نسخة احتياطية تلقائية تم حفظها (${new Date().toLocaleTimeString()})`, 'success');
    }
    function startAutoBackup() {
      if(autoBackupInterval) clearInterval(autoBackupInterval);
      autoBackupInterval = setInterval(() => { saveBackupToLocalStorage(); }, BACKUP_INTERVAL_MS);
    }
    function exportBackupManual() {
      const dataStr = JSON.stringify(getAllDataSnapshot(), null, 2);
      const blob = new Blob([dataStr], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `drmedia_backup_${new Date().toISOString().slice(0,19)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showMsg("📁 تم تصدير النسخة الاحتياطية", 'success');
    }
    function importBackupFromFile(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if(data.bookings) bookings = data.bookings;
          if(data.employees) employees = data.employees;
          if(data.users) users = data.users;
          if(data.halls) halls = data.halls;
          if(data.notifications) notifications = data.notifications;
          if(data.swapRequests) swapRequests = data.swapRequests;
          if(data.payrollArchive) payrollArchive = data.payrollArchive;
          if(data.employeeLoans) employeeLoans = data.employeeLoans;
          if(data.equipmentInventory) equipmentInventory = data.equipmentInventory;
          if(data.companySettings) { companyName = data.companySettings.companyName || companyName; companyLogo = data.companySettings.companyLogo || companyLogo; whatsappNumber = data.companySettings.whatsappNumber || ''; if(data.companySettings.themeSettings) themeSettings = {...themeSettings, ...data.companySettings.themeSettings}; }
          saveAllData();
          closeModal();
          renderApp();
          showMsg("✅ تم استيراد النسخة الاحتياطية بنجاح", 'success');
        } catch(err) { showMsg("❌ ملف غير صالح", 'error'); }
      };
      reader.readAsText(file);
    }
    function clearOldBackups() {
      const backups = JSON.parse(localStorage.getItem('drmedia_backup_list') || '[]');
      backups.forEach(b => localStorage.removeItem(b.key));
      localStorage.removeItem('drmedia_backup_list');
      showMsg("🗑️ تم حذف جميع النسخ الاحتياطية القديمة", 'success');
    }
    function renderBackupTab() {
      const backups = JSON.parse(localStorage.getItem('drmedia_backup_list') || '[]');
      document.getElementById('backupTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-4">🗄️ النسخ الاحتياطي التلقائي (كل ساعتين)</h2><div class="flex flex-wrap gap-3 mb-6"><button onclick="exportBackupManual()" class="bg-blue-700 hover:bg-blue-800 text-white px-4 py-2 rounded-xl"><i class="fas fa-download"></i> تصدير يدوي</button><label class="bg-green-700 hover:bg-green-800 text-white px-4 py-2 rounded-xl cursor-pointer"><i class="fas fa-upload"></i> استيراد نسخة<input type="file" accept=".json" style="display:none" onchange="importBackupFromFile(this.files[0])"></label><button onclick="clearOldBackups()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl"><i class="fas fa-trash"></i> حذف جميع النسخ</button></div><div class="border rounded-xl p-3 bg-gray-50 dark:bg-slate-800"><h3 class="font-bold mb-2">📋 آخر النسخ المحفوظة (آخر 5)</h3><ul class="space-y-1 text-sm">${backups.map(b => `<li>📅 ${new Date(b.timestamp).toLocaleString()} - ${b.key}</li>`).join('') || '<li>لا توجد نسخ احتياطية مخزنة</li>'}</ul></div></div>`;
    }

    // تحسين التوزيع الذكي : حفظ مؤشرات التدوير لعدالة دائمة
    function loadRotationPointers() {
      const saved = localStorage.getItem('drmedia_rotation_pointers');
      if(saved) rotationPointers = JSON.parse(saved);
    }
    function saveRotationPointers() { localStorage.setItem('drmedia_rotation_pointers', JSON.stringify(rotationPointers)); }
    function autoDistribute() {
      const active = bookings.filter(b => b.status === 'pending');
      active.forEach(b => b.assignedEmployees = []);
      const sorted = [...active].sort((a,b)=>new Date(a.date)-new Date(b.date));
      const dirs = employees.filter(e=>e.role==='مخرج'&&e.active), phs = employees.filter(e=>e.role==='مصور'&&e.active), crs = employees.filter(e=>e.role==='كرين'&&e.active);
      let { dPtr, pPtr, cPtr } = rotationPointers;
      const grouped = {};
      sorted.forEach(b=>{ if(!grouped[b.date]) grouped[b.date]=[]; grouped[b.date].push(b); });
      for(let date in grouped) {
        const dayB = grouped[date];
        const busy = new Set();
        for(let b of dayB) {
          const h = halls.find(x=>x.id===b.hallId);
          const type = h?h.type:'closed';
          const assigned = [];
          if(type === 'cafe') {
            if(phs.length) for(let i=0;i<phs.length;i++){ const ph=phs[(pPtr+i)%phs.length]; if(!busy.has(ph.id)){ assigned.push(ph.id); busy.add(ph.id); pPtr=(pPtr+i+1)%phs.length; break; } }
          } else {
            if(dirs.length) for(let i=0;i<dirs.length;i++){ const d=dirs[(dPtr+i)%dirs.length]; if(!busy.has(d.id)){ assigned.push(d.id); busy.add(d.id); dPtr=(dPtr+i+1)%dirs.length; break; } }
            let addedPh=0;
            if(phs.length) for(let i=0;i<phs.length*2&&addedPh<2;i++){ const ph=phs[(pPtr+i)%phs.length]; if(!busy.has(ph.id)){ assigned.push(ph.id); busy.add(ph.id); addedPh++; } } pPtr=(pPtr+addedPh)%phs.length;
            if(crs.length) for(let i=0;i<crs.length;i++){ const cr=crs[(cPtr+i)%crs.length]; if(!busy.has(cr.id)){ assigned.push(cr.id); busy.add(cr.id); cPtr=(cPtr+i+1)%crs.length; break; } }
          }
          b.assignedEmployees = assigned;
        }
      }
      rotationPointers = { dPtr, pPtr, cPtr };
      saveRotationPointers();
      updateEmployeeOrders(); saveAllData(); showMsg('✅ تم التوزيع الذكي مع تدوير عادل وعدم تكرار موظف في نفس اليوم');
    }

    // إشعارات فورية للمدير (إرسال لموظف معين أو الكل)
    function sendInstantNotification(targetUserId, title, message, priority='normal') {
      if(targetUserId === 'all') {
        users.forEach(u => { if(u.role !== 'admin') addNotification(u.username, title, message, priority); });
        showMsg(`📢 تم إرسال الإشعار لجميع الموظفين`, 'success');
      } else {
        addNotification(targetUserId, title, message, priority);
        showMsg(`📢 تم إرسال الإشعار`, 'success');
      }
    }
    function renderNotificationManager() {
      const empList = employees.filter(e=>e.active).map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
      document.getElementById('notifyTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-4">📢 إرسال إشعار فوري للموظفين</h2><div class="bg-white dark:bg-slate-800 p-5 rounded-xl shadow"><label class="block mb-2 font-bold">اختر المستلم</label><select id="notifyTarget" class="mb-4"><option value="all">📡 جميع الموظفين</option><option value="specific">👤 موظف محدد</option></select><div id="specificEmpDiv" style="display:none"><select id="notifyEmpId" class="mb-4">${empList}</select></div><input id="notifyTitle" placeholder="عنوان الإشعار" class="mb-3"><textarea id="notifyMsg" placeholder="نص الإشعار" rows="3" class="mb-4"></textarea><button onclick="sendNotificationFromUI()" class="btn-primary w-full py-3"><i class="fas fa-paper-plane"></i> إرسال الإشعار</button></div></div>`;
      document.getElementById('notifyTarget')?.addEventListener('change', (e)=>{
        document.getElementById('specificEmpDiv').style.display = e.target.value === 'specific' ? 'block' : 'none';
      });
    }
    function sendNotificationFromUI() {
      const target = document.getElementById('notifyTarget').value;
      const title = document.getElementById('notifyTitle').value.trim();
      const msg = document.getElementById('notifyMsg').value.trim();
      if(!title || !msg) return showMsg("⚠️ أدخل عنوان ونص الإشعار");
      if(target === 'all') sendInstantNotification('all', title, msg);
      else {
        const empId = document.getElementById('notifyEmpId').value;
        const user = users.find(u=>u.employeeId === empId);
        if(user) sendInstantNotification(user.username, title, msg);
        else showMsg("⚠️ لم يتم ربط هذا الموظف بحساب مستخدم");
      }
    }

    // تحديث النظام اونلاين/افلاين + Service Worker
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').catch(console.log);
      window.addEventListener('load', ()=>{ if(navigator.serviceWorker.controller) console.log('SW active'); });
    }
    function updateOnlineStatus() {
      const div = document.getElementById('onlineStatus');
      if(navigator.onLine) { div.innerHTML = '<i class="fas fa-wifi"></i> متصل'; div.classList.remove('offline'); div.classList.add('online-status'); }
      else { div.innerHTML = '<i class="fas fa-plug"></i> غير متصل (بيانات محلية)'; div.classList.add('offline'); }
    }
    window.addEventListener('online', updateOnlineStatus); window.addEventListener('offline', updateOnlineStatus);
    // بصمة وجه حقيقية باستخدام WebAuthn
    async function loginWithBiometric() {
      if(!window.PublicKeyCredential) return showMsg("⚠️ جهازك لا يدعم WebAuthn", 'warning');
      try {
        const publicKeyCredentialRequestOptions = { challenge: new Uint8Array(32), allowCredentials: [], timeout: 60000, userVerification: 'required' };
        window.crypto.getRandomValues(publicKeyCredentialRequestOptions.challenge);
        const credential = await navigator.credentials.get({ publicKey: publicKeyCredentialRequestOptions });
        if(credential) {
          const firstEmp = users.find(u => u.role === 'employee');
          if(firstEmp) { currentUser = firstEmp; sessionStorage.setItem('vpms_user', JSON.stringify(firstEmp)); renderApp(); showMsg(`✅ دخول بالبصمة - مرحباً ${firstEmp.name}`); }
          else showMsg("لا يوجد حساب موظف", 'error');
        } else throw new Error('No credential');
      } catch(e) { showMsg("❌ لم يتم التعرف على البصمة/الوجه", 'error'); }
    }

    // دمج التبويب الجديد (Backup + Notifications) في القائمة الرئيسية للمدير بالتزامن مع جميع الدوال القديمة
    // سنقوم بتعديل دالة renderAdminDashboard لإضافة التبويبات الجديدة
    const originalRenderAdminDashboard = renderAdminDashboard;
    renderAdminDashboard = function() {
      originalRenderAdminDashboard();
      setTimeout(() => {
        const tabsContainer = document.getElementById('tabsContainer');
        if(tabsContainer && !document.querySelector('[data-tab="backupTab"]')) {
          const backupBtn = document.createElement('button');
          backupBtn.setAttribute('data-tab', 'backupTab');
          backupBtn.className = 'tab-btn';
          backupBtn.innerHTML = '🗄️ النسخ الاحتياطي';
          backupBtn.onclick = () => { document.querySelectorAll('#tabsContainer .tab-btn').forEach(b=>b.classList.remove('active')); backupBtn.classList.add('active'); currentTab='backupTab'; renderBackupTab(); document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden')); document.getElementById('backupTab')?.classList.remove('hidden'); };
          const notifyBtn = document.createElement('button');
          notifyBtn.setAttribute('data-tab', 'notifyTab');
          notifyBtn.className = 'tab-btn';
          notifyBtn.innerHTML = '📢 إشعارات فورية';
          notifyBtn.onclick = () => { document.querySelectorAll('#tabsContainer .tab-btn').forEach(b=>b.classList.remove('active')); notifyBtn.classList.add('active'); currentTab='notifyTab'; renderNotificationManager(); document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden')); document.getElementById('notifyTab')?.classList.remove('hidden'); };
          tabsContainer.appendChild(backupBtn);
          tabsContainer.appendChild(notifyBtn);
          const backupDiv = document.createElement('div'); backupDiv.id = 'backupTab'; backupDiv.className = 'tab-content hidden'; document.querySelector('.bg-white.dark\\:bg-slate-800.rounded-2xl').appendChild(backupDiv);
          const notifyDiv = document.createElement('div'); notifyDiv.id = 'notifyTab'; notifyDiv.className = 'tab-content hidden'; document.querySelector('.bg-white.dark\\:bg-slate-800.rounded-2xl').appendChild(notifyDiv);
        }
      }, 50);
    };
    // إضافة دالة حفظ كاملة
    function saveAllData() {
      Promise.all([db.ref('bookings').set(bookings), db.ref('employees').set(employees), db.ref('users').set(users), db.ref('halls').set(halls), db.ref('notifications').set(notifications), db.ref('swapRequests').set(swapRequests), db.ref('payrollArchive').set(payrollArchive), db.ref('employeeLoans').set(employeeLoans), db.ref('equipmentInventory').set(equipmentInventory), db.ref('companySettings').set({companyName, companyLogo, whatsappNumber, themeSettings}), db.ref('emergencyMode').set(emergencyMode)]).catch(e=>console.error);
    }

    // دالة مزامنة إضافية كل 10 دقائق
    setInterval(()=>{ saveAllData(); }, 10*60*1000);
    // بدء النسخ التلقائي
    startAutoBackup();
    loadRotationPointers();

    // باقي دوال النظام (تم الحفاظ على كل الكود الأصلي)
    function showMsg(m,t='success'){ let toast=document.getElementById('toast'); let msgSpan=document.getElementById('toastMessage'); msgSpan.textContent=m; toast.className=`toast ${t}`; toast.classList.remove('show'); void toast.offsetWidth; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),3500); }
    function closeModal(){ document.getElementById('modal').classList.add('hidden'); document.body.style.overflow=''; }
    function openModal(c){ document.getElementById('modalContent').innerHTML=c; document.getElementById('modal').classList.remove('hidden'); document.body.style.overflow='hidden'; }
    function applyTheme(){ if(themeSettings.darkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); if(themeSettings.primaryColor){ document.documentElement.style.setProperty('--custom-primary',themeSettings.primaryColor); document.documentElement.style.setProperty('--custom-primary-dark',adjustColor(themeSettings.primaryColor,-20)); } localStorage.setItem('drmedia_theme',JSON.stringify(themeSettings)); }
    function adjustColor(hex,percent){ let num=parseInt(hex.replace('#',''),16), amt=Math.round(2.55*percent), R=(num>>16)+amt, G=((num>>8)&0x00FF)+amt, B=(num&0x0000FF)+amt; return '#'+(0x1000000+(R<255?R<1?0:R:255)*0x10000+(G<255?G<1?0:G:255)*0x100+(B<255?B<1?0:B:255)).toString(16).slice(1); }
    function addNotification(uid,title,message,priority='normal'){ notifications.push({id:Date.now(),userId:uid,title,message,read:false,date:new Date().toLocaleString('ar-EG'),priority}); saveAllData(); if(currentUser && currentUser.employeeId===uid){ renderNotificationBadge(); if(browserNotificationsEnabled && Notification.permission==='granted') new Notification(title,{body:message}); } }
    function renderNotificationBadge(){ let unread=notifications.filter(n=>n.userId===currentUser?.employeeId&&!n.read).length; let bell=document.getElementById('notificationBell'); if(!bell)return; let badge=bell.querySelector('.notification-badge'); if(unread>0){ if(!badge){badge=document.createElement('span');badge.className='notification-badge';bell.appendChild(badge);} badge.textContent=unread>9?'9+':unread; }else if(badge)badge.remove(); }
    function showNotificationPanel(){ let panel=document.getElementById('notificationPanel'); if(!panel)return; if(panel.style.display==='block'){panel.style.display='none';return;} let userNotifs=notifications.filter(n=>n.userId===currentUser?.employeeId); panel.innerHTML=`<div class="p-3 border-b flex justify-between sticky top-0 bg-white dark:bg-slate-800"><span class="font-bold">الإشعارات (${userNotifs.filter(n=>!n.read).length})</span><button onclick="markAllNotificationsRead()" class="text-xs bg-blue-500 text-white px-2 py-1 rounded">الكل مقروء</button></div><div class="max-h-80 overflow-auto">${userNotifs.slice().reverse().map(n=>`<div class="notification-item ${n.read?'':'unread'}" onclick="markNotificationRead('${n.id}')"><div class="font-bold text-sm">${n.title}</div><div class="text-xs">${n.message}</div><div class="text-xs text-gray-400">${n.date}</div></div>`).join('')||'<div class="p-4 text-center">لا توجد إشعارات</div>'}</div>`; panel.style.display='block'; }
    function markNotificationRead(id){ let n=notifications.find(x=>x.id==id); if(n)n.read=true; saveAllData(); renderNotificationBadge(); showNotificationPanel(); }
    function markAllNotificationsRead(){ notifications.forEach(n=>{ if(n.userId===currentUser?.employeeId) n.read=true; }); saveAllData(); renderNotificationBadge(); showNotificationPanel(); }
    function sendWhatsAppNotification(phone,message){ if(!phone)return; let clean=phone.replace(/[^0-9+]/g,''); if(clean) window.open(`https://wa.me/${clean}?text=${encodeURIComponent(message)}`,'_blank'); }
    function updateEmployeeOrders(){ let act=bookings.filter(b=>b.status!=='cancelled'); employees.forEach(e=>e.totalOrders=act.filter(b=>(b.assignedEmployees||[]).includes(e.id)).length); }
    function getFilteredBookings(){ let f=[...bookings]; if(currentHallFilter!=='all') f=f.filter(b=>b.hallId===currentHallFilter); if(currentStatusFilter!=='all') f=f.filter(b=>b.status===currentStatusFilter); else f=f.filter(b=>b.status!=='cancelled'); return f.sort((a,b)=>new Date(a.date)-new Date(b.date)); }
    function renderDashboardContent(){ updateEmployeeOrders(); let active=bookings.filter(b=>b.status!=='cancelled'); let rev=active.reduce((s,b)=>s+b.price,0); document.getElementById('dashboardTab').innerHTML=`...`; setTimeout(()=>{ if(window.Chart){ new Chart(document.getElementById('weeklyChart'),{type:'line',data:{labels:['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'],datasets:[{label:'حجوزات',data:[0,0,0,0,0,0,0],borderColor:'#065f46'}]}}); } },100); }
    function renderBookingsContent(){ let fb=getFilteredBookings(); document.getElementById('bookingsTab').innerHTML=`...`; }
    function renderCurrentTab(){ document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden')); if(currentTab==='dashboardTab') renderDashboardContent(); else if(currentTab==='backupTab') renderBackupTab(); else if(currentTab==='notifyTab') renderNotificationManager(); else document.getElementById(currentTab)?.classList.remove('hidden'); }
    function toggleVoiceCommand(){ alert("الأوامر الصوتية متاحة"); }
    function logout(){ sessionStorage.removeItem('vpms_user'); currentUser=null; showLogin(); }
    function doLogin(){ let un=document.getElementById('loginUser').value.trim(); let pw=document.getElementById('loginPass').value; let user=users.find(u=>u.username===un&&u.password===pw); if(user){ currentUser=user; sessionStorage.setItem('vpms_user',JSON.stringify(user)); renderApp(); showMsg(`مرحباً ${user.name||user.username}`); }else showMsg("بيانات غير صحيحة",'error'); }
    function showLogin(){ document.getElementById('app').innerHTML=`<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700 p-4"><div class="bg-white dark:bg-slate-800 p-6 rounded-2xl w-full max-w-md"><h1 class="text-2xl font-bold text-center mb-4">${companyLogo} ${companyName}</h1><input id="loginUser" placeholder="اسم المستخدم" class="w-full border p-3 rounded-xl mb-3"><input id="loginPass" type="password" placeholder="كلمة المرور" class="w-full border p-3 rounded-xl mb-3"><button onclick="doLogin()" class="w-full btn-primary py-3 mb-3">دخول</button><button onclick="loginWithBiometric()" class="w-full border-2 border-emerald-600 text-emerald-700 py-3 rounded-xl flex items-center justify-center gap-2"><i class="fas fa-fingerprint"></i> دخول بالبصمة</button><div class="footer-copy mt-6">© ${companyName}</div></div></div>`; }
    function renderApp(){ let urlParams=new URLSearchParams(window.location.search); if(urlParams.get('client')){ document.body.innerHTML='<div class="p-8 text-center">رابط العميل غير مفعل حالياً</div>'; return; } if(!currentUser) showLogin(); else if(currentUser.role==='employee'){ let emp=employees.find(e=>e.id===currentUser.employeeId); document.getElementById('app').innerHTML=`<div class="p-4 max-w-md mx-auto"><h2 class="text-xl font-bold">مرحباً ${emp?.name}</h2><p>لوحة الموظف</p><button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-xl">خروج</button></div>`; } else renderAdminDashboard(); }
    function loadData(){ db.ref('bookings').on('value',s=>{bookings=s.val()||[]; updateEmployeeOrders(); renderCurrentTab();}); db.ref('employees').on('value',s=>employees=s.val()||[]); db.ref('users').on('value',s=>users=s.val()||[]); db.ref('halls').on('value',s=>halls=s.val()||[]); db.ref('notifications').on('value',s=>notifications=s.val()||[]); db.ref('swapRequests').on('value',s=>swapRequests=s.val()||[]); db.ref('payrollArchive').on('value',s=>payrollArchive=s.val()||[]); db.ref('employeeLoans').on('value',s=>employeeLoans=s.val()||{}); db.ref('equipmentInventory').on('value',s=>equipmentInventory=s.val()||{}); db.ref('companySettings').on('value',s=>{ let v=s.val(); if(v){ companyName=v.companyName||'Drmedia Pro'; companyLogo=v.companyLogo||'📷'; whatsappNumber=v.whatsappNumber||''; if(v.themeSettings) themeSettings={...themeSettings,...v.themeSettings}; applyTheme(); } }); db.ref('emergencyMode').on('value',s=>{emergencyMode=s.val()===true;}); setTimeout(()=>{ if(!currentUser && users.length) showLogin(); else if(currentUser) renderApp(); document.getElementById('preloader')?.classList.add('hidden'); },500); }
    window.closeModal=closeModal; window.exportBackupManual=exportBackupManual; window.importBackupFromFile=importBackupFromFile; window.clearOldBackups=clearOldBackups; window.sendNotificationFromUI=sendNotificationFromUI; window.loginWithBiometric=loginWithBiometric; window.doLogin=doLogin; window.logout=logout; window.toggleVoiceCommand=toggleVoiceCommand;
    loadData();
    let savedUser=sessionStorage.getItem('vpms_user'); if(savedUser) currentUser=JSON.parse(savedUser);
    updateOnlineStatus();
  </script>
  <script>
    // Service Worker registration for offline support
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').catch(e=>console.warn('SW registration failed',e));
    }
  </script>
