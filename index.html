<div id="app"></div>

<script>
let currentUser = null;

// ================= DATA بسيطة =================
let employees = [
  {id:"e1", name:"Ahmed", role:"Photographer"},
  {id:"e2", name:"Ali", role:"Director"}
];

let bookings = [
  {id:"b1", client:"Mohamed", date:"2026-04-22", price:2000}
];

// ================= LOGIN =================
function loginPage(){
document.getElementById("app").innerHTML = `
<div class="h-screen flex items-center justify-center bg-gray-100">
<div class="bg-white p-6 rounded-xl w-80 shadow">

<h2 class="text-xl font-bold mb-3">Drmedia Login</h2>

<input id="u" class="border p-2 w-full mb-2" placeholder="User">
<input id="p" type="password" class="border p-2 w-full mb-3" placeholder="Pass">

<button onclick="login()" class="bg-green-600 text-white w-full p-2 rounded">
Login
</button>

</div>
</div>`;
}

function login(){
currentUser = {name:"Admin", role:"admin"};
renderDashboard();
}

// ================= DASHBOARD LAYOUT =================
function layout(content){

document.getElementById("app").innerHTML = `
<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 bg-gray-900 text-white p-4">

<h1 class="text-lg font-bold mb-4">Drmedia Pro</h1>

<button onclick="renderDashboard()" class="block w-full text-right p-2 hover:bg-gray-700">📊 Dashboard</button>
<button onclick="renderEmployees()" class="block w-full text-right p-2 hover:bg-gray-700">👥 Employees</button>
<button onclick="renderBookings()" class="block w-full text-right p-2 hover:bg-gray-700">📅 Bookings</button>
<button onclick="renderDistribution()" class="block w-full text-right p-2 hover:bg-gray-700">⚙️ Distribution</button>
<button onclick="renderPayroll()" class="block w-full text-right p-2 hover:bg-gray-700">💰 Payroll</button>

<hr class="my-3">

<button onclick="logout()" class="block w-full text-right p-2 bg-red-600 rounded">
🚪 Logout
</button>

</div>

<!-- CONTENT -->
<div class="flex-1 p-5 bg-gray-100 overflow-auto">
${content}
</div>

</div>
`;
}

// ================= DASHBOARD =================
function renderDashboard(){

layout(`
<h1 class="text-2xl font-bold mb-4">📊 Dashboard</h1>

<div class="grid grid-cols-3 gap-4">

<div class="bg-white p-4 rounded shadow">
<h2>Total Employees</h2>
<p class="text-2xl font-bold">${employees.length}</p>
</div>

<div class="bg-white p-4 rounded shadow">
<h2>Total Bookings</h2>
<p class="text-2xl font-bold">${bookings.length}</p>
</div>

<div class="bg-white p-4 rounded shadow">
<h2>Revenue</h2>
<p class="text-2xl font-bold">${bookings.reduce((a,b)=>a+b.price,0)}</p>
</div>

</div>
`);
}

// ================= EMPLOYEES =================
function renderEmployees(){

layout(`
<h1 class="text-2xl font-bold mb-4">👥 Employees</h1>

<div class="bg-white p-4 rounded shadow">

${employees.map(e=>`
<div class="border p-2 mb-2 rounded">
<b>${e.name}</b> - ${e.role}
</div>
`).join("")}

</div>
`);
}

// ================= BOOKINGS =================
function renderBookings(){

layout(`
<h1 class="text-2xl font-bold mb-4">📅 Bookings</h1>

<div class="bg-white p-4 rounded shadow">

${bookings.map(b=>`
<div class="border p-2 mb-2 rounded">
<b>${b.client}</b> - ${b.date} - ${b.price} EGP
</div>
`).join("")}

</div>
`);
}

// ================= DISTRIBUTION =================
function renderDistribution(){

layout(`
<h1 class="text-2xl font-bold mb-4">⚙️ Distribution</h1>

<div class="bg-white p-4 rounded shadow">
<p>Auto Distribution Engine (coming upgrade)</p>
</div>
`);
}

// ================= PAYROLL =================
function renderPayroll(){

layout(`
<h1 class="text-2xl font-bold mb-4">💰 Payroll</h1>

<div class="bg-white p-4 rounded shadow">
<p>Total Payroll System</p>
</div>
`);
}

// ================= LOGOUT =================
function logout(){
currentUser = null;
loginPage();
}

// ================= START =================
loginPage();
</script>
