    // -------------------- التوزيع العادل (كافيه = مصور واحد، مغلقة/أوبن = مخرج+2مصور+كرين) --------------------
    function autoDistribute() {
        if(!bookings.length) return;
        bookings.forEach(b => { b.assignedEmployees = []; });
        const sortedBookings = [...bookings].sort((a,b)=>new Date(a.date)-new Date(b.date));
        
        let directorOrders = 0, photographerOrders = 0, craneOrders = 0;
        for(let b of sortedBookings){
            const hall = halls.find(h=>h.id===b.hallId);
            const hallType = hall ? hall.type : 'closed';
            if(hallType === 'cafe'){
                photographerOrders += 1;      // ✅ كافيه: يحتاج مصور واحد فقط
            } else {
                directorOrders += 1;          // ✅ مغلقة/أوبن: مخرج واحد
                photographerOrders += 2;      // ✅ مغلقة/أوبن: 2 مصورين
                craneOrders += 1;             // ✅ مغلقة/أوبن: كرين واحد
            }
        }
        
        let activeDirectors = employees.filter(e=>e.role==='مخرج'&&e.active);
        let activePhotographers = employees.filter(e=>e.role==='مصور'&&e.active);
        let activeCrane = employees.filter(e=>e.role==='كرين'&&e.active);
        
        let targetPerDirector = activeDirectors.length ? Math.ceil(directorOrders / activeDirectors.length) : 0;
        let targetPerPhotographer = activePhotographers.length ? Math.ceil(photographerOrders / activePhotographers.length) : 0;
        let targetPerCrane = activeCrane.length ? Math.ceil(craneOrders / activeCrane.length) : 0;
        
        let dirs = activeDirectors.map(e=>({...e, temp: e.totalOrders||0, target: targetPerDirector}));
        let photos = activePhotographers.map(e=>({...e, temp: e.totalOrders||0, target: targetPerPhotographer}));
        let cranes = activeCrane.map(e=>({...e, temp: e.totalOrders||0, target: targetPerCrane}));
        
        let assignedToday = new Map();
        
        for(let booking of sortedBookings){
            const hall = halls.find(h=>h.id===booking.hallId);
            const hallType = hall ? hall.type : 'closed';
            let busy = assignedToday.get(booking.date) || new Set();
            let assigned = [];
            
            if(hallType === 'cafe'){
                // ✅ كافيه: يحتاج مصور واحد فقط
                let available = photos.filter(p=>!busy.has(p.id));
                if(available.length){
                    available.sort((a,b)=>{
                        let aDiff = (a.temp - a.target);
                        let bDiff = (b.temp - b.target);
                        if(aDiff !== bDiff) return aDiff - bDiff;
                        return a.temp - b.temp;
                    });
                    let chosen = available[0];
                    assigned.push(chosen.id);
                    chosen.temp++;
                    busy.add(chosen.id);
                }
            } else {
                // ✅ مغلقة أو أوبن: مخرج + 2 مصورين + كرين
                let availDir = dirs.filter(d=>!busy.has(d.id));
                if(availDir.length){
                    availDir.sort((a,b)=>{
                        let aDiff = (a.temp - a.target);
                        let bDiff = (b.temp - b.target);
                        if(aDiff !== bDiff) return aDiff - bDiff;
                        return a.temp - b.temp;
                    });
                    let chosen = availDir[0];
                    assigned.push(chosen.id);
                    chosen.temp++;
                    busy.add(chosen.id);
                }
                
                let availPhoto = photos.filter(p=>!busy.has(p.id));
                for(let i=0;i<2;i++){
                    if(availPhoto.length){
                        availPhoto.sort((a,b)=>{
                            let aDiff = (a.temp - a.target);
                            let bDiff = (b.temp - b.target);
                            if(aDiff !== bDiff) return aDiff - bDiff;
                            return a.temp - b.temp;
                        });
                        let chosen = availPhoto[0];
                        assigned.push(chosen.id);
                        chosen.temp++;
                        busy.add(chosen.id);
                        availPhoto = availPhoto.filter(p=>p.id!==chosen.id);
                    }
                }
                
                let availCrane = cranes.filter(c=>!busy.has(c.id));
                if(availCrane.length){
                    availCrane.sort((a,b)=>{
                        let aDiff = (a.temp - a.target);
                        let bDiff = (b.temp - b.target);
                        if(aDiff !== bDiff) return aDiff - bDiff;
                        return a.temp - b.temp;
                    });
                    let chosen = availCrane[0];
                    assigned.push(chosen.id);
                    chosen.temp++;
                    busy.add(chosen.id);
                }
            }
            booking.assignedEmployees = assigned;
            assignedToday.set(booking.date, busy);
        }
        
        employees.forEach(e=>{
            let d = dirs.find(d=>d.id===e.id); if(d) e.totalOrders = d.temp;
            let p = photos.find(p=>p.id===e.id); if(p) e.totalOrders = p.temp;
            let c = cranes.find(c=>c.id===e.id); if(c) e.totalOrders = c.temp;
        });
        
        for(let booking of sortedBookings){
            if(booking.assignedEmployees && booking.assignedEmployees.length){
                for(let empId of booking.assignedEmployees){
                    const emp = employees.find(e=>e.id===empId);
                    if(emp){
                        addNotification(emp.id, 'توزيع جديد', `تم توزيعك على حجز ${booking.clientName} في تاريخ ${booking.date}`);
                    }
                }
            }
        }
        
        saveAllData();
        showMsg(`✅ تم التوزيع العادل (مخرجين: ${targetPerDirector} | مصورين: ${targetPerPhotographer} | كرين: ${targetPerCrane})`);
    }

    // -------------------- دوال استيراد Excel و PDF --------------------
    window.showImportExcelModal = function() {
        const hallOptions = halls.map(h=>`<option value="${h.id}">${h.name}</option>`).join('');
        const html = `<h3 class="text-xl font-bold mb-3">📂 استيراد من Excel</h3><p class="text-sm text-gray-500 mb-2">اختر ملف Excel (التاريخ، العميل، القاعة، السعر)</p><input type="file" id="excelFile" accept=".xlsx,.xls" class="mb-3"><select id="importHallId" class="mb-3">${hallOptions}</select><div class="flex gap-2 my-2"><label><input type="checkbox" id="skipFriday"> الجمعة</label><label><input type="checkbox" id="skipSaturday"> السبت</label><label><input type="checkbox" id="skipHolidays" checked> أيام الإجازة</label></div><button onclick="importExcelData()" class="bg-green-700 text-white w-full py-2 rounded-xl mt-2">استيراد</button>`;
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
    };
    window.importExcelData = async function() {
        const file = document.getElementById('excelFile').files[0];
        if(!file){ alert("اختر ملف"); return; }
        const hallId = document.getElementById('importHallId').value;
        const hall = halls.find(h=>h.id===hallId);
        if(!hall){ alert("اختر قاعة صالحة"); return; }
        const skipFri = document.getElementById('skipFriday').checked;
        const skipSat = document.getElementById('skipSaturday').checked;
        const skipHol = document.getElementById('skipHolidays').checked;
        const data = await file.arrayBuffer();
        const wb = XLSX.read(data);
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
        let added=0, skipped=0;
        for(let i=1;i<rows.length;i++){
            let row=rows[i];
            if(!row||row.length<1) continue;
            let rawDate = row[0];
            let formatted = '';
            if(typeof rawDate === 'number') formatted = new Date((rawDate-25569)*86400*1000).toISOString().slice(0,10);
            else if(typeof rawDate === 'string'){
                let m = rawDate.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
                if(m) formatted=m[0];
                else{ let m2=rawDate.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m2) formatted=`${m2[3]}-${m2[2]}-${m2[1]}`; }
            }
            if(!formatted) continue;
            let isSkip=false;
            if(skipFri && new Date(formatted).getDay()===5) isSkip=true;
            if(skipSat && new Date(formatted).getDay()===6) isSkip=true;
            if(skipHol && holidays.includes(formatted)) isSkip=true;
            if(isSkip){ skipped++; continue; }
            const client = row[1] || 'عميل جديد';
            const hallName = row[2] || hall.name;
            const price = parseInt(row[3]) || 2500;
            bookings.push({ id: Date.now()+Math.random().toString(36)+added, clientName:client, phone:"", hallId, hallName, date:formatted, price, assignedEmployees:[] });
            added++;
        }
        if(added===0) alert(`لا توجد تواريخ صالحة (تم تخطي ${skipped})`);
        else{ saveAllData(); autoDistribute(); renderBookingsContent(); renderDistributionContent(); closeModal(); showMsg(`✅ تم استيراد ${added} حجز إلى ${hall.name}`); }
    };
    window.showImportPdfModal = function() {
        const hallOptions = halls.map(h=>`<option value="${h.id}">${h.name}</option>`).join('');
        const html = `<h3 class="text-xl font-bold mb-3">📄 استيراد من PDF</h3><p class="text-sm text-gray-500 mb-2">اختر ملف PDF لاستخراج التواريخ</p><input type="file" id="pdfFile" accept="application/pdf" class="mb-3"><select id="pdfHallId" class="mb-3">${hallOptions}</select><div class="flex gap-2 my-2"><label><input type="checkbox" id="pdfSkipFriday"> الجمعة</label><label><input type="checkbox" id="pdfSkipSaturday"> السبت</label><label><input type="checkbox" id="pdfSkipHolidays" checked> أيام الإجازة</label></div><button onclick="importPdfData()" class="bg-red-700 text-white w-full py-2 rounded-xl mt-2">استيراد</button>`;
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
    };
    window.importPdfData = async function() {
        const file = document.getElementById('pdfFile').files[0];
        if(!file){ alert("اختر ملف"); return; }
        const hallId = document.getElementById('pdfHallId').value;
        const hall = halls.find(h=>h.id===hallId);
        if(!hall){ alert("اختر قاعة صالحة"); return; }
        const skipFri = document.getElementById('pdfSkipFriday').checked;
        const skipSat = document.getElementById('pdfSkipSaturday').checked;
        const skipHol = document.getElementById('pdfSkipHolidays').checked;
        const pdfjsLib = window.pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        try{
            const ab = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data:ab}).promise;
            let fullText="";
            for(let i=1;i<=pdf.numPages;i++){ let page=await pdf.getPage(i); let txt=await page.getTextContent(); fullText+=txt.items.map(t=>t.str).join(" ")+"\n"; }
            const dates = [...new Set(fullText.match(/\b(\d{4}-\d{1,2}-\d{1,2}|\d{1,2}\/\d{1,2}\/\d{4})\b/g)||[])];
            let added=0, skipped=0;
            for(let d of dates){
                let clean = d.includes('/')?d.split('/').reverse().join('-'):d;
                let isSkip=false;
                if(skipFri && new Date(clean).getDay()===5) isSkip=true;
                if(skipSat && new Date(clean).getDay()===6) isSkip=true;
                if(skipHol && holidays.includes(clean)) isSkip=true;
                if(isSkip){ skipped++; continue; }
                bookings.push({ id: Date.now()+Math.random().toString(36)+added, clientName: "عميل من PDF", phone:"", hallId, hallName: hall.name, date:clean, price:2500, assignedEmployees:[] });
                added++;
            }
            if(added===0) alert(`لا توجد تواريخ (تم تخطي ${skipped})`);
            else{ saveAllData(); autoDistribute(); renderBookingsContent(); renderDistributionContent(); closeModal(); showMsg(`✅ تم استيراد ${added} حجز إلى ${hall.name}`); }
        }catch(e){ alert("فشل استيراد PDF"); }
    };

    function renderCalendarContent() {
        const today = new Date();
        const year = today.getFullYear(), month = today.getMonth();
        const firstDay = new Date(year,month,1).getDay();
        const daysCount = new Date(year,month+1,0).getDate();
        const monthNames = ['يناير','فبراير','مارس','إبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        let html = `<div class="p-4"><h2 class="text-xl font-bold mb-3">📆 ${monthNames[month]} ${year}</h2><div class="calendar-grid">`;
        ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'].forEach(d=>html+=`<div class="text-center font-bold py-2">${d}</div>`);
        for(let i=0;i<firstDay;i++) html+=`<div></div>`;
        for(let d=1;d<=daysCount;d++){
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const has = bookings.some(b=>b.date===dateStr);
            html += `<div class="calendar-day ${has?'booked':''}" onclick="showDayBookings('${dateStr}')">${d}</div>`;
        }
        html += `</div><div id="calendarInfo" class="mt-3 text-sm text-gray-600"></div></div>`;
        document.getElementById('calendarTab').innerHTML = html;
    }

    window.showDayBookings = function(date){

        else info.innerHTML = `<div class="p-3 bg-emerald-50 rounded"><strong>📅 حجوزات يوم ${date}</strong><ul>${filtered.map(b=>`<li>${b.clientName} - ${b.hallName} (${b.price} ج.م)</li>`).join('')}</ul></div>`;

    window.showAddEmployeeModal = function() {
        const html = `<h3 class="text-xl font-bold mb-3">➕ موظف جديد</h3><input id="empName" placeholder="الاسم"><select id="empRole"><option value="مخرج">مخرج</option><option value="مصور">مصور</option><option value="كرين">كرين</option></select><input id="empPhone" placeholder="الهاتف"><input id="empSalary" placeholder="المرتب لكل أوردر" value="200" type="number"><button onclick="saveNewEmployee()" class="bg-blue-700 text-white w-full py-2 rounded-xl mt-2">حفظ</button>`;
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');

    window.saveNewEmployee = function() {
        const name = document.getElementById('empName').value; if(!name){ alert("⚠️ أدخل الاسم"); return; }
        const newEmp = { id:'emp'+Date.now(), name, role:document.getElementById('empRole').value, phone:document.getElementById('empPhone').value, salaryPerOrder:parseInt(document.getElementById('empSalary').value)||200, active:true, totalOrders:0 };
        employees.push(newEmp);
        const username = name.replace(/\s/g,'').toLowerCase();
        let final = username, c=1;
        while(users.some(u=>u.username===final)) final=username+(c++);
        users.push({ username:final, password:'emp123', role:'employee', employeeId:newEmp.id, name });
        saveAllData(); closeModal(); renderEmployeesContent(); showMsg(`✅ تم إضافة ${name} - حسابه: ${final} / emp123`);
    };
    window.showEditEmployeeModal = function(id){
        const e = employees.find(em=>em.id===id);
        const userAccount = users.find(u=>u.employeeId===id);
        const html = `<h3 class="text-xl font-bold mb-3">✏️ تعديل موظف</h3><input id="empName" value="${e.name}"><select id="empRole"><option ${e.role==='مخرج'?'selected':''}>مخرج</option><option ${e.role==='مصور'?'selected':''}>مصور</option><option ${e.role==='كرين'?'selected':''}>كرين</option></select><input id="empPhone" value="${e.phone}"><input id="empSalary" value="${e.salaryPerOrder}" type="number"><div class="flex gap-2 my-2"><label><input type="checkbox" id="empActive" ${e.active?'checked':''}> نشط</label></div><div class="mt-2 border-t pt-2"><h4 class="font-bold">بيانات الحساب</h4><input id="empUsername" value="${userAccount?.username||''}" placeholder="اسم المستخدم" class="mb-2"><input id="empPassword" value="${userAccount?.password||'emp123'}" placeholder="كلمة المرور" class="mb-2"></div><button onclick="saveEditEmployee('${id}')" class="bg-amber-700 text-white w-full py-2 rounded-xl">حفظ</button>`;
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
    };
    window.saveEditEmployee = function(id){
        const e = employees.find(em=>em.id===id);
        if(e){
            e.name = document.getElementById('empName').value;
            e.role = document.getElementById('empRole').value;
            e.phone = document.getElementById('empPhone').value;
            e.salaryPerOrder = parseInt(document.getElementById('empSalary').value)||200;
            e.active = document.getElementById('empActive').checked;
            let userAccount = users.find(u=>u.employeeId===id);
            const newUsername = document.getElementById('empUsername').value;
            const newPassword = document.getElementById('empPassword').value;
            if(userAccount){
                if(newUsername && newUsername !== userAccount.username && users.some(u=>u.username===newUsername && u.employeeId!==id)) alert("⚠️ اسم المستخدم موجود");
                else { userAccount.username = newUsername || userAccount.username; userAccount.password = newPassword || userAccount.password; }
            } else if(newUsername) {
                users.push({ username:newUsername, password:newPassword||'emp123', role:'employee', employeeId:id, name:e.name });
            }
            saveAllData(); closeModal(); autoDistribute(); renderEmployeesContent(); renderDistributionContent(); showMsg("✅ تم التحديث");
        }
    };
    window.deleteEmployee = function(id){
        if(confirm("حذف الموظف؟")){
            employees = employees.filter(e=>e.id!==id);
            users = users.filter(u=>u.employeeId!==id);
            selectedEmployees.delete(id);
            saveAllData(); autoDistribute(); renderEmployeesContent(); renderDistributionContent(); showMsg("🗑️ تم الحذف");
        }
    };
    window.showManualAssignModal = function(bookingId) {
        const booking = bookings.find(b=>b.id===bookingId);
        const activeEmps = employees.filter(e=>e.active);
        const current = booking.assignedEmployees||[];
        let empHtml = '<div class="employee-checkbox-list">';
        activeEmps.forEach(emp=>{ empHtml += `<label><input type="checkbox" value="${emp.id}" ${current.includes(emp.id)?'checked':''}> <strong>${emp.name}</strong> (${emp.role})</label>`; });
        empHtml += '</div>';

        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
    };
    window.saveManualAssign = function(bookingId) {
        const booking = bookings.find(b=>b.id===bookingId);
        const checkboxes = document.querySelectorAll('#modalContent input[type="checkbox"]');
        const selected = [];
        checkboxes.forEach(cb=>{ if(cb.checked) selected.push(cb.value); });
        booking.assignedEmployees = selected;
        saveAllData(); closeModal(); renderDistributionContent(); renderBookingsContent(); showMsg("✅ تم تعديل التوزيع");
        selected.forEach(empId => {
            const emp = employees.find(e=>e.id===empId);

        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
    };
    window.saveEditUser = function(oldUsername) {
        const user = users.find(u=>u.username===oldUsername);
        if(!user) return;
        const newUsername = document.getElementById('editUsername').value.trim();
        const newPassword = document.getElementById('editPassword').value;
        const newRole = document.getElementById('editRole').value;
        if(newUsername !== oldUsername && users.some(u=>u.username===newUsername)) { alert("⚠️ اسم المستخدم موجود"); return; }
        user.username = newUsername; user.password = newPassword; user.role = newRole;
        saveAllData();
        if(currentUser && currentUser.username === oldUsername) { currentUser.username = newUsername; sessionStorage.setItem('vpms_user', JSON.stringify(currentUser)); }
        closeModal(); renderUsersContent(); showMsg("✅ تم تحديث المستخدم");
    };

                    <div id="reportsTab" class="tab-content hidden"></div>
                    <div id="usersTab" class="tab-content hidden"></div>
                    <div id="settingsTab" class="tab-content hidden"></div>
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
        document.querySelectorAll('#tabsContainer .tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#tabsContainer .tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTab = this.dataset.tab;
                renderCurrentTab();
            });
        });
        renderDashboardContent();
        renderBookingsContent();
        renderHallsContent();
        renderEmployeesContent();
        renderDistributionContent();
        renderPayrollContent();
        renderCalendarContent();
        renderReportsContent();
        renderUsersContent();
        renderSettingsContent();
        renderNotificationBadge();
        document.getElementById('dashboardTab').classList.remove('hidden');
        document.addEventListener('click', function(e) {
            const panel = document.getElementById('notificationPanel');
            const bell = document.getElementById('notificationBell');
            if (panel && bell && !bell.contains(e.target) && !panel.contains(e.target)) {
                panel.style.display = 'none';
            }
        });
    }

    function renderEmployeeDashboard() {
        const emp = employees.find(e=>e.id===currentUser.employeeId);
        if(!emp){ document.getElementById('app').innerHTML='<div class="p-8 text-center text-red-500">⚠️ لم يتم ربط حسابك بموظف</div>'; return; }
        const myOrders = bookings.filter(b=>b.assignedEmployees?.includes(emp.id));
        const total = myOrders.length;
        const salary = total * emp.salaryPerOrder;
        const html = `
            <div class="p-4 max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-2xl font-bold text-emerald-800">Drmedia Pro</h1>
                    <div class="flex items-center gap-3">
                        <div class="notification-bell relative" id="notificationBell" onclick="showNotificationPanel()">
                            <i class="fas fa-bell text-xl text-gray-600 cursor-pointer"></i>
                        </div>
                        <div id="notificationPanel" class="notification-panel"></div>
                        <span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full ml-2">${emp.name}</span>
                        <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-xl">خروج</button>
                    </div>
                </div>
                <div class="bg-emerald-700 text-white p-6 rounded-2xl mb-6"><h2 class="text-2xl font-bold">مرحباً ${emp.name}</h2><p class="opacity-90">${emp.role}</p></div>
                <div class="grid grid-cols-2 gap-4 mb-6"><div class="bg-white p-4 rounded-xl shadow text-center"><div class="text-3xl font-bold text-emerald-700">${total}</div><div>عدد الأوردرات</div></div><div class="bg-white p-4 rounded-xl shadow text-center"><div class="text-3xl font-bold text-emerald-700">${salary.toLocaleString()} ج.م</div><div>إجمالي المستحق</div></div></div>
                <div class="bg-white rounded-xl shadow overflow-hidden"><div class="bg-gray-100 p-3 font-bold">📋 الأوردرات التي عملت بها</div><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>#</th><th>التاريخ</th><th>العميل</th><th>القاعة</th></tr></thead><tbody>${myOrders.map((o,i)=>`<tr><td class="p-2">${i+1}</td><td class="p-2">${o.date}</td><td class="p-2">${o.clientName}</td><td class="p-2">${o.hallName}</td></tr>`).join('')||'}<tr<td colspan="4">لا توجد أوردرات</span></span></td>'}</tbody></table></div></div></div>
        `;
        document.getElementById('app').innerHTML = html;
        renderNotificationBadge();
        document.addEventListener('click', function(e) {
            const panel = document.getElementById('notificationPanel');
            const bell = document.getElementById('notificationBell');
            if (panel && bell && !bell.contains(e.target) && !panel.contains(e.target)) {
                panel.style.display = 'none';
            }
        });
    }

    // -------------------- تسجيل الدخول --------------------
    function showLogin() {
        const html = `<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700"><div class="bg-white p-8 rounded-2xl w-96 text-center shadow-2xl"><i class="fas fa-camera-retro text-5xl text-emerald-600 mb-4"></i><h1 class="text-2xl font-bold">Drmedia Pro</h1><p class="text-gray-500 mb-6">نظام إدارة القاعات المتعددة</p><input type="text" id="loginUser" placeholder="اسم المستخدم" class="w-full border p-3 rounded-xl mb-3"><input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full border p-3 rounded-xl mb-4"><div id="loginError" class="text-red-500 text-sm mb-2 hidden"></div><button onclick="doLogin()" class="w-full bg-emerald-700 text-white py-3 rounded-xl transition hover:bg-emerald-800">دخول</button></div></div>`;
        document.getElementById('app').innerHTML = html;
    }
    function doLogin() {
        const un = document.getElementById('loginUser').value;
        const pw = document.getElementById('loginPass').value;
        const user = users.find(u=>u.username===un && u.password===pw);
        if(user){ currentUser = user; sessionStorage.setItem('vpms_user', JSON.stringify(user)); renderApp(); showMsg(`مرحباً ${user.name || user.username}`); }
        else { document.getElementById('loginError').innerText = 'بيانات غير صحيحة'; document.getElementById('loginError').classList.remove('hidden'); }
    }
    function logout() { sessionStorage.removeItem('vpms_user'); currentUser = null; showLogin(); }
    function renderApp() { if(!currentUser) showLogin(); else if(currentUser.role === 'employee') renderEmployeeDashboard(); else renderAdminDashboard(); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    window.markAllNotificationsRead = markAllNotificationsRead;
    window.showNotificationPanel = showNotificationPanel;
    window.showEditBookingModal = showEditBookingModal;
    window.saveEditBooking = saveEditBooking;

    // -------------------- بدء التطبيق --------------------
    loadData();
    const saved = sessionStorage.getItem('vpms_user');
    if(saved) currentUser = JSON.parse(saved);
</script>
</body>
</html>
