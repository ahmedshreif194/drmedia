<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drmedia Pro Plus | النظام المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 40px; z-index: 10000; display: none; white-space: nowrap; }
        .toast.show { display: block; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1100; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content { background: white; border-radius: 24px; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 24px; }
        input, select { border: 1px solid #cbd5e1; border-radius: 12px; padding: 8px 12px; width: 100%; margin-bottom: 12px; }
        button { cursor: pointer; }
        .tab-btn { padding: 8px 16px; border-radius: 12px 12px 0 0; font-weight: 600; }
        .tab-btn.active { background-color: #16a34a; color: white; }
        .btn-primary { background-color: #16a34a; color: white; padding: 8px 16px; border-radius: 12px; }
        .btn-primary:hover { background-color: #15803d; }
    </style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>
<div id="app"></div>

<script>
// ======================== بيانات المستخدمين الأساسية ========================
let users = [
    { username: 'ahmed', password: '1994', role: 'admin', name: 'مدير النظام', employeeId: null },
    { username: 'ahmed_emp', password: 'emp123', role: 'employee', employeeId: 'emp1', name: 'أحمد علي' }
];
let bookings = [], employees = [], halls = [], clients = [], equipmentInventory = {}, attendanceRecords = [];
let currentUser = null;
let companyName = 'Drmedia Pro Plus', companyLogo = '📷';

// ======================== دوال مساعدة ========================
function showMsg(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function openModal(content) { document.getElementById('modalContent').innerHTML = content; document.getElementById('modal').classList.add('show'); }
function saveAllData() {
    const data = { bookings, employees, halls, clients, equipmentInventory, attendanceRecords, users, companyName, companyLogo };
    localStorage.setItem('drmedia_data', JSON.stringify(data));
}
function loadAllData() {
    const raw = localStorage.getItem('drmedia_data');
    if (raw) {
        const data = JSON.parse(raw);
        bookings = data.bookings || []; employees = data.employees || []; halls = data.halls || []; clients = data.clients || [];
        equipmentInventory = data.equipmentInventory || {}; attendanceRecords = data.attendanceRecords || [];
        users = data.users || users;
        companyName = data.companyName || companyName;
        companyLogo = data.companyLogo || companyLogo;
    } else {
        // بيانات افتراضية
        halls = [
            { id: 'h1', name: 'القاعة المغلقة', type: 'closed', active: true },
            { id: 'h2', name: 'القاعة المفتوحة', type: 'open', active: true }
        ];
        employees = [
            { id: 'emp1', name: 'أحمد علي', role: 'مخرج', phone: '01001234567', salaryPerOrder: 300, active: true, totalOrders: 0 },
            { id: 'emp2', name: 'محمود حسن', role: 'مصور', phone: '01002345678', salaryPerOrder: 200, active: true, totalOrders: 0 }
        ];
        bookings = [
            { id: 'b1', clientName: 'محمد عبدالله', phone: '01012345678', hallId: 'h1', hallName: 'القاعة المغلقة', date: new Date().toISOString().slice(0,10), price: 5000, status: 'pending', paymentStatus: 'pending', assignedEmployees: [] }
        ];
        clients = [{ id: 'c1', name: 'محمد عبدالله', phone: '01012345678', email: '' }];
        equipmentInventory = { eq1: { name: 'كاميرا', quantity: 3, minStock: 1, category: 'تصوير' } };
        saveAllData();
    }
}
function updateEmployeeOrders() {
    const active = bookings.filter(b => b.status !== 'cancelled');
    employees.forEach(e => e.totalOrders = active.filter(b => (b.assignedEmployees || []).includes(e.id)).length);
}

// ======================== دوال الحجوزات (مبسطة) ========================
function addBooking() {
    const name = prompt('اسم العميل'), hallId = prompt('معرف القاعة (h1/h2)'), price = parseInt(prompt('السعر'));
    if (name && hallId && price) {
        const hall = halls.find(h => h.id === hallId);
        if (hall) {
            bookings.push({ id: 'b' + Date.now(), clientName: name, phone: '', hallId, hallName: hall.name, date: new Date().toISOString().slice(0,10), price, status: 'pending', paymentStatus: 'pending', assignedEmployees: [] });
            saveAllData();
            renderBookings();
            showMsg('✅ تمت الإضافة');
        } else alert('قاعة غير موجودة');
    }
}
function markComplete(id) {
    const b = bookings.find(x => x.id === id);
    if (b) { b.status = 'completed'; b.paymentStatus = 'paid'; saveAllData(); renderBookings(); showMsg('✅ تم الإكمال'); }
}
function deleteBooking(id) {
    if (confirm('حذف الحجز؟')) { bookings = bookings.filter(b => b.id !== id); saveAllData(); renderBookings(); showMsg('🗑️ تم الحذف'); }
}
function renderBookings() {
    const filtered = bookings.filter(b => b.status !== 'cancelled');
    document.getElementById('bookings').innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow"><h2 class="text-xl font-bold mb-3">📅 الحجوزات (${filtered.length})</h2><button onclick="addBooking()" class="btn-primary mb-3">+ حجز جديد</button>
        <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th><th>الحالة</th><th></th></tr></thead><tbody>${filtered.map(b => `<tr><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price} ج.م</td><td><span class="px-2 py-1 rounded-full ${b.status==='pending'?'bg-yellow-100':'bg-green-100'}">${b.status}</span></td><td><button onclick="markComplete('${b.id}')" class="text-green-600">إكمال</button> <button onclick="deleteBooking('${b.id}')" class="text-red-600">حذف</button></td></tr>`).join('')}</tbody></table></div></div>`;
}

// ======================== الحضور والانصراف ========================
function getTodayDateStr() { return new Date().toISOString().slice(0,10); }
function getTodayAttendance(empId) { return attendanceRecords.find(a => a.empId === empId && a.date === getTodayDateStr()); }
function checkIn(empId) {
    const today = getTodayDateStr();
    const existing = getTodayAttendance(empId);
    if (existing && existing.checkIn) return showMsg('⚠️ تم تسجيل الحضور مسبقاً', 'warning');
    const time = new Date().toLocaleTimeString('ar-EG');
    if (existing) { existing.checkIn = time; existing.status = 'present'; }
    else { attendanceRecords.push({ id: Date.now(), empId, date: today, checkIn: time, checkOut: null, status: 'present' }); }
    saveAllData();
    showMsg(`✅ تم تسجيل حضور الساعة ${time}`);
}
function checkOut(empId) {
    const rec = getTodayAttendance(empId);
    if (!rec || !rec.checkIn) return showMsg('⚠️ لم يتم تسجيل الحضور بعد', 'warning');
    if (rec.checkOut) return showMsg('⚠️ تم تسجيل الانصراف مسبقاً', 'warning');
    rec.checkOut = new Date().toLocaleTimeString('ar-EG');
    saveAllData();
    showMsg(`✅ تم تسجيل الانصراف الساعة ${rec.checkOut}`);
}
function showQrModal(empId, empName) {
    const qrData = `emp_attendance_${empId}`;
    openModal(`
        <h3 class="text-xl font-bold mb-4">📱 مسح QR للحضور/الانصراف</h3>
        <p>الموظف: <strong>${empName}</strong></p>
        <div id="qrCode" class="flex justify-center my-4"></div>
        <div class="flex gap-2 mt-4"><button onclick="checkIn('${empId}');closeModal();" class="btn-primary px-4 py-2 rounded">تسجيل حضور</button><button onclick="checkOut('${empId}');closeModal();" class="bg-amber-600 text-white px-4 py-2 rounded">تسجيل انصراف</button></div>
    `);
    setTimeout(() => { new QRCode(document.getElementById("qrCode"), { text: qrData, width: 200, height: 200 }); }, 100);
}
function renderAttendance() {
    const emp = employees.find(e => e.id === currentUser?.employeeId);
    const todayRec = emp ? getTodayAttendance(emp.id) : null;
    document.getElementById('attendance').innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow"><h2 class="text-xl font-bold mb-4">📋 الحضور والانصراف</h2>
        <div class="mb-4"><button onclick="showQrModal('${emp.id}','${emp.name}')" class="btn-primary">📱 عرض QR كود</button>
        <div class="mt-2 flex gap-2"><button onclick="checkIn('${emp.id}')" class="btn-primary">حضور</button><button onclick="checkOut('${emp.id}')" class="bg-amber-600 text-white px-4 py-2 rounded">انصراف</button></div>
        <div class="mt-2">حالة اليوم: ${todayRec ? (todayRec.checkOut ? '✅ تم الحضور والانصراف' : '🟢 تم الحضور فقط') : '❌ لم يتم التسجيل'}</div></div>
        <h3 class="font-bold">سجل الحضور السابق</h3><table class="w-full text-sm"><thead><tr><th>التاريخ</th><th>الحضور</th><th>الانصراف</th></tr></thead><tbody>${attendanceRecords.filter(a => a.empId === emp?.id).map(a => `<tr><td>${a.date}</td><td>${a.checkIn || '-'}</td><td>${a.checkOut || '-'}</td></tr>`).join('') || '<tr><td colspan="3">لا توجد سجلات</td></tr>'}</tbody></table></div>`;
}

// ======================== واجهة المدير ========================
function renderAdminDashboard() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-gray-100">
            <header class="bg-white shadow p-3 flex justify-between items-center"><h1 class="text-xl font-bold">${companyLogo} ${companyName}</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header>
            <div class="flex overflow-x-auto border-b bg-white px-2 sticky top-12 z-40">
                <button data-tab="dashboard" class="tab-btn px-4 py-2 rounded-t-lg active">📊 الرئيسية</button>
                <button data-tab="bookings" class="tab-btn px-4 py-2 rounded-t-lg">📅 الحجوزات</button>
                <button data-tab="employees" class="tab-btn px-4 py-2 rounded-t-lg">👥 الموظفين</button>
                <button data-tab="attendance" class="tab-btn px-4 py-2 rounded-t-lg">📋 الحضور</button>
            </div>
            <main class="p-4 max-w-7xl mx-auto">
                <div id="dashboard" class="tab-pane"><div class="bg-white p-4 rounded-xl shadow"><h2 class="text-xl font-bold">مرحباً أيها المدير</h2><p>هذه لوحة التحكم الرئيسية. يمكنك من هنا إدارة كل شيء.</p></div></div>
                <div id="bookings" class="tab-pane hidden"></div>
                <div id="employees" class="tab-pane hidden"><div class="bg-white p-4 rounded-xl shadow"><h2 class="text-xl font-bold">👥 الموظفين</h2><table class="w-full"><thead><tr><th>الاسم</th><th>الدور</th><th>الهاتف</th><th>الأوردرات</th></tr></thead><tbody>${employees.map(e => `<tr><td>${e.name}</td><td>${e.role}</td><td>${e.phone}</td><td>${e.totalOrders || 0}</td></tr>`).join('')}</tbody></table></div></div>
                <div id="attendance" class="tab-pane hidden"></div>
            </main>
        </div>`;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
        document.getElementById(tab).classList.remove('hidden');
        if (tab === 'bookings') renderBookings();
        if (tab === 'attendance') renderAttendance();
    }));
    renderBookings();
    renderAttendance();
}

function renderEmployeeDashboard() {
    const emp = employees.find(e => e.id === currentUser.employeeId);
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-gray-100"><header class="bg-white p-3 flex justify-between"><h1 class="text-xl font-bold">${companyLogo} ${companyName}</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header>
        <main class="p-4 max-w-md mx-auto"><div class="bg-white p-5 rounded-xl shadow"><h2 class="text-2xl font-bold">مرحباً ${emp?.name}</h2><div class="grid grid-cols-2 gap-3 mt-4"><div><div class="text-3xl font-bold text-emerald-600">${emp?.totalOrders || 0}</div><div>أوردرات</div></div><div><div class="text-3xl font-bold text-blue-600">${((emp?.totalOrders || 0) * (emp?.salaryPerOrder || 0)).toLocaleString()} ج.م</div><div>المستحق</div></div></div><button onclick="showQrModal('${emp?.id}','${emp?.name}')" class="btn-primary w-full mt-4">📋 تسجيل الحضور QR</button></div></main></div>`;
}

function showLogin() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700 p-4">
            <div class="bg-white p-6 rounded-2xl w-full max-w-md text-center shadow-2xl">
                <h1 class="text-3xl font-bold text-emerald-700 mb-2">${companyLogo} ${companyName}</h1>
                <p class="text-gray-500 mb-6">نظام إدارة القاعات الذكي</p>
                <input type="text" id="loginUser" placeholder="اسم المستخدم" class="w-full border p-3 rounded-xl mb-3">
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full border p-3 rounded-xl mb-2">
                <button onclick="doLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">دخول</button>
                <div class="mt-4 text-sm text-gray-400"><p>المدير: <strong>ahmed</strong> / <strong>1994</strong></p><p>الموظف: <strong>ahmed_emp</strong> / <strong>emp123</strong></p></div>
            </div>
        </div>`;
}

function doLogin() {
    const un = document.getElementById('loginUser').value.trim();
    const pw = document.getElementById('loginPass').value;
    const user = users.find(u => u.username === un && u.password === pw);
    if (user) {
        currentUser = user;
        sessionStorage.setItem('drmedia_user', JSON.stringify(user));
        if (user.role === 'admin') renderAdminDashboard();
        else renderEmployeeDashboard();
        showMsg(`مرحباً ${user.name}`);
    } else {
        showMsg('❌ اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
    }
}
function logout() {
    sessionStorage.removeItem('drmedia_user');
    currentUser = null;
    showLogin();
    showMsg('👋 تم تسجيل الخروج');
}

// بدء التطبيق
loadAllData();
updateEmployeeOrders();
const saved = sessionStorage.getItem('drmedia_user');
if (saved) {
    currentUser = JSON.parse(saved);
    if (currentUser.role === 'admin') renderAdminDashboard();
    else renderEmployeeDashboard();
} else {
    showLogin();
}
</script>
</body>
</html>
