    <style>
        :root {
            --primary: #16a34a; --primary-dark: #15803d; --danger: #dc2626;
            --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --text-secondary: #6b7280;
            --border: #e5e7eb; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh;
        }
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #1f2937; color: white; padding: 12px 24px; border-radius: 40px;
            z-index: 10000; opacity: 0; pointer-events: none; transition: 0.3s;
            white-space: nowrap; box-shadow: 0 10px 25px rgba(0,0,0,0.3); font-weight: 500;
        }
        .toast.show { opacity: 1; pointer-events: auto; }
        .toast.success { background: #059669; } .toast.error { background: #dc2626; } .toast.warning { background: #d97706; }
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex;
            align-items: center; justify-content: center; z-index: 1100;
            visibility: hidden; opacity: 0; transition: 0.2s; backdrop-filter: blur(4px); padding: 16px;
        }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content {
            background: var(--card); border-radius: 24px; max-width: 700px; width: 100%;
            max-height: 85vh; overflow-y: auto; padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); transform: scale(0.95); transition: 0.2s;
        }
        .modal.show .modal-content { transform: scale(1); }
        .tab-btn {
            padding: 10px 20px; border-radius: 12px 12px 0 0; cursor: pointer;
            background: #e5e7eb; margin-left: 4px; transition: 0.2s; border: none;
            font-size: 0.9rem; font-weight: 500; white-space: nowrap;
        }
        .tab-btn.active { background-color: var(--primary); color: white; }
        .btn-primary {
            background: var(--primary); color: white; padding: 10px 20px; border-radius: 30px;
            border: none; cursor: pointer; font-weight: 600; font-size: 0.9rem;
        }
        .btn-secondary { background: #2563eb; color: white; padding: 8px 16px; border-radius: 30px; border: none; cursor: pointer; }
        .btn-danger { background: var(--danger); color: white; padding: 8px 16px; border-radius: 30px; border: none; cursor: pointer; }
        .status-badge { display: inline-block; padding: 5px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 700; }
        .status-pending { background: #fef3c7; color: #92400e; } .status-completed { background: #d1fae5; color: #065f46; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
        .calendar-day {
            background: white; border: 1px solid #e5e7eb; border-radius: 8px;
            padding: 8px; text-align: center; cursor: pointer; font-size: 0.85rem;
        }
        .calendar-day.booked { background: #d1fae5; border-color: #86efac; font-weight: 700; }
        .calendar-day.today { background: #dbeafe; border-color: #93c5fd; font-weight: 700; }
        .stat-card { background: var(--card); border-radius: 20px; padding: 20px; text-align: center; box-shadow: var(--shadow); }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--primary); } .stat-label { font-size: 0.85rem; color: var(--text-secondary); }
        .bg-card { background: var(--card); border-radius: 20px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
        .hidden { display: none !important; }
        body.dark { --bg: #1e1e2f; --card: #2d2d3a; --text: #e5e7eb; --text-secondary: #9ca3af; --border: #404050; }
        body.dark input,body.dark select,body.dark textarea { background: #3a3a4a; color: #e5e7eb; border-color: #555; }
        body.dark .tab-btn { background: #3a3a4a; color: #e5e7eb; } body.dark .tab-btn.active { background: var(--primary); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 10px 8px; text-align: right; border-bottom: 1px solid var(--border); }
        th { background: #f9fafb; font-weight: 600; }
        @media (max-width: 640px) { .tab-btn { padding: 8px 12px; font-size: 0.75rem; } }
    </style>
</head>

const translations = {
    ar: { dashboard:"📊 الرئيسية", bookings:"📅 الحجوزات", employees:"👥 الموظفين", halls:"🏛️ القاعات", clients:"👥 العملاء", equipment:"📦 المعدات", attendance:"📋 الحضور", payroll:"💰 المرتبات", calendar:"📆 التقويم", distribution:"⚙️ التوزيع", reports:"📊 التقارير", advancedReports:"📈 تقارير متقدمة", notifications:"🔔 الإشعارات", users:"👥 المستخدمين", trash:"🗑️ سلة المحذوفات", activityLog:"📜 سجل النشاطات", internet:"🌐 الإنترنت", settings:"⚙️ الإعدادات" },
    en: { dashboard:"📊 Dashboard", bookings:"📅 Bookings", employees:"👥 Employees", halls:"🏛️ Halls", clients:"👥 Clients", equipment:"📦 Equipment", attendance:"📋 Attendance", payroll:"💰 Payroll", calendar:"📆 Calendar", distribution:"⚙️ Distribution", reports:"📊 Reports", advancedReports:"📈 Advanced Reports", notifications:"🔔 Notifications", users:"👥 Users", trash:"🗑️ Trash", activityLog:"📜 Activity Log", internet:"🌐 Internet", settings:"⚙️ Settings" }
};
function t(key) { return (translations[appLanguage] && translations[appLanguage][key]) || translations.ar[key] || key; }

// ==================== Utility Functions ====================
function showMsg(msg, type='success') { const tEl=document.getElementById('toast'); if(!tEl)return; tEl.textContent=msg; tEl.className='toast '+type+' show'; clearTimeout(tEl._timeout); tEl._timeout=setTimeout(()=>{tEl.classList.remove('show');tEl.className='toast';},3500); }
function showError(msg) { showMsg(msg,'error'); }
function showWarning(msg) { showMsg(msg,'warning'); }
function closeModal() { const m=document.getElementById('modal'); if(m){ m.classList.remove('show'); document.body.style.overflow=''; } }
function openModal(content) { const modal=document.getElementById('modal'), mc=document.getElementById('modalContent'); if(!modal||!mc)return; mc.innerHTML=content; modal.classList.add('show'); document.body.style.overflow='hidden'; modal.onclick=function(e){ if(e.target===modal)closeModal(); }; }
function applyTheme(theme) { appTheme=theme; document.body.className=''; if(theme==='dark')document.body.classList.add('dark'); }
function safeGetLocal(key, fallback) { try{ const r=localStorage.getItem(key); return r?JSON.parse(r):fallback; }catch(e){ return fallback; } }
function safeSetLocal(key, value) { try{ localStorage.setItem(key, JSON.stringify(value)); return true; }catch(e){ showWarning('مساحة التخزين ممتلئة'); return false; } }
function getTodayDateStr() { return new Date().toISOString().slice(0,10); }
function generateId(prefix='') { return prefix + Date.now().toString(36) + Math.random().toString(36).substr(2,6); }
function updateEmployeeOrders() { employees.forEach(e=>{ let c=0; bookings.forEach(b=>{ if(b.status!=='cancelled'&&(b.assignedEmployees||[]).includes(e.id)&&attendanceRecords.some(a=>a.empId===e.id&&a.date===b.date&&a.checkIn))c++; }); e.totalOrders=c; }); }
function addActivity(action, details) { activityLog.unshift({ id:generateId('act_'), timestamp:new Date().toISOString(), user:currentUser?currentUser.name:'النظام', action, details }); if(activityLog.length>200)activityLog.length=200; saveAllData(); }
function isAdmin() { return currentUser&&currentUser.role==='admin'; }
function isEmployee() { return currentUser&&currentUser.role==='employee'; }
function isAgent() { return currentUser&&currentUser.role==='agent'; }

// ==================== Storage ====================
async function saveAllData() {
    const fd = { bookings, employees, halls, clients, equipmentInventory, attendanceRecords, payrollArchive, employeeLoans, notifications, trashBin, activityLog, companyName, companyLogo:companyLogoBase64||companyLogo, USERS, rotationCounters, whatsappEnabled, whatsappBusinessNumber, whatsappMessageTemplate, appTheme, appLanguage };
    safeSetLocal('drmedia_data', fd);
    if(useFirebase&&db&&online) try{ await db.ref('/').set(fd); lastSync=new Date(); }catch(e){ online=false; }
    applyTheme(appTheme);
}
async function loadAllData() {
    let loaded=false;
    if(useFirebase&&db) try{ const s=await db.ref('/').get(); if(s.exists()){ loadDataObject(s.val()); online=true; lastSync=new Date(); loaded=true; } }catch(e){ online=false; }
    if(!loaded){ const raw=safeGetLocal('drmedia_data',null); if(raw)loadDataObject(raw); else initializeDefaultData(); }
    ensureMinimumData(); updateEmployeeOrders(); await saveAllData(); applyTheme(appTheme);
}
function loadDataObject(d) {
    bookings=d.bookings||[]; employees=d.employees||[]; halls=d.halls||[]; clients=d.clients||[];
    equipmentInventory=d.equipmentInventory||{}; attendanceRecords=d.attendanceRecords||[];
    payrollArchive=d.payrollArchive||[]; employeeLoans=d.employeeLoans||{}; notifications=d.notifications||[];
    trashBin=d.trashBin||[]; activityLog=d.activityLog||[]; companyName=d.companyName||companyName;
    if(d.companyLogo&&d.companyLogo.startsWith('data:image'))companyLogoBase64=d.companyLogo; else companyLogo=d.companyLogo||companyLogo;
    USERS=d.USERS||USERS; rotationCounters=d.rotationCounters||{dir:0,ph:0,cr:0};
    whatsappEnabled=d.whatsappEnabled!==undefined?d.whatsappEnabled:true;
    whatsappBusinessNumber=d.whatsappBusinessNumber||"201001234567";
    whatsappMessageTemplate=d.whatsappMessageTemplate||"مرحباً {name}، تم توزيع أوردر {client} في {date} بقاعة {hall}";
    appTheme=d.appTheme||"light"; appLanguage=d.appLanguage||"ar";
}
function initializeDefaultData() { bookings=[]; employees=[]; halls=[]; clients=[]; equipmentInventory={}; attendanceRecords=[]; payrollArchive=[]; employeeLoans={}; notifications=[]; trashBin=[]; activityLog=[]; }
function ensureMinimumData() {
    if(!halls.length)halls=[{id:'h1',name:'القاعة المغلقة',type:'closed',basePrice:5000,active:true},{id:'h2',name:'القاعة المفتوحة',type:'open',basePrice:4000,active:true},{id:'h3',name:'الكافيه',type:'cafe',basePrice:2000,active:true}];
    if(!employees.length)employees=[{id:'emp1',name:'أحمد علي',role:'مخرج',phone:'01001234567',salaryPerOrder:300,active:true,totalOrders:0,userId:'emp1'},{id:'emp2',name:'محمود حسن',role:'مصور',phone:'01002345678',salaryPerOrder:200,active:true,totalOrders:0,userId:null},{id:'emp3',name:'سامر خالد',role:'كرين',phone:'01003456789',salaryPerOrder:250,active:true,totalOrders:0,userId:null}];
    if(!clients.length)clients=[{id:'c1',name:'محمد عبدالله',phone:'01012345678',email:'',address:''}];
    if(Object.keys(equipmentInventory).length===0)equipmentInventory={eq1:{name:'كاميرا Sony A7',quantity:3,minStock:1,category:'تصوير'}};
    if(!bookings.length)bookings=[{id:'b1',clientName:'محمد عبدالله',clientId:'c1',phone:'01012345678',hallId:'h1',hallName:'القاعة المغلقة',date:getTodayDateStr(),price:5000,status:'pending',paymentStatus:'pending',assignedEmployees:[],notes:'',packageType:'',totalPersons:0}];
    if(!attendanceRecords.length) { const today = new Date(); for(let i=0; i<5; i++) { const d = new Date(today); d.setDate(d.getDate()-i); const ds = d.toISOString().slice(0,10); attendanceRecords.push({id:generateId('att_'),empId:'emp1',date:ds,checkIn:'09:00 ص',checkOut:'05:00 م',status:'present'}); } }
    employees.forEach(emp=>{if(emp.userId){const u=USERS.find(u=>u.id===emp.userId);if(u)u.employeeId=emp.id;}});
}

// ==================== Notifications & WhatsApp ====================
function sendWhatsApp(phone,msg){if(!whatsappEnabled||!phone)return;let c=phone.replace(/[^0-9+]/g,'');if(c.startsWith('0'))c='2'+c;if(!c.startsWith('+'))c='+'+c;window.open(`https://wa.me/${c}?text=${encodeURIComponent(msg)}`,'_blank');}
function notifyEmployee(emp,title,body,sendWA=true){if(!emp||!emp.id)return;notifications.unshift({id:generateId('notif_'),title,body,date:new Date().toLocaleString('ar-EG'),recipient:emp.id});if(sendWA&&emp.phone)sendWhatsApp(emp.phone,`${title}\n${body}`);saveAllData();if(browserNotifications&&'Notification'in window&&Notification.permission==='granted')try{new Notification(title,{body});}catch(e){}}
function checkReminders(){const today=getTodayDateStr();bookings.forEach(b=>{if(b.status==='pending'&&b.date===today){(b.assignedEmployees||[]).forEach(eid=>{const emp=employees.find(e=>e.id===eid);if(emp)notifyEmployee(emp,t('reminder'),`لديك أوردر لـ ${b.clientName} اليوم في ${b.hallName}`,true);});}});}

// ==================== Attendance & QR ====================
async function checkIn(empId){const today=getTodayDateStr();const exist=attendanceRecords.find(a=>a.empId===empId&&a.date===today);if(exist&&exist.checkIn){showWarning('⚠️ تم التسجيل مسبقاً');return;}const time=new Date().toLocaleTimeString('ar-EG');if(exist){exist.checkIn=time;exist.status='present';}else attendanceRecords.push({id:generateId('att_'),empId,date:today,checkIn:time,checkOut:null,status:'present'});addActivity('حضور',`الموظف ${empId} سجل حضور`);await saveAllData();updateEmployeeOrders();refreshView();showMsg(`✅ حضور ${time}`);}
async function checkOut(empId){const today=getTodayDateStr();const rec=attendanceRecords.find(a=>a.empId===empId&&a.date===today);if(!rec||!rec.checkIn){showWarning('⚠️ لم يسجل حضور');return;}if(rec.checkOut){showWarning('⚠️ تم الانصراف مسبقاً');return;}rec.checkOut=new Date().toLocaleTimeString('ar-EG');addActivity('انصراف',`الموظف ${empId} سجل انصراف`);await saveAllData();refreshView();showMsg(`✅ انصراف ${rec.checkOut}`);}
function refreshView(){if(isAdmin()){renderAttendance();renderPayroll();}else if(isEmployee())renderEmployeeDashboard();}
function renderManagerQR(){const qc=document.getElementById('attendanceQrContainer');if(!qc)return;qc.innerHTML='';try{new QRCode(qc,{text:`DRMEDIA_ATT_${getTodayDateStr()}`,width:200,height:200});}catch(e){qc.innerHTML='<p class="text-red-500">تعذر إنشاء QR</p>';}}
async function startEmployeeScan(){if(!isEmployee()){showError("خاصية الموظفين فقط");return;}openModal(`<h3 class="text-xl font-bold mb-4">📷 مسح QR</h3><div id="qr-reader" style="width:100%;max-width:400px;margin:0 auto;"></div><div class="flex gap-2 mt-4"><button onclick="stopScannerAndClose()" class="btn-danger w-full">إلغاء</button></div>`);setTimeout(()=>{const el=document.getElementById('qr-reader');if(!el)return;try{const scanner=new Html5Qrcode("qr-reader");html5QrCode=scanner;scanner.start({facingMode:"environment"},{fps:10,qrbox:250},(text)=>{if(text&&text.startsWith("DRMEDIA_ATT_")&&text===`DRMEDIA_ATT_${getTodayDateStr()}`){stopScannerAndClose();const emp=employees.find(e=>e.id===currentUser.employeeId);if(emp)openModal(`<h3 class="text-xl font-bold mb-4">تسجيل الحضور والانصراف</h3><p class="mb-4">الموظف: <strong>${emp.name}</strong></p><div class="flex gap-3"><button onclick="performCheckInFromQR('${emp.id}')" class="btn-primary flex-1">✅ حضور</button><button onclick="performCheckOutFromQR('${emp.id}')" class="btn-secondary flex-1">🚪 انصراف</button><button onclick="closeModal()" class="btn-outline flex-1">إلغاء</button></div>`);}else showError("رمز QR غير صالح");},(err)=>{});}catch(e){showError("تعذر بدء الكاميرا");closeModal();}},300);}
function stopScannerAndClose(){if(html5QrCode){try{html5QrCode.stop().then(()=>{html5QrCode=null;closeModal();}).catch(()=>{html5QrCode=null;closeModal();});}catch(e){html5QrCode=null;closeModal();}}else closeModal();}
async function performCheckInFromQR(empId){await checkIn(empId);closeModal();refreshView();}
async function performCheckOutFromQR(empId){await checkOut(empId);closeModal();refreshView();}

// 🆕 ENHANCED ATTENDANCE RENDER
function renderAttendance(){
    const c=document.getElementById('attendance'); if(!c)return;
    let html=`<div class="bg-card"><h2 class="text-xl font-bold mb-3">📋 ${t('attendance')}</h2>`;
    if(isAdmin()){
        html+=`<div class="mb-4 p-4 border-2 border-emerald-200 rounded-2xl bg-emerald-50 text-center">
            <div id="attendanceQrContainer" class="flex justify-center my-2"></div>
            <button onclick="renderManagerQR()" class="btn-primary text-sm">🔄 تحديث QR</button>
        </div>`;
    }
    html+=`<div class="flex gap-2 mb-3"><input type="date" id="attFilterDate" class="search-input" onchange="renderAttendance()"> <button onclick="addManualAttendance()" class="btn-primary">+ تسجيل يدوي</button></div>
    <table><thead><tr><th><input type="checkbox" id="selectAllAtt" onchange="toggleAllCheckboxes('attCheckbox', this.checked)"></th><th>الموظف</th><th>التاريخ</th><th>الحضور</th><th>الانصراف</th><th>الحالة</th><th></th></tr></thead><tbody>`;
    const filterDate = document.getElementById('attFilterDate')?.value;
    let filtered = attendanceRecords;
    if(filterDate) filtered = filtered.filter(a=>a.date===filterDate);
    filtered.slice().reverse().forEach(a=>{
        const emp = employees.find(e=>e.id===a.empId)||{};
        html+=`<tr><td><input type="checkbox" class="attCheckbox" data-id="${a.id}"></td><td>${emp.name||a.empId}</td><td>${a.date}</td><td>${a.checkIn||'—'}</td><td>${a.checkOut||'—'}</td><td>${a.status}</td><td><button onclick="deleteAttendance('${a.id}')" class="text-red-600">🗑️</button></td></tr>`;
    });
    html+=`</tbody></table><button onclick="deleteSelectedAttendance()" class="btn-danger mt-2">🗑️ حذف المحدد</button></div>`;
    c.innerHTML=html;
    if(isAdmin()) setTimeout(renderManagerQR, 200);
}
function addManualAttendance(){
    openModal(`<h3>➕ تسجيل حضور يدوي</h3><select id="attEmp" class="w-full border-2 p-3 rounded-xl my-2">${employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select><input type="date" id="attDate" value="${getTodayDateStr()}" class="w-full border-2 p-3 rounded-xl my-2"><input id="attCheckIn" placeholder="وقت الحضور (مثلاً 09:00 ص)" class="w-full border-2 p-3 rounded-xl my-2"><input id="attCheckOut" placeholder="وقت الانصراف (اختياري)" class="w-full border-2 p-3 rounded-xl my-2"><button onclick="saveManualAttendance()" class="btn-primary mt-2">حفظ</button>`);
}
async function saveManualAttendance(){
    const empId=document.getElementById('attEmp')?.value; const date=document.getElementById('attDate')?.value;
    const checkIn=document.getElementById('attCheckIn')?.value; const checkOut=document.getElementById('attCheckOut')?.value;
    if(!empId||!date){showError('بيانات ناقصة');return;}
    attendanceRecords.push({id:generateId('att_'),empId,date,checkIn:checkIn||null,checkOut:checkOut||null,status:checkIn?'present':'absent'});
    addActivity('تسجيل حضور يدوي',`الموظف ${empId} - ${date}`);
    await saveAllData(); renderAttendance(); closeModal(); showMsg('✅');
}
function deleteAttendance(id){if(confirm('حذف سجل الحضور؟')){attendanceRecords=attendanceRecords.filter(a=>a.id!==id);saveAllData();renderAttendance();showMsg('🗑️');}}
function deleteSelectedAttendance(){
    const selected=Array.from(document.querySelectorAll('.attCheckbox:checked')).map(cb=>cb.dataset.id);
    if(!selected.length){showWarning('اختر سجلات');return;}
    if(confirm(`حذف ${selected.length} سجل؟`)){attendanceRecords=attendanceRecords.filter(a=>!selected.includes(a.id));saveAllData();renderAttendance();showMsg('🗑️');}

function requestNotificationPermission(){
    if('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission().then(p => { browserNotifications = p === 'granted'; });
    } else if('Notification' in window && Notification.permission === 'granted') {
        browserNotifications = true;
    }
}
function setBackupPeriod(period){
    if(backupIntervalIdGlobal) clearInterval(backupIntervalIdGlobal);
    const hours = { '12h': 12, 'day': 24, 'week': 168, 'month': 720 }[period] || 24;
    backupIntervalIdGlobal = setInterval(exportBackup, hours * 3600000);
    showMsg(`⏰ تم ضبط النسخ الاحتياطي كل ${period}`);
}

async function initApp(){
    try{firebase.initializeApp(firebaseConfig);db=firebase.database();useFirebase=true;online=true;}catch(e){useFirebase=false;online=false;}
    await loadAllData(); applyTheme(appTheme);
    const saved = sessionStorage.getItem('drmedia_user');
    if(saved && saved !== 'undefined'){
        try{
            currentUser = JSON.parse(saved);
            const valid = USERS.find(u => u.id === currentUser.id);
            if(!valid){ sessionStorage.removeItem('drmedia_user'); currentUser=null; renderLogin(); return; }
            currentUser = valid;
            if(isAdmin()) renderAdminDashboard();
            else if(isEmployee()){
                if(!currentUser.employeeId){ showError('غير مرتبط بموظف'); renderLogin(); return; }
                renderEmployeeDashboard();
            }
            else renderAgentDashboard();
            requestNotificationPermission();
            checkReminders();
        }catch(e){ sessionStorage.removeItem('drmedia_user'); renderLogin(); }
    } else renderLogin();
    requestNotificationPermission();
    setInterval(checkReminders, 6*3600000);
    setBackupPeriod('day');
}

        const loans = (employeeLoans[e.id] || []).filter(l => !l.settled).reduce((s, l) => s + l.amount, 0);
        const salary = (e.totalOrders || 0) * (e.salaryPerOrder || 0);
        return `<tr><td>${e.name}</td><td>${e.role}</td><td>${e.phone || '—'}</td><td>${e.totalOrders || 0}</td><td>${salary.toLocaleString()}</td><td class="text-red-600">${loans.toLocaleString()}</td><td><button onclick="editEmployee('${e.id}')" class="text-amber-600">✏️</button> <button onclick="addLoan('${e.id}')" class="text-blue-600">💰</button></td></tr>`;
    }).join('')}
    </tbody></table></div>`;
}

// ---------- المعدات ----------
function renderEquipment() {
    const c = document.getElementById('equipment');
    if (!c) return;
    let html = `<div class="bg-card"><h2 class="text-xl font-bold mb-3">📦 ${t('equipment')}</h2><button onclick="addEquipmentItem()" class="btn-primary mb-3">+ معدة</button><table><thead><tr><th>المعدة</th><th>الكمية</th><th></th></tr></thead><tbody>`;
    for (let id in equipmentInventory) {
        const eq = equipmentInventory[id];
        html += `<tr><td>${eq.name}</td><td>${eq.quantity}</td><td><button onclick="adjustInv('${id}', -1)" class="bg-red-100 text-red-600 px-2 rounded">-</button> <button onclick="adjustInv('${id}', 1)" class="bg-green-100 text-green-600 px-2 rounded">+</button></td></tr>`;
    }
    html += `</tbody></table></div>`;
    c.innerHTML = html;
}

    <table><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>الموظفون</th><th></th></tr></thead><tbody>

// ---------- التقارير ----------
function renderReports() {
    document.getElementById('reports').innerHTML = `<div class="bg-card"><h2>📊 ${t('reports')}</h2><button onclick="exportToExcel()" class="btn-primary">Excel</button> <button onclick="exportBackup()" class="btn-secondary">JSON</button></div>`;
}
function exportBackup() {
    const d = JSON.stringify({ bookings, employees, halls, clients, equipmentInventory, attendanceRecords, payrollArchive, employeeLoans, notifications, trashBin, activityLog, companyName, USERS }, null, 2);
    const b = new Blob([d], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = `backup_${getTodayDateStr()}.json`;
    a.click();
    showMsg('✅');
}
function exportToExcel() {
    const ws = XLSX.utils.json_to_sheet(bookings.map(b => ({ العميل: b.clientName, التاريخ: b.date, القاعة: b.hallName, السعر: b.price, حالة: b.status })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'الحجوزات');
    XLSX.writeFile(wb, `bookings_${getTodayDateStr()}.xlsx`);
    showMsg('✅');
}
function renderAdvancedReports() {
    document.getElementById('advancedReports').innerHTML = `<div class="bg-card"><h2>📈 ${t('advancedReports')}</h2><canvas id="advChart" height="150"></canvas></div>`;
    setTimeout(() => {
        try { new Chart(document.getElementById('advChart'), { type: 'line', data: { labels: ['يناير', 'فبراير', 'مارس', 'أبريل'], datasets: [{ label: 'الإيرادات', data: [50000, 60000, 75000, 90000] }] } }); } catch (e) {}
    }, 100);
}

// ---------- دوال الإضافة والحذف (إن لم تكن موجودة) ----------
async function addBooking() {
    openModal(`<h3>➕ حجز</h3><input id="newClientName" placeholder="العميل" class="w-full border-2 p-3 rounded-xl my-2"><input id="newClientPhone" placeholder="الهاتف" class="w-full border-2 p-3 rounded-xl my-2"><select id="newHall" class="w-full border-2 p-3 rounded-xl my-2">${halls.filter(h => h.active).map(h => `<option value="${h.id}" data-price="${h.basePrice}">${h.name} - ${h.basePrice} ج.م</option>`).join('')}</select><input type="date" id="newDate" value="${getTodayDateStr()}" class="w-full border-2 p-3 rounded-xl my-2"><input type="number" id="newPrice" placeholder="السعر" class="w-full border-2 p-3 rounded-xl my-2"><button onclick="saveNewBooking()" class="btn-primary mt-2">حفظ</button>`);
    const hallSel = document.getElementById('newHall'); const priceInp = document.getElementById('newPrice');
    if (hallSel && priceInp) {
        hallSel.addEventListener('change', function () { const p = this.options[this.selectedIndex].getAttribute('data-price'); if (p) priceInp.value = p; });
        const defP = hallSel.options[hallSel.selectedIndex]?.getAttribute('data-price');
        if (defP && !priceInp.value) priceInp.value = defP;
    }
}
async function saveNewBooking() {
    const name = document.getElementById('newClientName')?.value.trim();
    const phone = document.getElementById('newClientPhone')?.value.trim();
    const hallId = document.getElementById('newHall')?.value;
    const date = document.getElementById('newDate')?.value;
    const price = parseInt(document.getElementById('newPrice')?.value) || 0;
    if (!name || !phone) { showError('بيانات العميل ناقصة'); return; }
    const hall = halls.find(h => h.id === hallId); if (!hall) return;
    let client = clients.find(c => c.phone === phone);
    if (!client) { client = { id: generateId('c_'), name, phone, email: '', address: '' }; clients.push(client); }
    bookings.push({ id: generateId('b_'), clientName: name, clientId: client.id, phone, hallId: hall.id, hallName: hall.name, date, price, status: 'pending', paymentStatus: 'pending', assignedEmployees: [], notes: '', packageType: '', totalPersons: 0 });
    await saveAllData(); renderBookings(); closeModal(); showMsg('✅');
}
async function editBooking(id) {
    const b = bookings.find(b => b.id === id); if (!b) return;
    openModal(`<h3>✏️ تعديل</h3><input id="editName" value="${b.clientName}" class="w-full border-2 p-3 rounded-xl my-2"><input id="editPhone" value="${b.phone}" class="w-full border-2 p-3 rounded-xl my-2"><input type="date" id="editDate" value="${b.date}" class="w-full border-2 p-3 rounded-xl my-2"><input type="number" id="editPrice" value="${b.price}" class="w-full border-2 p-3 rounded-xl my-2"><select id="editStatus" class="w-full border-2 p-3 rounded-xl my-2"><option value="pending" ${b.status === 'pending' ? 'selected' : ''}>معلق</option><option value="completed" ${b.status === 'completed' ? 'selected' : ''}>مكتمل</option></select><button onclick="saveEditBooking('${id}')" class="btn-primary mt-2">حفظ</button>`);
}
async function saveEditBooking(id) {
    const b = bookings.find(b => b.id === id); if (!b) return;
    b.clientName = document.getElementById('editName')?.value || b.clientName;
    b.phone = document.getElementById('editPhone')?.value || b.phone;
    b.date = document.getElementById('editDate')?.value || b.date;
    b.price = parseInt(document.getElementById('editPrice')?.value) || 0;
    b.status = document.getElementById('editStatus')?.value || b.status;
    await saveAllData(); renderBookings(); closeModal(); showMsg('✅');
}
async function deleteBookingSoft(id) {
    if (confirm('نقل للسلة؟')) {
        const b = bookings.find(b => b.id === id);
        if (b) { trashBin.push({ id: generateId('trash_'), type: 'booking', data: b, deletedAt: new Date().toISOString() }); bookings = bookings.filter(b => b.id !== id); await saveAllData(); renderBookings(); showMsg('🗑️'); }
    }
}
async function markComplete(id) {
    const b = bookings.find(b => b.id === id); if (b) { b.status = 'completed'; b.paymentStatus = 'paid'; await saveAllData(); renderBookings(); showMsg('✅'); }
}
async function addEmployee() {
    openModal(`<h3>➕ موظف</h3><input id="empName" placeholder="الاسم" class="w-full border-2 p-3 rounded-xl my-2"><select id="empRole" class="w-full border-2 p-3 rounded-xl my-2"><option>مخرج</option><option>مصور</option><option>كرين</option></select><input id="empPhone" placeholder="الهاتف" class="w-full border-2 p-3 rounded-xl my-2"><input id="empSalary" type="number" value="300" class="w-full border-2 p-3 rounded-xl my-2"><button onclick="saveNewEmployee()" class="btn-primary mt-2">حفظ</button>`);
}
async function saveNewEmployee() {
    const n = document.getElementById('empName')?.value.trim(); const r = document.getElementById('empRole')?.value; const p = document.getElementById('empPhone')?.value.trim(); const s = parseInt(document.getElementById('empSalary')?.value) || 300;
    if (!n) return;
    employees.push({ id: generateId('emp_'), name: n, role: r, phone: p, salaryPerOrder: s, active: true, totalOrders: 0, userId: null });
    await saveAllData(); renderEmployees(); closeModal(); showMsg('✅');
}
function editEmployee(id) {
    const e = employees.find(e => e.id === id); if (!e) return;
    openModal(`<h3>✏️ تعديل</h3><input id="editEmpName" value="${e.name}" class="w-full border-2 p-3 rounded-xl my-2"><select id="editEmpRole" class="w-full border-2 p-3 rounded-xl my-2"><option ${e.role === 'مخرج' ? 'selected' : ''}>مخرج</option><option ${e.role === 'مصور' ? 'selected' : ''}>مصور</option><option ${e.role === 'كرين' ? 'selected' : ''}>كرين</option></select><input id="editEmpPhone" value="${e.phone || ''}" class="w-full border-2 p-3 rounded-xl my-2"><input id="editEmpSalary" type="number" value="${e.salaryPerOrder}" class="w-full border-2 p-3 rounded-xl my-2"><button onclick="saveEditEmployee('${id}')" class="btn-primary mt-2">حفظ</button>`);
}
async function saveEditEmployee(id) {
    const e = employees.find(e => e.id === id); if (!e) return;
    e.name = document.getElementById('editEmpName')?.value || e.name; e.role = document.getElementById('editEmpRole')?.value || e.role; e.phone = document.getElementById('editEmpPhone')?.value || e.phone; e.salaryPerOrder = parseInt(document.getElementById('editEmpSalary')?.value) || e.salaryPerOrder;
    await saveAllData(); renderEmployees(); closeModal(); showMsg('✅');
}
async function addLoan(empId) {
    const amount = parseInt(prompt('قيمة السلفة:')); if (!amount) return;
    const reason = prompt('السبب:') || '';
    if (!employeeLoans[empId]) employeeLoans[empId] = [];
    employeeLoans[empId].push({ amount, date: new Date().toISOString(), reason, settled: false });
    await saveAllData(); renderEmployees(); renderPayroll(); showMsg('✅');
}
async function addHall() {
    openModal(`<h3>➕ قاعة</h3><input id="hallName" placeholder="الاسم" class="w-full border-2 p-3 rounded-xl my-2"><select id="hallType" class="w-full border-2 p-3 rounded-xl my-2"><option value="closed">مغلقة</option><option value="open">مفتوحة</option><option value="cafe">كافيه</option></select><input id="hallPrice" type="number" value="4000" class="w-full border-2 p-3 rounded-xl my-2"><button onclick="saveNewHall()" class="btn-primary mt-2">حفظ</button>`);
}
async function saveNewHall() {
    const n = document.getElementById('hallName')?.value.trim(); const t = document.getElementById('hallType')?.value; const p = parseInt(document.getElementById('hallPrice')?.value) || 0;
    if (!n) return;
    halls.push({ id: generateId('h_'), name: n, type: t, basePrice: p, active: true });
    await saveAllData(); renderHalls(); closeModal(); showMsg('✅');
}
function editHall(id) {
    const h = halls.find(h => h.id === id); if (!h) return;
    openModal(`<h3>✏️ تعديل</h3><input id="editHallName" value="${h.name}" class="w-full border-2 p-3 rounded-xl my-2"><select id="editHallType" class="w-full border-2 p-3 rounded-xl my-2"><option value="closed" ${h.type === 'closed' ? 'selected' : ''}>مغلقة</option><option value="open" ${h.type === 'open' ? 'selected' : ''}>مفتوحة</option><option value="cafe" ${h.type === 'cafe' ? 'selected' : ''}>كافيه</option></select><input id="editHallPrice" type="number" value="${h.basePrice}" class="w-full border-2 p-3 rounded-xl my-2"><button onclick="saveEditHall('${id}')" class="btn-primary mt-2">حفظ</button>`);
}
async function saveEditHall(id) {
    const h = halls.find(h => h.id === id); if (!h) return;
    h.name = document.getElementById('editHallName')?.value || h.name; h.type = document.getElementById('editHallType')?.value || h.type; h.basePrice = parseInt(document.getElementById('editHallPrice')?.value) || h.basePrice;
    bookings.forEach(b => { if (b.hallId === id) b.hallName = h.name; });
    await saveAllData(); renderHalls(); renderBookings(); closeModal(); showMsg('✅');
}
async function toggleHallActive(id) {
    const h = halls.find(h => h.id === id); if (!h) return; h.active = !h.active;
    await saveAllData(); renderHalls(); showMsg('✅');
}
async function deleteHall(id) {
    if (confirm('حذف؟')) {
        const h = halls.find(h => h.id === id);
        if (h) { trashBin.push({ id: generateId('trash_'), type: 'hall', data: h, deletedAt: new Date().toISOString() }); halls = halls.filter(h => h.id !== id); await saveAllData(); renderHalls(); showMsg('🗑️'); }
    }
}
async function addClient() {
    const n = prompt('الاسم'); const p = prompt('الهاتف');
    if (n && p) { clients.push({ id: generateId('c_'), name: n, phone: p, email: '', address: '' }); await saveAllData(); renderClients(); showMsg('✅'); }
}
function addEquipmentItem() {
    const n = prompt('الاسم'); const q = parseInt(prompt('الكمية'));
    if (n && q) { const id = generateId('eq_'); equipmentInventory[id] = { name: n, quantity: q, minStock: 1, category: 'عام' }; saveAllData(); renderEquipment(); showMsg('✅'); }
}
function adjustInv(id, delta) {
    if (equipmentInventory[id]) { equipmentInventory[id].quantity = Math.max(0, equipmentInventory[id].quantity + delta); saveAllData(); renderEquipment(); }
}
function setDistributionMode(mode) { distributionMode = mode; showMsg(`وضع التوزيع: ${mode}`); renderDistribution(); }
