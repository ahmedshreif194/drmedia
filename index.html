<!DOCTYPE html>
<html>
<head>
    <title>اختبار Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
    <h1>اختبار الاتصال بـ Firebase</h1>
    <button onclick="testSave()">حفظ بيانات تجريبية</button>
    <button onclick="testLoad()">تحميل البيانات</button>
    <div id="result"></div>

    <script>
        // إعدادات Firebase (نفس بياناتك)
        const firebaseConfig = {
            apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
            authDomain: "drmedia-vpms.firebaseapp.com",
            databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
            projectId: "drmedia-vpms",
            storageBucket: "drmedia-vpms.firebasestorage.app",
            messagingSenderId: "681162512380",
            appId: "1:681162512380:web:ab2482f3234d8b59fc4479"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        function testSave() {
            const testRef = db.ref('test/data');
            testRef.set({
                message: 'تم الحفظ بنجاح',
                time: new Date().toLocaleString(),
                testValue: Math.random()
            }).then(() => {
                document.getElementById('result').innerHTML = '<p style="color:green">✅ تم حفظ البيانات بنجاح في Firebase!</p>';
            }).catch((error) => {
                document.getElementById('result').innerHTML = '<p style="color:red">❌ خطأ في الحفظ: ' + error.message + '</p>';
                console.error(error);
            });
        }
        
        function testLoad() {
            const testRef = db.ref('test/data');
            testRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('result').innerHTML = '<p style="color:blue">📦 البيانات المسترجعة: ' + JSON.stringify(data) + '</p>';
                } else {
                    document.getElementById('result').innerHTML = '<p style="color:orange">⚠️ لا توجد بيانات، اضغط "حفظ" أولاً</p>';
                }
            }).catch((error) => {
                document.getElementById('result').innerHTML = '<p style="color:red">❌ خطأ في القراءة: ' + error.message + '</p>';
            });
        }
    </script>
</body>
</html>
