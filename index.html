// متغيرات البيانات (مزامنة مع Firebase أو localStorage)
let bookings = [];
let employees = [];

let equipmentInventory = {};
let attendanceRecords = [];
let swapRequests = [];

// ======================== دوال التخزين (Firebase + LocalStorage احتياطي) ========================
async function syncAllDataToFirebase() {
    if (!useFirebase) return;
    const batch = db.batch();
    const collections = { bookings, employees, halls, clients, attendanceRecords, payrollArchive, notifications, trashBin };
    for (let [key, data] of Object.entries(collections)) {
        const colRef = db.collection(key);
        const snapshot = await colRef.get();
        snapshot.forEach(doc => batch.delete(doc.ref));
        data.forEach(item => {
            const docRef = colRef.doc(item.id.toString());
            batch.set(docRef, { ...item });
        });
    }
    await batch.commit();
}

async function loadAllData() {
    // محاولة التحميل من Firebase أولاً
    if (useFirebase) {
        try {
            const snapshotBookings = await db.collection('bookings').get();
            bookings = snapshotBookings.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotEmployees = await db.collection('employees').get();
            employees = snapshotEmployees.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotHalls = await db.collection('halls').get();
            halls = snapshotHalls.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotClients = await db.collection('clients').get();
            clients = snapshotClients.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotAttendance = await db.collection('attendanceRecords').get();
            attendanceRecords = snapshotAttendance.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotPayroll = await db.collection('payrollArchive').get();
            payrollArchive = snapshotPayroll.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotNotif = await db.collection('notifications').get();
            notifications = snapshotNotif.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotTrash = await db.collection('trashBin').get();
            trashBin = snapshotTrash.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotEquipment = await db.collection('equipmentInventory').get();
            if (!snapshotEquipment.empty) equipmentInventory = snapshotEquipment.docs[0].data();
            console.log("تم التحميل من Firebase");
        } catch(e) { console.warn("Firebase load error", e); fallbackLocalLoad(); }
    } else {
        fallbackLocalLoad();
    }
    // التأكد من البيانات الافتراضية
    if (!halls.length) halls = [
        { id: 'h1', name: 'القاعة المغلقة', type: 'closed', active: true },
        { id: 'h2', name: 'القاعة المفتوحة', type: 'open', active: true },
        { id: 'h3', name: 'الكافيه', type: 'cafe', active: true }
    ];
    if (!employees.length) employees = [
        { id: 'emp1', name: 'أحمد علي', role: 'مخرج', phone: '01001234567', salaryPerOrder: 300, active: true, totalOrders: 0 },
        { id: 'emp2', name: 'محمود حسن', role: 'مصور', phone: '01002345678', salaryPerOrder: 200, active: true, totalOrders: 0 },
        { id: 'emp3', name: 'سامر خالد', role: 'كرين', phone: '01003456789', salaryPerOrder: 250, active: true, totalOrders: 0 }
    ];
    if (!bookings.length) bookings = [
        { id: 'b1', clientName: 'محمد عبدالله', phone: '01012345678', hallId: 'h1', hallName: 'القاعة المغلقة', date: new Date().toISOString().slice(0,10), price: 5000, status: 'pending', paymentStatus: 'pending', assignedEmployees: [] }
    ];
    if (!clients.length) clients = [{ id: 'c1', name: 'محمد عبدالله', phone: '01012345678', email: '' }];
    if (Object.keys(equipmentInventory).length === 0) equipmentInventory = { eq1: { name: 'كاميرا Sony A7', quantity: 3, minStock: 1, category: 'تصوير' } };
    updateEmployeeOrders();
    saveAllData(); // حفظ أي تغييرات افتراضية
}

function fallbackLocalLoad() {
    const raw = localStorage.getItem('drmedia_data');
    if (raw) {
        try {
            const data = JSON.parse(raw);
            bookings = data.bookings || [];
            employees = data.employees || [];
            halls = data.halls || [];
            clients = data.clients || [];
            equipmentInventory = data.equipmentInventory || {};
            attendanceRecords = data.attendanceRecords || [];
            swapRequests = data.swapRequests || [];
            payrollArchive = data.payrollArchive || [];
            employeeLoans = data.employeeLoans || {};
            notifications = data.notifications || [];
            trashBin = data.trashBin || [];
            companyName = data.companyName || companyName;
            companyLogo = data.companyLogo || companyLogo;
        } catch(e) { console.warn(e); }
    }
}

async function saveAllData() {
    if (useFirebase) {
        try {
            await syncAllDataToFirebase();
        } catch(e) { console.warn("Firebase save error", e); }
    }
    // دائماً نحفظ في localStorage كنسخة احتياطية
    const data = { bookings, employees, halls, clients, equipmentInventory, attendanceRecords, swapRequests, payrollArchive, employeeLoans, notifications, trashBin, companyName, companyLogo };
    localStorage.setItem('drmedia_data', JSON.stringify(data));
}

function updateEmployeeOrders() {
    const active = bookings.filter(b => b.status !== 'cancelled' && !b.deleted);
    employees.forEach(e => e.totalOrders = active.filter(b => (b.assignedEmployees || []).includes(e.id)).length);
}

// ======================== دوال الإشعارات والحضور ========================
function showMsg(msg) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }
function closeModal() { document.getElementById('modal').classList.remove('show'); document.body.style.overflow = ''; }
function openModal(content) { document.getElementById('modalContent').innerHTML = content; document.getElementById('modal').classList.add('show'); document.body.style.overflow = 'auto'; }

function sendNotification(title, body) {
    if (browserNotifications && Notification.permission === 'granted') new Notification(title, { body });
    notifications.unshift({ id: Date.now().toString(), title, body, date: new Date().toLocaleString('ar-EG'), read: false });
    saveAllData();
}

// دوال الحضور الأساسية
function getTodayDateStr() { return new Date().toISOString().slice(0,10); }
async function checkIn(empId) {
    const today = getTodayDateStr();
    const existing = attendanceRecords.find(a => a.empId === empId && a.date === today);
    if (existing && existing.checkIn) return showMsg('⚠️ تم تسجيل الحضور مسبقاً');
    const time = new Date().toLocaleTimeString('ar-EG');
    if (existing) {
        existing.checkIn = time;
        existing.status = 'present';
    } else {
        const newRec = { id: Date.now().toString(), empId, date: today, checkIn: time, checkOut: null, status: 'present' };
        attendanceRecords.push(newRec);
    }
    await saveAllData();
    showMsg(`✅ تم تسجيل حضور الساعة ${time}`);
    renderAttendance(); // تحديث واجهة المدير أو الموظف
}
async function checkOut(empId) {
    const today = getTodayDateStr();
    const rec = attendanceRecords.find(a => a.empId === empId && a.date === today);
    if (!rec || !rec.checkIn) return showMsg('⚠️ لم يتم تسجيل الحضور بعد');
    if (rec.checkOut) return showMsg('⚠️ تم تسجيل الانصراف مسبقاً');
    rec.checkOut = new Date().toLocaleTimeString('ar-EG');
    await saveAllData();
    showMsg(`✅ تم تسجيل انصراف الساعة ${rec.checkOut}`);
    renderAttendance();
}

// ======================== QR الموحد للمدير (مسح الموظف) ========================
function renderManagerQR() {
    const qrContainer = document.getElementById('attendanceQrContainer');
    if (!qrContainer) return;
    qrContainer.innerHTML = '';
    // QR نص ثابت يمكن للموظفين مسحه ضوئياً
    const qrText = `DRMEDIA_ATT_UNIVERSAL_${new Date().toISOString().slice(0,10)}`; // يومي متغير
    new QRCode(qrContainer, { text: qrText, width: 220, height: 220 });
    document.getElementById('qrCodeValue')?.setAttribute('data-qr-value', qrText);
}

// فتح كاميرا الموظف لمسح QR (موجود في لوحة الموظف)
let html5QrCode = null;
function startEmployeeScan() {
    openModal(`
        <h3 class="text-xl font-bold mb-4">📷 مسح رمز QR للحضور</h3>
        <div id="qr-reader" style="width:100%"></div>
        <div class="mt-4 flex gap-2 justify-center">
            <button onclick="stopScannerAndClose()" class="bg-red-600 text-white px-4 py-2 rounded-xl">إغلاق</button>
        </div>
    `);
    const html5QrCodeNew = new Html5Qrcode("qr-reader");
    html5QrCode = html5QrCodeNew;
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
    html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
        // عند مسح الكود نطلب من الموظف اختيار حضور أو انصراف
        if (decodedText && decodedText.includes("DRMEDIA_ATT_UNIVERSAL")) {
            stopScannerAndClose();
            showAttendanceChoiceForEmployee();
        } else {
            showMsg("رمز غير صالح للحضور");
        }
    }, (err) => { console.warn(err); });
}
function stopScannerAndClose() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => { closeModal(); html5QrCode = null; }).catch(()=>{});
    } else closeModal();
}
function showAttendanceChoiceForEmployee() {
    if (!currentUser || currentUser.role !== 'employee') { showMsg("يجب تسجيل الدخول كموظف"); return; }
    const emp = employees.find(e => e.id === currentUser.employeeId);
    if (!emp) return;
    openModal(`
        <h3 class="text-xl font-bold mb-4">تسجيل الحضور والانصراف</h3>
        <p class="mb-4">الموظف: <strong>${emp.name}</strong></p>
        <div class="flex gap-4 justify-center">
            <button onclick="performCheckInFromQR('${emp.id}')" class="btn-primary px-6 py-2 rounded-xl">✅ حضور</button>
            <button onclick="performCheckOutFromQR('${emp.id}')" class="bg-amber-600 text-white px-6 py-2 rounded-xl">🚪 انصراف</button>
        </div>
        <button onclick="closeModal()" class="mt-4 text-gray-500">إلغاء</button>
    `);
}
async function performCheckInFromQR(empId) { await checkIn(empId); closeModal(); renderAttendance(); if (currentUser.role === 'employee') renderEmployeeDashboard(); }
async function performCheckOutFromQR(empId) { await checkOut(empId); closeModal(); renderAttendance(); if (currentUser.role === 'employee') renderEmployeeDashboard(); }

// ======================== دوال الحجوزات والموظفين (CRUD مع حفظ في Firebase) ========================
async function addBooking() {
    const name = prompt('اسم العميل'), hallId = prompt('معرف القاعة (h1/h2/h3)'), price = parseInt(prompt('السعر'));
    if (name && hallId && price) {
        const hall = halls.find(h => h.id === hallId);
        if (hall) {
            const newBooking = { id: 'b' + Date.now(), clientName: name, phone: '', hallId, hallName: hall.name, date: new Date().toISOString().slice(0,10), price, status: 'pending', paymentStatus: 'pending', assignedEmployees: [] };
            bookings.push(newBooking);
            await saveAllData();
            autoDistribute();
            renderBookings();
            showMsg('✅ تمت الإضافة');
            sendNotification('حجز جديد', `تم إضافة حجز لـ ${name}`);
        } else alert('قاعة غير موجودة');
    }
}
async function markComplete(id) {
    const b = bookings.find(x => x.id === id);
    if (b) { b.status = 'completed'; b.paymentStatus = 'paid'; await saveAllData(); renderBookings(); showMsg('✅ تم الإكمال'); sendNotification('إكمال حجز', `تم إكمال حجز ${b.clientName}`); }
}
async function deleteBooking(id) {
    const b = bookings.find(x => x.id === id);
    if (b && confirm('حذف الحجز؟')) {
        moveToTrash(b, 'booking');
        bookings = bookings.filter(x => x.id !== id);
        await saveAllData();
        renderBookings();
        showMsg('🗑️ تم نقله إلى سلة المحذوفات');
    }
}
function autoDistribute() {
    const pending = bookings.filter(b=>b.status==='pending').sort((a,b)=>new Date(a.date)-new Date(b.date));
    const dirs = employees.filter(e=>e.role==='مخرج'&&e.active);
    const phs = employees.filter(e=>e.role==='مصور'&&e.active);
    const crs = employees.filter(e=>e.role==='كرين'&&e.active);
    let dirIndex=0, phIndex=0, crIndex=0;
    const daily = {};
    for(let b of pending){
        const date = b.date;
        if(!daily[date]) daily[date]={dirs:new Set(), phs:new Set(), crs:new Set()};
        const type = halls.find(h=>h.id===b.hallId)?.type||'closed';
        let assigned=[];
        if(type==='cafe'){
            if(phs.length){
                while(daily[date].phs.has(phs[phIndex%phs.length].id)) phIndex++;
                const ph = phs[phIndex%phs.length];
                assigned.push(ph.id);
                daily[date].phs.add(ph.id);
                phIndex++;
            }
        } else {
            if(dirs.length){
                while(daily[date].dirs.has(dirs[dirIndex%dirs.length].id)) dirIndex++;
                const dir = dirs[dirIndex%dirs.length];
                assigned.push(dir.id);
                daily[date].dirs.add(dir.id);
                dirIndex++;
            }
            if(phs.length){
                let added=0;
                for(let i=0;i<phs.length*2 && added<2;i++){
                    while(daily[date].phs.has(phs[phIndex%phs.length].id)) phIndex++;
                    const ph = phs[phIndex%phs.length];
                    if(!daily[date].phs.has(ph.id)){
                        assigned.push(ph.id);
                        daily[date].phs.add(ph.id);
                        added++;
                    }
                    phIndex++;
                }
            }
            if(crs.length){
                while(daily[date].crs.has(crs[crIndex%crs.length].id)) crIndex++;
                const cr = crs[crIndex%crs.length];
                assigned.push(cr.id);
                daily[date].crs.add(cr.id);
                crIndex++;
            }
        }
        b.assignedEmployees = assigned;
    }
    updateEmployeeOrders();
    saveAllData();
    showMsg('✅ تم التوزيع الذكي');
}
function renderBookings() { const c=document.getElementById('bookings'); if(!c)return; const f=bookings.filter(b=>b.status!=='cancelled'); c.innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><div class="flex justify-between"><h2 class="text-xl font-bold">📅 الحجوزات (${f.length})</h2><button onclick="addBooking()" class="btn-primary">+ حجز</button></div><table class="w-full mt-3"><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th><th>الحالة</th><th></th></tr></thead><tbody>${f.map(b=>`<tr><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price}</td><td><span class="status-badge ${b.status==='pending'?'status-pending':'status-completed'}">${b.status}</span></td><td><button onclick="markComplete('${b.id}')" class="text-green-600"><i class="fas fa-check"></i></button> <button onclick="deleteBooking('${b.id}')" class="text-red-600"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table></div>`; }
function renderEmployees() { const c=document.getElementById('employees'); if(!c)return; updateEmployeeOrders(); c.innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">👥 الموظفين</h2><table class="w-full"><thead><tr><th>الاسم</th><th>الدور</th><th>الهاتف</th><th>الأوردرات</th><th>المستحق</th></tr></thead><tbody>${employees.map(e=>`<tr><td>${e.name}</td><td>${e.role}</td><td>${e.phone}</td><td>${e.totalOrders}</td><td>${((e.totalOrders||0)*e.salaryPerOrder).toLocaleString()} ج.م</td></tr>`).join('')}</tbody></table><button onclick="addEmployee()" class="btn-primary mt-2">+ موظف</button></div>`; }
function addEmployee() { const n=prompt('الاسم'), r=prompt('الدور'), p=prompt('الهاتف'); if(n&&r){ employees.push({id:'emp'+Date.now(),name:n,role:r,phone:p,salaryPerOrder:r==='مخرج'?300:r==='مصور'?200:250,active:true,totalOrders:0}); saveAllData(); renderEmployees(); } }
function renderAttendance() {
    const container = document.getElementById('attendance');
    if(!container) return;
    const isAdmin = currentUser?.role === 'admin';
    const emp = currentUser?.role === 'employee' ? employees.find(e=>e.id===currentUser.employeeId) : null;
    const myAttendance = emp ? attendanceRecords.filter(a=>a.empId===emp.id).sort((a,b)=>b.date.localeCompare(a.date)) : [];
    const todayRec = emp ? attendanceRecords.find(a=>a.empId===emp.id && a.date===getTodayDateStr()) : null;
    let adminQrHtml = '';
    if(isAdmin){
        adminQrHtml = `<div class="mb-6 p-4 border-2 border-emerald-200 rounded-2xl bg-emerald-50 text-center">
            <h3 class="font-bold text-lg">📱 رمز QR الموحد للحضور والانصراف</h3>
            <p>يمكن للموظفين مسح هذا الكود لتسجيل الحضور أو الانصراف من هواتفهم</p>
            <div id="attendanceQrContainer" class="flex justify-center my-3"></div>
            <div id="qrCodeValue" class="text-xs text-gray-500 hidden"></div>
            <button onclick="renderManagerQR()" class="btn-primary mt-2 text-sm">تحديث QR</button>
        </div>`;
    }
    container.innerHTML = `
        <div class="bg-white p-4 rounded-2xl shadow">
            <h2 class="text-xl font-bold mb-4">📋 الحضور والانصراف</h2>
            ${adminQrHtml}
            ${currentUser?.role === 'employee' ? `
                <div class="mb-4 p-3 border rounded-xl bg-blue-50">
                    <div class="flex gap-2 justify-center">
                        <button onclick="startEmployeeScan()" class="btn-primary text-lg px-6 py-2"><i class="fas fa-camera"></i> مسح QR للحضور</button>
                    </div>
                    <div class="mt-2 text-center">حالة اليوم: ${todayRec ? (todayRec.checkOut ? '✅ تم الحضور والانصراف' : '🟢 تم الحضور فقط') : '❌ لم يتم التسجيل'}</div>
                </div>
            ` : ''}
            <h3 class="font-bold mt-2">سجل الحضور السابق</h3>
            <table class="w-full text-sm"><thead><tr><th>التاريخ</th><th>الحضور</th><th>الانصراف</th></tr></thead><tbody>${(emp ? myAttendance : attendanceRecords.slice(0,10)).map(a=>`<tr><td>${a.date}</td><td>${a.checkIn||'-'}</td><td>${a.checkOut||'-'}</td></tr>`).join('')||'<tr><td colspan="3">لا توجد سجلات</td></tr>'}</tbody></table>
        </div>`;
    if(isAdmin && document.getElementById('attendanceQrContainer')) renderManagerQR();
}
function renderPayroll() { updateEmployeeOrders(); const c=document.getElementById('payroll'); if(!c)return; c.innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">💰 المرتبات</h2><table class="w-full"><thead><tr><th>الموظف</th><th>الأوردرات</th><th>الإجمالي</th></tr></thead><tbody>${employees.map(e=>`<tr><td>${e.name}</td><td>${e.totalOrders}</td><td>${((e.totalOrders||0)*e.salaryPerOrder).toLocaleString()} ج.م</td></tr>`).join('')}</tbody></table></div>`; }
function renderHalls() { const c=document.getElementById('halls'); if(!c)return; c.innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">🏛️ القاعات</h2><table class="w-full">${halls.map(h=>`<tr><td>${h.name}</td><td>${h.type}</td><td>${bookings.filter(b=>b.hallId===h.id).length} حجوزات</td></tr>`).join('')}</table></div>`; }
function renderClients() { const c=document.getElementById('clients'); if(!c)return; c.innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">👥 العملاء</h2><table class="w-full"><thead><tr><th>الاسم</th><th>الهاتف</th></tr></thead><tbody>${clients.map(c=>`<tr><td>${c.name}</td><td>${c.phone}</td></tr>`).join('')}</tbody></table><button onclick="addClient()" class="btn-primary mt-2">+ عميل</button></div>`; }
function addClient() { const n=prompt('الاسم'), p=prompt('الهاتف'); if(n&&p){ clients.push({id:'c'+Date.now(),name:n,phone:p,email:''}); saveAllData(); renderClients(); } }
function renderEquipment() { const c=document.getElementById('equipment'); if(!c)return; let html=''; for(let id in equipmentInventory){ const e=equipmentInventory[id]; html+=`<div class="border p-2 rounded"><strong>${e.name}</strong> (${e.quantity}) <button onclick="adjustInventory('${id}',-1)">-</button> <button onclick="adjustInventory('${id}',1)">+</button></div>`; } c.innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">📦 المعدات</h2><div class="grid grid-cols-2 gap-2">${html}</div><button onclick="addEquipment()" class="btn-primary mt-2">+ معدة</button></div>`; }
function addEquipment() { const n=prompt('الاسم'), q=parseInt(prompt('الكمية','1')); if(n&&q){ const id='eq'+Date.now(); equipmentInventory[id]={name:n,quantity:q,minStock:1,category:'عام'}; saveAllData(); renderEquipment(); } }
function adjustInventory(id,delta){ if(equipmentInventory[id]){ equipmentInventory[id].quantity+=delta; saveAllData(); renderEquipment(); } }
function renderDistribution() { const c=document.getElementById('distribution'); if(!c)return; c.innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">⚙️ توزيع المهام</h2><button onclick="autoDistribute();renderDistribution();" class="btn-primary mb-3">توزيع ذكي</button>${bookings.filter(b=>b.status==='pending').map(b=>`<div class="border p-2 mb-1"><strong>${b.clientName}</strong> - موظفون: ${(b.assignedEmployees||[]).map(id=>employees.find(e=>e.id===id)?.name).join(',')}</div>`).join('')}</div>`; }
function renderCalendar() { document.getElementById('calendar').innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">📆 التقويم</h2><div class="calendar-grid">${['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'].map(d=>`<div class="font-bold">${d}</div>`).join('')}</div></div>`; }
function exportToExcel(){ const ws=XLSX.utils.json_to_sheet(bookings.map(b=>({العميل:b.clientName,التاريخ:b.date,السعر:b.price}))); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'الحجوزات'); XLSX.writeFile(wb,`Drmedia_${new Date().toISOString().slice(0,10)}.xlsx`); showMsg('تم التصدير'); }
function renderReports() { document.getElementById('reports').innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">📊 التقارير</h2><button onclick="exportToExcel()" class="btn-primary">Excel</button></div>`; }
function renderAdvancedReports() { document.getElementById('advancedReports').innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">📈 تقارير متقدمة</h2><canvas id="revenueChart" width="300" height="200"></canvas></div><script>new Chart(document.getElementById('revenueChart'),{type:'bar',data:{labels:['يناير','فبراير'],datasets:[{label:'الإيرادات',data:[5000,7000]}]}});<\/script>`; }
function renderTrash(){ const c=document.getElementById('trash'); if(!c)return; c.innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">🗑️ سلة المحذوفات</h2><p>${trashBin.length} عناصر</p></div>`; }
function renderNotifications(){ const c=document.getElementById('notifications'); if(!c)return; c.innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">🔔 الإشعارات</h2>${notifications.map(n=>`<div>${n.title} - ${n.body}</div>`).join('')}</div>`; }
function renderSystemUpdate(){ document.getElementById('systemUpdate').innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">🔄 تحديث النظام</h2><p>نسخة Firebase متكاملة</p></div>`; }
function renderSettings(){ document.getElementById('settings').innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">⚙️ الإعدادات</h2><input id="companyName" value="${companyName}" class="w-full border p-2"><button onclick="updateSettingsLocal()" class="btn-primary mt-2">حفظ</button></div>`; }
function updateSettingsLocal(){ companyName=document.getElementById('companyName').value; saveAllData(); showMsg('تم حفظ الإعدادات'); renderAdminDashboard(); }

// ======================== واجهات المدير والموظف ========================
function renderAdminDashboard() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-gray-100"><header class="bg-white p-3 flex justify-between"><h1 class="text-xl font-bold">${companyLogo} ${companyName}</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header>
        <div class="flex overflow-x-auto border-b bg-white px-2">${['dashboard','bookings','employees','halls','clients','equipment','attendance','payroll','calendar','distribution','reports','advancedReports','trash','notifications','systemUpdate','settings'].map(t=>`<button data-tab="${t}" class="tab-btn px-4 py-2 rounded-t-lg">${t}</button>`).join('')}</div>
        <main class="p-4"><div id="dashboard" class="tab-pane"><div class="stat-card">📊 لوحة التحكم</div></div><div id="bookings" class="tab-pane hidden"></div><div id="employees" class="tab-pane hidden"></div><div id="halls" class="tab-pane hidden"></div><div id="clients" class="tab-pane hidden"></div><div id="equipment" class="tab-pane hidden"></div><div id="attendance" class="tab-pane hidden"></div><div id="payroll" class="tab-pane hidden"></div><div id="calendar" class="tab-pane hidden"></div><div id="distribution" class="tab-pane hidden"></div><div id="reports" class="tab-pane hidden"></div><div id="advancedReports" class="tab-pane hidden"></div><div id="trash" class="tab-pane hidden"></div><div id="notifications" class="tab-pane hidden"></div><div id="systemUpdate" class="tab-pane hidden"></div><div id="settings" class="tab-pane hidden"></div></main></div>`;
    document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{
        document.querySelectorAll('.tab-pane').forEach(p=>p.classList.add('hidden'));
        const tab=btn.dataset.tab;
        document.getElementById(tab).classList.remove('hidden');
        if(tab==='bookings') renderBookings(); if(tab==='employees') renderEmployees(); if(tab==='halls') renderHalls(); if(tab==='clients') renderClients(); if(tab==='equipment') renderEquipment(); if(tab==='attendance') renderAttendance(); if(tab==='payroll') renderPayroll(); if(tab==='calendar') renderCalendar(); if(tab==='distribution') renderDistribution(); if(tab==='reports') renderReports(); if(tab==='advancedReports') renderAdvancedReports(); if(tab==='trash') renderTrash(); if(tab==='notifications') renderNotifications(); if(tab==='systemUpdate') renderSystemUpdate(); if(tab==='settings') renderSettings();
    }));
    renderBookings(); renderEmployees(); renderHalls(); renderClients(); renderEquipment(); renderAttendance(); renderPayroll(); renderCalendar(); renderDistribution(); renderReports(); renderAdvancedReports(); renderTrash(); renderNotifications(); renderSystemUpdate(); renderSettings();
}
function renderEmployeeDashboard() {
    const emp = employees.find(e=>e.id===currentUser.employeeId);
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-gray-100"><header class="bg-white p-3 flex justify-between"><h1 class="text-xl font-bold">${companyLogo} ${companyName}</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header>
        <main class="p-4"><div class="bg-white p-5 rounded-xl"><h2 class="text-2xl font-bold">مرحباً ${emp?.name}</h2><div class="grid grid-cols-2 gap-3 mt-4"><div>الأوردرات: ${emp?.totalOrders}</div><div>المستحق: ${((emp?.totalOrders||0)*(emp?.salaryPerOrder||0)).toLocaleString()} ج.م</div></div><button onclick="startEmployeeScan()" class="btn-primary w-full mt-4 text-lg py-3"><i class="fas fa-qrcode"></i> مسح QR للحضور والانصراف</button>
        <div class="mt-6"><h3 class="font-bold">حضوري اليوم</h3><div id="empAttendanceStatus"></div></div></div></main></div>`;
    renderAttendance(); // ليعرض حالة الموظف
}
function doLogin() { const un=document.getElementById('loginUser').value, pw=document.getElementById('loginPass').value; const user=USERS.find(u=>u.username===un && u.password===pw); if(user){ currentUser=user; sessionStorage.setItem('drmedia_user',JSON.stringify(user)); if(user.role==='admin') renderAdminDashboard(); else renderEmployeeDashboard(); showMsg(`مرحباً ${user.name}`); requestNotificationPermission(); } else showMsg('خطأ في بيانات الدخول'); }
function logout(){ sessionStorage.removeItem('drmedia_user'); currentUser=null; renderLogin(); }
function renderLogin(){ document.getElementById('app').innerHTML=`<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700 p-4"><div class="bg-white p-6 rounded-2xl w-full max-w-md"><h1 class="text-3xl font-bold text-center">${companyLogo} ${companyName}</h1><input id="loginUser" placeholder="اسم المستخدم" class="w-full border p-3 my-2 rounded"><input id="loginPass" type="password" placeholder="كلمة المرور" class="w-full border p-3 my-2 rounded"><button onclick="doLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl">دخول</button><p class="text-center text-sm mt-4">admin: ahmed / 1994 | employee: ahmed_emp / emp123</p></div></div>`; }
function requestNotificationPermission(){ if('Notification' in window && Notification.permission === 'default') Notification.requestPermission(); }
// دالة لنقل إلى سلة المحذوفات
function moveToTrash(item, type){ trashBin.push({id:Date.now(),type,data:item,deletedAt:new Date().toISOString()}); saveAllData(); }
// بدء التطبيق
window.onload = async () => {
    await loadAllData();
    const saved = sessionStorage.getItem('drmedia_user');
    if (saved) { currentUser = JSON.parse(saved); if(currentUser.role==='admin') renderAdminDashboard(); else renderEmployeeDashboard(); }
    else renderLogin();
    requestNotificationPermission();
};
window.renderManagerQR = renderManagerQR;
window.startEmployeeScan = startEmployeeScan;
window.performCheckInFromQR = performCheckInFromQR;
window.performCheckOutFromQR = performCheckOutFromQR;
window.checkIn = checkIn;
window.checkOut = checkOut;
window.addBooking = addBooking;
window.markComplete = markComplete;
window.deleteBooking = deleteBooking;
window.addEmployee = addEmployee;
window.addClient = addClient;
window.adjustInventory = adjustInventory;
window.addEquipment = addEquipment;
window.autoDistribute = autoDistribute;
window.exportToExcel = exportToExcel;
window.updateSettingsLocal = updateSettingsLocal;
window.logout = logout;
window.closeModal = closeModal;
window.stopScannerAndClose = stopScannerAndClose;
</script>
