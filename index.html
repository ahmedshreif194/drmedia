<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Media Pro System - Developed by Ahmed Shreif</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:Tahoma;background:#f1f5f9}
header{background:#0f172a;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center}
.container{padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
button{padding:10px;border-radius:8px;border:none;cursor:pointer}
input,select{padding:10px;width:100%;margin:5px 0;border-radius:8px;border:1px solid #ddd}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.small{font-size:12px;color:gray}
</style>
</head>
<body>

<header>
<h2>Dr Media Pro</h2>
<div>Developed by Ahmed Shreif</div>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>تسجيل الدخول</h3>
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()" style="background:#16a34a;color:white;width:100%">دخول</button>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none">

<div class="row">
<div class="card"><h3>الموظفين</h3><div id="empCount"></div></div>
<div class="card"><h3>الأوردرات</h3><div id="orderCount"></div></div>
<div class="card"><h3>الإيرادات</h3><div id="income"></div></div>
</div>

<div class="card">
<h3>إضافة أوردر</h3>
<input id="cname" placeholder="اسم العميل">
<input id="date" type="date">
<input id="price" placeholder="السعر">
<select id="hall">
<option>مغلقة</option>
<option>أوبن</option>
<option>كافيه</option>
</select>
<button onclick="addOrder()" style="background:#2563eb;color:#fff;width:100%">إضافة</button>
</div>

<div class="card">
<h3>الأوردرات</h3>
<div id="orders"></div>
</div>

<div class="card">
<h3>الموظفين</h3>
<div id="emps"></div>
</div>

</div>

<!-- EMPLOYEE -->
<div id="employee" style="display:none">
<div class="card">
<h3>أوردراتي</h3>
<div id="myOrders"></div>
</div>

<div class="card">
<h3>الإشعارات</h3>
<div id="noti"></div>
</div>
</div>

</div>

<script>

// ================= DATA =================
let users = [
{u:"admin",p:"123",role:"admin"},
{u:"zakawa",p:"123",role:"emp"},
{u:"titi",p:"123",role:"emp"}
];

let employees = ["zakawa","titi"];

let orders = [];
let notifications = [];
let currentUser = null;

// ================= SAVE =================
function save(){
localStorage.setItem("orders",JSON.stringify(orders));
localStorage.setItem("noti",JSON.stringify(notifications));
}
function load(){
orders = JSON.parse(localStorage.getItem("orders")||"[]");
notifications = JSON.parse(localStorage.getItem("noti")||"[]");
}
load();

// ================= LOGIN =================
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;
let f=users.find(x=>x.u==u&&x.p==p);
if(!f)return alert("error");
currentUser=f;

document.getElementById("loginBox").style.display="none";

if(f.role=="admin") document.getElementById("admin").style.display="block";
else document.getElementById("employee").style.display="block";

render();
}

// ================= ADD ORDER =================
function addOrder(){
orders.push({
client:cname.value,
date:date.value,
price:price.value,
hall:hall.value,
emp:"zakawa"
});
save();render();
}

// ================= RENDER =================
function render(){

if(currentUser.role=="admin"){

document.getElementById("empCount").innerText=employees.length;
document.getElementById("orderCount").innerText=orders.length;
let sum=orders.reduce((s,o)=>s+Number(o.price),0);
document.getElementById("income").innerText=sum;

let html="";
orders.forEach((o,i)=>{
html+=`<div class='card'>${o.client} - ${o.date} - ${o.price}</div>`;
});
document.getElementById("orders").innerHTML=html;

let ehtml="";
employees.forEach(e=>{
ehtml+=`<div class='card'>${e}</div>`;
});
document.getElementById("emps").innerHTML=ehtml;
}

else{
let my=orders.filter(o=>o.emp==currentUser.u);

document.getElementById("myOrders").innerHTML=my.map(o=>`<div class='card'>${o.client} - ${o.date} - ${o.price}</div>`).join("");

let n=notifications.filter(n=>n.to==currentUser.u);
document.getElementById("noti").innerHTML=n.map(n=>`<div class='card'>${n.msg}</div>`).join("");
}
}

render();

</script>

</body>
</html>
