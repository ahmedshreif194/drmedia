    <script>

    <style>

        .dark {

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg); color: var(--text);
            overflow-x: hidden; transition: var(--transition);
            line-height: 1.6; -webkit-font-smoothing: antialiased;
        }
        body.emergency-mode { animation: emergency 1s infinite; }
        
        /* Preloader */
        #preloader {
            position: fixed; inset: 0;

        .loader-ring {

        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; transition: var(--transition); }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Tables */
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th, td { border: 1px solid var(--border); padding: 12px 10px; text-align: right; transition: background 0.2s; }

        .dark th { background: linear-gradient(135deg, #334155, #374151); }
        tr:hover td { background: rgba(34,197,94,0.05); }
        .dark tr:hover td { background: rgba(34,197,94,0.1); }
        
        /* Responsive Tables */
        @media(max-width:768px) {
            .overflow-x-auto { margin: 0 -12px; }
            table { min-width: 640px; }
        }
        
        /* Forms */
        input, select, textarea {
            border: 2px solid var(--border); border-radius: 12px;
            padding: 10px 14px; width: 100%; margin-bottom: 12px;
            background: var(--card); color: var(--text);
            transition: var(--transition); font-size: 0.95rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: #22c55e; box-shadow: 0 0 0 4px rgba(34,197,94,0.15);
        }
        
        /* Buttons */
        button { transition: var(--transition); cursor: pointer; border-radius: 12px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        button:active { transform: scale(0.98); }
        
        /* Badges */
        .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }
        .dark .status-pending { background: rgba(254,243,199,0.2); }
        .dark .status-completed { background: rgba(209,250,229,0.2); }
        
        /* Modal */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; padding: 16px; opacity: 0; visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }
        #modal:not(.hidden) { opacity: 1; visibility: visible; }
        #modal .bg-white {
            background: var(--card); border-radius: var(--radius);
            padding: 24px; width: 100%; max-width: 560px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: var(--shadow-lg); border: 1px solid var(--border);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        #modal:not(.hidden) .bg-white { transform: scale(1) translateY(0); }
        
        /* Toast */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #1e293b, #374151);
            color: white; padding: 14px 28px; border-radius: 50px;

        .toast.show { transform: translateX(-50%) translateY(0); }

        .toast.error { background: linear-gradient(135deg, #dc2626, #b91c1c); }

        .notification-panel {

        /* Voice Button */

        }
        .voice-btn:hover { transform: scale(1.1); }
        .voice-btn.listening { animation: pulse 1s infinite; background: linear-gradient(135deg, #ef4444, #dc2626); }
        .voice-hint {

            box-shadow: var(--shadow-lg); font-size: 0.85rem; max-width: 280px;
            border: 1px solid var(--border); display: none; animation: slideIn 0.3s ease;
        }
        
        /* Emergency Panel */
        #emergencyPanel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 9999; display: none; flex-direction: column;
            align-items: center; justify-content: center;
            color: white; text-align: center; padding: 24px;
        }
        #emergencyPanel.active { display: flex; animation: slideIn 0.3s ease; }
        .emergency-icon { font-size: 4rem; color: #ef4444; margin-bottom: 24px; animation: emergency 1s infinite; }
        
        /* Dashboard Cards */
        .dash-card {
            background: var(--card); border-radius: var(--radius); padding: 20px;
            box-shadow: var(--shadow); transition: var(--transition);
            border: 1px solid var(--border); cursor: pointer;
        }
        .dash-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .stat-number {
            font-size: 2rem; font-weight: 800;
            background: linear-gradient(135deg, #22c55e, #15803d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        /* Print Styles */
        @media print {
            #preloader, header, #modal, .toast, .notification-panel, .voice-btn, .voice-hint, #emergencyPanel { display: none !important; }
            body { background: #fff; color: #000; }
            table { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
        }

        /* Utilities */
        .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226,232,240,0.8); }
        .dark .glass { background: rgba(30,41,59,0.9); border-bottom-color: rgba(51,65,85,0.8); }
        .hover-lift { transition: var(--transition); }
        .hover-lift:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    </style>
</head>

    <script>
        // Firebase Config
        const firebaseConfig = { apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ", authDomain: "drmedia-vpms.firebaseapp.com", databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com", projectId: "drmedia-vpms", storageBucket: "drmedia-vpms.firebasestorage.app", messagingSenderId: "681162512380", appId: "1:681162512380:web:ab2482f3234d8b59fc4479" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        
        let bookings=[], employees=[], users=[], halls=[], notifications=[], swapRequests=[], payrollArchive=[], employeeLoans={}, equipmentInventory={};
        let clients = [];        // إدارة العملاء
        let whatsappLogs = [];   // سجل المراسلات
        let currentUser=null, currentTab='dashboardTab', companyName='Drmedia Pro', companyLogo='📷', whatsappNumber='';
        let themeSettings = { primaryColor: '#22c55e', darkMode: false };
        let selectedBookings=new Set(), selectedEmployees=new Set(), selectedHalls=new Set(), selectedUsers=new Set(), selectedPayrollEmps=new Set(), selectedClients=new Set();
        let currentHallFilter='all', currentStatusFilter='all', browserNotificationsEnabled=false;
        let pendingPdfBookings=[], pendingExcelData=[]; let emergencyMode = false, voiceRecognition = null, isListening = false;
        let clientPortalToken = null, charts = {};
        let uiReady = false;

        // Toast
        function showMsg(message, type='success') {
            const toast = document.getElementById('toast'); const toastMsg = document.getElementById('toastMessage');
            toastMsg.textContent = message; toast.className = `toast ${type}`; toast.classList.remove('show'); void toast.offsetWidth; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }
        
        // Modal
        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.body.style.overflow = ''; }
        function openModal(content) { document.getElementById('modalContent').innerHTML = content; document.getElementById('modal').classList.remove('hidden'); document.body.style.overflow = 'hidden'; setTimeout(() => { const f = document.querySelector('#modalContent input, #modalContent select'); if (f) f.focus(); }, 300); }
        
        // Theme
        function applyTheme() {
            if(themeSettings.darkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark');
            if(themeSettings.primaryColor) document.getElementById('themeColorMeta')?.setAttribute('content', themeSettings.primaryColor);
            localStorage.setItem('drmedia_theme', JSON.stringify(themeSettings));
        }
        function loadTheme() { const saved = localStorage.getItem('drmedia_theme'); if(saved) { themeSettings = JSON.parse(saved); applyTheme(); } }

        // Notifications
        function requestBrowserNotificationPermission() { if (!('Notification' in window)) return; if (Notification.permission === 'granted') browserNotificationsEnabled = true; else if (Notification.permission !== 'denied') Notification.requestPermission().then(p => { if (p === 'granted') { browserNotificationsEnabled = true; showMsg('✅ تم تفعيل إشعارات المتصفح'); } }); }
        function sendBrowserNotification(title, body) { if (!browserNotificationsEnabled || Notification.permission !== 'granted') return; try { new Notification(title, { body: body, icon: '🔔' }); } catch (e) {} }
        function addNotification(uid, title, message, priority='normal') { notifications.push({ id: Date.now(), userId: uid, title, message, read: false, date: new Date().toLocaleString('ar-EG'), priority }); saveAllData(); if (currentUser && currentUser.employeeId === uid) { renderNotificationBadge(); sendBrowserNotification(priority === 'high' ? '🚨 '+title : title, message); } }
        function renderNotificationBadge() { const unread = notifications.filter(n => n.userId === currentUser?.employeeId && !n.read).length; const bell = document.getElementById('notificationBell'); if (!bell) return; let badge = bell.querySelector('.notification-badge'); if (unread > 0) { if (!badge) { badge = document.createElement('span'); badge.className = 'notification-badge'; bell.appendChild(badge); } badge.textContent = unread > 9 ? '9+' : unread; } else if (badge) badge.remove(); }
        function showNotificationPanel() { const panel = document.getElementById('notificationPanel'); if (!panel) return; if (panel.style.display === 'block') { panel.style.display = 'none'; return; } const userNotifs = notifications.filter(n => n.userId === currentUser?.employeeId); panel.innerHTML = `<div class="p-3 border-b flex justify-between items-center sticky top-0 bg-white dark:bg-slate-800 rounded-t-xl z-10"><span class="font-bold text-sm">الإشعارات (${userNotifs.filter(n=>!n.read).length})</span><button onclick="markAllNotificationsRead()" class="text-xs bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded-lg transition">الكل مقروء</button></div><div class="max-h-80 overflow-y-auto">${userNotifs.slice().reverse().map(n => `<div class="notification-item ${n.read ? '' : 'unread'}" onclick="markNotificationRead('${n.id}')"><div class="flex justify-between items-start gap-2"><div class="font-bold text-sm">${n.title}</div>${!n.read ? '<span class="w-2 h-2 bg-green-500 rounded-full flex-shrink-0"></span>' : ''}</div><div class="text-xs text-gray-500 dark:text-gray-400 mt-1">${n.message}</div><div class="text-xs text-gray-400 mt-2">${n.date}</div></div>`).join('') || '<div class="p-4 text-center text-gray-400 text-sm">لا توجد إشعارات</div>'}</div>`; panel.style.display = 'block'; }
        function markNotificationRead(id) { const n = notifications.find(x => x.id == id); if (n) n.read = true; saveAllData(); renderNotificationBadge(); showNotificationPanel(); }
        function markAllNotificationsRead() { notifications.forEach(n => { if (n.userId === currentUser?.employeeId) n.read = true; }); saveAllData(); renderNotificationBadge(); showNotificationPanel(); showMsg("✅ تم تحديد الكل كمقروء"); }

        // WhatsApp (with logging)
        function sendWhatsAppNotification(phone, message) { 
            if (!phone) return; 
            const clean = phone.replace(/[^0-9+]/g, ''); 
            if (!clean) return; 
            window.open(`https://wa.me/${clean}?text=${encodeURIComponent(message)}`, '_blank'); 
            // تسجيل الرسالة في السجل
            whatsappLogs.push({ id: Date.now(), to: phone, message: message.substring(0,200), date: new Date().toLocaleString('ar-EG'), status: 'تم الإرسال' });
            db.ref('whatsappLogs').set(whatsappLogs);
        }
        function sendBulkWhatsApp(phones, message) { phones.forEach((phone, i) => setTimeout(() => sendWhatsAppNotification(phone, message), i * 1500)); showMsg(`📤 جاري إرسال ${phones.length} رسالة واتساب...`); }
        function sendAutoBookingConfirmation(booking) { if(!booking.phone || !whatsappNumber) return; sendWhatsAppNotification(booking.phone, `✅ *تم تأكيد حجزك في ${companyName}*\n👤 العميل: ${booking.clientName}\n📅 التاريخ: ${booking.date}\n🏛️ القاعة: ${booking.hallName}\n💰 السعر: ${booking.price.toLocaleString()} ج.م`); addNotification('admin', 'إشعار عميل', `تم إرسال تأكيد الحجز لـ ${booking.clientName}`); }
        function sendDailyReminders() { const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1); const dateStr = tomorrow.toISOString().slice(0,10); const tomorrowBookings = bookings.filter(b => b.date === dateStr && b.status === 'pending'); employees.filter(e => e.active).forEach(emp => { const empBookings = tomorrowBookings.filter(b => (b.assignedEmployees||[]).includes(emp.id)); if(empBookings.length > 0 && emp.phone) sendWhatsAppNotification(emp.phone, `🔔 *تذكير بأوردرات غدًا*\n\nمرحباً ${emp.name}،\nلديك ${empBookings.length} أوردر غدًا:\n${empBookings.map(b=>`• ${b.date} - ${b.clientName}`).join('\n')}`); }); showMsg(`📧 تم إرسال تذكيرات`); }

        // Save all data including new collections
        function saveAllData() { 
            if(bookings.length===0 && employees.length===0 && halls.length===0) return;
            Promise.all([db.ref('bookings').set(bookings), db.ref('employees').set(employees), db.ref('users').set(users), db.ref('halls').set(halls), db.ref('notifications').set(notifications), db.ref('swapRequests').set(swapRequests), db.ref('payrollArchive').set(payrollArchive), db.ref('employeeLoans').set(employeeLoans), db.ref('equipmentInventory').set(equipmentInventory), db.ref('companySettings').set({companyName, companyLogo, whatsappNumber, themeSettings}), db.ref('emergencyMode').set(emergencyMode), db.ref('clients').set(clients), db.ref('whatsappLogs').set(whatsappLogs)]).catch(e => console.error('Save error:', e)); 
        }

        // Load data with new references
        function loadData() {
            let loaded = 0; let hasRealData = false; 
            function checkComplete() {

        // AI Price
        function suggestPrice(hallId, date, guestCount=0) {
            const hall = halls.find(h => h.id === hallId); if(!hall) return 2500;
            let price = hall.type==='closed'?5000:hall.type==='open'?3500:2000;
            const dayOfWeek = new Date(date).getDay(); if([5,6].includes(dayOfWeek)) price *= 1.25;
            const month = new Date(date).getMonth(); if([11,0,1].includes(month)) price *= 1.15;
            if(guestCount > 200) price *= 1.1; else if(guestCount > 100) price *= 1.05;
            return Math.round(price / 100) * 100;
        }

        // Smart Distribute
        function autoDistribute() {
            const active = bookings.filter(b => b.status === 'pending'); active.forEach(b => b.assignedEmployees = []);
            const sorted = [...active].sort((a,b) => new Date(a.date) - new Date(b.date));
            const dirs = employees.filter(e => e.role === 'مخرج' && e.active), phs = employees.filter(e => e.role === 'مصور' && e.active), crs = employees.filter(e => e.role === 'كرين' && e.active);
            function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
            let dPtr = 0, pPtr = 0, cPtr = 0; const grouped = {}; sorted.forEach(b => { if (!grouped[b.date]) grouped[b.date] = []; grouped[b.date].push(b); });
            for (let date in grouped) { const dayB = grouped[date]; const busy = new Set();
                for (let b of dayB) { const h = halls.find(x => x.id === b.hallId); const type = h ? h.type : 'closed'; const assigned = [];
                    if (type === 'cafe') { if (phs.length) for (let i = 0; i < phs.length; i++) { const ph = phs[(pPtr + i) % phs.length]; if (!busy.has(ph.id)) { assigned.push(ph.id); busy.add(ph.id); pPtr = (pPtr + i + 1) % phs.length; break; } } }
                    else { if (dirs.length) for (let i = 0; i < dirs.length; i++) { const d = dirs[(dPtr + i) % dirs.length]; if (!busy.has(d.id)) { assigned.push(d.id); busy.add(d.id); dPtr = (dPtr + i + 1) % dirs.length; break; } } let addedPh = 0; if (phs.length) for (let i = 0; i < phs.length * 2 && addedPh < 2; i++) { const ph = phs[(pPtr + i) % phs.length]; if (!busy.has(ph.id)) { assigned.push(ph.id); busy.add(ph.id); addedPh++; } } pPtr = (pPtr + addedPh) % phs.length; if (crs.length) for (let i = 0; i < crs.length; i++) { const cr = crs[(cPtr + i) % crs.length]; if (!busy.has(cr.id)) { assigned.push(cr.id); busy.add(cr.id); cPtr = (cPtr + i + 1) % crs.length; break; } } }
                    b.assignedEmployees = assigned;
                }
            }
            updateEmployeeOrders(); saveAllData(); showMsg('✅ تم التوزيع الذكي');
        }
        function rotateEmployeesOnHalls() { autoDistribute(); renderBookingsContent(); renderDistributionContent(); showMsg('🔀 تم تبديل الموظفين'); }
        function updateEmployeeOrders() { const act = bookings.filter(b => b.status !== 'cancelled'); employees.forEach(e => e.totalOrders = act.filter(b => (b.assignedEmployees || []).includes(e.id)).length); }
        function getEmployeeOrdersInPeriod(empId, start, end) { return bookings.filter(b => b.status !== 'cancelled' && (b.assignedEmployees || []).includes(empId) && new Date(b.date) >= start && new Date(b.date) <= end).length; }
        function getFilteredBookings() { let f = [...bookings]; if (currentHallFilter !== 'all') f = f.filter(b => b.hallId === currentHallFilter); if (currentStatusFilter !== 'all') f = f.filter(b => b.status === currentStatusFilter); else f = f.filter(b => b.status !== 'cancelled'); return f.sort((a,b) => new Date(a.date) - new Date(b.date)); }

        // Employees
        function renderEmployeesContent() { updateEmployeeOrders(); document.getElementById('employeesTab').innerHTML = `<div class="p-4"><h2 class="text-xl font-bold mb-3">👥 الموظفين</h2><div class="flex gap-2 mb-4"><button onclick="showAddEmployeeModal()" class="bg-blue-700 text-white px-4 py-2 rounded-xl">+ إضافة موظف</button><button onclick="selectAllEmployees()" class="bg-gray-500 text-white px-3 py-2 rounded-xl">تحديد الكل</button><button onclick="bulkDeleteEmployees()" class="bg-red-600 text-white px-3 py-2 rounded-xl">حذف المحدد</button></div><div class="overflow-x-auto"><table class="w-full"><thead><tr><th><input type="checkbox" id="selectAllEmployeesCheckbox" onchange="toggleSelectAllEmployees()"></th><th>الاسم</th><th>المهمة</th><th>الهاتف</th><th>أوردرات</th><th>المستحق</th><th>تعديل</th><th>حذف</th></tr></thead><tbody>${employees.map(e => `<tr><td><input type="checkbox" class="employee-checkbox" value="${e.id}" ${selectedEmployees.has(e.id)?'checked':''} onchange="toggleEmployeeSelection('${e.id}',this.checked)"></td><td>${e.name}</td><td>${e.role}</td><td>${e.phone}</td><td>${e.totalOrders||0}</td><td class="text-emerald-600 font-bold">${((e.totalOrders||0)*e.salaryPerOrder).toLocaleString()} ج.م</td><td><button onclick="showEditEmployeeModal('${e.id}')" class="text-amber-600"><i class="fas fa-edit"></i></button></td><td><button onclick="deleteEmployee('${e.id}')" class="text-red-600"><i class="fas fa-trash-alt"></i></button></td></tr>`).join('')}</tbody></table></div></div>`; }

        // Distribution (مختصر)
        function renderDistributionContent() { const pending = bookings.filter(b => b.status === 'pending').sort((a,b)=>new Date(a.date)-new Date(b.date)); let html = `<div class="p-4"><h2 class="text-xl font-bold mb-3">⚙️ التوزيع اليدوي</h2><div class="flex gap-2 mb-4"><button onclick="autoDistribute();renderDistributionContent();renderBookingsContent();" class="bg-purple-700 text-white px-4 py-2 rounded-xl">🔄 توزيع ذكي</button><button onclick="rotateEmployeesOnHalls();renderDistributionContent();renderBookingsContent();" class="bg-orange-600 text-white px-4 py-2 rounded-xl">🔀 تبديل</button></div><div class="space-y-4">`; const grouped={}; pending.forEach(b=>{if(!grouped[b.date]) grouped[b.date]=[]; grouped[b.date].push(b);}); for(let date in grouped){ html+=`<div class="border rounded-xl"><div class="bg-gray-100 p-3 font-bold">📅 ${date} (${grouped[date].length})</div><div class="p-4">`; for(let b of grouped[date]){ const type = halls.find(x=>x.id===b.hallId)?.type||'closed'; const assigned = b.assignedEmployees||[]; html+=`<div class="border p-3 rounded-xl mb-3"><div>${b.clientName} - ${b.hallName}</div><div class="grid grid-cols-1 md:grid-cols-4 gap-2 mt-2">`; if(type==='cafe') html+=`<div><select onchange="updateSlot('${b.id}','0',this.value)" class="w-full p-1 border rounded"><option value="">مصور</option>${employees.filter(e=>e.role==='مصور'&&e.active).map(e=>`<option ${assigned[0]===e.id?'selected':''} value="${e.id}">${e.name}</option>`).join('')}</select></div>`; else html+=`<div><select onchange="updateSlot('${b.id}','0',this.value)"><option value="">مخرج</option>${employees.filter(e=>e.role==='مخرج'&&e.active).map(e=>`<option ${assigned[0]===e.id?'selected':''} value="${e.id}">${e.name}</option>`).join('')}</select></div><div><select onchange="updateSlot('${b.id}','1',this.value)"><option value="">مصور1</option>${employees.filter(e=>e.role==='مصور'&&e.active).map(e=>`<option ${assigned[1]===e.id?'selected':''} value="${e.id}">${e.name}</option>`).join('')}</select></div><div><select onchange="updateSlot('${b.id}','2',this.value)"><option value="">مصور2</option>${employees.filter(e=>e.role==='مصور'&&e.active).map(e=>`<option ${assigned[2]===e.id?'selected':''} value="${e.id}">${e.name}</option>`).join('')}</select></div><div><select onchange="updateSlot('${b.id}','3',this.value)"><option value="">كرين</option>${employees.filter(e=>e.role==='كرين'&&e.active).map(e=>`<option ${assigned[3]===e.id?'selected':''} value="${e.id}">${e.name}</option>`).join('')}</select></div>`; html+=`</div></div>`; } html+=`</div></div>`; } html+=`</div>`; document.getElementById('distributionTab').innerHTML = html; }
        window.updateSlot=function(bid,slot,empId){let b=bookings.find(x=>x.id===bid); if(b){ if(!b.assignedEmployees) b.assignedEmployees=[]; while(b.assignedEmployees.length<=parseInt(slot)) b.assignedEmployees.push(''); b.assignedEmployees[parseInt(slot)]=empId; b.assignedEmployees=b.assignedEmployees.filter(e=>e!==''); saveAllData(); updateEmployeeOrders(); renderDistributionContent(); renderBookingsContent(); showMsg('✅ تم التوزيع'); }};

        // Payroll (مختصر، لكن كامل في الملف النهائي)
        function renderPayrollContent() { const now = new Date(); const y=now.getFullYear(), m=now.getMonth(); const periods=[{label:'1-10', start:new Date(y,m,1), end:new Date(y,m,10)},{label:'11-20', start:new Date(y,m,11), end:new Date(y,m,20)},{label:`21-${new Date(y,m+1,0).getDate()}`, start:new Date(y,m,21), end:new Date(y,m+1,0)}]; document.getElementById('payrollTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold mb-4">💰 المرتبات</h2><div class="flex gap-2 mb-4">${periods.map((p,i)=>`<button onclick="renderPayrollPeriod(${i})" class="bg-blue-600 text-white p-2 rounded-xl">${p.label}</button>`).join('')}</div><div id="payrollPeriodDetail"></div><div><h3 class="font-bold mt-4">💵 السلف</h3><button onclick="showAddLoanModal()" class="bg-amber-600 text-white px-4 py-2 rounded-xl mb-2">+ سلفة</button><div id="loansSection"></div></div></div>`; renderPayrollPeriod(0); renderLoansSection(); }
        function renderPayrollPeriod(pi){ const now=new Date(); const y=now.getFullYear(), m=now.getMonth(); let start,end; if(pi===0){ start=new Date(y,m,1); end=new Date(y,m,10); } else if(pi===1){ start=new Date(y,m,11); end=new Date(y,m,20); } else{ start=new Date(y,m,21); end=new Date(y,m+1,0); } const active=employees.filter(e=>e.active); let html=`<div class="overflow-x-auto"><table class="w-full"><thead><tr><th><input type="checkbox" id="selectAllPayrollCheckbox" onchange="toggleSelectAllPayroll()"></th><th>الموظف</th><th>أوردرات</th><th>المرتب</th><th>الإجمالي</th><th>السلف</th><th>الصافي</th><th>صرف</th></tr></thead><tbody>`; active.forEach(e=>{ const orders=getEmployeeOrdersInPeriod(e.id,start,end); const salary=orders*e.salaryPerOrder; const loans=(employeeLoans[e.id]||[]).reduce((s,l)=>s+l.amount,0); const net=salary-loans; html+=`<tr><td><input type="checkbox" class="payroll-checkbox" value="${e.id}" ${selectedPayrollEmps.has(e.id)?'checked':''} onchange="togglePayrollSelection('${e.id}',this.checked)"></td><td>${e.name}</td><td>${orders}</td><td>${e.salaryPerOrder}</td><td class="text-emerald-600">${salary.toLocaleString()}</td><td class="text-red-500">${loans.toLocaleString()}</td><td class="${net<0?'text-red-600':'text-emerald-600'}">${net.toLocaleString()}</td><td><button onclick="payEmployee('${e.id}',${pi})" class="bg-green-600 text-white px-2 py-1 rounded">صرف</button></td></tr>`; }); html+=`</tbody></table></div>`; document.getElementById('payrollPeriodDetail').innerHTML=html; }
        function togglePayrollSelection(id,checked){ if(checked) selectedPayrollEmps.add(id); else selectedPayrollEmps.delete(id); }
        function selectAllPayrollEmps(){ const active=employees.filter(e=>e.active); if(selectedPayrollEmps.size===active.length) selectedPayrollEmps.clear(); else active.forEach(e=>selectedPayrollEmps.add(e.id)); renderPayrollContent(); }
        function toggleSelectAllPayroll(){ const ck=document.getElementById('selectAllPayrollCheckbox')?.checked; const active=employees.filter(e=>e.active); if(ck) active.forEach(e=>selectedPayrollEmps.add(e.id)); else selectedPayrollEmps.clear(); renderPayrollContent(); }
        function bulkPayEmployees(pi){ if(!selectedPayrollEmps.size) return showMsg("⚠️ اختر موظفين"); if(confirm(`صرف ${selectedPayrollEmps.size} موظف؟`)){ selectedPayrollEmps.forEach(id=>payEmployee(id,pi)); selectedPayrollEmps.clear(); renderPayrollContent(); showMsg("✅ تم الصرف"); } }
        function payEmployee(empId,pi){ const now=new Date(); const y=now.getFullYear(), m=now.getMonth(); let start,end,label; if(pi===0){ start=new Date(y,m,1); end=new Date(y,m,10); label='1-10'; } else if(pi===1){ start=new Date(y,m,11); end=new Date(y,m,20); label='11-20'; } else{ start=new Date(y,m,21); end=new Date(y,m+1,0); label='21-آخر'; } const emp=employees.find(e=>e.id===empId); const orders=getEmployeeOrdersInPeriod(empId,start,end); const salary=orders*emp.salaryPerOrder; const loans=(employeeLoans[empId]||[]).reduce((s,l)=>s+l.amount,0); const net=salary-loans; if(confirm(`صرف ${net.toLocaleString()} ج.م لـ ${emp.name}؟`)){ payrollArchive.push({id:Date.now(),empId,period:pi,month:m,year:y,amount:net,orders,date:now.toISOString().slice(0,10)}); if(employeeLoans[empId]) delete employeeLoans[empId]; if(emp.phone) sendWhatsAppNotification(emp.phone,`تم صرف مرتبك: ${net.toLocaleString()} ج.م`); saveAllData(); renderPayrollPeriod(pi); renderLoansSection(); showMsg(`✅ صرف ${net.toLocaleString()}`); } }
        function renderLoansSection(){ let html=''; employees.filter(e=>e.active).forEach(e=>{ const loans=employeeLoans[e.id]||[]; const total=loans.reduce((s,l)=>s+l.amount,0); if(total>0) html+=`<div class="border p-2 rounded my-2"><div><strong>${e.name}</strong> : ${total.toLocaleString()} ج.م</div><div class="text-xs">${loans.map(l=>`${l.date}: ${l.reason||'سلفة'}`).join(' | ')}</div></div>`; }); document.getElementById('loansSection').innerHTML=html||'<p>لا توجد سلف</p>'; }
        function showAddLoanModal(){ openModal(`<h3>➕ سلفة جديدة</h3><select id="loanEmpId">${employees.filter(e=>e.active).map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select><input type="number" id="loanAmount" placeholder="المبلغ"><input type="date" id="loanDate"><input id="loanReason" placeholder="السبب"><button onclick="saveNewLoan()" class="bg-amber-700 text-white w-full py-2 rounded-xl mt-2">حفظ</button>`); }
        function saveNewLoan(){ const empId=document.getElementById('loanEmpId')?.value, amount=parseInt(document.getElementById('loanAmount')?.value)||0, date=document.getElementById('loanDate')?.value, reason=document.getElementById('loanReason')?.value; if(!empId||!amount) return showMsg("⚠️ أكمل البيانات"); if(!employeeLoans[empId]) employeeLoans[empId]=[]; employeeLoans[empId].push({id:Date.now(),amount,date,reason}); saveAllData(); closeModal(); renderPayrollContent(); showMsg("✅ تمت إضافة السلفة"); }

        // Calendar (مختصر)
        function renderCalendarContent(monthOffset=0){ const now=new Date(); now.setMonth(now.getMonth()+monthOffset); const y=now.getFullYear(), m=now.getMonth(); const first=new Date(y,m,1).getDay(); const days=new Date(y,m+1,0).getDate(); const mNames=['يناير','فبراير','مارس','إبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر']; let html=`<div class="p-4"><div class="flex justify-between"><button onclick="renderCalendarContent(${monthOffset-1})" class="bg-gray-200 px-3 py-1 rounded">←</button><h2 class="text-xl font-bold">${mNames[m]} ${y}</h2><button onclick="renderCalendarContent(${monthOffset+1})" class="bg-gray-200 px-3 py-1 rounded">→</button></div><div class="calendar-grid mt-4">`; ['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'].forEach(d=>html+=`<div class="text-center font-bold">${d}</div>`); for(let i=0;i<first;i++) html+=`<div></div>`; for(let d=1;d<=days;d++){ const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const dayB=bookings.filter(b=>b.date===ds && b.status!=='cancelled'); let cls=''; if(dayB.some(b=>b.status==='completed')) cls='completed'; else if(dayB.some(b=>b.status==='pending')) cls='booked'; html+=`<div class="calendar-day ${cls}" onclick="showDayBookings('${ds}')"><span class="day-number">${d}</span>${dayB.length?`<span class="text-xs">${dayB.length}</span>`:''}</div>`; } html+=`</div><div id="calendarInfo" class="mt-4"></div></div>`; document.getElementById('calendarTab').innerHTML=html; }
        window.showDayBookings=function(date){ const f=bookings.filter(b=>b.date===date); const info=document.getElementById('calendarInfo'); info.innerHTML=f.length?`<div class="p-2 bg-emerald-100 rounded"><strong>${date}</strong><ul>${f.map(b=>`<li>${b.clientName} - ${b.hallName}</li>`).join('')}</ul></div>`:'<div>لا توجد حجوزات</div>'; };

        // Reports (مختصر)
        function renderReportsContent(){ updateEmployeeOrders(); const total=bookings.filter(b=>b.status!=='cancelled').length; const rev=bookings.filter(b=>b.status!=='cancelled').reduce((s,b)=>s+b.price,0); const top=[...employees].sort((a,b)=>(b.totalOrders||0)-(a.totalOrders||0))[0]; document.getElementById('reportsTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold mb-4">📊 التقارير</h2><div class="grid grid-cols-2 gap-4"><div class="bg-white p-4 rounded-xl shadow"><p>إجمالي الحجوزات</p><p class="text-2xl font-bold">${total}</p></div><div class="bg-white p-4 rounded-xl shadow"><p>الإيرادات</p><p class="text-2xl font-bold text-emerald-600">${rev.toLocaleString()} ج.م</p></div></div><div class="mt-4"><p>🏆 الأكثر عملاً: ${top?`${top.name} (${top.totalOrders||0})`:'لا توجد'}</p></div><button onclick="exportToExcel()" class="bg-green-600 text-white px-4 py-2 rounded-xl mt-4">تصدير Excel</button></div>`; }
        function exportToExcel(){ const ws=XLSX.utils.json_to_sheet(bookings.filter(b=>b.status!=='cancelled').map(b=>({العميل:b.clientName,التاريخ:b.date,القاعة:b.hallName,السعر:b.price,الحالة:b.status}))); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"الحجوزات"); XLSX.writeFile(wb,`${companyName}_Bookings_${new Date().toISOString().slice(0,10)}.xlsx`); showMsg("✅ تم التصدير"); }

        // Users
        function renderUsersContent(){ document.getElementById('usersTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold mb-3">🔐 المستخدمين</h2><div class="flex gap-2 mb-4"><button onclick="addUser()" class="bg-gray-700 text-white px-4 py-2 rounded-xl">+ مستخدم</button><button onclick="selectAllUsers()" class="bg-gray-500 text-white px-3 py-2 rounded-xl">تحديد الكل</button><button onclick="bulkDeleteUsers()" class="bg-red-600 text-white px-3 py-2 rounded-xl">حذف المحدد</button></div><div class="overflow-x-auto"><table class="w-full"><thead><tr><th><input type="checkbox" id="selectAllUsersCheckbox" onchange="toggleSelectAllUsers()"></th><th>المستخدم</th><th>الدور</th><th>الموظف المرتبط</th><th>تعديل</th></tr></thead><tbody>${users.map(u=>`<tr><td><input type="checkbox" class="user-checkbox" value="${u.username}" ${selectedUsers.has(u.username)?'checked':''} onchange="toggleUserSelection('${u.username}',this.checked)"></td><td>${u.username}</td><td>${u.role}</td><td><select onchange="linkUserToEmployee('${u.username}',this.value)"><option value="">-- غير مرتبط --</option>${employees.map(e=>`<option value="${e.id}" ${u.employeeId===e.id?'selected':''}>${e.name}</option>`).join('')}</select></td><td><button onclick="showEditUserModal('${u.username}')" class="text-amber-600"><i class="fas fa-edit"></i></button></td></tr>`).join('')}</tbody></table></div></div>`; }
        function linkUserToEmployee(username,empId){ const u=users.find(x=>x.username===username); if(u){ u.employeeId=empId||null; saveAllData(); showMsg("✅ تم الربط"); } }
        function toggleUserSelection(username,checked){ if(checked) selectedUsers.add(username); else selectedUsers.delete(username); }
        function selectAllUsers(){ if(selectedUsers.size===users.length) selectedUsers.clear(); else users.forEach(u=>selectedUsers.add(u.username)); renderUsersContent(); }
        function toggleSelectAllUsers(){ const ck=document.getElementById('selectAllUsersCheckbox')?.checked; if(ck) users.forEach(u=>selectedUsers.add(u.username)); else selectedUsers.clear(); renderUsersContent(); }
        function bulkDeleteUsers(){ if(!selectedUsers.size) return showMsg("⚠️ اختر مستخدمين"); const filtered=users.filter(u=>selectedUsers.has(u.username) && u.role!=='admin'); if(!filtered.length) return showMsg("⚠️ لا يمكن حذف المدير"); if(confirm(`حذف ${filtered.length} مستخدم؟`)){ users=users.filter(u=>!selectedUsers.has(u.username)||u.role==='admin'); selectedUsers.clear(); saveAllData(); renderUsersContent(); showMsg("🗑️ تم الحذف"); } }
        function addUser(){ const un=prompt("اسم المستخدم:"), pw=prompt("كلمة المرور:"), role=prompt("الدور (admin/employee)","employee"); if(un&&pw){ if(users.some(u=>u.username===un)) return showMsg("⚠️ موجود"); users.push({username:un,password:pw,role:role||'employee',employeeId:null}); saveAllData(); renderUsersContent(); showMsg(`✅ تمت إضافة ${un}`); } }
        function showEditUserModal(username){ const u=users.find(x=>x.username===username); openModal(`<h3>✏️ تعديل مستخدم</h3><input id="editUsername" value="${u.username}"><input id="editPassword" value="${u.password}"><select id="editRole"><option value="admin" ${u.role==='admin'?'selected':''}>admin</option><option value="employee" ${u.role==='employee'?'selected':''}>employee</option></select><button onclick="saveEditUser('${username}')" class="bg-emerald-700 text-white w-full py-2 rounded-xl">حفظ</button>`); }
        function saveEditUser(oldUsername){ const u=users.find(x=>x.username===oldUsername); if(!u) return; u.username=document.getElementById('editUsername').value.trim(); u.password=document.getElementById('editPassword').value; u.role=document.getElementById('editRole').value; saveAllData(); closeModal(); renderUsersContent(); showMsg("✅ تم التحديث"); }

        // Swap Requests (مختصر)
        function showSwapModal(){ if(currentUser?.role!=='employee') return; const emp=employees.find(e=>e.id===currentUser.employeeId); const myBookings=bookings.filter(b=>b.status==='pending' && (b.assignedEmployees||[]).includes(emp.id)); if(!myBookings.length) return showMsg("⚠️ لا توجد أوردرات"); const myOpts=myBookings.map(b=>`<option value="${b.id}">${b.date} - ${b.clientName}</option>`).join(''); const otherEmps=employees.filter(e=>e.id!==emp.id && e.active && e.role===emp.role); const empOpts=otherEmps.map(e=>`<option value="${e.id}">${e.name}</option>`).join(''); openModal(`<h3>🔄 طلب تبديل</h3><select id="swapMyBooking">${myOpts}</select><select id="swapTargetEmp" onchange="loadTargetEmpBookings()">${empOpts}</select><select id="swapTargetBooking"><option>اختر الموظف أولاً</option></select><button onclick="submitSwapRequest()" class="bg-indigo-700 text-white w-full py-2 rounded-xl mt-2">إرسال الطلب</button>`); }
        window.loadTargetEmpBookings=function(){ const tid=document.getElementById('swapTargetEmp')?.value; const targetBookings=bookings.filter(b=>b.status==='pending' && (b.assignedEmployees||[]).includes(tid)); const opts=targetBookings.map(b=>`<option value="${b.id}">${b.date} - ${b.clientName}</option>`).join(''); document.getElementById('swapTargetBooking').innerHTML=opts||'<option>لا توجد أوردرات</option>'; };
        function submitSwapRequest(){ const myBid=document.getElementById('swapMyBooking')?.value, tid=document.getElementById('swapTargetEmp')?.value, targetBid=document.getElementById('swapTargetBooking')?.value; if(!myBid||!tid||!targetBid) return showMsg("⚠️ أكمل البيانات"); swapRequests.push({id:'sr_'+Date.now(), fromEmpId:currentUser.employeeId, toEmpId:tid, bookingId:myBid, targetBookingId:targetBid, status:'pending', date:new Date().toISOString()}); saveAllData(); closeModal(); showMsg("✅ تم إرسال الطلب"); addNotification('admin','طلب تبديل','طلب تبديل جديد'); }
        function renderSwapRequestsContent(){ let html=`<div class="p-4"><h2 class="text-xl font-bold mb-4">🔄 طلبات التبديل</h2><div class="space-y-3">`; if(swapRequests.length===0) html+='<p>لا توجد طلبات</p>'; else swapRequests.slice().reverse().forEach(sr=>{ const from=employees.find(e=>e.id===sr.fromEmpId); const to=employees.find(e=>e.id===sr.toEmpId); html+=`<div class="border p-3 rounded-xl"><div><strong>${from?.name}</strong> ↔ <strong>${to?.name}</strong> <span class="status-badge ${sr.status==='pending'?'status-pending':sr.status==='approved'?'status-completed':'status-cancelled'}">${sr.status}</span></div>${sr.status==='pending'?`<div class="mt-2"><button onclick="approveSwap('${sr.id}')" class="bg-green-600 text-white px-3 py-1 rounded text-sm">موافقة</button><button onclick="rejectSwap('${sr.id}')" class="bg-red-600 text-white px-3 py-1 rounded text-sm ml-2">رفض</button></div>`:''}</div>`; }); html+=`</div></div>`; document.getElementById('swapRequestsTab').innerHTML=html; }
        function approveSwap(id){ const sr=swapRequests.find(x=>x.id===id); if(sr){
            sr.status='approved';
            const myBooking=bookings.find(b=>b.id===sr.bookingId);
            const targetBooking=bookings.find(b=>b.id===sr.targetBookingId);
            if(myBooking&&targetBooking){
                myBooking.assignedEmployees=myBooking.assignedEmployees.map(eid=>eid===sr.fromEmpId?sr.toEmpId:eid);
                targetBooking.assignedEmployees=targetBooking.assignedEmployees.map(eid=>eid===sr.toEmpId?sr.fromEmpId:eid);
            }
            saveAllData(); renderSwapRequestsContent(); renderBookingsContent(); renderDistributionContent();
            showMsg("✅ تمت الموافقة");
        }}
        function rejectSwap(id){ const sr=swapRequests.find(x=>x.id===id); if(sr){ sr.status='rejected'; saveAllData(); renderSwapRequestsContent(); showMsg("❌ تم الرفض"); } }

        // Archive
        function renderArchiveContent(){ const comp=bookings.filter(b=>b.status==='completed').slice(-50); document.getElementById('archiveTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold mb-4">📁 الأرشيف</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th></tr></thead><tbody>${comp.map(b=>`<tr><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price.toLocaleString()} ج.م</td></tr>`).join('')||'<tr><td colspan="4" class="text-center">الأرشيف فارغ</td></tr>'}</tbody></table></div></div>`; }

        // Equipment
        function renderEquipmentContent(){ document.getElementById('equipmentTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold mb-4">📦 المعدات</h2><div class="flex gap-2 mb-4"><button onclick="showAddEquipmentModal()" class="bg-blue-700 text-white px-4 py-2 rounded-xl">+ معدة</button><button onclick="checkLowStock()" class="bg-amber-600 text-white px-4 py-2 rounded-xl">⚠️ فحص المخزون</button></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4">${Object.entries(equipmentInventory).map(([id,item])=>`<div class="border p-4 rounded-xl"><div class="flex justify-between"><h3 class="font-bold">${item.name}</h3><span class="${item.quantity<=item.minStock?'text-red-600':'text-green-600'}">${item.quantity<=item.minStock?'⚠️ منخفض':'✅ متاح'}</span></div><div>الكمية: ${item.quantity} (الحد الأدنى ${item.minStock})</div><div class="flex gap-2 mt-2"><button onclick="adjustInventory('${id}',-1)" class="bg-gray-300 px-3 py-1 rounded">-</button><button onclick="adjustInventory('${id}',1)" class="bg-gray-300 px-3 py-1 rounded">+</button></div></div>`).join('')}</div></div>`; }
        function showAddEquipmentModal(){ openModal(`<h3>➕ إضافة معدة</h3><input id="eqName" placeholder="الاسم"><select id="eqCategory"><option>تصوير</option><option>إضاءة</option><option>صوت</option></select><input id="eqQty" type="number" placeholder="الكمية" value="1"><input id="eqMin" type="number" placeholder="الحد الأدنى" value="1"><button onclick="saveNewEquipment()" class="bg-blue-700 text-white w-full py-2 rounded-xl mt-2">حفظ</button>`); }
        function saveNewEquipment(){ const name=document.getElementById('eqName')?.value.trim(); if(!name) return showMsg("⚠️ أدخل الاسم"); const id='eq_'+Date.now(); equipmentInventory[id]={name, category:document.getElementById('eqCategory')?.value, quantity:parseInt(document.getElementById('eqQty')?.value)||1, minStock:parseInt(document.getElementById('eqMin')?.value)||1}; saveAllData(); closeModal(); renderEquipmentContent(); showMsg("✅ تمت الإضافة"); }
        function adjustInventory(id,delta){ if(equipmentInventory[id]){ equipmentInventory[id].quantity=Math.max(0,equipmentInventory[id].quantity+delta); saveAllData(); renderEquipmentContent(); if(equipmentInventory[id].quantity<=equipmentInventory[id].minStock) showMsg(`⚠️ ${equipmentInventory[id].name} مخزون منخفض`,'warning'); } }
        function checkLowStock(){ const low=Object.entries(equipmentInventory).filter(([_,i])=>i.quantity<=i.minStock); if(low.length) showMsg(`⚠️ ${low.length} معدات منخفضة`,'warning'); else showMsg("✅ جميع المعدات كافية",'success'); }

        // Settings
        function renderSettingsContent(){ document.getElementById('settingsTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold mb-4">⚙️ الإعدادات</h2><div class="border p-4 rounded-xl mb-4"><h3 class="font-bold mb-2">🎨 المظهر</h3><input type="color" id="primaryColorPicker" value="${themeSettings.primaryColor}" onchange="previewTheme(this.value)"><select id="darkModeSelect" onchange="previewTheme(null,this.value)"><option value="false" ${!themeSettings.darkMode?'selected':''}>فاتح</option><option value="true" ${themeSettings.darkMode?'selected':''}>داكن</option></select><button onclick="saveThemeSettings()" class="bg-emerald-600 text-white w-full py-2 rounded-xl mt-2">حفظ المظهر</button></div><div><h3 class="font-bold">🏢 اسم الشركة</h3><input id="companyNameInput" value="${companyName}" class="mb-2"><button onclick="updateCompanyName()" class="bg-emerald-600 text-white w-full py-2 rounded-xl">حفظ الاسم</button></div><div class="mt-4"><h3 class="font-bold">📱 رقم واتساب</h3><input id="whatsappInput" value="${whatsappNumber}" dir="ltr"><button onclick="updateWhatsApp()" class="bg-emerald-600 text-white w-full py-2 rounded-xl">حفظ</button></div><div class="mt-4"><h3 class="font-bold">🖼️ الشعار</h3><input type="file" id="logoFileInput" accept="image/*" onchange="handleLogoUpload(event)"><div id="logoPreview" class="mt-2">${companyLogo.startsWith('data:image')?`<img src="${companyLogo}" class="w-16 h-16 object-cover">`:`<span class="text-2xl">${companyLogo}</span>`}</div></div></div>`; }
        function previewTheme(color,darkMode){ if(color) document.documentElement.style.setProperty('--custom-primary',color); if(darkMode!==undefined) document.documentElement.classList.toggle('dark',darkMode==='true'); }
        function saveThemeSettings(){ themeSettings.primaryColor=document.getElementById('primaryColorPicker')?.value; themeSettings.darkMode=document.getElementById('darkModeSelect')?.value==='true'; applyTheme(); saveAllData(); showMsg("✅ تم حفظ المظهر"); }
        function handleLogoUpload(e){ const file=e.target.files[0]; if(file){ const reader=new FileReader(); reader.onload=ev=>{ companyLogo=ev.target.result; saveAllData(); renderSettingsContent(); showMsg("✅ تم تحديث الشعار"); }; reader.readAsDataURL(file); } }
        function updateCompanyName(){ companyName=document.getElementById('companyNameInput')?.value||'Drmedia Pro'; saveAllData(); showMsg("✅ تم حفظ الاسم"); renderApp(); }
        function updateWhatsApp(){ whatsappNumber=document.getElementById('whatsappInput')?.value||''; saveAllData(); showMsg("✅ تم حفظ الرقم"); }

        // Clients (جديد)
        function renderClientsContent(){ document.getElementById('clientsTab').innerHTML=`<div class="p-4"><div class="flex justify-between"><h2 class="text-xl font-bold mb-4">👥 العملاء</h2><button onclick="showAddClientModal()" class="bg-blue-600 text-white px-4 py-2 rounded-xl">+ عميل جديد</button></div><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>الاسم</th><th>الهاتف</th><th>البريد</th><th>عدد الحجوزات</th><th>إجراءات</th></tr></thead><tbody>${clients.map(c=>`<tr><td>${c.name}</td><td>${c.phone}</td><td>${c.email||'-'}</td><td>${bookings.filter(b=>b.phone===c.phone).length}</td><td><button onclick="editClient('${c.id}')" class="text-amber-600"><i class="fas fa-edit"></i></button> <button onclick="deleteClient('${c.id}')" class="text-red-600"><i class="fas fa-trash"></i></button></td></tr>`).join('')||'<tr><td colspan="5" class="text-center">لا يوجد عملاء</td></tr>'}</tbody></table></div></div>`; }
        function showAddClientModal(){ openModal(`<h3>➕ عميل جديد</h3><input id="clientName" placeholder="الاسم"><input id="clientPhone" placeholder="رقم الهاتف" dir="ltr"><input id="clientEmail" placeholder="البريد الإلكتروني (اختياري)"><button onclick="saveNewClient()" class="bg-blue-600 text-white w-full py-2 rounded-xl mt-2">حفظ</button>`); }
        function saveNewClient(){ const name=document.getElementById('clientName')?.value.trim(); const phone=document.getElementById('clientPhone')?.value.trim(); if(!name||!phone) return showMsg("⚠️ الاسم والهاتف مطلوبان"); clients.push({id:'c'+Date.now(), name, phone, email:document.getElementById('clientEmail')?.value}); saveAllData(); closeModal(); renderClientsContent(); showMsg("✅ تمت إضافة العميل"); }
        function editClient(id){ const c=clients.find(x=>x.id===id); if(c) openModal(`<h3>✏️ تعديل عميل</h3><input id="clientName" value="${c.name}"><input id="clientPhone" value="${c.phone}" dir="ltr"><input id="clientEmail" value="${c.email||''}"><button onclick="saveEditClient('${id}')" class="bg-amber-600 text-white w-full py-2 rounded-xl">حفظ</button>`); }
        function saveEditClient(id){ const c=clients.find(x=>x.id===id); if(c){ c.name=document.getElementById('clientName').value; c.phone=document.getElementById('clientPhone').value; c.email=document.getElementById('clientEmail').value; saveAllData(); closeModal(); renderClientsContent(); showMsg("✅ تم التحديث"); } }
        function deleteClient(id){ if(confirm("حذف العميل؟")){ clients=clients.filter(c=>c.id!==id); saveAllData(); renderClientsContent(); showMsg("🗑️ تم الحذف"); } }

        // WhatsApp Logs
        function renderWhatsappLogsContent(){ document.getElementById('whatsappLogsTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold mb-4">📨 سجل المراسلات</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>التاريخ</th><th>إلى</th><th>الرسالة</th><th>الحالة</th></tr></thead><tbody>${whatsappLogs.slice().reverse().map(log=>`<tr><td>${log.date}</td><td>${log.to}</td><td>${log.message.substring(0,60)}...</td><td>${log.status}</td></tr>`).join('')||'<tr><td colspan="4" class="text-center">لا توجد رسائل</td></tr>'}</tbody></table></div><button onclick="exportWhatsappLogs()" class="bg-green-600 text-white px-4 py-2 rounded-xl mt-4">📥 تصدير Excel</button></div>`; }
        function exportWhatsappLogs(){ const ws=XLSX.utils.json_to_sheet(whatsappLogs.map(l=>({التاريخ:l.date,الرقم:l.to,الرسالة:l.message,الحالة:l.status}))); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"سجل_الواتساب"); XLSX.writeFile(wb,`whatsapp_logs_${new Date().toISOString().slice(0,10)}.xlsx`); showMsg("✅ تم التصدير"); }

        // Backup & Restore
        function renderBackupContent(){ document.getElementById('backupTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold mb-4">💾 النسخ الاحتياطي</h2><button onclick="backupData()" class="bg-blue-600 text-white w-full py-3 rounded-xl mb-4">📥 تحميل نسخة احتياطية (JSON)</button><div class="border-t pt-4"><h3 class="font-bold mb-2">🔄 استعادة بيانات</h3><input type="file" id="restoreFile" accept=".json" class="mb-3"><button onclick="restoreBackup()" class="bg-amber-600 text-white w-full py-3 rounded-xl">استعادة من الملف</button><p class="text-xs text-gray-500 mt-2">⚠️ تحذير: استعادة الملف ستستبدل كل البيانات الحالية في النظام.</p></div></div>`; }
        function backupData(){ const data={bookings,employees,users,halls,clients,whatsappLogs,equipmentInventory,payrollArchive,employeeLoans,companySettings:{companyName,companyLogo,whatsappNumber,themeSettings}}; const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`drmedia_backup_${new Date().toISOString().slice(0,19)}.json`; a.click(); showMsg("✅ تم تصدير النسخة"); }
        function restoreBackup(){ const file=document.getElementById('restoreFile').files[0]; if(!file) return showMsg("⚠️ اختر ملف أولاً"); const reader=new FileReader(); reader.onload=e=>{ try{ const data=JSON.parse(e.target.result); bookings=data.bookings||[]; employees=data.employees||[]; users=data.users||[]; halls=data.halls||[]; clients=data.clients||[]; whatsappLogs=data.whatsappLogs||[]; equipmentInventory=data.equipmentInventory||{}; payrollArchive=data.payrollArchive||[]; employeeLoans=data.employeeLoans||{}; if(data.companySettings){ companyName=data.companySettings.companyName; companyLogo=data.companySettings.companyLogo; whatsappNumber=data.companySettings.whatsappNumber; themeSettings=data.companySettings.themeSettings; } saveAllData(); showMsg("✅ تمت الاستعادة، سيتم تحديث الصفحة"); setTimeout(()=>location.reload(),1500); }catch(err){ showMsg("❌ ملف غير صالح",'error'); } }; reader.readAsText(file); }

        // Emergency, Voice, Login, etc. (مختصر لكن كامل)
        function toggleEmergencyMode(){ if(emergencyMode) deactivateEmergency(); else if(confirm("🚨 تفعيل الطوارئ؟")) activateEmergencyMode(); }
        function activateEmergencyMode(){ emergencyMode=true; document.body.classList.add('emergency-mode'); document.getElementById('emergencyPanel').classList.add('active'); saveAllData(); employees.filter(e=>e.active&&e.phone).forEach(emp=>sendWhatsAppNotification(emp.phone,`🚨 طوارئ في ${companyName}`)); showMsg("🚨 تم تفعيل الطوارئ",'error'); }
        function deactivateEmergency(){ emergencyMode=false; document.body.classList.remove('emergency-mode'); document.getElementById('emergencyPanel').classList.remove('active'); saveAllData(); showMsg("✅ إنهاء الطوارئ",'success'); }
        function sendEmergencyWhatsApp(){ const phones=employees.filter(e=>e.active&&e.phone).map(e=>e.phone); sendBulkWhatsApp(phones,`🚨 تحديث طوارئ: ${emergencyMode?'مفعل':'منتهي'}`); }

        // Voice
        function initVoiceRecognition(){ if(!('webkitSpeechRecognition' in window)){ showMsg("المتصفح لا يدعم الصوت",'warning'); return; } const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition; voiceRecognition=new SpeechRecognition(); voiceRecognition.lang='ar-EG'; voiceRecognition.onresult=event=>processVoiceCommand(event.results[0][0].transcript.trim()); voiceRecognition.onend=()=>{ isListening=false; updateVoiceButton(); }; }
        function toggleVoiceCommand(){ if(!voiceRecognition) initVoiceRecognition(); if(isListening) voiceRecognition.stop(); else{ showMsg("🎤 استمع...",'warning'); document.getElementById('voiceHint').style.display='block'; voiceRecognition.start(); isListening=true; } updateVoiceButton(); }
        function updateVoiceButton(){ const btn=document.getElementById('voiceBtn'); if(isListening){ btn.classList.add('listening'); btn.innerHTML='<i class="fas fa-stop"></i>'; }else{ btn.classList.remove('listening'); btn.innerHTML='<i class="fas fa-microphone"></i>'; setTimeout(()=>document.getElementById('voiceHint').style.display='none',3000); } }
        function processVoiceCommand(cmd){ const lower=cmd.toLowerCase(); showMsg(`🎤 قلت: "${cmd}"`); if(lower.includes('اضف حجز')) showAddBookingModal(); else if(lower.includes('اعرض اوردراتي') && currentUser?.role==='employee'){ currentTab='bookingsTab'; renderCurrentTab(); showMsg("✅ عرض أوردراتك"); } else if(lower.includes('الايرادات')){ const todayRev=bookings.filter(b=>b.date===new Date().toISOString().slice(0,10) && b.status!=='cancelled').reduce((s,b)=>s+b.price,0); showMsg(`💰 إيرادات اليوم: ${todayRev.toLocaleString()} ج.م`); } else if(lower.includes('طوارئ')) toggleEmergencyMode(); else showMsg("🤔 لم أفهم الأمر"); }

        // Export PDF
        function exportToPDF(){ showMsg("📤 جاري التقرير...",'warning'); const element=document.getElementById(currentTab==='dashboardTab'?'dashboardTab':'app'); html2canvas(element,{scale:2}).then(canvas=>{ const imgData=canvas.toDataURL('image/png'); const {jsPDF}=window.jspdf; const pdf=new jsPDF('p','mm','a4'); const imgWidth=210; const imgHeight=canvas.height*imgWidth/canvas.width; pdf.addImage(imgData,'PNG',0,0,imgWidth,imgHeight); pdf.save(`${companyName}_Report_${new Date().toISOString().slice(0,10)}.pdf`); showMsg("✅ تم التحميل"); }).catch(()=>showMsg("❌ خطأ في التقرير",'error')); }

        // Client Portal
        function generateClientPortalLink(bookingId){ const token=btoa(bookingId+'-'+Date.now()).replace(/=/g,''); const url=`${window.location.origin}${window.location.pathname}?client=${token}`; navigator.clipboard.writeText(url); showMsg("🔗 تم نسخ رابط العميل"); const booking=bookings.find(b=>b.id===bookingId); if(booking?.phone) sendWhatsAppNotification(booking.phone,`رابط متابعة حجزك: ${url}`); }
        function renderClientPortalView(token){ try{ const decoded=atob(token.replace(/-/g,'=').padEnd(atob(token.replace(/-/g,'=')).length+((4-atob(token.replace(/-/g,'=')).length%4)%4),'=')); const bookingId=decoded.split('-')[0]; const booking=bookings.find(b=>b.id===bookingId); if(!booking){ document.body.innerHTML='<div class="p-8 text-center">رابط غير صالح</div>'; return; } document.body.innerHTML=`<div class="max-w-md mx-auto p-4"><h1 class="text-2xl font-bold">${companyName}</h1><div class="border p-4 rounded-xl mt-4"><h2>تفاصيل الحجز</h2><p>العميل: ${booking.clientName}<br>التاريخ: ${booking.date}<br>القاعة: ${booking.hallName}<br>السعر: ${booking.price.toLocaleString()} ج.م<br>الحالة: ${booking.status}<br>الدفع: ${booking.paymentStatus}</div>${booking.paymentStatus!=='paid'?`<button onclick="simulatePayment('${booking.id}')" class="bg-green-600 text-white w-full py-2 rounded-xl mt-3">دفع الآن (تجريبي)</button>`:''}</div>`; }catch(e){ document.body.innerHTML='<div class="p-8 text-center">رابط تالف</div>'; } }
        function simulatePayment(bookingId){ const booking=bookings.find(b=>b.id===bookingId); if(booking){ booking.paymentStatus='paid'; saveAllData(); renderClientPortalView(clientPortalToken); showMsg("✅ تم الدفع تجريبياً"); addNotification('admin','دفع جديد',`${booking.clientName} دفع ${booking.price.toLocaleString()}`); } }

            document.querySelectorAll('#tabsContainer .tab-btn').forEach(btn=>btn.addEventListener('click',function(){ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active'); currentTab=this.dataset.tab; renderCurrentTab(); }));

            document.addEventListener('click',e=>{ const panel=document.getElementById('notificationPanel'); const bell=document.getElementById('notificationBell'); if(panel&&bell&&!bell.contains(e.target)&&!panel.contains(e.target)) panel.style.display='none'; });
        }
        
        function renderEmployeeDashboard(){ 
            if(!currentUser?.employeeId){ document.getElementById('app').innerHTML=`<div class="p-8 text-center text-red-500">حساب غير مرتبط بموظف</div>`; return; }

            const my=bookings.filter(b=>(b.assignedEmployees||[]).includes(emp.id) && b.status!=='cancelled');
            const today=new Date().toISOString().slice(0,10);
            const todayOrders=my.filter(b=>b.date===today);
            document.getElementById('app').innerHTML=`

                        <div class="mt-4 text-sm text-gray-400"><p>المدير: ahmed / 1994</p><p>الموظف: ahmed_emp / emp123</p></div>
                        <div class="mt-6 pt-4 text-xs">© 2026 Drmedia Pro Plus | Ahmed Shreif</div>
                    </div>
                </div>`; 
            setTimeout(()=>document.getElementById('loginUser')?.focus(),300);
        }
        
        function doLogin(){ 
            const un=document.getElementById('loginUser').value.trim(); 
            const pw=document.getElementById('loginPass').value; 
            const user=users.find(u=>u.username===un && String(u.password)===pw); 
            if(user){ 
                currentUser=user; 
                sessionStorage.setItem('vpms_user',JSON.stringify(user)); 
                renderApp(); 
                showMsg(`👋 مرحباً ${user.name||user.username}`,'success'); 
            } else showMsg("❌ اسم المستخدم أو كلمة المرور غير صحيحة",'error'); 
        }
        
        function logout(){ sessionStorage.removeItem('vpms_user'); currentUser=null; showLogin(); showMsg("👋 تم تسجيل الخروج"); }

            const urlParams=new URLSearchParams(window.location.search); 
            if(urlParams.get('client')){ renderClientPortalView(urlParams.get('client')); return; } 
            if(!currentUser) showLogin();

            else renderAdminDashboard();
