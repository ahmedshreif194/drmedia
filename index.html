        .tab-btn { cursor: pointer; padding: 10px 16px; border-radius: 16px 16px 0 0; display: inline-block; background: #e5e7eb; margin-left: 4px; transition: 0.2s; }
        .tab-btn.active { background: #065f46; color: white; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 8px 16px; border-radius: 40px; z-index: 1000; font-size: 14px; }

        .stat-number { font-size: 32px; font-weight: bold; color: #065f46; }
        canvas { max-height: 250px; width: 100% !important; }
        .employee-checkbox-list { max-height: 300px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; margin-bottom: 15px; }

        .calendar-day { background: #f1f5f9; border-radius: 12px; padding: 10px 4px; text-align: center; cursor: pointer; transition: 0.2s; }
        .calendar-day.booked { background: #10b981; color: white; }
        .calendar-day:hover { transform: scale(1.05); background: #cbd5e1; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #e5e7eb; padding: 8px; text-align: right; }
        th { background-color: #f3f4f6; }
        input, select, textarea { border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 12px; width: 100%; margin-bottom: 10px; }
        button { transition: 0.2s; cursor: pointer; }
        button:active { transform: scale(0.97); }
        .checkbox-col { width: 40px; text-align: center; }
        .save-indicator { position: fixed; top: 10px; right: 10px; background: #10b981; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; z-index: 1000; }

            db.ref('equipment').set(equipment),
            db.ref('users').set(users),
            db.ref('halls').set(halls),
            db.ref('holidays').set(holidays)
        ];
        
        Promise.all(saves).then(() => {
            console.log("✅ جميع البيانات تم حفظها في Firebase");

    function listenToFirebase() {
        db.ref('bookings').on('value', s => { if(s.val()) bookings = s.val(); renderCurrentTab(); });
        db.ref('employees').on('value', s => { if(s.val()) employees = s.val(); renderCurrentTab(); });
        db.ref('equipment').on('value', s => { if(s.val()) equipment = s.val(); renderCurrentTab(); });
        db.ref('users').on('value', s => { if(s.val()) users = s.val(); if(!currentUser) showLogin(); else renderCurrentTab(); });
        db.ref('halls').on('value', s => { if(s.val()) halls = s.val(); else initHalls(); renderCurrentTab(); });
        db.ref('holidays').on('value', s => { if(s.val()) holidays = s.val(); renderCurrentTab(); });

    function showMsg(msg, type = 'success') { 
        let t = document.getElementById('toast'); 
        t.innerText = msg; 
        t.classList.remove('hidden');

    // -------------------- التوزيع العادل --------------------
    function autoDistribute() {
        bookings.forEach(b => b.assignedEmployees = []);
        const sorted = [...bookings].sort((a,b)=>new Date(a.date)-new Date(b.date));
        let dirs = employees.filter(e=>e.role==='مخرج'&&e.active).map(e=>({...e, temp: e.totalOrders||0}));
        let photos = employees.filter(e=>e.role==='مصور'&&e.active).map(e=>({...e, temp: e.totalOrders||0}));
        let cranes = employees.filter(e=>e.role==='كرين'&&e.active).map(e=>({...e, temp: e.totalOrders||0}));
        let assignedToday = new Map();
        for(let b of sorted){
            let hall = halls.find(h=>h.id===b.hallId);
            let hallType = hall ? hall.type : 'closed';
            let busy = assignedToday.get(b.date) || new Set();
            let assigned = [];
            if(hallType === 'cafe'){
                let avail = photos.filter(p=>!busy.has(p.id));
                if(avail.length){
                    avail.sort((a,c)=>a.temp-c.temp);
                    let chosen = avail[0];
                    assigned.push(chosen.id);
                    chosen.temp++;
                    busy.add(chosen.id);
                }
            } else {
                let availDir = dirs.filter(d=>!busy.has(d.id));
                if(availDir.length){
                    availDir.sort((a,c)=>a.temp-c.temp);
                    let chosen = availDir[0];
                    assigned.push(chosen.id);
                    chosen.temp++;
                    busy.add(chosen.id);
                }
                let availPhoto = photos.filter(p=>!busy.has(p.id));
                for(let i=0;i<2;i++){
                    if(availPhoto.length){
                        availPhoto.sort((a,c)=>a.temp-c.temp);
                        let chosen = availPhoto[0];
                        assigned.push(chosen.id);
                        chosen.temp++;
                        busy.add(chosen.id);
                        availPhoto = availPhoto.filter(p=>p.id!==chosen.id);
                    }
                }
                let availCrane = cranes.filter(c=>!busy.has(c.id));
                if(availCrane.length){
                    availCrane.sort((a,c)=>a.temp-c.temp);
                    let chosen = availCrane[0];
                    assigned.push(chosen.id);
                    chosen.temp++;
                    busy.add(chosen.id);
                }
            }
            b.assignedEmployees = assigned;
            assignedToday.set(b.date, busy);
        }
        employees.forEach(e=>{
            let d = dirs.find(d=>d.id===e.id); if(d) e.totalOrders = d.temp;
            let p = photos.find(p=>p.id===e.id); if(p) e.totalOrders = p.temp;
            let c = cranes.find(c=>c.id===e.id); if(c) e.totalOrders = c.temp;
        });
        saveAllToFirebase();
        showMsg("✅ تم التوزيع العادل");
    }

                    <div id="dashboardTab" class="tab-content"></div>
                    <div id="bookingsTab" class="tab-content hidden"></div>
                    <div id="hallsTab" class="tab-content hidden"></div>
                    <div id="employeesTab" class="tab-content hidden"></div>
                    <div id="distributionTab" class="tab-content hidden"></div>
                    <div id="payrollTab" class="tab-content hidden"></div>
                    <div id="calendarTab" class="tab-content hidden"></div>
                    <div id="reportsTab" class="tab-content hidden"></div>

                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));

                document.getElementById(tabId).classList.remove('hidden');

                if(tabId === 'dashboardTab') renderDashboardContent();
                else if(tabId === 'bookingsTab') renderBookingsContent();
                else if(tabId === 'hallsTab') renderHallsContent();
                else if(tabId === 'employeesTab') renderEmployeesContent();
                else if(tabId === 'distributionTab') renderDistributionContent();
                else if(tabId === 'payrollTab') renderPayrollContent();
                else if(tabId === 'calendarTab') renderCalendarContent();
                else if(tabId === 'reportsTab') renderReportsContent();
                else if(tabId === 'equipmentTab') renderEquipmentContent();
                else if(tabId === 'usersTab') renderUsersContent();
                else if(tabId === 'settingsTab') renderSettingsContent();
            });
        });
        renderDashboardContent();
    }

    // -------------------- لوحة التحكم --------------------
    function renderDashboardContent() {
        const totalBookings = bookings.length;
        const totalRevenue = bookings.reduce((s,b)=>s+b.price,0);
        const totalEmployees = employees.filter(e=>e.active).length;
        const upcoming = bookings.filter(b=>new Date(b.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,5);
        const hallStats = {};
        halls.forEach(h=>hallStats[h.id] = 0);
        bookings.forEach(b=>{ if(hallStats[b.hallId]!==undefined) hallStats[b.hallId]++; });
        const now = new Date();
        const monthBookings = bookings.filter(b=>{let d=new Date(b.date); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();});
        const monthRevenue = monthBookings.reduce((s,b)=>s+b.price,0);
        const topEmp = [...employees].sort((a,b)=>b.totalOrders-a.totalOrders)[0];
        const months = [], revenues = [];
        for(let i=5;i>=0;i--){
            let d = new Date(); d.setMonth(d.getMonth()-i);
            months.push(d.toLocaleString('ar',{month:'short'}));
            let mb = bookings.filter(b=>{let bd=new Date(b.date); return bd.getMonth()===d.getMonth() && bd.getFullYear()===d.getFullYear();});
            revenues.push(mb.reduce((s,b)=>s+b.price,0));
        }
        const top5 = [...employees].sort((a,b)=>b.totalOrders-a.totalOrders).slice(0,5);
        const html = `
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="dashboard-card"><i class="fas fa-calendar-check text-2xl text-emerald-600"></i><div class="stat-number">${totalBookings}</div><div>إجمالي الحجوزات</div></div>
                <div class="dashboard-card"><i class="fas fa-chart-line text-2xl text-emerald-600"></i><div class="stat-number">${totalRevenue.toLocaleString()} ج.م</div><div>إجمالي الإيرادات</div></div>
                <div class="dashboard-card"><i class="fas fa-users text-2xl text-emerald-600"></i><div class="stat-number">${totalEmployees}</div><div>الموظفين النشطين</div></div>
                <div class="dashboard-card"><i class="fas fa-trophy text-2xl text-emerald-600"></i><div class="stat-number">${topEmp?.totalOrders||0}</div><div>الأكثر شغل: ${topEmp?.name||'-'}</div></div>
            </div>
            <div class="grid md:grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-4 rounded-2xl shadow"><h3 class="font-bold mb-2"><i class="fas fa-chart-simple ml-1 text-emerald-600"></i>إحصائيات الشهر الحالي</h3><div class="flex justify-around"><div>حجوزات: ${monthBookings.length}</div><div>إيرادات: ${monthRevenue.toLocaleString()} ج.م</div></div></div>
                <div class="bg-white p-4 rounded-2xl shadow"><h3 class="font-bold mb-2"><i class="fas fa-building ml-1 text-emerald-600"></i>حسب القاعة</h3><div class="flex flex-wrap gap-2">${halls.map(h=>`<div class="bg-gray-100 px-3 py-1 rounded-full text-sm">${h.name}: ${hallStats[h.id]||0}</div>`).join('')}</div></div>
            </div>
            <div class="grid md:grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-4 rounded-2xl shadow"><h3 class="font-bold mb-2"><i class="fas fa-chart-line ml-1"></i>الإيرادات الشهرية</h3><canvas id="revenueChartCanvas"></canvas></div>
                <div class="bg-white p-4 rounded-2xl shadow"><h3 class="font-bold mb-2"><i class="fas fa-chart-bar ml-1"></i>أداء الموظفين (أفضل 5)</h3><canvas id="empChartCanvas"></canvas></div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow"><h3 class="font-bold mb-2"><i class="fas fa-calendar-alt ml-1"></i>أقرب الحجوزات</h3><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th></tr></thead><tbody>${upcoming.map(b=>`<tr><td class="p-2">${b.clientName}</td><td class="p-2">${b.date}</td><td class="p-2">${b.hallName}</td><td class="p-2">${b.price} ج.م</span></span></td>`).join('')||'}<tr<td colspan="4">لا توجد حجوزات</span></span></td>'}</tbody></table></div></div>
        `;
        document.getElementById('dashboardTab').innerHTML = html;
        setTimeout(()=>{
            const revCtx = document.getElementById('revenueChartCanvas')?.getContext('2d');
            if(revCtx && revenueChart) revenueChart.destroy();
            if(revCtx) revenueChart = new Chart(revCtx, { type:'line', data:{ labels:months, datasets:[{ label:'الإيرادات (ج.م)', data:revenues, borderColor:'#10b981', fill:false }] } });

    function showBulkEditModal() {
        if(selectedEmployees.size === 0){
            alert("⚠️ لم تختر أي موظف. حدد الموظفين أولاً.");
            return;
        }
        const html = `<h3 class="text-xl font-bold mb-3">✏️ تعديل جماعي للموظفين (${selectedEmployees.size} موظف)</h3>

            <select id="bulkActive"><option value="">بدون تغيير</option><option value="true">نشط</option><option value="false">غير نشط</option></select>
            <button onclick="applyBulkEdit()" class="bg-emerald-700 text-white w-full py-2 rounded-xl mt-3">تطبيق التعديلات</button>`;
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
    }

    function applyBulkEdit() {
        const newSalary = document.getElementById('bulkSalary').value;
        const newActive = document.getElementById('bulkActive').value;
        let changed = false;
        for(let id of selectedEmployees){
            const emp = employees.find(e=>e.id===id);
            if(emp){
                if(newSalary !== '') { emp.salaryPerOrder = parseInt(newSalary); changed=true; }
                if(newActive !== '') { emp.active = newActive === 'true'; changed=true; }
            }
        }
        if(changed){
            saveAllToFirebase();
            autoDistribute();
            renderEmployeesContent();
            showMsg(`✅ تم تعديل ${selectedEmployees.size} موظف`);
        } else {
            showMsg("لم يتم إجراء أي تغيير");
        }
        closeModal();
    }

    function bulkDeleteEmployees() {
        if(selectedEmployees.size === 0){
            alert("⚠️ لم تختر أي موظف للحذف.");
            return;
        }
        if(confirm(`⚠️ هل أنت متأكد من حذف ${selectedEmployees.size} موظف؟`)){
            employees = employees.filter(e => !selectedEmployees.has(e.id));
            users = users.filter(u => !selectedEmployees.has(u.employeeId));
            selectedEmployees.clear();
            saveAllToFirebase();
            autoDistribute();
            renderEmployeesContent();
            showMsg(`✅ تم حذف الموظفين المحددين`);
        }
    }

        const name = document.getElementById('empName').value;

        const newEmp = { id:'emp'+Date.now(), name, role:document.getElementById('empRole').value, phone:document.getElementById('empPhone').value, salaryPerOrder:parseInt(document.getElementById('empSalary').value)||200, active:true, totalOrders:0 };
        employees.push(newEmp);
        const username = name.replace(/\s/g,'').toLowerCase();
        let final = username, c=1;
        while(users.some(u=>u.username===final)) final=username+(c++);
        users.push({ username:final, password:'emp123', role:'employee', employeeId:newEmp.id, name });
        saveAllToFirebase();
        closeModal();
        renderEmployeesContent();
        showMsg(`✅ تم إضافة ${name} - حسابه: ${final} / emp123`);

    // -------------------- التقويم --------------------
    function renderCalendarContent() {
        const today = new Date();
        const year = today.getFullYear(), month = today.getMonth();
        const firstDay = new Date(year,month,1).getDay();
        const daysCount = new Date(year,month+1,0).getDate();
        const monthNames = ['يناير','فبراير','مارس','إبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
        let html = `<h2 class="text-xl font-bold mb-3">📆 ${monthNames[month]} ${year}</h2><div class="calendar-grid">`;
        ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'].forEach(d=>html+=`<div class="text-center font-bold py-2">${d}</div>`);
        for(let i=0;i<firstDay;i++) html+=`<div></div>`;
        for(let d=1;d<=daysCount;d++){
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const has = bookings.some(b=>b.date===dateStr);
            html += `<div class="calendar-day ${has?'booked':''}" onclick="showDayBookings('${dateStr}')">${d}</div>`;
        }
        html += `</div><div id="calendarInfo" class="mt-3 text-sm text-gray-600"></div>`;
        document.getElementById('calendarTab').innerHTML = html;
    }

    function showDayBookings(date){
        const filtered = bookings.filter(b=>b.date===date);
        const info = document.getElementById('calendarInfo');
        if(filtered.length===0) info.innerHTML = `<div class="p-3 bg-gray-100 rounded">📭 لا توجد حجوزات في ${date}</div>`;
        else info.innerHTML = `<div class="p-3 bg-emerald-50 rounded"><strong>📅 حجوزات ${date}</strong><ul class="mr-4">${filtered.map(b=>`<li>${b.clientName} - ${b.hallName} (${b.price} ج.م)</li>`).join('')}</ul></div>`;
    }

    function renderReportsContent() {

    function showImportExcelModal(){
        const hallOptions = halls.map(h=>`<option value="${h.id}">${h.name}</option>`).join('');

    async function importExcelData(){
        const file = document.getElementById('excelFile').files[0];
        if(!file){ alert("اختر ملف"); return; }
        const hallId = document.getElementById('importHallId').value;
        const hall = halls.find(h=>h.id===hallId);
        if(!hall){ alert("اختر قاعة صالحة"); return; }
        const skipFri = document.getElementById('skipFriday').checked;
        const skipSat = document.getElementById('skipSaturday').checked;
        const skipHol = document.getElementById('skipHolidays').checked;
        const data = await file.arrayBuffer();
        const wb = XLSX.read(data);
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
        let added=0, skipped=0;
        for(let i=1;i<rows.length;i++){
            let row=rows[i];
            if(!row||row.length<1) continue;
            let rawDate = row[0];
            let formatted = '';
            if(typeof rawDate === 'number') formatted = new Date((rawDate-25569)*86400*1000).toISOString().slice(0,10);
            else if(typeof rawDate === 'string'){
                let m = rawDate.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
                if(m) formatted=m[0];
                else{ let m2=rawDate.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m2) formatted=`${m2[3]}-${m2[2]}-${m2[1]}`; }
            }
            if(!formatted || !formatted.match(/^\d{4}-\d{1,2}-\d{1,2}$/)) continue;
            let isSkip=false;
            if(skipFri && new Date(formatted).getDay()===5) isSkip=true;
            if(skipSat && new Date(formatted).getDay()===6) isSkip=true;
            if(skipHol && holidays.includes(formatted)) isSkip=true;
            if(isSkip){ skipped++; continue; }
            const client = row[1] || 'عميل جديد';
            const hallNameFromExcel = row[2] || hall.name;
            const price = parseInt(row[3]) || 2500;
            bookings.push({
                id: Date.now()+Math.random().toString(36)+added,
                clientName: client,
                phone: "",
                hallId: hallId,
                hallName: hallNameFromExcel,
                date: formatted,
                price: price,
                assignedEmployees: []
            });
            added++;
        }
        if(added===0) alert(`لا توجد تواريخ صالحة (تم تخطي ${skipped})`);
        else{ saveAllToFirebase(); autoDistribute(); renderBookingsContent(); renderDistributionContent(); closeModal(); showMsg(`✅ استيراد ${added} حجز إلى ${hall.name}`); }
    }

    function showImportPdfModal(){
        const hallOptions = halls.map(h=>`<option value="${h.id}">${h.name}</option>`).join('');
        const html = `<h3 class="text-xl font-bold mb-3">📄 استيراد من PDF</h3><p class="text-sm text-gray-500 mb-2">سيتم استخراج التواريخ من الملف وإضافتها للقاعة المختارة</p><input type="file" id="pdfFile" accept="application/pdf"><select id="pdfHallId" class="mt-2">${hallOptions}</select><div class="flex gap-2 my-2"><label><input type="checkbox" id="pdfSkipFriday"> الجمعة</label><label><input type="checkbox" id="pdfSkipSaturday"> السبت</label><label><input type="checkbox" id="pdfSkipHolidays" checked> أيام الإجازة</label></div><button onclick="importPdfData()" class="bg-red-700 text-white w-full py-2 rounded-xl mt-2">استيراد</button>`;
        document.getElementById('modalContent').innerHTML = html;

    async function importPdfData(){
        const file = document.getElementById('pdfFile').files[0];
        if(!file){ alert("اختر ملف"); return; }
        const hallId = document.getElementById('pdfHallId').value;
        const hall = halls.find(h=>h.id===hallId);
        if(!hall){ alert("اختر قاعة صالحة"); return; }
        const skipFri = document.getElementById('pdfSkipFriday').checked;
        const skipSat = document.getElementById('pdfSkipSaturday').checked;
        const skipHol = document.getElementById('pdfSkipHolidays').checked;
        const pdfjsLib = window.pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        try{
            const ab = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data:ab}).promise;
            let fullText="";
            for(let i=1;i<=pdf.numPages;i++){ let page=await pdf.getPage(i); let txt=await page.getTextContent(); fullText+=txt.items.map(t=>t.str).join(" ")+"\n"; }
            const dates = [...new Set(fullText.match(/\b(\d{4}-\d{1,2}-\d{1,2}|\d{1,2}\/\d{1,2}\/\d{4})\b/g)||[])];
            let added=0, skipped=0;
            for(let d of dates){
                let clean = d.includes('/')?d.split('/').reverse().join('-'):d;
                let isSkip=false;
                if(skipFri && new Date(clean).getDay()===5) isSkip=true;
                if(skipSat && new Date(clean).getDay()===6) isSkip=true;
                if(skipHol && holidays.includes(clean)) isSkip=true;
                if(isSkip){ skipped++; continue; }
                bookings.push({
                    id: Date.now()+Math.random().toString(36)+added,
                    clientName: "عميل من PDF",
                    phone: "",
                    hallId: hallId,
                    hallName: hall.name,
                    date: clean,
                    price: 2500,
                    assignedEmployees: []
                });
                added++;
            }
            if(added===0) alert(`لا توجد تواريخ (تم تخطي ${skipped})`);
            else{ saveAllToFirebase(); autoDistribute(); renderBookingsContent(); renderDistributionContent(); closeModal(); showMsg(`✅ استيراد ${added} حجز إلى ${hall.name}`); }
        }catch(e){ alert("فشل الاستيراد"); }
    }
