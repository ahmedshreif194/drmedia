<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Drmedia Pro | نظام إدارة القاعات المتعددة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); }
        .tab-btn { cursor: pointer; padding: 10px 16px; border-radius: 16px 16px 0 0; display: inline-block; background: #e5e7eb; margin-left: 4px; transition: 0.2s; font-weight: 500; }
        .tab-btn.active { background: #065f46; color: white; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 8px 16px; border-radius: 40px; z-index: 1000; font-size: 14px; }
    </style>
</head>

<body>

<div id="app"></div>
<div id="toast" class="toast hidden"></div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
    apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
    authDomain: "drmedia-vpms.firebaseapp.com",
    databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
    projectId: "drmedia-vpms",
    storageBucket: "drmedia-vpms.firebasestorage.app",
    messagingSenderId: "681162512380",
    appId: "1:681162512380:web:ab2482f3234d8b59fc4479"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= DATA ================= */
let bookings = [];
let employees = [];
let halls = [];

/* ================= AUTO DISTRIBUTE ================= */
function autoDistribute() {
    bookings.forEach(b => b.assignedEmployees = []);

    bookings.forEach(b => {
        const hall = halls.find(h => h.id === b.hallId);
        const type = hall?.type;

        if(type === "cafe"){
            const photo = employees.find(e => e.role === "مصور" && e.active);
            if(photo) b.assignedEmployees.push(photo.id);
        } else {
            const director = employees.find(e => e.role === "مخرج" && e.active);
            const photo = employees.filter(e => e.role === "مصور" && e.active).slice(0,2);
            const crane = employees.find(e => e.role === "كرين" && e.active);

            if(director) b.assignedEmployees.push(director.id);
            photo.forEach(p => b.assignedEmployees.push(p.id));
            if(crane) b.assignedEmployees.push(crane.id);
        }
    });

    showMsg("✅ تم التوزيع");
}

/* ================= NEW RESET BUTTON FUNCTION ================= */
function resetAndRedistribute() {
    if(!confirm("⚠️ هل تريد مسح التوزيع وإعادة التوزيع؟")) return;

    bookings.forEach(b => b.assignedEmployees = []);
    autoDistribute();

    renderBookingsContent();
    renderDistributionContent();

    showMsg("🔄 تم إعادة التوزيع بنجاح");
}

/* ================= UI ================= */
function renderBookingsContent(){
    const html = `
        <div class="p-4">

            <div class="flex gap-2 mb-4">
                <button onclick="autoDistribute(); renderBookingsContent(); renderDistributionContent();" 
                class="bg-purple-700 text-white px-4 py-2 rounded-xl">
                إعادة توزيع
                </button>

                <!-- 🔥 NEW BUTTON -->
                <button onclick="resetAndRedistribute()" 
                class="bg-red-600 text-white px-4 py-2 rounded-xl">
                🔄 Reset Distribution
                </button>
            </div>

            <div class="bg-white p-4 rounded-xl">
                ${bookings.map(b=>`
                    <div class="border-b p-2">
                        ${b.clientName} - ${b.date}
                    </div>
                `).join('')}
            </div>

        </div>
    `;
    document.getElementById("bookingsTab").innerHTML = html;
}

/* ================= MSG ================= */
function showMsg(msg){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.remove("hidden");
    setTimeout(()=>t.classList.add("hidden"),2000);
}

</script>

</body>
</html>
