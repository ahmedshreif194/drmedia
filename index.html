<script>

try {

// ======================== البيانات الأساسية ========================
const USERS = [
    { username: 'ahmed', password: '1994', role: 'admin', name: 'مدير النظام' },
    { username: 'ahmed_emp', password: 'emp123', role: 'employee', employeeId: 'emp1', name: 'أحمد الموظف' }
];

let currentUser = null;
let companyName = 'Drmedia Pro Plus';
let companyLogo = '📷';

// متغيرات البيانات
let bookings = [];
let employees = [];
let halls = [];
let clients = [];
let equipmentInventory = {};
let attendanceRecords = [];
let payrollArchive = [];
let notifications = [];
let trashBin = [];

let browserNotifications = false;

// ======================== دوال التخزين (دعم Firebase + LocalStorage احتياطي) ========================
async function saveAllData() {
    try {
        if (useFirebase && db) {
            // حفظ كل مجموعة في Firestore
            const collections = { bookings, employees, halls, clients, attendanceRecords, payrollArchive, notifications, trashBin, equipmentInventory };
            for (const [colName, data] of Object.entries(collections)) {
                const colRef = db.collection(colName);
                const snapshot = await colRef.get();
                const batch = db.batch();
                snapshot.forEach(doc => batch.delete(doc.ref));
                if (Array.isArray(data)) {
                    data.forEach(item => {
                        const docRef = colRef.doc(item.id?.toString() || Date.now().toString());
                        batch.set(docRef, { ...item });
                    });
                } else if (typeof data === 'object') {
                    const docRef = colRef.doc('main');
                    batch.set(docRef, data);
                }
                await batch.commit();
            }
        }
    } catch(e) { console.warn("Firebase save error", e); }
    // دائماً نحفظ في localStorage كنسخة احتياطية
    const localData = { bookings, employees, halls, clients, equipmentInventory, attendanceRecords, payrollArchive, notifications, trashBin, companyName, companyLogo };
    localStorage.setItem('drmedia_data', JSON.stringify(localData));
}

async function loadAllData() {
    // محاولة التحميل من localStorage أولاً (أسرع)
    const raw = localStorage.getItem('drmedia_data');
    if (raw) {
        try {
            const data = JSON.parse(raw);
            bookings = data.bookings || [];
            employees = data.employees || [];
            halls = data.halls || [];
            clients = data.clients || [];
            equipmentInventory = data.equipmentInventory || {};
            attendanceRecords = data.attendanceRecords || [];
            payrollArchive = data.payrollArchive || [];
            notifications = data.notifications || [];
            trashBin = data.trashBin || [];
            companyName = data.companyName || companyName;
            companyLogo = data.companyLogo || companyLogo;
        } catch(e) { console.warn(e); }
    }
    // ثم محاولة التحميل من Firebase إن وجد
    if (useFirebase && db) {
        try {
            const snapshotBookings = await db.collection('bookings').get();
            if (!snapshotBookings.empty) bookings = snapshotBookings.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotEmployees = await db.collection('employees').get();
            if (!snapshotEmployees.empty) employees = snapshotEmployees.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotHalls = await db.collection('halls').get();
            if (!snapshotHalls.empty) halls = snapshotHalls.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotClients = await db.collection('clients').get();
            if (!snapshotClients.empty) clients = snapshotClients.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotAttendance = await db.collection('attendanceRecords').get();
            if (!snapshotAttendance.empty) attendanceRecords = snapshotAttendance.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotPayroll = await db.collection('payrollArchive').get();
            if (!snapshotPayroll.empty) payrollArchive = snapshotPayroll.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotNotif = await db.collection('notifications').get();
            if (!snapshotNotif.empty) notifications = snapshotNotif.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotTrash = await db.collection('trashBin').get();
            if (!snapshotTrash.empty) trashBin = snapshotTrash.docs.map(d => ({ id: d.id, ...d.data() }));
            const snapshotEq = await db.collection('equipmentInventory').doc('main').get();
            if (snapshotEq.exists) equipmentInventory = snapshotEq.data();
        } catch(e) { console.warn("Firebase load error", e); }
    }
    // التأكد من وجود بيانات افتراضية
    if (!halls.length) halls = [
        { id: 'h1', name: 'القاعة المغلقة', type: 'closed', active: true },
        { id: 'h2', name: 'القاعة المفتوحة', type: 'open', active: true },
        { id: 'h3', name: 'الكافيه', type: 'cafe', active: true }
    ];
    if (!employees.length) employees = [
        { id: 'emp1', name: 'أحمد علي', role: 'مخرج', phone: '01001234567', salaryPerOrder: 300, active: true, totalOrders: 0 },
        { id: 'emp2', name: 'محمود حسن', role: 'مصور', phone: '01002345678', salaryPerOrder: 200, active: true, totalOrders: 0 },
        { id: 'emp3', name: 'سامر خالد', role: 'كرين', phone: '01003456789', salaryPerOrder: 250, active: true, totalOrders: 0 }
    ];
    if (!bookings.length) bookings = [
        { id: 'b1', clientName: 'محمد عبدالله', phone: '01012345678', hallId: 'h1', hallName: 'القاعة المغلقة', date: new Date().toISOString().slice(0,10), price: 5000, status: 'pending', paymentStatus: 'pending', assignedEmployees: [] }
    ];
    if (!clients.length) clients = [{ id: 'c1', name: 'محمد عبدالله', phone: '01012345678', email: '' }];
    if (Object.keys(equipmentInventory).length === 0) equipmentInventory = { eq1: { name: 'كاميرا Sony A7', quantity: 3, minStock: 1, category: 'تصوير' } };
    updateEmployeeOrders();
    await saveAllData();
}

function updateEmployeeOrders() {
    const active = bookings.filter(b => b.status !== 'cancelled' && !b.deleted);
    employees.forEach(e => e.totalOrders = active.filter(b => (b.assignedEmployees || []).includes(e.id)).length);
}

// ======================== دوال مساعدة ========================
function showMsg(msg) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }
function closeModal() { document.getElementById('modal').classList.remove('show'); document.body.style.overflow = ''; }
function openModal(content) { document.getElementById('modalContent').innerHTML = content; document.getElementById('modal').classList.add('show'); document.body.style.overflow = 'auto'; }

function sendNotification(title, body) {
    if (browserNotifications && Notification.permission === 'granted') new Notification(title, { body });
    notifications.unshift({ id: Date.now().toString(), title, body, date: new Date().toLocaleString('ar-EG'), read: false });
    saveAllData();
}

// ======================== دوال الحضور والانصراف ========================
function getTodayDateStr() { return new Date().toISOString().slice(0,10); }

async function checkIn(empId) {
    const today = getTodayDateStr();
    const existing = attendanceRecords.find(a => a.empId === empId && a.date === today);
    if (existing && existing.checkIn) return showMsg('⚠️ تم تسجيل الحضور مسبقاً');
    const time = new Date().toLocaleTimeString('ar-EG');
    if (existing) {
        existing.checkIn = time;
        existing.status = 'present';
    } else {
        attendanceRecords.push({ id: Date.now().toString(), empId, date: today, checkIn: time, checkOut: null, status: 'present' });
    }
    await saveAllData();
    showMsg(`✅ تم تسجيل حضور الساعة ${time}`);
    renderAttendance();
}

async function checkOut(empId) {
    const today = getTodayDateStr();
    const rec = attendanceRecords.find(a => a.empId === empId && a.date === today);
    if (!rec || !rec.checkIn) return showMsg('⚠️ لم يتم تسجيل الحضور بعد');
    if (rec.checkOut) return showMsg('⚠️ تم تسجيل الانصراف مسبقاً');
    rec.checkOut = new Date().toLocaleTimeString('ar-EG');
    await saveAllData();
    showMsg(`✅ تم تسجيل انصراف الساعة ${rec.checkOut}`);
    renderAttendance();
}

// ======================== QR الموحد للمدير (مسح من الموظف) ========================
let html5QrCode = null;

function renderManagerQR() {
    const qrContainer = document.getElementById('attendanceQrContainer');
    if (!qrContainer) return;
    qrContainer.innerHTML = '';
    // نص QR ثابت يمكن للموظفين مسحه (متجدد يومياً لتجنب إعادة الاستخدام)
    const today = getTodayDateStr();
    const qrText = `DRMEDIA_ATT_${today}`;
    new QRCode(qrContainer, { text: qrText, width: 220, height: 220 });
    document.getElementById('qrCodeValue')?.setAttribute('data-qr-value', qrText);
}

// فتح كاميرا الموظف لمسح QR (تظهر فقط للموظف)
async function startEmployeeScan() {
    if (!currentUser || currentUser.role !== 'employee') {
        showMsg("هذه الخاصية للموظفين فقط");
        return;
    }
    openModal(`
        <h3 class="text-xl font-bold mb-4">📷 مسح رمز QR للحضور والانصراف</h3>
        <p class="mb-2 text-center text-gray-600">قم بتوجيه الكاميرا إلى رمز QR المعروض في لوحة المدير</p>
        <div id="qr-reader" style="width:100%"></div>
        <div class="mt-4 flex gap-2 justify-center">
            <button onclick="stopScannerAndClose()" class="bg-red-600 text-white px-4 py-2 rounded-xl">إغلاق</button>
        </div>
    `);
    const html5QrCodeNew = new Html5Qrcode("qr-reader");
    html5QrCode = html5QrCodeNew;
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
    try {
        await html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            if (decodedText && decodedText.startsWith("DRMEDIA_ATT_")) {
                const today = getTodayDateStr();
                if (decodedText === `DRMEDIA_ATT_${today}`) {
                    stopScannerAndClose();
                    showAttendanceChoiceForEmployee();
                } else {
                    showMsg("⚠️ رمز QR منتهي الصلاحية أو غير صالح. يرجى استخدام الرمز الحالي في لوحة المدير");
                    stopScannerAndClose();
                }
            } else {
                showMsg("رمز غير معروف للحضور");
            }
        }, (err) => { console.warn(err); });
    } catch(err) {
        showMsg("خطأ في تشغيل الكاميرا. تأكد من منح الإذن.");
        closeModal();
    }
}

function stopScannerAndClose() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => { closeModal(); html5QrCode = null; }).catch(()=>{ closeModal(); });
    } else closeModal();
}

function showAttendanceChoiceForEmployee() {
    if (!currentUser || currentUser.role !== 'employee') return;
    const emp = employees.find(e => e.id === currentUser.employeeId);
    if (!emp) return;
    openModal(`
        <h3 class="text-xl font-bold mb-4">تسجيل الحضور والانصراف</h3>
        <p class="mb-4">الموظف: <strong>${emp.name}</strong></p>
        <div class="flex gap-4 justify-center">
            <button onclick="performCheckInFromQR('${emp.id}')" class="btn-primary px-6 py-2 rounded-xl">✅ حضور</button>
            <button onclick="performCheckOutFromQR('${emp.id}')" class="bg-amber-600 text-white px-6 py-2 rounded-xl">🚪 انصراف</button>
        </div>
        <button onclick="closeModal()" class="mt-4 text-gray-500">إلغاء</button>
    `);
}

async function performCheckInFromQR(empId) { await checkIn(empId); closeModal(); renderAttendance(); if (currentUser.role === 'employee') renderEmployeeDashboard(); }
async function performCheckOutFromQR(empId) { await checkOut(empId); closeModal(); renderAttendance(); if (currentUser.role === 'employee') renderEmployeeDashboard(); }

// ======================== دوال الحجوزات والموظفين ========================
async function addBooking() {
    const name = prompt('اسم العميل'), hallId = prompt('معرف القاعة (h1/h2/h3)'), price = parseInt(prompt('السعر'));
    if (name && hallId && price) {
        const hall = halls.find(h => h.id === hallId);
        if (hall) {
            const newBooking = { id: 'b' + Date.now(), clientName: name, phone: '', hallId, hallName: hall.name, date: new Date().toISOString().slice(0,10), price, status: 'pending', paymentStatus: 'pending', assignedEmployees: [] };
            bookings.push(newBooking);
            await saveAllData();
            autoDistribute();
            renderBookings();
            showMsg('✅ تمت الإضافة');
            sendNotification('حجز جديد', `تم إضافة حجز لـ ${name}`);
        } else alert('قاعة غير موجودة');
    }
}

async function markComplete(id) {
    const b = bookings.find(x => x.id === id);
    if (b) { b.status = 'completed'; b.paymentStatus = 'paid'; await saveAllData(); renderBookings(); showMsg('✅ تم الإكمال'); }
}

async function deleteBooking(id) {
    const b = bookings.find(x => x.id === id);
    if (b && confirm('حذف الحجز؟')) {
        trashBin.push({ id: Date.now(), type: 'booking', data: b, deletedAt: new Date().toISOString() });
        bookings = bookings.filter(x => x.id !== id);
        await saveAllData();
        renderBookings();
        showMsg('🗑️ تم نقله إلى سلة المحذوفات');
    }
}

function autoDistribute() {
    const pending = bookings.filter(b=>b.status==='pending').sort((a,b)=>new Date(a.date)-new Date(b.date));
    const dirs = employees.filter(e=>e.role==='مخرج'&&e.active);
    const phs = employees.filter(e=>e.role==='مصور'&&e.active);
    const crs = employees.filter(e=>e.role==='كرين'&&e.active);
    let dirIndex=0, phIndex=0, crIndex=0;
    const daily = {};
    for(let b of pending){
        const date = b.date;
        if(!daily[date]) daily[date]={dirs:new Set(), phs:new Set(), crs:new Set()};
        const type = halls.find(h=>h.id===b.hallId)?.type||'closed';
        let assigned=[];
        if(type==='cafe'){
            if(phs.length){
                while(daily[date].phs.has(phs[phIndex%phs.length].id)) phIndex++;
                const ph = phs[phIndex%phs.length];
                assigned.push(ph.id);
                daily[date].phs.add(ph.id);
                phIndex++;
            }
        } else {
            if(dirs.length){
                while(daily[date].dirs.has(dirs[dirIndex%dirs.length].id)) dirIndex++;
                const dir = dirs[dirIndex%dirs.length];
                assigned.push(dir.id);
                daily[date].dirs.add(dir.id);
                dirIndex++;
            }
            if(phs.length){
                let added=0;
                for(let i=0;i<phs.length*2 && added<2;i++){
                    while(daily[date].phs.has(phs[phIndex%phs.length].id)) phIndex++;
                    const ph = phs[phIndex%phs.length];
                    if(!daily[date].phs.has(ph.id)){
                        assigned.push(ph.id);
                        daily[date].phs.add(ph.id);
                        added++;
                    }
                    phIndex++;
                }
            }
            if(crs.length){
                while(daily[date].crs.has(crs[crIndex%crs.length].id)) crIndex++;
                const cr = crs[crIndex%crs.length];
                assigned.push(cr.id);
                daily[date].crs.add(cr.id);
                crIndex++;
            }
        }
        b.assignedEmployees = assigned;
    }
    updateEmployeeOrders();
    saveAllData();
    showMsg('✅ تم التوزيع الذكي');
}

// ======================== دوال العرض ========================
function renderBookings() {
    const c = document.getElementById('bookings');
    if (!c) return;
    const filtered = bookings.filter(b => b.status !== 'cancelled');
    c.innerHTML = `<div class="bg-white p-4 rounded-2xl shadow">
        <div class="flex justify-between"><h2 class="text-xl font-bold">📅 الحجوزات (${filtered.length})</h2><button onclick="addBooking()" class="btn-primary">+ حجز</button></div>
        <table class="w-full mt-3"><thead><tr><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th><th>الحالة</th><th></th></tr></thead>
        <tbody>${filtered.map(b => `<tr><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price}</td><td><span class="status-badge ${b.status==='pending'?'status-pending':'status-completed'}">${b.status}</span></td>
        <td><button onclick="markComplete('${b.id}')" class="text-green-600"><i class="fas fa-check"></i></button> <button onclick="deleteBooking('${b.id}')" class="text-red-600"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table></div>`;
}

function renderEmployees() {
    const c = document.getElementById('employees');
    if (!c) return;
    updateEmployeeOrders();
    c.innerHTML = `<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">👥 الموظفين</h2>
        <table class="w-full"><thead><tr><th>الاسم</th><th>الدور</th><th>الهاتف</th><th>الأوردرات</th><th>المستحق</th></tr></thead>
        <tbody>${employees.map(e => `<tr><td>${e.name}</td><td>${e.role}</td><td>${e.phone}</td><td>${e.totalOrders}</td><td>${((e.totalOrders||0)*e.salaryPerOrder).toLocaleString()} ج.م</td></tr>`).join('')}</tbody></table>
        <button onclick="addEmployee()" class="btn-primary mt-2">+ موظف</button></div>`;
}

function addEmployee() {
    const n = prompt('الاسم'), r = prompt('الدور (مخرج/مصور/كرين)'), p = prompt('الهاتف');
    if (n && r) {
        employees.push({ id: 'emp'+Date.now(), name: n, role: r, phone: p, salaryPerOrder: r==='مخرج'?300:r==='مصور'?200:250, active: true, totalOrders: 0 });
        saveAllData();
        renderEmployees();
    }
}

// عرض الحضور (للمدير والموظف)
function renderAttendance() {
    const container = document.getElementById('attendance');
    if(!container) return;
    const isAdmin = currentUser?.role === 'admin';
    const emp = currentUser?.role === 'employee' ? employees.find(e=>e.id===currentUser.employeeId) : null;
    const myAttendance = emp ? attendanceRecords.filter(a=>a.empId===emp.id).sort((a,b)=>b.date.localeCompare(a.date)) : [];
    const todayRec = emp ? attendanceRecords.find(a=>a.empId===emp.id && a.date===getTodayDateStr()) : null;
    let adminQrHtml = '';
    if(isAdmin){
        adminQrHtml = `<div class="mb-6 p-4 border-2 border-emerald-200 rounded-2xl bg-emerald-50 text-center">
            <h3 class="font-bold text-lg">📱 رمز QR الموحد للحضور والانصراف</h3>
            <p>يمكن للموظفين مسح هذا الكود من هواتفهم لتسجيل الحضور أو الانصراف</p>
            <div id="attendanceQrContainer" class="flex justify-center my-3"></div>
            <button onclick="renderManagerQR()" class="btn-primary mt-2 text-sm">تحديث الرمز</button>
        </div>`;
    }
    container.innerHTML = `
        <div class="bg-white p-4 rounded-2xl shadow">
            <h2 class="text-xl font-bold mb-4">📋 الحضور والانصراف</h2>
            ${adminQrHtml}
            ${currentUser?.role === 'employee' ? `
                <div class="mb-4 p-3 border rounded-xl bg-blue-50 text-center">
                    <button onclick="startEmployeeScan()" class="btn-primary text-lg px-6 py-2"><i class="fas fa-camera ml-2"></i> مسح QR للحضور والانصراف</button>
                    <div class="mt-2 text-sm">حالة اليوم: ${todayRec ? (todayRec.checkOut ? '✅ تم الحضور والانصراف' : '🟢 تم الحضور فقط') : '❌ لم يتم التسجيل'}</div>
                </div>
            ` : ''}
            <h3 class="font-bold mt-3">سجل الحضور السابق</h3>
            <table class="w-full text-sm"><thead><tr><th>التاريخ</th><th>الحضور</th><th>الانصراف</th></tr></thead>
            <tbody>${(emp ? myAttendance : attendanceRecords.slice(0,10)).map(a=>`<tr><td>${a.date}</td><td>${a.checkIn||'-'}</td><td>${a.checkOut||'-'}</td></tr>`).join('')||'<tr><td colspan="3">لا توجد سجلات</td></tr>'}</tbody></table>
        </div>`;
    if(isAdmin && document.getElementById('attendanceQrContainer')) renderManagerQR();
}

function renderHalls() {

function renderClients() {

function addClient() {
    const n = prompt('الاسم'), p = prompt('الهاتف');
    if(n && p) { clients.push({ id:'c'+Date.now(), name:n, phone:p, email:'' }); saveAllData(); renderClients(); }

function renderEquipment() {
    const c = document.getElementById('equipment');
    if(!c) return;
    let html = '<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">📦 المعدات</h2><div class="grid grid-cols-2 gap-2">';
    for(let id in equipmentInventory) {
        const eq = equipmentInventory[id];
        html += `<div class="border p-2 rounded"><strong>${eq.name}</strong> (${eq.quantity}) <button onclick="adjustInventory('${id}',-1)" class="bg-gray-300 px-2 rounded">-</button> <button onclick="adjustInventory('${id}',1)" class="bg-gray-300 px-2 rounded">+</button></div>`;
    }
    html += `</div><button onclick="addEquipment()" class="btn-primary mt-2">+ معدة</button></div>`;
    c.innerHTML = html;
}

function addEquipment() {
    const n = prompt('الاسم'), q = parseInt(prompt('الكمية','1'));
    if(n && q) { const id='eq'+Date.now(); equipmentInventory[id]={name:n, quantity:q, minStock:1, category:'عام'}; saveAllData(); renderEquipment(); }
}
function adjustInventory(id,delta){ if(equipmentInventory[id]){ equipmentInventory[id].quantity += delta; saveAllData(); renderEquipment(); } }

function renderDistribution() {
    const c = document.getElementById('distribution');
    if(!c) return;
    c.innerHTML = `<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">⚙️ توزيع المهام</h2><button onclick="autoDistribute();renderDistribution();" class="btn-primary mb-3">توزيع ذكي</button>
    ${bookings.filter(b=>b.status==='pending').map(b=>`<div class="border p-2 mb-1"><strong>${b.clientName}</strong> - موظفون: ${(b.assignedEmployees||[]).map(id=>employees.find(e=>e.id===id)?.name).join(',') || 'غير معين'}</div>`).join('')}</div>`;
}

function renderCalendar() {
    document.getElementById('calendar').innerHTML = `<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">📆 التقويم</h2><div class="calendar-grid">${['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'].map(d=>`<div class="font-bold">${d}</div>`).join('')}</div></div>`;

function exportToExcel() {
    const ws = XLSX.utils.json_to_sheet(bookings.map(b=>({العميل:b.clientName,التاريخ:b.date,السعر:b.price})));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'الحجوزات');
    XLSX.writeFile(wb, `Drmedia_${new Date().toISOString().slice(0,10)}.xlsx`);
    showMsg('تم التصدير');
}

function renderReports() { document.getElementById('reports').innerHTML = `<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">📊 التقارير</h2><button onclick="exportToExcel()" class="btn-primary">تصدير Excel</button></div>`; }

function renderTrash() { const c=document.getElementById('trash'); if(!c)return; c.innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">🗑️ سلة المحذوفات</h2><p>${trashBin.length} عنصر محذوف</p></div>`; }
function renderNotifications() { const c=document.getElementById('notifications'); if(!c)return; c.innerHTML=`<div class="bg-white p-4 rounded-2xl shadow"><h2 class="text-xl font-bold">🔔 الإشعارات</h2>${notifications.map(n=>`<div class="border-b p-2">${n.title} - ${n.body}<br><span class="text-xs">${n.date}</span></div>`).join('')||'لا توجد إشعارات'}</div>`; }

function updateSettings() { companyName = document.getElementById('companyNameInput').value; saveAllData(); showMsg('تم حفظ الإعدادات'); renderAdminDashboard(); }

// ======================== واجهات المدير والموظف ========================
function renderAdminDashboard() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-gray-100"><header class="bg-white p-3 flex justify-between"><h1 class="text-xl font-bold">${companyLogo} ${companyName}</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header>
        <div class="flex overflow-x-auto border-b bg-white px-2">${['dashboard','bookings','employees','halls','clients','equipment','attendance','payroll','calendar','distribution','reports','advancedReports','trash','notifications','systemUpdate','settings'].map(t=>`<button data-tab="${t}" class="tab-btn px-4 py-2 rounded-t-lg">${t==='dashboard'?'📊 الرئيسية':t==='bookings'?'📅 الحجوزات':t==='employees'?'👥 الموظفين':t==='halls'?'🏛️ القاعات':t==='clients'?'👥 العملاء':t==='equipment'?'📦 المعدات':t==='attendance'?'📋 الحضور':t==='payroll'?'💰 المرتبات':t==='calendar'?'📆 التقويم':t==='distribution'?'⚙️ التوزيع':t==='reports'?'📊 التقارير':t==='advancedReports'?'📈 تقارير متقدمة':t==='trash'?'🗑️ سلة المحذوفات':t==='notifications'?'🔔 الإشعارات':t==='systemUpdate'?'🔄 تحديث النظام':'⚙️ الإعدادات'}</button>`).join('')}</div>
        <main class="p-4"><div id="dashboard" class="tab-pane"><div class="grid grid-cols-3 gap-4"><div class="stat-card">إجمالي الحجوزات: ${bookings.length}</div><div class="stat-card">الموظفين: ${employees.length}</div><div class="stat-card">القاعات: ${halls.length}</div></div></div>
        <div id="bookings" class="tab-pane hidden"></div><div id="employees" class="tab-pane hidden"></div><div id="halls" class="tab-pane hidden"></div><div id="clients" class="tab-pane hidden"></div><div id="equipment" class="tab-pane hidden"></div><div id="attendance" class="tab-pane hidden"></div><div id="payroll" class="tab-pane hidden"></div><div id="calendar" class="tab-pane hidden"></div><div id="distribution" class="tab-pane hidden"></div><div id="reports" class="tab-pane hidden"></div><div id="advancedReports" class="tab-pane hidden"></div><div id="trash" class="tab-pane hidden"></div><div id="notifications" class="tab-pane hidden"></div><div id="systemUpdate" class="tab-pane hidden"></div><div id="settings" class="tab-pane hidden"></div></main></div>`;
    document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{
        document.querySelectorAll('.tab-pane').forEach(p=>p.classList.add('hidden'));
        const tab=btn.dataset.tab;
        document.getElementById(tab).classList.remove('hidden');
        if(tab==='bookings') renderBookings(); if(tab==='employees') renderEmployees(); if(tab==='halls') renderHalls(); if(tab==='clients') renderClients(); if(tab==='equipment') renderEquipment(); if(tab==='attendance') renderAttendance(); if(tab==='payroll') renderPayroll(); if(tab==='calendar') renderCalendar(); if(tab==='distribution') renderDistribution(); if(tab==='reports') renderReports(); if(tab==='advancedReports') renderAdvancedReports(); if(tab==='trash') renderTrash(); if(tab==='notifications') renderNotifications(); if(tab==='systemUpdate') renderSystemUpdate(); if(tab==='settings') renderSettings();
    }));
    renderBookings(); renderEmployees(); renderHalls(); renderClients(); renderEquipment(); renderAttendance(); renderPayroll(); renderCalendar(); renderDistribution(); renderReports(); renderAdvancedReports(); renderTrash(); renderNotifications(); renderSystemUpdate(); renderSettings();
}

    const emp = employees.find(e=>e.id===currentUser.employeeId);

        <div class="min-h-screen bg-gray-100"><header class="bg-white p-3 flex justify-between"><h1 class="text-xl font-bold">${companyLogo} ${companyName}</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header>

        <div class="grid grid-cols-2 gap-3 mt-4"><div class="bg-gray-100 p-3 rounded text-center"><div class="text-2xl font-bold">${emp?.totalOrders}</div><div>الأوردرات</div></div><div class="bg-gray-100 p-3 rounded text-center"><div class="text-2xl font-bold text-emerald-600">${((emp?.totalOrders||0)*(emp?.salaryPerOrder||0)).toLocaleString()} ج.م</div><div>المستحق</div></div></div>

// ======================== شاشة تسجيل الدخول ========================
function renderLogin() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700 p-4">
            <div class="bg-white p-6 rounded-2xl w-full max-w-md text-center shadow-2xl">
                <h1 class="text-3xl font-bold text-emerald-700 mb-2">${companyLogo} ${companyName}</h1>
                <p class="text-gray-500 mb-6">نظام إدارة القاعات الذكي</p>
                <input type="text" id="loginUser" placeholder="اسم المستخدم" class="w-full border p-3 rounded-xl mb-3">
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full border p-3 rounded-xl mb-2">
                <button onclick="doLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">دخول</button>
                <div class="mt-4 text-sm text-gray-400"><p>المدير: <strong>ahmed</strong> / <strong>1994</strong></p><p>الموظف: <strong>ahmed_emp</strong> / <strong>emp123</strong></p></div>
            </div>
        </div>`;
}

function doLogin() {
    const un = document.getElementById('loginUser').value.trim();
    const pw = document.getElementById('loginPass').value;
    const user = USERS.find(u=>u.username===un && u.password===pw);
    if (user) {
        currentUser = user;
        sessionStorage.setItem('drmedia_user', JSON.stringify(user));
        if (user.role === 'admin') renderAdminDashboard();
        else renderEmployeeDashboard();
        showMsg(`مرحباً ${user.name}`);
        requestNotificationPermission();
    } else showMsg('❌ اسم المستخدم أو كلمة المرور غير صحيحة');
}

function logout() {
    sessionStorage.removeItem('drmedia_user');
    currentUser = null;
    renderLogin();
    showMsg('تم تسجيل الخروج');
}

function requestNotificationPermission() {
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
}

// ======================== بدء التطبيق ========================
window.onload = async () => {
    await loadAllData();
    const saved = sessionStorage.getItem('drmedia_user');
    if (saved && saved !== 'undefined') {
        try {
            currentUser = JSON.parse(saved);
            if (currentUser.role === 'admin') renderAdminDashboard();
            else renderEmployeeDashboard();
        } catch(e) { renderLogin(); }
    } else {
        renderLogin();
    }
    requestNotificationPermission();
};

window.startEmployeeScan = startEmployeeScan;

window.performCheckOutFromQR = performCheckOutFromQR;

window.checkOut = checkOut;

window.addClient = addClient;
window.adjustInventory = adjustInventory;
window.addEquipment = addEquipment;
window.autoDistribute = autoDistribute;
window.exportToExcel = exportToExcel;
window.updateSettings = updateSettings;
window.logout = logout;
window.closeModal = closeModal;
window.stopScannerAndClose = stopScannerAndClose;
</script>
