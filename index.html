<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Drmedia Pro - Production</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f4f6f8;margin:0}
.hidden{display:none}
#app{min-height:100vh}
.tab-btn{padding:10px;cursor:pointer}
.tab-btn.active{background:#10b981;color:white;border-radius:10px}
table{width:100%;border-collapse:collapse;background:white}
th,td{padding:8px;border-bottom:1px solid #eee}
.dashboard-card{background:white;padding:15px;border-radius:12px}
.stat-number{font-size:20px;font-weight:bold}
button{cursor:pointer}
</style>

</head>

<body>

<div id="app"></div>

<div id="modal" class="hidden" style="position:fixed;inset:0;background:#00000088">
<div id="modalContent" style="background:white;width:420px;margin:8% auto;padding:20px;border-radius:12px"></div>
</div>

<script>

// ================== DATA ==================
let bookings=[], employees=[], halls=[], users=[];
let currentUser=null;
let currentTab="dashboardTab";

// ================== STORAGE ==================
function saveAll(){
localStorage.setItem("bookings",JSON.stringify(bookings));
localStorage.setItem("employees",JSON.stringify(employees));
localStorage.setItem("halls",JSON.stringify(halls));
localStorage.setItem("users",JSON.stringify(users));
}

function loadAll(){
bookings=JSON.parse(localStorage.getItem("bookings")||"[]");
employees=JSON.parse(localStorage.getItem("employees")||"[]");
halls=JSON.parse(localStorage.getItem("halls")||"[]");
users=JSON.parse(localStorage.getItem("users")||"[]");
}

// ================== CORE ==================
function showMsg(m){alert(m);}
function closeModal(){document.getElementById("modal").classList.add("hidden");}

// ================== DASHBOARD ==================
function renderDashboard(){
let rev = bookings.reduce((s,b)=>s+(b.price||0),0);

document.getElementById("dashboardTab").innerHTML = `
<div class="dashboard-card">
<h2>📊 Dashboard</h2>
<p>الحجوزات: ${bookings.length}</p>
<p>الإيرادات: ${rev}</p>
<p>الموظفين: ${employees.length}</p>
</div>`;
}

// ================== BOOKINGS ==================
function renderBookings(){

let html=`<div class="p-4">
<h2>📅 الحجوزات</h2>
<button onclick="addBooking()">+ إضافة</button>

<table>
<tr><th>العميل</th><th>التاريخ</th><th>السعر</th><th></th></tr>
`;

bookings.forEach(b=>{
html+=`
<tr>
<td>${b.clientName}</td>
<td>${b.date}</td>
<td>${b.price}</td>
<td>
<button onclick="editBooking('${b.id}')">✏️</button>
<button onclick="delBooking('${b.id}')">🗑️</button>
</td>
</tr>`;
});

html+=`</table></div>`;

document.getElementById("bookingsTab").innerHTML=html;
}

function addBooking(){
document.getElementById("modalContent").innerHTML=`
<h3>حجز جديد</h3>
<input id="cname" placeholder="اسم العميل"><br><br>
<input id="date" type="date"><br><br>
<input id="price" placeholder="السعر"><br><br>
<button onclick="saveBooking()">حفظ</button>
`;
document.getElementById("modal").classList.remove("hidden");
}

function saveBooking(){
bookings.push({
id:Date.now().toString(),
clientName:document.getElementById("cname").value,
date:document.getElementById("date").value,
price:+document.getElementById("price").value
});
saveAll();
closeModal();
renderBookings();
renderDashboard();
}

function delBooking(id){
bookings=bookings.filter(b=>b.id!==id);
saveAll();
renderBookings();
renderDashboard();
}

// ================== EMPLOYEES ==================
function renderEmployees(){

let html=`<div class="p-4">
<h2>👥 الموظفين</h2>
<button onclick="addEmp()">+ موظف</button>

<table>
<tr><th>الاسم</th><th>الدور</th></tr>
`;

employees.forEach(e=>{
html+=`<tr><td>${e.name}</td><td>${e.role}</td></tr>`;
});

html+=`</table></div>`;

document.getElementById("employeesTab").innerHTML=html;
}

function addEmp(){
employees.push({
id:Date.now().toString(),
name:"موظف جديد",
role:"مصور"
});
saveAll();
renderEmployees();
renderDashboard();
}

// ================== LOGIN ==================
function showLogin(){
document.getElementById("app").innerHTML=`
<div style="text-align:center;padding-top:100px">
<h2>Drmedia Pro</h2>
<button onclick="login()">دخول</button>
</div>`;
}

function login(){
currentUser={username:"admin",role:"admin"};
renderApp();
}

// ================== APP ==================
function renderApp(){

document.getElementById("app").innerHTML=`
<div>

<div style="display:flex;gap:10px;padding:10px;background:#fff">
<button onclick="switchTab('dashboardTab')">Dashboard</button>
<button onclick="switchTab('bookingsTab')">Bookings</button>
<button onclick="switchTab('employeesTab')">Employees</button>
</div>

<div id="dashboardTab" class="tab-content"></div>
<div id="bookingsTab" class="tab-content hidden"></div>
<div id="employeesTab" class="tab-content hidden"></div>

</div>`;

renderDashboard();
renderBookings();
renderEmployees();

}

function switchTab(tab){

document.querySelectorAll(".tab-content").forEach(t=>t.classList.add("hidden"));
document.getElementById(tab).classList.remove("hidden");

}

// ================== INIT ==================
loadAll();
showLogin();

</script>

</body>
</html>
