<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Firebase Test</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
    <h1>Firebase Connection Test</h1>
    <button onclick="testSave()" style="padding:10px;margin:5px;">Save Test Data</button>
    <button onclick="testLoad()" style="padding:10px;margin:5px;">Load Data</button>
    <div id="result" style="margin-top:20px;padding:10px;border:1px solid #ccc;"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
            authDomain: "drmedia-vpms.firebaseapp.com",
            databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
            projectId: "drmedia-vpms",
            storageBucket: "drmedia-vpms.firebasestorage.app",
            messagingSenderId: "681162512380",
            appId: "1:681162512380:web:ab2482f3234d8b59fc4479"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        function testSave() {
            const testRef = db.ref('test/data');
            testRef.set({
                message: 'Save successful!',
                time: new Date().toLocaleString(),
                value: Math.random()
            }).then(() => {
                document.getElementById('result').innerHTML = '<p style="color:green">✅ SUCCESS: Data saved to Firebase!</p>';
            }).catch((error) => {
                document.getElementById('result').innerHTML = '<p style="color:red">❌ ERROR: ' + error.message + '</p>';
                console.error(error);
            });
        }
        
        function testLoad() {
            const testRef = db.ref('test/data');
            testRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('result').innerHTML = '<p style="color:blue">📦 Data loaded: ' + JSON.stringify(data) + '</p>';
                } else {
                    document.getElementById('result').innerHTML = '<p style="color:orange">⚠️ No data found. Click Save first.</p>';
                }
            }).catch((error) => {
                document.getElementById('result').innerHTML = '<p style="color:red">❌ ERROR: ' + error.message + '</p>';
            });
        }
    </script>
</body>
</html>
