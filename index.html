<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Media ERP SaaS v6 Ultimate | Ahmed Shreif</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-messaging-compat.js"></script>

<style>
body{font-family:Tahoma;background:#0b1220;color:#e5e7eb}
header{background:#0f172a;padding:12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0}
.container{max-width:1200px;margin:auto;padding:15px}
.card{background:#111827;border:1px solid #1f2937;padding:12px;border-radius:12px;margin-bottom:10px}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:10px;background:#0b1220;color:#fff;border:1px solid #374151}
button{padding:10px;border-radius:10px;cursor:pointer}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.badge{padding:3px 8px;border-radius:999px;background:#1f2937;font-size:12px}
</style>
</head>
<body>

<header>
<h3>Dr Media ERP SaaS v6</h3>
<div>Enterprise System by Ahmed Shreif</div>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login</h3>
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<button onclick="login()" style="background:#16a34a;color:#fff;width:100%">Login</button>
<button onclick="register()" style="background:#2563eb;color:#fff;width:100%;margin-top:5px">Register</button>
</div>

<!-- DASHBOARD -->
<div id="admin" style="display:none">

<div class="row">
<div class="card">Users <h2 id="userCount"></h2></div>
<div class="card">Orders <h2 id="orderCount"></h2></div>
<div class="card">Revenue <h2 id="income"></h2></div>
<div class="card">Notifications <h2 id="notifCount">0</h2></div>
</div>

<div class="card">
<h3>Add Order</h3>
<input id="client" placeholder="Client">
<input id="date" type="date">
<input id="price" placeholder="Price">
<select id="hall">
<option value="closed">Closed</option>
<option value="open">Open</option>
<option value="cafe">Cafe</option>
</select>
<button onclick="addOrder()" style="background:#2563eb;color:#fff;width:100%">Add</button>
</div>

<div class="card">
<h3>Orders</h3>
<div id="orders"></div>
</div>

<div class="card">
<h3>System Notifications</h3>
<div id="notifications"></div>
</div>

</div>

</div>

<script>

// FIREBASE
const firebaseConfig={
apiKey:"AIzaSyApb4Nl_ktkVCkuz7DsT9uhmQ",
authDomain:"drmedia-vpms.firebaseapp.com",
databaseURL:"https://drmedia-vpms-default-rtdb.firebaseio.com",
projectId:"drmedia-vpms"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const auth=firebase.auth();
const messaging=firebase.messaging();

// STATE
let orders=[];
let notifications=[];
let currentUser=null;

// ROLES SYSTEM (EXPANDABLE)
function role(){
if(!currentUser) return "guest";
if(currentUser.email=="admin@drmedia.com") return "admin";
return "employee";
}

// LOGIC AUDIT
function notify(msg){
let n={msg,time:new Date().toLocaleString()};
notifications.unshift(n);
db.ref("notifications").set(notifications);
}

// AUTH
function register(){
let email=email.value;
let pass=pass.value;
auth.createUserWithEmailAndPassword(email,pass).then(()=>notify("New User Registered"));
}

function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;
auth.signInWithEmailAndPassword(email,pass)
.then(u=>{currentUser=u.user;load();notify("Login Success");});
}

// ORDERS
function addOrder(){
let o={
id:Date.now(),
client:client.value,
date:date.value,
price:+price.value,
hall:hall.value,
createdBy:currentUser.email
};
orders.push(o);
db.ref("orders").set(orders);
notify("Order Added by " + currentUser.email);
render();
}

// PUSH (FCM READY)
function sendPush(title,body){
console.log("FCM PUSH:",title,body);
notify(title+" - "+body);
}

// LOAD REALTIME
function load(){
db.ref("orders").on("value",s=>{orders=[];s.forEach(x=>orders.push(x.val()));render();});
db.ref("notifications").on("value",s=>{notifications=[];s.forEach(x=>notifications.push(x.val()));render();});
}

// RENDER
function render(){
if(role()=="admin"){
userCount.innerText="1+";
orderCount.innerText=orders.length;
income.innerText=orders.reduce((s,o)=>s+o.price,0);
notifCount.innerText=notifications.length;

ordersHTML=orders.map(o=>`<div class='card'>${o.client} - ${o.price} - ${o.hall}</div>`).join("");
document.getElementById("orders").innerHTML=ordersHTML;

document.getElementById("notifications").innerHTML=notifications.map(n=>`<div class='card'>${n.msg} | ${n.time}</div>`).join("");
}
}

// AUTH STATE
auth.onAuthStateChanged(u=>{
if(u){currentUser=u;loginBox.style.display="none";admin.style.display="block";load();}
});

</script>

</body>
</html>
