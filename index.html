<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Drmedia Pro Plus – النظام المتكامل مع جميع الميزات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background 0.3s, color 0.3s; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 40px; z-index: 10000; display: none; white-space: nowrap; }
        .toast.show { display: block; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1100; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content { background: white; border-radius: 24px; max-width: 650px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 24px; }
        .dark .modal-content { background: #1e293b; color: #f1f5f9; }
        input, select, textarea { border: 1px solid #cbd5e1; border-radius: 12px; padding: 8px 12px; width: 100%; margin-bottom: 12px; background: white; }
        button { cursor: pointer; transition: 0.2s; }
        .tab-btn { padding: 8px 16px; border-radius: 12px 12px 0 0; font-weight: 600; background: transparent; }
        .tab-btn.active { background-color: #16a34a; color: white; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .btn-primary { background-color: #16a34a; color: white; padding: 8px 16px; border-radius: 12px; border: none; cursor: pointer; }
        .btn-primary:hover { background-color: #15803d; }
        footer { background: #1f2937; color: #9ca3af; text-align: center; padding: 12px; font-size: 0.8rem; margin-top: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; }
        .calendar-day { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 8px; text-align: center; cursor: pointer; }
        .calendar-day.booked { background: #d1fae5; }
        .notification-item { border-bottom: 1px solid #e5e7eb; padding: 12px; cursor: pointer; }
        .notification-item.unread { background: #f0fdf4; border-right: 3px solid #16a34a; }
        .attendance-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; background: #d1fae5; color: #065f46; }
        .theme-preview { width: 30px; height: 30px; border-radius: 50%; display: inline-block; margin: 0 4px; cursor: pointer; border: 2px solid transparent; }
        .theme-preview.selected { border-color: white; box-shadow: 0 0 0 2px #16a34a; }
        .payroll-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .dark .payroll-card { background: #1e293b; }
        .hidden { display: none; }
        .stat-card { transition: transform 0.2s; cursor: pointer; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>
<div id="app"></div>

<script>
// ======================== إعداد Firebase (تم بالفعل) ========================
const firebaseConfig = {
  apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ",
  authDomain: "drmedia-vpms.firebaseapp.com",
  databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com",
  projectId: "drmedia-vpms",
  storageBucket: "drmedia-vpms.firebasestorage.app",
  messagingSenderId: "681162512380",
  appId: "1:681162512380:web:ab2482f3234d8b59fc4479"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// ======================== البيانات الأساسية ========================
let users = [
    { uid: 'admin1', username: 'ahmed', password: '1994', role: 'admin', name: 'مدير النظام', email: 'admin@drmedia.com', permissions: ['all'] },
    { uid: 'emp1', username: 'ahmed_emp', password: 'emp123', role: 'employee', employeeId: 'emp1', name: 'أحمد علي', email: 'ahmed@example.com', permissions: ['view_own_bookings', 'attendance'] }
];
let bookings = [], employees = [], halls = [], clients = [], equipmentInventory = {}, attendanceRecords = [], swapRequests = [], payrollArchive = [], employeeLoans = [], notifications = [], trashBin = [];
let currentUser = null, currentTab = 'dashboard';
let companyName = 'Drmedia Pro Plus', companyLogo = '📷', whatsappNumber = '201000000000';
let themeSettings = { darkMode: false, themeColor: 'green', customBg: '#f0fdf4' };
let selectedBookings = new Set(), selectedEmployees = new Set(), selectedClients = new Set(), selectedEquipment = new Set(), selectedUsers = new Set(), selectedHalls = new Set();
let browserNotifications = false;
let calendarYear = new Date().getFullYear(), calendarMonth = new Date().getMonth();
let charts = {};
let paymentMethods = { fawry: true, paymob: true, vodafoneCash: true };

// صلاحيات المستخدمين (RBAC)
const permissions = {
    admin: ['all'],
    manager: ['view_bookings', 'add_booking', 'edit_booking', 'delete_booking', 'view_employees', 'view_reports', 'view_payroll', 'view_attendance'],
    employee: ['view_own_bookings', 'attendance', 'view_own_payroll'],
    viewer: ['view_bookings', 'view_reports']
};

function hasPermission(permission) {
    if (!currentUser) return false;
    const userRole = currentUser.role;
    if (userRole === 'admin') return true;
    const userPerms = permissions[userRole] || [];
    return userPerms.includes('all') || userPerms.includes(permission);
}

// ======================== دوال مساعدة ========================
function showMsg(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}
function closeModal() { document.getElementById('modal').classList.remove('show'); document.body.style.overflow = ''; }
function openModal(content) { document.getElementById('modalContent').innerHTML = content; document.getElementById('modal').classList.add('show'); document.body.style.overflow = 'hidden'; }
function saveAllData() {
    const data = { bookings, employees, halls, clients, equipmentInventory, attendanceRecords, swapRequests, payrollArchive, employeeLoans, notifications, trashBin, users, companyName, companyLogo, whatsappNumber, themeSettings };
    localStorage.setItem('drmedia_data', JSON.stringify(data));
    // Sync to Firebase
    db.ref('data').set(data).catch(console.warn);
}
function loadAllData() {
    const raw = localStorage.getItem('drmedia_data');
    if (raw) {
        try {
            const data = JSON.parse(raw);
            bookings = data.bookings || []; employees = data.employees || []; halls = data.halls || []; clients = data.clients || [];
            equipmentInventory = data.equipmentInventory || {}; attendanceRecords = data.attendanceRecords || [];
            swapRequests = data.swapRequests || []; payrollArchive = data.payrollArchive || []; employeeLoans = data.employeeLoans || []; notifications = data.notifications || [];
            trashBin = data.trashBin || [];
            users = data.users || users;
            companyName = data.companyName || companyName;
            companyLogo = data.companyLogo || companyLogo;
            whatsappNumber = data.whatsappNumber || whatsappNumber;
            themeSettings = data.themeSettings || themeSettings;
        } catch(e) { console.warn(e); }
    }
    if (!halls.length) {
        halls = [
            { id: 'h1', name: 'القاعة المغلقة', type: 'closed', active: true },
            { id: 'h2', name: 'القاعة المفتوحة', type: 'open', active: true },
            { id: 'h3', name: 'الكافيه', type: 'cafe', active: true }
        ];
    }
    if (!employees.length) {
        employees = [
            { id: 'emp1', name: 'أحمد علي', role: 'مخرج', phone: '01001234567', salaryPerOrder: 300, active: true, totalOrders: 0, email: 'ahmed@example.com' },
            { id: 'emp2', name: 'محمود حسن', role: 'مصور', phone: '01002345678', salaryPerOrder: 200, active: true, totalOrders: 0, email: 'mahmoud@example.com' },
            { id: 'emp3', name: 'سامر خالد', role: 'كرين', phone: '01003456789', salaryPerOrder: 250, active: true, totalOrders: 0, email: 'samer@example.com' }
        ];
    }
    if (!bookings.length) {
        bookings = [
            { id: 'b1', clientName: 'محمد عبدالله', phone: '01012345678', hallId: 'h1', hallName: 'القاعة المغلقة', date: new Date().toISOString().slice(0,10), price: 5000, status: 'pending', paymentStatus: 'pending', assignedEmployees: [], deleted: false }
        ];
    }
    if (!clients.length) clients = [{ id: 'c1', name: 'محمد عبدالله', phone: '01012345678', email: 'mohamed@example.com' }];
    if (Object.keys(equipmentInventory).length === 0) equipmentInventory = { eq1: { name: 'كاميرا Sony A7', quantity: 3, minStock: 1, category: 'تصوير' } };
    updateEmployeeOrders();
    saveAllData();
    applyTheme();
}
function updateEmployeeOrders() {
    const active = bookings.filter(b => b.status !== 'cancelled' && !b.deleted);
    employees.forEach(e => e.totalOrders = active.filter(b => (b.assignedEmployees || []).includes(e.id)).length);
}
function getEmployeeOrdersInPeriod(empId, start, end) {
    return bookings.filter(b => b.status !== 'cancelled' && !b.deleted && (b.assignedEmployees || []).includes(empId) && new Date(b.date) >= start && new Date(b.date) <= end).length;
}
function applyTheme() {
    if (themeSettings.darkMode) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
    document.body.classList.remove('theme-green', 'theme-blue', 'theme-purple', 'theme-orange', 'theme-pink');
    document.body.classList.add(`theme-${themeSettings.themeColor}`);
    const colors = { green:'#16a34a', blue:'#2563eb', purple:'#9333ea', orange:'#ea580c', pink:'#db2777' };
    document.documentElement.style.setProperty('--primary', colors[themeSettings.themeColor]);
    document.body.style.backgroundColor = themeSettings.customBg;
}
function setThemeColor(color) { themeSettings.themeColor = color; saveAllData(); applyTheme(); showMsg(`الثيم: ${color}`); }
function toggleDarkMode() { themeSettings.darkMode = !themeSettings.darkMode; saveAllData(); applyTheme(); showMsg(themeSettings.darkMode ? 'داكن' : 'فاتح'); }
function setCustomBgColor(color) { themeSettings.customBg = color; saveAllData(); applyTheme(); showMsg('تم تغيير لون الخلفية'); }
function handleLogoUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { companyLogo = ev.target.result; saveAllData(); renderSettings(); showMsg('✅ تم رفع الشعار'); if(currentUser?.role==='admin' && document.querySelector('header h1')) document.querySelector('header h1').innerHTML = (companyLogo.startsWith('data:image')?`<img src="${companyLogo}" class="w-8 h-8 inline-block rounded-full ml-2">`:companyLogo)+` ${companyName}`; };
    reader.readAsDataURL(file);
}
function requestNotificationPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'granted') browserNotifications = true;
    else if (Notification.permission !== 'denied') Notification.requestPermission().then(perm => { browserNotifications = (perm === 'granted'); if(browserNotifications) showMsg('✅ تم تفعيل الإشعارات'); });
}
function sendNotification(title, body, tag = 'general') {
    if (browserNotifications && Notification.permission === 'granted') { try { new Notification(title, { body, icon: '🔔', tag }); } catch(e) {} }
    notifications.unshift({ id: Date.now(), title, body, date: new Date().toLocaleString('ar-EG'), read: false, userId: currentUser?.employeeId || 'admin' });
    saveAllData();
}
function sendWhatsAppNotification(phone, message) {
    if (!phone) return;
    let clean = phone.replace(/[^0-9+]/g, '');
    if (clean.startsWith('0')) clean = '2' + clean;
    if (!clean.startsWith('+')) clean = '+' + clean;
    window.open(`https://wa.me/${clean}?text=${encodeURIComponent(message)}`, '_blank');
}
function sendEmailNotification(email, subject, body) {
    if (!email) return;
    window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}
function sendEmployeeNotification(emp, title, message) {
    sendNotification(title, message);
    if (emp.phone && whatsappNumber) sendWhatsAppNotification(emp.phone, message);
    if (emp.email) sendEmailNotification(emp.email, title, message);
}

// ======================== سلة المحذوفات (Trash) ========================
function moveToTrash(item, type) {
    trashBin.push({ id: Date.now(), type, data: item, deletedAt: new Date().toISOString() });
    saveAllData();
    showMsg(`تم نقل ${type} إلى سلة المحذوفات`);
}
function restoreFromTrash(trashId) {
    const index = trashBin.findIndex(t => t.id === trashId);
    if (index !== -1) {
        const item = trashBin[index].data;
        const type = trashBin[index].type;
        if (type === 'booking') bookings.push(item);
        else if (type === 'employee') employees.push(item);
        else if (type === 'client') clients.push(item);
        // إضافة باقي الأنواع حسب الحاجة
        trashBin.splice(index, 1);
        saveAllData();
        showMsg('تم الاستعادة بنجاح');
        renderTrash();
    }
}
function permanentDelete(trashId) {
    if (confirm('حذف نهائي؟ لا يمكن التراجع')) {
        trashBin = trashBin.filter(t => t.id !== trashId);
        saveAllData();
        renderTrash();
        showMsg('تم الحذف النهائي');
    }
}
function renderTrash() {
    const container = document.getElementById('trash');
    if (!container) return;
    if (trashBin.length === 0) {
        container.innerHTML = `<div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow"><p class="text-center text-gray-500">سلة المحذوفات فارغة</p></div>`;
        return;
    }
    container.innerHTML = `<div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">🗑️ سلة المحذوفات</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>النوع</th><th>البيانات</th><th>تاريخ الحذف</th><th>الإجراءات</th></tr></thead><tbody>${trashBin.map(t => `<tr><td class="p-2">${t.type}</td><td class="p-2">${JSON.stringify(t.data).substring(0, 50)}...</td><td class="p-2">${new Date(t.deletedAt).toLocaleString()}</td><td class="p-2"><button onclick="restoreFromTrash(${t.id})" class="text-green-600 ml-2">استعادة</button><button onclick="permanentDelete(${t.id})" class="text-red-600">حذف نهائي</button></td></tr>`).join('')}</tbody></table></div></div>`;
}

// ======================== تنبيهات المواعيد القادمة ========================
function checkUpcomingAppointments() {
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(today.getDate() + 1);
    const upcoming = bookings.filter(b => new Date(b.date) >= today && new Date(b.date) <= tomorrow && b.status === 'pending' && !b.deleted);
    if (upcoming.length > 0) {
        sendNotification(`📅 لديك ${upcoming.length} مواعيد غداً`, 'يرجى مراجعة الحجوزات القادمة', 'reminder');
        if (currentUser?.role === 'admin') {
            employees.forEach(emp => {
                if (emp.email) sendEmailNotification(emp.email, 'تذكير بمواعيد غداً', `لديك ${upcoming.filter(b => (b.assignedEmployees || []).includes(emp.id)).length} أوردرات غداً`);
            });
        }
    }
}
setInterval(checkUpcomingAppointments, 3600000); // كل ساعة

// ======================== تقارير متقدمة ========================
function renderAdvancedReports() {
    const container = document.getElementById('advancedReports');
    if (!container) return;
    const totalRevenue = bookings.filter(b => !b.deleted).reduce((s,b)=>s+b.price,0);
    const monthlyData = {};
    bookings.forEach(b => {
        if (!b.deleted) {
            const month = b.date.slice(0,7);
            monthlyData[month] = (monthlyData[month] || 0) + b.price;
        }
    });
    container.innerHTML = `<div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow"><h2 class="text-xl font-bold mb-4">📈 تقارير متقدمة</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><canvas id="revenueTrend" height="200"></canvas><canvas id="bookingStatusChart" height="200"></canvas></div><div class="mt-4"><button onclick="exportPDFReport()" class="btn-primary">📄 تصدير تقرير PDF</button><button onclick="exportToExcel()" class="btn-primary mr-2">📊 تصدير Excel</button></div><div class="mt-4"><h3 class="font-bold">الإيرادات الشهرية</h3><ul>${Object.entries(monthlyData).map(([m,amt])=>`<li>${m}: ${amt.toLocaleString()} ج.م</li>`).join('')}</ul></div></div>`;
    setTimeout(() => {
        const ctx1 = document.getElementById('revenueTrend')?.getContext('2d');
        const ctx2 = document.getElementById('bookingStatusChart')?.getContext('2d');
        if (ctx1) {
            new Chart(ctx1, { type: 'line', data: { labels: Object.keys(monthlyData), datasets: [{ label: 'الإيرادات', data: Object.values(monthlyData), borderColor: '#16a34a' }] } });
        }
        if (ctx2) {
            const statusCount = { pending: bookings.filter(b=>b.status==='pending' && !b.deleted).length, completed: bookings.filter(b=>b.status==='completed' && !b.deleted).length };
            new Chart(ctx2, { type: 'doughnut', data: { labels: ['معلق', 'مكتمل'], datasets: [{ data: [statusCount.pending, statusCount.completed], backgroundColor: ['#f59e0b', '#10b981'] }] } });
        }
    }, 100);
}
function exportPDFReport() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text(`تقرير Drmedia Pro Plus - ${new Date().toLocaleDateString('ar-EG')}`, 10, 10);
    let y = 20;
    bookings.filter(b => !b.deleted).forEach(b => {
        doc.text(`${b.clientName} - ${b.date} - ${b.price} ج.م`, 10, y);
        y += 10;
        if (y > 280) { doc.addPage(); y = 20; }
    });
    doc.save(`report_${new Date().toISOString().slice(0,10)}.pdf`);
    showMsg('✅ تم تصدير PDF');
}

// ======================== الدفع الإلكتروني (محاكاة) ========================
function showPaymentModal(bookingId) {
    const booking = bookings.find(b => b.id === bookingId);
    if (!booking) return;
    openModal(`
        <h3 class="text-xl font-bold mb-4">💳 الدفع الإلكتروني</h3>
        <p>العميل: ${booking.clientName}</p>
        <p>المبلغ: ${booking.price} ج.م</p>
        <div class="mt-4"><label>اختر طريقة الدفع:</label><select id="paymentMethod" class="w-full"><option value="fawry">Fawry</option><option value="paymob">Paymob</option><option value="vodafone">فودافون كاش</option></select></div>
        <button onclick="processPayment('${bookingId}')" class="btn-primary w-full mt-3">دفع الآن</button>
        <div class="text-xs text-gray-400 mt-2">ملاحظة: هذه محاكاة للدفع الإلكتروني</div>
    `);
}
function processPayment(bookingId) {
    const booking = bookings.find(b => b.id === bookingId);
    if (booking) {
        booking.paymentStatus = 'paid';
        saveAllData();
        closeModal();
        showMsg('✅ تم الدفع بنجاح (تجريبي)');
        sendNotification('دفع إلكتروني', `تم دفع حجز ${booking.clientName} بقيمة ${booking.price} ج.م`);
        renderBookings();
    }
}

// ======================== إضافة صلاحيات متعددة للمستخدمين (RBAC) ========================
function renderUserPermissions() {
    if (!hasPermission('manage_users')) return showMsg('غير مصرح لك');
    openModal(`
        <h3 class="text-xl font-bold mb-4">🔐 إدارة الصلاحيات</h3>
        <select id="permUserSelect">${users.map(u => `<option value="${u.uid}">${u.username}</option>`).join('')}</select>
        <div class="mt-3">${Object.keys(permissions).map(role => `<label><input type="radio" name="role" value="${role}"> ${role}</label><br>`).join('')}</div>
        <button onclick="updateUserRole()" class="btn-primary w-full mt-3">حفظ الصلاحية</button>
    `);
}
function updateUserRole() {
    const uid = document.getElementById('permUserSelect').value;
    const newRole = document.querySelector('input[name="role"]:checked').value;
    const user = users.find(u => u.uid === uid);
    if (user) {
        user.role = newRole;
        saveAllData();
        closeModal();
        showMsg('✅ تم تحديث الصلاحيات');
        renderUsers();
    }
}

// ======================== إضافة إحصائيات على الشاشة الرئيسية ========================
function renderDashboardStats() {
    const totalBookings = bookings.filter(b => !b.deleted).length;
    const totalRevenue = bookings.filter(b => !b.deleted).reduce((s,b)=>s+b.price,0);
    const activeEmployees = employees.filter(e => e.active).length;
    const completionRate = totalBookings ? (bookings.filter(b => b.status === 'completed' && !b.deleted).length / totalBookings * 100).toFixed(1) : 0;
    document.getElementById('dashboardStats').innerHTML = `
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="stat-card bg-white dark:bg-gray-800 p-5 rounded-2xl shadow text-center"><i class="fas fa-calendar-alt text-primary text-3xl"></i><div class="text-2xl font-bold mt-2">${totalBookings}</div><div>إجمالي الحجوزات</div></div>
            <div class="stat-card bg-white dark:bg-gray-800 p-5 rounded-2xl shadow text-center"><i class="fas fa-chart-line text-primary text-3xl"></i><div class="text-2xl font-bold mt-2">${totalRevenue.toLocaleString()} ج.م</div><div>الإيرادات</div></div>

        </div>
    `;
}

// ======================== دوال الحجوزات (مع دعم السلة) ========================
function deleteBooking(id) {
    const b = bookings.find(x => x.id === id);
    if (b && confirm('حذف الحجز؟')) {
        moveToTrash(b, 'booking');
        bookings = bookings.filter(b => b.id !== id);
        saveAllData();
        renderBookings();
        showMsg('🗑️ تم نقل الحجز إلى سلة المحذوفات');
    }
}

        loadAllData();
        const savedUser = sessionStorage.getItem('drmedia_user');
        if (savedUser && savedUser !== 'undefined') {
            try {
                currentUser = JSON.parse(savedUser);
                if (currentUser.role === 'admin') renderAdminDashboard();
                else renderEmployeeDashboard();
                requestNotificationPermission();
                checkUpcomingAppointments();
            } catch(e) { renderLogin(); }
        } else {
            renderLogin();
        }
    } catch (e) {
        console.error("Startup Error:", e);
        document.getElementById('app').innerHTML = "<h2 style='color:red;text-align:center;margin-top:50px'>⚠️ حصل خطأ في تشغيل النظام</h2>";
    }
};
