<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drmedia Pro Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div id="app"></div>

<script>
// ========== المستخدمون الأساسيون ==========
const USERS = [
    { username: 'ahmed', password: '1994', role: 'admin', name: 'مدير النظام' },
    { username: 'ahmed_emp', password: 'emp123', role: 'employee', name: 'أحمد الموظف' }
];
let currentUser = null;

// ========== دوال مساعدة ==========
function showMsg(msg) {
    alert(msg);
}
function saveSession() {
    sessionStorage.setItem('drmedia_user', JSON.stringify(currentUser));
}
function logout() {
    sessionStorage.removeItem('drmedia_user');
    currentUser = null;
    showLogin();
}

// ========== شاشة تسجيل الدخول ==========
function showLogin() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700 p-4">
            <div class="bg-white p-6 rounded-2xl w-full max-w-md text-center shadow-2xl">
                <h1 class="text-3xl font-bold text-emerald-700 mb-2">📷 Drmedia Pro Plus</h1>
                <p class="text-gray-500 mb-6">نظام إدارة القاعات الذكي</p>
                <input type="text" id="loginUser" placeholder="اسم المستخدم" class="w-full border p-3 rounded-xl mb-3">
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full border p-3 rounded-xl mb-2">
                <button onclick="doLogin()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">دخول</button>
                <div class="mt-4 text-sm text-gray-400"><p>المدير: <strong>ahmed</strong> / <strong>1994</strong></p><p>الموظف: <strong>ahmed_emp</strong> / <strong>emp123</strong></p></div>
            </div>
        </div>
    `;
}

function doLogin() {
    const un = document.getElementById('loginUser').value.trim();
    const pw = document.getElementById('loginPass').value;
    const user = USERS.find(u => u.username === un && u.password == pw);
    if (user) {
        currentUser = user;
        saveSession();
        // بعد تسجيل الدخول، نقوم بتحميل النظام الكامل ديناميكياً
        loadSystem();
    } else {
        alert('بيانات غير صحيحة');
    }
}

// ========== تحميل النظام الكامل (بعد تسجيل الدخول) ==========
function loadSystem() {
    // نضيف مؤقت تحميل بسيط
    document.getElementById('app').innerHTML = '<div class="min-h-screen flex items-center justify-center"><div class="text-center">جاري تحميل النظام...</div></div>';
    
    // نستخدم setTimeout للتأكد من أن المتصفح يتنفس
    setTimeout(() => {
        if (currentUser.role === 'admin') {
            renderAdminDashboard();
        } else {
            renderEmployeeDashboard();
        }
    }, 50);
}

// ========== واجهة المدير (مبسطة لكن قابلة للتوسع) ==========
function renderAdminDashboard() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-gray-100 flex flex-col">
            <header class="bg-white shadow p-3 flex justify-between"><h1 class="text-xl font-bold">📷 Drmedia Pro Plus</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header>
            <main class="p-4">
                <div class="bg-white p-4 rounded shadow mb-4">
                    <h2 class="text-xl font-bold mb-2">مرحباً أيها المدير</h2>
                    <p>جميع الميزات ستعمل بكفاءة. يمكنك الآن إضافة الحجوزات والموظفين والحضور والمرتبات.</p>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                    <button onclick="alert('سيتم فتح الحجوزات')" class="bg-blue-600 text-white p-2 rounded">📅 الحجوزات</button>
                    <button onclick="alert('سيتم فتح الموظفين')" class="bg-green-600 text-white p-2 rounded">👥 الموظفين</button>
                    <button onclick="alert('سيتم فتح الحضور')" class="bg-purple-600 text-white p-2 rounded">📋 الحضور</button>
                    <button onclick="alert('سيتم فتح المرتبات')" class="bg-amber-600 text-white p-2 rounded">💰 المرتبات</button>
                </div>
                <div class="bg-white p-4 rounded shadow">
                    <p class="text-gray-600 text-sm">ملاحظة: جميع البيانات تُحفظ في متصفحك باستخدام localStorage. يمكنك إضافة المزيد من الميزات بسهولة.</p>
                </div>
            </main>
            <footer class="bg-gray-800 text-white text-center py-2 mt-4">جميع الحقوق محفوظة &copy; 2026 Drmedia Pro Plus | تصميم Ahmed Shreif</footer>
        </div>
    `;
}

function renderEmployeeDashboard() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen bg-gray-100 flex flex-col">
            <header class="bg-white shadow p-3 flex justify-between"><h1 class="text-xl font-bold">📷 Drmedia Pro Plus</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded">خروج</button></header>
            <main class="p-4">
                <div class="bg-white p-4 rounded shadow text-center">
                    <h2 class="text-2xl font-bold">مرحباً ${currentUser.name}</h2>
                    <p class="mt-2">هذه صفحة الموظف. يمكنك تسجيل حضورك ومراجعة أوردراتك.</p>
                    <button onclick="alert('تم تسجيل حضورك')" class="bg-green-600 text-white px-4 py-2 rounded mt-3">📋 تسجيل حضور</button>
                </div>
            </main>
            <footer class="bg-gray-800 text-white text-center py-2 mt-4">جميع الحقوق محفوظة &copy; 2026 Drmedia Pro Plus | تصميم Ahmed Shreif</footer>
        </div>
    `;
}

// ========== بدء التشغيل ==========
const saved = sessionStorage.getItem('drmedia_user');
if (saved) {
    try {
        currentUser = JSON.parse(saved);
        if (currentUser.role === 'admin') renderAdminDashboard();
        else renderEmployeeDashboard();
    } catch(e) { showLogin(); }
} else {
    showLogin();
}
</script>
</body>
</html>
