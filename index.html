<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Drmedia Pro | نظام إدارة متكامل</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',sans-serif;background:#f0fdf4;}
    .tab-btn{cursor:pointer;padding:8px 12px;border-radius:16px 16px 0 0;display:inline-block;background:#e5e7eb;margin-left:4px;font-size:14px;}
    .tab-btn.active{background:#065f46;color:white;}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:8px 16px;border-radius:40px;z-index:1000;font-size:14px;}
    .dashboard-card{background:white;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.1);text-align:center;}
    .stat-number{font-size:28px;font-weight:bold;color:#065f46;}
    table{width:100%;border-collapse:collapse;}
    th,td{border:1px solid #e5e7eb;padding:6px;text-align:right;}
    th{background:#f3f4f6;}
    input,select,textarea{border:1px solid #d1d5db;border-radius:8px;padding:6px 10px;width:100%;margin-bottom:8px;}
    button{transition:0.2s;cursor:pointer;}
    .status-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:bold;}
    .status-pending{background:#fef3c7;color:#92400e;}
    .status-completed{background:#d1fae5;color:#065f46;}
    .footer-copy{text-align:center;padding:12px;color:#6b7280;font-size:12px;border-top:1px solid #e5e7eb;margin-top:16px;}
    .notification-bell{position:relative;cursor:pointer;}
    .notification-badge{position:absolute;top:-6px;right:-6px;background:red;color:white;border-radius:50%;padding:2px 5px;font-size:10px;}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
    .calendar-day{background:#f1f5f9;border-radius:12px;padding:8px 2px;text-align:center;cursor:pointer;font-size:12px;}
    .calendar-day.booked{background:#10b981;color:white;}
    #qr-reader{width:100%;border-radius:8px;}
    @media(max-width:768px){.tab-btn{padding:4px 8px;font-size:11px;}}
  </style>
</head>
<body>
<div id="app"><div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700"><div class="text-white text-center"><i class="fas fa-spinner fa-spin text-4xl mb-3"></i><p>جاري التحميل...</p></div></div></div>
<div id="toast" class="toast hidden"></div>
<div id="modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50 p-3">
  <div class="bg-white rounded-2xl p-4 w-full max-w-md max-h-[90vh] overflow-auto"><div id="modalContent"></div><div class="flex justify-end gap-2 mt-3"><button onclick="closeModal()" class="bg-gray-400 text-white px-3 py-1 rounded-lg">إغلاق</button></div></div>
</div>

<script>
// ========== Firebase ==========
const firebaseConfig = { apiKey: "AIzaSyApb4Nl_ktkVCkuz7DsR8kDdimSPT9uhmQ", authDomain: "drmedia-vpms.firebaseapp.com", databaseURL: "https://drmedia-vpms-default-rtdb.firebaseio.com", projectId: "drmedia-vpms", storageBucket: "drmedia-vpms.firebasestorage.app", messagingSenderId: "681162512380", appId: "1:681162512380:web:ab2482f3234d8b59fc4479" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ========== البيانات العامة ==========
let bookings=[], employees=[], users=[], halls=[], notifications=[], attendance=[];
let currentUser=null, currentTab='dashboardTab', companyName='Drmedia Pro', companyLogo='📷';
let selectedBookings=new Set(), selectedEmployees=new Set(), selectedHalls=new Set();
let html5QrCode=null;

// ========== دوال مساعدة ==========
function showMsg(m){let t=document.getElementById('toast');t.innerText=m;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),2000);}
function closeModal(){document.getElementById('modal').classList.add('hidden'); if(html5QrCode) html5QrCode.stop().catch(e=>{}); html5QrCode=null;}
function saveAllData(){
  Promise.all([db.ref('bookings').set(bookings), db.ref('employees').set(employees), db.ref('users').set(users), db.ref('halls').set(halls), db.ref('notifications').set(notifications), db.ref('attendance').set(attendance), db.ref('companySettings').set({companyName,companyLogo})]).catch(e=>console.error(e));
}
function addNotification(uid,title,message){notifications.push({id:Date.now(),userId:uid,title,message,read:false,date:new Date().toLocaleString()});saveAllData();renderNotificationBadge();}
function renderNotificationBadge(){let u=notifications.filter(n=>n.userId===currentUser?.employeeId&&!n.read).length;let b=document.getElementById('notificationBell');if(b){let x=b.querySelector('.notification-badge');if(u>0){if(!x){x=document.createElement('span');x.className='notification-badge';b.appendChild(x);}x.innerText=u;}else if(x)x.remove();}}
function showNotificationPanel(){let p=document.getElementById('notificationPanel');if(!p)return;if(p.style.display==='block'){p.style.display='none';return;}let un=notifications.filter(n=>n.userId===currentUser?.employeeId);p.innerHTML=`<div class="p-2 border-b flex justify-between"><span>الإشعارات (${un.filter(n=>!n.read).length})</span><button onclick="markAllNotificationsRead()" class="text-xs bg-blue-500 text-white px-2 py-1 rounded">الكل مقروء</button></div>${un.slice().reverse().map(n=>`<div class="p-2 border-b cursor-pointer ${n.read?'':'bg-green-50'}" onclick="markNotificationRead('${n.id}')"><div class="font-bold">${n.title}</div><div class="text-sm">${n.message}</div></div>`).join('')||'<div class="p-3 text-center">لا توجد إشعارات</div>'}`;p.style.display='block';}
function markNotificationRead(id){let n=notifications.find(x=>x.id==id);if(n)n.read=true;saveAllData();renderNotificationBadge();showNotificationPanel();}
function markAllNotificationsRead(){notifications.forEach(n=>{if(n.userId===currentUser?.employeeId)n.read=true;});saveAllData();renderNotificationBadge();showNotificationPanel();showMsg("✅ تم تحديث الكل");}

// ========== نظام الحضور QR ==========
function generateQRCode(employeeId){return `DRMEDIA-ATTEND-${employeeId}`;}
function generateQRCodeImage(employeeId){
  const qr = qrcode(0,'M');
  qr.addData(generateQRCode(employeeId));
  qr.make();
  return qr.createDataURL(8,0);
}
function recordAttendance(employeeId){
  const now=new Date(), today=now.toISOString().slice(0,10), time=now.toLocaleTimeString('ar-EG');
  if(attendance.some(a=>a.employeeId===employeeId && a.date===today)){showMsg('⚠️ تم تسجيل حضورك اليوم');return false;}
  attendance.push({id:'att_'+Date.now(),employeeId,date:today,time,timestamp:now.toISOString()});
  saveAllData();
  const emp=employees.find(e=>e.id===employeeId);
  showMsg(`✅ تم تسجيل حضور ${emp?emp.name:employeeId} الساعة ${time}`);
  addNotification(employeeId,'تسجيل حضور',`تم تسجيل حضورك`);
  return true;
}
function showQRScanner(){
  document.getElementById('modalContent').innerHTML=`<h3 class="text-xl font-bold mb-3">📷 مسح QR للحضور</h3><div id="qr-reader"></div><div id="qr-result" class="mt-3 text-center"></div><button onclick="stopQRScanner()" class="bg-red-600 text-white px-4 py-2 rounded-xl mt-3 w-full">إيقاف</button>`;
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(()=>{
    html5QrCode=new Html5Qrcode("qr-reader");
    html5QrCode.start({facingMode:"environment"},{fps:10,qrbox:{width:250,height:250}},
      (decodedText)=>{
        if(decodedText.startsWith('DRMEDIA-ATTEND-')){
          const employeeId=decodedText.replace('DRMEDIA-ATTEND-','');
          recordAttendance(employeeId);
          document.getElementById('qr-result').innerHTML='<p class="text-green-600 font-bold">✅ تم الحضور</p>';
          html5QrCode.stop().then(()=>setTimeout(closeModal,1500));
        }else{document.getElementById('qr-result').innerHTML='<p class="text-red-600">❌ رمز غير صالح</p>';}
      },err=>console.log(err)
    ).catch(err=>{showMsg('⚠️ تعذر الوصول للكاميرا');closeModal();});
  },500);
}
function stopQRScanner(){if(html5QrCode)html5QrCode.stop().then(()=>{html5QrCode=null;closeModal();}).catch(()=>closeModal());else closeModal();}
function exportAttendanceToExcel(){
  const data=attendance.map(a=>{const emp=employees.find(e=>e.id===a.employeeId);return {'الموظف':emp?emp.name:a.employeeId,'التاريخ':a.date,'الوقت':a.time};});
  const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"الحضور");XLSX.writeFile(wb,"Drmedia_Attendance.xlsx");showMsg("✅ تم التصدير");
}
function renderAttendanceContent(){
  const todayStr=new Date().toISOString().slice(0,10);
  let html=`<div class="p-4"><h2 class="text-xl font-bold">📋 سجل الحضور</h2><div class="grid grid-cols-2 gap-3 my-3"><div class="dashboard-card"><div class="stat-number">${attendance.filter(a=>a.date===todayStr).length}</div><div>حضور اليوم</div></div><div class="dashboard-card"><div class="stat-number">${employees.filter(e=>e.active).length}</div><div>إجمالي الموظفين</div></div></div><div class="flex gap-2 mb-3"><input type="date" id="attendanceFilterDate" class="border rounded-xl px-3 py-2" value="${todayStr}" onchange="renderAttendanceContent()" /><button onclick="exportAttendanceToExcel()" class="bg-green-700 text-white px-3 py-2 rounded-xl">تصدير Excel</button></div><div class="overflow-x-auto"><table class="w-full bg-white"><thead><tr><th>الموظف</th><th>التاريخ</th><th>الوقت</th><th>حالة</th></tr></thead><tbody>`;
  const filterDate=document.getElementById('attendanceFilterDate')?.value||todayStr;
  const filtered=attendance.filter(a=>a.date===filterDate);
  if(filtered.length===0)html+='<tr><td colspan="4" class="text-center py-4 text-gray-500">لا توجد سجلات</td></tr>';
  else filtered.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).forEach(a=>{const emp=employees.find(e=>e.id===a.employeeId);html+=`<tr><td>${emp?emp.name:a.employeeId}</td><td>${a.date}</td><td>${a.time}</td><td><span class="status-badge status-completed">✅ حاضر</span></td></tr>`;});
  html+=`</tbody></table></div></div>`;
  document.getElementById('attendanceTab').innerHTML=html;
}

// ========== دوال النظام الأساسية ==========
function updateEmployeeOrders(){
  let active=bookings.filter(b=>b.status!=='cancelled');
  employees.forEach(e=>e.totalOrders=active.filter(b=>(b.assignedEmployees||[]).includes(e.id)).length);
  saveAllData();
}
function autoDistribute(){
  let pending=bookings.filter(b=>b.status==='pending');
  pending.forEach(b=>b.assignedEmployees=[]);
  let dirs=employees.filter(e=>e.role==='مخرج'&&e.active);
  let phs=employees.filter(e=>e.role==='مصور'&&e.active);
  let crs=employees.filter(e=>e.role==='كرين'&&e.active);
  let dPtr=0,pPtr=0,cPtr=0;
  for(let b of pending){
    let hall=halls.find(h=>h.id===b.hallId);
    let type=hall?hall.type:'closed';
    let assigned=[];
    if(type==='cafe'){
      if(phs.length)assigned.push(phs[pPtr++%phs.length].id);
    }else{
      if(dirs.length)assigned.push(dirs[dPtr++%dirs.length].id);
      for(let i=0;i<2 && phs.length;i++)assigned.push(phs[pPtr++%phs.length].id);
      if(crs.length)assigned.push(crs[cPtr++%crs.length].id);
    }
    b.assignedEmployees=assigned;
  }
  updateEmployeeOrders();saveAllData();showMsg('✅ تم التوزيع الذكي');
}
function getFilteredBookings(){
  let f=bookings.filter(b=>b.status!=='cancelled');
  return f.sort((a,b)=>new Date(a.date)-new Date(b.date));
}

// ========== عرض المحتوى ==========
function renderDashboardContent(){
  let active=bookings.filter(b=>b.status!=='cancelled');
  let rev=active.reduce((s,b)=>s+b.price,0);
  let totalEmployees=employees.filter(e=>e.active).length;
  document.getElementById('dashboardTab').innerHTML=`<div class="grid grid-cols-2 md:grid-cols-4 gap-3 p-4"><div class="dashboard-card"><i class="fas fa-calendar-alt text-2xl text-emerald-600"></i><div class="stat-number">${active.length}</div><div>الحجوزات</div></div><div class="dashboard-card"><i class="fas fa-chart-line text-2xl text-emerald-600"></i><div class="stat-number">${rev.toLocaleString()}</div><div>الإيرادات</div></div><div class="dashboard-card"><i class="fas fa-users text-2xl text-emerald-600"></i><div class="stat-number">${totalEmployees}</div><div>الموظفين</div></div><div class="dashboard-card"><i class="fas fa-check-circle text-2xl text-emerald-600"></i><div class="stat-number">${bookings.filter(b=>b.status==='completed').length}</div><div>مكتمل</div></div></div>`;
}
function renderBookingsContent(){
  let fb=getFilteredBookings();
  let html=`<div class="p-4"><div class="flex justify-between flex-wrap gap-2 mb-3"><h2 class="text-xl font-bold">📅 الحجوزات (${fb.length})</h2><div><button onclick="showAddBookingModal()" class="bg-emerald-700 text-white px-3 py-1 rounded-lg">+ حجز</button><button onclick="autoDistribute();renderBookingsContent();" class="bg-purple-700 text-white px-3 py-1 rounded-lg mr-2">🔄 توزيع</button></div></div><div class="overflow-x-auto"><table class="min-w-full bg-white"><thead><tr><th class="checkbox-col"><input type="checkbox" id="selectAllBookingsCheckbox" onchange="toggleSelectAllBookings()"></th><th>العميل</th><th>التاريخ</th><th>القاعة</th><th>السعر</th><th>الحالة</th><th>الموظفون</th><th>إجراءات</th></tr></thead><tbody>`;
  fb.forEach(b=>{html+=`<tr><td class="checkbox-col"><input type="checkbox" class="booking-checkbox" value="${b.id}" ${selectedBookings.has(b.id)?'checked':''} onchange="toggleBookingSelection('${b.id}',this.checked)"></td><td>${b.clientName}</td><td>${b.date}</td><td>${b.hallName}</td><td>${b.price}</td><td><span class="status-badge ${b.status==='completed'?'status-completed':'status-pending'}">${b.status==='completed'?'مكتمل':'معلق'}</span></td><td>${(b.assignedEmployees||[]).map(id=>employees.find(e=>e.id===id)?.name||id).join(', ')||'-'}</td><td><button onclick="deleteBooking('${b.id}')" class="text-red-600"><i class="fas fa-trash-alt"></i></button></td></tr>`;});
  html+=`</tbody></table><div class="mt-3 flex gap-2"><button onclick="bulkDeleteBookings()" class="bg-red-600 text-white px-3 py-1 rounded-lg text-sm">حذف المحدد</button><button onclick="bulkCompleteBookings()" class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-sm">إكمال المحدد</button></div></div></div>`;
  document.getElementById('bookingsTab').innerHTML=html;
  document.getElementById('selectAllBookingsCheckbox')?.addEventListener('change',(e)=>{document.querySelectorAll('.booking-checkbox').forEach(cb=>cb.checked=e.target.checked);});
}
function renderEmployeesContent(){
  updateEmployeeOrders();
  let html=`<div class="p-4"><h2 class="text-xl font-bold">👥 الموظفين</h2><button onclick="showAddEmployeeModal()" class="bg-blue-700 text-white px-3 py-1 rounded-lg my-2">+ إضافة</button><div class="overflow-x-auto"><table class="min-w-full bg-white"><thead><tr><th class="checkbox-col"><input type="checkbox" id="selectAllEmployeesCheckbox" onchange="toggleSelectAllEmployees()"></th><th>الاسم</th><th>الوظيفة</th><th>الهاتف</th><th>الأوردرات</th><th>المستحق</th><th>حذف</th></tr></thead><tbody>`;
  employees.forEach(e=>{html+=`<tr><td class="checkbox-col"><input type="checkbox" class="employee-checkbox" value="${e.id}" ${selectedEmployees.has(e.id)?'checked':''} onchange="toggleEmployeeSelection('${e.id}',this.checked)"></td><td>${e.name}</td><td>${e.role}</td><td>${e.phone}</td><td>${e.totalOrders||0}</td><td>${((e.totalOrders||0)*e.salaryPerOrder).toLocaleString()}</td><td><button onclick="deleteEmployee('${e.id}')" class="text-red-600"><i class="fas fa-trash-alt"></i></button></td></tr>`;});
  html+=`</tbody></table><button onclick="bulkDeleteEmployees()" class="bg-red-600 text-white px-3 py-1 rounded-lg mt-2 text-sm">حذف المحددين</button></div></div>`;
  document.getElementById('employeesTab').innerHTML=html;
}
function renderHallsContent(){
  let html=`<div class="p-4"><h2 class="text-xl font-bold">🏛️ القاعات</h2><button onclick="showAddHallModal()" class="bg-blue-700 text-white px-3 py-1 rounded-lg my-2">+ إضافة</button><div class="overflow-x-auto"><table class="min-w-full bg-white"><thead><tr><th class="checkbox-col"><input type="checkbox" id="selectAllHallsCheckbox" onchange="toggleSelectAllHalls()"></th><th>الاسم</th><th>النوع</th><th>الحالة</th><th>حذف</th></tr></thead><tbody>`;
  halls.forEach(h=>{html+=`<tr><td class="checkbox-col"><input type="checkbox" class="hall-checkbox" value="${h.id}" ${selectedHalls.has(h.id)?'checked':''} onchange="toggleHallSelection('${h.id}',this.checked)"></td><td>${h.name}</td><td>${h.type==='closed'?'مغلقة':h.type==='open'?'أوبن':'كافيه'}</td><td>${h.active?'🟢 نشطة':'🔴 غير نشطة'}</td><td><button onclick="deleteHall('${h.id}')" class="text-red-600"><i class="fas fa-trash-alt"></i></button></td></tr>`;});
  html+=`</tbody></table><button onclick="bulkDeleteHalls()" class="bg-red-600 text-white px-3 py-1 rounded-lg mt-2 text-sm">حذف المحددين</button></div></div>`;
  document.getElementById('hallsTab').innerHTML=html;
}
function renderPayrollContent(){
  let totalPay=0;
  let rows='';
  employees.forEach(emp=>{let orders=bookings.filter(b=>b.assignedEmployees?.includes(emp.id)).length;let salary=orders*emp.salaryPerOrder;totalPay+=salary;rows+=`<tr><td>${emp.name}</td><td>${emp.role}</td><td>${orders}</td><td>${salary.toLocaleString()}</td></tr>`;});
  document.getElementById('payrollTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold">💰 المرتبات</h2><div class="bg-white p-3 rounded-lg my-2">الإجمالي: ${totalPay.toLocaleString()} ج.م</div><div class="overflow-x-auto"><table class="min-w-full bg-white"><thead><tr><th>الموظف</th><th>الوظيفة</th><th>الأوردرات</th><th>المستحق</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function renderCalendarContent(monthOffset=0){
  let now=new Date();now.setMonth(now.getMonth()+monthOffset);
  let y=now.getFullYear(),m=now.getMonth();
  let first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  let mNames=['يناير','فبراير','مارس','إبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  let html=`<div class="p-4"><div class="flex justify-between items-center"><button onclick="renderCalendarContent(${monthOffset-1})" class="bg-gray-300 px-3 py-1 rounded-lg"><i class="fas fa-chevron-right"></i></button><h2 class="text-xl font-bold">📆 ${mNames[m]} ${y}</h2><button onclick="renderCalendarContent(${monthOffset+1})" class="bg-gray-300 px-3 py-1 rounded-lg"><i class="fas fa-chevron-left"></i></button></div><div class="calendar-grid mt-3">`;
  ['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'].forEach(d=>html+=`<div class="text-center font-bold">${d}</div>`);
  for(let i=0;i<first;i++)html+=`<div></div>`;
  for(let d=1;d<=days;d++){let ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;let hasBookings=bookings.some(b=>b.date===ds);html+=`<div class="calendar-day ${hasBookings?'booked':''}" onclick="alert('حجوزات يوم ${ds}')">${d}</div>`;}
  html+=`</div></div>`;
  document.getElementById('calendarTab').innerHTML=html;
}
function renderArchiveContent(){document.getElementById('archiveTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold">📁 الأرشيف</h2><div class="bg-white p-3 rounded-lg">عرض الحجوزات المكتملة</div></div>`;}
function renderReportsContent(){document.getElementById('reportsTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold">📊 التقارير</h2><div class="bg-white p-3 rounded-lg">إحصائيات متقدمة</div><button onclick="exportToExcel()" class="bg-green-700 text-white px-3 py-1 rounded-lg mt-2">تصدير Excel</button></div>`;}
function renderUsersContent(){document.getElementById('usersTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold">👥 المستخدمين</h2><div class="bg-white p-3 rounded-lg">إدارة المستخدمين</div></div>`;}
function renderSettingsContent(){document.getElementById('settingsTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold">⚙️ الإعدادات</h2><div class="bg-white p-3 rounded-lg">إعدادات الشركة</div></div>`;}
function renderSwapRequestsContent(){document.getElementById('swapRequestsTab').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold">🔄 طلبات التبديل</h2><div class="bg-white p-3 rounded-lg">لا توجد طلبات</div></div>`;}
function exportToExcel(){let ws=XLSX.utils.json_to_sheet(bookings);let wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"الحجوزات");XLSX.writeFile(wb,"Drmedia_Bookings.xlsx");showMsg("تم التصدير");}

// ========== دوال الإضافة والحذف ==========
function showAddBookingModal(){let cn=prompt("اسم العميل");if(cn){let hid=prompt("معرف القاعة",halls[0]?.id);let dt=prompt("التاريخ (YYYY-MM-DD)");let pr=prompt("السعر")||2500;bookings.push({id:'b'+Date.now(),clientName:cn,hallId:hid||'hall1',hallName:halls.find(h=>h.id===hid)?.name||'قاعة',date:dt||new Date().toISOString().slice(0,10),price:parseInt(pr),status:'pending',assignedEmployees:[]});saveAllData();autoDistribute();renderBookingsContent();showMsg("✅ تمت الإضافة");}}
function deleteBooking(id){if(confirm("حذف الحجز؟")){bookings=bookings.filter(b=>b.id!==id);saveAllData();renderBookingsContent();showMsg("تم الحذف");}}
function showAddEmployeeModal(){let n=prompt("اسم الموظف");if(n){let r=prompt("الوظيفة (مخرج/مصور/كرين)","مصور");let ph=prompt("الهاتف");employees.push({id:'emp'+Date.now(),name:n,role:r||'موظف',phone:ph||'',salaryPerOrder:200,active:true,totalOrders:0});saveAllData();renderEmployeesContent();showMsg("✅ تمت الإضافة");}}
function deleteEmployee(id){if(confirm("حذف الموظف؟")){employees=employees.filter(e=>e.id!==id);saveAllData();renderEmployeesContent();showMsg("تم الحذف");}}
function showAddHallModal(){let n=prompt("اسم القاعة");if(n){halls.push({id:'hall'+Date.now(),name:n,type:'closed',active:true});saveAllData();renderHallsContent();showMsg("✅ تمت الإضافة");}}
function deleteHall(id){if(confirm("حذف القاعة؟")){halls=halls.filter(h=>h.id!==id);saveAllData();renderHallsContent();showMsg("تم الحذف");}}
function toggleBookingSelection(id,checked){if(checked)selectedBookings.add(id);else selectedBookings.delete(id);}
function toggleSelectAllBookings(){let ck=document.getElementById('selectAllBookingsCheckbox')?.checked;let fb=getFilteredBookings();if(ck)fb.forEach(b=>selectedBookings.add(b.id));else selectedBookings.clear();renderBookingsContent();}
function bulkDeleteBookings(){if(!selectedBookings.size)return showMsg("لم تختر أي حجز");if(confirm(`حذف ${selectedBookings.size} حجز؟`)){bookings=bookings.filter(b=>!selectedBookings.has(b.id));selectedBookings.clear();saveAllData();renderBookingsContent();showMsg("تم الحذف");}}
function bulkCompleteBookings(){if(!selectedBookings.size)return showMsg("لم تختر أي حجز");if(confirm(`إكمال ${selectedBookings.size} حجز؟`)){selectedBookings.forEach(id=>{let b=bookings.find(x=>x.id===id);if(b)b.status='completed';});selectedBookings.clear();saveAllData();renderBookingsContent();showMsg("✅ تم الإكمال");}}
function toggleEmployeeSelection(id,checked){if(checked)selectedEmployees.add(id);else selectedEmployees.delete(id);}
function toggleSelectAllEmployees(){let ck=document.getElementById('selectAllEmployeesCheckbox')?.checked;if(ck)employees.forEach(e=>selectedEmployees.add(e.id));else selectedEmployees.clear();renderEmployeesContent();}
function bulkDeleteEmployees(){if(!selectedEmployees.size)return showMsg("لم تختر أي موظف");if(confirm(`حذف ${selectedEmployees.size} موظف؟`)){employees=employees.filter(e=>!selectedEmployees.has(e.id));selectedEmployees.clear();saveAllData();renderEmployeesContent();showMsg("تم الحذف");}}
function toggleHallSelection(id,checked){if(checked)selectedHalls.add(id);else selectedHalls.delete(id);}
function toggleSelectAllHalls(){let ck=document.getElementById('selectAllHallsCheckbox')?.checked;if(ck)halls.forEach(h=>selectedHalls.add(h.id));else selectedHalls.clear();renderHallsContent();}
function bulkDeleteHalls(){if(!selectedHalls.size)return showMsg("لم تختر أي قاعة");if(confirm(`حذف ${selectedHalls.size} قاعة؟`)){halls=halls.filter(h=>!selectedHalls.has(h.id));selectedHalls.clear();saveAllData();renderHallsContent();showMsg("تم الحذف");}}

function renderCurrentTab(){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden'));
  if(currentTab==='dashboardTab')renderDashboardContent();
  else if(currentTab==='bookingsTab')renderBookingsContent();
  else if(currentTab==='hallsTab')renderHallsContent();
  else if(currentTab==='employeesTab')renderEmployeesContent();
  else if(currentTab==='payrollTab')renderPayrollContent();
  else if(currentTab==='calendarTab')renderCalendarContent();
  else if(currentTab==='archiveTab')renderArchiveContent();
  else if(currentTab==='reportsTab')renderReportsContent();
  else if(currentTab==='usersTab')renderUsersContent();
  else if(currentTab==='settingsTab')renderSettingsContent();
  else if(currentTab==='swapRequestsTab')renderSwapRequestsContent();
  else if(currentTab==='attendanceTab')renderAttendanceContent();
  document.getElementById(currentTab)?.classList.remove('hidden');
}

// ========== واجهة الموظف ==========
function renderEmployeeDashboard(){
  if(!currentUser?.employeeId||!employees.some(e=>e.id===currentUser.employeeId)){

    return;
  }
  let emp=employees.find(e=>e.id===currentUser.employeeId);
  let myBookings=bookings.filter(b=>(b.assignedEmployees||[]).includes(emp.id)&&b.status!=='cancelled');
  let qrData=generateQRCodeImage(currentUser.employeeId);
  let todayAttendance=attendance.some(a=>a.employeeId===currentUser.employeeId && a.date===new Date().toISOString().slice(0,10));
  document.getElementById('app').innerHTML=`
    <div class="p-4 max-w-4xl mx-auto">
      <div class="flex justify-between items-center"><h1 class="text-xl font-bold text-emerald-800">${companyLogo} ${companyName}</h1><button onclick="logout()" class="bg-red-600 text-white px-3 py-1 rounded-lg text-sm">خروج</button></div>
      <div class="bg-white p-4 rounded-xl shadow my-4">
        <div class="flex flex-col md:flex-row items-center gap-4">
          <img src="${qrData}" class="w-28 h-28 border-2 border-emerald-500 rounded-lg" />
          <div><p class="font-bold">${emp.name} - ${emp.role}</p><p class="text-xs text-gray-400">${generateQRCode(currentUser.employeeId)}</p>
            <div class="mt-2 flex gap-2"><button onclick="showQRScanner()" class="bg-green-600 text-white px-4 py-2 rounded-xl"><i class="fas fa-camera ml-1"></i> مسح QR للحضور</button>
            ${!todayAttendance?`<button onclick="recordAttendance('${currentUser.employeeId}')" class="bg-blue-600 text-white px-4 py-2 rounded-xl"><i class="fas fa-sign-in-alt ml-1"></i> تسجيل حضور يدوي</button>`:`<span class="bg-gray-200 text-gray-700 px-4 py-2 rounded-xl">✅ تم الحضور اليوم</span>`}</div>
          </div>
        </div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow"><h2 class="font-bold">أوردراتي (${myBookings.length})</h2><p>المستحق: ${(myBookings.length*emp.salaryPerOrder).toLocaleString()} ج.م</p>
      <div class="overflow-x-auto"><table class="w-full"><thead><tr><th>التاريخ</th><th>العميل</th><th>القاعة</th></tr></thead><tbody>${myBookings.map(o=>`<tr><td>${o.date}</td><td>${o.clientName}</td><td>${o.hallName}</td></tr>`).join('')}</tbody></table></div></div>
      <div class="footer-copy">© Dr Media - Ahmed Shreif</div>
    </div>`;
  renderNotificationBadge();
}

// ========== تسجيل الدخول ==========
function showLogin(){
  document.getElementById('app').innerHTML=`
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-800 to-teal-700 p-4">
      <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
        <div class="text-center mb-5"><div class="text-5xl mb-2">📷</div><h2 class="text-2xl font-bold text-emerald-800">Drmedia Pro</h2><p class="text-gray-500">نظام إدارة القاعات والحضور QR</p></div>
        <form id="loginForm"><div class="mb-3"><label class="block text-gray-700 mb-1">اسم المستخدم</label><input type="text" id="loginUser" class="border rounded-xl w-full p-2" required></div><div class="mb-4"><label class="block text-gray-700 mb-1">كلمة المرور</label><input type="password" id="loginPass" class="border rounded-xl w-full p-2" required></div><button type="submit" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-2 rounded-xl">دخول</button></form>
        <div class="mt-4 text-center text-sm text-gray-500"><p>تجريبي: admin / admin123</p><p>موظف: ahmed / emp123</p></div>
      </div>
    </div>`;
  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    let un=document.getElementById('loginUser').value.trim();
    let pw=document.getElementById('loginPass').value;
    let user=users.find(u=>u.username===un && u.password===pw);
    if(user){currentUser=user;sessionStorage.setItem('vpms_user',JSON.stringify(user));showMsg(`مرحباً ${user.name||user.username}`);renderApp();}
    else showMsg("❌ بيانات غير صحيحة");
  });
}
function logout(){sessionStorage.removeItem('vpms_user');currentUser=null;showLogin();}
function renderApp(){if(currentUser?.role==='admin')renderAdminDashboard();else if(currentUser?.role==='employee')renderEmployeeDashboard();else showLogin();}

// ========== تحميل البيانات ==========
let loaded=0;
function dataLoaded(){
  loaded++;
  if(loaded===10){
    if(!bookings.length||!employees.length||!halls.length) initDefaultData();
    bookings.forEach(b=>{if(!b.status)b.status='pending';if(!b.assignedEmployees)b.assignedEmployees=[];});
    let saved=sessionStorage.getItem('vpms_user');
    if(saved) try{currentUser=JSON.parse(saved);}catch(e){}
    renderApp();
  }
}
db.ref('bookings').on('value',s=>{bookings=s.val()||[];dataLoaded();});
db.ref('employees').on('value',s=>{employees=s.val()||[];dataLoaded();});
db.ref('users').on('value',s=>{users=s.val()||[];dataLoaded();});
db.ref('halls').on('value',s=>{halls=s.val()||[];dataLoaded();});
db.ref('notifications').on('value',s=>{notifications=s.val()||[];dataLoaded();});
db.ref('attendance').on('value',s=>{attendance=s.val()||[];dataLoaded();});
db.ref('companySettings').on('value',s=>{let cs=s.val();if(cs){companyName=cs.companyName||'Drmedia Pro';companyLogo=cs.companyLogo||'📷';}dataLoaded();});
// إضافة مراجع أخرى فارغة لتكتمل 10
db.ref('swapRequests').on('value',s=>{dataLoaded();});
db.ref('payrollArchive').on('value',s=>{dataLoaded();});
db.ref('employeeLoans').on('value',s=>{dataLoaded();});
